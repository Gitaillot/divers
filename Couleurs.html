<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Apprendre les couleurs</title>
<style>
  * {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  body {
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    background: #1a1a2e;
    color: #eee;
    overflow: hidden;
    position: fixed;
    width: 100%;
    height: 100%;
  }

  html { height: -webkit-fill-available; overflow: hidden; }

  .container {
    text-align: center;
    max-width: 600px;
    width: 96%;
    padding: 0.5rem 0 1.2rem;
  }

  h1 {
    font-size: 1.5rem;
    margin-bottom: 1rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    color: #aab;
  }

  /* ── Triplet row ── */
  .triplet {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 12px;
    margin-bottom: 1.2rem;
  }

  /* Neighbour cards */
  .neighbor {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 0 0 auto;
  }

  .neighbor-card {
    width: 90px;
    height: 90px;
    border-radius: 16px;
    transition: background-color 0.6s ease;
    box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    border: 2px solid rgba(255,255,255,0.06);
    margin-bottom: 0.4rem;
  }

  .neighbor-label {
    font-size: 0.7rem;
    color: #778;
    min-height: 1rem;
    max-width: 90px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-style: italic;
    opacity: 0;
  }

  .neighbor-label.visible { opacity: 1; transition: opacity 0.3s; }
  .neighbor-label.hidden  { opacity: 0; transition: none; }

  /* Main card */
  .main-color {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 0 0 auto;
  }

  .color-card {
    width: 160px;
    height: 160px;
    border-radius: 24px;
    margin-bottom: 0.9rem;
    transition: background-color 0.6s ease;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    border: 3px solid rgba(255,255,255,0.08);
  }

  .color-name-fr {
    font-size: 1.5rem;
    font-weight: 600;
    min-height: 2rem;
    margin-bottom: 0.12rem;
  }

  .color-name-de {
    font-size: 1rem;
    font-weight: 400;
    min-height: 1.3rem;
    margin-bottom: 0.35rem;
    color: #b0b8c8;
    font-style: italic;
  }

  .color-hex {
    font-size: 0.82rem;
    color: #889;
    min-height: 1.2rem;
    margin-bottom: 0.9rem;
    font-family: 'Courier New', monospace;
  }

  .buttons {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* Overlay both button rows at the same position */
  .buttons-wrapper {
    position: relative;
    margin-bottom: 0.5rem;
    /* height will be determined by the tallest row */
    min-height: 54px;
  }
  #revealRow, #actionButtons {
    position: absolute;
    top: 0; left: 0; right: 0;
    justify-content: center;
  }
  #revealRow { visibility: visible; }
  #revealRow.hidden-row { visibility: hidden; }
  #actionButtons { visibility: hidden; }
  #actionButtons.visible-row { visibility: visible; }

  button {
    padding: 15px 22px;
    border: none;
    border-radius: 14px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    position: relative;
    z-index: 100;
  }

  button:active:not(:disabled) {
    transform: scale(0.95);
    opacity: 0.85;
  }

  button:disabled { cursor: default; opacity: 0.35; }

  .btn-reveal {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    min-width: 200px;
  }

  .btn-known {
    background: linear-gradient(135deg, #43e97b, #38f9d7);
    color: #1a1a2e;
  }

  /* +5 / +20 buttons */
  .btn-plus5 {
    background: rgba(255,255,255,0.08);
    color: #ccc;
    font-size: 0.8rem;
    padding: 10px 14px;
    border-radius: 10px;
    font-weight: 600;
  }

  .btn-plus20 {
    background: rgba(255,255,255,0.08);
    color: #ccc;
    font-size: 0.8rem;
    padding: 10px 14px;
    border-radius: 10px;
    font-weight: 600;
  }

  .stats {
    margin-top: 0.8rem;
    font-size: 0.78rem;
    color: #778;
    line-height: 1.7;
  }

  .category {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    background: rgba(255,255,255,0.06);
    color: #99a;
  }

  .done-screen {
    display: none;
    padding: 2rem 1rem;
  }

  .done-screen h2 {
    font-size: 1.8rem;
    margin-bottom: 1rem;
    font-weight: 300;
  }

  .done-screen p {
    color: #99a;
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  .btn-restart {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    min-width: 220px;
  }


  /* ── Level selection screen ── */
  .level-screen {
    padding: 1rem 0.5rem 1.5rem;
  }
  .level-screen h2 {
    font-size: 1.3rem;
    font-weight: 300;
    color: #aab;
    margin-bottom: 0.4rem;
    letter-spacing: 0.05em;
  }
  .level-screen p {
    font-size: 0.85rem;
    color: #778;
    margin-bottom: 1.6rem;
    line-height: 1.5;
  }
  .level-cards {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .level-card {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 1.2rem 1rem;
    width: 140px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    touch-action: manipulation;
  }
  .level-card:active { transform: scale(0.95); }
  .level-card:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); }
  .level-card .lvl-num {
    font-size: 2rem;
    margin-bottom: 0.3rem;
  }
  .level-card .lvl-title {
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 0.4rem;
    color: #dde;
  }
  .level-card .lvl-desc {
    font-size: 0.72rem;
    color: #778;
    line-height: 1.4;
  }
  .level-1 { border-color: rgba(102,126,234,0.4); }
  .level-1:hover { border-color: #667eea; }
  .level-2 { border-color: rgba(240,180,50,0.4); }
  .level-2:hover { border-color: #f0b432; }

  @media (max-width: 400px) {
    .color-card { width: 130px; height: 130px; }
    .neighbor-card { width: 72px; height: 72px; }
    .color-name-fr { font-size: 1.2rem; }
    button { padding: 13px 16px; font-size: 0.88rem; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>🎨 Devinez la couleur</h1>

  <div id="levelScreen" class="level-screen">
    <h2>🎨 Choisissez votre niveau</h2>
    <p>Sélectionnez le niveau de difficulté pour commencer l'entraînement.</p>
    <div class="level-cards">
      <div class="level-card level-1" id="btn-level1">
        <div class="lvl-num">⭐</div>
        <div class="lvl-title">Niveau 1</div>
        <div class="lvl-desc">150 couleurs classiques avec noms français & allemands</div>
      </div>
      <div class="level-card level-2" id="btn-level2">
        <div class="lvl-num">⭐⭐</div>
        <div class="lvl-title">Niveau 2</div>
        <div class="lvl-desc">281 teintes avancées tirées de Wikipédia</div>
      </div>
    </div>
  </div>

    <div id="gameScreen" style="display:none;">

    <!-- Triplet: voisin gauche · principale · voisin droit -->
    <div class="triplet">
      <div class="neighbor" id="leftNeighbor">
        <div class="neighbor-card" id="leftCard"></div>
        <div class="neighbor-label hidden" id="leftLabel"></div>
      </div>

      <div class="main-color">
        <div class="color-card" id="colorCard"></div>
        <div class="color-name-fr" id="colorNameFr">&nbsp;</div>
        <div class="color-name-de" id="colorNameDe">&nbsp;</div>
        <div class="color-hex" id="colorHex">&nbsp;</div>
      </div>

      <div class="neighbor" id="rightNeighbor">
        <div class="neighbor-card" id="rightCard"></div>
        <div class="neighbor-label hidden" id="rightLabel"></div>
      </div>
    </div>

    <div class="buttons-wrapper">
      <div class="buttons" id="revealRow">
        <button class="btn-reveal" id="revealBtn">Révéler le nom</button>
      </div>
      <div class="buttons" id="actionButtons">
        <button class="btn-known" id="knownBtn">✓ Connue</button>
        <button class="btn-plus5" id="plus5Btn">↻ +5 tours</button>
        <button class="btn-plus20" id="plus20Btn">↻ +20 tours</button>
      </div>
    </div>

    <div class="stats" id="stats"></div>
  </div>

  <div class="done-screen" id="doneScreen">
    <h2>🎉 Bravo !</h2>
    <p id="doneText">Vous connaissez toutes les couleurs !</p>
    <button class="btn-restart" id="restartBtn">Recommencer</button>
    <button class="btn-restart" id="changeLevelBtn" style="margin-top:0.5rem;background:rgba(255,255,255,0.1);font-weight:400;font-size:0.9rem;">Changer de niveau</button>
  </div>
</div>

var level1Colors = allColors.slice();
var available = allColors.slice();
var reviewQueue = [];
var known = [];
var turn = 0;
var current = null;
var currentIdx = -1; // index of current in allColors
var revealed = false;

function pickNext() {
  var i, pick, idx;
  var due = [];
  for (i = 0; i < reviewQueue.length; i++) {
    if (reviewQueue[i].showAtTurn <= turn) due.push(reviewQueue[i]);
  }
  if (due.length > 0) {
    pick = due[Math.floor(Math.random() * due.length)];
    var nq = [];
    for (i = 0; i < reviewQueue.length; i++) {
      if (reviewQueue[i] !== pick) nq.push(reviewQueue[i]);
    }
    reviewQueue = nq;
    return pick;
  }
  if (available.length > 0) {
    idx = Math.floor(Math.random() * available.length);
    // return an object with color + its index in allColors
    return { color: available[idx], idx: allColors.indexOf(available[idx]) };
  }
  if (reviewQueue.length > 0) {
    reviewQueue.sort(function(a, b) { return a.showAtTurn - b.showAtTurn; });
    pick = reviewQueue[0];
    reviewQueue = reviewQueue.slice(1);
    return pick;
  }
  return null;
}

function showColor() {
  var picked = pickNext();
  if (!picked) {
    document.getElementById('gameScreen').style.display = 'none';
    document.getElementById('doneScreen').style.display = 'block';
    return;
  }
  current = picked.color;
  currentIdx = (picked.idx !== undefined) ? picked.idx : allColors.indexOf(current);

  revealed = false;

  // Main card
  document.getElementById('colorCard').style.backgroundColor = current.hex;
  document.getElementById('colorNameFr').innerHTML = '\u00A0';
  document.getElementById('colorNameDe').innerHTML = '\u00A0';
  document.getElementById('colorHex').innerHTML = '\u00A0';

  // Neighbour cards — hide labels instantly (no transition) before updating text
  var leftLabel = document.getElementById('leftLabel');
  var rightLabel = document.getElementById('rightLabel');
  leftLabel.classList.remove('visible');
  leftLabel.classList.add('hidden');
  rightLabel.classList.remove('visible');
  rightLabel.classList.add('hidden');

  var leftIdx = (currentIdx - 1 + allColors.length) % allColors.length;
  var rightIdx = (currentIdx + 1) % allColors.length;
  var leftColor = allColors[leftIdx];
  var rightColor = allColors[rightIdx];

  document.getElementById('leftCard').style.backgroundColor = leftColor.hex;
  document.getElementById('rightCard').style.backgroundColor = rightColor.hex;
  leftLabel.textContent = leftColor.name;
  rightLabel.textContent = rightColor.name;

  document.getElementById('revealBtn').disabled = false;
  document.getElementById('revealRow').classList.remove('hidden-row');
  document.getElementById('actionButtons').classList.remove('visible-row');
  updateStats();
}

function doReveal() {
  if (!current || revealed) return;
  revealed = true;
  turn++;
  document.getElementById('colorNameFr').textContent = '\uD83C\uDDEB\uD83C\uDDF7 ' + current.name;
  // Level 1 has German names; level 2 has synonyms instead
  if (current.de) {
    document.getElementById('colorNameDe').textContent = '\uD83C\uDDE9\uD83C\uDDEA ' + current.de;
  } else if (current.syn) {
    document.getElementById('colorNameDe').textContent = '≈ ' + current.syn;
  } else {
    document.getElementById('colorNameDe').innerHTML = '\u00A0';
  }
  document.getElementById('colorHex').innerHTML = current.hex + ' <span class="category">' + current.cat + '</span>';
  // Hide reveal button, show action buttons
  document.getElementById('revealRow').classList.add('hidden-row');
  document.getElementById('actionButtons').classList.add('visible-row');

  // Reveal neighbour labels with fade-in
  document.getElementById('leftLabel').classList.remove('hidden');
  document.getElementById('leftLabel').classList.add('visible');
  document.getElementById('rightLabel').classList.remove('hidden');
  document.getElementById('rightLabel').classList.add('visible');

  updateStats();
}

function removeFromQueues(name) {
  var i, na = [], nq = [];
  for (i = 0; i < available.length; i++) {
    if (available[i].name !== name) na.push(available[i]);
  }
  available = na;
  for (i = 0; i < reviewQueue.length; i++) {
    if (reviewQueue[i].color.name !== name) nq.push(reviewQueue[i]);
  }
  reviewQueue = nq;
}

function doKnown() {
  if (!current) return;
  removeFromQueues(current.name);
  known.push(current);
  showColor();
}

function doPlus5() {
  if (!current || !revealed) return;
  removeFromQueues(current.name);
  reviewQueue.push({ color: current, idx: currentIdx, showAtTurn: turn + 5 });
  showColor();
}

function doPlus20() {
  if (!current || !revealed) return;
  removeFromQueues(current.name);
  reviewQueue.push({ color: current, idx: currentIdx, showAtTurn: turn + 20 });
  showColor();
}

function updateStats() {
  document.getElementById('stats').innerHTML =
    '\u2713 Connues : <strong>' + known.length + '</strong> \u00B7 \u21BB \u00C0 revoir : <strong>' + reviewQueue.length + '</strong> \u00B7 Restantes : <strong>' + available.length + '</strong> \u00B7 Tour : <strong>' + turn + '</strong>';
}

function startGame(level) {
  if (level === 2) {
    allColors = level2Colors.slice();
    document.getElementById('doneText').textContent = 'Vous connaissez les 281 teintes du niveau 2 !';
  } else {
    allColors = level1Colors.slice();
    document.getElementById('doneText').textContent = 'Vous connaissez les 150 couleurs du niveau 1 !';
  }
  available = allColors.slice();
  reviewQueue = [];
  known = [];
  turn = 0;
  document.getElementById('levelScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
  document.getElementById('doneScreen').style.display = 'none';
  showColor();
}

function doRestart() {
  available = allColors.slice();
  reviewQueue = [];
  known = [];
  turn = 0;
  document.getElementById('gameScreen').style.display = 'block';
  document.getElementById('doneScreen').style.display = 'none';
  showColor();
}

function doChangeLevel() {
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('doneScreen').style.display = 'none';
  document.getElementById('levelScreen').style.display = 'block';
}

// ── TOUCH HANDLING ──
function tapHandler(id, fn) {
  var el = document.getElementById(id);
  var touched = false;

  el.addEventListener('touchstart', function(e) {
    e.preventDefault();
    e.stopPropagation();
    touched = true;
    fn();
  }, { passive: false });

  el.addEventListener('touchend', function(e) {
    e.preventDefault();
    e.stopPropagation();
  }, { passive: false });

  el.addEventListener('touchmove', function(e) {
    e.preventDefault();
  }, { passive: false });

  el.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    if (!touched) fn();
    touched = false;
  });
}

tapHandler('revealBtn', doReveal);
tapHandler('knownBtn', doKnown);
tapHandler('plus5Btn', doPlus5);
tapHandler('plus20Btn', doPlus20);
tapHandler('restartBtn', doRestart);
tapHandler('changeLevelBtn', doChangeLevel);

document.addEventListener('touchmove', function(e) {
  e.preventDefault();
}, { passive: false });

// Level buttons (not using tapHandler since they're dynamically relevant)
document.getElementById('btn-level1').addEventListener('click', function(e){ e.preventDefault(); startGame(1); });
document.getElementById('btn-level2').addEventListener('click', function(e){ e.preventDefault(); startGame(2); });
document.getElementById('btn-level1').addEventListener('touchstart', function(e){ e.preventDefault(); e.stopPropagation(); startGame(1); }, {passive:false});
document.getElementById('btn-level2').addEventListener('touchstart', function(e){ e.preventDefault(); e.stopPropagation(); startGame(2); }, {passive:false});
// Show level screen on load (don't call showColor yet)
</script>
