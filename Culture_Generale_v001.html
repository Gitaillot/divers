{theme:"geo",focus:"allemagne",diff:"moyen",type:"q",q:"Quelle mer borde l'Allemagne au nord-est, et quelle importance a-t-elle pour le pays ?",a:"La mer Baltique (Ostsee)",detail:"Avec la mer du Nord à l'ouest, elle offre à l'Allemagne deux façades maritimes. Les ports de Rostock, Kiel et Lübeck sont historiquement importants (Ligue hanséatique). Les plages de l'île de Rügen (la plus grande île allemande) sont une destination touristique majeure."},
{theme:"arts",focus:"allemagne",diff:"facile",type:"q",q:"Quel compositeur baroque allemand est l'auteur des Variations Goldberg et des Passions ?",a:"Johann Sebastian Bach (1685-1750)",detail:"Bach est considéré comme le sommet de la polyphonie baroque. Ses Passions selon saint Matthieu et saint Jean, ses cantates, ses Variations Goldberg et son Clavier bien tempéré constituent une encyclopédie musicale. Après sa mort, son œuvre fut redécouverte par Mendelssohn en 1829."},
{theme:"arts",focus:"allemagne",diff:"moyen",type:"q",q:"Quel mouvement artistique et pédagogique allemand, fondé en 1919 à Weimar, révolutionna le design moderne ?",a:"Le Bauhaus (Walter Gropius)",detail:"Le Bauhaus (« maison du bâtir ») fusionne arts et artisanat, forme et fonction. Sous Gropius, puis Meyer et Mies van der Rohe, il produit des meubles, affiches, textiles et bâtiments devenus classiques. Fermé par les nazis en 1933, ses maîtres émigrent et diffusent ses idées dans le monde entier."},
{theme:"arts",focus:"allemagne",diff:"moyen",type:"q",q:"Quel romancier allemand a écrit La Montagne magique et Les Buddenbrook, et a reçu le Nobel en 1929 ?",a:"Thomas Mann",detail:"Les Buddenbrook (1901) décrit le déclin d'une famille de marchands hanséatiques sur quatre générations. La Montagne magique (1924) se déroule dans un sanatorium suisse et explore les idées politiques et philosophiques européennes à la veille de 1914. Mann s'exile aux États-Unis en 1933."},
{theme:"arts",focus:"allemagne",diff:"difficile",type:"q",q:"Qu'est-ce que l'Expressionnisme allemand, et quels artistes en sont les figures majeures ?",a:"Courant du début du XXe s. privilégiant l'expression émotionnelle intense sur la représentation fidèle — Ernst Ludwig Kirchner, Emil Nolde, Max Beckmann",detail:"Le groupe Die Brücke (1905, Dresde) et Der Blaue Reiter (1911, Munich, avec Kandinsky) constituent les deux pôles de l'expressionnisme allemand. Couleurs violentes, formes déformées, angoisse existentielle. Les nazis l'interdiront comme « art dégénéré » (entartete Kunst) en 1937."},
{theme:"politique",focus:"allemagne",diff:"facile",type:"q",q:"Comment appelle-t-on la loi fondamentale de l'Allemagne, adoptée en 1949 ?",a:"Le Grundgesetz (Loi fondamentale)",detail:"Rédigé sous occupation alliée, le Grundgesetz instaure une démocratie parlementaire fédérale. Sa première phrase : « La dignité humaine est intangible. » Il contient une clause d'éternité (art. 79) interdisant de modifier certains principes fondamentaux — une réponse directe à l'utilisation légale du droit par Hitler."},
{theme:"politique",focus:"allemagne",diff:"moyen",type:"q",q:"Quel est le rôle du Bundesrat dans le système politique allemand ?",a:"Il représente les 16 Länder au niveau fédéral et co-légifère sur les lois affectant les États",detail:"Contrairement au Sénat français, les membres du Bundesrat sont des ministres des gouvernements des Länder (pas des élus directs). Ils peuvent bloquer les lois fédérales affectant les compétences régionales. Ce bicaméralisme reflète le fédéralisme coopératif allemand (Kooperativer Föderalismus)."},
{theme:"politique",focus:"allemagne",diff:"moyen",type:"q",q:"Qu'est-ce que le « modèle rhénan » ou « économie sociale de marché » (soziale Marktwirtschaft) ?",a:"Un capitalisme régulé associant libre marché et protections sociales fortes — codécision, syndicats puissants, État-providence",detail:"Théorisé par Ludwig Erhard après 1945, ce modèle donne aux syndicats un siège dans les conseils d'administration (Mitbestimmung). Il produit le Wirtschaftswunder (miracle économique) des années 1950-60. L'Allemagne reste la 3e économie mondiale et un modèle de concertation sociale."},
{theme:"politique",focus:"allemagne",diff:"difficile",type:"q",q:"Qu'est-ce que la « clause de défiance constructive » (konstruktives Misstrauensvotum) dans la Constitution allemande ?",a:"Le Parlement ne peut renverser le chancelier qu'en élisant simultanément son successeur",detail:"Cette règle, inscrite dans le Grundgesetz (art. 67), tire les leçons de l'instabilité de Weimar où les partis s'unissaient pour renverser des gouvernements sans pouvoir en former de nouveaux. Elle a été utilisée deux fois : en 1972 (échec) et en 1982 (succès, Kohl remplace Schmidt)."},
{theme:"philo",focus:"allemagne",diff:"moyen",type:"q",q:"Quel philosophe allemand a développé la dialectique historique et la notion d'« Aufhebung » (dépassement) ?",a:"Georg Wilhelm Friedrich Hegel",detail:"Dans la Phénoménologie de l'Esprit (1807), Hegel décrit comment l'Histoire progresse par dialectique : thèse → antithèse → synthèse (Aufhebung = dépassement qui conserve et dépasse à la fois). Marx renversera cette dialectique idéaliste en dialectique matérialiste."},
{theme:"philo",focus:"allemagne",diff:"moyen",type:"q",q:"Quelle œuvre de Nietzsche proclame la « mort de Dieu » et annonce le Surhomme ?",a:"Ainsi parlait Zarathoustra (1883-1885)",detail:"Nietzsche y annonce que les valeurs religieuses traditionnelles ont perdu leur force contraignante : « Dieu est mort, et c'est nous qui l'avons tué. » Le Zarathoustra prêche le Surhomme (Übermensch), celui qui crée ses propres valeurs. L'œuvre est écrite en aphorismes poétiques — unique en philosophie."},
{theme:"philo",focus:"allemagne",diff:"difficile",type:"q",q:"Qu'est-ce que la « banalité du mal » selon Hannah Arendt ?",a:"Le mal peut être accompli sans intention malveillante, par simple conformisme et absence de pensée critique — illustré par Eichmann",detail:"Lors du procès Eichmann à Jérusalem (1961), Arendt observe que ce bureaucrate nazi n'était pas un monstre mais un homme ordinaire incapable de se mettre à la place d'autrui. Dans Eichmann à Jérusalem (1963), elle forge ce concept qui scandalise : le mal extrême peut naître de la banalité."},
{theme:"sciences",focus:"allemagne",diff:"facile",type:"q",q:"Quel scientifique allemand a découvert les rayons X en 1895 ?",a:"Wilhelm Conrad Röntgen",detail:"En expérimentant avec des tubes cathodiques, Röntgen remarque qu'un écran fluorescent s'illumine à distance. La première radiographie de l'histoire est celle de la main de sa femme. Il reçoit le tout premier Prix Nobel de physique en 1901. Les rayons X sont appelés Röntgenstrahlen en allemand."},
{theme:"sciences",focus:"allemagne",diff:"moyen",type:"q",q:"Quel chimiste allemand a mis au point la synthèse de l'ammoniac, révolutionnant l'agriculture mondiale ?",a:"Fritz Haber (procédé Haber-Bosch, 1909)",detail:"La synthèse industrielle de l'ammoniac (à partir d'azote atmosphérique) a permis la production d'engrais azotés en masse. On estime qu'elle nourrit aujourd'hui la moitié de l'humanité. Mais Haber a aussi développé les gaz de combat en 1915 — figure tragique du savant au service de la guerre."},
{theme:"sciences",focus:"allemagne",diff:"difficile",type:"q",q:"Quelle position philosophique Abélard défend-il dans la querelle des universaux médiévale, entre réalisme et nominalisme ?",a:"Le débat sur la réalité des concepts généraux — Albertus Magnus et plus tard Leibniz y contribuent",detail:"Les universaux (« humanité », « rougeur ») sont-ils réels (réalisme), de simples mots (nominalisme) ou des concepts mentaux (conceptualisme) ? Leibniz développe une logique des concepts qui préfigure la logique moderne. Sa monadologie (1714) reste une tentative unique de concilier métaphysique et mathématiques."},
{theme:"economie",diff:"facile",type:"q",q:"Qu'est-ce que le taux de chômage et comment est-il mesuré selon la définition du BIT ?",a:"Part des actifs sans emploi, disponibles et en recherche d'emploi — mesuré par enquête (pas les inscrits à Pôle emploi)",detail:"Le Bureau international du Travail définit le chômeur comme une personne sans emploi, disponible dans les 15 jours et ayant effectué une démarche de recherche dans le mois. Cette définition exclut le 'halo du chômage' (découragés, travailleurs à temps partiel subi). Le taux de chômage en zone euro tourne autour de 6 % en 2024."},
{theme:"economie",diff:"facile",type:"d",q:"Concept désignant la somme que les consommateurs sont prêts à payer au-delà du prix effectivement payé",a:"Le surplus du consommateur",detail:"Si vous êtes prêt à payer 50 € pour un livre mais ne payez que 20 €, votre surplus est 30 €. Ce concept de Marshall mesure le bien-être tiré d'un marché. Les monopoles et les taxes réduisent ce surplus."},
{theme:"economie",diff:"facile",type:"q",q:"Qu'est-ce que la balance commerciale d'un pays et comment la distingue-t-on de la balance des paiements ?",a:"La balance commerciale mesure les exportations moins les importations de biens ; la balance des paiements inclut aussi les services, les revenus et les flux financiers",detail:"Un excédent commercial signifie qu'un pays exporte plus qu'il n'importe (Allemagne, Chine). Un déficit commercial (États-Unis, France) peut être financé par des entrées de capitaux. La balance des paiements est toujours équilibrée comptablement."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que le paradoxe de Condorcet et pourquoi remet-il en cause la notion de volonté générale ?",a:"Même si chaque individu a des préférences cohérentes, leur agrégation collective peut produire des cycles sans vainqueur stable — Arrow généralise ce résultat",detail:"Condorcet (1785) montre que si A bat B, B bat C, et C bat A en vote à la majorité, il n'existe pas de choix collectif cohérent. Arrow (Prix Nobel 1972) généralise : aucun système de vote ne peut simultanément satisfaire cinq critères d'équité raisonnables."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la théorie de la valeur-travail chez Marx et en quoi diffère-t-elle de la théorie néoclassique de la valeur ?",a:"Marx : la valeur d'une marchandise est déterminée par le temps de travail socialement nécessaire à sa production — les néoclassiques la tirent de l'utilité marginale subjective",detail:"Pour Marx, le travail est la seule source de valeur. La plus-value naît de l'écart entre la valeur produite par l'ouvrier et le salaire versé. Les marginalistes (Jevons, Menger, Walras, 1870s) renversent cette logique : la valeur vient de la rareté et de l'utilité subjective — ce qui explique le paradoxe de l'eau et du diamant."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que le modèle Heckscher-Ohlin et que prédit-il sur les échanges internationaux ?",a:"Un pays exporte les biens utilisant intensément son facteur de production abondant (travail ou capital) — complète Ricardo en expliquant pourquoi les dotations factorielles orientent le commerce",detail:"Eli Heckscher (1919) et Bertil Ohlin (Nobel 1977) : les États-Unis, riches en capital, exportent des biens capitalistiques ; les pays en développement, riches en travail peu qualifié, exportent des biens à forte intensité de main-d'œuvre. Le paradoxe de Leontief (1953) contredit empiriquement ce modèle pour les USA."},
{theme:"economie",diff:"moyen",type:"d",q:"Situation où une entreprise, en fixant son prix, tient compte de la réaction probable de ses concurrents",a:"L'interdépendance oligopolistique (comportement stratégique)",detail:"Dans un oligopole (peu d'acteurs), chaque décision de prix ou de quantité affecte les autres. La théorie des jeux (Nash) modélise ces interactions. Le modèle de Cournot (quantités) et celui de Bertrand (prix) aboutissent à des équilibres très différents."},
{theme:"economie",diff:"difficile",type:"q",q:"Qu'est-ce que le théorème d'impossibilité d'Arrow (1951) et quelles en sont les cinq conditions ?",a:"Il est impossible de construire une fonction de bien-être social qui respecte simultanément l'unanimité, l'indépendance des alternatives non pertinentes, la transitivité, la non-dictature et le domaine universel",detail:"Kenneth Arrow (Nobel 1972) prouve mathématiquement qu'aucun système de vote démocratique ne peut satisfaire ces cinq conditions simultanément. La seule façon d'y satisfaire toutes est d'avoir un dictateur. Ce résultat bouleverse la théorie du choix social et fonde un vaste programme de recherche."},
{theme:"economie",diff:"difficile",type:"q",q:"Qu'est-ce que la loi de Goodhart et comment s'applique-t-elle aux politiques économiques ?",a:"Quand une mesure devient un objectif, elle cesse d'être une bonne mesure — les agents modifient leur comportement en réponse à la politique",detail:"Charles Goodhart (1975) formule ce principe en contexte de politique monétaire : dès que la banque centrale cible un agrégat monétaire (M3), les banques créent de nouveaux instruments qui y échappent. La loi de Goodhart explique les échecs de nombreuses politiques — objectifs scolaires, quotas hospitaliers, métriques de gestion."},
{theme:"economie",focus:"allemagne",diff:"facile",type:"q",q:"Qu'est-ce que le « Wirtschaftswunder » (miracle économique) allemand ?",a:"La reconstruction économique spectaculaire de l'Allemagne de l'Ouest dans les années 1950-60",detail:"Sous la direction de Ludwig Erhard et grâce au plan Marshall, la RFA connaît une croissance de ~8 %/an. L'industrie automobile (VW, Mercedes, BMW), chimique et mécanique se développent. La DM (Deutsche Mark) devient un symbole de stabilité. L'Allemagne dépasse la France et la Grande-Bretagne en quelques décennies."},
{theme:"economie",focus:"allemagne",diff:"moyen",type:"q",q:"Pourquoi l'Allemagne est-elle obsédée par la stabilité des prix et l'orthodoxie budgétaire ?",a:"Traumatisme de l'hyperinflation de 1923 qui avait détruit l'épargne et déstabilisé la République de Weimar",detail:"En novembre 1923, 1 dollar vaut 4 200 milliards de marks. Les épargnants sont ruinés, le système économique s'effondre. Ce traumatisme collectif explique l'attachement allemand à la Bundesbank indépendante, à la rigueur budgétaire (Schwarze Null — zéro déficit) et les réticences face à la BCE accommodante."},
{theme:"economie",focus:"allemagne",diff:"difficile",type:"q",q:"Qu'est-ce que la Mitbestimmung (cogestion) dans les entreprises allemandes ?",a:"L'obligation légale pour les grandes entreprises d'intégrer des représentants des salariés dans leur conseil de surveillance",detail:"La loi de 1976 impose que 50 % des sièges du Aufsichtsrat (conseil de surveillance) soient occupés par des représentants des employés dans les entreprises de plus de 2 000 salariés. Ce modèle de cogestion est cité comme facteur de paix sociale, d'investissement long terme et de compétitivité industrielle allemande."},
{theme:"litterature",diff:"facile",type:"q",q:"Quel roman de Victor Hugo (1831) met en scène Quasimodo et Esmeralda dans le Paris du XVe siècle ?",a:"Notre-Dame de Paris",detail:"Hugo écrit ce roman en partie pour alerter l'opinion sur la dégradation des cathédrales gothiques. Frollo, Quasimodo, Esmeralda forment un triangle tragique. Le roman déclenche un mouvement de restauration du patrimoine médiéval. Viollet-le-Duc restaurera Notre-Dame à partir de 1844."},
{theme:"litterature",diff:"facile",type:"d",q:"Genre narratif bref qui illustre une vérité morale par un récit allégorique, souvent avec des animaux",a:"La fable",detail:"Ésope (VIe s. av. J.-C.) pose les fondements du genre ; La Fontaine les porte à leur sommet en français (1668-1694). La fable use d'animaux comme miroir des vices humains pour enseigner sans heurter."},
{theme:"litterature",diff:"facile",type:"q",q:"Quel roman de Gustave Flaubert (1857) raconte l'adultère et la désillusion d'Emma Bovary dans la province normande ?",a:"Madame Bovary",detail:"Flaubert est poursuivi en justice pour 'outrage à la morale publique' mais acquitté. Madame Bovary, élevée aux romans sentimentaux, confond rêve et réalité ; son ennui provincial (le 'bovarysme') mène à sa ruine. Flaubert inaugure le réalisme psychologique et le style indirect libre."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel poète américain, auteur de La Terre vaine (1922), révolutionne la poésie moderniste et reçoit le Prix Nobel en 1948 ?",a:"T.S. Eliot (1888-1965)",detail:"La Terre vaine (The Waste Land) est un poème fragmenté de 434 vers mêlant langues, cultures et mythes pour exprimer le désarroi de l'après-guerre. Eliot transforme la poésie en collage savant. Il recevra le Nobel en 1948 et exercera une influence considérable sur la littérature du XXe siècle."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel romancier français, auteur de Bel-Ami (1885), est avec Flaubert le maître de la nouvelle réaliste et naturaliste ?",a:"Guy de Maupassant (1850-1893)",detail:"Disciple de Flaubert et ami de Zola, Maupassant écrit plus de 300 nouvelles en dix ans (Boule de Suif, La Parure, Le Horla) avant de sombrer dans la folie. Bel-Ami retrace l'ascension cynique d'un journaliste séducteur dans la presse parisienne — critique acérée du monde des médias."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel romancier américain, auteur de Gatsby le Magnifique (1925), capture l'illusion du rêve américain dans les années folles ?",a:"F. Scott Fitzgerald (1896-1940)",detail:"Gatsby le Magnifique dépeint la fascination et la corruption de la richesse dans le Long Island des années 1920. Nick Carraway observe Gatsby qui reconstruit sa vie autour d'un amour perdu, Daisy. Le roman est une méditation sur l'impossibilité de revivre le passé et la désillusion du rêve américain."},
{theme:"litterature",diff:"moyen",type:"d",q:"Procédé littéraire consistant à raconter une histoire dans une chronologie non linéaire, avec retours en arrière",a:"L'analepse (ou flashback)",detail:"L'analepse (du grec ana, en arrière) désigne tout retour narratif dans le temps. À l'opposé, la prolepse anticipe des événements futurs. Proust, Faulkner et la Nouvelle Vague en font un usage systématique pour révéler le passé par bribes."},
{theme:"litterature",diff:"difficile",type:"q",q:"Quel écrivain brésilien, auteur de Dom Casmurro (1899), est le père du modernisme littéraire brésilien et explore avec ironie l'ambiguïté et la jalousie ?",a:"Machado de Assis (1839-1908)",detail:"Fils d'esclaves affranchi, Machado de Assis fonde l'Académie brésilienne des Lettres. Ses romans (Mémoires posthumes de Brás Cubas, Dom Casmurro) sont narrés par des narrateurs peu fiables, ironiques, conscients de leur propre fiction. Dom Casmurro pose une question irrésolue : Capitu a-t-elle trahi ? Harold Bloom le classe parmi les génies de la littérature mondiale."},
{theme:"litterature",diff:"difficile",type:"q",q:"Quel auteur polonais, Prix Nobel 1996, est considéré comme l'une des plus grandes poètes du XXe siècle, connue pour sa brièveté et son ironie philosophique ?",a:"Wisława Szymborska (1923-2012)",detail:"Szymborska publie peu (environ 350 poèmes en soixante ans) mais chaque texte est ciselé avec précision. Elle traite des grandes questions — la mort, le hasard, l'histoire — avec légèreté et humour. Son discours Nobel ('Inspiration') célèbre la curiosité et le 'je ne sais pas' comme moteur de la création."},
{theme:"litterature",focus:"allemagne",diff:"facile",type:"q",q:"Quel poète et écrivain allemand est l'auteur de Faust et de Les Souffrances du jeune Werther ?",a:"Johann Wolfgang von Goethe (1749-1832)",detail:"Werther (1774), roman épistolaire sur un amour impossible menant au suicide, déclenche une vague de suicides en Europe (le « syndrome Werther »). Faust (1808-1832), son chef-d'œuvre, explore le pacte avec le diable, la quête du savoir et la condition humaine."},
{theme:"litterature",focus:"allemagne",diff:"moyen",type:"q",q:"Quel écrivain allemand, auteur du Tambour et du Chat et la Souris, a reçu le Prix Nobel en 1999 ?",a:"Günter Grass",detail:"Le Tambour (1959), premier volume de la Trilogie de Dantzig, narre la Seconde Guerre mondiale du point de vue d'Oskar, un enfant qui décide de ne plus grandir. Grass, longtemps voix morale de l'Allemagne contre le nazisme, avouera en 2006 avoir été membre des Waffen-SS à 17 ans."},
{theme:"litterature",focus:"allemagne",diff:"difficile",type:"q",q:"Qu'est-ce que le Sturm und Drang, et quels auteurs en sont les figures principales ?",a:"Mouvement littéraire allemand des années 1760-1780 célébrant l'émotion, la nature et la rébellion contre les règles classiques — Goethe, Schiller, Herder",detail:"Le Sturm und Drang (« Tempête et Élan ») préfigure le romantisme : culte du génie individuel, nature comme miroir de l'âme, rejection de la raison des Lumières. Les Brigands de Schiller (1781) et Werther de Goethe en sont les œuvres emblématiques."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel film de Steven Spielberg (1975) sur un requin tueur inventa le concept de 'blockbuster' hollywoodien ?",a:"Les Dents de la mer (Jaws)",detail:"Jaws est le premier film à atteindre 100 millions de dollars de recettes, lançant l'ère du blockbuster estival. Spielberg tourne avec un requin mécanique défaillant (surnommé 'Bruce'), ce qui l'oblige à le montrer le moins possible — ce qui renforce le suspense. Cinq décennies après, sa bande-son (John Williams) reste iconique."},
{theme:"popculture",diff:"facile",type:"q",q:"Dans quelle franchise de films de super-héros trouve-t-on Iron Man, Captain America et les Avengers ?",a:"Le Marvel Cinematic Universe (MCU)",detail:"Lancé en 2008 avec Iron Man, le MCU est le plus grand succès commercial de l'histoire du cinéma — plus de 30 milliards de dollars de recettes mondiales. Avengers: Endgame (2019) est le 2e film le plus rentable de l'histoire. Kevin Feige en est le producteur depuis l'origine."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel film d'animation Pixar (1994) met en scène des jouets qui s'animent en l'absence de leur propriétaire ?",a:"Toy Story",detail:"Premier long métrage entièrement réalisé en images de synthèse, Toy Story révolutionne l'animation. Il lance une franchise de 4 films et inspire une génération de cinéastes. La voix de Woody est assurée par Tom Hanks, celle de Buzz par Tim Allen."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel film de James Cameron (1997) est longtemps resté le plus grand succès commercial de l'histoire du cinéma ?",a:"Titanic",detail:"Titanic (1997) accumule 2,2 milliards de dollars de recettes (record battu par Avatar du même Cameron en 2010). Le film remporte 11 Oscars. Leonardo DiCaprio et Kate Winslet deviennent des stars mondiales. La chanson My Heart Will Go On de Céline Dion reste l'une des plus diffusées de l'ère moderne."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel réalisateur japonais, auteur de Chihiro (2001), Princesse Mononoké et Le Voyage de Chihiro, dirige le Studio Ghibli ?",a:"Hayao Miyazaki (né en 1941)",detail:"Le Voyage de Chihiro reste le plus grand succès du cinéma japonais (2001) et le premier film non anglophone à remporter l'Oscar du meilleur film d'animation. Miyazaki est célèbre pour ses thèmes écologiques et féministes, ses héroïnes autonomes et ses mondes visuellement somptueux."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel cinéaste coréen remporte la Palme d'or à Cannes et l'Oscar du meilleur film en 2020 avec Parasite ?",a:"Bong Joon-ho (né en 1969)",detail:"Parasite est le premier film non anglophone à remporter l'Oscar du meilleur film. Satire acérée des inégalités sociales, il raconte la manipulation d'une famille riche par une famille pauvre. Bong Joon-ho avait déjà signé Memories of Murder, The Host et Snowpiercer — adapté en série Netflix."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quelle saga cinématographique inspirée d'un roman de J.R.R. Tolkien a remporté 11 Oscars dont celui du meilleur film en 2004 ?",a:"Le Seigneur des Anneaux : Le Retour du Roi (Peter Jackson, 2003)",detail:"La trilogie de Peter Jackson (2001-2003) est une prouesse technique et narrative. Le Retour du Roi remporte tous les Oscars pour lesquels il est nommé (11), record partagé avec Ben-Hur et Titanic. Tournée en Nouvelle-Zélande, la saga a transformé le tourisme du pays."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel film de Christopher Nolan (2010) explore les rêves dans des rêves et est devenu un phénomène culturel mondial ?",a:"Inception",detail:"Inception met en scène Dom Cobb (Leonardo DiCaprio), voleur qui s'infiltre dans les rêves pour extraire des informations. Le film questionne la nature de la réalité et se termine sur une toupie dont on ne sait si elle tombe. Sa musique (Hans Zimmer) et ses effets visuels (l'hôtel en apesanteur) restent des références."},
{theme:"popculture",diff:"difficile",type:"q",q:"Quel film de Stanley Kubrick (1968), adapté d'Arthur C. Clarke, est considéré comme l'un des chefs-d'œuvre absolus du cinéma de science-fiction ?",a:"2001 : L'Odyssée de l'espace",detail:"Sans presque aucun dialogue, Kubrick représente l'évolution de l'humanité de la préhistoire à la rencontre avec une intelligence extraterrestre. Le monolithe noir, HAL 9000 et la séquence psychédélique finale sont entrés dans la mémoire collective. Le film préfigure l'IA, la solitude spatiale et le transhumanisme."},
{theme:"popculture",diff:"facile",type:"q",q:"Dans quelle série fantastique HBO (2011-2019), adaptée des romans de George R.R. Martin, des familles nobles se disputent le Trône de Fer ?",a:"Game of Thrones",detail:"Game of Thrones est la série la plus piratée de l'histoire et la plus récompensée aux Emmy Awards. La série est connue pour tuer ses personnages principaux sans prévenir, brisant les codes narratifs habituels. La saison finale (2019) a été vivement critiquée pour sa rapidité d'exécution."},
{theme:"popculture",diff:"facile",type:"q",q:"Quelle série américaine (2008-2013) sur un professeur de chimie qui devient dealer de drogue est considérée comme l'une des meilleures séries de l'histoire ?",a:"Breaking Bad",detail:"Walter White (Bryan Cranston), professeur de chimie atteint d'un cancer, fabrique de la méthamphétamine avec son ancien élève Jesse Pinkman. La série explore la transformation morale d'un homme ordinaire. Sa suite Better Call Saul (2015-2022) est aussi unanimement saluée."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quelle série sud-coréenne Netflix (2021) mettant en scène des jeux mortels est devenue la plus regardée de l'histoire de la plateforme ?",a:"Squid Game (오징어 게임)",detail:"Squid Game, réalisée par Hwang Dong-hyuk, accumule 1,65 milliard d'heures de visionnage en 28 jours. Elle propulse les contenus coréens sur la scène mondiale et incite Netflix à massifier ses investissements en Corée. La saison 2 (2024) a été tout aussi regardée."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quelle série britannique (1995-2005) a lancé les carrières de Ricky Gervais et Stephen Merchant, inspirant une version américaine devenue culte ?",a:"The Office (BBC)",detail:"The Office (BBC) est un faux documentaire sur la vie d'un bureau à Slough, dirigé par le pathétique David Brent (Gervais). La version américaine (NBC, 2005-2013), avec Steve Carell, dépasse l'originale en popularité et reste l'une des comédies les plus regardées sur Netflix."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quelle série d'animation américaine (1989-...) suit la famille Simpson et est la plus longue série animée de l'histoire de la télévision ?",a:"Les Simpson (The Simpsons)",detail:"Créée par Matt Groening, Les Simpson a dépassé 750 épisodes. Homer, Marge, Bart, Lisa et Maggie Simpson vivent à Springfield, ville fictive. La série est célèbre pour ses prédictions (Trump président, la série perd 10 000€ à chaque vrai événement qu'elle aurait 'prédit' — c'est un mythe statistique)."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel groupe britannique, formé à Liverpool, est considéré comme le plus influent de l'histoire de la musique pop ?",a:"Les Beatles (1960-1970)",detail:"John Lennon, Paul McCartney, George Harrison et Ringo Starr ont vendu plus de 600 millions d'albums. Leur débarquement aux États-Unis en 1964 ('Beatlemania') transforme la culture mondiale. Sgt. Pepper's Lonely Hearts Club Band (1967) est souvent cité comme le meilleur album de l'histoire."},
{theme:"popculture",diff:"facile",type:"q",q:"Quelle chanteuse américaine, connue pour ses albums Red, 1989 et Folklore, est en 2024 la musicienne la plus riche et la plus streamée au monde ?",a:"Taylor Swift (née en 1989)",detail:"Taylor Swift's Eras Tour (2023-2024) est la tournée musicale ayant généré le plus de revenus de l'histoire, dépassant le milliard de dollars. Elle est la première artiste à avoir cinq albums en simultané dans le Billboard 200. Son influence sur la culture pop, la mode et même la politique est immense."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel chanteur jamaïcain, figure mondiale du reggae, a popularisé ce genre et est décédé en 1981 à 36 ans ?",a:"Bob Marley (1945-1981)",detail:"Bob Marley and the Wailers ont fait connaître le reggae et le mouvement rastafari au monde entier. Legend (1984), album posthume, est l'un des plus vendus de l'histoire. Ses chansons (No Woman No Cry, Redemption Song, One Love) restent des hymnes à la paix et à la résistance."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel album de Nirvana (1991) a popularisé le grunge et révolutionné la musique rock avec des titres comme Smells Like Teen Spirit ?",a:"Nevermind",detail:"Nevermind propulse Nirvana (Kurt Cobain, Krist Novoselic, Dave Grohl) de l'underground au sommet des charts mondiaux, détrônant Michael Jackson. Smells Like Teen Spirit devient l'hymne d'une génération. La mort de Kurt Cobain en 1994 met fin au groupe et fait de lui une figure du 'Club des 27'."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel rappeur américain, auteur de The Marshall Mathers LP et 8 Mile, est considéré comme l'un des artistes les plus vendus de l'histoire ?",a:"Eminem (Marshall Mathers, né en 1972)",detail:"Eminem est le rappeur blanc le plus vendu de l'histoire et l'artiste musical le plus vendu des années 2000. Ses textes autobiographiques, sa technique de flow et sa controverse permanente en font une figure centrale du hip-hop. 8 Mile (2002) lui vaut un Oscar pour la chanson Lose Yourself."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel duo français de musique électronique, formé par Thomas Bangalter et Guy-Manuel de Homem-Christo, a popularisé la French Touch dans les années 2000 ?",a:"Daft Punk (1993-2021)",detail:"Discovery (2001) avec Get Lucky et Around the World ; Random Access Memories (2013) avec Get Lucky remporte 5 Grammy. Les deux membres gardent l'anonymat derrière leurs casques robots. Leur séparation est annoncée par une courte vidéo appelée 'Epilogue' en 2021."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel artiste colombien, auteur de Hips Don't Lie et Waka Waka (hymne de la Coupe du monde 2010), est l'une des artistes latines les plus vendues de l'histoire ?",a:"Shakira (née en 1977)",detail:"Shakira Isabel Mebarak Ripoll mêle pop, rock, dancehall et musiques latines. Waka Waka (This Time for Africa) reste l'hymne de Coupe du monde le plus écouté. En 2023, sa chanson avec Bizarrap (#53) bat des records de streams mondiaux, réponse musicale à sa séparation de Gérard Piqué."},
{theme:"popculture",diff:"difficile",type:"q",q:"Quelle chanteuse islandaise, connue pour ses œuvres mêlant art sonore et performance visuelle comme Homogenic et Vespertine, est considérée comme l'une des artistes les plus avant-gardistes du XXe siècle ?",a:"Björk (née en 1965)",detail:"Björk Guðmundsdóttir commence avec The Sugarcubes avant une carrière solo révolutionnaire. Ses albums (Debut, Post, Homogenic, Vespertine) mêlent musique électronique, orchestrale et expérimentale. Sa robe-cygne aux Oscars 2001 est l'un des moments de mode les plus mémorables de l'histoire."},
{theme:"popculture",diff:"facile",type:"q",q:"Quelle franchise de jeux vidéo de Nintendo, née en 1985, met en scène un plombier moustachu qui affronte un roi tortue pour sauver une princesse ?",a:"Super Mario (Nintendo)",detail:"Super Mario Bros (1985) est l'un des jeux vidéo les plus vendus de l'histoire. La franchise dépasse le milliard d'exemplaires vendus toutes plateformes confondues. Mario est la mascotte de Nintendo et la figure la plus reconnaissable du jeu vidéo mondial."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel jeu de battle royale, sorti gratuitement en 2017, est devenu le jeu vidéo le plus joué au monde avec plus de 350 millions de joueurs inscrits ?",a:"Fortnite (Epic Games)",detail:"Fortnite combine construction, tir et survie dans des parties de 100 joueurs. Son modèle free-to-play financé par les cosmétiques (skins) a révolutionné l'économie du jeu vidéo. Des concerts virtuels (Travis Scott, Ariana Grande) ont réuni des dizaines de millions de spectateurs dans le jeu."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quelle franchise de jeux vidéo de Rockstar Games, permettant d'évoluer librement dans des villes ouvertes inspirées de Miami, Los Angeles et New York, est l'une des plus vendues de l'histoire ?",a:"Grand Theft Auto (GTA)",detail:"GTA V (2013) s'est vendu à plus de 195 millions d'exemplaires — 2e jeu le plus vendu de tous les temps. GTA VI est annoncé pour 2025. La série est controversée pour sa violence et son contenu adulte, mais reste une référence technique et narrative."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quelle franchise de jeux de rôle japonais, créée par Nintendo, met en scène un elfe vert nommé Link qui sauve la princesse Zelda de Ganon dans le royaume d'Hyrule ?",a:"The Legend of Zelda (Nintendo, 1986-...)",detail:"Ocarina of Time (1998) est souvent cité comme le plus grand jeu vidéo de l'histoire. Breath of the Wild (2017) révolutionne le genre open world. La franchise a vendu plus de 125 millions d'exemplaires. Son gameplay, sa musique (Koji Kondo) et son univers ont influencé une génération entière de game designers."},
{theme:"popculture",diff:"difficile",type:"q",q:"Quel jeu vidéo indépendant de 2015, créé par Toby Fox seul, a marqué la culture geek par son refus de la violence, ses méta-références et sa communauté passionnée ?",a:"Undertale",detail:"Undertale permet de terminer l'aventure sans tuer aucun ennemi. Le jeu brise régulièrement le quatrième mur et récompense la bienveillance. Développé en 30 mois par un seul développeur pour 51 000 dollars de budget, il est devenu une référence sur Steam et a engendré l'une des fandoms les plus actives d'internet."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel manga de Masashi Kishimoto, mettant en scène un jeune ninja roux aux rêves de grandeur, a été l'un des plus lus au monde avec plus de 250 millions d'exemplaires ?",a:"Naruto (1999-2014)",detail:"Naruto Uzumaki, rejeté de son village, rêve de devenir Hokage (chef ninja). Sa suite Boruto continue l'histoire. Naruto a été diffusé dans plus de 70 pays. Il est l'une des trois grandes séries du manga shōnen des années 2000 avec One Piece et Bleach."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel manga d'Eiichiro Oda, commencé en 1997, est le manga le plus vendu de l'histoire avec plus de 500 millions d'exemplaires ?",a:"One Piece",detail:"One Piece suit Monkey D. Luffy, un garçon élastique qui veut devenir Roi des Pirates. Après plus de 1 100 chapitres, l'œuvre n'est pas encore terminée. Son anime et ses produits dérivés en font l'une des licences les plus lucratives au monde."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel manga de Hajime Isayama (2009-2021) met en scène des géants mangeant les humains, contraints de vivre derrière des murailles, et a connu un succès mondial phénoménal ?",a:"L'Attaque des Titans (Shingeki no Kyojin)",detail:"L'Attaque des Titans a vendu plus de 110 millions d'exemplaires. Son monde post-apocalyptique et sa narration complexe (avec des retournements majeurs) en font un jalon du manga contemporain. L'adaptation animée par MAPPA est unanimement saluée pour sa qualité d'animation."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quelle bande dessinée belge de Hergé, dont le premier album date de 1929, est l'une des séries les plus lues au monde avec plus de 230 millions d'albums vendus ?",a:"Les Aventures de Tintin",detail:"Tintin, jeune reporter accompagné de son chien Milou et du capitaine Haddock, voyage dans le monde entier. Hergé (Georges Remi) développe un style graphique dit 'ligne claire', très influent. Le Lotus bleu (1936) marque le tournant vers des albums plus réalistes et engagés politiquement."},
{theme:"popculture",diff:"difficile",type:"q",q:"Quel manga de Kentaro Miura (1989-2021), inachevé à la mort de son auteur, est souvent cité comme le chef-d'œuvre du dark fantasy en manga par sa complexité narrative et visuelle ?",a:"Berserk",detail:"Berserk suit Guts, mercenaire dans un monde sombre médiéval-fantastique inspiré de l'Europe médiévale. Miura meurt en 2021 avant d'achever l'œuvre ; ses assistants continuent la publication. La série est connue pour la densité de ses planches, la profondeur psychologique de ses personnages et sa violence."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel couturier français, mort en 2019, a créé la maison Karl Lagerfeld et a été le directeur artistique de Chanel pendant plus de 36 ans, transformant la mode mondiale ?",a:"Karl Lagerfeld (1933-2019)",detail:"Lagerfeld prend la direction de Chanel en 1983 et revitalise complètement la maison. Il dirige simultanément Fendi et sa propre marque. Connu pour ses lunettes noires, son catogan blanc et ses déclarations provocatrices, il est l'une des figures les plus influentes et polarisantes de la mode du XXe siècle."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel artiste britannique, figure majeure du mouvement Young British Artists, est connu pour ses œuvres mettant en scène des animaux dans du formaldéhyde et une crâne ornée de diamants ?",a:"Damien Hirst (né en 1965)",detail:"For the Love of God (2007) — un crâne humain serti de 8 601 diamants — est vendu 100 millions de dollars. The Physical Impossibility of Death in the Mind of Someone Living (requin dans du formaldéhyde, 1991) a rendu Hirst célèbre. Il est l'artiste vivant le plus riche du monde."},
{theme:"popculture",diff:"difficile",type:"q",q:"Quel artiste américain, figure du Pop Art, est connu pour ses sérigraphies de Marilyn Monroe, de boîtes de soupe Campbell et de Mao Tsé-Toung ?",a:"Andy Warhol (1928-1987)",detail:"Andy Warhol transforme la consommation de masse en art. Sa Factory new-yorkaise est le centre d'une contre-culture mêlant art, cinéma underground et musique (il produit The Velvet Underground). Sa phrase '15 minutes of fame' préfigure la culture des réseaux sociaux. Il meurt des suites d'une opération en 1987."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel réseau social, fondé par Mark Zuckerberg à Harvard en 2004, compte plus de 3 milliards d'utilisateurs actifs en 2024 ?",a:"Facebook (Meta)",detail:"Facebook part d'une application universitaire (FaceMash) avant de devenir le plus grand réseau social de l'histoire. Rebaptisé Meta en 2021, le groupe possède aussi Instagram et WhatsApp. Le film The Social Network (2010) de David Fincher retrace sa fondation controversée."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel service de streaming vidéo, lancé en 1997 par Reed Hastings, a révolutionné la façon de consommer films et séries et compte plus de 260 millions d'abonnés ?",a:"Netflix",detail:"Netflix passe de la location de DVD par courrier au streaming en 2007. Dès 2013, il produit ses propres contenus (House of Cards). Il popularise le binge-watching (regarder plusieurs épisodes d'affilée) et révolutionne l'industrie télévisuelle mondiale. Son modèle est copié par Disney+, Amazon Prime et Apple TV+."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel réseau social de partage de vidéos courtes, lancé en Chine par ByteDance en 2016, est devenu la plateforme de divertissement la plus téléchargée au monde malgré des controverses sur la sécurité des données ?",a:"TikTok (抖音, Douyin en Chine)",detail:"TikTok comptait 1,7 milliard d'utilisateurs actifs en 2024. Ses algorithmes de recommandation sont les plus efficaces du marché. Plusieurs gouvernements (USA, Europe) envisagent de l'interdire pour des raisons de sécurité nationale. Le 'Tiktok brain' — réduction des capacités d'attention — fait l'objet d'études."},
{theme:"popculture",diff:"moyen",type:"q",q:"Qu'est-ce qu'un mème internet et quel site américain fondé en 2005 est souvent surnommé 'le premier page d'internet' pour sa culture de l'humour et des mèmes ?",a:"Un mème = unité culturelle virale reproduite et modifiée ; Reddit est l'un des principaux incubateurs de mèmes avec 4chan",detail:"Le terme 'mème' est inventé par Richard Dawkins (1976) pour désigner toute unité d'information culturelle qui se propage par imitation. Internet l'a transformé en format humoristique (image + texte). Reddit (fondé en 2005) et 4chan (2003) sont des incubateurs majeurs de culture internet."},
{theme:"popculture",diff:"difficile",type:"q",q:"Qu'est-ce que le 'metaverse' et quelle entreprise a mis sa réputation en jeu en 2021 pour se recentrer sur ce concept de réalité virtuelle sociale ?",a:"Le metaverse = espace virtuel persistant où les avatars des utilisateurs se rencontrent, travaillent et divertissent — Meta (Facebook) a rebaptisé sa société pour cette vision",detail:"Mark Zuckerberg annonce le pivot de Facebook vers le metaverse en octobre 2021 en rebaptisant la société Meta. L'investissement dépasse 10 milliards de dollars par an dans Horizon Worlds, son application sociale en réalité virtuelle. Le metaverse peine à convaincre le grand public. Ready Player One (Spielberg, 2018) en popularise la notion."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel footballeur brésilien, surnommé 'O Rei' (Le Roi), est l'unique joueur à avoir remporté trois Coupes du monde (1958, 1962, 1970) ?",a:"Pelé (Edson Arantes do Nascimento, 1940-2022)",detail:"Pelé signe à 15 ans avec Santos, marque plus de 1 000 buts en carrière officielle et est ambassadeur de la FIFA à vie. Ses duels avec Garrincha, Di Stéfano et Cruyff définissent une époque. Sa mort en décembre 2022 provoque un deuil mondial. Il reste le symbole absolu du football."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel athlète américain, sprinteur, est le seul à avoir remporté le double 100m-200m à trois Jeux olympiques consécutifs (2008, 2012, 2016) ?",a:"Usain Bolt (né en 1986, Jamaïque)",detail:"Usain Bolt détient les records du monde du 100m (9'58'') et du 200m (19'19''). Sa célébration 'Lightning Bolt' est l'une des images iconiques du sport mondial. Sa personnalité expansive et son charisme en font l'athlète le plus populaire de sa génération."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quelle compétition sportive internationale, créée en 1892 et organisée tous les quatre ans, réunit 200 pays et reste l'événement le plus regardé de l'histoire de la télévision ?",a:"La Coupe du monde de football (FIFA World Cup)",detail:"La Coupe du monde 2022 au Qatar totalise 5 milliards de téléspectateurs cumulés. La finale Argentine-France (3-3, Argentina aux tirs au but) est considérée comme la plus grande finale de l'histoire. Messi (et la France de Mbappé) font 3 buts en finale — record. L'édition 2026 se tiendra aux États-Unis, Mexique et Canada."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quelle tenniswoman américaine, avec 23 titres du Grand Chelem en simple, est considérée comme la plus grande joueuse de l'histoire du tennis ?",a:"Serena Williams (née en 1981)",detail:"Serena Williams remporte son premier titre du Grand Chelem à 17 ans (US Open 1999) et son dernier à 35 ans (Australian Open 2017, enceinte). Sa puissance physique, son mental et sa longévité redéfinissent le tennis féminin. Elle annonce sa retraite en 2022 après l'US Open."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel guide gastronomique français, publié depuis 1900, distribue des étoiles aux meilleurs restaurants du monde et est la référence absolue en haute gastronomie ?",a:"Le Guide Michelin",detail:"André et Édouard Michelin créent le guide en 1900 pour encourager les automobilistes à voyager. Les étoiles (1 à 3) sont attribuées anonymement par des inspecteurs professionnels. Trois étoiles signifient 'vaut le voyage'. Le guide couvre aujourd'hui 40 pays. Certains chefs rendent leurs étoiles pour fuir la pression."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel chef espagnol, patron du restaurant El Bulli (fermé en 2011), est le pionnier de la 'cuisine moléculaire' et figure régulièrement en tête des classements des meilleurs chefs mondiaux ?",a:"Ferran Adrià (né en 1962)",detail:"El Bulli (Roses, Catalogne) est élu meilleur restaurant du monde cinq fois consécutives. Adrià invente des techniques comme la sphérification (petites sphères de liquide gélifiées) et les airs (mousses légères). Il transforme la gastronomie en art conceptuel. Son influence sur la cuisine contemporaine est comparable à celle de Picasso sur la peinture."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel phénomène de téléréalité, lancé en Hollande en 1999 et diffusé dans plus de 70 pays, enferme des inconnus ensemble et les élimine par vote ?",a:"Big Brother (Pays-Bas, 1999)",detail:"Créé par John de Mol, Big Brother inspire une déferlante de téléréalité mondiale. Survivor, The Voice, The X Factor et toute la téléréalité contemporaine héritent de son concept. Le nom 'Big Brother' vient d'Orwell (1984). Il a transformé la façon dont la télévision produit du divertissement."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel livre de self-help du moine bouddhiste Thich Nhat Hanh et quel phénomène culturel des années 2010 ont popularisé la pleine conscience (mindfulness) dans la culture occidentale ?",a:"Le mouvement mindfulness et les applications de méditation (Headspace, Calm) ont transformé une pratique bouddhiste en industrie du bien-être",detail:"La pleine conscience (mindfulness) est popularisée en Occident par Jon Kabat-Zinn (MBSR, 1979) et les écrits de Thich Nhat Hanh. Les applications Headspace (2010) et Calm (2012) valent plusieurs milliards. Le marché du bien-être (meditation, yoga, thérapie) dépasse 1 500 milliards de dollars mondialement."},
{theme:"popculture",diff:"difficile",type:"q",q:"Qu'est-ce que le 'Brat Summer', le 'Roman Empire' et le 'delulu' — et que révèlent ces phénomènes TikTok sur la façon dont la culture contemporaine se crée et se diffuse ?",a:"Des tendances virales nées sur TikTok qui montrent que la culture pop se produit désormais par microcommunautés et cycles ultra-rapides de 2-4 semaines plutôt que par les médias traditionnels",detail:"Brat Summer (2024) : la chanteuse Charli XCX définit une esthétique de fille indépendante et chaotique. Roman Empire : les hommes avouent penser régulièrement à l'Empire romain. Delulu : croire en ses rêves de façon irrationnelle. Ces tendances naissent, prolifèrent et meurent en quelques semaines sur TikTok, remplaçant les cycles saisonniers de la mode et de la télévision."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel roman-monde de J.R.R. Tolkien (1954-1955), précédé du Hobbit, est l'un des romans les plus vendus de l'histoire avec plus de 150 millions d'exemplaires ?",a:"Le Seigneur des Anneaux (The Lord of the Rings)",detail:"Tolkien (1892-1973), professeur d'oxford, invente entièrement langues (quenya, sindarin), mythologie et géographie de la Terre du Milieu. Le Seigneur des Anneaux inspire tout le genre fantasy moderne : Dungeons & Dragons, World of Warcraft, Game of Thrones. L'adaptation de Peter Jackson (2001-2003) est l'une des plus rentables de l'histoire."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel roman policier d'Agatha Christie (1934) mettant en scène le détective Hercule Poirot sur un train est l'un des romans policiers les plus vendus de l'histoire ?",a:"Le Crime de l'Orient-Express",detail:"Agatha Christie (1890-1976) est l'auteure de fiction la plus traduite au monde après Shakespeare. Ses romans ont vendu plus de 2 milliards d'exemplaires. Poirot (belge, moustachu, utilisateur des 'petites cellules grises') et Miss Marple sont ses deux détectives emblématiques."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel roman de Dan Brown (2003), mettant en scène le symbologiste Robert Langdon sur fond de secrets du Vatican et du Prieuré de Sion, est devenu l'un des romans les plus lus du XXIe siècle ?",a:"Le Da Vinci Code",detail:"Le Da Vinci Code a vendu plus de 80 millions d'exemplaires dans 44 langues. Il mêle histoire de l'art, catholicisme, ésotérisme et thriller. Malgré les critiques sur ses inexactitudes historiques, il déclenche un tourisme du patrimoine en France, à Paris et à la Sainte-Chapelle. L'adaptation de Ron Howard (2006) avec Tom Hanks est mitigée."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quelle série de romans pour adolescents de Stephenie Meyer (2005-2008), mettant en scène une romance entre une humaine et un vampire, a vendu 160 millions d'exemplaires et lancé une franchise cinématographique ?",a:"Twilight",detail:"Bella Swan tombe amoureuse d'Edward Cullen, vampire végétarien qui refuse de la mordre. La série Twilight (Fascination, Tentation, Hésitation, Révélation) a dominé les listes de best-sellers mondiaux pendant des années et lancé les carrières de Kristen Stewart et Robert Pattinson."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel événement annuel américain de football américain, suivi par 100 millions de spectateurs rien qu'aux États-Unis, est connu autant pour son spectacle de mi-temps que pour le sport lui-même ?",a:"Le Super Bowl",detail:"Le Super Bowl est l'événement télévisé le plus regardé aux États-Unis chaque année. Le spectacle de mi-temps a accueilli Michael Jackson, Beyoncé, Prince, Rihanna, Katy Perry. La publicité de 30 secondes coûte plus de 7 millions de dollars. Le Super Bowl génère des conversations culturelles mondiales indépendamment du match."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quelle cérémonie hollywoodienne, organisée depuis 1929, récompense chaque année les meilleurs films et est regardée par des centaines de millions de personnes dans le monde ?",a:"Les Oscars (Academy Awards)",detail:"Organisés par l'Academy of Motion Picture Arts and Sciences, les Oscars sont les récompenses cinématographiques les plus prestigieuses. La cérémonie la plus regardée de l'histoire (1998, avec Titanic). La gifle de Will Smith à Chris Rock en 2022 est le moment télévisé le plus commenté de la décennie."},
{theme:"popculture",diff:"difficile",type:"q",q:"Qu'est-ce que le 'Complexe industriel de la nostalgie' et comment Hollywood, Netflix et Disney exploitent-ils systématiquement la nostalgie des générations millennials et Gen X ?",a:"Phénomène où les studios misent sur des IPs connues (remakes, reboots, suites) plutôt que sur des créations originales pour minimiser le risque commercial — au détriment de la créativité",detail:"Disney (Star Wars, Marvel, remakes live-action de classiques), Netflix (Stranger Things, la nostalgie 80s) et Hollywood en général préfèrent recycler des franchises connues. Les remakes et suites représentent plus de 80 % des 100 plus grands succès mondiaux des années 2010-2020. Des auteurs comme Mark Fisher (Capitalisme réaliste) y voient un symptôme culturel plus profond."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel film de Francis Ford Coppola (1972), adapté du roman de Mario Puzo, est considéré comme l'un des plus grands films de l'histoire du cinéma ?",a:"Le Parrain (The Godfather)",detail:"Le Parrain suit la famille Corleone, clan mafieux new-yorkais. Marlon Brando (Don Vito), Al Pacino (Michael) et James Caan (Sonny) y sont inoubliables. Le film remporte 3 Oscars et change la façon de filmer la violence au cinéma. La suite (1974) est l'une des rares à égaler l'original."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel film d'animation Disney (1994) raconte l'histoire d'un lion qui doit reprendre son trône après le meurtre de son père, inspiré de Hamlet ?",a:"Le Roi Lion (The Lion King)",detail:"Le Roi Lion est longtemps le dessin animé le plus rentable de l'histoire de Disney. La mort de Mufasa est l'une des scènes les plus émouvantes du cinéma d'animation. La bande originale signée Hans Zimmer et les chansons d'Elton John (Circle of Life, Can You Feel the Love Tonight) sont iconiques."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel film de Ridley Scott (1979) inaugure la franchise Alien et révolutionne le film d'horreur de science-fiction avec la créature de H.R. Giger ?",a:"Alien, le huitième passager",detail:"Sigourney Weaver incarne Ellen Ripley, l'une des premières héroïnes d'action féministes du cinéma. H.R. Giger conçoit le Xénomorphe (langue articulée, sang acide) qui devient une icône de l'imaginaire collectif. La franchise compte 8 films, une série et de nombreux jeux vidéo."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel film de Sergio Leone (1966), avec Clint Eastwood, est l'archétype du western spaghetti et reste l'un des films les plus influents de l'histoire ?",a:"Le Bon, la Brute et le Truand (Il Buono, il Brutto, il Cattivo)",detail:"Clint Eastwood, Lee Van Cleef et Eli Wallach chassent un trésor de la guerre de Sécession. La musique d'Ennio Morricone et les plans sur les yeux des personnages avant le duel final définissent le western spaghetti. Leone invente un langage cinématographique qui influence Tarantino, Rodriguez et toute une génération de cinéastes."},
{theme:"popculture",diff:"difficile",type:"q",q:"Quel film d'Akira Kurosawa (1954) met en scène sept samouraïs défendant un village de paysans et a inspiré Les Sept Mercenaires (1960) et indirectement Star Wars ?",a:"Les Sept Samouraïs (七人の侍)",detail:"Les Sept Samouraïs dure 3h27 et est tourné en conditions extrêmes. Kurosawa invente des techniques narratives (multiple caméras, ralenti pour les scènes de combat) copiées dans le monde entier. George Lucas s'inspire de son autre film Yojimbo pour Star Wars. Steven Spielberg, Francis Ford Coppola et Martin Scorsese le citent comme influence majeure."},
{theme:"popculture",diff:"facile",type:"q",q:"Quelle série américaine (1994-2004) suivant six amis à New York est l'une des comédies les plus regardées de l'histoire de la télévision ?",a:"Friends",detail:"Ross, Rachel, Monica, Chandler, Joey et Phoebe vivent à Manhattan. Friends est diffusée pendant 10 saisons et reste en tête des charts de streaming 20 ans après sa fin. La coupe de cheveux de Jennifer Aniston ('The Rachel') inspire des millions de femmes. Le retour (The Reunion, 2021) attire 29 millions de spectateurs."},
{theme:"popculture",diff:"facile",type:"q",q:"Quelle série britannique (2005-...) met en scène un Seigneur du Temps voyageant dans le temps dans une cabine téléphonique bleue et est la plus longue série de science-fiction du monde ?",a:"Doctor Who (BBC, depuis 1963)",detail:"Doctor Who est diffusé depuis 1963 avec une interruption de 1989 à 2005. Le personnage peut se régénérer en un nouvel acteur (astuce narrative pour remplacer les acteurs). La série a connu 15 incarnations du Docteur. En 2023, Ncuti Gatwa devient le premier acteur noir à incarner le Docteur."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quelle série HBO (1999-2007) sur la mafia new-yorkaise, créée par David Chase, est considérée par beaucoup comme la meilleure série de l'histoire de la télévision ?",a:"Les Sopranos (The Sopranos)",detail:"Tony Soprano (James Gandolfini) est un chef mafieux du New Jersey qui consulte un psychiatre. La série brouille la frontière entre anti-héros et monstre, explore la masculinité toxique et invente la 'television prestige'. Sa fin ambiguë (écran noir) reste l'une des plus débattues de l'histoire des séries."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quelle série britannique (2013-2019) sur une famille ouvrière de Birmingham dans les années 1920, créée par Steven Knight, est devenue un phénomène mondial grâce à Netflix ?",a:"Peaky Blinders",detail:"La famille Shelby, menée par Thomas Shelby (Cillian Murphy), dirige un gang de Birmingham dans l'Angleterre de l'entre-deux-guerres. La série est connue pour son esthétique visuelle, sa bande-son mêlant Nick Cave et rock indépendant, et son casting (Tom Hardy, Helen McCrory). Une suite cinématographique est prévue."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel groupe irlandais de rock, formé à Dublin en 1976, est l'un des plus grands groupes de l'histoire avec des albums comme The Joshua Tree (1987) ?",a:"U2",detail:"Bono, The Edge, Adam Clayton et Larry Mullen Jr. forment U2. The Joshua Tree est l'un des albums les plus vendus de l'histoire. U2 est célèbre pour ses concerts spectaculaires (ZooTV Tour, PopMart) et l'engagement humanitaire de Bono (Jubilee 2000, ONE Campaign, RED)."},
{theme:"popculture",diff:"facile",type:"q",q:"Quelle chanteuse américaine, auteure de Like a Prayer, Material Girl et Vogue, est surnommée la 'Reine de la Pop' pour son influence sur la mode, la danse et la musique depuis les années 1980 ?",a:"Madonna (née en 1958)",detail:"Madonna Louise Ciccone révolutionne l'image de la femme dans la pop. Chaque album est une réinvention (punk, religion, erotisme, électronique). Vogue popularise le voguing, culture LGBTQ+ des clubs new-yorkais. Elle reste l'artiste féminine solo ayant vendu le plus de billets de concert de l'histoire."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel rappeur américain, auteur de The College Dropout et My Beautiful Dark Twisted Fantasy, est l'un des artistes les plus influents et controversés des années 2010-2020 ?",a:"Kanye West (né en 1977, rebaptisé Ye)",detail:"Kanye West révolutionne le rap (soul samples, orchestrations), la mode (Yeezy/Adidas) et la communication (Twitter). My Beautiful Dark Twisted Fantasy (2010) est souvent cité comme le meilleur album de la décennie. Ses sorties de route (MAGA, antisémitisme) ont progressivement isolé l'artiste de l'industrie."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quelle chanteuse américaine, auteure des albums Lemonade et Renaissance, est avec son mari Jay-Z la figure artistique noire la plus influente de sa génération ?",a:"Beyoncé Knowles (née en 1981)",detail:"Beyoncé commence avec Destiny's Child avant une carrière solo dominatrice. Lemonade (2016) est un album visuel sur la trahison et l'identité noire féminine. Renaissance (2022) rend hommage à la culture queer noire. Elle est l'artiste la plus récompensée de l'histoire des Grammy Awards."},
{theme:"popculture",diff:"difficile",type:"q",q:"Quel mouvement musical britannique des années 1970, incarné par les Sex Pistols, The Clash et les Ramones américains, a révolutionné la musique rock par son énergie brute et son message anti-establishment ?",a:"Le punk rock",detail:"Never Mind the Bollocks (Sex Pistols, 1977) et Anarchy in the UK résument l'idéologie punk : rejet du rock progressif pompeux, DIY (Do It Yourself), nihilisme et provocation. The Clash politisent le mouvement. Le punk influence le new wave, le grunge et toute la culture alterantive des décennies suivantes."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel jeu de simulation sociale de Maxis/EA (2000), où le joueur contrôle la vie quotidienne de personnages virtuels, est l'un des jeux vidéo les plus vendus de l'histoire ?",a:"Les Sims (The Sims)",detail:"Les Sims permet de construire des maisons, gérer des relations, des carrières et les besoins de personnages (faim, social, fun, hygiène). Le jeu a vendu plus de 200 millions d'exemplaires. Ses add-ons sont un modèle économique du DLC (downloadable content). Les Sims 4 est passé gratuit en 2022."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel jeu de rôle en ligne massivement multijoueur (MMORPG), lancé par Blizzard en 2004, a atteint 12 millions d'abonnés et a défini le genre pendant une décennie ?",a:"World of Warcraft (WoW)",detail:"World of Warcraft (WoW) se déroule dans l'univers de Warcraft. À son apogée (2010), il compte 12 millions d'abonnés payants — un record pour le genre. Le jeu a généré des phénomènes culturels (addiction, mariages de joueurs, deuils dans le jeu). Il reste actif en 2024 avec ses extensions régulières."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel jeu de tir en équipe de Valve (2012), free-to-play, est le jeu compétitif PC le plus joué au monde avec des tournois rassemblant des millions de spectateurs ?",a:"Counter-Strike: Global Offensive (CS:GO) / CS2",detail:"Counter-Strike est né d'un mod de Half-Life (1999). CS:GO (2012) est rebaptisé CS2 en 2023. Les tournois (ESL, FACEIT) rassemblent des millions de spectateurs en ligne. L'esport Counter-Strike est l'un des plus anciens et des plus stables de l'histoire du gaming compétitif."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel super-héros DC Comics, né sous le nom de Bruce Wayne et traumatisé par le meurtre de ses parents, combat le crime à Gotham City déguisé en chauve-souris ?",a:"Batman",detail:"Créé par Bob Kane et Bill Finger en 1939, Batman est le super-héros sans superpouvoirs — seulement intelligence, arts martiaux et fortune. Ses ennemis (Joker, Catwoman, Pingouin) sont parmi les plus iconiques de la culture pop. Les adaptations cinématographiques de Tim Burton (1989) et Christopher Nolan (2005-2012) redéfinissent le super-héros au cinéma."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel manga de Tite Kubo (2001-2016) met en scène Ichigo Kurosaki, un lycéen capable de voir les fantômes qui devient un Shinigami pour protéger les âmes ?",a:"Bleach",detail:"Bleach est l'une des trois grandes séries shōnen du magazine Weekly Shōnen Jump des années 2000 avec Naruto et One Piece. Il a vendu plus de 120 millions d'exemplaires. Son anime (2004-2012) est culte. La continuation animée Thousand-Year Blood War (2022-2024) relance l'enthousiasme des fans."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel auteur américain de comics, créateur de Spider-Man, Iron Man, Thor et des X-Men, est devenu la figure emblématique de Marvel Comics ?",a:"Stan Lee (1922-2018)",detail:"Stan Lee co-crée avec Jack Kirby et Steve Ditko la plupart des super-héros Marvel. Spider-Man (1962) avec Peter Parker comme héros ordinaire révolutionne le genre. Stan Lee apparaît en caméo dans chaque film MCU jusqu'à sa mort en 2018. Sa formule 'Excelsior!' est un symbole culturel."},
{theme:"popculture",diff:"difficile",type:"q",q:"Quel manga de Naoki Urasawa, auteur de 20th Century Boys et Pluto, est souvent cité comme l'un des mangas les plus sophistiqués pour adultes avec Monster (1994-2001) ?",a:"Naoki Urasawa (né en 1960)",detail:"Monster suit le Dr Kenzo Tenma qui sauve la vie d'un enfant qui devient un serial killer. Le manga explore la culpabilité, l'identité et la nature du mal dans une Europe post-Guerre Froide. Urasawa est considéré comme le maître du thriller psychologique en manga. Ses œuvres sont comparées à des romans policiers européens."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel réseau social de partage de photos, fondé par Kevin Systrom et Mike Krieger en 2010 et racheté par Facebook pour 1 milliard de dollars en 2012, est devenu le symbole de la culture visuelle contemporaine ?",a:"Instagram",detail:"Instagram comptait 2 milliards d'utilisateurs actifs en 2024. L'application a transformé la photographie, le marketing, la mode et la restauration. Les 'influenceurs' Instagram sont une nouvelle catégorie professionnelle. Les filtres et l'esthétique Instagram ont modifié la façon dont les gens perçoivent et présentent leur quotidien."},
{theme:"popculture",diff:"moyen",type:"q",q:"Qu'est-ce que l'esport (sport électronique) et quels sont les tournois et jeux qui génèrent les plus grandes audiences mondiales ?",a:"Compétitions professionnelles de jeux vidéo — League of Legends, Dota 2 et Counter-Strike rassemblent des dizaines de millions de spectateurs",detail:"Le Mondial de League of Legends 2022 attire 73 millions de spectateurs (pic simultané). The International (Dota 2) distribue des prize pools de 40 millions de dollars. L'esport est reconnu comme discipline sportive dans plusieurs pays. Des arènes dédiées (Esports Arena Las Vegas) accueillent des compétitions en direct."},
{theme:"popculture",diff:"moyen",type:"q",q:"Qu'est-ce que le podcast et comment ce format audio, né au début des années 2000, a-t-il révolutionné la consommation de contenus culturels et informatifs ?",a:"Fichier audio numérique à la demande — Serial (2014) popularise le format auprès du grand public, suivi par des dizaines de millions de podcasts",detail:"Le podcast (iPod + broadcast) naît vers 2004. Serial (2014) — enquête criminelle en 12 épisodes — est le premier podcast à atteindre 5 millions d'écoutes. En 2024, il existe plus de 4 millions de podcasts dans le monde. Spotify, Apple et Amazon investissent des milliards pour dominer le marché."},
{theme:"popculture",diff:"difficile",type:"q",q:"Qu'est-ce que l'économie des créateurs (creator economy) et comment des plateformes comme YouTube, Patreon et Substack ont-elles transformé la production culturelle ?",a:"Écosystème où des individus monétisent directement leur audience sans intermédiaire — YouTube (2005), Patreon (2013) et Substack (2017) en sont les piliers",detail:"YouTube (2005) permet aux créateurs de monétiser via la publicité. Patreon (2013) introduit l'abonnement direct fan-créateur. Substack (2017) relance la newsletter premium. En 2024, plus de 50 millions de personnes se considèrent créateurs de contenu. Cette économie remet en question les modèles de l'édition, du journalisme, de la musique et du cinéma."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel nageur américain, avec 23 médailles d'or olympiques, est l'athlète le plus médaillé de l'histoire des Jeux olympiques ?",a:"Michael Phelps (né en 1985)",detail:"Phelps remporte 28 médailles olympiques dont 23 en or entre 2000 et 2016. Ses huit médailles d'or à Pékin 2008 en un seul JO sont un record absolu. Après sa carrière, il témoigne publiquement de sa dépression pour briser la stigmatisation de la santé mentale dans le sport."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel tournoi de tennis sur gazon, le plus ancien au monde (1877), est connu pour son dress code blanc et la consommation de fraises à la crème ?",a:"Wimbledon (The Championships, Wimbledon)",detail:"Wimbledon est le plus ancien et souvent considéré le plus prestigieux des quatre tournois du Grand Chelem (avec Roland-Garros, l'US Open et l'Australian Open). Les joueurs doivent porter du blanc. Le tournoi se tient chaque année en juillet dans le quartier de Wimbledon à Londres."},
{theme:"popculture",diff:"difficile",type:"q",q:"Qu'est-ce que la Formule 1 et comment la domination de Michael Schumacher puis de Lewis Hamilton a-t-elle façonné ce sport en phénomène culturel mondial ?",a:"Championnat automobile de la FIA — Schumacher (7 titres, Ferrari 2000-2004) puis Hamilton (7 titres, Mercedes 2014-2020) dominent le sport sur vingt ans",detail:"La F1 combine technologie de pointe, glamour et vitesse. Schumacher (Ferrari) révolutionne la préparation physique. Hamilton se bat pour la diversité et l'écologie en F1. La série Netflix Drive to Survive (2019-) popularise la F1 auprès d'une audience mondiale, notamment aux USA et en Asie."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel festival de musique britannique, créé en 1970 dans le Somerset, est l'un des plus grands et des plus emblématiques festivals de musique en plein air au monde ?",a:"Glastonbury",detail:"Glastonbury accueille environ 200 000 personnes sur la ferme de Michael Eavis à Pilton. Sa programmation mêle rock, pop, électro, arts et activisme. Des artistes comme David Bowie, Radiohead, Beyoncé y ont donné des concerts légendaires. Les billets s'arrachent en quelques minutes dès leur mise en vente."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel chef français, auteur de La Cuisine du marché et triple étoilé Michelin, est considéré comme le père de la Nouvelle Cuisine des années 1970 qui révolutionne la gastronomie française ?",a:"Paul Bocuse (1926-2018)",detail:"Paul Bocuse est surnommé 'Monsieur Paul'. Avec Guérard, Chapel et les frères Troisgros, il lance la Nouvelle Cuisine : assiettes légères, sauces réduites, respect du produit. Son restaurant L'Auberge du Pont de Collonges (près de Lyon) conserve 3 étoiles depuis 1965 jusqu'à aujourd'hui."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel jeu de société de stratégie, créé au XIXe siècle et pratiqué par des milliards de personnes à travers le monde, consiste à déplacer des pièces pour mettre le roi adverse en échec et mat ?",a:"Les échecs",detail:"Les échecs naissent en Inde (chaturanga, VIe s.) et se répandent via la Perse et le monde arabe. Le championnat du monde Kasparov vs Deep Blue (1996-1997) marque l'entrée de l'IA dans la culture populaire. La série Netflix Le Jeu de la dame (2020) déclenche un boom mondial de la pratique des échecs."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel parc d'attractions créé par Walt Disney en 1955 en Californie a lancé un empire mondial du divertissement familial ?",a:"Disneyland (Anaheim, Californie)",detail:"Disneyland est le premier 'parc thématique' de l'histoire — différent des parcs d'attraction traditionnels. Walt Disney supervise chaque détail. L'empire Disney Parks compte aujourd'hui 12 parcs sur 3 continents (Anaheim, Orlando, Paris, Tokyo, Hong Kong, Shanghai). Disney World (Orlando, 1971) est le plus grand complexe de loisirs du monde."},
{theme:"popculture",diff:"moyen",type:"q",q:"Qu'est-ce que le Comic-Con de San Diego et comment est-il devenu le symbole de la culture geek et du divertissement populaire mondial ?",a:"Convention annuelle créée en 1970 à San Diego réunissant fans de BD, SF, jeux vidéo et films — devenu la scène mondiale des annonces de franchise",detail:"Le San Diego Comic-Con (SDCC) accueille 135 000 personnes par an. Créé par des fans de comics, il est devenu le lieu où Hollywood annonce ses blockbusters (Marvel, DC, Star Wars). Les 'panels' de la salle Hall H rassemblent des milliers de fans. Le terme 'geek' est passé de péjoratif à identité valorisée."},
{theme:"popculture",diff:"difficile",type:"q",q:"Qu'est-ce que le 'soft power' culturel américain et comment des industries comme Hollywood, la musique pop et les jeux vidéo ont-elles imposé une hégémonie culturelle mondiale depuis 1945 ?",a:"Capacité d'influencer les comportements et valeurs mondiales par l'attractivité culturelle (Joseph Nye, 1990) — Hollywood et la pop culture américaine en sont les instruments les plus puissants",detail:"Joseph Nye théorise le soft power dans Bound to Lead (1990). Après 1945, Hollywood, le jazz, Coca-Cola, puis MTV, Internet et Netflix projettent le mode de vie américain mondialement. Cette hégémonie est contestée depuis les années 2000 par le contenu coréen (K-pop, K-drama), le cinéma indien et la culture arabe."},
{theme:"popculture",diff:"facile",type:"q",q:"Quel groupe suédois, formé en 1972 par deux couples, est l'un des groupes de pop les plus vendus de l'histoire avec des tubes comme Dancing Queen et Mamma Mia ?",a:"ABBA",detail:"Agnetha, Björn, Benny et Anni-Frid (ABBA) dominent les charts mondiaux de 1974 à 1982. Mamma Mia ! (comédie musicale, 1999 ; film, 2008) relance leur popularité. Leur album ABBA Gold (1992) est l'un des plus vendus de tous les temps. En 2021, ils sortent Voyage, leur premier album depuis 40 ans."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel phénomène culturel mondial né en Corée du Sud dans les années 2010, incarné par des groupes comme BTS et BLACKPINK, a propulsé la culture coréenne sur la scène internationale ?",a:"La K-pop (Korean pop)",detail:"La K-pop combine chorégraphies millimétrées, esthétique visuelle soignée et marketing agressif sur les réseaux sociaux. BTS devient le premier groupe asiatique à dépasser 1 milliard de vues sur YouTube. Le 'Hallyu' (vague coréenne) englobe aussi le cinéma (Parasite), les séries (Squid Game) et la beauté (K-beauty)."},
{theme:"popculture",focus:"allemagne",diff:"facile",type:"q",q:"Quelle émission musicale allemande, diffusée depuis 1961, est la plus ancienne au monde encore en activité ?",a:"Musicload / Top of the Pops allemand — mais surtout : l'Eurovision (Allemagne fondatrice en 1956)",detail:"L'Allemagne est l'un des 5 pays fondateurs de l'Eurovision (1956) et l'un des « Big Five » (contributeurs financiers, participation garantie). Lena remporte le concours en 2010 avec Satellite — la dernière victoire allemande. Nicole avait gagné en 1982 avec Ein bisschen Frieden."},
{theme:"popculture",focus:"allemagne",diff:"moyen",type:"q",q:"Quel groupe allemand de rock électronique, fondé à Düsseldorf en 1969, a inventé la musique électronique moderne ?",a:"Kraftwerk",detail:"Ralf Hütter et Florian Schneider créent avec des synthétiseurs, boîtes à rythmes et voix robotiques un son totalement nouveau. Autobahn (1974), Trans-Europe Express (1977), The Man-Machine (1978) influencent directement le hip-hop américain, la techno de Detroit et toute la pop électronique mondiale."},
{theme:"popculture",focus:"allemagne",diff:"moyen",type:"q",q:"Quel festival de musique classique annuel, créé par Wagner lui-même en 1876, se tient dans la ville de Bayreuth ?",a:"Le Festival de Bayreuth (Bayreuther Festspiele)",detail:"Dédié exclusivement aux opéras de Wagner, le festival se tient dans le Festspielhaus, salle spécialement conçue par Wagner pour ses œuvres (fosse d'orchestre invisible, acoustique parfaite). La liste d'attente pour obtenir des billets peut dépasser dix ans. Dirigé par la famille Wagner jusqu'à aujourd'hui."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel chef français, surnommé 'le roi des cuisiniers et le cuisinier des rois', codifie la grande cuisine française au XIXe siècle avec ses cinq sauces mères ?",a:"Auguste Escoffier (1846-1935)",detail:"Escoffier travaille avec César Ritz (Ritz Paris, Savoy de Londres) et modernise la cuisine de Carême. Il codifie les cinq sauces mères (béchamel, velouté, espagnole, hollandaise, tomat), simplifie les menus et invente la brigade de cuisine. Il crée aussi la pêche Melba pour la cantatrice Nellie Melba."},
{theme:"gastro",diff:"facile",type:"q",q:"Dans quelle région française produit-on le Roquefort, et dans quoi est-il affiné pour développer ses moisissures bleues caractéristiques ?",a:"Dans les caves naturelles de Combalou, à Roquefort-sur-Soulzon (Aveyron), où la ventilation naturale (fleurines) crée les conditions parfaites",detail:"Roquefort est l'un des plus anciens fromages du monde — Pline l'Ancien le cite en 79 ap. J.-C. Il est fabriqué exclusivement avec du lait de brebis de race Lacaune. La moisissure Penicillium roqueforti se développe dans les caves calcaires. Premier fromage français à bénéficier d'une AOC (1925)."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel dessert français en forme de chou fourré de crème et nappé de caramel est la pièce maîtresse du croquembouche, gâteau de mariage traditionnel ?",a:"Le profiterole (ou chou à la crème)",detail:"Le croquembouche ('croque en bouche') est une pyramide de profiteroles liées par du caramel filé, inventée par Antonin Carême au XIXe siècle. Il orne les tables de mariage françaises depuis deux siècles. La pâte à choux, qui gonfle à la cuisson grâce à la vapeur, est la base des éclairs, religieuses et Paris-Brest."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quelle région française produit le foie gras, et quelle race de canard ou d'oie est traditionnellement utilisée pour les deux appellations IGP ?",a:"Sud-Ouest principalement (Landes, Périgord, Gers) — canard mulard pour le foie gras de canard, oie pour le foie gras d'oie",detail:"La France produit 70 % du foie gras mondial. Le gavage (alimentation forcée) est interdit dans la plupart des pays mais légal en France où il est patrimoine gastronomique protégé. L'IGP 'Canard à foie gras du Sud-Ouest' couvre 8 départements. Le foie gras d'oie, plus rare et délicat, représente moins de 5 % de la production."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel plat traditionnel du sud-ouest de la France, à base de cassoulet de haricots blancs, confit de canard et charcuteries, fait l'objet d'une rivalité féroce entre Castelnaudary, Carcassonne et Toulouse ?",a:"Le cassoulet",detail:"Castelnaudary revendique la paternité (saucisse de porc + confit de canard). Carcassonne ajoute le gigot d'agneau. Toulouse inclut sa saucisse emblématique. La Confrérie du Cassoulet de Castelnaudary défend l'orthodoxie de la recette. Le nom vient de la cassole en terre cuite dans laquelle il cuit. La croûte doit être cassée sept fois selon la tradition."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel beurre blanc d'origine ligérienne, créé par accident selon la légende par une cuisinière qui oublia d'ajouter les oeufs à une sauce béarnaise, accompagne traditionnellement le brochet de Loire ?",a:"Le beurre blanc nantais (beurre blanc de la Loire)",detail:"La légende attribue son invention à Clémence Lefeuvre dite 'La Mère Clémence' vers 1890 à Saint-Julien-de-Concelles. La recette : réduction de vinaigre et d'échalotes dans du muscadet, puis incorporation progressive de beurre froid en fouettant. La sauce émulsionnée obtenue accompagne le poisson de Loire. Son secret : ne jamais laisser bouillir après l'ajout du beurre."},
{theme:"gastro",diff:"difficile",type:"q",q:"Quel chef lyonnais, surnommé 'pape de la gastronomie', refuse les Étoiles Michelin et défend une cuisine bourgeoise authentique dans son auberge du col de la Luère ?",a:"Eugène Brazier (1895-1977) — première femme à obtenir 6 étoiles Michelin en 1933, maître de Paul Bocuse",detail:"La Mère Brazier est la première personne (homme ou femme) à détenir simultanément 6 étoiles Michelin (deux restaurants, 3 étoiles chacun) en 1933. Elle forme Paul Bocuse pendant 3 ans. Sa cuisine : quenelles de brochet, poulet demi-deuil (sous la peau de truffes), artichaut à la barigoule. Lyon doit à ses 'mères lyonnaises' une tradition gastronomique unique."},
{theme:"gastro",diff:"facile",type:"q",q:"Quelle ville italienne a donné son nom au jambon cru le plus célèbre d'Italie, produit avec des porcs nourris au petit-lait de parmesan ?",a:"Parme (Prosciutto di Parma DOP)",detail:"Le Prosciutto di Parma est affiné 12 à 36 mois dans les collines de Langhirano. L'air marin de la mer Tyrrhénienne puis les vents d'Apennin créent les conditions d'affinage idéales. Les porcs sont nourris avec le petit-lait issu de la production du Parmigiano-Reggiano. La couronne à 5 points (Ducal Crown) est la marque au feu des jambons conformes."},
{theme:"gastro",diff:"facile",type:"q",q:"Quelle pâte italienne à base d'œufs et de farine est originaire de Bologne, et quel est le vrai nom de la sauce bolognaise selon les Italiens ?",a:"Les tagliatelles (et non les spaghettis) accompagnent le ragù alla bolognese — la Chambre de Commerce de Bologne a déposé la recette officielle en 1982",detail:"La recette officielle bolognaise stipule : bœuf haché, pancetta, oignon, carotte, céleri, vin blanc, lait, tomates. Pas de spaghettis — les tagliatelles, dont la largeur doit correspondre à 1/12 276e de la hauteur de la Tour des Asinelli. Les spaghettis bolognaise sont une invention de la diaspora italienne."},
