{theme:"gastro",diff:"moyen",type:"q",q:"Dans quelle région italienne produit-on le Parmigiano-Reggiano, et combien de litres de lait faut-il pour produire une meule ?",a:"Émilie-Romagne et Lombardie (provinces de Parme, Reggio Emilia, Modène, Mantoue, Bologne) — 550 litres de lait pour une meule de 40 kg",detail:"Le Parmigiano-Reggiano DOP est affiné 12 à 36 mois minimum. Les meules sont testées au marteau par les affineurs : le son révèle les éventuels défauts internes. Moins de 400 producteurs sont agréés. Une meule de 24 mois vaut environ 700 euros. La fraude (parmesan râpé mélangé à d'autres fromages) est estimée à 2 milliards d'euros par an."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel vinaigre traditionnel de Modène est produit uniquement à partir de moût de raisin cuit et vieilli minimum 12 ans en fûts de bois successivement plus petits ?",a:"L'Aceto Balsamico Tradizionale di Modena DOP",detail:"Le balsamique traditionnel (à distinguer du balsamique IGP industriel, 60 jours de vieillissement minimum) vieillit dans une batterie de 5 à 7 fûts en bois différents (chêne, mûrier, châtaignier, cerisier, genévrier). La surface d'évaporation concentre les arômes. 25 litres de moût donnent 1 litre de vinaigre après 12 ans. La bouteille officielle (sphérique, 100 ml) a été créée par Giorgetto Giugiaro."},
{theme:"gastro",diff:"difficile",type:"q",q:"Quel chef sicilien, figure du mouvement 'slow food', a popularisé la cuisine italienne du terroir en refusant la mondialisation culinaire et en défendant les variétés locales de tomates et d'agrumes ?",a:"Carlo Petrini (né en 1949) — fondateur du mouvement Slow Food en 1989 à Bra (Piémont), en réaction à l'ouverture d'un McDonald's près de la Fontaine de Trevi",detail:"Slow Food naît d'un manifeste contre la restauration rapide. Petrini crée ensuite Terra Madre (réseau mondial de producteurs), l'Arche du Goût (recensement des produits à sauvegarder) et l'Université des Sciences Gastronomiques de Pollenzo. Son mouvement compte 160 000 membres dans 150 pays et influence les politiques alimentaires mondiales."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel bouillon japonais de base, fait d'algue kombu et de flocons de bonite séchée, est le fondement de la cuisine japonaise et vecteur de l'umami ?",a:"Le dashi",detail:"Le dashi est l'équivalent japonais du fond de veau français — base de la soupe miso, des ramen, des sauces et des plats mijotés. Il se prépare en 20 minutes (kombu infusé, bonite ajoutée hors du feu, filtrée). Sa richesse en acide glutamique (kombu) et en inosinate (bonite) crée une synergie umami. La cuisine japonaise structurée autour du dashi est inscrite au patrimoine UNESCO (washoku, 2013)."},
{theme:"gastro",diff:"facile",type:"q",q:"Dans quelle ville chinoise est née la cuisine cantonaise, et quel est son principe culinaire fondamental de respect du produit brut ?",a:"Guangzhou (Canton) — la cuisine cantonaise valorise la fraîcheur absolue et les cuissons douces (vapeur, sauté rapide) pour ne pas masquer le goût naturel des ingrédients",detail:"La cuisine cantonaise (粵菜) est l'une des huit grandes cuisines chinoises. Elle valorise la fraîcheur (les poissons nagent jusqu'au moment de la commande), la vapeur et le wok rapide. Le dim sum ('toucher le cœur') — petits plats servis en cageots lors du yum cha — en est l'expression festive. Hong Kong et San Francisco en sont les ambassadeurs mondiaux."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel plat thaïlandais, le Pad Thai, a été activement promu par le gouvernement dans les années 1940 pour quel motif politique et économique ?",a:"Phibun Songkhram promouvoit le Pad Thai pour encourager la consommation de nouilles de riz au détriment du riz blanc (pénurie) et renforcer le nationalisme thaïlandais",detail:"Dans les années 1940, le Premier ministre Phibun Songkhram lance une campagne nationale — distribue des recettes de Pad Thai, crée des échoppes de rue — pour faire des nouilles de riz sautées le plat 'national' thaïlandais. Objectif : économiser le riz, utiliser les nouilles (moins chères) et affirmer une identité culinaire distincte des voisins chinois."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quelle technique coréenne de fermentation en jarre enterrée (onggi) permet de conserver légumes et sauces pendant des années, et quel est son produit emblématique autre que le kimchi ?",a:"La fermentation en onggi (jarre en terre cuite) produit aussi la pâte de soja doenjang, la sauce gochujang et la sauce de soja ganjang — bases de la cuisine coréenne",detail:"Les onggi (jarres en terre cuite poreuse) régulent naturellement la fermentation : l'air circule à travers les pores mais l'eau ne pénètre pas. Enterrées, elles maintiennent une température stable. Doenjang (pâte de soja fermentée), gochujang (pâte piment-soja-riz) et ganjang (soja liquide) sont les trois sauces fondamentales de la cuisine coréenne. Leur complexité aromatique s'acquiert sur des années voire des décennies."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel chef japonais, propriétaire du restaurant Sukiyabashi Jiro à Tokyo, est le sujet du documentaire Jiro Dreams of Sushi (2011) et a reçu 3 étoiles Michelin à 85 ans ?",a:"Jiro Ono (né en 1925)",detail:"Jiro Ono travaille le sushi depuis 70 ans dans un restaurant de 10 places dans une station de métro de Tokyo. Il masse les pieuvres 45 minutes, fait maturer le thon 10 jours. Ses fils sont apprentis pendant des années avant de pouvoir tailler eux-mêmes le poisson. Le Michelin lui retire ses 3 étoiles en 2019 car le restaurant est inaccessible au grand public (réservation par relations uniquement)."},
{theme:"gastro",diff:"difficile",type:"q",q:"Quelle épice indienne, mélange de curcuma, coriandre, cumin et d'autres aromates, n'existe pas en Inde sous cette forme, étant une création britannique de la période coloniale ?",a:"Le curry en poudre (curry powder) est une invention britannique — en Inde, chaque plat a son propre mélange d'épices fraîchement moulus (masala)",detail:"En Inde, le terme curry n'existe presque pas. Chaque région, chaque plat a son masala (mélange d'épices fraîches moulues). Les Britanniques ont simplifié cette complexité en une poudre unique 'curry' pour reproduire les saveurs indiennes en Angleterre. La sauce curry britannique (British curry sauce) est aussi distincte des cuisines indiennes. Le 'chicken tikka masala' est souvent présenté comme le plat national britannique — créé en Grande-Bretagne."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel pays d'Amérique latine est considéré comme le berceau du pisco, et quel cocktail emblématique est préparé avec cette eau-de-vie de raisin ?",a:"Dispute Pérou/Chili — le Pisco Sour (pisco, jus de citron vert, blanc d'oeuf, sirop de sucre, angostura)",detail:"La guerre du pisco oppose le Pérou et le Chili depuis des décennies. Le Pérou affirme que le pisco est né à Pisco (ville côtière). Le Chili produit son propre pisco. L'ONU a reconnu les deux comme indications géographiques distinctes. Le Pisco Sour péruvien est légèrement différent du chilien (pas de blanc d'oeuf au Chili). Chaque pays célèbre son 'Día del Pisco Sour'."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel pays est le plus grand producteur mondial de chocolat, et dans quelle région du monde les fèves de cacao sont-elles cultivées à 70 % ?",a:"Côte d'Ivoire est le premier producteur mondial — 70 % du cacao mondial vient d'Afrique de l'Ouest (Côte d'Ivoire, Ghana, Cameroun, Nigeria)",detail:"La Côte d'Ivoire produit ~2 millions de tonnes/an, soit 40 % du cacao mondial. Ironie : le chocolat est consommé principalement en Europe et aux États-Unis, rarement par les producteurs africains. Les fèves de cacao (Theobroma cacao) ne poussent que dans la zone tropicale (20° de part et d'autre de l'équateur). Le cacao était monnaie chez les Aztèques."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quelle ville marocaine a donné son nom à un plat de viande confite et fruits secs cuit dans une poterie conique, et quelle est la règle fondamentale qui distingue le tajine marocain de l'algérien ?",a:"La ville de Tajine n'existe pas — le mot 'tajine' désigne d'abord le récipient (poterie conique), et le plat marocain cuit à l'étouffée sans adjonction d'eau, contrairement à l'algérien",detail:"Le tajine (de l'arabe 'tajan') est d'abord un ustensile : un plat en terre cuite surmonté d'un couvercle conique qui permet la condensation de la vapeur. La cuisine marocaine cuit la viande dans sa propre graisse et le jus des légumes (ras el-hanout, citron confit, olives, safran). La chermoula (marinade) prépare la viande. En Algérie, on ajoute parfois de l'eau."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel pays d'Amérique du Sud possède la plus haute densité de restaurants dans la liste des 50 Meilleurs Restaurants du Monde, grâce notamment à son chef Gastón Acurio et à la diversité de ses écosystèmes ?",a:"Le Pérou — Lima est considérée comme la capitale gastronomique de l'Amérique latine, avec Central, Maido et Astrid y Gastón parmi les meilleurs mondiaux",detail:"Le Pérou dispose de 84 des 117 zones climatiques mondiales — désert côtier, Andes, Amazonie — offrant une biodiversité alimentaire unique. Gastón Acurio (Astrid y Gastón) a popularisé le ceviche et la cuisine novoandina. Virgilio Martínez (Central) cuisine par 'altitudes' (de -10m au niveau de la mer à 4 200m). La cuisine péruvienne est un facteur de fierté nationale et de diplomatie culturelle."},
{theme:"gastro",diff:"difficile",type:"q",q:"Quelle est l'origine historique du mole negro mexicain, et combien d'ingrédients peut contenir sa version la plus complexe, celle d'Oaxaca ?",a:"Le mole negro d'Oaxaca peut contenir jusqu'à 30 ingrédients — chocolat, piments séchés, épices, tomates, noix, raisins secs, et sa préparation peut prendre 3 jours",detail:"Le mole (du nahuatl molli, 'sauce') est un héritage précolombien enrichi par la cuisine coloniale. Le mole negro d'Oaxaca est l'un des 7 moles de l'État. Il intègre piments mulato, ancho, pasilla, chipotle, chocolat amer, achiote, cannelle, clou de girofle, thym, plantain frit, tortilla brûlée, noix. Sa complexité symbolise la fusion des cultures autochtone et espagnole."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel explorateur génois rapporte en Europe à son retour des Amériques des ingrédients qui révolutionneront la cuisine européenne — tomate, piment, maïs, pomme de terre — lors de quel échange historique ?",a:"L'Échange colombien (1492+) transforme radicalement les cuisines mondiales — la tomate italienne, la pomme de terre irlandaise et le piment hongrois sont toutes des plantes américaines",detail:"Avant 1492 : pas de tomates en Italie (la sauce tomate n'a que 400 ans), pas de piments en Asie, pas de chocolat en Europe, pas de pommes de terre en Irlande. En échange, les Amériques reçoivent blé, riz, bovins, chevaux, bananes. L'Échange colombien est l'une des plus grandes révolutions alimentaires de l'histoire, ayant aussi propagé des maladies dévastatrices pour les peuples autochtones."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel livre de cuisine français d'Antonin Carême (1784-1833) codifie pour la première fois la grande cuisine française et inspire tous les chefs du XIXe siècle ?",a:"L'Art de la cuisine française au XIXe siècle (1833-1844) — Carême est le premier grand chef de l'histoire moderne, cuisinier de Talleyrand, du Tsar et de Rothschild",detail:"Marie-Antoine Carême est abandonné à 10 ans par ses parents, commence comme marmiton. Il devient le chef de Talleyrand (qui l'utilise pour sa diplomatie culinaire), du Prince Régent anglais, du Tsar Alexandre Ier et de James de Rothschild. Il invente le toque blanc, codifie les sauces mères, crée des pièces montées architecturales. Son œuvre est fondatrice de la haute cuisine française."},
{theme:"gastro",diff:"moyen",type:"q",q:"Dans quel contexte historique la conserve alimentaire est-elle inventée par Nicolas Appert en 1810, et pour quel usage militaire Napoléon finance-t-il sa recherche ?",a:"Napoléon offre 12 000 francs de récompense pour inventer un moyen de nourrir ses armées en campagne — Appert invente la stérilisation en bocal hermétique",detail:"Nicolas Appert (confiseur parisien) découvre qu'en chauffant des aliments dans des bocaux hermétiquement fermés, ils se conservent sans se corrompre. Il comprend le résultat mais pas le mécanisme (la pasteurisation n'est théorisée par Pasteur qu'en 1864). Cette invention révolutionne l'alimentation militaire et maritime. Peter Durand adapte le procédé à la boîte métallique en 1810 en Angleterre."},
{theme:"gastro",diff:"difficile",type:"q",q:"Comment la Route de la Soie a-t-elle été aussi une 'Route des Épices' et pourquoi le commerce des épices a-t-il financé les grandes découvertes européennes du XVe siècle ?",a:"Les épices (poivre, cannelle, muscade, girofle) valaient leur pesant d'or — la recherche d'une route directe vers les épices des Moluques motive Vasco de Gama, Colomb et Magellan",detail:"Au Moyen Âge, les épices arrivent d'Asie via des intermédiaires arabes puis vénitiens, gonflant les prix x100. Une livre de poivre vaut une journée de salaire. Une livre de safran vaut un cheval. La recherche d'une route directe vers les Moluques ('Îles aux Épices', Indonésie) motive les explorations. Vasco de Gama (1498) contourne l'Afrique. Magellan (1519) fait le tour du monde. Le poivre déclenche des guerres coloniales."},
{theme:"gastro",diff:"facile",type:"q",q:"Quelle région française, partagée entre Gironde et Lot-et-Garonne, produit les vins rouges les plus chers du monde, dont le Pétrus et les grands crus de Saint-Émilion ?",a:"Bordeaux — ses appellations (Pauillac, Saint-Émilion, Pomerol, Sauternes) produisent les vins les plus cotés au monde",detail:"Le classement de 1855 (demandé par Napoléon III pour l'Exposition Universelle) classe 61 châteaux en 5 catégories. Mouton Rothschild est le seul à avoir changé de catégorie (1973). Pétrus (Pomerol) n'est pas classé mais ses bouteilles dépassent 3 000 euros. Les vins de Bordeaux dominent les enchères mondiales : une bouteille de Romanée-Conti 1945 a atteint 558 000 dollars."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quelle est la différence entre Champagne et crémant, et pourquoi seule la région de Champagne peut légalement appeler ses vins pétillants 'Champagne' ?",a:"Le Champagne est une AOP protégée — seuls les vins produits dans la délimitation géographique de Champagne (Marne, Ardennes, Aube, Haute-Marne, Seine-et-Marne) selon la méthode champenoise peuvent s'appeler ainsi",detail:"La méthode champenoise (ou traditionnelle) implique une seconde fermentation en bouteille, créant les bulles naturellement. Les crémants (Alsace, Bourgogne, Loire...) utilisent la même méthode mais hors Champagne. Dom Pérignon (moine) n'a pas 'inventé' le Champagne (mythe marketing) — mais il a perfectionné l'assemblage et le bouchage. Les grandes maisons (Moët, Veuve Clicquot, Bollinger) dominent le marché mondial."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel pays est le premier consommateur mondial de thé, et quelle cérémonie rituelle japonaise du thé (chanoyu) a été codifiée par le maître Sen no Rikyū au XVIe siècle ?",a:"La Chine est le premier consommateur (et producteur) mondial de thé — le chanoyu japonais est codifié par Sen no Rikyū (1522-1591), conseiller de Toyotomi Hideyoshi",detail:"Le thé (Camellia sinensis) vient de Chine. La légende attribue sa découverte à l'Empereur Shennong en 2737 av. J.-C. Le Japon adopte le thé matcha via les moines bouddhistes. Sen no Rikyū codifie le chanoyu : harmonie (wa), respect (kei), pureté (sei), tranquillité (jaku). Il sera contraint de commettre le seppuku par Hideyoshi. Sa tea house originale (Taian) est classée trésor national."},
{theme:"gastro",diff:"difficile",type:"q",q:"Quel processus chimique découvert par Louis Pasteur en 1857 explique la transformation du sucre en alcool par les levures, révolutionnant la production de bière et de vin ?",a:"La fermentation alcoolique — Pasteur démontre qu'elle est due à des micro-organismes vivants (levures) et non à une réaction chimique spontanée, contredisant Liebig",detail:"Avant Pasteur, Liebig croyait que la fermentation était une réaction chimique pure. Pasteur prouve que ce sont des levures (organismes vivants) qui transforment le sucre en alcool et CO2. Cette découverte révolutionne l'industrie brassicole et vinicole : contrôle des températures, sélection des souches de levures, pasteurisation pour arrêter la fermentation. Pasteur travaille pour les brasseurs lillois."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel chef espagnol, propriétaire de El Celler de Can Roca à Gérone, est élu meilleur restaurant du monde en 2013 et 2015 avec ses deux frères Joan et Josep ?",a:"Joan Roca (né en 1964) et ses frères — El Celler de Can Roca, Gérone (Espagne)",detail:"Els tres Roca : Joan (cuisine), Josep (salle et vins), Jordi (desserts). Leur cuisine combine technique de pointe (sous-vide, distillation des parfums en plats) et terroir catalan. El Celler occupe régulièrement le top 5 mondial. Joan est l'un des premiers à avoir popularisé la cuisson sous-vide à basse température dans la haute gastronomie."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel chef danois, propriétaire du Noma à Copenhague, révolutionne la gastronomie mondiale dans les années 2000 avec sa cuisine 'New Nordic' fondée sur les produits locaux et la cueillette sauvage ?",a:"René Redzepi (né en 1977) — Noma élu 4 fois meilleur restaurant du monde, pionnier de la cuisine nordique et de la fermentation",detail:"René Redzepi (père macédonien, mère danoise) ouvre le Noma en 2003. Sa 'Nouvelle cuisine nordique' : que des produits scandinaves (mousse, lichen, fourmis, huîtres sauvages), fermentation poussée à l'extrême, saisonnalité absolue. Il inspire des chefs du monde entier à recentrer leur cuisine sur leur terroir local. Le Noma ferme définitivement en 2024."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel chef américain, auteur de The French Laundry Cookbook, est le premier Américain à obtenir 3 étoiles Michelin simultanément dans deux restaurants (French Laundry et Per Se) ?",a:"Thomas Keller (né en 1955) — French Laundry (Napa Valley) et Per Se (New York)",detail:"Thomas Keller ouvre le French Laundry en 1994 dans une ancienne blanchisserie de Yountville. Sa cuisine est précise, technique, influencée par la France mais profondément américaine. Il est l'un des rares Américains à avoir égalé et peut-être surpassé les grands chefs français. Anthony Bourdain qualifie le French Laundry du meilleur restaurant américain."},
{theme:"gastro",diff:"difficile",type:"q",q:"Quelle philosophie culinaire Heston Blumenthal défend-il dans son restaurant The Fat Duck (Bray) et comment sa célèbre 'snail porridge' (porridge d'escargots) illustre-t-elle l'approche multi-sensorielle ?",a:"Blumenthal défend la 'gastronomie moléculaire et multi-sensorielle' — manger est une expérience totale (vision, ouïe, mémoire, attente) et non seulement gustative",detail:"The Fat Duck (3 étoiles) crée des plats qui manipulent les perceptions : la 'Sound of the Sea' arrive avec un iPod diffusant des bruits de vagues pour amplifier la saveur du poisson. La 'snail porridge' combine la texture familière du porridge avec les escargots — subversion des attentes. Blumenthal travaille avec des psychologues et des neuroscientifiques. Le 'nitro-scrambled egg and bacon ice cream' est préparé à table à l'azote liquide."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel champignon très recherché de la cuisine française pousse uniquement en symbiose avec certains chênes et châtaigniers, et se récolte avec l'aide de cochons ou de chiens dressés ?",a:"La truffe — en particulier la truffe noire du Périgord (Tuber melanosporum) et la truffe blanche d'Alba (Tuber magnatum)",detail:"La truffe noire ('diamant noir') du Périgord pousse entre novembre et mars, à 10-30 cm de profondeur. Son parfum vient des androsténol et diméthylsulfure. Les cochons la trouvent naturellement mais mangent parfois la récolte — les chiens (lagotto romagnolo) sont préférés. Une truffe blanche d'Alba peut atteindre 100 000 euros/kg aux enchères. La culture de la truffe (trufficulture) reste difficile et aléatoire."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel sel marin produit uniquement dans les marais salants de Guérande (Loire-Atlantique) est récolté à la main et doit sa couleur grise à l'argile des bassins ?",a:"Le sel de Guérande (fleur de sel et gros sel gris)",detail:"Les paludiers récoltent la fleur de sel (qui flotte à la surface) et le gros sel gris (déposé sur le fond argileux) à la main, avec des outils traditionnels. La fleur de sel de Guérande est réputée pour sa finesse et ses arômes d'iode et de violette. Elle bénéficie d'un Label Rouge et d'une IGP. Les marais salants de Guérande couvrent 2 000 hectares et existent depuis l'époque mérovingienne."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quelle race bovine française, originaire du Charolais (Bourgogne), est considérée comme l'une des meilleures races à viande du monde et a donné son nom à une technique de cuisson à très haute température ?",a:"Le bœuf charolais — et la 'fondue bourguignonne' ou 'fondue bourguignonne' est parfois confusément appelée à partir de ce terroir",detail:"Le Charolais est une race blanche massive, sélectionnée pour la viande depuis le XVIIe siècle. La viande charolaise est réputée pour son persillage (infiltration de graisse) et sa tendreté. Elle bénéficie d'un Label Rouge. Le bœuf de Charolles (ville de Charolais) est l'une des AOC viandes les plus réputées de France."},
{theme:"gastro",diff:"difficile",type:"q",q:"Quelle controverse éthique et culturelle entoure la production du caviar d'esturgeon, et quels pays ont développé des alternatives durables face à l'effondrement des populations d'esturgeons sauvages de la mer Caspienne ?",a:"Les esturgeons sont au bord de l'extinction (CITES annexe I) — l'Iran, la Russie et l'Azerbaïdjan ont limité la pêche, poussant l'aquaculture en Chine, France et Italie",detail:"La mer Caspienne abritait 90 % des esturgeons mondiaux. La surpêche post-soviétique (caviar braconné) les a presque éradiqués. L'IUCN classe 18 des 27 espèces d'esturgeons comme 'en danger critique'. La Chine est désormais le premier producteur de caviar d'élevage. La France (Sologne, Aquitaine) produit le Caviar Aquitaine. Le caviar iranien de la mer Caspienne reste le référentiel mais sa production est désormais marginale."},
{theme:"gastro",diff:"facile",type:"q",q:"Quelle ville est souvent désignée comme la capitale mondiale de la street food, avec ses marchés nocturnes et ses hawker centres où se côtoient cuisine chinoise, malaise et indienne ?",a:"Singapour — ses hawker centres sont inscrits au patrimoine immatériel de l'UNESCO depuis 2020",detail:"Les hawker centres de Singapour sont des marchés couverts où des centaines de vendeurs spécialisés proposent chacun un plat : Hainanese chicken rice, char kway teow, laksa, rojak, bak kut teh. En 2016, le Michelin attribue une étoile au Hawker Chan — un stand de soja et poulet à 2 dollars singapouriens, premier street food étoilé de l'histoire."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel plat de rue mexicain, le taco al pastor, a été créé par des immigrants libanais à Mexico City dans les années 1930 et porte la trace de quelle technique culinaire du Moyen-Orient ?",a:"Le taco al pastor est inspiré du shawarma libanais — la viande de porc marinée est cuite sur une broche verticale (trompo) héritée de la rôtisserie levantine",detail:"Les immigrants libanais au Mexique au XXe siècle adaptent leur shawarma : ils remplacent l'agneau par le porc (plus courant au Mexique), ajoutent la marinade adobo (piments séchés, ananas, épices), conservent la broche verticale. Le taco al pastor est garni d'ananas, coriandre et oignon. C'est l'un des meilleurs exemples de fusion culinaire créée par l'immigration."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel pays consomme le plus de viande par habitant dans le monde, et quel impact la réduction de la consommation de boeuf aurait-elle sur les émissions mondiales de gaz à effet de serre ?",a:"L'Argentine et les États-Unis se disputent la première place (85-90 kg/an/habitant) — remplacer la moitié du boeuf mondial par du poulet réduirait les émissions agricoles de 5 %",detail:"L'élevage bovin représente 14,5 % des émissions mondiales de GES (FAO). Un kilo de boeuf nécessite 15 000 litres d'eau et émet 27 kg de CO2 équivalent. Les Argentins consomment 85 kg de viande par an — record mondial. Le passage à des protéines alternatives (légumineuses, insectes, viande cultivée) est l'un des leviers climatiques les plus efficaces mais aussi les plus culturellement résistants."},
{theme:"gastro",diff:"difficile",type:"q",q:"Quelle est l'origine de la cuisine 'fusion' et comment le chef Wolfgang Puck à Los Angeles dans les années 1980 a-t-il créé un nouveau paradigme gastronomique en mêlant techniques françaises et ingrédients asiatiques ?",a:"Wolfgang Puck ouvre Spago (1982) puis Chinois on Main (1983) à Los Angeles, mariant techniques françaises (fond, réduction) avec ingrédients asiatiques (gingembre, citronnelle, miso) et californiens",detail:"Wolfgang Puck (autrichien formé en France) arrive à Los Angeles et invente la 'California cuisine' fusion : pizza au saumon fumé et caviar, canard à la pékinoise sauce plum. Chinois on Main mêle wok chinois et sauces françaises. Il popularise l'idée que la gastronomie peut mélanger librement les traditions culinaires. Cette approche, critiquée pour son manque de cohérence culturelle, ouvre la voie à toute la cuisine contemporaine."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel régime alimentaire traditionnel méditerranéen, inscrit au patrimoine UNESCO, a été associé dans les études cliniques à une réduction du risque cardiovasculaire et de mortalité ?",a:"Le régime méditerranéen (Grèce, Italie du Sud, Espagne, Maroc) — huile d'olive, légumineuses, poissons, légumes, vin modéré — protège le cœur selon l'étude PREDIMED (2013)",detail:"L'étude PREDIMED (España, 2013) sur 7 447 personnes montre une réduction de 30 % des événements cardiovasculaires avec le régime méditerranéen vs régime pauvre en graisses. Le régime méditerranéen est inscrit au patrimoine UNESCO depuis 2010. L'huile d'olive extra-vierge et les noix sont les éléments les plus protecteurs selon l'étude."},
{theme:"gastro",diff:"difficile",type:"q",q:"Comment l'industrie agroalimentaire a-t-elle transformé l'alimentation mondiale depuis les années 1950, et quelle classification des aliments ultra-transformés (NOVA) permet d'en mesurer l'impact sanitaire ?",a:"La classification NOVA (Carlos Monteiro, 2009) divise les aliments en 4 groupes selon leur degré de transformation — le groupe 4 (ultra-transformés) représente 60 % des calories dans les pays anglophones",detail:"Carlos Monteiro (São Paulo) crée NOVA en 2009 : groupe 1 (aliments bruts), groupe 2 (ingrédients culinaires), groupe 3 (aliments transformés), groupe 4 (ultra-transformés : additifs, émulsifiants, arômes artificiels). Les produits ultra-transformés sont associés à l'obésité, au diabète et aux maladies cardiovasculaires. En France, la part des ultra-transformés atteint 36 % des calories consommées. Le Nutri-Score s'en inspire partiellement."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel repas gastronomique français a été inscrit en 2010 au patrimoine culturel immatériel de l'UNESCO, premier 'repas' au monde à bénéficier de cette reconnaissance ?",a:"Le repas gastronomique des Français",detail:"L'UNESCO reconnaît non pas un plat ou une recette, mais une pratique sociale : la façon dont les Français partagent un repas (ordre des plats, accord mets-vins, convivialité, mise en scène de la table). Les critères incluent l'apéritif, les entrées-plat-fromage-dessert, le choix des vins, et la durée du repas. Cette inscription illustre la gastronomie comme culture et art de vivre, pas seulement comme alimentation."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quelle cuisine nationale, inscrite au patrimoine UNESCO en 2010 avec la France, est la cuisine mexicaine, et quelle région du Mexique est particulièrement citée pour la profondeur de ses traditions culinaires ?",a:"La cuisine traditionnelle mexicaine est inscrite en 2010 — l'UNESCO mentionne spécifiquement la cuisine michoacane comme représentative",detail:"L'inscription de la cuisine mexicaine (2010) porte sur la culture culinaire de Michoacán comme exemple représentatif : les cuisines au bois, les marchés de producteurs, les variétés locales de maïs, les moles ancestraux. La cuisine mexicaine est fondée sur la 'trinité' maïs-haricots-courge (les 'Trois Sœurs') complétée par les piments, la tomate et le cacao."},
{theme:"gastro",diff:"difficile",type:"q",q:"Quel est le système de notation des fromages français par leur teneur en matières grasses, et comment l'AOP (Appellation d'Origine Protégée) protège-t-elle les fromages comme le camembert de Normandie ?",a:"Le camembert de Normandie AOP doit être fabriqué au lait cru, moulé à la louche, en Normandie — à distinguer du camembert fabriqué en France (lait pasteurisé, toute région)",detail:"La France compte 1 200 fromages différents et 45 AOP fromagères. Le camembert de Normandie AOP (lait cru, moulage à la louche en 5 couches minimum, séchage, affinage en Normandie) est radicalement différent du 'camembert fabriqué en France' industriel. La bataille du lait cru vs pasteurisé est récurrente. Le brie de Meaux, le comté, le roquefort et le reblochon figurent parmi les AOP les plus connues."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel chef français Joël Robuchon, détenteur du record mondial d'étoiles Michelin (32 étoiles simultanées), a popularisé quel plat signature que les gourmets s'arrachent dans ses 'Ateliers' mondiaux ?",a:"La purée de pommes de terre de Joël Robuchon — beurre incorporé à hauteur d'un tiers du poids des pommes de terre",detail:"Joël Robuchon (1945-2018) est sacré 'chef du siècle' en 1990 par le Gault & Millau. Sa purée (pommes de terre Ratte, beurre froid incorporé progressivement, lait bouillant) est devenue un mythe culinaire. Ses L'Atelier de Joël Robuchon (concept de bar à sushis appliqué à la gastronomie française) ouvrent à Paris, Tokyo, Las Vegas, Londres, New York."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel procédé culinaire le chef Ferran Adrià popularise-t-il en 2003 avec ses billes de melon et d'olive — technique inspirée de l'industrie alimentaire industrielle ?",a:"La sphérification — enrobage d'un liquide dans une membrane de gel d'alginate pour créer de fausses 'œufs' ou 'billes' qui éclatent en bouche",detail:"Adrià découvre la sphérification (utilisée industriellement depuis les années 1950) et l'applique à la gastronomie. Le procédé : plonger une cuillère de liquide aromatisé + alginate de sodium dans un bain de chlorure de calcium. Une membrane se forme instantanément. Le 'caviar' de melon d'Adrià reproduit visuellement le caviar avec un liquide fruité. Cette technique ouvre la 'cuisine moléculaire'."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel légume, longtemps considéré comme toxique en Europe après son introduction des Amériques, a failli manquer à la table française avant que Parmentier convainque Louis XVI d'en promouvoir la consommation ?",a:"La pomme de terre — Antoine Parmentier obtient de Louis XVI l'autorisation de cultiver la Plaine des Sablons et offre des bouquets de fleurs de pomme de terre à la reine",detail:"Parmentier (1737-1813) goûte la pomme de terre pendant sa captivité en Prusse. En France, elle est considérée comme impropre à la consommation humaine (bonne pour les cochons). Parmentier fait garder ses champs de jour pour attiser la curiosité, puis les laisse sans surveillance la nuit — les paysans 'volent' les tubercules. Le Hachis Parmentier porte son nom."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel pays est le premier producteur et consommateur de café au monde, et dans quelle région africaine la plante Coffea arabica a-t-elle été découverte selon la légende ?",a:"Le Brésil est le premier producteur mondial (40 % de la production) — la légende situe la découverte du café en Éthiopie, dans la région de Kaffa, par un berger nommé Kaldi",detail:"La légende : Kaldi observe ses chèvres gambader après avoir mangé des baies rouges. Un moine en fait une décoction pour rester éveillé la nuit. La plante se répand en Arabie (Yémen, XVe s.), puis dans les cafés ottomans (XVIe s.), puis en Europe (XVIIe s.). Le Brésil produit 40 % du café mondial. L'Éthiopie consomme une grande part de sa production (café préparé en cérémonie ritualisée de 3 heures)."},
{theme:"gastro",diff:"moyen",type:"q",q:"Dans quel pays la culture du riz a-t-elle été domestiquée il y a environ 10 000 ans, et combien de variétés différentes de riz sont cultivées dans le monde aujourd'hui ?",a:"La domestication du riz (Oryza sativa) a eu lieu en Chine (vallée du Yangtsé) il y a ~10 000 ans — il existe plus de 40 000 variétés cultivées",detail:"Le riz est la céréale de base de plus de la moitié de l'humanité. La 'révolution verte' des années 1960 (semences à haut rendement, engrais) a multiplié la production mais réduit la biodiversité. L'IRRI (Institut international de recherche sur le riz, Philippines) conserve 132 000 variétés. Le riz parfumé (basmati indien, jasmin thaïlandais) bénéficie d'indications géographiques."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quelle technique ancestrale japonaise de découpe du thon, le Maguro Kaitai Show, est devenue un spectacle gastronomique, et quels critères font du thon rouge de l'Atlantique (Hon Maguro) le produit le plus cher du marché de Tsukiji/Toyosu ?",a:"Le thon rouge (Hon Maguro) se vente aux enchères à Toyosu — le record est un thon de 276 kg adjugé 3,1 millions de dollars en 2019 par Kiyoshi Kimura (Sushi Zanmai)",detail:"Le thon rouge de l'Atlantique et du Pacifique est en danger d'extinction par surpêche. Sa teneur en gras (otoro, le ventre persillé) et sa rareté en font le produit le plus cher de la gastronomie japonaise. L'otoro (ventre) vaut 200 euros les 100g dans les meilleurs sushiya. Le Kaitai Show (découpe ritualisée d'un thon entier devant le public) est devenu un event gastronomique mondial."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel pays d'Amérique latine a inventé le ceviche, et quel est l'ingrédient acide qui 'cuit' le poisson cru sans chaleur dans cette préparation ?",a:"Le Pérou revendique l'invention du ceviche — le jus de citron vert (ou d'oca dans les versions ancestrales) dénature les protéines du poisson par acidité, simulant une cuisson",detail:"Le ceviche péruvien mêle poisson blanc cru coupé en dés, jus de citron vert, coriandre, oignon rouge, piment rocoto. Le 'leche de tigre' (jus de marinade) est bu comme shot apéritif ou anti-gueule-de-bois. L'acidité (pH bas) dénature les protéines comme la chaleur. Le Chili et l'Équateur disputent aussi la paternité. Le ceviche est inscrit au patrimoine culturel péruvien."},
{theme:"gastro",diff:"difficile",type:"q",q:"Comment la cuisine de l'Inde du Sud diffère-t-elle structurellement de celle du Nord, et quels ingrédients fondamentaux distinguent ces deux grandes traditions culinaires ?",a:"Nord : blé (pain naan, roti), produits laitiers (ghee, paneer), viandes marinées au tandoor — Sud : riz, lentilles (dhal, idli, dosa), huile de coco ou de sésame, piments frais",detail:"La cuisine du Nord (Pendjab, Delhi, Rajasthan) utilise le blé, les produits laitiers (ghee, yaourt, paneer) et les viandes cuites au tandoor. Elle est influencée par les cuisines moghole et persane (biryani, korma). La cuisine du Sud (Kerala, Tamil Nadu, Karnataka) est à base de riz, cocotier (noix, lait, huile), lentilles et piments frais. Le sambar, le rasam et le chutney coconut sont omnipresents."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel accord mets-vins, longtemps considéré comme tabou, a été réhabilité par les sommeliers contemporains — le vin rouge avec le poisson ?",a:"Certains vins rouges légers (pinot noir, gamay frais) s'accordent avec des poissons gras (thon, saumon, sardine) — l'erreur est d'associer un rouge tannique avec un poisson délicat",detail:"La règle 'blanc avec poisson, rouge avec viande' est une simplification. Les tannins des vins rouges puissants réagissent avec les iodes du poisson et créent une saveur métallique désagréable. Mais un pinot noir de Bourgogne léger avec du saumon grillé fonctionne. La règle d'or est 'accord régional' : vin et plat de la même région se marient souvent naturellement (muscadet-huîtres, rosé de Provence-bouillabaisse)."},
{theme:"gastro",diff:"facile",type:"q",q:"Quelle boisson fermentée à base d'orge malté, houblonnée, est la troisième boisson la plus consommée au monde après l'eau et le thé, avec une histoire de plus de 5 000 ans ?",a:"La bière — les premières traces remontent à la Mésopotamie sumérienne (~3400 av. J.-C.) avec l'hymne à Ninkasi (déesse de la bière)",detail:"Les Sumériens avaient une déesse de la bière (Ninkasi). Les Égyptiens en brassaient pour les bâtisseurs de pyramides (ration journalière). Les moines médiévaux perfectionnent les techniques. La révolution industrielle (Pasteur, réfrigération) crée la bière industrielle. Le mouvement craft beer (micro-brasseries) depuis les années 1990 renouvelle la culture brassicole mondiale."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel distillat mexicain à base d'agave, produit exclusivement dans la région de Jalisco et quatre États limitrophes, a obtenu en 1974 sa dénomination d'origine contrôlée ?",a:"La tequila — produite uniquement à partir d'agave bleu Weber (Agave tequilana) dans Jalisco, Guanajuato, Michoacán, Nayarit et Tamaulipas",detail:"La tequila blanco (non vieillie) révèle les arômes d'agave frais. La reposado (2-12 mois en fût) développe des notes boisées. L'añejo (1-3 ans) est complexe et sombre. Le mezcal (toute l'Oaxaca, autres agaves) se distingue de la tequila par ses arômes fumés (cuisson des piñas dans des fosses). Deux marques (Patrón, Don Julio) dominent le marché premium mondial."},
{theme:"gastro",diff:"difficile",type:"q",q:"Comment le mouvement des 'mères lyonnaises' (Paul, Brazier, Blanc) a-t-il façonné la gastronomie lyonnaise au point de faire de Lyon la 'capitale gastronomique du monde' selon Curnonsky ?",a:"Les 'mères' (cuisinières bourgeoises ayant ouvert leurs propres bouchons) ont transmis une cuisine authentique, technique mais accessible qui fonde la réputation mondiale de Lyon",detail:"Curnonsky ('prince des gastronomes') sacre Lyon 'capitale gastronomique du monde' dans les années 1930. Les 'mères' (Mère Brazier, Mère Fillioux, Mère Guy) sont d'anciennes cuisinières de riches familles lyonnaises qui ouvrent leurs propres restaurants. Leur cuisine : quenelles de brochet, poulet demi-deuil, tablier de sapeur, gratins dauphinois. Paul Bocuse est l'héritier direct de cette tradition."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel condiment japonais, pâte de soja fermentée avec du sel et un champignon (Aspergillus oryzae), existe en plusieurs couleurs et saveurs selon la durée de fermentation ?",a:"Le miso — blanc (shiro, 1-3 mois, doux), jaune (shinshu, 6 mois) et rouge (aka, 1-3 ans, intense et salé)",detail:"Le miso est la base de la soupe miso (dashi + miso + tofu + wakame). Il contient des probiotiques et des acides aminés. Le koji (Aspergillus oryzae) est le champignon miracle de la cuisine japonaise — il fermente aussi le saké, le vinaigre de riz et la sauce soja. René Redzepi et les chefs du monde entier l'utilisent désormais pour fermenter viandes, légumes et céréales."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel fromage suisse à pâte dure, produit dans les cantons de Fribourg, Vaud, Neuchâtel, Jura et Berne, bénéficie de l'AOP la plus stricte — avec une zone de production délimitée au mètre près ?",a:"Le Gruyère AOP — affiné 5 à 18 mois en cave, produit avec du lait cru de vaches nourries au foin et pâturage",detail:"Le Gruyère AOP est produit dans ~180 fromageries dans les Préalpes suisses. Le lait (400 litres pour une meule de 35 kg) provient de vaches nourries exclusivement au fourrage naturel — l'ensilage est interdit. L'affinage développe des cristaux de tyrosine (saveur de noisette). La dispute Gruyère France vs Gruyère Suisse a été tranchée en faveur de la Suisse par les tribunaux américains en 2021."},
{theme:"gastro",diff:"difficile",type:"q",q:"Quelle controverse scientifique oppose 'terroir' (le sol et le lieu déterminent la saveur) et 'technique' (le savoir-faire du vigneron est prépondérant) dans la viticulture mondiale ?",a:"Le débat terroir vs technique est fondamental — les défenseurs du terroir (Bourgogne) affirment que le sol transmet des minéraux au vin ; les scientifiques peinent à prouver ce transfert chimique direct",detail:"Le terroir (sol, sous-sol, microclimat, exposition) est un concept français sans équivalent exact ailleurs. Des études montrent que les sommeliers les plus experts identifient les terroirs au goût — mais en aveugle, les résultats sont moins convaincants. La Bourgogne (où 1 mètre de distance peut changer l'appellation et multiplier le prix par 10) est le cas extrême. Le débat oppose romantisme culturel et rationalisme scientifique."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel plat national géorgien, le khinkali (ravioli au bouillon), est emblématique d'une cuisine du Caucase qui a influencé la Russie et la Turquie et reste méconnue en Occident ?",a:"Le khinkali est un grand ravioli plissé (19 plis selon la tradition) contenant de la viande et du bouillon — on le tient par le nœud, on mord et on aspire le jus avant de manger",detail:"La cuisine géorgienne (Géorgie du Caucase) est l'une des plus complexes du monde : le satsivi (poulet sauce noix aux épices), le chakhokhbili (ragoût de poulet aux herbes), le pkhali (boulettes aux noix et épinards), l'adjika (pâte de piment aux noix). La Géorgie est l'un des plus anciens pays viticoles (8 000 ans, amphores kvevri enterrées)."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel aliment, surnommé 'or vert', est produit à 80 % au Mexique mais consommé à 50 % aux États-Unis, et a connu une multiplication par 10 de son prix en 30 ans ?",a:"L'avocat (Persea americana) — la demande mondiale explose depuis les années 2010, entraînant déforestation et conflits avec les cartels mexicains dans le Michoacán",detail:"L'avocat était un fruit marginal avant la mode 'healthy eating' des années 2010 (avocat toast, guacamole). Le Mexique produit 30 % de la production mondiale (2,4 millions de tonnes). La demande explosive cause déforestation dans le Michoacán et enrichit les cartels Michoacán. Sa culture est très gourmande en eau (1 000 litres par kilo). Les pays producteurs (Colombie, Pérou, Maroc) tentent de concurrencer le Mexique."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quelle cuisine juive ashkénaze, née en Europe centrale et orientale, a été préservée et transplantée aux États-Unis par les immigrants du XIXe-XXe siècle, donnant naissance à des institutions comme le deli new-yorkais ?",a:"La cuisine ashkénaze (bagels, lox, pastrami, matzo ball soup, rugelach) a trouvé à New York son expression la plus célèbre — chez Katz's Delicatessen (ouvert en 1888)",detail:"La cuisine ashkénaze est façonnée par les contraintes de la cacherout (séparation viandes/laitages), les hivers rigoureux d'Europe de l'Est (plats mijotés) et la pauvreté (abats valorisés). À New York, les immigrants juifs de l'Est européen créent le deli (épicerie-restaurant) avec pastrami sur rye, brisket, pickles. Katz's Deli est immortalisé par la scène de 'Quand Harry rencontre Sally' (1989)."},
{theme:"gastro",diff:"difficile",type:"q",q:"Comment le guide Michelin a-t-il été créé par les frères Michelin pour vendre des pneus, et par quel processus est-il devenu l'arbitre mondial de la gastronomie de luxe ?",a:"Créé en 1900 pour aider les automobilistes à voyager (garages, stations, hôtels), le Michelin ajoute des étoiles restaurants en 1926 — une étoile, puis deux (1931), puis trois (1933)",detail:"André et Édouard Michelin distribuent gratuitement leur guide aux garagistes (100 000 exemplaires en 1900). Ils supposent que si les gens voyagent plus, ils useront leurs pneus. En 1920, Michelin constate ses guides utilisés comme cales et décide de les vendre. Les étoiles (1 = bonne table, 2 = vaut le détour, 3 = vaut le voyage) sont introduites progressivement. En 2024, le Michelin couvre 45 pays. Des chefs redonnent leurs étoiles (Marco Pierre White, Joël Robuchon à la retraite) pour fuir la pression."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel chef brésilien, Alex Atala, utilise les ingrédients de l'Amazonie (fourmis, tapioca, cupuaçu) pour promouvoir la biodiversité amazonienne dans la gastronomie internationale depuis son restaurant D.O.M. à São Paulo ?",a:"Alex Atala (né en 1968) — D.O.M. classé régulièrement dans les 50 meilleurs restaurants mondiaux, pionnier de la cuisine amazonienne de haute gastronomie",detail:"Atala utilise des ingrédients indigènes amazoniens : la formiga Içá (fourmi géante au goût de citronnelle), le jambu (plante qui engourdit la langue), le pupunha (palmier), le tucupi (jus de manioc fermenté toxique cru). Son travail valorise les produits autochtones, combat la déforestation en montrant leur valeur gastronomique. Il collabore avec des communautés indigènes pour l'approvisionnement."},
{theme:"gastro",diff:"facile",type:"q",q:"Quelle huile, extraite des olives, est la graisse culinaire centrale du régime méditerranéen, et quelle mention 'extra-vierge' indique qu'elle a été extraite par simple pression à froid avec une acidité inférieure à 0,8 % ?",a:"L'huile d'olive extra-vierge (HOEV) — extraite mécaniquement à froid, sans solvant, acidité ≤ 0,8 %, préservant les polyphénols antioxydants",detail:"L'Espagne produit 45 % de l'huile d'olive mondiale (Andalousie). L'Italie et la Grèce suivent. La mention 'extra-vierge' est protégée : extraction mécanique uniquement (pas de solvant chimique), acidité ≤ 0,8 %. La fraude est massive (jusqu'à 80 % des huiles 'extra-vierges' italiennes importées aux USA seraient adultérées selon les études). Les polyphénols (oleocanthal) ont des propriétés anti-inflammatoires prouvées."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quelle préparation fermentée à base de poisson, utilisée dans l'Antiquité romaine comme condiment universel, a resurgi sous différentes formes dans les cuisines du monde entier ?",a:"Le garum romain — ancêtre de la sauce de poisson asiatique (nuoc-mâm vietnamien, nam pla thaïlandais), de la colatura di alici italienne et du Worcestershire sauce britannique",detail:"Le garum (sauce de poisson fermentée, intestins et sang de poisson macérés dans le sel) était le condiment universel romain — équivalent du sel+umami. Produit à Pompéi, Carthagène, en Bretagne. La colatura di alici (Cetara, Campanie) en est la version moderne directe. Le nuoc-mâm et le nam pla sont ses cousins asiatiques indépendants mais similaires. Le Worcestershire sauce (1837) contient des anchois fermentés."},
{theme:"gastro",diff:"difficile",type:"q",q:"Quel paradoxe alimentaire les études épidémiologiques révèlent-elles sur les Français — forte consommation de graisses saturées associée à une faible mortalité cardiovasculaire — et comment les chercheurs expliquent-ils ce 'French Paradox' ?",a:"Le paradoxe français (Serge Renaud, 1991) s'explique possiblement par la consommation modérée de vin rouge (resvératrol), les repas structurés, les portions réduites et la qualité des aliments",detail:"Serge Renaud (INSERM) publie le 'French Paradox' dans The Lancet en 1991 : les Français mangent autant de graisses saturées que les Américains mais ont 2,5 fois moins d'infarctus. Hypothèses : vin rouge (resvératrol, polyphénols), repas longs et partagés (moins de grignotage), moindre consommation d'ultra-transformés, fromages artisanaux vs industriels. Le paradoxe s'estompe à mesure que la France adopte les habitudes alimentaires anglo-saxonnes."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel chef britannique, auteur de 'The Naked Chef' et de campagnes contre la malbouffe dans les cantines scolaires anglaises, est devenu l'une des personnalités culinaires les plus influentes du monde ?",a:"Jamie Oliver (né en 1975)",detail:"Jamie Oliver popularise une cuisine simple, saine et accessible depuis 'The Naked Chef' (1999). Sa campagne 'Feed Me Better' (2005) contraint le gouvernement Blair à investir 280 millions de livres dans l'amélioration des repas scolaires. Il ouvre sa chaîne Jamie's Italian (30 restaurants) — qui fait faillite en 2019. Sa fondation continue de lutter contre l'obésité infantile."},
{theme:"gastro",diff:"facile",type:"q",q:"Quelle pâtisserie viennoise, ancêtre du croissant français, était originellement en forme de croissant de lune et aurait été inventée pour célébrer la victoire sur les Ottomans à Vienne en 1683 ?",a:"Le Kipferl autrichien — le croissant français naît quand August Zang ouvre sa boulangerie viennoise à Paris en 1909 et adapte la recette en pâte feuilletée",detail:"La légende (non vérifiée) : les boulangers de Vienne, travaillant la nuit, entendent les Ottomans creuser des tunnels et donnent l'alerte. En récompense, ils obtiennent le privilège de fabriquer des pâtisseries en forme de croissant (symbole ottoman). Le kipferl autrichien devient le croissant français grâce à Marie-Antoinette (selon une autre légende) ou à August Zang."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel phénomène dit 'food gentrification' observe-t-on quand les cuisines pauvres (tacos, ramen, açaï) sont adoptées par les classes aisées et revendues à des prix multipliés par 10 ?",a:"La 'food gentrification' ou appropriation culinaire transforme des nourritures populaires et économiques en produits de luxe — le ramen coûte 3 € à Tokyo et 18 € à Paris",detail:"Le ramen japonais (plat d'ouvriers, 200 yens à Tokyo) atteint 18-25 euros dans les restaurants branchés parisiens. Le taco mexicain populaire devient 'taqueria artisanale' à 7 euros. L'açaï brésilien (fruit du palmier, nourriture des pêcheurs d'Amazonie) devient le 'bowl' à 12 euros de la classe aisée urbaine. Ce phénomène enrichit les restaurateurs mais coupe parfois les cuisines de leurs communautés d'origine."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quelle tradition culinaire brésilienne, héritée de l'esclavage africain, a produit la feijoada — ragoût de haricots noirs et viandes — en utilisant les morceaux de porc dédaignés par les maîtres ?",a:"La feijoada est née dans les senzalas (quartiers d'esclaves) avec les restes de porc (oreilles, pieds, queue, langue) mélangés aux haricots noirs africains — devenue plat national brésilien",detail:"Les esclaves africains au Brésil recevaient les morceaux de porc jugés indignes (oreilles, pieds, queue, morceaux gras). Ils les cuisinaient avec des haricots noirs (lembranças d'Afrique). La feijoada completa est servie avec chou kale, oranges (coupent le gras), riz blanc, farofa (farine de manioc grillée). Devenue plat national, elle incarne la tragédie et la résistance culturelle."},
{theme:"gastro",diff:"difficile",type:"q",q:"Comment la Révolution française a-t-elle contribué à la naissance du restaurant moderne à Paris, en libérant les cuisiniers des maisons aristocratiques sur le marché ?",a:"La chute de l'aristocratie libère des milliers de cuisiniers formés qui ouvrent leurs propres établissements à Paris — la carte et le service à l'assiette remplacent le service à la française",detail:"Avant 1789, les cuisiniers professionnels travaillaient dans les maisons nobles ou dans des corporations strictement réglementées. La Révolution supprime les corporations et disperse les domestiques des familles émigrées. Des cuisiniers comme Méot, Véry et Beauvilliers ouvrent des restaurants à Paris. Le 'service à la française' (tous les plats sur la table) est remplacé par le 'service à la russe' (plats apportés successivement) — qui est l'ancêtre du menu contemporain."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel fruit tropical, originaire d'Amérique centrale, est le principal ingrédient du guacamole mexicain et est désormais cultivé sur 6 continents pour satisfaire la demande mondiale croissante ?",a:"L'avocat (Persea americana) — domestiqué au Mexique il y a 5 000 ans, il est aujourd'hui le fruit dont la valeur à l'export augmente le plus rapidement au monde",detail:"Les Aztèques consommaient l'avocat (ahuacatl) depuis des millénaires. Il arrive en Europe au XVIe siècle mais reste marginal jusqu'aux années 2010. La 'avocado toast' sur Instagram et la mode healthy font exploser sa demande. Le Mexique (Michoacán) produit 30 % du volume mondial. Sa culture est controversée : 1 kg d'avocat nécessite 1 000 litres d'eau."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel chef américaine, Julia Child, a popularisé la cuisine française aux États-Unis avec son émission 'The French Chef' (1963-1973) et son livre 'Mastering the Art of French Cooking' co-écrit avec Simone Beck ?",a:"Julia Child (1912-2004) — première émission de cuisine à la télévision américaine en couleur, elle apprend aux Américains la cuisine française avec humour et sans complexe",detail:"Julia Child découvre la gastronomie française à Paris avec son mari diplomate. Son livre 'Mastering the Art of French Cooking' (1961, avec Simone Beck et Louisette Bertholle) est refusé par plusieurs éditeurs avant de devenir un best-seller. Son émission PBS (1963) révolutionne la télévision culinaire. Elle est immortalisée par Meryl Streep dans le film Julie & Julia (2009)."},
{theme:"gastro",diff:"difficile",type:"q",q:"Quelle est l'origine de la sauce béchamel, et pourquoi les disputes de paternité entre la France et l'Italie illustrent-elles la complexité des échanges culinaires entre les deux pays depuis Catherine de Médicis ?",a:"La béchamel (roux + lait) est attribuée au marquis Louis de Béchameil (XVIIe s.) mais des sauces similaires existaient déjà en Italie — les Médicis auraient apporté des recettes à la cour de France en 1533",detail:"Selon la légende (douteuse), Catherine de Médicis apporte en 1533 ses cuisiniers florentins à Paris en épousant Henri II, transmettant ainsi la cuisine italienne à la France. Les historiens contestent cette version — la gastronomie française se développe indépendamment. La béchamel (Béchameil, maître d'hôtel de Louis XIV) est une création française. Mais les échanges culinaires Franco-italiens sont réels et continus depuis la Renaissance."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel pays du Proche-Orient est considéré comme le berceau du houmous, et pourquoi ce plat simple (pois chiches écrasés, tahini, citron, ail) est-il au centre d'une 'guerre culinaire' entre Liban, Israël et Palestine ?",a:"Le houmous est revendiqué par le Liban, Israël, la Palestine et la Syrie — il est inscrit au patrimoine libanais mais préparé par toutes les cultures de la région depuis des siècles",detail:"Le Liban a tenté d'enregistrer le houmous comme patrimoine exclusivement libanais (2008), provoquant la protestation d'Israël et d'autres pays arabes. Le mot arabe hummus signifie simplement 'pois chiches'. Le plat est préparé identiquement dans tout le Levant depuis des siècles. Cette 'guerre du houmous' illustre comment la nourriture devient enjeu d'identité nationale dans un contexte politique tendu."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel pays consomme le plus de fromage par habitant dans le monde, et combien de variétés différentes de fromages produit la France ?",a:"La France est le 3e consommateur mondial (27 kg/an/habitant) derrière le Danemark et l'Islande — mais elle produit plus de 1 200 fromages différents",detail:"De Gaulle aurait dit : 'Comment voulez-vous gouverner un pays qui a 246 variétés de fromages ?' (le chiffre varie selon les sources). La France compte 45 AOP fromagères. Les fromages AOP les plus vendus : le comté, le camembert, le brie, le roquefort, le reblochon. La France est le 2e exportateur mondial de fromages (après l'Allemagne)."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel mouvement de fast food japonais, les ramen shops, est devenu un phénomène culturel mondial, et quelle ville japonaise est considérée comme la 'capitale du ramen' ?",a:"Sapporo (Hokkaido) est célèbre pour son ramen miso — mais Hakata (Fukuoka) concourt avec son ramen tonkotsu, et Tokyo pour son shoyu ramen",detail:"Le ramen est introduit au Japon par des immigrants chinois au XIXe s. Chaque région a son style : Tokyo (shoyu, bouillon soja clair), Sapporo (miso, riche), Hakata (tonkotsu, os de porc cuits 12h, opaque et crémeux), Kitakata (shoyu léger). Le ramen instantané (Nissin, inventé par Momofuku Ando en 1958) est vendu à 100 milliards de portions/an dans le monde. Le musée du ramen à Yokohama reçoit 2 millions de visiteurs/an."},
{theme:"gastro",diff:"difficile",type:"q",q:"Comment Anthony Bourdain, auteur de 'Kitchen Confidential' (2000), a-t-il transformé la perception publique du métier de cuisinier et de la culture des cuisines professionnelles ?",a:"Bourdain révèle les coulisses brutales des cuisines (hiérarchie militaire, alcool, drogues, burns) tout en célébrant la street food mondiale — il démocratise le tourisme gastronomique",detail:"'Kitchen Confidential' (2000) expose les realités des brigades de cuisine : 16h de travail, alcoolisme endémique, hiérarchie militaire, secrets des restaurants. Bourdain romantise aussi ces conditions. Son émission 'No Reservations' puis 'Parts Unknown' (CNN) valorise la street food mondiale : pho vietnamien, dim sum hongkongais, offal britannique. Sa mort par suicide en 2018 à Strasbourg choque le monde culinaire."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel pays d'Europe du Nord a inventé le smörgåsbord, buffet froid de harengs marinés, fromages, viandes et pains qui a inspiré les buffets mondiaux ?",a:"La Suède — le smörgåsbord ('table à sandwichs') est un repas festif traditionnel où l'on se sert soi-même, centré sur le hareng mariné sous toutes ses formes",detail:"Le smörgåsbord suédois traditionnel inclut : hareng mariné (surströmming pour les amateurs de sensations fortes), gravlax (saumon mariné au sel et aneth), köttbullar (boulettes de viande), Jansson's frestelse (gratin d'anchois et pommes de terre), fromages et pains de seigle. Le concept de 'buffet à volonté' qu'on retrouve dans les hôtels du monde entier en est directement inspiré."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quelle est l'origine de la cuisine créole de Louisiane, et comment mélange-t-elle les influences françaises, espagnoles, africaines et amérindiennes pour créer un style unique ?",a:"La cuisine créole de Nouvelle-Orléans est née au XVIIIe siècle de la rencontre entre colons français, esclavage africain, héritage espagnol et techniques amérindiennes (filé, gombo)",detail:"Les Français apportent les techniques (roux, fond), les Africains le gombo (okra, base du plat éponyme), les Amérindiens le filé (poudre de feuilles de sassafras épaississant) et les crevettes locales, les Espagnols le chorizo et les tomates. Le résultat : gumbo, jambalaya, étouffée, beignets, pain perdu. La Nouvelle-Orléans est la seule ville américaine avec une véritable cuisine régionale distincte."},
{theme:"gastro",diff:"difficile",type:"q",q:"Pourquoi le sucre est-il passé en quelques siècles du statut d'épice de luxe réservée aux apothicaires à celui de produit de masse responsable d'une crise de santé publique mondiale ?",a:"La canne à sucre des Amériques, cultivée par les esclaves, rend le sucre abordable au XVIIIe s. — sa consommation mondiale passe de 1 kg/an/habitant en 1800 à 25 kg aujourd'hui",detail:"Au Moyen Âge, le sucre (importé d'Arabie) est une épice médicale à 10x le prix du poivre. La canne à sucre aux Antilles (XVIe-XVIIe s.), cultivée par des millions d'esclaves africains, fait s'effondrer les prix. L'industrie du sucre raffine et purifie (sucre blanc, sans nutriments). Les sodas (Coca-Cola, 1886), les confiseries industrielles et les aliments ultra-transformés font exploser la consommation. L'OMS recommande moins de 25g/jour ; les Américains en consomment 100g."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel plat espagnol, riz safrané aux fruits de mer cuit dans une large poêle plate, est originaire de la région de Valence et non du littoral méditerranéen comme on le croit souvent ?",a:"La paella valenciana — originellement à base de poulet, lapin, haricots verts et tomate, sans fruits de mer, cuite au feu de bois de pin dans la Albufera valencienne",detail:"La paella authentique valencienne (lapin, poulet, haricots verts, garrofón, tomate, safran) est très différente de la paella aux fruits de mer que les touristes commandent sur les côtes espagnoles. La poêle large (paella = poêle en valencien) permet l'évaporation rapide et la formation du socarrat (croûte dorée au fond). La cuisson traditionnelle se fait en plein air au feu de bois d'oranger."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel pays du Maghreb a inscrit le couscous au patrimoine immatériel de l'UNESCO en 2020, et pourquoi cette inscription a-t-elle nécessité une candidature commune de 5 pays ?",a:"Maroc, Algérie, Tunisie, Mauritanie et Libye ont présenté une candidature commune — le couscous est inscrit comme patrimoine culturel immatériel partagé de l'humanité",detail:"Le couscous (semoule de blé dur roulée à la main, cuite à la vapeur) est le plat identitaire du Maghreb. Chaque pays a ses variantes : couscous tfaya marocain (sucré-salé), bou saâda algérien, m'hammes tunisien aux poulpes. La candidature unique évite un conflit de paternité type 'guerre du houmous'. La semoule roulée à la main est une technique transmise de mère en fille depuis des siècles."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel scientifique britannique Nicholas Kurti et quel physicien français Hervé This ont fondé dans les années 1990 la gastronomie moléculaire comme discipline académique étudiant les transformations chimiques et physiques lors de la cuisson ?",a:"Nicholas Kurti (Budapest-Oxford) et Hervé This (Paris) co-fondent la gastronomie moléculaire en 1992 lors d'un atelier à Erice (Sicile)",detail:"Kurti présente en 1969 une conférence mémorable à la Royal Institution : 'Le physicien dans la cuisine' — il prépare une meringue au four à micro-ondes et montre qu'un homme peut mesurer la température du soleil mais pas l'intérieur d'un soufflé. Hervé This publie ses 'Notes gastronomiques' depuis 1985, puis 'Traité élémentaire de cuisine'. Il déconstruit les recettes traditionnelles en principes physico-chimiques."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel légume, symbole de la cuisine méditerranéenne, était considéré comme la nourriture des pauvres au Moyen Âge car poussant proche du sol (et donc du diable), avant d'être réhabilité par la haute gastronomie ?",a:"L'ail (Allium sativum) — méprisé par la noblesse médiévale (odeur jugée vulgaire), adoré en Méditerranée, Asie et Amérique latine",detail:"L'ail est cultivé depuis 5 000 ans en Asie centrale. En Europe médiévale, la noblesse le dédaigne (odeur associée aux classes laborieuses). Les moines l'interdisent parfois comme excitant charnel. En Méditerranée, il n'a jamais cessé d'être la base de l'alimentation. Son composé actif (allicine, libérée par l'écrasement) a des propriétés antibactériennes documentées. La France produit l'ail rose de Lautrec (Label Rouge)."},
{theme:"gastro",diff:"difficile",type:"q",q:"Quelle est la différence entre la cuisine de l'Asie du Sud-Est continentale (Thaïlande, Vietnam, Cambodge) et insulaire (Indonésie, Philippines, Malaisie) dans leurs usages des graisses, des herbes et des techniques de cuisson ?",a:"Continentale : herbes fraîches abondantes (citronnelle, basilic thaï, menthe), sauces de poisson fermentées, wok rapide — Insulaire : noix de coco (lait, huile), épices séchées (clou de girofle, muscade des Moluques), cuissons longues",detail:"La cuisine continentale (Vietnam, Thaïlande, Laos) utilise herbes fraîches, citron vert, piments frais, sauces fermentées (nuoc-mâm, nam pla) et cuissons rapides. L'insulaire (Indonésie, Malaisie, Philippines) est marquée par le lait de coco (rendang, nasi lemak), les épices séchées des Moluques (clou de girofle, muscade — raison des guerres coloniales hollandaises) et la sauce de soja fermentée (kecap manis)."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quel chef mexicaine, Enrique Olvera, a propulsé la cuisine mexicaine dans le classement des 50 meilleurs restaurants mondiaux avec son restaurant Pujol à Mexico City, centré sur la mole madre vieillie pendant des années ?",a:"Enrique Olvera (né en 1976) — Pujol classé parmi les 10 meilleurs restaurants mondiaux, sa 'mole madre' vieillit en continu depuis 2013",detail:"Olvera réinterprète la cuisine mexicaine traditionnelle avec des techniques modernes. Sa 'mole madre' (mère) est une sauce en évolution permanente depuis 2013 — chaque jour une nouvelle préparation est ajoutée à l'ancienne, créant une complexité croissante comme un levain vivant. Il ouvre aussi Atla à New York. Il forme une génération de chefs mexicains qui revendiquent leur identité culinaire face à la mondialisation."},
{theme:"gastro",diff:"facile",type:"q",q:"Quelle boisson chaude aux propriétés stimulantes, découverte en Éthiopie et d'abord réservée aux moines soufis pour leurs veilles nocturnes, a envahi le monde en quelques siècles pour devenir la 2e marchandise mondiale après le pétrole ?",a:"Le café — introduit dans les cafés ottomans de Constantinople au XVIe s., puis dans les coffeehouses londoniens au XVIIe s., il révolutionne les habitudes sociales mondiales",detail:"Les coffeehouses de Londres (XVIIe s.) sont surnommés 'universités du sou' (un sou pour entrer, cafés à volonté). Llyod's of London naît dans un coffeehouse. La Bourse de Londres aussi. Le café décale les sociétés de la bière/alcool (alimentation médiévale) vers la caféine (vigilance) — certains historiens y voient un facteur du Siècle des Lumières. Le marché mondial du café représente 200 milliards de dollars."},
{theme:"gastro",focus:"allemagne",diff:"facile",type:"q",q:"Quelles sont les trois bières allemandes les plus emblématiques et selon quelle loi sont-elles brassées ?",a:"Weizenbier, Pilsner, Märzen — selon la Reinheitsgebot (loi de pureté de 1516)",detail:"La Reinheitsgebot (édit bavarois de 1516) n'autorise que l'eau, le malt d'orge et le houblon. C'est la première réglementation alimentaire au monde encore en vigueur. L'Allemagne produit plus de 5 000 bières différentes. L'Oktoberfest de Munich (6 millions de visiteurs/an) en est la vitrine mondiale."},
{theme:"gastro",focus:"allemagne",diff:"moyen",type:"q",q:"Quelle spécialité charcutière allemande, née à Francfort au XVe siècle, a conquis le monde entier ?",a:"La Frankfurter Würstchen (frankfurter)",detail:"Inventée à Francfort vers 1484, cette saucisse de porc et bœuf fumée, fine et longue, est protégée par une AOP européenne. Elle ne peut être produite qu'à Francfort. Exportée aux États-Unis par des immigrants allemands au XIXe s., elle devient le hot-dog américain — transformation culinaire et culturelle majeure."},
{theme:"gastro",focus:"allemagne",diff:"difficile",type:"q",q:"Qu'est-ce que la culture du Brotzeit et quelle place occupe le pain dans la gastronomie allemande ?",a:"Le Brotzeit (« temps du pain ») est un repas léger à base de pain, charcuteries et fromages — l'Allemagne produit plus de 3 000 variétés de pain",detail:"Le pain allemand (Brot) est inscrit au patrimoine culturel immatériel de l'UNESCO depuis 2015. Seigle, épeautre, graines de tournesol, levain — la diversité est sans égale. Le Pumpernickel (pain de seigle complet) de Westphalie, le Brezel bavarois ou le Vollkornbrot sont emblématiques d'une culture du pain unique au monde."},
{theme:"nature",diff:"facile",type:"q",q:"Quel mammifère terrestre est le plus rapide du monde, capable d'atteindre 110 km/h sur de courtes distances dans les savanes africaines ?",a:"Le guépard (Acinonyx jubatus)",detail:"Le guépard accélère de 0 à 100 km/h en 3 secondes — plus vite qu'une Ferrari. Mais cette vitesse ne dure que 20-30 secondes. Il doit se reposer 30 minutes après une chasse pour refroidir son corps. Son succès de chasse est de 50 % (le meilleur chez les grands félins). Sa population mondiale a chuté à ~7 000 individus, menacés par la perte d'habitat."},
{theme:"nature",diff:"facile",type:"q",q:"Quel animal marin produit les sons les plus puissants du règne animal, ses chants pouvant traverser des milliers de kilomètres d'océan ?",a:"La baleine bleue (Balaenoptera musculus) — ses appels atteignent 188 décibels et peuvent parcourir 1 600 km",detail:"La baleine bleue est aussi le plus grand animal ayant jamais existé sur Terre (jusqu'à 30 m, 180 tonnes). Son cœur pèse 600 kg. Son cri (infra-sons, 10-40 Hz) dépasse le bruit d'un réacteur d'avion. Ces sons servent à la communication entre individus séparés par des milliers de kilomètres. Sa population a chuté de 99 % après la chasse industrielle — de 300 000 à ~10 000 individus."},
{theme:"nature",diff:"facile",type:"q",q:"Quel insecte accomplit la migration animale la plus longue au monde par rapport à sa taille, voyageant de 14 000 km entre le Canada, le Mexique et retour en 4 générations ?",a:"Le monarque (Danaus plexippus) — papillon qui migre du Canada vers les forêts de conifères du Michoacán mexicain",detail:"Le monarque est l'unique papillon à effectuer une migration aller-retour sur plusieurs générations. Les individus qui reviennent au Canada ne sont pas ceux qui avaient quitté le Mexique — ce sont leurs arrière-petits-enfants. Ils retrouvent pourtant exactement les mêmes arbres. Ce phénomène de navigation épigénétique reste mal compris. La population a chuté de 80 % en 20 ans."},
{theme:"nature",diff:"facile",type:"q",q:"Quel primate non-humain partage 98,7 % de son ADN avec l'être humain et utilise des outils, fait la guerre et manifeste des comportements empathiques proches des nôtres ?",a:"Le chimpanzé commun (Pan troglodytes)",detail:"Jane Goodall observe en 1960 les chimpanzés de Gombe (Tanzanie) fabriquant et utilisant des outils (brins d'herbe pour attraper les termites). Les chimpanzés font la guerre inter-groupes, pratiquent la politique (alliances, trahisons), transmettent culturellement des comportements (façons de casser les noix). Leur population sauvage a chuté de 1 million à ~200 000 individus."},
{theme:"nature",diff:"moyen",type:"q",q:"Comment le poulpe démontre-t-il une forme d'intelligence distribuée — neuf cerveaux et 2/3 de ses neurones dans ses tentacules — et quelle capacité de camouflage possède-t-il ?",a:"Le poulpe a 1 cerveau central + 8 ganglions nerveux autonomes dans ses bras — il peut changer couleur et texture en 200 millisecondes grâce à ses chromatophores",detail:"Les 2/3 des 500 millions de neurones du poulpe sont dans ses bras, qui agissent semi-indépendamment. Son cerveau central donne des ordres généraux, les bras décident localement. Les chromatophores (cellules pigmentées élastiques) permettent de mimer instantanément texture et couleur — corail, sable, algues. Les poulpes résolvent des labyrinthes, jouent avec des objets et reconnaissent les individus humains."},
{theme:"nature",diff:"moyen",type:"q",q:"Quelle espèce d'oiseau, le martinet noir, passe presque toute sa vie en vol — dormant, se nourrissant et s'accouplant dans les airs — et peut voler 10 mois sans se poser ?",a:"Le martinet noir (Apus apus) — il atterrit uniquement pour nicher, battant le record de vol continu chez les oiseaux migrateurs",detail:"Découvert par bagues et GPS, le martinet noir peut rester en vol 10 mois consécutifs. Il dort en planant à haute altitude (réduction métabolique). Il boit, mange (insectes en plein vol) et s'accouple dans les airs. La vitesse de pointe est de 170 km/h. Ses pattes sont si atrophiées (apo'us = sans pieds en grec) qu'il ne peut marcher — il se laisse tomber du nid pour décoller."},
{theme:"nature",diff:"moyen",type:"q",q:"Quel animal est le seul mammifère à pondre des œufs, possède un bec de canard, une queue de castor, des pattes de loutre et est capable de détecter les champs électriques de ses proies ?",a:"L'ornithorynque (Ornithorhynchus anatatus) d'Australie — monotrème qui pond des œufs et produit du venin",detail:"L'ornithorynque est l'un des deux monotrèmes (avec l'échidné). Il pond 1-3 œufs et allaite ses petits par transpiration (pas de mamelons). Son bec détecte les champs électriques des muscles de ses proies dans l'eau — 40 000 récepteurs électrorécepteurs. Les mâles ont un ergot venimeux sur les pattes arrière. Quand les premiers spécimens arrivèrent en Grande-Bretagne (1799), les scientifiques crurent à une farce."},
{theme:"nature",diff:"difficile",type:"q",q:"Quelle espèce de méduse (Turritopsis dohrnii) est biologiquement immortelle, et par quel mécanisme cellulaire contourne-t-elle la mort programmée ?",a:"La méduse immortelle se dédifférencie après avoir atteint la maturité sexuelle et revient à l'état de polype (stade juvénile) — la transdifférenciation cellulaire inverse le vieillissement",detail:"Turritopsis dohrnii, 4-5 mm de diamètre, peut inverser son cycle de vie après stress, maladie ou vieillesse. Ses cellules adultes se reprogramment en cellules souches (transdifférenciation) et reconstituent un nouvel individu juvénile. Ce cycle peut théoriquement se répéter indéfiniment. Les chercheurs l'étudient pour comprendre la reprogrammation cellulaire et ses applications potentielles en médecine."},
{theme:"nature",diff:"difficile",type:"q",q:"Comment les fourmis coupeuses de feuilles (Atta) pratiquent-elles l'agriculture depuis 50 millions d'années, et quel champignon cultivent-elles dans leurs colonies de millions d'individus ?",a:"Les fourmis Atta cultivent un champignon (Leucoagaricus gongylophorus) en le nourrissant de feuilles découpées — elles produisent aussi des antibiotiques pour protéger leur culture",detail:"Les fourmis coupeuses de feuilles ne mangent pas les feuilles — elles les utilisent comme substrat pour cultiver un champignon dont elles se nourrissent. Elles ont développé en parallèle des bactéries (Streptomyces) produisant des antifongiques pour protéger leur culture des parasites. Cette co-évolution de 50 millions d'années est l'exemple le plus élaboré d'agriculture non-humaine."},
{theme:"nature",diff:"facile",type:"q",q:"Quel arbre américain est l'être vivant le plus ancien individuellement connu, avec plus de 5 000 ans d'âge, dans les Montagnes Blanches de Californie ?",a:"Le pin de Bristlecone (Pinus longaeva) 'Mathusalem' — situé dans les White Mountains de Californie, son emplacement exact est gardé secret pour sa protection",detail:"'Mathusalem' a germé vers 2832 av. J.-C. — il était déjà centenaire quand les pyramides de Gizeh ont été construites. Sa longévité s'explique par les conditions extrêmes (altitude 3 000 m, froid, sécheresse) qui ralentissent le métabolisme et l'attaque des pathogènes. Les cernes de ses contemporains ont permis de calibrer la datation au carbone 14."},
{theme:"nature",diff:"facile",type:"q",q:"Quel champignon géant de l'Oregon (Armillaria ostoyae), s'étendant sur 9 km² et pesant 600 tonnes, est considéré comme le plus grand organisme vivant de la planète ?",a:"Le champignon du miel d'Oregon (Armillaria ostoyae) — surnommé 'Humongous Fungus', il s'étend sur 965 hectares dans la forêt nationale de Malheur",detail:"Découvert en 1998, ce champignon est âgé de 2 400 à 8 650 ans. Ce qu'on voit en surface (les champignons) n'est qu'une infime partie — l'essentiel est un réseau de filaments (mycélium) sous-terrain. Armillaria ostoyae est parasite : il tue les arbres (racines infectées). Certains arbres ont développé des défenses chimiques contre lui."},
{theme:"nature",diff:"moyen",type:"q",q:"Quelle forêt aspen du Colorado, Pando, est considérée comme le plus grand organisme vivant par masse — 80 000 arbres partageant un système racinaire unique estimé à 6 000 tonnes ?",a:"Pando (latin : 'je m'étends') — clone aspen de 43 hectares dans l'Utah, tous les troncs sont génétiquement identiques et connectés à une racine commune de 80 000 ans",detail:"Pando est une colonie clonale de peuplier faux-tremble (Populus tremuloides). Ses 47 000 tiges semblent être des arbres séparés mais partagent un système racinaire unique. Chaque tige vit 100-130 ans, mais le clone lui-même a ~80 000 ans. Il est menacé par la surpopulation de cerfs qui mangent les jeunes pousses et empêchent le renouvellement."},
{theme:"nature",diff:"moyen",type:"q",q:"Quel arbre australien (Eucalyptus regnans) est le plus grand arbre feuillu du monde, pouvant dépasser 100 mètres, et pourquoi les eucalyptus sont-ils adaptés aux incendies de forêts australiennes ?",a:"L'eucalyptus des montagnes (Eucalyptus regnans) de Victoria atteint 99,6 m — les eucalyptus sont pyrophytes : leurs huiles essentielles favorisent l'incendie qui élimine la concurrence",detail:"L'eucalyptus regnans 'Centurion' (99,6 m, Tasmania) est le plus grand arbre feuillu mesuré. Les eucalyptus ont co-évolué avec le feu australien : leurs huiles essentielles (cinéole) alimentent les incendies qui éliminent les concurrents. Après le feu, les eucalyptus rejettent depuis des lignotubers (réserves sous-terraines) protégées. Les koalas ont développé une tolérance aux toxines des feuilles que presque aucun autre mammifère ne peut digérer."},
{theme:"nature",diff:"difficile",type:"q",q:"Comment le réseau mycorhizien — parfois appelé 'Wood Wide Web' — permet-il aux arbres d'une forêt d'échanger nutriments et signaux chimiques via les champignons du sol ?",a:"Les champignons mycorhiziens colonisent les racines des arbres et forment un réseau souterrain permettant l'échange de sucres, de phosphore, d'azote et de signaux d'alarme entre arbres distants",detail:"Suzanne Simard (UBC) démontre en 1997 que des bouleaux 'mères' transfèrent du carbone radioactif à des épicéas ombragés via les champignons mycorhiziens. Les arbres malades ou mourants transfèrent leurs nutriments aux voisins via ce réseau. Les signaux chimiques d'attaque d'insectes se propagent aussi. Le terme 'Wood Wide Web' est populaire mais contesté — les échanges sont complexes et parfois compétitifs."},
{theme:"nature",diff:"facile",type:"q",q:"Quel volcan indonésien, dont l'éruption de 1883 est l'une des plus puissantes de l'histoire moderne, a généré un tsunami de 30 mètres tuant 36 000 personnes et un hiver volcanique mondial ?",a:"Le Krakatoa (Krakatau) — son explosion produit le son le plus fort jamais enregistré, audible à 5 000 km de distance",detail:"L'explosion du 27 août 1883 est entendue jusqu'en Australie et Rodriguez (5 000 km). La vague de choc circumnavigue la Terre 3,5 fois. Les cendres projetées à 80 km d'altitude refroidissent la planète de 1,2°C l'année suivante. Le ciel rouge des couchers de soleil de 1883-1884 inspire les peintres (Munch date son 'Cri' d'un coucher de soleil post-Krakatoa). Le volcan a resurgi sous le nom de 'Anak Krakatau' (enfant du Krakatau)."},
