{theme:"mytho",diff:"facile",type:"q",q:"Qui est Osiris dans la mythologie égyptienne et comment est-il tué par son frère Seth ?",a:"Osiris est le dieu de la mort et de la résurrection — Seth le tue, découpe son corps en 14 morceaux dispersés dans le Nil",detail:"Isis (épouse d'Osiris) et Nephthys rassemblent les morceaux. Isis ressuscite Osiris le temps de concevoir Horus. Osiris devient alors le seigneur des morts. Son histoire symbolise le cycle des saisons (mort/renaissance) et la crue annuelle du Nil. Horus combat Seth pour venger son père."},
{theme:"mytho",diff:"facile",type:"q",q:"Qui est Ra dans la mythologie égyptienne et quel voyage accomplit-il chaque jour et chaque nuit ?",a:"Ra est le dieu soleil — il traverse le ciel dans sa barque solaire le jour, et les Douats (monde souterrain) la nuit en combattant le serpent Apophis",detail:"Chaque nuit, Ra doit traverser les 12 heures des Douats à bord de sa barque. Apophis, le serpent du chaos, tente de le dévorer. Des dieux (dont Seth, ironiquement) le défendent. À l'aube, Ra renaît. Ce cycle représente la lutte perpétuelle entre ordre (Maât) et chaos (Isfet)."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Anubis dans la mythologie égyptienne et quel rôle joue-t-il dans le jugement des âmes ?",a:"Dieu à tête de chacal, gardien des nécropoles et guide des âmes — il préside à la pesée du cœur contre la plume de Maât",detail:"À la mort, Anubis conduit l'âme dans la Salle des Deux Vérités. Le cœur du défunt est pesé contre la plume de Maât (vérité/justice). Si le cœur est plus léger, l'âme rejoint le paradis. Si plus lourd (alourdi par les péchés), la chimère Ammout (lion/hippopotame/crocodile) le dévore et l'âme est détruite."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Thoth dans la mythologie égyptienne et quelles inventions lui attribue-t-on ?",a:"Dieu à tête d'ibis ou de babouin — dieu de la sagesse, de l'écriture, de la magie et de la science, inventeur des hiéroglyphes selon les Égyptiens",detail:"Thoth est le scribe des dieux, conseiller de Ra, arbitre entre Horus et Seth. Il invente l'écriture, les mathématiques, l'astronomie et la médecine. Les Grecs l'identifient à Hermès (Hermès Trismégiste). Il possède le Livre de Thoth, recueil de formules magiques conférant une puissance absolue."},
{theme:"mytho",diff:"difficile",type:"q",q:"Quelle déesse égyptienne, sœur et épouse d'Osiris, est la plus puissante magicienne du panthéon et devient la grande mère universelle absorbant d'autres cultes ?",a:"Isis — sa popularité dépasse l'Égypte, son culte se répand dans tout l'Empire romain jusqu'en Grande-Bretagne",detail:"Isis ressuscite Osiris, conçoit Horus par magie, protège son fils contre Seth. Son culte se répand dans le monde grec puis romain (Iseum de Pompéi, temple d'Isis à Rome). Elle absorbe les attributs d'autres déesses (Hathor, Aphrodite, Déméter). Son culte mystérique promet la résurrection aux initiés."},
{theme:"mytho",diff:"moyen",type:"q",q:"Quel est le plus ancien récit épique connu de l'humanité, tablettes sumériennes racontant les aventures d'un roi d'Uruk et sa quête d'immortalité ?",a:"L'Épopée de Gilgamesh (~2100 av. J.-C.)",detail:"Gilgamesh, roi d'Uruk, est aux deux tiers divin. Son ami Enkidou meurt ; terrorisé par la mort, Gilgamesh part chercher l'immortalité. Il rencontre Utanapishti, survivant du déluge (préfigure Noé). La plante d'immortalité lui est volée par un serpent. Il revient à Uruk en acceptant sa condition mortelle."},
{theme:"mytho",diff:"difficile",type:"q",q:"Quelle déesse babylonienne descend aux Enfers pour retrouver son amant Dumuzi, provoquant le gel de toute reproduction sur Terre pendant son absence ?",a:"Inanna/Ishtar — déesse sumérienne/babylonienne de l'amour et de la guerre dont la descente aux Enfers symbolise le cycle des saisons",detail:"Inanna descend dans le royaume de sa sœur Éreshkigal, abandonnant à chaque porte un attribut divin. Nue et abaissée, elle est tuée et pendue. Durant son absence, toute reproduction cesse. Les dieux la ressuscitent ; elle doit laisser un substitut : Dumuzi (son époux), qui passe six mois aux Enfers — mythe du cycle agricole."},
{theme:"mytho",diff:"facile",type:"q",q:"Selon la mythologie japonaise, quels deux dieux créent le Japon en remuant l'océan primordial avec une lance ornée de joyaux ?",a:"Izanagi et Izanami — couple divin primordial de la mythologie shinto",detail:"Izanagi et Izanami remuent l'océan chaotique avec la lance Amenonuhoko. Les gouttes qui tombent forment les îles du Japon. Ils engendrent ensuite les dieux de la nature. Izanami meurt en donnant naissance au dieu du feu. Izanagi descend aux Enfers (Yomi) pour la retrouver — mais fuit quand il voit son corps en décomposition."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Amaterasu dans la mythologie japonaise et pourquoi se cache-t-elle dans une grotte plongeant le monde dans l'obscurité ?",a:"Amaterasu est la déesse du soleil, divinité suprême du shintoïsme — elle se cache après les violences de son frère Susanoo",detail:"Susanoo (dieu des tempêtes) saccage les rizières d'Amaterasu et profane son temple. Elle se retire dans la grotte Ama-no-Iwato, plongeant le monde dans les ténèbres. Les dieux organisent une fête bruyante devant la grotte pour l'attirer dehors. Elle ressort curieuse — la lumière revient. La famille impériale japonaise se dit descendante d'Amaterasu."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Susanoo dans la mythologie japonaise et quel monstre à huit têtes et huit queues tue-t-il pour sauver une jeune fille ?",a:"Susanoo, dieu des tempêtes, tue le serpent Yamata no Orochi en le saoulant au saké — il trouve dans sa queue le sabre Kusanagi",detail:"Le Yamata no Orochi, serpent à 8 têtes, dévore une à une les filles d'un couple de dieux. Susanoo prépare 8 tonneaux de saké. Le serpent s'enivre et s'endort. Susanoo le découpe. Dans la queue, il trouve le sabre Kusanagi no Tsurugi, l'une des trois Regalia impériales du Japon."},
{theme:"mytho",diff:"difficile",type:"q",q:"Qu'est-ce que le concept de Musubi dans la cosmologie shinto et comment s'articule-t-il avec la notion de kami ?",a:"Musubi désigne la force créatrice d'harmonie et de croissance présente dans tous les kami — êtres ou phénomènes naturels dotés d'une puissance spirituelle",detail:"Dans le shinto, les kami ne sont pas des dieux au sens occidental : ce sont des puissances spirituelles habitant des lieux, des phénomènes, des ancêtres. Le musubi est l'énergie qui unit et fait croître. Il n'y a pas de dualisme bien/mal absolu. L'harmonie (wa) entre humains, kami et nature est le but central du shinto."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Cú Chulainn dans la mythologie irlandaise et quel exploit surhumain accomplit-il seul contre les armées de la reine Medb ?",a:"Héros ultime de la mythologie celtique irlandaise — il défend seul l'Ulster contre l'armée du Connacht grâce à sa fureur de combat ('warp spasm')",detail:"Cú Chulainn est le fils du dieu Lug. Pendant que les guerriers d'Ulster sont frappés d'une malédiction (les Douleurs de l'Ulster), lui seul combat l'armée de Medb au corps à corps quotidien. Son état de fureur (riastrad) le transforme en monstre incontrôlable. Sa mort, debout attaché à une pierre, est l'une des plus épiques de la littérature mythologique."},
{theme:"mytho",diff:"moyen",type:"q",q:"Quelle île paradisiaque des morts accueille les héros et les dieux dans la mythologie celtique irlandaise et bretonne ?",a:"Tír na nÓg ('Pays de la jeunesse') en irlandais, ou l'Avalon en tradition bretonne arthurienne",detail:"Dans la mythologie irlandaise, Tír na nÓg est une île à l'ouest où nul ne vieillit ni ne meurt. Niamh emmène Oisín (fils de Finn McCool) dans ce paradis. Il y reste 300 ans (qui lui semblent 3 ans). En Bretagne, Avalon accueille le roi Arthur blessé pour qu'il guérisse jusqu'à son retour."},
{theme:"mytho",diff:"difficile",type:"q",q:"Qui sont les Tuatha Dé Danann dans la mythologie irlandaise et quel destin leur est réservé après la conquête des Milésiens ?",a:"Les dieux de la mythologie irlandaise pré-chrétienne — après leur défaite face aux Milésiens (ancêtres des Irlandais), ils se retirent sous les collines (les Sidhe)",detail:"Les Tuatha Dé Danann ('Tribus de la déesse Dana') arrivent en Irlande sur des nuages magiques. Ils vainquent les Fir Bolg et les Fomorians. Mais les Milésiens les battent. Le dieu Dagda leur attribue les collines creuses (Sidhe) comme royaume souterrain. Les dieux deviennent les Aos Sí (fées irlandaises) de la tradition folklorique."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Quetzalcóatl dans la mythologie aztèque et quel mythe de son retour influence la conquête espagnole ?",a:"Dieu serpent à plumes de la sagesse et du vent — les Aztèques interprètent parfois l'arrivée de Cortès en 1519 comme son retour annoncé",detail:"Quetzalcóatl ('serpent à plumes') apporte aux hommes le maïs, le calendrier et les arts. Il est chassé du Toltèque par son rival Tezcatlipoca et promet de revenir. La coïncidence de l'arrivée de Cortès avec l'année Unu Acatl (année du retour prédit) a peut-être contribué à la paralysie initiale de Moctezuma."},
{theme:"mytho",diff:"moyen",type:"q",q:"Selon la mythologie maya du Popol Vuh, comment les dieux créent-ils les premiers hommes après plusieurs tentatives ratées ?",a:"Les dieux (Hunahpu et Ixbalanqué) créent les premiers vrais hommes en maïs blanc et jaune — après des ratés en boue et en bois",detail:"Le Popol Vuh ('Livre du Conseil', XIVe s., transcrit au XVIe s.) raconte : les hommes de boue fondent, les hommes de bois sont détruits par des inondations (leurs ustensiles se révoltent contre eux). Les jumeaux héroïques Hunahpu et Ixbalanqué défont les seigneurs de Xibalba (enfers). Les dieux créent enfin les vrais hommes avec du maïs."},
{theme:"mytho",diff:"difficile",type:"q",q:"Qui est Huitzilopochtli dans la mythologie aztèque et pourquoi les sacrifices humains lui sont-ils offerts ?",a:"Dieu de la guerre et du soleil — sa naissance miraculeuse (armé de pied en cap, tuant ses 400 frères) symbolise la victoire du soleil chaque matin sur les étoiles",detail:"Huitzilopochtli naît d'une femme fécondée par une boule de plumes. Ses 400 frères (les Centzonhuitznahua, dieux des étoiles) veulent la tuer. Il naît armé et les extermine. Ce mythe explique la nécessité des sacrifices : le soleil doit être nourri de sang (chalchíuhatl, 'eau précieuse') pour triompher chaque matin des ténèbres."},
{theme:"mytho",diff:"facile",type:"q",q:"Qui est Ganesh dans la mythologie hindoue et comment acquiert-il sa tête d'éléphant ?",a:"Fils de Shiva et Parvati, dieu à tête d'éléphant de la sagesse et des commencements — Shiva lui coupe la tête et la remplace par celle d'un éléphant",detail:"Plusieurs versions existent. La plus célèbre : Parvati modèle Ganesh en argile et lui insuffle la vie. Shiva, ne reconnaissant pas son fils, lui tranche la tête. Pour consoler Parvati, il promet de remplacer la tête par celle du premier animal venu — un éléphant. Ganesh est invoqué au début de tout projet ou voyage."},
{theme:"mytho",diff:"moyen",type:"q",q:"Quelle grande guerre épique oppose les Pandavas aux Kauravas dans le Mahabharata, et quel est le rôle de Krishna comme guide d'Arjuna ?",a:"La guerre de Kurukshetra — Krishna révèle à Arjuna la Bhagavad Gita pour le convaincre de combattre malgré ses doutes moraux",detail:"Les Pandavas (5 frères, dont Arjuna) affrontent leurs cousins Kauravas (100 frères) pour le trône. Arjuna refuse de combattre : les deux camps comptent ses proches. Krishna lui révèle la Bhagavad Gita : l'âme est immortelle, le devoir (dharma) du guerrier est de combattre. Les Pandavas gagnent mais à un coût terrible."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Ravana dans le Ramayana et comment Rama, avec l'aide de l'armée de singes de Hanuman, finit-il par le vaincre ?",a:"Ravana est le démon à dix têtes roi de Lanka qui enlève Sita, épouse de Rama — Hanuman retrouve Sita et Rama construit un pont pour attaquer Lanka",detail:"Rama (avatar de Vishnu) est exilé 14 ans avec Sita et son frère Lakshmana. Ravana enlève Sita. Hanuman (dieu-singe) retrouve Sita à Lanka. Une armée de singes construit un pont jusqu'à Lanka. Rama tue Ravana d'une flèche divine. Sita doit traverser le feu pour prouver sa pureté. L'épopée explore le dharma, la loyauté et la justice."},
{theme:"mytho",diff:"difficile",type:"q",q:"Quels sont les quatre yugas (âges du monde) dans la cosmologie hindoue et dans lequel se trouve-t-on selon la tradition ?",a:"Satya Yuga (âge d'or), Treta Yuga, Dvapara Yuga et Kali Yuga (âge actuel de déclin) — un cycle complet dure 4 320 000 ans",detail:"Le Satya Yuga est l'âge de la vérité et de la pureté (dharma à 100 %). Chaque yuga voit un déclin progressif : le Kali Yuga (commencé en 3102 av. J.-C. selon la tradition) est l'âge de la discorde et de l'immoralité. À sa fin, Kalki (dernier avatar de Vishnu) détruira le monde corrompu et un nouveau cycle commencera."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Nuwa dans la mythologie chinoise et comment crée-t-elle les premiers humains et répare-t-elle le ciel brisé ?",a:"Déesse à corps de serpent qui crée les humains en argile et répare le ciel avec des pierres de cinq couleurs après qu'un pilier céleste s'effondre",detail:"Nuwa est l'une des plus anciennes divinités chinoises. Elle crée les humains : les premiers modelés à la main sont nobles, ceux fabriqués à la chaîne (en trempant une corde dans l'argile) sont le peuple ordinaire. Quand le dieu Gong Gong brise un pilier du ciel, Nuwa fond des pierres de cinq couleurs pour réparer la voûte céleste."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est le Roi des Singes Sun Wukong dans la mythologie chinoise et dans quelle épopée classique du XVIe siècle apparaît-il ?",a:"Sun Wukong est le Roi Singe magicien du roman La Pérégrination vers l'Ouest (Xiyouji) de Wu Cheng'en",detail:"Sun Wukong naît d'une roche, acquiert des pouvoirs fabuleux (transformation en 72 formes, bâton magique Ruyi Jingu Bang), déclare la guerre au Ciel. Bouddha le piège sous une montagne 500 ans. Il accompagne le moine Xuanzang vers l'Inde pour rapporter les sutras bouddhistes. Il inspire Dragon Ball et de nombreuses œuvres modernes."},
{theme:"mytho",diff:"difficile",type:"q",q:"Qu'est-ce que le combat entre Pangu et le chaos originel dans la cosmogonie chinoise, et comment son corps donne-t-il naissance au monde ?",a:"Pangu émerge de l'œuf cosmique primordial, sépare le ciel de la terre en les poussant 18 000 ans — à sa mort, son corps se transforme en univers",detail:"Dans l'obscurité originelle, un œuf contient le chaos. Pangu naît et sépare yin (terre, lourd) et yang (ciel, léger). Il pousse le ciel vers le haut 18 000 ans. À sa mort : son souffle devient le vent et les nuages, sa voix le tonnerre, ses yeux le soleil et la lune, ses membres les montagnes, son sang les rivières, ses cheveux les étoiles, ses puces les humains."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Baba Yaga dans la mythologie slave et quel rôle ambigu joue-t-elle dans les contes russes ?",a:"Sorcière de la forêt slave à la maison sur pattes de poule — guide ambivalente qui peut aider ou dévorer les héros selon qu'ils respectent les rites",detail:"Baba Yaga vit dans une izba (maison) qui tourne sur des pattes de poule, entourée d'une clôture en os. Elle aide les héros qui respectent le protocole (demander à manger et à boire, accomplir des tâches) et dévore les autres. Elle est à la fois figure de mort et de renaissance — initiateur des héros dans leur quête."},
{theme:"mytho",diff:"difficile",type:"q",q:"Qui est Perun dans la mythologie slave et quelle est sa rivalité cosmique avec Veles ?",a:"Perun est le dieu slave du tonnerre et de la guerre — sa lutte éternelle contre Veles (dieu du monde souterrain) structure la cosmologie slave",detail:"Perun vit dans les hauteurs (ciel, chênes, montagnes). Veles vit dans les profondeurs (eau, serpents, bétail). Veles vole régulièrement les troupeaux de Perun ou enlève ses proches. Perun le chasse avec ses éclairs — Veles se cache en se transformant en animaux. Cette lutte symbolise le cycle des saisons et les orages qui fertilisent la terre."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Anansi dans la mythologie akan (Ghana) et comment ce personnage d'araignée s'est-il répandu à travers l'Atlantique avec la traite négrière ?",a:"Anansi l'araignée est le dieu trickeur des histoires et de la sagesse — ses contes voyagent avec les esclaves africains jusqu'aux Caraïbes et aux Amériques",detail:"Dans la mythologie akan, Anansi achète les histoires du dieu Nyame en capturant des créatures impossibles à attraper. Il devient ainsi propriétaire de toutes les histoires du monde. Ses récits survivent dans la diaspora africaine sous le nom d'Anansi (Caraïbes), Br'er Rabbit (États-Unis) et High John the Conqueror. Neil Gaiman l'utilise dans American Gods."},
{theme:"mytho",diff:"difficile",type:"q",q:"Qui est Ogun dans la mythologie yoruba et quels domaines préside-t-il dans le système des orishas ?",a:"Ogun est l'orisha du fer, de la guerre, du travail et de la technologie — vénéré par les forgerons, chasseurs, soldats et en diaspora par les chauffeurs",detail:"Dans le système yoruba des orishas (divinités intermédiaires entre Olodumare/Dieu suprême et les humains), Ogun est le seigneur du fer. Il ouvre les chemins (sa machette défriche la forêt). En diaspora (Candomblé brésilien, Santería cubaine, Vodou haïtien), il devient Ogum/Ogou et reste associé aux métaux, à l'énergie brute et à la justice violente."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Inti dans la mythologie inca et quel lien mytique relie-t-il à la famille impériale inca ?",a:"Inti est le dieu soleil des Incas — l'Inca (empereur) est considéré comme son fils et représentant sur Terre",detail:"Inti est la divinité principale de l'empire inca. Le Coricancha (temple du Soleil à Cusco) lui est dédié, recouvert d'or. La fête Inti Raymi (encore célébrée aujourd'hui en juin) marque le solstice d'hiver andéen. La Coya (épouse de l'Inca) est fille de la Lune (Mama Quilla). L'or est la sueur d'Inti, l'argent les larmes de la Lune."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Maui dans la mythologie polynésienne et quels exploits semi-divins lui attribue-t-on à travers tout le Pacifique ?",a:"Demi-dieu trickeur polynésien — il pêche les îles avec son hameçon, ralentit le soleil pour allonger les jours, et tente (en vain) de conquérir l'immortalité",detail:"Maui est commun à la mythologie hawaïenne, maorie, tahitienne et samoane. Il ralentit le soleil en l'attrapant avec des liens pour que les jours soient plus longs. Il pêche l'île de Nouvelle-Zélande (Te Ika a Maui) avec son hameçon magique. Il tente d'entrer dans le corps de la déesse de la mort Hine-nui-te-pō mais est écrasé — l'immortalité échappe aux hommes. Disney en fait un personnage dans Moana (2016)."},
{theme:"mytho",diff:"facile",type:"q",q:"Qui est Poséidon dans la mythologie grecque et quels sont ses attributs et son domaine ?",a:"Dieu de la mer, des tremblements de terre et des chevaux — frère de Zeus, il règne sur les océans avec son trident",detail:"Poséidon (Neptune chez les Romains) partage le monde avec Zeus (ciel) et Hadès (enfers) après la défaite des Titans. Il crée les chevaux d'un coup de trident sur la roche. Sa rivalité avec Athéna pour la patronne d'Athènes se termine par un vote des dieux en faveur de l'olivier d'Athéna contre la source salée de Poséidon."},
{theme:"mytho",diff:"facile",type:"q",q:"Qui est Ulysse (Odysseus) et combien d'années met-il à rentrer chez lui à Ithaque après la guerre de Troie ?",a:"Roi d'Ithaque, héros de l'intelligence et de la ruse — il erre 10 ans avant de rentrer, affrontant Cyclopes, Sirènes et la colère de Poséidon",detail:"L'Odyssée d'Homère raconte ces 10 ans : Polyphème le Cyclope (aveuglé par Ulysse), Circé qui transforme ses compagnons en cochons, Charybde et Scylla, les Sirènes, Calypso qui le retient 7 ans, Nausicaa... Il rentre déguisé en mendiant et massacre les prétendants qui courtisent sa fidèle Pénélope."},
{theme:"mytho",diff:"moyen",type:"q",q:"Quel sculpteur de la mythologie grecque tombe amoureux de sa propre statue au point qu'Aphrodite l'anime pour lui ?",a:"Pygmalion — artiste chypriote dont la statue Galatée prend vie selon les Métamorphoses d'Ovide",detail:"Pygmalion, rejeté par les femmes réelles, sculpte la femme idéale dans l'ivoire. Il tombe amoureux de sa création. Lors de la fête d'Aphrodite, il embrasse la statue et la déesse, touchée, lui insuffle la vie. Galatée s'éveille et ils se marient. Le mythe inspire Ovide, Rousseau, Shaw (pièce Pygmalion, 1913 → My Fair Lady)."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Achille et quelle est son unique vulnérabilité qui cause sa mort devant Troie ?",a:"Le plus grand guerrier grec de la guerre de Troie — sa seule vulnérabilité est son talon, où il fut tenu quand sa mère Thétis le trempa dans le Styx",detail:"Thétis trempe le nourrisson Achille dans le Styx pour le rendre invulnérable, mais le talon par lequel elle le tient reste mortel. Achille massacre les Troyens mais refuse de combattre après la mort de Patrocle. Il tue Hector mais est à son tour tué par une flèche de Pâris guidée par Apollon — dans le talon."},
{theme:"mytho",diff:"difficile",type:"q",q:"Qui est Œdipe et comment réalise-t-il malgré lui la prophétie delphique qui prédisait qu'il tuerait son père et épouserait sa mère ?",a:"Roi de Thèbes qui tue son père Laïos sans le connaître et épouse sa mère Jocaste — à la découverte de la vérité, il s'arrache les yeux",detail:"L'oracle prédit à Laïos que son fils le tuera. Le nourrisson est abandonné et recueilli à Corinthe. Adulte, Œdipe consulte Delphes, apprend la prophétie et fuit pour l'éviter. Sur la route, il tue un vieil homme (Laïos, son père). Il sauve Thèbes du Sphinx et épouse la reine veuve (Jocaste, sa mère). La vérité révélée, Jocaste se pend, Œdipe s'aveugle."},
{theme:"mytho",diff:"facile",type:"q",q:"Qui est Thor dans la mythologie nordique et quelle est son arme emblématique ?",a:"Dieu nordique du tonnerre, fils d'Odin — son marteau Mjöllnir est l'arme la plus puissante des Ases",detail:"Thor protège les hommes et les dieux des géants de glace (Jötunn). Mjöllnir revient toujours dans sa main après avoir été lancé. Il possède aussi la ceinture Megingjörð qui double sa force et des gants de fer. Le jeudi (Thursday = Thor's day) lui doit son nom en anglais, comme Donnerstag en allemand (Donner = tonnerre)."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui sont les Nornes dans la mythologie nordique et quel pouvoir exercent-elles sur le destin des dieux et des hommes ?",a:"Trois femmes (Urd, Verdandi, Skuld) tissant le destin à la source Urðarbrunnr au pied de Yggdrasil — même les dieux leur sont soumis",detail:"Urd (ce qui a été), Verdandi (ce qui advient), Skuld (ce qui doit être) représentent passé, présent et futur. Elles tissent la toile du destin de chaque être. Les Parques romaines (Clotho, Lachésis, Atropos) et les Moires grecques leur sont analogues. Leur pouvoir transcende celui des Ases — personne n'échappe au destin tissé."},
{theme:"mytho",diff:"difficile",type:"q",q:"Quel voyage mystique Odin accomplit-il pour acquérir la sagesse des runes, et quel sacrifice consent-il pour boire à la source de Mimir ?",a:"Odin se pend 9 jours et 9 nuits à Yggdrasil, percé de sa propre lance — pour boire à la source de Mimir il abandonne un œil",detail:"Odin est le dieu de la sagesse, de la guerre et de la mort, mais aussi de la poésie et de la magie. Il se sacrifie à lui-même pour obtenir la connaissance des runes. Pour boire à la source de sagesse de Mimir, il laisse un œil en gage — d'où son iconographie borgne. Il voyage incognito parmi les hommes avec son chapeau à large bord et son bâton."},
{theme:"mytho",diff:"moyen",type:"q",q:"Quel rôle joue Horus dans la mythologie égyptienne et pourquoi le pharaon est-il assimilé à lui de son vivant ?",a:"Horus, fils d'Osiris et d'Isis, venge son père contre Seth et devient le dieu du ciel vivant — le pharaon est son incarnation terrestre",detail:"Le combat d'Horus contre Seth est long et brutal (80 ans selon certains textes). Horus perd un œil (l'Oudjat, œil d'Horus, symbole de protection). Seth perd ses parties génitales. Le tribunal des dieux tranche en faveur d'Horus. Pharaon vivant = Horus ; pharaon mort = Osiris. L'œil d'Horus est l'amulette la plus répandue de l'Égypte antique."},
{theme:"mytho",diff:"difficile",type:"q",q:"Qui est Sekhmet dans la mythologie égyptienne et quel mythe raconte comment elle faillit détruire l'humanité entière ?",a:"Déesse à tête de lionne de la guerre et des épidémies — Ra l'envoie punir les hommes rebelles mais elle s'emballe et doit être endormie par de la bière teintée en rouge",detail:"Ra envoie sa fille Sekhmet châtier les humains qui le méprisent. Sekhmet, ivre de sang, devient incontrôlable. Ra ordonne qu'on teigne 7 000 jarres de bière en rouge sang. Sekhmet se jette dessus, s'enivre et s'endort. L'humanité est sauvée. Ce mythe explique les fêtes rituelles de l'ivresse en Égypte et le double aspect de la déesse : destructrice et guérisseuse."},
{theme:"mytho",diff:"difficile",type:"q",q:"Quelle cosmogonie maorie raconte la séparation des parents primordiaux Ranginui (ciel) et Papatūānuku (terre) par leurs enfants-dieux ?",a:"Les enfants (dont Tāne, Tū et Tāwhirimātea) séparent leurs parents enlacés pour laisser entrer la lumière — Tāwhirimātea, furieux, devient le dieu des tempêtes",detail:"Ranginui et Papatūānuku sont enlacés dans l'obscurité. Leurs enfants débattent : faut-il les séparer ou les tuer ? Tāne (dieu des forêts) les écarte avec ses jambes. La lumière envahit le monde. Tāwhirimātea (dieu du vent) refuse et attaque ses frères de rage. Les pleurs de Ranginui deviennent la rosée, ceux de Papatūānuku la brume."},
{theme:"mytho",diff:"difficile",type:"q",q:"Quel dieu aztèque de la nuit et du jaguar utilise un miroir fumant pour voir tous les secrets du monde et rivalise avec Quetzalcóatl ?",a:"Tezcatlipoca ('Miroir fumant') — dieu de la nuit, du nord, du jaguar et du chaos, adversaire et double de Quetzalcóatl",detail:"Tezcatlipoca possède un miroir de pyrite qui révèle tous les secrets et peut envoyer maladie et mort. Il piège Quetzalcóatl en lui faisant croire qu'il est laid, puis en l'enivrant pour le pousser à commettre l'inceste — Quetzalcóatl quitte alors son royaume. Tezcatlipoca représente le chaos nécessaire à la création ; Quetzalcóatl l'ordre et la civilisation."},
{theme:"mytho",diff:"facile",type:"q",q:"Qui est Shiva dans la mythologie hindoue et quels aspects contradictoires incarne-t-il ?",a:"L'une des trois grandes divinités hindoues (Trimurti) — destructeur et régénérateur, ascète et danseur cosmique, dieu de la fertilité et de la mort",detail:"Shiva est représenté avec le troisième œil (sagesse et destruction), le trident Trishula, le cobra Vasuki, le croissant de lune, le Gange jaillissant de ses cheveux. Sa danse Nataraja représente la création et la destruction cyclique de l'univers. Il est le maître du yoga et de la méditation, époux de Parvati, père de Ganesh et Kartikeya."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui sont les dix avatars (Dashavatara) de Vishnu dans la mythologie hindoue et lequel est encore attendu ?",a:"Vishnu s'incarne en poisson, tortue, sanglier, homme-lion, nain, Parashurama, Rama, Krishna, Bouddha et Kalki (encore à venir)",detail:"Les avatars descendent pour rétablir le dharme (ordre cosmique) quand le mal l'emporte. Les plus célèbres sont Rama (héros du Ramayana) et Krishna (guide de l'Arjuna dans la Bhagavad Gita). Bouddha est inclus dans la liste pour assimiler le bouddhisme. Kalki (sur cheval blanc, épée enflammée) viendra à la fin du Kali Yuga."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est le roi Arthur dans la mythologie bretonne et quelles sont les trois caractéristiques qui en font un mythe — plutôt qu'un personnage historique — de portée universelle ?",a:"Roi légendaire breton entouré des Chevaliers de la Table Ronde — son mythe est fondé sur : la quête du Graal (idéal spirituel), Excalibur (légitimité divine) et le sommeil d'Avalon (roi qui reviendra)",detail:"Arthur est peut-être inspiré d'un chef guerrier du Ve-VIe s. résistant aux Saxons. Mais le mythe littéraire (Chrétien de Troyes, XIIe s. ; Malory, XVe s.) construit un idéal chevaleresque. La Table Ronde symbolise l'égalité. Le Graal (coupe du Christ ou pierre de lumière selon les versions) est la quête spirituelle ultime. Arthur dort à Avalon et reviendra quand la Bretagne en aura besoin."},
{theme:"mytho",diff:"difficile",type:"q",q:"Qui est le Dagda dans la mythologie irlandaise et quels objets magiques possède-t-il ?",a:"Le Dagda est le 'Bon Dieu' des Tuatha Dé Danann — il possède une massue qui tue et ressuscite, un chaudron d'abondance inépuisable et une harpe qui commande les saisons",detail:"Le Dagda ('bon dieu', pas 'dieu du bien') est le père des dieux irlandais, maître de la magie et de la sagesse. Sa massue tue d'un bout et ressuscite de l'autre. Son chaudron (Coire Ansic) nourrit sans jamais se vider. Sa harpe (Uaithne) commande les saisons et peut provoquer rire, larmes ou sommeil. Il est aussi le dieu de la terre et des contrats."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Marzanna (ou Morena) dans la mythologie slave et quel rituel printanier lui est encore consacré en Pologne et en Tchéquie ?",a:"Déesse slave de la mort, de l'hiver et des maladies — une effigie de paille est noyée ou brûlée au printemps pour symboliser la victoire sur l'hiver",detail:"Marzanna représente l'hiver et la mort. Chaque année au printemps (généralement le 21 mars), on fabrique une effigie de paille habillée, on la promène au village en chantant des malédictions, puis on la brûle et jette dans une rivière. Ce rituel préchrétien survit sous une forme folklorique dans plusieurs pays slaves. Son nom est apparenté à 'mort' dans les langues slaves."},
{theme:"mytho",diff:"facile",type:"q",q:"Qui est la déesse chinoise de la lune Chang'e et pourquoi s'y retrouve-t-elle seule pour l'éternité ?",a:"Chang'e boit l'élixir d'immortalité de son mari Hou Yi pour le protéger et s'envole sur la lune où elle reste isolée avec le lapin de jade",detail:"Hou Yi est l'archer qui abat 9 des 10 soleils (qui brûlaient la Terre). En récompense, il reçoit l'élixir d'immortalité. Sa femme Chang'e le boit pour l'empêcher d'en abuser (ou selon d'autres versions, pour ne pas le partager). Elle s'envole sur la lune avec le lapin de jade qui prépare l'élixir. La Fête de la Mi-Automne lui est dédiée."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est le Dragon Jaune (Huanglong) et quelle place occupent les dragons dans la cosmologie et la symbolique chinoises ?",a:"Contrairement à l'Occident, les dragons chinois (long) sont bienveillants — symboles de l'eau, de la fertilité, de la puissance impériale et de la bonne fortune",detail:"Le dragon chinois (long) est un être composite (corps de serpent, griffes d'aigle, écailles de carpe, tête de chameau). Il contrôle la pluie et les rivières — essentiel pour l'agriculture. L'Empereur de Chine est le Fils du Dragon. Le Dragon Jaune (Huanglong) apparaît à l'Empereur Jaune (Huangdi) pour lui transmettre les arts de la civilisation."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Saturne dans la mythologie romaine et pourquoi son règne est-il considéré comme un âge d'or ?",a:"Dieu romain de l'agriculture et du temps (assimilé au Cronos grec) — son règne mythique est une ère d'abondance et d'égalité sans travail forcé",detail:"Saturne règne sur le Latium avant l'âge des mortels — une époque où la terre donne d'elle-même, sans travail ni inégalités. Les Saturnales (17-23 décembre) commémorent cet âge d'or : les hiérarchies sociales sont inversées, maîtres servent les esclaves, cadeaux échangés. Ces fêtes influencent directement les traditions de Noël."},
{theme:"mytho",diff:"difficile",type:"q",q:"Qu'est-ce que les Mystères d'Éleusis et pourquoi leur secret fut-il si bien gardé pendant plus de deux millénaires ?",a:"Rites d'initiation célébrés à Éleusis (Attique) en l'honneur de Déméter et Perséphone — les initiés juraient le silence sous peine de mort",detail:"Les Mystères d'Éleusis (XIVe s. av. J.-C. - 396 ap. J.-C.) promettaient aux initiés une vision de l'au-delà et un sort privilégié après la mort. Des milliers d'Athéniens, puis de Romains (Cicéron, Marc Aurèle) s'y faisaient initier. Leur secret est si bien gardé qu'on ne sait toujours pas ce qui se passait lors de la nuit centrale. Certains chercheurs suggèrent une boisson psychédélique (kykeon)."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Eshu (ou Elegba) dans la mythologie yoruba et quel rôle joue-t-il comme messager entre les hommes et les orishas ?",a:"Eshu-Elegba est le dieu yoruba des carrefours, de la communication et du destin — gardien des frontières entre le monde humain et divin",detail:"Eshu est le premier des orishas à recevoir les prières, car sans lui les messages n'atteignent pas les dieux. Il est représenté comme un enfant ou un vieillard, parfois phallique. Imprévisible, il peut aider ou nuire. En diaspora, il devient Exú (Candomblé), Legba (Vodou haïtien) et Eleggua (Santería). Son équivalent syncrétique catholique est souvent Saint Pierre."},
{theme:"mytho",diff:"difficile",type:"q",q:"Qui est Viracocha dans la mythologie andine et comment crée-t-il le monde et les humains avant de disparaître sur l'océan ?",a:"Viracocha est le dieu créateur suprême des Incas — il crée le monde, le soleil, la lune et les humains à Tiahuanaco, puis part vers l'ouest sur l'océan Pacifique",detail:"Viracocha ('mousse de la mer') émerge du lac Titicaca. Il crée d'abord une humanité de pierre (insatisfaisante), puis des géants (détruits par un déluge). Il crée enfin les humains actuels à Tiahuanaco. Il parcourt le monde en mendiant pour enseigner les arts civilisateurs, puis s'en va en marchant sur l'eau vers le Pacifique, promettant de revenir."},
{theme:"mytho",diff:"facile",type:"q",q:"Qui est Hermès dans la mythologie grecque et quels rôles multiples exerce-t-il auprès des dieux et des hommes ?",a:"Messager des dieux, guide des âmes (psychopompe), dieu des voyageurs, commerçants et voleurs — il est aussi l'inventeur de la lyre",detail:"Hermès (Mercure chez les Romains) naît le matin, vole les bœufs d'Apollon le midi, fabrique la lyre avec une carapace de tortue le soir. Son attribut est le caducée (bâton entouré de deux serpents). Il est le seul dieu à circuler librement entre l'Olympe, la Terre et les Enfers."},
{theme:"mytho",diff:"facile",type:"q",q:"Quel géant à cent bras et cinquante têtes aide Zeus à vaincre les Titans et à les enfermer dans le Tartare ?",a:"Les Hécatonchires (Cottus, Briarée et Gygès) — géants à cent bras et cinquante têtes, alliés de Zeus contre les Titans",detail:"La Titanomachie (guerre des Titans) dure dix ans. Zeus libère les Hécatonchires emprisonnés par Cronos. Ils peuvent lancer cent rochers à la fois. Leur aide est décisive. Les Titans vaincus sont précipités dans le Tartare, abîme en dessous des Enfers. Cette victoire permet à Zeus d'établir l'ordre olympien."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Déméter dans la mythologie grecque et comment son deuil pour Perséphone explique-t-il les saisons ?",a:"Déesse de l'agriculture — chaque fois que sa fille Perséphone séjourne aux Enfers (6 mois), Déméter laisse la terre stérile : c'est l'hiver",detail:"Hadès enlève Perséphone. Déméter, inconsolable, abandonne ses fonctions et la terre devient stérile. Zeus intervient : Perséphone partagera son temps entre Hadès (hiver, printemps) et Déméter (été, automne). Le mythe explique les saisons et fonde les Mystères d'Éleusis, rites initiatiques promettant la vie après la mort."},
{theme:"mytho",diff:"moyen",type:"q",q:"Quelle créature mi-homme mi-taureau est enfermée dans le Labyrinthe de Crète et dévorée par Thésée ?",a:"Le Minotaure — monstre né de l'union contre-nature de Pasiphaé et d'un taureau blanc, se nourrissant de jeunes Athéniens",detail:"Athènes doit envoyer chaque année 7 jeunes hommes et 7 jeunes femmes comme tribut au Minotaure. Thésée se porte volontaire, reçoit un fil d'Ariane (fille de Minos) pour retrouver son chemin, tue le Minotaure et ressort du Labyrinthe. Il oublie cependant de changer ses voiles noires en voiles blanches — son père Égée se jette dans la mer."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Jason dans la mythologie grecque et quelle expédition mène-t-il avec ses Argonautes pour récupérer la Toison d'Or ?",a:"Jason et les Argonautes partent en Colchide (Géorgie actuelle) chercher la Toison d'Or — avec l'aide de la magicienne Médée, fille du roi",detail:"La Toison d'Or (bélier ailé) est gardée par un dragon en Colchide. Médée tombe amoureuse de Jason, l'aide à accomplir les épreuves impossibles (taureaux crachant le feu, guerriers nés de dents de dragon, dragon) et fuit avec lui. La trahison ultérieure de Jason la poussera à tuer leurs propres enfants — sujet de la Médée d'Euripide."},
{theme:"mytho",diff:"difficile",type:"q",q:"Qui est Dionysos dans la mythologie grecque et pourquoi son culte est-il à l'origine du théâtre grec ?",a:"Dieu du vin, de l'extase et du théâtre — ses fêtes (Dionysies) incluaient des chœurs (dithyrambes) dont émergent la tragédie et la comédie grecques",detail:"Dionysos (Bacchus chez les Romains) est né deux fois : de Sémélé foudroyée, il est cousé dans la cuisse de Zeus. Son thiase (cortège de ménades et de satyres) répand l'extase bachique. Les Dionysies d'Athènes (Ve s.) sont le cadre où Eschyle, Sophocle et Euripide font jouer leurs tragédies. Le théâtre naît du rite."},
{theme:"mytho",diff:"facile",type:"q",q:"Qui est Aphrodite dans la mythologie grecque et de quelle manière naît-elle de la mer selon Hésiode ?",a:"Déesse de l'amour et de la beauté — elle émerge de l'écume marine née du sang d'Ouranos castré par Cronos",detail:"Cronos tranche le sexe de son père Ouranos et le jette dans la mer. De l'écume (aphros) naît Aphrodite, poussée sur un coquillage jusqu'à Chypre (son île sainte). Vénus chez les Romains, elle est mère d'Éros (Cupidon). Le tableau de Botticelli (La Naissance de Vénus, 1485) immortalise cette scène."},
{theme:"mytho",diff:"moyen",type:"q",q:"Quel être hybride de la mythologie grecque, moitié humain moitié cheval, est réputé sage et enseigne la médecine, la musique et les arts de la guerre — contrairement aux autres centaures violents ?",a:"Chiron — centaure fils de Cronos, précepteur d'Achille, d'Asclépios et de nombreux héros grecs",detail:"Contrairement aux centaures ivrognes (comme ceux du mariage de Pirithoos), Chiron est sage, juste et instruit. Il enseigne à Achille la musique, la médecine et les arts martiaux. Il forme aussi Asclépios (dieu de la médecine), Hercule et Jason. Blessé accidentellement par une flèche empoisonnée d'Hercule, immortel mais en souffrance permanente, il choisit de mourir."},
{theme:"mytho",diff:"difficile",type:"q",q:"Qui est Héphaistos dans la mythologie grecque, quel handicap partage-t-il avec plusieurs autres dieux forgerons de différentes cultures, et que fabrique-t-il de plus remarquable ?",a:"Dieu forgeron boiteux — il forge l'armure d'Achille, le char du Soleil, les automates d'or (servantes), et les chaînes qui retiennent Arès et Aphrodite en flagrant délit",detail:"Héphaistos (Vulcain chez les Romains) est boiteux : soit jeté du haut de l'Olympe par Zeus, soit né infirme. Ce handicap est commun aux dieux forgerons (Goibhniu celte, Wieland germanique, Ilmarinen finlandais) — peut-être parce que les forgerons étaient souvent handicapés par le travail du métal. Ses automates d'or qui l'assistent préfigurent la robotique."},
{theme:"mytho",diff:"moyen",type:"q",q:"Quel animal sacré est le vahana (monture) de Vishnu, de Shiva et de Ganesh dans la mythologie hindoue ?",a:"Garuda (aigle géant, monture de Vishnu), Nandi (taureau blanc, monture de Shiva) et Moushika (souris ou rat, monture de Ganesh)",detail:"Les vahanas ('véhicules') sont indissociables des dieux hindous. Garuda est un demi-aigle demi-homme, ennemi des serpents-nagas. Nandi le taureau garde l'entrée des temples de Shiva. La souris de Ganesh symbolise la capacité à pénétrer partout et à surmonter les obstacles. Chaque vahana incarne un aspect de la divinité qu'il porte."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Hanuman dans la mythologie hindoue et pourquoi est-il considéré comme le dévot parfait et le héros par excellence ?",a:"Dieu-singe fils du dieu du vent, lieutenant de Rama dans le Ramayana — sa loyauté absolue et ses pouvoirs illimités en font l'idéal du bhakti (dévotion)",detail:"Hanuman peut voler, changer de taille, soulever des montagnes et est invulnérable. Il retrouve Sita à Lanka, brûle la moitié de la ville avec sa queue enflammée, rapporte une montagne entière d'herbes médicinales pour soigner Lakshmana. Quand Rama lui demande ce qu'il est, il répond : 'Je suis ton serviteur.' Son culte est l'un des plus populaires en Inde aujourd'hui."},
{theme:"mytho",diff:"difficile",type:"q",q:"Quelle épopée finnoise du XIXe siècle, compilée par Elias Lönnrot, réunit la mythologie et la tradition orale finnoise autour du héros Väinämöinen ?",a:"Le Kalevala (1835-1849) — épopée nationale finnoise qui inspirera Tolkien pour ses Elfes et leur langue, et Sibelius pour sa musique",detail:"Elias Lönnrot collecte des runes (chants épiques) en Carélie et les assemble en une épopée de 50 chants. Väinämöinen est un chaman-bard vieux comme le monde, maître du kantele (harpe). Tolkien s'inspire directement du Kalevala pour créer la langue et la mythologie des Elfes. Sibelius compose Finlandia et le Kullervo en s'appuyant sur cette tradition."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Izanami dans la mythologie japonaise après sa mort et comment sa décomposition révèle-t-elle la nature de la mort dans le shinto ?",a:"Izanami devient souveraine de Yomi (monde des morts) — quand Izanagi la voit en décomposition et fuit, elle lance des démons à sa poursuite",detail:"Izanagi descend à Yomi pour retrouver Izanami, morte en enfantant le feu. Elle lui demande de ne pas la regarder. Il désobéit et voit son corps pourri grouillant de vers et de démons. Il fuit en roulant un rocher sur l'entrée de Yomi. Izanami crie : 'Je tuerai 1000 de tes sujets par jour.' Il répond : 'J'en créerai 1500.' — mythe de l'équilibre vie/mort."},
{theme:"mytho",diff:"difficile",type:"q",q:"Qui est Oya dans la mythologie yoruba et quel pouvoir sur les éléments et la mort lui est attribué ?",a:"Oya est l'orisha des tempêtes, des tornades, des éclairs et de la frontière avec la mort — elle règne sur les cimetières et les transformations",detail:"Oya ('elle déchire') est l'épouse d'Ogun puis de Shango. Elle commande les vents violents, les tornades et les éclairs. En tant que gardienne des cimetières, elle règne sur la frontière entre vie et mort. En diaspora : Iansã (Candomblé), Oyá (Santería). Son équivalent syncrétique catholique est Notre-Dame de la Candelaria ou Sainte Thérèse."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Coyote dans les mythologies des peuples amérindiens des Plaines et des Grandes Basins, et quel rôle de trickeur joue-t-il ?",a:"Coyote est le trickeur (filou divin) de nombreuses nations amérindiennes — créateur chaotique, voleur du feu, farceur dont les erreurs font autant que ses succès",detail:"Comme Loki nordique ou Anansi africain, Coyote représente le chaos créateur. Selon les tribus (Navajo, Ute, Nez-Percé), il vole le feu pour les hommes, crée la mort en projetant un bâton dans les étoiles, ou libère les animaux d'une montagne sacrée. Ses ruses tournent souvent contre lui — mais ses erreurs créent le monde tel qu'il est."},
{theme:"mytho",diff:"facile",type:"q",q:"Qui est Perséphone dans la mythologie grecque et comment son enlèvement par Hadès crée-t-il le cycle des saisons ?",a:"Fille de Déméter et Zeus — enlevée par Hadès, elle passe six mois aux Enfers (hiver) et six mois sur Terre (printemps/été)",detail:"Hadès enlève Perséphone pendant qu'elle cueille des fleurs. Elle mange six graines de grenade aux Enfers (symbole du mariage en Grèce) — ce qui la lie à ce royaume pour six mois par an. Déméter pleure pendant son absence et la terre est stérile. Son retour au printemps provoque la renaissance de la végétation."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Indra dans la mythologie védique et comment son combat contre le dragon Vritra structure-t-il la cosmologie indo-européenne ?",a:"Indra est le roi des dieux védiques, dieu de l'orage — il tue le serpent/dragon Vritra qui retenait les eaux et permet les pluies fertilisantes",detail:"Indra (équivalent de Zeus/Thor) arme son foudre de la colonne vertébrale du sage Dadhichi et s'en sert pour pourfendre Vritra. Ce combat (dieu de l'orage contre serpent des eaux) est un mythe pan-indo-européen : Marduk contre Tiamat (Babylone), Zeus contre Typhon (Grèce), Thor contre Jörmungandr (Nordique). Il symbolise la victoire de l'ordre sur le chaos, de la pluie sur la sécheresse."},
{theme:"mytho",diff:"difficile",type:"q",q:"Quel mythe de création mesopotamien raconte comment Marduk tue la déesse-dragon Tiamat et crée le monde avec son corps ?",a:"L'Enuma Elish ('Quand en haut', ~1200 av. J.-C.) — épopée babylonienne de la création où Marduk vainc Tiamat et crée le ciel avec une moitié de son corps, la terre avec l'autre",detail:"Tiamat (l'océan salé primordial) et Apsu (eau douce) engendrent les dieux. Ces derniers troublent leur repos. Apsu veut les tuer ; les dieux le tuent d'abord. Tiamat se venge. Marduk accepte de la combattre si les dieux lui accordent la suprématie. Il la pourfend : une moitié = ciel, l'autre = terre. De son lieutenant Kingu naissent les humains, créés pour servir les dieux."},
{theme:"mytho",focus:"allemagne",diff:"moyen",type:"q",q:"Qui sont les Nibelungen, et quelle est leur légende ?",a:"Peuple mythique nordique-germanique gardien d'un trésor maudit — tué par Siegfried, convoité par les dieux et les hommes",detail:"Le Nibelungenlied (« Chant des Nibelungen », XIIIe s.) est l'épopée nationale germanique : Siegfried tue le dragon Fafnir, conquiert le trésor, épouse Kriemhild. Trahi et assassiné, il sera vengé dans un bain de sang. Wagner en tire sa Tétralogie (Ring). L'œuvre est à l'Allemagne ce qu'Homère est à la Grèce."},
{theme:"mytho",focus:"allemagne",diff:"moyen",type:"q",q:"Quels sont les principaux dieux du panthéon germanique et nordique, et lesquels ont donné leur nom à des jours de la semaine ?",a:"Odin (mercredi — Wotan), Thor (jeudi), Freya (vendredi), Tyr (mardi)",detail:"Le panthéon germano-nordique est partagé entre Ases (dieux guerriers : Odin, Thor, Tyr) et Vanes (dieux de la fertilité : Freyr, Freya). Ces dieux ont laissé leur empreinte dans les jours de la semaine anglais et allemands : Donnerstag (Thor), Freitag (Freya), Dienstag (Tyr/Ding)."},
{theme:"mytho",focus:"allemagne",diff:"difficile",type:"q",q:"Qu'est-ce que la Edda, et quel rôle joue-t-elle dans la mythologie nordique-germanique ?",a:"Recueil de mythes et poèmes eddiques islandais du XIIIe s. qui constitue la principale source sur la mythologie nordique",detail:"L'Edda poétique (anonyme, ~1200) et l'Edda en prose de Snorri Sturluson (1220) racontent la création du monde, les dieux, les géants, le Ragnarök. Sans ces textes islandais, une grande part de la mythologie germanique serait perdue. Tolkien et Wagner y puisent abondamment."},
{theme:"histoire",focus:"allemagne",diff:"facile",type:"q",q:"Quel événement du 9 novembre 1989 marque la chute du Mur de Berlin, et qui annonça par erreur l'ouverture immédiate des frontières lors d'une conférence de presse ?",a:"Le porte-parole du SED Günter Schabowski annonce par erreur la libre circulation 'immédiatement, sans délai' — des milliers de Berlinois se précipitent aux postes frontière",detail:"Schabowski reçoit la note du nouveau règlement en début de conférence mais n'a pas eu le temps de la lire entièrement. Quand un journaliste demande 'À partir de quand ?', il répond après une pause : 'Immédiatement, sans délai.' Les images sont diffusées en direct. Les gardes-frontières, débordés, finissent par ouvrir les barrières. Personne n'avait ordonné cela — la Révolution pacifique est accomplie par une erreur bureaucratique."},
{theme:"histoire",focus:"allemagne",diff:"moyen",type:"q",q:"Quel empire médiéval, le Saint-Empire romain germanique, a existé de 962 à 1806, et pourquoi Voltaire disait-il qu'il n'était «ni saint, ni romain, ni empire» ?",a:"Fondé par Otton Ier en 962, dissous par Napoléon en 1806 — ni saint (autorité papale contestée), ni romain (successeur de Rome de nom seulement), ni empire (trop fragmenté en principautés autonomes)",detail:"Le Saint-Empire romano-germanique (Heiliges Römisches Reich) est une confédération de plusieurs centaines d'États allemands (princes, évêques, villes libres) sous un Empereur élu. La Réforme protestante le fragmente encore davantage. La Guerre de Trente Ans (1618-1648) le dévaste. La Paix de Westphalie (1648) consacre sa faiblesse. Napoléon le dissout en 1806 après Austerlitz."},
{theme:"histoire",focus:"allemagne",diff:"moyen",type:"q",q:"Quel chancelier allemand, Otto von Bismarck, unifie l'Allemagne en 1871 après trois guerres brèves, et quel Empire proclame-t-il dans la Galerie des Glaces de Versailles ?",a:"Bismarck proclame le IIe Reich (Empire allemand) le 18 janvier 1871 dans la Galerie des Glaces après la victoire sur la France — Guillaume Ier de Prusse devient Kaiser",detail:"Bismarck mène trois guerres en 7 ans : contre le Danemark (1864), l'Autriche (1866, guerre des Sept Semaines) et la France (1870-71). La proclamation à Versailles humilie délibérément la France (qui en gardera une rancœur exacerbant la Première Guerre mondiale). Bismarck invente l'assurance maladie (1883) et retraite (1889) pour contrer le socialisme — ancêtre de l'État-providence."},
{theme:"histoire",focus:"allemagne",diff:"moyen",type:"q",q:"Quelle Révolution allemande de novembre 1918 renverse Guillaume II et proclame la République de Weimar, et quel dirigeant socialiste est assassiné en janvier 1919 avec Rosa Luxemburg ?",a:"Karl Liebknecht est assassiné avec Rosa Luxemburg par les Freikorps (milices paramilitaires) en janvier 1919 — ils avaient tenté une révolution spartakiste sur le modèle soviétique",detail:"Novembre 1918 : mutineries de marins à Kiel, Conseils ouvriers dans toute l'Allemagne. Guillaume II abdique le 9 novembre. Liebknecht proclame la 'République socialiste libre' depuis le Berliner Schloss — 2 heures après, Scheidemann proclame la 'République' depuis le Reichstag. La République de Weimar est née dans le chaos. Les spartakistes (future KPD) sont écrasés par les Freikorps mandatés par le gouvernement social-démocrate."},
{theme:"histoire",focus:"allemagne",diff:"difficile",type:"q",q:"Quel procès, les procès de Nuremberg (1945-1946), crée pour la première fois dans l'histoire le concept de 'crime contre l'humanité', et combien de dirigeants nazis sont condamnés à mort ?",a:"12 dirigeants nazis sont condamnés à mort par le Tribunal militaire international — dont Göring (suicide avant l'exécution), Ribbentrop, Keitel, Jodl. Hermann Göring se suicide dans sa cellule",detail:"Les procès de Nuremberg jugent 24 hauts dirigeants nazis pour crimes de guerre, crimes contre la paix et crimes contre l'humanité (concept créé pour l'occasion). 12 sont condamnés à mort, 7 à l'emprisonnement, 3 acquittés. Göring avale une capsule de cyanure 2 heures avant sa pendaison. Ces procès fondent le droit international pénal et inspirent le Tribunal pénal international (La Haye)."},
{theme:"histoire",focus:"allemagne",diff:"moyen",type:"q",q:"Quel plan américain (Plan Marshall, 1948) injecte 1,4 milliard de dollars en Allemagne de l'Ouest, permettant le 'Wirtschaftswunder' et liant la reconstruction allemande à l'ordre occidental ?",a:"Le Plan Marshall (European Recovery Program) finance la reconstruction de l'Europe occidentale — l'Allemagne de l'Ouest reçoit 1,4 milliard sur 12,4 milliards au total (1948-1952)",detail:"George Marshall annonce le plan en juin 1947. L'URSS refuse et interdit aux pays de l'Est d'y participer. L'aide est conditionnée à des réformes libérales et à la coopération économique européenne (naissance de l'OECE, ancêtre de l'OCDE). L'Allemagne de l'Ouest reçoit 1,4 Md$ et connaît une croissance de 8 %/an dans les années 1950. Le deutschmark remplace le Reichsmark (1948) — réforme monétaire décisive."},
{theme:"histoire",focus:"allemagne",diff:"difficile",type:"q",q:"Quel historien allemand, Fritz Fischer, provoque une 'querelle des historiens' en 1961 en affirmant que l'Allemagne voulait délibérément la Première Guerre mondiale pour conquérir une hégémonie mondiale ?",a:"Fischer ('Les Buts de guerre de l'Allemagne impériale', 1961) choque l'Allemagne en montrant que le gouvernement impérial avait des plans expansionnistes précis avant 1914 — remettant en cause la version 'accidentelle' de la guerre",detail:"Fischer publie 'Griff nach der Weltmacht' (1961) basé sur des archives allemandes : avant 1914, le gouvernement allemand planifiait d'annexer une grande partie de l'Europe. La thèse choque car elle contredit la vision officielle allemande d'une guerre défensive. Le débat Fischer divise les historiens pendant des décennies. L'historiographie contemporaine reconnaît la responsabilité allemande tout en la nuançant."},
{theme:"histoire",focus:"allemagne",diff:"facile",type:"q",q:"Quel mur, construit par la RDA à partir du 13 août 1961, divise Berlin pendant 28 ans et devient le symbole de la Guerre froide et de la dictature communiste ?",a:"Le Mur de Berlin (Berliner Mauer) — 155 km de béton, 302 miradors, mines anti-personnel, 140 personnes tuées en tentant de le franchir",detail:"La construction commence dans la nuit du 12 au 13 août 1961 pour stopper l'hémorragie de 3,5 millions d'Allemands de l'Est fuyant vers l'Ouest. Le mur est d'abord du fil barbelé, puis du béton armé. Kennedy déclare 'Ich bin ein Berliner' en 1963. Reagan exige 'Monsieur Gorbatchev, abattez ce mur' en 1987. Le mur tombe le 9 novembre 1989."},
{theme:"histoire",focus:"allemagne",diff:"moyen",type:"q",q:"Quel programme de dénazification mis en place par les Alliés après 1945 visait à purger l'Allemagne des idéologies nazies, et pourquoi a-t-il été en grande partie un échec selon les historiens ?",a:"La dénazification (Entnazifizierung) classe 8 millions d'Allemands en 5 catégories — mais la Guerre froide précipite la réintégration d'anciens nazis pour reconstruire l'administration ouest-allemande",detail:"Les Alliés créent 4 catégories : criminels de guerre, militants nazis, moindres délinquants, suiveurs, disculpés. 8 millions d'Allemands passent devant des commissions. Mais dès 1947, la priorité change : reconstruire l'Allemagne de l'Ouest contre l'URSS. D'anciens nazis retrouvent des postes dans l'administration, la justice, l'armée (Wehrmacht → Bundeswehr). Hans Globke (rédacteur des lois de Nuremberg) devient secrétaire d'État d'Adenauer."},
{theme:"histoire",focus:"allemagne",diff:"difficile",type:"q",q:"Quel attentat des Jeux olympiques de Munich en 1972, perpétré par le groupe Septembre Noir, se termine par la mort de 11 athlètes israéliens lors d'un assaut raté des forces spéciales allemandes ?",a:"Le 5 septembre 1972, 8 membres de Septembre Noir prennent en otage l'équipe olympique israélienne — l'assaut à l'aéroport de Fürstenfeldbruck tourne au massacre : 11 otages, 5 terroristes et 1 policier tués",detail:"L'Allemagne voulait montrer au monde une image détendue et démocratique aux antipodes de Berlin 1936. L'opération policière à l'aéroport est désastreuse : pas assez de tireurs d'élite, pas de lumière. Les terroristes tuent les otages à bout portant dans les hélicoptères. Le CIO attend 34 heures avant de suspendre les Jeux. Le Mossad lance l'opération Colère de Dieu pour éliminer les responsables — sujet du film Munich (Spielberg, 2005)."},
{theme:"histoire",focus:"allemagne",diff:"moyen",type:"q",q:"Quel mouvement de résistance anti-nazie, le Cercle de Kreisau (Kreisauer Kreis), réunit des aristocrates, officiers et intellectuels autour de Helmuth James von Moltke pour planifier l'Allemagne d'après-guerre ?",a:"Le Cercle de Kreisau (1940-1944) élabore des plans de reconstruction démocratique et fédérale de l'Allemagne après la chute du nazisme — von Moltke est arrêté en 1944 et pendu en 1945",detail:"Helmuth James von Moltke (arrière-petit-neveu du maréchal von Moltke) réunit à Kreisau (Silésie) des résistants issus de milieux très divers : officiers, socialistes, chrétiens, nobles. Ils refusent l'assassinat de Hitler mais planifient un gouvernement post-nazi décentralisé et chrétien-social. Arrêté avant le complot du 20 juillet 1944, von Moltke est pendu en janvier 1945. Son procès devant Freisler est resté célèbre pour son courage."},
{theme:"histoire",focus:"allemagne",diff:"facile",type:"q",q:"Quelle chancelière allemande, Angela Merkel, dirige l'Allemagne de 2005 à 2021 et est surnommée 'la femme la plus puissante du monde' pendant plus de 10 ans par Forbes ?",a:"Angela Merkel (née en 1954) — physicienne de RDA, première femme chancelière allemande, 16 ans au pouvoir, référence de stabilité en Europe",detail:"Merkel grandit en RDA (fille de pasteur), fait un doctorat en physique quantique, entre en politique après 1989. Chancelière CDU en 2005, réélue 3 fois. Elle gère la crise de l'euro (2010-2012), accueille 1 million de réfugiés syriens (2015-16, «Wir schaffen das»), négocie les accords de Minsk, gère le Brexit et Trump. Sa phrase lors de la crise des réfugiés («Nous y arriverons») est restée dans l'histoire."},
{theme:"histoire",focus:"allemagne",diff:"difficile",type:"q",q:"Quel philosophe et révolutionnaire, Karl Marx, né à Trèves en 1818, rédige avec Friedrich Engels le Manifeste du Parti Communiste (1848) et Le Capital (1867), dont l'influence mondiale est encore présente aujourd'hui ?",a:"Karl Marx (1818-1883) — sa théorie du matérialisme historique, de la lutte des classes et de la plus-value est à l'origine du marxisme, socialisme scientifique et des révolutions communistes du XXe siècle",detail:"Marx étudie à Berlin et Bonn, est expulsé de Prusse puis de France, se réfugie à Londres où il écrit Le Capital. Il analyse le capitalisme comme système d'exploitation de la plus-value (travail non payé). Son influence : révolutions russe (1917), chinoise (1949), cubaine (1959), mouvements syndicaux et partis socialistes du monde entier. Ses théories ont été appliquées de manières très différentes selon les pays."},
{theme:"histoire",focus:"allemagne",diff:"moyen",type:"q",q:"Quel événement dit 'Nuit des longs couteaux' du 30 juin 1934 permet à Hitler de consolider son pouvoir en faisant assassiner Ernst Röhm et les SA, avec l'aide des SS et de la Wehrmacht ?",a:"Hitler fait éliminer les dirigeants des SA (Sturmabteilung) dont Röhm, qui réclamait une 'seconde révolution' sociale — les SS de Himmler et la Wehrmacht en profitent pour affirmer leur primauté",detail:"Ernst Röhm voulait transformer les SA (3 millions d'hommes) en armée populaire révolutionnaire, menaçant la Wehrmacht traditionnelle. Hitler, sous pression des généraux et de Göring/Himmler, décide d'agir. Pendant le week-end des 30 juin-2 juillet, 85 à 200 personnes sont exécutées sans procès (dont des opposants non-SA). La Wehrmacht prête ensuite serment personnel à Hitler. Les SS deviennent une force autonome."},
{theme:"geo",focus:"allemagne",diff:"facile",type:"q",q:"Quelle ville allemande, capitale de la Bavière, est connue pour l'Oktoberfest, le palais Nymphenburg et les Alpes à portée de train, et abrite le siège de BMW ?",a:"Munich (München) — 3e ville d'Allemagne, capitale de la Bavière, siège de BMW, Allianz, MAN",detail:"Munich est fondée en 1158. Elle accueille les JO d'été de 1972 (marqués par la prise d'otages). L'Englischer Garten (373 ha) est le plus grand parc urbain d'Europe. L'Oktoberfest (depuis 1810, fête du mariage du roi Louis Ier) attire 6 millions de visiteurs. Le Deutsches Museum (sciences et techniques) est l'un des plus grands du monde. BMW (Bayerische Motoren Werke) y est fondé en 1916."},
{theme:"geo",focus:"allemagne",diff:"facile",type:"q",q:"Quel port de la mer Baltique, Hambourg, est le 2e plus grand port d'Europe et la 'porte du monde' de l'Allemagne — et quel quartier historique dit de l''Entrepôt' est inscrit au patrimoine UNESCO ?",a:"Hambourg abrite la Speicherstadt ('ville des entrepôts'), plus grand complexe d'entrepôts en briques rouges du monde (1880-1914), inscrit à l'UNESCO en 2015",detail:"Hambourg (1,8 million d'habitants) est une cité-État (Freie und Hansestadt Hamburg). Son port traite 130 millions de tonnes/an. La Speicherstadt (64 000 m²) stockait épices, café, thé, cacao — ses entrepôts sur pilotis flottent sur les canaux. Le HafenCity, la plus grande extension urbaine d'Europe, se construit autour. Hambourg abrite aussi la Reeperbahn (quartier de divertissement) où les Beatles ont fait leurs premières armes."},
{theme:"geo",focus:"allemagne",diff:"moyen",type:"q",q:"Quelle frontière naturelle, le Rhin, sépare l'Allemagne de la France et de la Suisse sur plus de 860 km, et quelle gorge rhénane est inscrite au patrimoine UNESCO ?",a:"La Gorge du Rhin moyen (Oberes Mittelrheintal) entre Coblence et Bingen — 65 km de vignobles, châteaux médiévaux et la légendaire Lorelei, inscrite à l'UNESCO en 2002",detail:"Le Rhin prend sa source en Suisse (Grisons), traverse le lac de Constance, entre en Allemagne à Bâle, traverse la plaine du Rhin supérieur (Alsace-Bade), puis la Gorge romantique avant de se jeter aux Pays-Bas. La Lorelei (rocher de 132 m) est associée à une sirène dont le chant envoûtait les bateliers dans la légende romantique (Heine, 1824). Le Rhin est la principale voie navigable d'Europe."},
{theme:"geo",focus:"allemagne",diff:"moyen",type:"q",q:"Quelle île de la mer du Nord, Sylt, est l'île la plus septentrionale d'Allemagne et un lieu de villégiature huppé — et pourquoi son littoral recule-t-il de 1-2 mètres par an ?",a:"Sylt (99 km²) perd 1-2 m de littoral/an par érosion naturelle — des rechargements de sable artificiels (3 millions de m³/an) ralentissent la disparition progressive de l'île",detail:"Sylt est une île-barrière de sable rattachée au continent par une digue ferroviaire (Hindenburgdamm, 1927). Ses plages de sable fin et ses dunes (Dünen) attirent une clientèle aisée (villas à 20 000 €/m²). L'île perd 1 à 2 mètres de côte par an sous l'effet des vagues de la mer du Nord. Le rechargement de sable (dragage en mer, déversement sur les plages) coûte des millions par an — bataille perdue selon certains climatologues."},
{theme:"geo",focus:"allemagne",diff:"facile",type:"q",q:"Quelle vallée d'Allemagne, la Vallée du Vin allemand (Deutsche Weinstraße) en Rhénanie-Palatinat, est l'une des plus grandes zones viticoles allemandes, réputée pour ses Rieslings ?",a:"La Route des Vins allemande (Deutsche Weinstraße, 85 km) traverse le Palatinat entre la forêt du Palatinat et le Rhin — le Riesling est le cépage roi de l'Allemagne",detail:"L'Allemagne produit principalement des vins blancs (Riesling, Müller-Thurgau, Spätburgunder/Pinot Noir). Les vins allemands sont classés par degré de maturité (Spätlese, Auslese, Beerenauslese, Trockenbeerenauslese). Le Riesling du Rheingau et de Moselle est parmi les vins blancs les plus respectés du monde. La classification VDP (Verband Deutscher Prädikatsweingüter) est l'équivalent des Grands Crus français."},
{theme:"geo",focus:"allemagne",diff:"difficile",type:"q",q:"Pourquoi la géographie de l'Allemagne, pays sans frontières naturelles nettes à l'est et à l'ouest, a-t-elle conditionné sa politique étrangère d''encerclement' et sa propension historique aux alliances militaires offensives ?",a:"L'Allemagne centrale (Mittellage) est exposée sur deux fronts — cette géographie a nourri la peur de l'encerclement (Einkreisung) qui justifie en partie les politiques d'alliance agressive de Bismarck à Hitler",detail:"La 'Mittellage' (position centrale) de l'Allemagne sans barrières naturelles (Pyrénées, Manche, Atlantique) l'expose à des guerres sur deux fronts (1914, 1941). Bismarck gère cette vulnérabilité par un système d'alliances complexes. Guillaume II le rompt, conduisant à l'encerclement de 1914. Hitler radicalise cette obsession en cherchant d'abord une alliance avec l'Angleterre, puis en envahissant à l'est. La Realpolitik allemande reste marquée par cette géographie."},
{theme:"geo",focus:"allemagne",diff:"moyen",type:"q",q:"Quelle ville saxonne, Dresde, est surnommée 'Florence de l'Elbe' pour son architecture baroque, et quel événement de février 1945 la réduit à 80 % en cendres en deux nuits de bombardements alliés ?",a:"Le bombardement de Dresde des 13-15 février 1945 par la RAF et l'USAF tue entre 22 000 et 25 000 personnes et détruit le centre historique baroque — l'Opéra Semper et la Frauenkirche sont reconstruits à l'identique",detail:"Dresde est l'une des plus belles villes baroques d'Europe (résidence des Électeurs de Saxe). Le débat sur la nécessité militaire du bombardement reste ouvert : la guerre était quasiment gagnée, les réfugiés encombraient la ville. Les victimes sont longtemps surestimées à 135 000 (propagande nazie puis est-allemande). La Frauenkirche, reconstitué grâce à des dons mondiaux, rouvre en 2005. David Irving utilise le bombardement pour minimiser la Shoah — il est condamné pour négationnisme en Autriche."},
{theme:"geo",focus:"allemagne",diff:"facile",type:"q",q:"Quel massif montagneux, les Alpes bavaroises, culmine avec le Zugspitze (2 962 m) — point le plus haut d'Allemagne — et abrite quel château fantasmagorique du roi Louis II de Bavière ?",a:"Le Zugspitze (2 962 m) est le point culminant de l'Allemagne — les Alpes bavaroises abritent Neuschwanstein, château de Louis II (1869-1886), modèle du château de la Belle au Bois Dormant de Disney",detail:"Louis II de Bavière ('le roi fou') fait construire Neuschwanstein (1869-1886) sur un piton rocheux dans les gorges de la Pöllat. Il y vit 172 jours. Mort mystérieux en 1886 dans le lac Starnberg (noyade ou meurtre). Walt Disney s'inspire de Neuschwanstein pour le château de Cendrillon. 1,5 million de visiteurs/an en font le château le plus visité d'Allemagne."},
{theme:"sciences",focus:"allemagne",diff:"facile",type:"q",q:"Quel scientifique allemand Albert Einstein est né à Ulm en 1879, publie en 1905 'l'Annus mirabilis' (4 articles révolutionnaires) et reçoit le Nobel en 1921 pour quelle découverte ?",a:"Einstein reçoit le Nobel non pour la relativité mais pour l'explication de l'effet photoélectrique — démontrant la nature quantique de la lumière (photons)",detail:"En 1905 : relativité restreinte (E=mc²), mouvement brownien, effet photoélectrique, thèse de doctorat. Tous révolutionnaires. Le Nobel 1921 récompense l'effet photoélectrique (fondement de la physique quantique) — le comité juge la relativité trop controversée. Einstein fuit l'Allemagne nazie en 1933, devient citoyen américain. Il co-signe la lettre à Roosevelt qui lance le projet Manhattan, puis s'oppose à la bombe."},
{theme:"sciences",focus:"allemagne",diff:"moyen",type:"q",q:"Quel chimiste allemand, August Kekulé, découvre en 1865 la structure cyclique de la molécule de benzène après avoir rêvé d'un serpent se mordant la queue ?",a:"Kekulé rêve (selon la légende) d'un ouroboros (serpent circulaire) et comprend que le benzène est un anneau de 6 carbones — fondement de la chimie organique aromatique",detail:"La structure du benzène (C6H6) est un mystère pendant des décennies : 6 carbones avec 6 hydrogènes ne correspondent à aucune chaîne linéaire stable. Kekulé propose l'anneau hexagonal alternant liaisons simples et doubles (structure mésomère). Cette découverte ouvre la chimie aromatique (aspirine, colorants, explosifs, médicaments). La légende du rêve est probablement une reconstruction a posteriori mais reste dans l'histoire des sciences."},
{theme:"sciences",focus:"allemagne",diff:"moyen",type:"q",q:"Quelle chercheuse austro-suédoise Lise Meitner, collaboratrice d'Otto Hahn, co-découvre la fission nucléaire en 1938 mais est écartée du Prix Nobel décerné à Hahn seul en 1944, en partie parce qu'elle était juive ?",a:"Lise Meitner (1878-1968) fuit l'Autriche annexée (Anschluss) en 1938, mais continue à travailler avec Hahn par courrier et co-signe l'explication théorique de la fission — Hahn seul reçoit le Nobel 1944",detail:"Hahn et Strassmann bombardent de l'uranium avec des neutrons et obtiennent du baryum (résultat incompréhensible). Meitner et son neveu Otto Frisch expliquent : le noyau d'uranium s'est scindé en deux (fission) avec libération d'énergie (E=mc²). Meitner refuse de travailler sur le projet Manhattan. L'élément 109 (meitnerium) porte son nom depuis 1997. Elle est citée comme exemple majeur de discrimination de genre dans l'histoire des sciences."},
{theme:"sciences",focus:"allemagne",diff:"difficile",type:"q",q:"Quel projet scientifique prussien, le cercle de naturalistes de Berlin des années 1820-1840 autour de Alexander von Humboldt, Ehrenberg et Dirichlet, a-t-il créé le modèle de l'université de recherche moderne ?",a:"L'Université Humboldt (Universität zu Berlin, fondée 1810) invente le modèle Humboldtien : unité de l'enseignement et de la recherche, liberté académique, laboratoire comme lieu central — copié dans le monde entier",detail:"Wilhelm von Humboldt (frère du naturaliste Alexander) réforme l'université prussienne en 1810 : les professeurs doivent faire de la recherche, pas seulement enseigner. Ce 'modèle humboldtien' (Einheit von Forschung und Lehre) est adopté par les universités américaines (Johns Hopkins, 1876) puis mondiales. Il s'oppose au modèle français des Grandes Écoles (enseignement seul). L'université de Berlin recrute Fichte, Hegel, Humboldt comme premiers professeurs."},
{theme:"sciences",focus:"allemagne",diff:"facile",type:"q",q:"Quel mathématicien allemand Carl Friedrich Gauss (1777-1855) est surnommé 'le prince des mathématiques' et a contribué à l'algèbre, la géométrie non-euclidienne, la physique magnétique et la statistique ?",a:"Gauss démontre à 18 ans que tout polygone régulier à 17 côtés est constructible à la règle et au compas — l'une des nombreuses contributions fondatrices de 'la plus grande mathématicien depuis Archimède'",detail:"Gauss : distribution normale ('courbe en cloche', Gauss), méthode des moindres carrés (prédire l'orbite de Cérès), théorème fondamental de l'algèbre (tout polynôme a une racine complexe), géodésie (courbe de la Terre), magnétisme terrestre (avec Weber). Sa densité d'oeuvres inédites découvertes après sa mort a alimenté les mathématiques pendant des décennies. Les billets allemands de 10 DM portaient son portrait."},
{theme:"sciences",focus:"allemagne",diff:"moyen",type:"q",q:"Quel chimiste allemand Justus von Liebig (1803-1873) révolutionne l'agriculture avec ses travaux sur les engrais minéraux et créé les premières méthodes d'analyse chimique modernes ?",a:"Liebig démontre que les plantes absorbent azote, phosphore et potassium du sol — fondement de la chimie agricole, ancêtre des engrais modernes qui nourrissent aujourd'hui 50 % de l'humanité",detail:"Liebig crée le premier laboratoire chimique universitaire (Giessen, 1824) et invente l'enseignement par la pratique. Il démontre que la croissance des plantes est limitée par le nutriment le moins abondant (loi du minimum). Ses engrais minéraux quadruplent les rendements agricoles. Il invente aussi le bouillon de boeuf concentré (ancêtre du Liebig's Extract) et contribue à la chimie organique. Il se trompe cependant sur la fermentation (il croit à une réaction chimique pure, non des levures)."},
{theme:"sciences",focus:"allemagne",diff:"difficile",type:"q",q:"Quel prix Nobel de physique allemand, Max Planck (1858-1947), fonde la physique quantique en 1900 en proposant que l'énergie est émise en 'quanta' discrets pour résoudre le problème du 'catastrophe ultraviolette' ?",a:"Planck introduit la constante h (6,626×10⁻³⁴ J·s) et l'idée révolutionnaire que l'énergie rayonnante n'est pas continue mais discrète (E=hν) — il qualifie lui-même cela d'«acte de désespoir»",detail:"La 'catastrophe ultraviolette' : la physique classique prédit que les corps chauds émettent une énergie infinie aux hautes fréquences — absurde. Planck résout l'équation en imposant que l'énergie soit émise par 'paquets' (quanta). Il y croit d'abord peu (artifice mathématique) mais Einstein en 1905 (effet photoélectrique) montre que les quanta sont réels. La physique quantique est née. Planck perd son fils Erwin, résistant, pendu par les nazis en 1945."},
{theme:"sciences",focus:"allemagne",diff:"moyen",type:"q",q:"Quel médecin allemand Robert Koch (1843-1910) découvre le bacille de la tuberculose (1882) et du choléra (1883), jetant les bases de la bactériologie moderne, et reçoit le Prix Nobel en 1905 ?",a:"Koch isole Mycobacterium tuberculosis en 1882 et Vibrio cholerae en 1883 — il développe les postulats de Koch, critères pour établir qu'un micro-organisme cause une maladie",detail:"Koch invente des techniques : culture bactérienne sur milieux solides (gélatine puis agar-agar de sa femme), coloration des bactéries (cristal violet), microphotographie bactérienne. Ses postulats : l'agent doit être présent dans tous les cas malades, isolé en culture pure, reproduire la maladie en inoculant un animal sain, être ré-isolé. Sa rivalité avec Pasteur (France vs Allemagne) stimule la bactériologie des années 1880."},
{theme:"sciences",focus:"allemagne",diff:"facile",type:"q",q:"Quel imprimeur allemand Johannes Gutenberg invente vers 1450 l'imprimerie à caractères mobiles en métal, révolution technique qui permet la diffusion du savoir et joue un rôle décisif dans la Réforme protestante ?",a:"Gutenberg invente la presse à imprimer à caractères métalliques mobiles vers 1450 à Mayence — sa Bible ('Bible de Gutenberg', 1455) est le premier livre imprimé en Europe",detail:"Gutenberg combine plusieurs innovations : caractères en alliage plomb-étain-antimoine (plus durables que le bois), presse à vis adaptée des pressoirs à vin, encre à base d'huile. Sa Bible à 42 lignes (180 exemplaires) révolutionne la diffusion du savoir. L'imprimerie permet la Réforme (Luther tire ses 95 Thèses à des milliers d'exemplaires en quelques semaines). Gutenberg lui-même meurt ruiné, ses créanciers ayant saisi son imprimerie."},
{theme:"sciences",focus:"allemagne",diff:"difficile",type:"q",q:"Quel ingénieur allemand Werner von Braun (1912-1977), ancien membre du parti nazi et concepteur des V2 (missiles balistiques du IIIe Reich), devient ensuite le père du programme spatial américain Apollo ?",a:"Von Braun développe le V2 en utilisant les travaux forcés du camp de Dora (20 000 morts). Arrêté par les Américains en 1945 (Opération Paperclip), il conçoit la Saturn V qui emmène les Américains sur la Lune",detail:"Le V2 (Vergeltungswaffe 2) est le premier missile balistique opérationnel (octobre 1944). 3 000 s'abattent sur Londres et Anvers. Son carburant est fabriqué dans les tunnels souterrains de Mittelwerk par les prisonniers du camp de Dora — plus de morts dans la fabrication que dans les impacts. Von Braun nie sa connaissance des conditions. Sous l'Opération Paperclip (recrutement des scientifiques nazis), il rejoint la NASA. La Saturn V (1967) propulse Apollo 11."},
{theme:"philo",focus:"allemagne",diff:"facile",type:"q",q:"Quel philosophe allemand Immanuel Kant (1724-1804), auteur de la Critique de la raison pure (1781), formule l'impératif catégorique : 'Agis uniquement selon la maxime qui te permettrait de vouloir en même temps qu'elle devienne loi universelle' ?",a:"Kant fonde la morale déontologique : une action est bonne si son principe peut être universalisé sans contradiction — indépendamment des conséquences (contrairement à l'utilitarisme)",detail:"Kant ne quitte jamais Königsberg (aujourd'hui Kaliningrad). Sa 'révolution copernicienne' en philosophie : ce n'est pas l'esprit qui s'adapte au monde, c'est le monde qui est structuré par les catégories de l'esprit (espace, temps, causalité). La Critique de la raison pure limite la raison spéculative (on ne peut prouver ni Dieu ni l'âme). La Critique de la raison pratique fonde la morale. Sa ponctualité légendaire servait d'horloge aux habitants de Königsberg."},
{theme:"philo",focus:"allemagne",diff:"moyen",type:"q",q:"Quel philosophe allemand Martin Heidegger (1889-1976), auteur d''Être et Temps' (1927), est considéré comme l'un des plus grands philosophes du XXe siècle malgré son adhésion au parti nazi en 1933 ?",a:"Heidegger questionne 'le sens de l'Être' — son 'Dasein' (être-là) est un existant jeté dans le monde, face à sa propre mort, qui doit se choisir authentiquement",detail:"'Être et Temps' (1927) analyse le 'Dasein' comme être-au-monde, temporel, mortel. L'angoisse face à la mort révèle la finitude et pousse à l'authenticité. Heidegger rejoint le NSDAP en 1933, devient recteur de Fribourg, prononce un discours pro-nazi. Il ne s'en repent jamais clairement. Ses 'Cahiers noirs' (publiés en 2014) révèlent un antisémitisme philosophique. Ses étudiants : Sartre, Arendt (dont il est le professeur et amant), Gadamer."},
{theme:"philo",focus:"allemagne",diff:"moyen",type:"q",q:"Quel philosophe et sociologue Jürgen Habermas (né en 1929) défend l'idéal d'une 'raison communicationnelle' et d'une 'démocratie délibérative' contre les théories postmodernes et les populismes ?",a:"Habermas (École de Francfort, 2e génération) propose que la rationalité moderne n'est pas seulement instrumentale mais aussi communicationnelle — le dialogue rationnel est le fondement de la démocratie",detail:"Habermas distingue la rationalité instrumentale (moyens/fins, critiquée par Adorno/Horkheimer) de la rationalité communicationnelle (entente par le dialogue). Sa Théorie de l'agir communicationnel (1981) fonde une éthique de la discussion. Il défend ardemment le projet européen et la démocratie libérale contre les populismes. Interviewé après l'attentat du 11 septembre, il introduit le concept de «terreur communicatrice»."},
{theme:"philo",focus:"allemagne",diff:"difficile",type:"q",q:"Quelle philosophe Hannah Arendt (1906-1975), disciple de Heidegger, analyse le totalitarisme (1951) et la «banalité du mal» lors du procès Eichmann (1963) — contestant l'idée d'un mal diabolique et radicalement intentionnel ?",a:"Arendt montre qu'Eichmann n'est pas un monstre mais un bureaucrate ordinaire incapable de pensée morale indépendante — le mal peut être banal, commis sans malveillance par l'abdication de la pensée",detail:"Arendt assiste au procès Eichmann à Jérusalem pour The New Yorker. Elle est choquée : Eichmann est un fonctionnaire terne, incapable de 'penser'. Elle en tire la «banalité du mal» — concept mal compris (elle ne dit pas que la Shoah est banale, mais que son exécutant principal manquait de toute profondeur diabolique). Sa thèse scandalise (certains l'accusent de minimiser la Shoah). Ses Origines du totalitarisme (1951) sont toujours la référence sur le sujet."},
