{theme:"economie",diff:"facile",type:"q",q:"Quelle organisation internationale, créée en 1944 à Bretton Woods, régule le système monétaire mondial et prête aux pays en difficulté de balance des paiements ?",a:"Le Fonds Monétaire International (FMI)",detail:"Le FMI et la Banque mondiale naissent simultanément lors de la conférence de Bretton Woods. Le FMI accorde des prêts conditionnels (ajustement structurel) aux pays en crise. Il compte 190 membres et son siège est à Washington."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel accord de libre-échange, signé en 1994, unit les États-Unis, le Canada et le Mexique, et sous quel nom est-il renégocié en 2020 ?",a:"L'ALENA (renégocié ACEUM/USMCA en 2020 sous l'administration Trump)",detail:"L'ALENA supprime les droits de douane entre les trois pays, créant la plus grande zone de libre-échange du monde à l'époque. La renégociation de 2020 introduit des règles plus strictes sur le contenu américain dans l'automobile."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel phénomène économique désigne la coexistence d'une inflation élevée et d'un chômage élevé, frappant les économies occidentales dans les années 1970 ?",a:"La stagflation",detail:"La stagflation contredit la courbe de Phillips (qui prédisait un arbitrage entre inflation et chômage) et invalide la politique keynésienne de relance. Elle ouvre la voie au monétarisme et aux politiques de désinflation compétitive des années 1980."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel économiste indien, Prix Nobel 1998, développe la théorie des capabilités et co-crée l'Indice de Développement Humain (IDH) avec le PNUD en 1990 ?",a:"Amartya Sen (né en 1933)",detail:"Sen propose de mesurer le développement par les libertés et capacités réelles des individus (santé, éducation, participation). Ses travaux sur les famines montrent qu'elles résultent de défaillances politiques et d'inégalités dans l'accès à la nourriture, non de pénuries absolues."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel économiste français publie en 2013 Le Capital au XXIe siècle, montrant que le taux de rendement du capital tend à dépasser le taux de croissance ?",a:"Thomas Piketty (né en 1971)",detail:"Piketty montre à partir de données historiques que r > g entraîne une concentration croissante des richesses. Son livre, traduit dans 40 langues, relance le débat mondial sur la taxation du capital et les inégalités patrimoniales."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel mécanisme de politique monétaire consiste pour une banque centrale à acheter massivement des actifs financiers pour injecter des liquidités quand les taux sont déjà à zéro ?",a:"L'assouplissement quantitatif (Quantitative Easing ou QE)",detail:"Le QE est pratiqué par la Fed dès 2008, puis par la BCE à partir de 2015. Il gonfle le bilan des banques centrales (plus de 8 000 milliards $ pour la Fed) mais son efficacité sur l'économie réelle reste débattue."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel économiste américain Prix Nobel 2001 montre dans 'The Market for Lemons' que l'asymétrie d'information conduit à la défaillance des marchés ?",a:"George Akerlof (né en 1940)",detail:"Akerlof montre que sur le marché des voitures d'occasion, l'incertitude sur la qualité pousse les bons vendeurs à quitter le marché, ne laissant que les mauvaises voitures ('lemons'). Ce modèle s'applique aux marchés du crédit, de l'assurance et de la santé."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel psychologue israélo-américain, Prix Nobel d'économie 2002, fonde l'économie comportementale en distinguant pensée rapide (Système 1) et pensée lente (Système 2) ?",a:"Daniel Kahneman (1934-2024)",detail:"Kahneman, avec Amos Tversky, développe la théorie des perspectives : les pertes pèsent deux fois plus que les gains équivalents (aversion à la perte). Son livre Système 1 / Système 2 (2011) est un best-seller mondial de vulgarisation."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel économiste britannique du XVIIIe siècle théorise l'avantage comparatif, montrant que le libre-échange bénéficie à tous même quand un pays est moins efficace dans toutes les productions ?",a:"David Ricardo (1772-1823)",detail:"Ricardo illustre son principe avec le Portugal et l'Angleterre : même si le Portugal produit vin et drap mieux qu'l'Angleterre, les deux gagnent à se spécialiser dans leur avantage relatif. C'est le fondement théorique du libre-échange international."},
{theme:"economie",diff:"moyen",type:"q",q:"Quelle courbe popularisée en 1974 suggère qu'au-delà d'un certain taux d'imposition, augmenter les impôts réduit les recettes fiscales ?",a:"La courbe de Laffer — Arthur Laffer",detail:"La courbe est dessinée sur une serviette de restaurant lors d'un dîner avec des conseillers de Ford et Rumsfeld. Elle inspire la 'Reaganomics' et les baisses d'impôts des années 1980. L'argument 'trop d'impôt tue l'impôt' reste très débattu empiriquement."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel économiste américain forge le concept de 'consommation ostentatoire' dans La Théorie de la classe de loisir (1899), décriant la dépense comme signal de statut social ?",a:"Thorstein Veblen (1857-1929)",detail:"Les 'biens Veblen' sont ceux dont la demande augmente avec le prix (luxe, art, grandes écoles). Veblen fonde l'institutionnalisme américain, courant critique du capitalisme qui analyse les institutions et les comportements sociaux plutôt que les seuls marchés."},
{theme:"economie",diff:"facile",type:"q",q:"Quelle organisation internationale créée en 1995 en remplacement du GATT régule le commerce mondial et arbitre les différends commerciaux entre les 164 États membres ?",a:"L'Organisation mondiale du commerce (OMC)",detail:"L'OMC gère les négociations tarifaires (cycle de Doha) et son organe de règlement des différends est la seule juridiction internationale obligatoire pour les États en matière commerciale. Les négociations de Doha, lancées en 2001, sont au point mort depuis 2008."},
{theme:"economie",diff:"facile",type:"q",q:"Quel regroupement de 20 grandes économies représentant 85 % du PIB mondial devient le principal forum de coordination économique mondiale après la crise de 2008 ?",a:"Le G20",detail:"Le G20, créé en 1999, regroupe les 19 pays les plus riches plus l'Union européenne. Il coordonne les plans de relance après 2008 et la régulation financière mondiale (accords de Bâle III). Il remplace progressivement le G7 comme instance de gouvernance économique."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel phénomène désigne la désindustrialisation d'un pays causée par l'appréciation de sa monnaie suite à l'exploitation d'une ressource naturelle, observé aux Pays-Bas après 1959 ?",a:"Le syndrome hollandais (Dutch disease)",detail:"L'exportation de gaz naturel apprécie le florin néerlandais, rendant les exportations manufacturières moins compétitives. Ce phénomène se retrouve dans de nombreux pays pétroliers (Venezuela, Nigeria) et s'applique aussi aux afflux massifs d'aide internationale."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel économiste américain Prix Nobel 2008 développe la 'nouvelle théorie du commerce international' basée sur les rendements croissants, les économies d'échelle et la géographie économique ?",a:"Paul Krugman (né en 1953)",detail:"Krugman explique pourquoi des pays similaires échangent les mêmes types de produits (commerce intra-branche : l'Allemagne et la France échangent des voitures). Sa théorie de la nouvelle géographie économique explique la concentration industrielle dans certaines régions."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel économiste britannique propose la taxe pigouvienne pour corriger les externalités négatives en faisant payer aux pollueurs le coût social de leur activité ?",a:"Arthur Pigou (1877-1959)",detail:"Une externalité négative (pollution, embouteillages) impose un coût à la société non reflété dans les prix de marché. La taxe pigouvienne, comme la taxe carbone, internalise ce coût externe. C'est le fondement théorique des marchés du carbone et des taxes environnementales."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel théorème économique affirme qu'en l'absence de coûts de transaction, les parties peuvent négocier pour corriger les externalités sans intervention publique ?",a:"Le théorème de Coase — Ronald Coase (Nobel 1991)",detail:"Coase montre que la réglementation publique n'est pas toujours nécessaire si les droits sont clairement définis et les coûts de négociation faibles. Cela inspire les marchés de droits à polluer (EU ETS européen) comme alternative à la taxe pigouvienne."},
{theme:"economie",diff:"facile",type:"q",q:"Quel indicateur statistique mesure le degré d'inégalité dans la distribution des revenus, allant de 0 (égalité parfaite) à 1 (inégalité maximale) ?",a:"Le coefficient de Gini — Corrado Gini (1912)",detail:"Les pays scandinaves ont des Gini autour de 0,25-0,28, les États-Unis autour de 0,40, l'Afrique du Sud autour de 0,60. C'est la mesure d'inégalité la plus utilisée internationalement, mais elle ne capture pas les inégalités de patrimoine aussi bien que les inégalités de revenus."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel économiste américain Prix Nobel 1995 montre que si les agents anticipent rationnellement les politiques économiques, ils les neutralisent — invalidant les modèles keynésiens ?",a:"Robert Lucas (né en 1937) — théorie des anticipations rationnelles",detail:"La 'Critique de Lucas' invalide les modèles économétriques utilisés pour prévoir les effets des politiques. Si les agents anticipent une relance budgétaire, ils épargnent en prévision des impôts futurs, neutralisant l'effet. Ce résultat fonde la 'nouvelle macroéconomie classique'."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel phénomène de panique bancaire, illustré par la faillite de la Silicon Valley Bank en 2023, est une prophétie auto-réalisatrice où la crainte de faillite suffit à provoquer la faillite ?",a:"Le bank run (ruée bancaire)",detail:"Le bank run de SVB (mars 2023) est le premier de l'ère des réseaux sociaux : des rumeurs sur Twitter déclenchent 42 milliards de dollars de retraits en une journée, rendant la banque insolvable. La garantie des dépôts (100 000 € en Europe) existe pour prévenir ces paniques."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel économiste américain Prix Nobel 2001, auteur de La Grande Désillusion, critique les 'thérapies de choc' du FMI imposées aux pays en développement dans les années 1990 ?",a:"Joseph Stiglitz (né en 1943)",detail:"Stiglitz, ancien économiste en chef de la Banque mondiale, critique les privatisations précipitées, l'austérité et la libéralisation rapide des capitaux imposées par le FMI. Il plaide pour une mondialisation équitable tenant compte des inégalités et des spécificités nationales."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel modèle de croissance (1956) montre que seul le progrès technologique explique la croissance à long terme, le capital seul étant soumis aux rendements décroissants ?",a:"Le modèle de Solow — Robert Solow (Nobel 1987)",detail:"Solow montre que si le capital est le seul facteur accumulable, la croissance s'épuise (état stationnaire). Seul le progrès technique exogène ('manne tombée du ciel') permet une croissance durable. Cette limite inspire les théories de la croissance endogène de Romer et Lucas."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel dilemme montre que le pays émetteur de la monnaie de réserve mondiale doit s'endetter pour fournir de la liquidité mondiale, fragilisant ainsi sa monnaie à terme ?",a:"Le dilemme de Triffin — Robert Triffin (1960)",detail:"Triffin prédit que le dollar ne peut pas rester éternellement la monnaie de réserve mondiale sans que les déficits américains finissent par miner sa crédibilité. Sa prédiction se réalise partiellement avec la fin du système de Bretton Woods en 1971 (Nixon Shock)."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel concept de l'économie comportementale désigne la modification de l'architecture des choix pour orienter les décisions sans contrainte ni incitation financière — associé à Richard Thaler (Nobel 2017) ?",a:"Le nudge (coup de pouce)",detail:"Thaler montre que la façon dont les options sont présentées influe massivement sur les choix (opt-in vs opt-out pour les retraites). Le nudge est adopté par de nombreux gouvernements pour améliorer l'épargne retraite, la sécurité routière et les comportements de santé."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel concept développé par Daron Acemoglu, Simon Johnson et James Robinson (Nobel 2024) explique les différences de richesse entre nations par la qualité de leurs institutions politiques ?",a:"La distinction entre institutions 'inclusives' (participatives, innovantes) et 'extractives' (concentrant les richesses au profit d'une élite)",detail:"Dans Pourquoi les nations échouent (2012), ils montrent que c'est la qualité des institutions et non la géographie, la culture ou la religion qui détermine le développement. Ils étudient des 'expériences naturelles' comme la comparaison Corée du Nord / Corée du Sud."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel phénomène observe que la volatilité des cours boursiers est bien trop élevée pour être justifiée par les seules variations des dividendes futurs, remettant en cause les marchés efficients ?",a:"L'excès de volatilité (excess volatility) — Robert Shiller (Nobel 2013)",detail:"Shiller remet en cause l'hypothèse des marchés efficients de Fama. Il développe le ratio CAPE (prix/bénéfices corrigé du cycle) pour détecter les surévaluations boursières et prédit correctement la bulle internet (2000) et la bulle immobilière (2006)."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel phénomène désigne la hausse structurelle du coût des services (santé, éducation, arts du spectacle) par rapport aux biens manufacturés, du fait de la faible progression de leur productivité ?",a:"La maladie de Baumol (Baumol's cost disease) — William Baumol (1967)",detail:"Baumol montre qu'une sonate de Schubert exige toujours autant de musiciens qu'au XIXe siècle, contrairement à la voiture ou au logiciel. Les services à forte intensité humaine voient leurs coûts augmenter structurellement, expliquant la hausse tendancielle des dépenses publiques."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel concept de la théorie des jeux désigne un profil de stratégies où aucun joueur n'a intérêt à s'écarter unilatéralement — du nom d'un mathématicien américain Prix Nobel 1994 ?",a:"L'équilibre de Nash — John Nash (1928-2015)",detail:"L'équilibre de Nash généralise l'analyse stratégique à tous les jeux. Il s'applique aux guerres de prix entre oligopoles, à la course aux armements, aux négociations commerciales. La vie de Nash, marquée par la schizophrénie, inspire le film A Beautiful Mind (2001)."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel économiste hongrois-américain montre dans La Grande Transformation (1944) que l'économie de marché est une construction historique récente qui a déclenché des contre-mouvements sociaux de protection ?",a:"Karl Polanyi (1886-1964)",detail:"Polanyi montre que la marchandisation du travail, de la terre et de la monnaie au XIXe siècle a engendré les syndicats, la protection sociale et le retour du protectionnisme comme réactions de défense de la société. Son analyse nourrit les critiques contemporaines de la mondialisation."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel économiste péruvien est l'auteur du Mystère du capital (2000), expliquant que la pauvreté persiste faute de titres de propriété formels permettant aux pauvres d'accéder au crédit ?",a:"Hernando de Soto (né en 1941)",detail:"De Soto montre que les pauvres des pays en développement possèdent des actifs réels (maisons, terres) mais sans titres légaux formels, ces actifs sont du 'capital mort' : ils ne peuvent pas servir de garantie pour obtenir du crédit et entreprendre."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel mécanisme de marché permet aux entreprises industrielles d'échanger des droits à polluer pour atteindre collectivement un plafond d'émissions de CO2 à moindre coût ?",a:"Le marché carbone (EU ETS — système d'échange de quotas d'émission) — en vigueur en Europe depuis 2005",detail:"L'EU ETS couvre 10 000 installations industrielles. Il fixe un plafond global décroissant et les entreprises s'échangent des quotas (cap and trade). Le prix du CO2 dépasse 80 €/tonne depuis 2022, incitant fortement à réduire les émissions carbonées."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce qu'une externalité négative en économie et quel exemple classique l'illustre ?",a:"Un coût imposé à des tiers non parties à une transaction — la pollution industrielle en est l'exemple type",detail:"Les externalités négatives (pollution, congestion) ne sont pas intégrées dans les prix de marché, conduisant à une surproduction. Les taxes pigouviennes visent à corriger cette défaillance en faisant payer le pollueur."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que l'hypothèse des marchés efficients de Fama et quelle est sa limite principale ?",a:"Eugene Fama (Prix Nobel 2013) — les prix des actifs reflètent toute l'information disponible, rendant impossible de 'battre le marché' régulièrement",detail:"L'hypothèse des marchés efficients fonde la gestion passive (ETF, fonds indiciels) mais est remise en question par les bulles spéculatives et la crise de 2008. Elle reste cependant l'hypothèse de référence en finance académique."},
{theme:"economie",diff:"moyen",type:"q",q:"Quels sont les principaux instruments du protectionnisme économique ?",a:"Droits de douane, quotas d'importation, normes techniques, subventions aux entreprises nationales",detail:"La guerre commerciale sino-américaine déclenchée sous Trump (2018) a relancé le débat sur les coûts et bénéfices du protectionnisme. Les partisans (List, Hamilton) défendent l'industrie naissante et la souveraineté économique contre le libre-échange ricardien."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la théorie de la croissance endogène et qui en sont les pères fondateurs ?",a:"Paul Romer et Robert Lucas (années 1980-90) — la croissance vient de l'intérieur : capital humain, innovation, connaissances",detail:"Contrairement aux modèles néoclassiques (Solow) où la technologie est exogène, Romer montre que l'investissement en R&D et en éducation génère des rendements croissants. Cette théorie justifie les politiques publiques en faveur de l'éducation et de l'innovation."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que le modèle de Solow et que prédit-il sur la convergence économique entre pays riches et pauvres ?",a:"Robert Solow (1956) — les pays pauvres croissent plus vite car le capital y est plus rentable, tendant vers une convergence",detail:"Le modèle de Solow prédit une 'convergence conditionnelle'. Les tigres asiatiques ont rattrapé les pays riches, mais l'Afrique subsaharienne reste à la traîne, ce qui pousse à chercher d'autres facteurs explicatifs comme les institutions."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la dette publique et pourquoi l'étude de Reinhart et Rogoff sur le seuil de 90 % du PIB a-t-elle été remise en cause ?",a:"En 2013, une erreur de tableur Excel dans leur étude de 2010 est découverte, affaiblissant la thèse qu'une dette > 90 % freine automatiquement la croissance",detail:"Reinhart et Rogoff publient une étude très influente justifiant l'austérité. En 2013, un étudiant découvre une erreur dans leur tableur, affaiblissant leur conclusion et relançant le débat sur l'austérité pendant la crise de la zone euro."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la taxe Tobin et quel en est l'objectif ?",a:"Taxe infime sur les transactions financières internationales proposée par James Tobin en 1972 pour réduire la spéculation à court terme",detail:"Tobin propose une taxe de 0,1-0,5 % sur les échanges de devises pour 'jeter du sable dans les rouages' de la spéculation. L'idée revient dans le débat après 2008. L'UE tente d'instaurer une taxe sur les transactions financières sans y parvenir."},
{theme:"economie",diff:"moyen",type:"q",q:"Quels pays ont expérimenté le revenu universel de base (RUB), et quels en sont les résultats ?",a:"Finlande (2017-2018), Kenya, Canada — amélioration du bien-être, sans réduction significative du travail",detail:"Le RUB vise à garantir un filet de sécurité sans conditions ni contrôle. Les expériences montrent une amélioration du bien-être et aucune réduction significative du travail. Son coût global et son financement restent les principaux obstacles à une généralisation."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la financiarisation de l'économie et quelles en sont les critiques ?",a:"La domination croissante de la sphère financière sur l'économie réelle depuis les années 1980 — profits financiers disproportionnés, instabilité accrue",detail:"La part des profits financiers dans les profits totaux explose depuis 1980. Des économistes comme Adair Turner montrent que la finance est devenue trop grande et que son développement excessif nuit à la croissance réelle, notamment en détournant les talents de l'industrie."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la théorie institutionnaliste de Douglass North et pourquoi explique-t-elle les inégalités de développement ?",a:"North (Prix Nobel 1993) — les institutions (règles formelles et informelles) déterminent les incitations et la performance économique",detail:"North montre que les règles formelles (lois, droits de propriété) et informelles (normes, conventions) façonnent les incitations économiques. La différence de développement entre pays s'explique largement par la qualité de leurs institutions."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la stakeholder theory et en quoi s'oppose-t-elle à la vision de Friedman sur le rôle de l'entreprise ?",a:"Freeman (1984) : l'entreprise doit répondre à tous ses acteurs — contre Friedman (1970) : seul le profit des actionnaires compte",detail:"Friedman affirmait que 'la seule responsabilité sociale de l'entreprise est d'augmenter ses profits'. La stakeholder theory, portée par la RSE et les critères ESG, s'impose progressivement dans les grandes entreprises."},
{theme:"economie",diff:"facile",type:"q",q:"Qu'est-ce que la crise des subprimes de 2008 et quel mécanisme financier l'a propagée mondialement ?",a:"Effondrement du marché immobilier américain propagé via la titrisation des créances hypothécaires douteuses (CDO)",detail:"Les banques accordent des crédits à des emprunteurs insolvables, les revendent sous forme de produits financiers complexes notés AAA par les agences. Quand les défauts augmentent, tout le système financier mondial s'effondre en cascade."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que l'OPEP et quel rôle a-t-elle joué lors des chocs pétroliers des années 1970 ?",a:"Organisation des Pays Exportateurs de Pétrole (1960) — elle coordonne les quotas de production pour influencer le prix du baril",detail:"L'OPEP regroupe 13 pays dont l'Arabie Saoudite. Son pouvoir est démontré lors des chocs pétroliers de 1973 et 1979, mais est dilué par la montée du pétrole de schiste américain depuis 2010."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la théorie du capital humain et qui la développe dans les années 1960 ?",a:"Gary Becker et Theodore Schultz (Prix Nobel) — l'éducation et la formation sont des investissements qui augmentent la productivité",detail:"Becker montre que les décisions d'éducation peuvent être analysées comme des investissements en capital : coût immédiat contre rendement futur. Cette théorie fonde les politiques d'investissement public en éducation."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que le paradoxe de l'épargne de Keynes et quel est son impact en récession ?",a:"Ce qui est rationnel pour un individu (épargner) est néfaste pour la collectivité en récession (chute de la demande globale)",detail:"Keynes montre qu'en récession, si chaque agent économise par prudence, la demande globale s'effondre, approfondissant la crise. Ce paradoxe justifie l'intervention de l'État pour maintenir la demande quand le secteur privé se rétracte."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la rent-seeking (recherche de rente) et pourquoi est-elle néfaste pour l'économie ?",a:"Obtenir un revenu en manipulant l'environnement économique plutôt qu'en créant de la valeur — lobbying, faveurs réglementaires",detail:"Anne Krueger (1974) théorise la rent-seeking : les entreprises investissent dans le lobbying pour obtenir des faveurs réglementaires plutôt que d'innover. Ces dépenses sont socialement improductives et détournent des ressources de la croissance."},
{theme:"economie",diff:"difficile",type:"q",q:"Qu'est-ce que l'hypothèse d'instabilité financière de Hyman Minsky ?",a:"En période de boom, les agents prennent des risques croissants jusqu'au 'moment Minsky' — l'effondrement brutal",detail:"Minsky distingue trois types d'emprunteurs : les couverts, les spéculatifs et les Ponzi. En boom, la proportion de Ponzi croît jusqu'au retournement. Quasi-ignoré de son vivant, il est redécouvert après 2008."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la théorie de la dépendance et comment explique-t-elle le sous-développement des pays du Sud ?",a:"Prebisch (CEPAL, 1950) — les pays du Sud restent pauvres à cause de termes de l'échange défavorables et de leur insertion dominée dans l'économie mondiale",detail:"Les théoriciens de la dépendance (Frank, Cardoso) soutiennent que les matières premières perdent en valeur relative face aux produits industriels. Cette théorie influence les politiques d'industrialisation par substitution aux importations en Amérique latine."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la courbe environnementale de Kuznets et pourquoi est-elle controversée ?",a:"La pollution augmente avec le revenu jusqu'à un seuil puis diminue — mais ce retournement n'est pas automatique pour le CO2",detail:"La courbe de Kuznets environnementale postule qu'en devenant riches, les sociétés s'offrent un environnement plus propre. Les données sont mitigées : si la pollution locale diminue dans les pays riches, les émissions de CO2 per capita y restent élevées."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que l'économie circulaire et en quoi s'oppose-t-elle au modèle linéaire ?",a:"Modèle 'cradle to cradle' : les déchets d'un processus deviennent les ressources d'un autre — contre le 'produire-utiliser-jeter'",detail:"L'économie circulaire vise à découpler croissance économique et consommation de ressources naturelles. Elle repose sur les 3R (Réduire, Réutiliser, Recycler) et inspire des politiques industrielles, notamment le plan d'action européen de 2020."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que le problème du 'too big to fail' et quel aléa moral pose-t-il ?",a:"Les grandes banques savent qu'elles seront renflouées par l'État en cas de crise — elles prennent donc plus de risques",detail:"Les institutions 'too big to fail' dont la faillite mettrait en danger tout le système financier sont sauvées par les États en 2008. Les régulateurs répondent par Bâle III (renforcement des fonds propres) et les stress tests, mais le problème d'aléa moral persiste."},
{theme:"economie",diff:"moyen",type:"q",q:"En quoi la Banque mondiale diffère-t-elle du FMI dans leurs rôles respectifs ?",a:"La Banque mondiale finance des projets de développement à long terme — le FMI gère les crises de balance des paiements à court terme",detail:"La Banque mondiale (BIRD + IDA) accorde des prêts à long terme pour des projets d'infrastructure, d'éducation et de santé. Fondées toutes deux à Bretton Woods en 1944, les deux institutions ont souvent promu des politiques libérales similaires avant d'évoluer."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la révolution marginaliste des années 1870 et qui sont ses fondateurs ?",a:"Jevons, Menger, Walras — remplacement de la valeur-travail par l'utilité marginale décroissante comme fondement de la valeur",detail:"La révolution marginaliste fonde la microéconomie néoclassique moderne : la valeur d'un bien n'est pas son coût de production (classiques) mais l'utilité que procure la dernière unité consommée. Walras formalise l'équilibre général, Marshall popularise la microéconomie."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la gig economy et quels défis pose-t-elle au droit du travail ?",a:"Plateformes (Uber, Deliveroo) qui externalisent le travail à des 'indépendants' sans protection salariale",detail:"Les plateformes numériques créent un modèle où les travailleurs ont la flexibilité des indépendants mais la dépendance des salariés. Les tribunaux européens débattent de leur statut : certains imposent une requalification en salariés (arrêt Uber UK, 2021)."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que le capitalisme de surveillance théorisé par Shoshana Zuboff ?",a:"Les données personnelles deviennent une matière première pour prédire et modifier les comportements — Google et Facebook en sont les acteurs principaux",detail:"Zuboff (2019) montre que les plateformes ne vendent pas des services mais des prédictions comportementales à leurs vrais clients (annonceurs). Ce modèle crée une asymétrie de pouvoir radicale entre les plateformes et les individus."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la trappe à liquidité de Keynes et dans quel pays contemporain l'observe-t-on ?",a:"Situation où les taux d'intérêt à zéro rendent la politique monétaire inefficace — le Japon l'illustre depuis les années 1990",detail:"Keynes théorise que quand les taux sont proches de zéro, les agents thésaurisent plutôt qu'investir. Le Japon illustre ce phénomène depuis 30 ans malgré des taux à zéro. La solution keynésienne est la relance budgétaire, non monétaire."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la théorie des biens communs et comment Elinor Ostrom conteste-t-elle la 'tragédie des communs' ?",a:"Ostrom (Prix Nobel 2009) — les communautés gèrent collectivement leurs ressources sans privatisation ni État, contredisant Hardin",detail:"Garrett Hardin (1968) affirme que les ressources communes sont inévitablement surexploitées. Ostrom réfute empiriquement cette thèse en étudiant des pêcheries et forêts gérées durablement par des communautés auto-organisées depuis des siècles."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que le 'China shock' d'Autor et ses effets sur l'emploi industriel américain ?",a:"Acemoglu et Autor montrent que les importations chinoises ont détruit environ 2 millions d'emplois industriels aux États-Unis entre 1999 et 2011",detail:"L'effet Chine remet en cause l'orthodoxie libre-échangiste : le commerce avec la Chine a baissé les prix à la consommation, mais a concentré les pertes d'emplois dans des régions précises, alimentant le vote Trump et le Brexit."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que le nudge de Richard Thaler et comment l'applique-t-on aux politiques publiques ?",a:"Modifier l'architecture du choix pour orienter les comportements sans contrainte — Thaler (Prix Nobel 2017) avec Sunstein en sont les promoteurs",detail:"Un nudge change la valeur par défaut : inscrire automatiquement les salariés à un plan d'épargne retraite augmente massivement la participation. Le Royaume-Uni crée une 'Nudge Unit' en 2010. Les critiques y voient un paternalisme libéral manipulateur."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la 'malédiction des ressources' naturelles et comment affecte-t-elle le développement économique ?",a:"Les pays riches en pétrole tendent à avoir une croissance plus faible et des institutions plus corrompues — maladie hollandaise, rente désincitatrice",detail:"Sachs et Warner (1995) montrent que les pays riches en ressources naturelles croissent moins vite. La rente désincentive l'investissement dans l'éducation et l'industrie, finance des régimes autoritaires et apprécie le taux de change (maladie hollandaise)."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la 'maladie hollandaise' en économie et quel pays lui a donné son nom ?",a:"Appréciation du taux de change suite à une découverte de ressources naturelles, qui pénalise les exportations manufacturières — les Pays-Bas après la découverte du gaz en 1959",detail:"Les Pays-Bas découvrent du gaz naturel en 1959 : l'afflux de devises apprécie le florin, rendant leurs exportations industrielles non compétitives. Ce mécanisme touche aussi la Norvège, les pays du Golfe et le Venezuela."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la théorie de l'agence et quel problème pose-t-elle dans les grandes entreprises cotées ?",a:"Jensen et Meckling (1976) — les dirigeants (agents) peuvent poursuivre leur intérêt propre au détriment des actionnaires (principals)",detail:"La séparation entre propriété (actionnaires) et contrôle (managers) crée des conflits d'intérêts : les dirigeants peuvent s'octroyer des salaires excessifs. La réponse classique est la rémunération en stock-options, mais elle crée d'autres biais (court-termisme)."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que le système de Bretton Woods et pourquoi Nixon y met-il fin en 1971 ?",a:"Régime de changes fixes autour du dollar convertible en or — Nixon suspend la convertibilité ('Nixon Shock') car les dépenses de la guerre du Vietnam épuisent les réserves d'or",detail:"À Bretton Woods (1944), les pays s'engagent à maintenir leur parité par rapport au dollar, lui-même convertible en or à 35 dollars l'once. La surabondance de dollars rend la convertibilité insoutenable. Nixon y met fin en août 1971, ouvrant l'ère des changes flottants."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que l'indice de développement humain (IDH) et qui le crée en 1990 comme alternative au PIB ?",a:"Indicateur combinant revenu, éducation et espérance de vie — créé par Mahbub ul Haq et Amartya Sen pour le PNUD",detail:"L'IDH, publié annuellement dans le Rapport sur le développement humain du PNUD, classe les pays selon leurs performances en matière de bien-être. Amartya Sen développe ensuite l'approche par les capabilités : ce qui compte n'est pas le revenu mais ce que les gens peuvent faire."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que l'ordolibéralisme allemand et en quoi diffère-t-il du libéralisme anglo-saxon ?",a:"École de Fribourg — un État fort doit garantir les conditions du marché concurrentiel contre les monopoles, contre le laisser-faire et l'interventionnisme",detail:"L'ordolibéralisme, né à Fribourg dans les années 1930 (Eucken, Röpke), influence profondément la politique économique allemande. Contrairement au laisser-faire, il postule que le marché concurrentiel est une construction institutionnelle qui exige une intervention étatique active."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la taxe carbone et pourquoi le mouvement des Gilets jaunes de 2018 illustre-t-il un paradoxe de politique climatique ?",a:"Taxe sur les émissions de CO2 — refus populaire quand elle frappe les ménages ruraux dépendants de la voiture sans accès aux transports en commun",detail:"La hausse de la taxe carbone sur le carburant en 2018 déclenche les Gilets jaunes : ceux qui n'ont pas accès aux transports en commun subissent le coût sans avoir les alternatives des urbains. Ce paradoxe illustre que les politiques climatiques doivent être équitables pour être acceptées."},
{theme:"economie",diff:"difficile",type:"q",q:"Qu'est-ce que les ondes Kondratiev et quel sort leur économiste fondateur a-t-il subi ?",a:"Nikolaï Kondratiev — cycles économiques longs de 40-60 ans, lié à des vagues d'innovation. Fusillé par Staline car ses cycles prévoyaient la survie du capitalisme",detail:"Kondratiev identifie des cycles économiques longs liés à de grandes vagues d'innovation (vapeur, chemin de fer, électricité, informatique). Schumpeter popularise ses travaux. Kondratiev est arrêté en 1930 car ses cycles prévoient la survie du capitalisme — ce que Staline ne veut pas entendre."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la loi de Say et pourquoi Keynes la rejette-t-il ?",a:"Say (1803) : l'offre crée sa propre demande — Keynes répond que la demande effective peut être insuffisante si les agents épargnent",detail:"La loi de Say affirme que tout produit crée un revenu qui permettra d'acheter d'autres produits. Keynes réfute cela en 1936 : les agents peuvent épargner plutôt que dépenser, créant une insuffisance de demande effective qui justifie l'intervention de l'État."},
{theme:"economie",diff:"moyen",type:"q",q:"Quelle économiste reçoit le Prix Nobel 2023 pour ses travaux sur les inégalités de genre sur le marché du travail ?",a:"Claudia Goldin (née en 1946)",detail:"Goldin montre que l'essentiel de l'écart salarial entre hommes et femmes s'explique par la 'taxe sur la flexibilité' : les emplois les mieux payés exigent une disponibilité totale incompatible avec les responsabilités familiales encore majoritairement portées par les femmes."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la théorie des contrats incomplets et quel Prix Nobel la développe ?",a:"Oliver Hart (Prix Nobel 2016) — les contrats ne peuvent prévoir tous les événements futurs, d'où des problèmes de gouvernance et de propriété",detail:"Hart montre que les contrats réels sont inévitablement incomplets. Cette incomplétude explique pourquoi les entreprises existent, pourquoi les droits de propriété importent, et comment structurer les contrats de privatisation et de partenariats public-privé."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la théorie de la perspective (prospect theory) de Kahneman et Tversky ?",a:"Les individus sont deux fois plus sensibles aux pertes qu'aux gains équivalents — asymétrie fondamentale contredisant l'utilité espérée",detail:"La théorie des perspectives (1979) montre que perdre 100 euros fait deux fois plus souffrir que gagner 100 euros procure de plaisir. De plus, les individus sur-pondèrent les petites probabilités. Ces biais expliquent l'aversion au risque et les erreurs de jugement financier."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la théorie de la régulation et quels économistes français la développent dans les années 1970 ?",a:"Robert Boyer et Michel Aglietta analysent les régimes d'accumulation et les modes de régulation institutionnelle du capitalisme",detail:"La théorie de la régulation (École de Paris) explique pourquoi le capitalisme peut être stable pendant de longues périodes (fordisme, 1945-1975) avant de céder à une crise. Elle insiste sur le rôle des institutions dans la cohérence d'un régime économique."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que l'économie sociale et solidaire (ESS) et quelle place occupe-t-elle en France ?",a:"Secteur réunissant coopératives, mutuelles, associations et fondations — environ 10 % du PIB et 14 % de l'emploi privé en France",detail:"L'ESS place les personnes et l'utilité sociale avant le profit, avec une gouvernance démocratique et des bénéfices non distribuables. En France, la loi Hamon de 2014 lui donne un cadre légal. Les SCOP (sociétés coopératives ouvrières de production) en sont un exemple emblématique."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la 'Grande Modération' (1985-2007) et pourquoi a-t-elle créé un faux sentiment de sécurité ?",a:"Période de faible volatilité économique qui a encouragé une prise de risque excessive, préparant la crise de 2008",detail:"Ben Bernanke baptise cette période de stabilité macroéconomique 'Grande Modération'. Cette accalmie a conduit les acteurs financiers à sous-estimer les risques systémiques et à s'endetter excessivement. La crise de 2008 a violemment mis fin à cette illusion."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que le paradoxe d'Easterlin et que révèle-t-il sur la relation entre croissance et bonheur ?",a:"Au-delà d'un certain seuil, la croissance du revenu national n'augmente plus le bonheur moyen — c'est le revenu relatif qui importe",detail:"Richard Easterlin (1974) observe que malgré la forte croissance américaine des Trente Glorieuses, le bonheur déclaré n'a pas augmenté. L'explication : c'est la position relative (par rapport aux autres) qui importe, pas le revenu absolu. Ce paradoxe inspire les travaux sur l'économie du bonheur."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que la théorie des choix publics de James Buchanan et quelle conclusion libérale en découle ?",a:"Buchanan (Prix Nobel 1986) — les politiciens et fonctionnaires maximisent leur intérêt propre comme tout agent économique, justifiant la méfiance envers l'État",detail:"Buchanan applique la logique économique au comportement politique : élus cherchent à se faire réélire, bureaucrates à étendre leur budget. Cette théorie justifie la méfiance envers l'État et fonde le mouvement libertarien américain."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que le principe de précaution en économie et comment s'applique-t-il aux risques environnementaux ?",a:"Face à l'incertitude scientifique sur des risques graves et irréversibles, l'absence de preuve n'est pas une preuve d'absence",detail:"Le principe de précaution (Rio, 1992 ; Constitution française, 2005) justifie d'agir contre un risque potentiel avant qu'il soit prouvé. Il s'applique au changement climatique et aux perturbateurs endocriniens. Les économistes débattent de sa compatibilité avec l'analyse coût-bénéfice."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que le taux d'actualisation dans l'économie du changement climatique et pourquoi est-il au cœur du débat Stern/Nordhaus ?",a:"Nicholas Stern (faible taux) justifie une action climatique immédiate coûteuse — Nordhaus (taux plus élevé) arrive à des conclusions plus modérées",detail:"Stern (rapport 2006) utilise un faible taux d'actualisation pour montrer que le coût de l'inaction dépasse celui de l'action. Nordhaus (Prix Nobel 2018) utilise un taux plus élevé. Ce débat technique masque un choix éthique : combien valorisons-nous le bien-être des générations futures ?"},
,
{theme:"popculture",diff:"facile",type:"q",q:"Dans quelle saga trouve-t-on les personnages de Bilbo et Frodon Sacquet ?",a:"Le Seigneur des Anneaux / Le Hobbit (J.R.R. Tolkien)",detail:"Tolkien publie Le Hobbit en 1937 et Le Seigneur des Anneaux en 1954-1955. Il invente des langues entières (elfique, nain). Peter Jackson adapte l'œuvre au cinéma (2001-2003) avec un budget de ~300 millions de dollars."},
{theme:"popculture",diff:"facile",type:"q",q:"Qui a créé le personnage de James Bond, agent 007 ?",a:"Ian Fleming (1953)",detail:"Fleming publie Casino Royale en 1953, inspiré de ses années au renseignement naval. Sean Connery incarne Bond au cinéma en 1962 dans Dr. No. La franchise compte 25 films officiels — la plus longue de l'histoire du cinéma."},
{theme:"popculture",diff:"facile",type:"d",q:"Film de science-fiction de 1977 qui révolutionna le cinéma hollywoodien et lança une franchise mondiale",a:"Star Wars (George Lucas)",detail:"Star Wars invente le concept de blockbuster d'été et révolutionne les effets spéciaux. La franchise rachetée par Disney en 2012 pour 4 milliards de dollars génère plus de 70 milliards en merchandising."},
{theme:"popculture",diff:"moyen",type:"d",q:"Album de Michael Jackson (1982) qui reste le disque le plus vendu de l'histoire",a:"Thriller",detail:"Produit par Quincy Jones, Thriller a vendu entre 66 et 70 millions d'exemplaires. Il contient 7 singles classés dans le Top 10 américain simultanément. Le clip de 14 minutes réalisé par John Landis est considéré le meilleur de tous les temps."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel jeu vidéo sorti en 2011 s'est vendu à plus de 300 millions d'exemplaires ?",a:"Minecraft (Mojang/Microsoft)",detail:"Créé par Markus « Notch » Persson, Minecraft est sorti en 2011. Microsoft rachète Mojang en 2014 pour 2,5 milliards de dollars. Ce jeu bac-à-sable est le plus vendu de tous les temps, tous supports confondus."},
{theme:"popculture",diff:"moyen",type:"q",q:"Quel roman dystopique de Margaret Atwood (1985) a été adapté en série à succès sur Hulu ?",a:"La Servante écarlate (The Handmaid's Tale)",detail:"Atwood imagine une théocratie totalitaire (Gilead) où les femmes fertiles sont réduites à des reproductrices. La série Hulu (2017) est devenue un symbole féministe mondial."},
{theme:"popculture",diff:"difficile",type:"q",q:"Quel artiste américain a réalisé Balloon Dog, vendue 58,4 millions de dollars en 2013 ?",a:"Jeff Koons",detail:"La sculpture en acier inoxydable poli (imitant un ballon) s'est vendue chez Christie's, battant le record d'un artiste vivant. Koons incarne l'art kitsch et la culture de la consommation, produisant ses œuvres en factory comme Warhol."},
{theme:"popculture",diff:"difficile",type:"q",q:"Dans quelle ville imaginaire se déroule la série The Wire (Sur Écoute), considérée comme la meilleure série TV ?",a:"Baltimore (Maryland, États-Unis)",detail:"Créée par David Simon (2002-2008), The Wire dépeint le trafic de drogue, les syndicats, la politique et la presse de Baltimore. Presque ignorée à sa sortie, elle est aujourd'hui unanimement consacrée chef-d'œuvre absolu de la télévision."},
{theme:"nature",diff:"facile",type:"q",q:"Quel gaz est principalement responsable de l'effet de serre anthropique ?",a:"Le CO₂ (dioxyde de carbone)",detail:"Le CO₂ représente ~76 % des émissions de gaz à effet de serre humaines. Sa concentration atmosphérique dépasse 420 ppm en 2024 — un niveau inégalé depuis 3 millions d'années."},
{theme:"nature",diff:"facile",type:"d",q:"Accord international de 2015 visant à limiter le réchauffement climatique à 1,5-2°C",a:"Accord de Paris (COP21)",detail:"Adopté par 196 pays en décembre 2015. Les États-Unis l'ont quitté sous Trump (2020) et réintégré sous Biden (2021). Le GIEC estime que les engagements actuels conduisent à environ +2,5°C."},
{theme:"nature",diff:"facile",type:"q",q:"Quel est l'écosystème le plus riche en biodiversité de la planète ?",a:"La forêt tropicale humide (notamment l'Amazonie)",detail:"L'Amazonie abrite ~10 % des espèces connues sur Terre. Elle produit 20 % de l'oxygène terrestre et stocke 150-200 milliards de tonnes de carbone. La déforestation menace un point de bascule irréversible."},
{theme:"nature",diff:"moyen",type:"q",q:"Qu'est-ce que la « sixième extinction de masse » ?",a:"La crise d'extinction actuelle, causée par les activités humaines",detail:"Le taux d'extinction actuel est 100 à 1 000 fois supérieur au taux naturel. Les 5 extinctions précédentes avaient des causes géologiques ou cosmiques. Celle-ci est la première causée par une seule espèce."},
{theme:"nature",diff:"moyen",type:"d",q:"Cycle par lequel l'eau circule entre les océans, l'atmosphère et les continents",a:"Le cycle hydrologique",detail:"Évaporation → condensation en nuages → précipitations → ruissellement → retour à la mer. Ce cycle régule le climat et distribue l'eau douce. Le réchauffement l'accélère, intensifiant sécheresses et inondations."},
{theme:"nature",diff:"difficile",type:"q",q:"Qu'est-ce que l'« effet albédo » et pourquoi amplifie-t-il le réchauffement aux pôles ?",a:"La glace réfléchit ~80 % du soleil ; l'océan n'en réfléchit que ~6 % — la fonte remplace des surfaces réfléchissantes par des surfaces absorbantes",detail:"Cette boucle de rétroaction positive explique pourquoi l'Arctique se réchauffe 4 fois plus vite que la moyenne mondiale. Plus la banquise fond, plus elle absorbe de chaleur, plus elle fond."},
{theme:"nature",diff:"difficile",type:"d",q:"Concept des neuf processus vitaux à ne pas dépasser pour maintenir les conditions d'habitabilité de la Terre",a:"Les limites planétaires (Rockström, 2009)",detail:"Johan Rockström identifie 9 processus vitaux dont le climat, la biodiversité, les cycles biogéochimiques, l'acidification des océans. En 2023, 6 des 9 limites seraient déjà franchies."},
{theme:"nature",diff:"moyen",type:"q",q:"Combien d'espèces ont été décrites par la science, et combien estime-t-on qu'il en existe ?",a:"~2 millions décrites ; estimations : 8 à 10 millions au total",detail:"Seulement 20-25 % du vivant aurait été catalogué. Les insectes (plus d'1 million d'espèces connues) et les micro-organismes sont les plus nombreux. Les fonds marins et les sols tropicaux restent les plus méconnus."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel aliment fermenté coréen, à base de chou et de piment, est inscrit au patrimoine UNESCO ?",a:"Le kimchi",detail:"Pilier de la cuisine coréenne depuis plus de 2 000 ans, fermenté en jarres enterrées, il se décline en 200 variétés. Riche en probiotiques et vitamine C. La Corée du Nord et du Sud se disputent sa paternité culturelle."},
{theme:"gastro",diff:"facile",type:"q",q:"Quel pays est à l'origine de la pizza et des pâtes ?",a:"L'Italie",detail:"La pizza napolitaine est inscrite au patrimoine immatériel de l'UNESCO depuis 2017. Paradoxalement, la tomate — ingrédient central — est originaire d'Amérique et n'arrive en Italie qu'au XVIe siècle."},
{theme:"gastro",diff:"moyen",type:"q",q:"Quelle épice, plus chère que l'or au kilo, provient des stigmates d'une fleur ?",a:"Le safran (Crocus sativus)",detail:"Il faut 150 000 fleurs et 400 heures de cueillette manuelle pour produire 1 kg de safran (3 000-10 000 €/kg). L'Iran produit 90 % du safran mondial. Il colore la paella, le risotto milanais et de nombreux plats persans."},
{theme:"gastro",diff:"moyen",type:"q",q:"Qu'est-ce que la fermentation lactique, et quels aliments en résultent ?",a:"Transformation de sucres en acide lactique par des bactéries — yaourt, kéfir, fromage, choucroute, kimchi",detail:"La fermentation lactique est l'une des plus anciennes techniques de conservation. Elle acidifie les aliments (pH bas), les préservant des pathogènes, et produit des probiotiques bénéfiques pour le microbiote."},
{theme:"gastro",diff:"difficile",type:"q",q:"Qu'appelle-t-on le « cinquième goût », découvert par un chercheur japonais en 1908 ?",a:"L'umami (goût savoureux/charnu) — découvert par Kikunae Ikeda",detail:"Ikeda isole le glutamate monosodique dans l'algue kombu. L'umami est présent dans le parmesan, la sauce soja, les champignons, les tomates mûres et la viande. Les 4 autres goûts : sucré, salé, acide, amer."},
{theme:"gastro",diff:"difficile",type:"d",q:"Procédé culinaire consistant à cuire des aliments sous vide à basse température pendant de longues heures",a:"La cuisson sous vide",detail:"Inventée par Pralus et Goussault dans les années 1970 en France, cette technique cuit les aliments à 55-85°C dans des sacs hermétiques. Elle préserve les jus, textures et nutriments. Standard en gastronomie contemporaine."},
{theme:"gastro",diff:"moyen",type:"d",q:"Boisson japonaise fermentée à base de riz, pilier de la culture nippone",a:"Le saké",detail:"Fermenté (pas distillé), le saké titre entre 14 et 16°. Sa fabrication (polissage du riz, koji, fermentation multiple) est un art ancestral. Il existe des sakés de haute gamme (junmai daiginjo) comparables aux grands vins. Le Japon en produit plus de 1 000 types."},
{theme:"mytho",diff:"facile",type:"q",q:"Qui est le roi des dieux dans la mythologie grecque ?",a:"Zeus (Jupiter chez les Romains)",detail:"Zeus règne sur l'Olympe, maîtrise la foudre et l'ordre cosmique. Fils de Cronos qu'il renverse, il est père de nombreux dieux et héros. Sa contrepartie romaine Jupiter donne son nom à la plus grande planète du système solaire."},
{theme:"mytho",diff:"facile",type:"d",q:"Récit grec du guerrier condamné à rouler un rocher sans fin jusqu'au sommet d'une montagne",a:"Le mythe de Sisyphe",detail:"Sisyphe, roi de Corinthe, avait trompé la mort deux fois. Camus en fait la métaphore de la condition humaine (1942) : la lutte elle-même suffit à remplir un cœur d'homme. Il faut imaginer Sisyphe heureux."},
{theme:"mytho",diff:"facile",type:"q",q:"Quel animal sacré est au cœur du culte religieux en Inde hindoue ?",a:"La vache",detail:"Dans l'hindouisme, la vache est symbole de la Terre nourricière, associée à Krishna (gardien de vaches). L'abattage bovin est interdit ou très encadré dans de nombreux États indiens."},
{theme:"mytho",diff:"moyen",type:"q",q:"Dans la mythologie nordique, quel événement marque la fin des dieux et du monde ?",a:"Le Ragnarök",detail:"Le Ragnarök est le crépuscule des dieux : Odin, Thor, Freyr affrontent les géants et les monstres (Fenrir, le Serpent de Midgard). La plupart des dieux périssent, puis un monde nouveau et purifié émerge."},
{theme:"mytho",diff:"moyen",type:"d",q:"Concept hindou désignant la loi universelle, le devoir moral et l'ordre cosmique",a:"Le Dharma",detail:"Dans l'hindouisme et le bouddhisme, le Dharma désigne à la fois l'ordre universel et le devoir individuel. La Bhagavad-Gita tourne autour de ce dilemme : Arjuna doit-il combattre ses proches par dharma ?"},
{theme:"mytho",diff:"moyen",type:"q",q:"Qu'est-ce que le Tao dans le taoïsme ?",a:"Le principe originel indicible qui sous-tend l'univers et auquel il faut s'harmoniser",detail:"Lao Tseu ouvre le Tao Te Ching : « Le Tao qu'on peut nommer n'est pas le Tao éternel. » Le Tao est l'ordre naturel des choses. La sagesse consiste à agir en accord avec lui (wu wei, non-agir)."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qu'est-ce que le karma dans le bouddhisme et l'hindouisme ?",a:"La loi de causalité morale : chaque action engendre des conséquences qui affectent les renaissances futures",detail:"Le karma (« action » en sanskrit) n'est pas un jugement divin mais un mécanisme naturel. L'objectif ultime est de s'en libérer totalement (moksha dans l'hindouisme, nirvana dans le bouddhisme)."},
{theme:"mytho",diff:"difficile",type:"q",q:"Dans la cosmologie aztèque, qu'est-ce que le Cinquième Soleil ?",a:"L'ère actuelle créée à Teotihuacan, maintenue par des sacrifices humains",detail:"Les Aztèques croyaient en 4 ères précédentes détruites par des cataclysmes. Le Cinquième Soleil naquit quand les dieux se sacrifièrent. Pour qu'il continue de mouvoir l'astre, il fallait le nourrir de sang humain."},
{theme:"mytho",diff:"difficile",type:"d",q:"Pratique spirituelle sibérienne dans laquelle un praticien entre en transe pour communiquer avec les esprits",a:"Le chamanisme",detail:"Le mot « chaman » vient du toungouse (Sibérie). Le chaman est médiateur entre vivants et esprits via des états modifiés de conscience (tambour, plantes psychoactives). Considéré comme la première forme de spiritualité humaine."},
{theme:"mytho",diff:"difficile",type:"q",q:"Qui est Prométhée dans la mythologie grecque et quelle est sa punition ?",a:"Le titan qui vola le feu aux dieux pour le donner aux hommes — condamné à avoir le foie dévoré chaque jour par un aigle",detail:"Zeus, furieux, enchaîne Prométhée au Caucase. Chaque jour un aigle lui dévore le foie qui repousse chaque nuit. C'est le symbole du bienfaiteur de l'humanité puni pour son défi à l'ordre divin. Héraclès le libérera."},
{theme:"histoire",diff:"facile",type:"q",q:"Qui était Vercingétorix ?",a:"Chef gaulois qui mena la résistance contre César",detail:"Vercingétorix unifia les tribus gauloises et infligea une défaite à César à Gergovie (52 av. J.-C.). Mais la bataille d'Alésia la même année tourne au désastre : encerclé, il se rend à César. Il sera exhibé à Rome puis étranglé après 6 ans de captivité."},
{theme:"histoire",diff:"facile",type:"q",q:"Quel empire Alexandre le Grand a-t-il fondé au IVe siècle av. J.-C. ?",a:"L'empire macédonien, le plus grand du monde antique à son époque",detail:"En 13 ans (336-323 av. J.-C.), Alexandre conquiert la Perse, l'Égypte, la Bactriane et atteint l'Inde. Son empire s'étend de la Grèce à l'Indus. Il meurt à 32 ans à Babylone, probablement d'une fièvre, laissant un empire qui se fragmente aussitôt entre ses généraux (les Diadoques)."},
{theme:"histoire",diff:"facile",type:"q",q:"Quelle civilisation a construit les pyramides de Gizeh ?",a:"Les Égyptiens de l'Ancien Empire (~2560 av. J.-C.)",detail:"La grande pyramide de Khéops est la seule des 7 merveilles du monde antique encore debout. Elle a nécessité environ 20 ans de construction et 2,3 millions de blocs de pierre. Contrairement au mythe, elle fut construite par des ouvriers salariés, non par des esclaves."},
{theme:"histoire",diff:"facile",type:"q",q:"Qui était Jeanne d'Arc ?",a:"Paysanne française qui fit couronner Charles VII et fut brûlée vive en 1431",detail:"À 17 ans, Jeanne affirme recevoir des voix divines lui ordonnant de chasser les Anglais. Elle lève le siège d'Orléans (1429) et conduit Charles VII à Reims pour son sacre. Capturée par les Bourguignons, vendue aux Anglais, elle est brûlée à Rouen à 19 ans. Canonisée en 1920."},
{theme:"histoire",diff:"facile",type:"q",q:"En quelle année Christophe Colomb atteint-il l'Amérique ?",a:"1492",detail:"Le 12 octobre 1492, Colomb aborde une île des Bahamas qu'il nomme San Salvador, croyant avoir atteint l'Asie. Il effectuera 4 voyages sans jamais réaliser qu'il a découvert un nouveau continent. C'est Amerigo Vespucci qui comprendra le premier qu'il s'agit d'une terra incognita."},
{theme:"histoire",diff:"facile",type:"q",q:"Dans quel pays la Révolution industrielle démarre-t-elle au XVIIIe siècle, et quelle invention de James Watt en est le symbole ?",a:"Transformation économique majeure née en Angleterre au XVIIIe s., fondée sur la machine à vapeur et la production en usine",detail:"Partie d'Angleterre vers 1760, elle se diffuse en Europe au XIXe s. Le charbon, l'acier et la vapeur remplacent le travail manuel. Elle crée le prolétariat urbain, les grandes villes industrielles et les conditions qui inspireront Marx. L'espérance de vie baisse d'abord dans les villes surpeuplées avant de remonter."},
{theme:"histoire",diff:"facile",type:"q",q:"Quel pharaon est associé au célèbre masque en or découvert dans la Vallée des Rois ?",a:"Toutankhamon",detail:"Pharaon de 1332 à 1323 av. J.-C., mort vers 18-19 ans, Toutankhamon était peu important de son vivant. Mais sa tombe, découverte intacte par Howard Carter en 1922, est la plus complète jamais trouvée : 5 000 objets dont le masque funéraire en or massif de 11 kg."},
{theme:"histoire",diff:"facile",type:"q",q:"Qui a fondé l'Empire romain en devenant son premier empereur ?",a:"Auguste (Octave), en 27 av. J.-C.",detail:"Petit-neveu et fils adoptif de César, Octave bat Marc Antoine et Cléopâtre à Actium (31 av. J.-C.) puis reçoit du Sénat le titre d'Augustus. Il règne 40 ans, inaugurant le Principat. Son règne est une période de paix et de prospérité (Pax Romana) qui durera deux siècles."},
{theme:"histoire",diff:"facile",type:"q",q:"Quel pourcentage de la population européenne la Peste noire emporte-t-elle entre 1347 et 1351 ?",a:"Pandémie de peste bubonique qui tua entre 30 et 50 % de la population européenne entre 1347 et 1353",detail:"Venue d'Asie centrale, la peste arrive en Europe par les ports siciliens en 1347. En 5 ans, elle tue 25 millions d'Européens. Elle bouleverse la société médiévale : pénurie de main-d'œuvre, fin du servage dans de nombreuses régions, remise en question de l'Église. Elle reviendra par vagues jusqu'au XVIIIe s."},
{theme:"histoire",diff:"facile",type:"q",q:"Quel conquérant mongol fonda le plus grand empire terrestre de l'histoire ?",a:"Gengis Khan (XIIIe siècle)",detail:"Temüjin, futur Gengis Khan (« Khan universel »), unifie les tribus mongoles en 1206 et conquiert un empire s'étendant de la Chine à la Perse et à l'Europe de l'Est. À sa mort en 1227, son empire couvre 24 millions de km². Son petit-fils Kubilaï Khan soumettra la Chine entière."},
{theme:"histoire",diff:"facile",type:"q",q:"En quelle année se termine la Reconquista avec la prise de Grenade par les Rois Catholiques, l'année même où Colomb découvre l'Amérique ?",a:"Reconquête progressive de la péninsule ibérique par les royaumes chrétiens sur les musulmans, de 722 à 1492",detail:"Les Maures ont envahi l'Ibérie en 711. La Reconquista commence avec la victoire de Covadonga (722) et s'achève avec la prise de Grenade par Ferdinand et Isabelle — la même année que le voyage de Colomb. Cette guerre de 770 ans forge l'identité espagnole et portugaise."},
{theme:"histoire",diff:"facile",type:"q",q:"Qui était Léonard de Vinci au-delà de son œuvre picturale ?",a:"Ingénieur, anatomiste, inventeur, architecte et scientifique — archétype de l'homme de la Renaissance",detail:"Ses carnets (13 000 pages) révèlent des machines volantes, des chars d'assaut, des pompes hydrauliques, des études anatomiques révolutionnaires. Il est le premier à décrire correctement le fonctionnement du cœur. Né illégitime en 1452, il mourra en France, protégé par François Ier."},
{theme:"histoire",diff:"facile",type:"q",q:"Quel roi anglais est contraint de signer la Magna Carta en 1215, limitant pour la première fois le pouvoir royal ?",a:"Charte anglaise limitant le pouvoir royal et posant les bases de l'État de droit",detail:"Le roi Jean sans Terre est contraint par les barons anglais de signer ce document garantissant que personne — pas même le roi — n'est au-dessus de la loi. Elle instaure notamment l'habeas corpus (nul ne peut être emprisonné sans jugement). Elle inspirera les constitutions modernes."},
{theme:"histoire",diff:"facile",type:"q",q:"Quel événement marqua la fin de l'Empire byzantin en 1453 ?",a:"La chute de Constantinople, prise par les Ottomans sous Mehmed II",detail:"Mehmed II assiège Constantinople avec 80 000 hommes et des canons géants. La ville tient 53 jours. L'empereur Constantin XI meurt en combattant. La chute marque la fin de l'Empire romain d'Orient (1 123 ans d'existence) et la fin du Moyen Âge selon certains historiens. Sainte-Sophie devient mosquée."},
{theme:"histoire",diff:"facile",type:"q",q:"Qui était Abraham Lincoln ?",a:"16e président des États-Unis, abolitionniste, assassiné en 1865",detail:"Lincoln est élu en 1860 sur un programme anti-esclavagiste, déclenchant la sécession des États du Sud. Sa victoire dans la Guerre de Sécession (1861-1865) abolit l'esclavage. Il est assassiné par John Wilkes Booth au théâtre Ford le 14 avril 1865, 5 jours après la capitulation confédérée."},
{theme:"histoire",diff:"moyen",type:"q",q:"Quelle relation juridique et militaire fonde le système féodal médiéval, liant un suzerain à ses vassaux contre fidélité et service armé ?",a:"Organisation sociale hiérarchique où les seigneurs accordent des terres (fiefs) en échange de services militaires et de loyauté",detail:"La pyramide féodale va du roi aux grands seigneurs (ducs, comtes), aux chevaliers, jusqu'aux serfs liés à la terre. Ce système, dominant en Europe du IXe au XIIIe s., fragmente le pouvoir royal. La montée des villes et du commerce le ronge progressivement avant que les États centralisés l'effacent."},
{theme:"histoire",diff:"moyen",type:"q",q:"Quelles sont les causes principales de la chute de l'Empire romain d'Occident en 476 ?",a:"Invasions barbares, crise économique, instabilité politique, armée mercenaire — combinaison de facteurs sur plusieurs siècles",detail:"476 (dépôt de Romulus Augustule par Odoacre) est une date symbolique plus qu'un effondrement soudain. L'Empire s'est lentement érodé : inflation, épidémies, armée composée de Germains peu loyaux, pression des Huns qui poussent les Goths vers l'intérieur. L'Empire d'Orient (Byzance) survit 1 000 ans de plus."},
{theme:"histoire",diff:"moyen",type:"q",q:"En quelle année et dans quelle ville Martin Luther affiche-t-il ses 95 thèses, acte fondateur de la Réforme protestante ?",a:"Mouvement de contestation de l'Église catholique initié par Martin Luther en 1517",detail:"Luther affiche ses 95 thèses à Wittenberg, critiquant la vente des indulgences. Avec Zwingli et Calvin, il fracture l'Église occidentale. Les guerres de religion qui s'ensuivent (dont la Guerre de Trente Ans) ravagent l'Europe. La Réforme accélère aussi l'alphabétisation via la Bible traduite en langues vernaculaires."},
{theme:"histoire",diff:"moyen",type:"q",q:"En quelle année le Code civil napoléonien est-il promulgué, et dans combien de pays son influence juridique est-elle encore perceptible aujourd'hui ?",a:"Promulgué en 1804, c'est un code civil unifié qui est encore la base du droit français et de nombreux systèmes juridiques dans le monde",detail:"Napoléon unifie le droit français chaotique (plus de 300 coutumes locales) en un code cohérent : égalité devant la loi, propriété privée, liberté contractuelle, laïcité de l'état civil. Exporté dans l'Europe napoléonienne, il influence encore le droit de la Louisiane, du Québec, de l'Amérique latine et du Maghreb."},
{theme:"histoire",diff:"moyen",type:"q",q:"Quel diplomate autrichien dirige le Congrès de Vienne et incarne le principe de légitimité et d'équilibre européen après Napoléon ?",a:"Conférence européenne qui redessinait la carte de l'Europe après la défaite de Napoléon et cherchait à restaurer l'ordre conservateur",detail:"Orchestré par Metternich (Autriche), Talleyrand (France), Castlereagh (Grande-Bretagne), le Congrès restaure les monarchies et trace des frontières qui tiendront jusqu'en 1914. Il invente le concept d'équilibre des puissances et la diplomatie multilatérale moderne. La France, vaincue, s'en tire remarquablement bien."},
{theme:"histoire",diff:"moyen",type:"q",q:"Combien de semaines dure la Commune de Paris en 1871 avant d'être écrasée lors de la 'Semaine sanglante' ?",a:"Gouvernement révolutionnaire qui administra Paris pendant 72 jours avant d'être écrasé dans un bain de sang par l'armée versaillaise",detail:"Après la défaite de la France contre la Prusse, les Parisiens refusent la capitulation. La Commune (18 mars - 28 mai 1871) instaure la séparation Église-État, l'éducation laïque, la rémunération des élus au salaire ouvrier. La Semaine Sanglante fait entre 10 000 et 30 000 morts. Marx y voit la première révolution prolétarienne."},
{theme:"histoire",diff:"moyen",type:"q",q:"Quelles sont les causes de la Révolution russe de 1917 ?",a:"Défaites militaires catastrophiques, famine, incompétence du tsar Nicolas II, agitation révolutionnaire — en deux vagues : février (chute du tsar) et octobre (prise du pouvoir par les bolcheviks)",detail:"La Russie perd 1,7 million de soldats en 1914-1917. La révolution de Février renverse le tsar et installe un gouvernement provisoire qui continue la guerre. Les bolcheviks de Lénine promettent « la paix, la terre, le pain » et s'emparent du pouvoir en octobre, ouvrant la voie à la guerre civile et à l'URSS."},
{theme:"histoire",diff:"moyen",type:"q",q:"Quel montant le Plan Marshall injecte-t-il dans l'économie européenne entre 1948 et 1952, et quel secrétaire d'État américain lui donne son nom ?",a:"Programme d'aide économique américain de 13 milliards de dollars pour reconstruire l'Europe occidentale après 1945",detail:"Proposé par le secrétaire d'État George Marshall en 1947, il conditionne l'aide à la coopération économique entre pays européens — genèse de l'intégration européenne. L'URSS refuse et interdit à ses satellites d'y participer. Il accélère la division de l'Europe et la Guerre froide tout en sauvant les démocraties occidentales."},
{theme:"histoire",diff:"moyen",type:"q",q:"Combien de morts la guerre de Sécession américaine fait-elle, et quelle question de l'esclavage en est la cause principale ?",a:"Conflit entre les États du Nord (Union) et les États du Sud (Confédération) pour le maintien ou l'abolition de l'esclavage",detail:"Les 11 États esclavagistes du Sud font sécession après l'élection de Lincoln. 620 000 soldats meurent — plus que dans toutes les autres guerres américaines réunies. La victoire du Nord abolit l'esclavage (13e amendement). Mais la Reconstruction échoue : la ségrégation et les lois Jim Crow oppriment les Noirs pendant un siècle de plus."},
{theme:"histoire",diff:"moyen",type:"q",q:"Qui préside la Conférence de Berlin de 1884-1885 partageant l'Afrique entre puissances européennes sans consulter les populations africaines ?",a:"Réunion des puissances européennes qui divise l'Afrique entre elles sans consulter les Africains — acte fondateur du colonialisme moderne",detail:"Bismarck convoque 14 nations européennes pour réguler la compétition coloniale. L'Afrique est découpée en ignorant les ethnies et royaumes existants. En 30 ans, 90 % de l'Afrique passe sous contrôle européen. Ces frontières artificielles sont encore celles des États africains aujourd'hui et expliquent nombre de conflits."},
{theme:"histoire",diff:"moyen",type:"q",q:"Combien d'années dure la Révolution culturelle lancée par Mao, et quelle institution — les Gardes rouges — en est l'instrument de terreur ?",a:"Campagne de terreur politique lancée par Mao Zedong pour éliminer ses opposants et purifier le communisme chinois",detail:"Mao mobilise la jeunesse (les Gardes rouges) pour détruire les « quatre vieilleries » (culture, idées, habitudes, coutumes). Intellectuels, professeurs et fonctionnaires sont humiliés, déportés, exécutés. Bilan estimé : 0,5 à 2 millions de morts, des millions de déportés. Les universités sont fermées pendant 10 ans."},
{theme:"histoire",diff:"moyen",type:"q",q:"Quel traité mit fin à la Première Guerre mondiale pour l'Autriche-Hongrie ?",a:"Le traité de Saint-Germain-en-Laye (1919)",detail:"L'Autriche-Hongrie, empire multiethnique de 52 millions d'habitants, est démantelée en 7 États successeurs : Autriche, Hongrie, Tchécoslovaquie, Yougoslavie, Pologne, Roumanie (en partie), Italie (en partie). L'empire des Habsbourg, vieux de 600 ans, disparaît définitivement."},
{theme:"histoire",diff:"moyen",type:"q",q:"Quel acronyme anglais désigne la doctrine de destruction mutuelle assurée, et quel est son effet paradoxal sur la stabilité nucléaire ?",a:"Dissuasion nucléaire fondée sur la certitude que toute attaque nucléaire entraînerait une riposte dévastatrice — rendant la guerre impossible",detail:"Paradoxe fondateur de la Guerre froide : plus les arsenaux nucléaires grossissent, plus la paix est stable. En 1983, les deux superpuissances possèdent 60 000 têtes nucléaires. L'incident de Stanislav Petrov (1983) montre à quel point le système était fragile : un faux signal soviétique faillit déclencher une guerre mondiale."},
{theme:"histoire",diff:"moyen",type:"q",q:"Qui dirige la révolution haïtienne jusqu'à sa mort en captivité en 1803, permettant à Haïti de devenir la première République noire indépendante ?",a:"Seule révolte d'esclaves victorieuse de l'histoire, qui aboutit à l'indépendance d'Haïti — première république noire du monde",detail:"500 000 esclaves se soulèvent contre les colons français à Saint-Domingue (1791). Toussaint Louverture puis Jean-Jacques Dessalines mènent la révolte. Napoléon envoie 80 000 soldats — décimés par la fièvre jaune. Haïti proclame son indépendance le 1er janvier 1804. La France fera payer cette liberté pendant 122 ans (dette de 150 millions de francs)."},
{theme:"histoire",diff:"moyen",type:"q",q:"Qui était Simón Bolívar ?",a:"Libérateur de l'Amérique latine qui émancipa six pays de la domination espagnole",detail:"Entre 1810 et 1826, Bolívar libère le Venezuela, la Colombie, l'Équateur, le Pérou, la Bolivie (nommée en son honneur) et Panama. Il rêve d'une grande confédération latino-américaine — son projet échoue face aux rivalités régionales. Il meurt en 1830, déçu, disant avoir « labouré la mer »."},
{theme:"histoire",diff:"moyen",type:"q",q:"En quel mois de 1944 le Débarquement de Provence a-t-il lieu, et quelle armée française libère ensuite la vallée du Rhône jusqu'à l'Alsace ?",a:"Opération Dragoon : débarquement allié sur la Côte d'Azur le 15 août 1944, qui libéra le sud de la France",detail:"Moins connu qu'Overlord, ce débarquement implique 450 000 hommes dont 250 000 Français (armée de De Lattre de Tassigny). Il remonte la vallée du Rhône en 3 semaines, libérant Lyon et rejoignant les armées du nord. Sans lui, la libération de la France aurait pris bien plus longtemps."},
{theme:"histoire",diff:"difficile",type:"q",q:"Quelle est la cause principale de la Fronde de 1648 — dite Fronde parlementaire — opposant le Parlement de Paris à la régente Anne d'Autriche et Mazarin ?",a:"Série de révoltes en France contre l'autorité royale de Mazarin, pendant la minorité de Louis XIV",detail:"Deux phases : la Fronde parlementaire (1648-1649), où le Parlement de Paris résiste aux impôts royaux, et la Fronde des Princes (1650-1653), où les grands aristocrates (Condé, Conti) s'allient parfois à l'Espagne. L'échec de la Fronde convainc Louis XIV de la nécessité d'un pouvoir absolu et de tenir les nobles à Versailles."},
{theme:"histoire",diff:"difficile",type:"q",q:"Quel empire dual naît du Compromis austro-hongrois de 1867, transformant l'Empire autrichien en une monarchie bicéphale ?",a:"Accord qui transforme l'Empire autrichien en une double monarchie austro-hongroise, donnant à la Hongrie une large autonomie",detail:"Face à la montée des nationalismes et à la défaite contre la Prusse (1866), François-Joseph accepte de partager le pouvoir avec la Hongrie. L'empire devient une monarchie duale : deux États séparés, un seul souverain. Cette construction bancale gère 11 nationalités différentes jusqu'à son implosion en 1918."},
{theme:"histoire",diff:"difficile",type:"q",q:"Lors de quelle opération allemande de l'été 1941 Staline ordonne-t-il la politique de la terre brûlée pour priver l'envahisseur de ressources ?",a:"Ordre de détruire toutes les ressources utiles à l'ennemi lors du repli soviétique face à l'invasion allemande",detail:"L'ordre n°428 (novembre 1941) ordonne de détruire usines, récoltes, ponts, bâtiments dans une bande de 40 à 60 km derrière les lignes. Des partisans sont parachutés pour incendier les villages. Combinée aux atrocités allemandes, cette politique aggrave considérablement les souffrances des civils soviétiques."},
{theme:"histoire",diff:"difficile",type:"q",q:"Quel dirigeant égyptien nationalise le canal de Suez en 1956, déclenchant une intervention militaire franco-britannique condamnée par les États-Unis ?",a:"Crise où la France, la Grande-Bretagne et Israël attaquent l'Égypte de Nasser — et sont contraints de se retirer sous pression américaine et soviétique, marquant la fin des empires coloniaux européens",detail:"Nasser nationalise le canal en juillet 1956. L'attaque franco-britannico-israélienne réussit militairement mais Eisenhower la sabote économiquement (pression sur la livre sterling) et l'URSS menace. Londres et Paris capitulent. La crise révèle que les puissances coloniales ne peuvent plus agir sans l'accord américain."},
{theme:"histoire",diff:"difficile",type:"q",q:"Quelle est la cause immédiate de la révolte des Cipayes en 1857, liée à l'introduction de nouvelles cartouches enduites de graisse animale ?",a:"Soulèvement des soldats indiens (cipayes) contre la Compagnie britannique des Indes orientales, premier grand défi à la domination coloniale britannique",detail:"Le prétexte : les nouvelles cartouches enduites de graisse de vache et de porc, offensant hindous et musulmans. La révolte s'étend à Delhi, Kanpur, Lucknow. Les Britanniques la répriment avec une brutalité extrême. En 1858, la Couronne britannique prend le contrôle direct : fin de la Compagnie des Indes, début du Raj."},
{theme:"histoire",diff:"difficile",type:"q",q:"Dans quelle ville indonésienne et en quelle année se tient la Conférence de Bandung, réunissant 29 pays afro-asiatiques fondant le mouvement des non-alignés ?",a:"Première conférence des pays afro-asiatiques qui posa les bases du mouvement des Non-Alignés",detail:"29 pays d'Asie et d'Afrique (représentant 1,5 milliard d'habitants) se réunissent en Indonésie. Nehru, Nasser, Sukarno, Zhou Enlai définissent une « troisième voie » entre le bloc américain et soviétique. Bandung préfigure la décolonisation et l'émergence du Tiers-Monde comme acteur politique."},
{theme:"histoire",diff:"difficile",type:"q",q:"Quel type de mouvement — militaire ou civil — déclenche la Révolution des Œillets au Portugal le 25 avril 1974, mettant fin à 48 ans de dictature ?",a:"Coup d'État militaire pacifique qui renversa la dictature de Salazar/Caetano et instaura la démocratie",detail:"Le 25 avril 1974, l'armée portugaise, épuisée par les guerres coloniales en Afrique, renverse le régime sans effusion de sang. Le signal : la chanson « Grândola, Vila Morena » à la radio. Des œillets rouges sont glissés dans les fusils des soldats. La Révolution des Œillets inspire les transitions démocratiques en Espagne et en Grèce."},
{theme:"histoire",diff:"difficile",type:"q",q:"Quelle décision de Nixon en août 1971 met fin au système de Bretton Woods en suspendant la convertibilité du dollar en or ?",a:"Accord monétaire international qui établit le dollar comme monnaie de référence mondiale, adossé à l'or",detail:"Négocié en 1944 dans le New Hampshire, il crée le FMI et la Banque mondiale et fixe les taux de change. Nixon le torpille unilatéralement en 1971 en suspendant la convertibilité dollar-or (« Nixon Shock »). Le monde bascule alors dans le régime des changes flottants que nous connaissons aujourd'hui."},
{theme:"histoire",diff:"difficile",type:"q",q:"Quel rôle joua la bataille de Lépante (1571) dans l'histoire méditerranéenne ?",a:"Victoire de la Sainte-Ligue chrétienne sur la flotte ottomane, qui stoppa l'expansion turque en Méditerranée occidentale",detail:"La plus grande bataille navale depuis l'Antiquité : 400 galères, 150 000 hommes. La flotte ottomane est détruite en quelques heures. Cervantes y perd l'usage de sa main gauche. Mais l'importance stratégique est relative : les Ottomans rebâtissent leur flotte en un an. La victoire est surtout un choc psychologique — l'invincibilité ottomane est brisée."},
{theme:"histoire",diff:"difficile",type:"q",q:"Qui publie 'J'Accuse' en 1898, lettre ouverte défendant Dreyfus et déclenchant une crise politique majeure en France ?",a:"Condamnation injuste d'un officier juif (1894) qui déchira la société française entre dreyfusards et antidreyfusards, et accéléra la laïcisation",detail:"Alfred Dreyfus est condamné sur la base d'un faux document pour espionnage au profit de l'Allemagne. Zola publie « J'accuse » en 1898. L'affaire révèle l'antisémitisme profond de l'armée et des élites. Elle aboutit à la réhabilitation de Dreyfus (1906), à la loi de séparation Église-État (1905) et à la fondation du sionisme par Herzl."},
{theme:"histoire",diff:"difficile",type:"q",q:"En quelle année Staline dissout-il le Komintern, et pour quelle raison diplomatique liée à la Seconde Guerre mondiale ?",a:"Internationale Communiste fondée par Lénine en 1919 pour coordonner les partis communistes mondiaux sous direction soviétique",detail:"Le Komintern (IIIe Internationale) subordonne les partis communistes du monde entier à Moscou. Il finance des révolutions, forme des agents et définit la « ligne » que tous doivent suivre. Dissous par Staline en 1943 pour rassurer ses alliés occidentaux, il est remplacé par le Kominform en 1947."},
