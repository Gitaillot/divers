{theme:"philo",focus:"allemagne",diff:"facile",type:"q",q:"Quel philosophe Friedrich Schiller (1759-1805), ami de Goethe, écrit Les Brigands (1781) et l'Ode à la Joie (An die Freude, 1785) que Beethoven met en musique dans sa 9e Symphonie ?",a:"Schiller — dramaturge et poète du Sturm und Drang puis classicisme de Weimar, auteur de Guillaume Tell, Maria Stuart, Don Carlos — incarne l'idéal de liberté et d'humanité",detail:"'Die Räuber' (Les Brigands, 1781) est un succès scandaleux : révolte contre l'ordre social. Schiller s'enfuit du duché de Wurtemberg pour fuir son despote de duc. L'Ode à la Joie (1785) célèbre la fraternité universelle. Beethoven l'utilise dans la 9e Symphonie (1824). Le dernier mouvement ('Alle Menschen werden Brüder' — tous les hommes deviendront frères) est adopté comme hymne européen en 1972. Schiller et Goethe sont inhumés côte à côte à Weimar."},
{theme:"philo",focus:"allemagne",diff:"difficile",type:"q",q:"Quelle École de Francfort (Institut für Sozialforschung, fondé en 1923) réunit des penseurs comme Adorno, Horkheimer et Marcuse pour développer la 'théorie critique' analysant comment la culture de masse perpétue la domination ?",a:"La Théorie critique (Horkheimer/Adorno, Dialectique de la raison, 1944) analyse comment la raison instrumentale, l'industrie culturelle et la bureaucratie servent la domination en pacifiant les masses",detail:"L'Institut fuit le nazisme aux États-Unis (1933). La 'Dialectique de la raison' (rédigée à Hollywood, 1944) est une relecture pessimiste des Lumières : la raison moderne, au lieu de libérer, engendre Auschwitz et l'industrie culturelle (Hollywood, pop music) qui neutralise l'esprit critique. Marcuse (Eros et Civilisation, L'Homme unidimensionnel) influence le mouvement de 1968. La Théorie critique reste la principale tradition de pensée critique de gauche non-marxiste orthodoxe."},
{theme:"philo",focus:"allemagne",diff:"moyen",type:"q",q:"Quel philosophe Arthur Schopenhauer (1788-1860) influence profondément Nietzsche, Freud et Wagner avec sa vision de la vie comme soumission à une 'Volonté' aveugle et irrationnelle que seul l'art peut temporairement suspendre ?",a:"Schopenhauer (Le Monde comme Volonté et comme Représentation, 1818) : le monde en-soi est une Volonté aveugle de vivre qui engendre souffrance — la musique, les arts et l'ascèse permettent une suspension de la tyrannie de la Volonté",detail:"Schopenhauer est le premier philosophe occidental à assimiler le bouddhisme : la souffrance vient du désir (Volonté), la libération vient de la suppression du désir. L'art (surtout la musique) permet une contemplation désintéressée qui suspend momentanément la Volonté. Nietzsche s'en inspire puis s'en éloigne. Freud reconnaît la priorité de Schopenhauer dans la théorie de l'inconscient. Wagner met en musique sa philosophie (Tristan et Isolde)."},
{theme:"philo",focus:"allemagne",diff:"moyen",type:"q",q:"Quel philosophe Johann Gottlieb Fichte (1762-1814) prononce les 'Discours à la nation allemande' (1807-1808) sous occupation napoléonienne, inventant le concept de nation culturelle allemande fondée sur la langue ?",a:"Fichte définit la nation non par la citoyenneté (Renan) mais par la culture et la langue — les Allemands forment une nation spirituelle même sans État, fondée sur la langue (Muttersprache)",detail:"Fichte prononce ses 14 Discours à Berlin occupé par Napoléon (hiver 1807-1808). Il forge l'idée d'une 'Kulturnation' allemande fondée sur la langue, l'histoire et la culture — distincte de la conception civique française (Renan : la nation est un 'plébiscite quotidien'). Cette conception culturelle/ethnique de la nation aura des conséquences profondes : elle permet de revendiquer des 'Allemands' dispersés dans toute l'Europe centrale comme 'compatriotes' (fondement du pangermanisme)."},
{theme:"arts",focus:"allemagne",diff:"facile",type:"q",q:"Quel compositeur allemand Ludwig van Beethoven (1770-1827), sourd à partir de 45 ans, compose sa 9e Symphonie en 1824 et révolutionne la musique classique en y intégrant des voix humaines et un texte de Schiller ?",a:"La 9e Symphonie de Beethoven ('Ode à la Joie') est la première symphonie à intégrer des chanteurs et un chœur — Beethoven dirige sa création sans entendre une seule note",detail:"Beethoven commence à perdre l'ouïe vers 26 ans, est sourd à 44 ans. Il envisage le suicide (Testament de Heiligenstadt, 1802). Sa 9e Symphonie (1824) est créée à Vienne — au moment des applaudissements, il tourne le dos au public, ne les entendant pas ; une chanteuse lui fait face au public. La symphonie intègre l''Ode à la Joie' de Schiller au 4e mouvement. L'Europe en adopte l'hymne (sans les paroles) en 1972."},
{theme:"arts",focus:"allemagne",diff:"moyen",type:"q",q:"Quel peintre romantique allemand Caspar David Friedrich (1774-1840), auteur du 'Voyageur contemplant une mer de nuages' (1818), est le principal représentant de la peinture romantique allemande et du sentiment de 'Sublime'  ?",a:"Friedrich peint la 'Stimmung' (atmosphère) et le 'Erhabene' (Sublime) — la figure de dos contemplant la nature immense incarne l'homme seul face à l'infini",detail:"Friedrich peint des paysages nordiques (Rügen, Harz, Saxe) dans une lumière mélancolique. La figure de dos (Rückenfigur) invite le spectateur à s'identifier. Ses thèmes : ruines gothiques dans la brume, croix sur les rochers, mer de nuages. Longtemps oublié, il est redécouvert au XXe siècle. Le Surréalisme et les artistes de la Nouvelle Objectivité s'y réfèrent."},
{theme:"arts",focus:"allemagne",diff:"moyen",type:"q",q:"Quel cinéaste allemand Fritz Lang (1890-1976), auteur de Metropolis (1927) et M le maudit (1931), fuit l'Allemagne nazie en 1933 après que Goebbels lui propose de diriger le cinéma du Reich ?",a:"Fritz Lang refuse la proposition de Goebbels et quitte l'Allemagne le soir même pour Paris, puis Hollywood — Metropolis et M le maudit sont des jalons du cinéma expressionniste allemand",detail:"Metropolis (1927, le plus cher film muet de l'histoire) décrit une société dystopique à 2 classes. M le maudit (1931, avec Peter Lorre) est le premier film à mettre en scène un tueur en série. Goebbels convoque Lang et lui propose de diriger la UFA (studio d'État nazi). Lang passe la soirée à réfléchir puis part le soir même, laissant sa fortune et sa femme (qui rejoindra les nazis). Il fait carrière à Hollywood."},
{theme:"arts",focus:"allemagne",diff:"facile",type:"q",q:"Quel compositeur Richard Strauss (1864-1949), auteur de 'Also sprach Zarathustra' (1896) et des opéras Salomé et Der Rosenkavalier, est-il resté en Allemagne nazie et pourquoi est-il controversé ?",a:"Strauss accepte de diriger la Reichsmusikkammer nazie en 1933 mais est démis en 1935 après une lettre critique saisie par la Gestapo — il reste en Allemagne pour protéger sa belle-fille juive",detail:"'Also sprach Zarathustra' (utilisé par Kubrick dans 2001) est son œuvre la plus célèbre. Strauss accepte la direction de la Reichsmusikkammer mais compose des opéras avec son librettiste juif Stefan Zweig (La Femme silencieuse) — ce qui provoque sa mise à l'écart. Il reste en Allemagne, affirmant protéger sa belle-fille Alice (juive) et ses petits-enfants. Il est dénazifié (blanchi) en 1948. Sa réputation reste ambiguë."},
{theme:"arts",focus:"allemagne",diff:"difficile",type:"q",q:"Quelle cinéaste Leni Riefenstahl (1902-2003) réalise le film de propagande 'Le Triomphe de la Volonté' (1935) et 'Les Dieux du stade' (1938) sur les JO de Berlin, et pourquoi ses films restent techniquement révolutionnaires mais moralement condamnés ?",a:"Riefenstahl invente des techniques cinématographiques (travellings, contre-plongées, drones précurseurs, caméras sur rails) pour magnifier Hitler et les JO nazis — ses films sont techniquement brillants et moralement compromis",detail:"'Triumph des Willens' (1935) filme le congrès de Nuremberg avec 30 caméras, grues, travellings. La mise en scène élève Hitler au rang de messie descendant des nuages. 'Olympia' (1938) invente le film sportif moderne (ralentis, plongées sous-marines). Riefenstahl se défend d'avoir fait de l'art, pas de la propagande. Dénazifiée en 1952 mais ostracisée. Elle réalise un documentaire sur les Nouba (Soudan) à 60 ans, plonge avec des requins à 70 ans. Mort à 101 ans sans s'être repentie."},
{theme:"arts",focus:"allemagne",diff:"moyen",type:"q",q:"Quel romancier Heinrich Böll (1917-1985), Prix Nobel 1972, est la conscience morale de la littérature allemande d'après-guerre — auteur de 'L'Honneur perdu de Katharina Blum' (1974), critique des médias sensationnalistes ?",a:"Böll dénonce l'Allemagne d'après-guerre : les anciens nazis réintégrés, le conformisme bourgeois, la presse à scandale (visant le Springer-Verlag) — Prix Nobel 1972, président du PEN Club international",detail:"L'Honneur perdu de Katharina Blum (1974) est une critique explicite du Bild Zeitung (Springer) qui présente les sympathisants de la RAF comme des terroristes. Böll avait écrit un article défendant le droit à un procès équitable pour Ulrike Meinhof — la presse le traite d'avocat du terrorisme. Böll est aussi auteur de 'Et ne dis rien' (vie dans les ruines de Cologne), 'Portrait de groupe avec dame'. Il préside le PEN Club lors de l'expulsion de Soljenitsyne d'URSS."},
{theme:"arts",focus:"allemagne",diff:"facile",type:"q",q:"Quel architecte allemand Walter Gropius (1883-1969) fonde le Bauhaus en 1919 à Weimar avec le manifeste 'l'objectif final de toute activité créatrice est la construction', avant de fuir le nazisme aux États-Unis en 1937 ?",a:"Gropius fonde le Bauhaus (1919-1933) — école qui unit arts, artisanat et industrie. Fermé par les nazis, ses maîtres (Klee, Kandinsky, Mies van der Rohe, Moholy-Nagy) émigrent et diffusent ses idées dans le monde",detail:"Le Bauhaus passe par 3 villes : Weimar (1919-1925), Dessau (1925-1932), Berlin (1932-1933). Il ferme sous la pression nazie (art 'dégénéré', 'bolchevik'). Ses maîtres émigrent aux USA et y influencent l'architecture et le design moderne : Gropius à Harvard, Mies van der Rohe à Chicago (Seagram Building), Moholy-Nagy à l'IIT de Chicago. Le design 'moderne' mondial (minimaliste, fonctionnel) est l'héritage du Bauhaus."},
{theme:"arts",focus:"allemagne",diff:"moyen",type:"q",q:"Quel groupe musical de punk-rock berlinois 'Die Ärzte' et quel chanteur 'Herbert Grönemeyer' représentent la scène musicale allemande populaire — et quelle chanson de Grönemeyer (Bochum, 1984) est l'hymne officieux de cette ville industrielle ?",a:"'Bochum' (1984) de Herbert Grönemeyer est l'une des chansons allemandes les plus jouées — hymne à la ville minière de Ruhr en déclin industriel. Die Ärzte (les Médecins) sont l'un des groupes punk-rock les plus vendus d'Allemagne",detail:"Herbert Grönemeyer (né à Bochum) est l'artiste allemand le plus vendu de l'histoire (15 millions d'albums). 'Bochum' célèbre la ville industrielle de la Ruhr avec un mélange d'ironie et d'attachement. Elle est jouée au Bochum VfL avant chaque match. Die Ärzte (fondés à Berlin en 1982) sont le groupe de punk-rock le plus populaire d'Allemagne — réputés pour leur humour absurde et leurs prises de position politiques."},
{theme:"arts",focus:"allemagne",diff:"difficile",type:"q",q:"Quel mouvement de la 'Neue Deutsche Welle' (Nouvelle Vague allemande, 1979-1984) produit des artistes comme Nena ('99 Luftballons'), Trio ('Da Da Da') et Klaus Nomi, mêlant punk, synthétiseurs et humour absurde ?",a:"La Neue Deutsche Welle est la réponse allemande au punk britannique — textes en allemand, synthétiseurs, esthétique post-industrielle et parfois humour absurde — '99 Luftballons' devient un hit mondial anti-guerre en 1983",detail:"'99 Luftballons' (Nena, 1983) est écrit en réaction aux tensions de la Guerre froide (missiles Pershing II déployés en Allemagne). 99 ballons rouges déclenchent par erreur une guerre nucléaire. La version anglaise ('99 Red Balloons') est moins bonne. Klaus Nomi, haute-contre contre-ténor new-yorkais d'origine allemande, est l'une des premières célébrités à mourir du SIDA (1983). Trio ('Da Da Da', 1982) atteint le #2 mondial avec un riff de Casio."},
{theme:"arts",focus:"allemagne",diff:"moyen",type:"q",q:"Quelle danseuse et chorégraphe Pina Bausch (1940-2009), fondatrice du Tanztheater de Wuppertal, révolutionne la danse contemporaine en y intégrant dialogue, répétitions et états émotionnels bruts ?",a:"Pina Bausch crée le 'Tanztheater' (théâtre-danse) — ses œuvres (Kontakthof, Café Müller, Nelken) mêlent danse, paroles, musique et objets scéniques pour explorer les relations entre hommes et femmes",detail:"Pina Bausch pose des questions plutôt que de raconter des histoires : 'Ce qui m'intéresse, c'est ce qui meut les gens, pas comment ils bougent.' Café Müller (1978) — danseurs aux yeux fermés percutant les meubles — est son œuvre emblématique. Kontakthof (contact court) explore les rituels de séduction. Almodóvar lui rend hommage dans Parle avec elle (2002). Son Tanztheater Wuppertal continue après sa mort."},
{theme:"politique",focus:"allemagne",diff:"facile",type:"q",q:"Quel système électoral proportionnel allemand (vote à deux voix : directe et de liste) produit-il régulièrement des gouvernements de coalition, et quelle 'barrière des 5 %' empêche la fragmentation du Parlement ?",a:"Le système mixte allemand (proportionnel personnalisé) combine scrutin majoritaire à un tour (candidats directs) et proportionnel (listes de parti) — le seuil de 5 % exclut les petits partis du Bundestag",detail:"L'électeur allemand vote deux fois : une voix pour le candidat de sa circonscription (Erststimme), une voix pour le parti (Zweitstimme). La deuxième voix détermine la proportion des sièges. Le seuil de 5 % évite la fragmentation qui avait paralysé la République de Weimar. Ce système favorise les coalitions (CDU/CSU-SPD, SPD-Verts-FDP). La réforme de 2023 réduit le nombre de députés (de ~736 à 630 sièges fixes)."},
{theme:"politique",focus:"allemagne",diff:"moyen",type:"q",q:"Quel chancelier Konrad Adenauer (1876-1967) dirige la RFA de 1949 à 1963 et réconcilie l'Allemagne avec l'Occident — quelle 'politique des petits pas' (petite Annäherung) adopte-t-il avec Israël et la France ?",a:"Adenauer signe le traité de Luxembourg (1952, réparations aux victimes de la Shoah), le traité de l'Élysée avec de Gaulle (1963, réconciliation franco-allemande) et intègre la RFA dans l'OTAN (1955)",detail:"Adenauer (75 ans quand il prend ses fonctions) est l'architecte de l'Allemagne de l'Ouest moderne. Réparations à Israël (3 milliards de marks, 1952) — geste capital malgré l'opposition interne. L'Élysée (1963) réconcilie France et Allemagne après 3 guerres en 70 ans — fondement de la construction européenne. 'Der Alte' (le Vieux) refuse de quitter le pouvoir : il est le plus vieux chef de gouvernement du monde occidental quand il démissionne à 87 ans."},
{theme:"politique",focus:"allemagne",diff:"moyen",type:"q",q:"Quel scandale politique, l'affaire Guillaume (1974), force le chancelier Willy Brandt à démissionner après qu'il est révélé que son assistant personnel Günter Guillaume est un espion de la Stasi est-allemande ?",a:"Günter Guillaume, collaborateur proche de Brandt depuis 1970, est démasqué comme officier de la HVA (service de renseignement de la RDA) — Brandt démissionne par sens de l'honneur malgré des conseils de rester",detail:"Guillaume avait accès aux documents les plus confidentiels de la chancellerie fédérale, accompagnait Brandt dans ses voyages. Son arrestation (avril 1974) est un coup majeur pour le service de renseignement est-allemand. Brandt démissionne le 7 mai 1974 alors que sa position restait solide politiquement. Helmut Schmidt lui succède. Guillaume sera échangé contre des agents ouest-allemands en 1981."},
{theme:"politique",focus:"allemagne",diff:"difficile",type:"q",q:"Comment le système fédéral allemand distribue-t-il les compétences entre le Bund (fédération) et les 16 Länder, et quel rôle particulier jouent les Länder dans l'application des lois fédérales ?",a:"En Allemagne, le Bund légifère, les Länder administrent et exécutent — les Länder ont la compétence résiduelle dans l'éducation, la police et la culture, mais exécutent la plupart des lois fédérales",detail:"Le fédéralisme allemand est 'exécutif' : le Bund fixe les règles, les Länder les appliquent (administration déconcentrée). Les Länder ont des compétences exclusives : éducation, culture, police. L'éducation fragmentée en 16 systèmes cause des inégalités et des problèmes de reconnaissance des diplômes ('Chaos bildungsmäßig'). Le Bundesrat (chambre des Länder) peut bloquer les lois fédérales qui affectent l'administration des Länder."},
{theme:"politique",focus:"allemagne",diff:"moyen",type:"q",q:"Quel mouvement alternatif né en Allemagne, les Verts (Die Grünen, fondés en 1980), est le premier parti écologiste à entrer dans un parlement national et à participer à un gouvernement fédéral (1998-2005) ?",a:"Die Grünen (les Verts) entrent au Bundestag en 1983 avec 5,6 % — Joschka Fischer devient ministre des Affaires étrangères de 1998 à 2005 dans la coalition rouge-verte de Gerhard Schröder",detail:"Les Verts émergent du mouvement anti-nucléaire et du mouvement alternatif des années 1970. Leur fondation (1980) réunit écologistes, pacifistes, féministes. Au Bundestag en 1983, ils arrivent en jeans et apportent des plantes. Joschka Fischer (ancien militant d'extrême gauche) devient un ministre des AE respecté et pro-européen. Les Verts participent au gouvernement Scholz (2021-2025) avec Annalena Baerbock aux AE et Robert Habeck à l'Économie."},
{theme:"politique",focus:"allemagne",diff:"moyen",type:"q",q:"Quelle politique d'accueil de réfugiés décidée par Angela Merkel en 2015 («Wir schaffen das») est-elle accepte 890 000 demandeurs d'asile en un an, et comment provoque-t-elle la montée de l'AfD ?",a:"En septembre 2015, Merkel suspend le règlement de Dublin et ouvre les frontières aux réfugiés syriens — 890 000 arrivent en 2015. La crise alimenterait l'AfD (Alternative für Deutschland) qui passe de 4 à 12 % en 2017",detail:"La décision de Merkel («Nous y arriverons») est humanitaire mais divise sa propre coalition (CSU bavaroise hostile). Les attentats de Cologne (Sylvestre 2015-2016, agressions sexuelles par des hommes d'origine étrangère) attisent le ressentiment. L'AfD monte de 5 % à 12 % en 2017, entre dans le Bundestag. Lors des élections de 2024, elle atteint 20 % nationalement, 30 % à l'est. La pression migratoire reste le sujet le plus clivant de la politique allemande."},
{theme:"politique",focus:"allemagne",diff:"difficile",type:"q",q:"Comment le 'Sonderweg' (voie spéciale) est-il utilisé par les historiens pour caractériser le développement politique allemand au XIXe-XXe siècle — et pourquoi cette thèse est-elle aujourd'hui controversée ?",a:"Le 'Sonderweg' (voie particulière) postule que l'Allemagne a suivi un chemin anormal vers la modernité (modernisation économique sans libéralisation politique) qui aurait rendu le nazisme inévitable — critiqué comme téléologique",detail:"Thèse du Sonderweg (Wehler, Habermas) : l'Allemagne s'industrialise rapidement mais ses élites féodales (junkers, militaires) bloquent la démocratie. Cette 'modernité sans révolution' crée les conditions du nazisme. Critiques (Blackbourn, Eley, 1984) : comparer à un 'ideal-type' anglais ou français est arbitraire, la France et l'Angleterre ont aussi des dérives autoritaires. Le débat reste structurant dans l'historiographie allemande."},
{theme:"politique",focus:"allemagne",diff:"facile",type:"q",q:"Quel parti politique allemand, la CDU (Union chrétienne-démocrate), est-il le pendant conservateur au SPD (social-démocrate), et quelle 'grande coalition' (Grosse Koalition, GroKo) réunit ces deux partis historiquement opposés ?",a:"CDU/CSU et SPD forment trois 'grandes coalitions' (1966-1969, 2005-2009, 2013-2021) quand aucune majorité de 'bloc' n'est possible — critiqués comme effaçant l'opposition et favorisant les partis extrêmes",detail:"La CDU (nationale) et la CSU (bavaroise) forment un groupe parlementaire commun. La Grande Coalition CDU/CSU-SPD réunit les deux partis qui se combattaient depuis 1945. Les critiques : sans opposition crédible au centre, les électeurs mécontents vont aux extrêmes (AfD, Die Linke). La GroKo de 2013-2021 (Merkel III et IV) adopte le SMIC, le mariage pour tous, mais laisse l'infrastructure et le numérique en retard. Scholz (SPD) forme un 'feu tricolore' (SPD-Verts-FDP) en 2021."},
{theme:"politique",focus:"allemagne",diff:"moyen",type:"q",q:"Quel traité de Maastricht (1992) crée l'Union européenne et l'euro — dans quelle mesure l'Allemagne réunifiée a-t-elle accepté de sacrifier le deutschmark pour obtenir l'accord de la France à la réunification ?",a:"Kohl accepte l'euro (abandonnant le DM, symbole de la prospérité allemande) en échange du soutien de Mitterrand à la réunification — l'euro est parfois présenté comme le prix payé par l'Allemagne pour son unité",detail:"La réunification (1990) inquiète Mitterrand et Thatcher (peur d'une Allemagne trop puissante). Kohl rassure en accélérant l'intégration européenne : traité de Maastricht (1992) crée l'UE et l'euro. L'Allemagne sacrifie le DM — monnaie-symbole du Wirtschaftswunder — que les Allemands chérissaient. La Bundesbank résiste (son gouverneur Pöhl parle de 'catastrophe'). Les critères de Maastricht (dette < 60 %, déficit < 3 %) reflètent la rigueur budgétaire allemande imposée à tous."},
{theme:"litterature",focus:"allemagne",diff:"facile",type:"q",q:"Quel écrivain autrichien Franz Kafka (1883-1924), bien que de langue allemande et né à Prague, crée avec Le Procès et Le Château un univers d'absurdité bureaucratique qui a donné le terme 'kafkaïen' à la langue française ?",a:"Kafka — fonctionnaire d'assurance à Prague, écrit en allemand, juif de Bohême — crée des récits d'individus confrontés à des systèmes opaques et impitoyables ; il demande à son ami Max Brod de détruire ses manuscrits",detail:"Joseph K. (Le Procès) est arrêté sans raison et jugé sans chef d'inculpation. K. (Le Château) tente en vain d'accéder au château qui gouverne le village. Ces récits préfigurent les totalitarismes du XXe siècle. Kafka meurt de tuberculose en 1924 en demandant à Brod de brûler ses écrits. Brod désobéit et publie tout. 'Kafkaïen' est entré dans le dictionnaire Robert en 1974."},
{theme:"litterature",focus:"allemagne",diff:"moyen",type:"q",q:"Quelle romancière Christa Wolf (1929-2011), voix majeure de la littérature de RDA, écrit 'Cassandre' (1983) et est révélée en 1993 comme ancienne informatrice de la Stasi avant de redevenir collaboratrice surveillée ?",a:"Christa Wolf — auteure de 'Cassandre', 'Médée', 'Christa T.' — est l'une des grandes écrivaines de RDA. La révélation de sa période comme informatrice Stasi (1959-1962) puis de sa surveillance (1968-1980) révèle la complexité des compromis sous la dictature",detail:"Wolf réinterprète les mythes grecs (Cassandre, Médée) depuis une perspective féministe et pacifiste. 'Cassandre' (1983) est une méditation sur la guerre et les voix dissidentes ignorées. La révélation de ses fichiers Stasi (1993) choque l'Allemagne : Wolf avait été informatrice (pseudonyme 'Margarete') mais surtout victime de surveillance intensive. La 'Literaturstreit' (querelle littéraire) post-réunification autour de Wolf révèle les tensions entre Est et Ouest."},
{theme:"litterature",focus:"allemagne",diff:"difficile",type:"q",q:"Quel poète Paul Celan (1920-1970), juif roumain de langue allemande, survivant de la Shoah dont les parents sont morts dans les camps, écrit 'Todesfuge' (Fugue de la mort) — poème-testament sur la Shoah en allemand, la langue des bourreaux ?",a:"'Todesfuge' (1945) de Celan est considéré comme le plus grand poème sur la Shoah — 'La mort est un maître d'Allemagne'. Celan écrit en allemand, la langue de ses persécuteurs, avec laquelle il entretient une relation torturée",detail:"'Todesfuge' emploie la structure de la fugue musicale pour décrire l'extermination. Les métaphores récurrentes (cheveux d'or/cheveux cendrés, lait/cendres) créent une litanie hypnotique. Celan dit : 'Il n'y a rien au monde qui prévale contre la réalité de la Shoah.' Sa langue est de plus en plus hermétique au fil des années ('Atemwende', 1967). Il se suicide en se noyant dans la Seine en 1970. Son dialogue avec Heidegger (qui ne s'excuse pas) reste l'un des plus douloureux de la littérature."},
{theme:"litterature",focus:"allemagne",diff:"moyen",type:"q",q:"Quel auteur Erich Maria Remarque (1898-1970), auteur d''À l'Ouest, rien de nouveau' (1929), écrit le roman anti-guerre le plus vendu du XXe siècle — censuré et brûlé par les nazis dès 1933 ?",a:"'Im Westen nichts Neues' (1929) vend 2,5 millions d'exemplaires en 18 mois — premier roman à décrire la guerre de l'intérieur, vue par un simple soldat allemand sans idéalisation héroïque",detail:"Paul Bäumer, 18 ans, s'engage convaincu par les discours patriotiques de son professeur. Dès le front, les illusions s'effondrent. Remarque décrit la boue, les rats, les gaz, la peur, la mort absurde. Les nazis brûlent le livre en 1933 (Goebbels : 'défaitiste') et retirent la nationalité à Remarque. Le film (Lewis Milestone, 1930) est interdit en Allemagne. Son adaptation de 2022 (Netflix) remporte 4 Oscars."},
{theme:"litterature",focus:"allemagne",diff:"facile",type:"q",q:"Quel auteur Bertolt Brecht (1898-1956), dramaturge et poète marxiste, fuit l'Allemagne nazie en 1933 et crée un 'théâtre épique' destiné à éveiller la conscience critique des spectateurs plutôt qu'à les émouvoir ?",a:"Brecht — L'Opéra de Quat'sous, La Mère Courage, La Vie de Galilée, Le Cercle de craie caucasien — invente le 'Verfremdungseffekt' (effet de distanciation) : briser l'illusion théâtrale pour que le spectateur pense",detail:"L''Effet V' (Verfremdungseffekt) : acteurs qui parlent à la public, panneaux de titre, chansons qui cassent l'action, décors visiblement artificiels. But : empêcher l'identification émotionnelle, favoriser le jugement critique. L'Opéra de Quat'sous (1928, musique de Kurt Weill) est un succès mondial. Brecht fuit en 1933, passe par le Danemark, la Finlande, l'URSS, les USA (convoqué par la Commission des activités anti-américaines en 1947). Il s'installe à Berlin-Est en 1949."},
{theme:"litterature",focus:"allemagne",diff:"moyen",type:"q",q:"Quelle romancière Elfriede Jelinek (née en 1946), autrichienne de langue allemande, reçoit le Prix Nobel en 2004 pour des œuvres comme 'La Pianiste' (1983) — roman sur les rapports de domination, de sexualité et d'humiliation dans la bourgeoisie viennoise ?",a:"Jelinek — La Pianiste, Les Amantes, Lust — explore la violence masquée sous la respectabilité bourgeoise, le masochisme féminin interiorisé et la langue comme instrument de domination",detail:"'La Pianiste' (adapté par Haneke en 2001, Palme d'or) décrit Erika Kohut, enseignante réprimée par sa mère et par la norme musicale, qui développe des pratiques sadomasochistes. Jelinek refuse de recevoir le Nobel en public (phobie sociale). Le comité Nobel divise sur son attribution — un membre démissionne. Ses pièces de théâtre ('Bambiland', 'Babel') sont très jouées en Allemagne et en Autriche. Elle vit à Vienne et Munich."},
{theme:"economie",focus:"allemagne",diff:"facile",type:"q",q:"Quelle industrie automobile allemande (Volkswagen, BMW, Mercedes-Benz, Porsche, Audi) représente 20 % des exportations allemandes, et quel scandale de triche aux tests d'émissions secoue Volkswagen en 2015 ?",a:"Le 'Dieselgate' (septembre 2015) révèle que VW a installé des logiciels de triche dans 11 millions de véhicules diesel pour truquer les tests d'émissions — VW paie 30 milliards de dollars d'amendes et de compensations",detail:"Volkswagen program des moteurs diesel pour réduire les émissions d'oxydes d'azote pendant les tests, puis polluer normalement en conduite réelle (40x la limite autorisée). L'EPA américaine découvre la fraude. VW admet le logiciel dans 11 millions de véhicules. L'amende totale dépasse 30 milliards (record mondial). Le Dieselgate déclenche la transition vers le véhicule électrique en Allemagne — paradoxalement accéléré par ce scandale."},
{theme:"economie",focus:"allemagne",diff:"moyen",type:"q",q:"Quelle politique industrielle dite 'Mittelstand' (PME familiales) est au cœur de la compétitivité allemande — et pourquoi ces entreprises familiales, souvent invisibles du grand public, dominent-elles leurs niches mondiales ?",a:"Le Mittelstand regroupe 3,5 millions d'entreprises familiales (généralement 10-500 salariés) qui représentent 55 % de l'emploi privé allemand et dominent des marchés mondiaux de niche (machines-outils, capteurs, filtres industriels)",detail:"Les «Hidden Champions» (Hermann Simon, 1996) : 2 700 entreprises allemandes leader mondial dans leurs niches ultra-spécialisées (pratiquement inconnues du grand public). Exemples : Kärcher (nettoyeurs haute-pression, n°1 mondial), Rational (fours combinés pour restauration, 55 % du marché mondial), Webasto (toits ouvrants). Leur modèle : spécialisation extrême, exportation mondiale, financement par les profits (peu d'endettement), apprentissage dual (Azubi), stabilité familiale sur plusieurs générations."},
{theme:"economie",focus:"allemagne",diff:"difficile",type:"q",q:"Pourquoi la réunification économique allemande (1990) a-t-elle été plus difficile que prévue — et comment le 'Solidaritätszuschlag' (surtaxe de solidarité) prélevé pendant 30 ans a-t-il financé la reconstruction de l'Est ?",a:"La réunification coûte 2 000 milliards d'euros en transferts vers l'Est entre 1990 et 2020 — le Soli (solidaritätszuschlag, 5,5 % de l'impôt sur le revenu) finance une partie de ce transfert massif",detail:"Helmut Kohl promet des 'paysages florissants' à l'Est en 3-4 ans. La réalité : la plupart des entreprises de RDA (combinats socialistes) sont non compétitives et ferment dès 1990-1992. Le chômage à l'Est atteint 25 %. La Treuhandanstalt (agence de privatisation) vend 8 500 entreprises en 4 ans, souvent à vil prix. L'exode des qualifiés vers l'Ouest (2 millions en 30 ans) vide les régions de l'Est. En 2023, les revenus à l'Est sont toujours 20 % inférieurs à l'Ouest."},
{theme:"economie",focus:"allemagne",diff:"moyen",type:"q",q:"Quelle réforme du marché du travail, les lois Hartz (2002-2005) du chancelier Schröder, transforme le marché du travail allemand et crée le 'minijob' (emploi à moins de 450€/mois) — réduisant le chômage mais créant des emplois précaires ?",a:"Les lois Hartz I-IV (nommées du directeur de VW Peter Hartz) réduisent les indemnités chômage, créent le Hartz IV (revenu minimum), les minijobs et les agences intérimaires — le chômage passe de 12 % à 5 % en 10 ans",detail:"Gerhard Schröder engage les réformes Hartz en 2002-2005 malgré la résistance syndicale. Hartz IV (RMI allemand) fusionne aide sociale et chômage longue durée. Les minijobs (emplois défiscalisés jusqu'à 450€/mois) explosent — 7 millions en 2023. Le chômage baisse mais la précarité augmente. Ces réformes permettent à l'Allemagne de traverser la crise de 2008 sans explosion sociale (chômage partiel Kurzarbeit) mais creusent les inégalités. Schröder perd les élections de 2005."},
{theme:"economie",focus:"allemagne",diff:"moyen",type:"q",q:"Quelle transition énergétique allemande (Energiewende), lancée après Fukushima (2011), vise 80 % d'énergies renouvelables en 2050 et a fermé toutes les centrales nucléaires en 2023 — avec quels problèmes de coûts et d'émissions ?",a:"L'Energiewende ferme le dernier réacteur nucléaire allemand en avril 2023 — résultat : hausse du prix de l'électricité (35 c€/kWh vs 25 en France), recours temporaire au charbon, mais 46 % d'électricité renouvelable en 2023",detail:"L'Allemagne installe massivement éolien et solaire depuis 2000. Mais la fermeture du nucléaire crée un 'Dunkelflaute' (période sans vent ni soleil) comblé par le charbon et le gaz (surtout russe avant 2022). La guerre en Ukraine révèle la dépendance au gaz russe (Nord Stream). En 2023, l'Allemagne ferme ses 3 derniers réacteurs malgré la crise énergétique. Les prix de l'électricité industrielle (les plus hauts d'Europe) fragilisent l'industrie (BASF déménage des usines en Chine)."},
{theme:"economie",focus:"allemagne",diff:"difficile",type:"q",q:"Comment la doctrine du 'Schwarze Null' (zéro noir = équilibre budgétaire) défendue par Wolfgang Schäuble (ministre des Finances 2009-2017) reflète-t-elle l'orthodoxie budgétaire allemande, et pourquoi est-elle critiquée par les économistes keynésiens ?",a:"Le Schwarze Null (équilibre budgétaire inscrit dans la Constitution via le Schuldenbremse en 2009) reflète le traumatisme de l'hyperinflation de 1923 — critiqué car il sous-investit dans les infrastructures, le numérique et l'éducation",detail:"La Schuldenbremse (frein à l'endettement, inscrit en 2009) limite le déficit structurel à 0,35 % du PIB. Schäuble applique le Schwarze Null (zéro absolu) de 2014 à 2020. Conséquences : sous-investissement massif dans le numérique (fibre, 5G), les ponts (1 700 ponts autoroutiers en mauvais état), les hôpitaux, les écoles. Les économistes keynésiens (Krugman, Stiglitz) critiquent : les taux bas permettent un endettement presque gratuit pour investir dans l'avenir. La Cour constitutionnelle invalide un réaffectation de 60 Md€ en 2023."},
{theme:"gastro",focus:"allemagne",diff:"facile",type:"q",q:"Quel marché de Noël allemand, le Christkindlesmarkt de Nuremberg, est l'un des plus anciens et des plus célèbres d'Europe — et quels sont les incontournables culinaires de ces marchés (Glühwein, Lebkuchen, Bratwurst) ?",a:"Le Christkindlesmarkt de Nuremberg existe depuis 1628 (peut-être depuis 1530) — le Glühwein (vin chaud aux épices), les Lebkuchen (pain d'épices) et les Nürnberger Bratwurst (petites saucisses grillées) en sont les symboles",detail:"Les marchés de Noël allemands (Weihnachtsmärkte) attirent des millions de touristes. Nuremberg, Cologne, Dresde et Strasbourg sont les plus célèbres. Le Glühwein (vin rouge, cannelle, clous de girofle, anis étoilé, sucre, zeste d'orange) se boit dans des mugs souvenir. Les Nürnberger Rostbratwurst (AOP depuis 2003, 7-9 cm max, grillées sur braises de hêtre) sont protégées. Les Lebkuchen (pain d'épices) de Nuremberg sont les seuls bénéficiant d'une AOP géographique."},
{theme:"gastro",focus:"allemagne",diff:"moyen",type:"q",q:"Quelle cuisine régionale bavaroise (Weisswurst, Bretzel, Obatzda, Schweinshaxe) diffère fortement de la cuisine prussienne du Nord (Eisbein, Grünkohl), illustrant la diversité gastronomique allemande ?",a:"La Bavière (Weisswurst avant midi, Bretzel, Radieschen, Obatzda avec bière) s'oppose à la cuisine de Hambourg (poisson fumé, Labskaus) et de Berlin (Currywurst, Königsberger Klopse) — l'Allemagne est une mosaïque gastronomique",detail:"La Weisswurst bavaroise (veau et lard, herbes, sans nitrites, à manger avant 12h — 'ne doit pas entendre sonner la cloche de midi') se mange avec de la moutarde douce et un Bretzel. L'Obatzda (camembert écrasé avec beurre, oignon, paprika, bière) est la spécialité des jardins de bière. La Schweinshaxe (jarret de porc rôti, peau craquante) est le roi du Oktoberfest. La Currywurst (Berlin, 1949, Herta Heuwer) est le street food n°1 allemand."},
{theme:"gastro",focus:"allemagne",diff:"facile",type:"q",q:"Quel alcool distillé allemand, le Schnapps ou le Korn, se décline en centaines de variations régionales — et quelle eau-de-vie de cerises (Schwarzwälder Kirschwasser) est protégée en AOP et utilisée dans la Forêt-Noire ?",a:"Le Schwarzwälder Kirschwasser (eau-de-vie de cerises de la Forêt-Noire, AOP depuis 1985) donne son goût caractéristique à la gâteau Forêt-Noire (Schwarzwälder Kirschtorte)",detail:"Le Kirschwasser (eau-de-vie de cerises noires) est distillé depuis le XVIe siècle dans la Forêt-Noire. L'AOP exige des cerises de la région (Morello/Schattenmorelle), distillation en alambic de cuivre, vieillissement minimum de 6 mois en fûts de bois non traité ou en verre. Le Schwarzwälder Kirschtorte (génoise, cerises, crème, Kirsch) est le gâteau allemand le plus connu à l'étranger. L'Allemagne produit aussi le Steinhaeger (genièvre, Westphalie) et le Stroh Rum (Autriche)."},
{theme:"gastro",focus:"allemagne",diff:"moyen",type:"q",q:"Quel repas traditionnel du dimanche en Allemagne, le Sonntagsbraten, réunit la famille autour d'un rôti — et quelle Sauerbraten (rôti de bœuf mariné au vinaigre) est la recette nationale discutée dans chaque région ?",a:"Le Sauerbraten (bœuf mariné 3 à 10 jours dans du vinaigre, vin rouge, légumes et épices) varie selon les régions : sauce au pain d'épices en Rhénanie, aux raisins secs en Bavière, aux prunes en Franconie",detail:"Le Sauerbraten est l'un des plats nationaux allemands disputés (avec la Bratwurst et la Currywurst). La marinade attendrit et parfume le bœuf. La sauce (réduite avec le liquide de marinade) est épaissie différemment selon les régions. En Rhénanie, les Lebkuchen (pain d'épices) ou le Rübenkraut (sirop de betterave) donnent une note sucrée-épicée unique. Servi avec Knödel (quenelles) en Bavière ou Rotkohl (chou rouge) dans le Nord."},
{theme:"gastro",focus:"allemagne",diff:"difficile",type:"q",q:"Comment la loi allemande de pureté de la bière (Reinheitsgebot, 1516) a-t-elle influencé la bière mondiale pendant 500 ans, et pourquoi est-elle désormais critiquée par les brasseurs artisanaux ?",a:"Le Reinheitsgebot (eau, malt d'orge, houblon — la levure ajoutée en 1857 par Pasteur) standardise la bière allemande pendant 500 ans. Critiqué car il exclut les blés, miel, fruits et épices utilisés dans d'autres traditions brassicoles",detail:"Promulgué par Guillaume IV de Bavière en 1516, le Reinheitsgebot est la plus ancienne loi alimentaire encore invoquée. Initialement pour empêcher l'adultération (retirer les cereales rares du pain) et contrôler les prix. Adopté dans toute l'Allemagne lors de l'unification (1871). Aujourd'hui, les bières allemandes AOP suivent encore le Reinheitsgebot. Les brasseurs artisanaux (craft beer) le critiquent : il interdit d'ajouter du miel, des agrumes, des épices ou du froment non-malté. La bière de blé (Weizen) nécessite une exception."},
{theme:"nature",focus:"allemagne",diff:"facile",type:"q",q:"Quel parc national allemand, le Parc National de la Forêt Bavaroise (Bayerischer Wald), est le premier parc national allemand créé en 1970, et quelle philosophie dite 'Natur Natur sein lassen' guide sa gestion ?",a:"«Laisser la nature être nature» (Natur Natur sein lassen) : aucune intervention humaine sauf en zone périphérique — les arbres morts restent debout, les essences d'arbre co-évoluent librement",detail:"Le Bayerischer Wald (24 000 ha) borde le Parc national de Šumava (République tchèque) formant le plus grand espace forestier protégé d'Europe centrale. La non-intervention absolue en zone intégrale choque initialement les forestiers : les arbres morts restent (habitat des oiseaux cavicoles), le bostryche (scolyte, 'insecte tueur d'arbres') n'est pas combattu. Le résultat 50 ans après : une forêt plus diverse et résiliente que les forêts gérées voisines."},
{theme:"nature",focus:"allemagne",diff:"moyen",type:"q",q:"Quel phénomène de dépérissement forestier en Allemagne, le Waldsterben (mort des forêts), alarmant dans les années 1980 en raison des pluies acides, a conduit à des réglementations strictes sur le soufre et les oxydes d'azote ?",a:"Le Waldsterben (1982-1990) révèle que 50 % des forêts allemandes souffrent de pluies acides (SO2 des centrales, NOx des voitures) — il pousse l'Allemagne à installer des filtres sur ses centrales et à inventer le pot catalytique obligatoire",detail:"En 1982, le magazine Der Spiegel titre 'Le forêt meurt'. 50 % des épicéas et sapins allemands présentent des symptômes de dépérissement (aiguilles jaunes, branches mortes). La cause : pluies acides (SO2 + H2O = H2SO4). L'Allemagne impose des filtres à ses centrales (1983) et le catalyseur obligatoire (1985). Ces mesures réduisent les émissions de 90 %. Ironie : l'inquiétude du Waldsterben sensitise les Allemands à l'environnement et fonde les Verts."},
{theme:"nature",focus:"allemagne",diff:"facile",type:"q",q:"Quelle organisation environnementale allemande, le BUND (Bund für Umwelt und Naturschutz Deutschland), est l'une des plus grandes associations de protection de la nature en Europe — et quelle est la particularité du mouvement écologiste allemand par rapport à d'autres pays ?",a:"Le mouvement écologiste allemand est particulièrement puissant (BUND, NABU, Greenpeace Germany) et a produit le premier parti vert entré dans un parlement national (Die Grünen, 1983) — enraciné dans le traumatisme du Waldsterben et des protestations anti-nucléaires",detail:"Le BUND (fondé 1975, 650 000 membres) et le NABU (Naturschutzbund, 900 000 membres) sont deux des plus grandes organisations environnementales d'Europe. L'Allemagne a une culture de la 'Natur' romantique (Forêt, Heimat) qui prédispose à l'écologisme. Les mouvements anti-nucléaires des années 1970-1980 (Wyhl, Brokdorf, Gorleben) mobilisent des centaines de milliers. Cette culture aboutit aux Verts, à l'Energiewende et à la fermeture des réacteurs."},
{theme:"nature",focus:"allemagne",diff:"moyen",type:"q",q:"Quel loup gris (Canis lupus) a traversé la frontière polonaise et s'est installé en Saxe en 2000, première présence en Allemagne depuis 150 ans — et comment le retour du loup divise-t-il les éleveurs et les écologistes ?",a:"Le loup est revenu naturellement en Allemagne depuis la Pologne — il est strictement protégé (directive Habitats) mais ses attaques sur les troupeaux (2 000 brebis/an) créent un conflit entre éleveurs et conservationnistes",detail:"En 2000, deux loups s'installent en Lusace (Saxe). En 2023, l'Allemagne abrite environ 180 meutes (1 200-1 500 loups). La loi européenne (directive Habitats) les protège strictement. Mais 2 000 à 4 000 moutons sont tués par an. Les éleveurs exigent des abattages ; les écologistes défendent les clôtures électriques. Le gouvernement Scholz assouplit timidement les règles d'abattage en 2024. Le débat reflète les tensions entre agriculture et conservation dans l'Europe contemporaine."},
{theme:"nature",focus:"allemagne",diff:"difficile",type:"q",q:"Comment l'Allemagne a-t-elle géré la transition de son agriculture intensive post-guerre (monocultures, pesticides, drainage) vers des normes environnementales plus durables — et pourquoi les agriculteurs ont-ils massivement protesté en 2024 ?",a:"Les protestations d'agriculteurs allemands (janvier 2024) visent la suppression de la nid diesel agricole et les contraintes de la PAC réformée — révélant la tension entre rentabilité agricole et transition écologique",detail:"L'agriculture allemande est très intensive (rendements parmi les plus élevés d'Europe) mais sous pression environnementale : pollution aux nitrates des nappes phréatiques, déclin des insectes, perte de biodiversité. La suppression du remboursement diesel agricole (économie de 900M€/an) déclenche les blocages de routes en janvier 2024. Les agriculteurs dénoncent aussi les contraintes de la PAC (jachères obligatoires, zones tampons). L'Allemagne doit réconcilier sécurité alimentaire, revenu agricole et transition écologique."},
{theme:"nature",focus:"allemagne",diff:"moyen",type:"q",q:"Quel fleuve allemand, l'Elbe, a fait l'objet d'une remarquable dépollution après la réunification — passant de 'fleuve mort' (RDA industrielle) à fleuve semi-naturel en 30 ans — servant de modèle de restauration écologique ?",a:"L'Elbe en 1990 était l'un des fleuves les plus pollués d'Europe (effluents chimiques de RDA : magnésium, mercure, PCB) — la fermeture des usines de RDA et les investissements dans les stations d'épuration permettent un retour des saumons en 2003",detail:"La RDA ne filtrait pas ses effluents industriels (Bitterfeld, 'ville la plus polluée du monde', déversait ses produits chimiques dans l'Elbe). En 1990, l'Elbe contient des niveaux de mercure, cadmium et PCB incompatibles avec la vie. La fermeture des usines non-rentables de RDA réduit brutalement la pollution. Des investissements massifs dans les stations d'épuration suivent. En 2003, des saumons remontent pour la première fois depuis 1870. L'Elbe reste partiellement contaminé dans ses sédiments."},
{theme:"mytho",focus:"allemagne",diff:"moyen",type:"q",q:"Quelle figure légendaire germanique, le Chevalier Siegfried, tue le dragon Fafnir pour s'emparer du trésor des Nibelungen, et quelle propriété sa baignade dans le sang du dragon lui confère-t-elle selon le Nibelungenlied ?",a:"Siegfried devient invulnérable en se baignant dans le sang de Fafnir, sauf à l'endroit où une feuille de tilleul s'était posée entre ses épaules — sa vulnérabilité secrète qui causera sa mort",detail:"Le Nibelungenlied ('Chant des Nibelungen', XIIIe s.) narre : Siegfried tue Fafnir (gardien du trésor), acquiert le Tarnkappe (cape d'invisibilité), épouse Kriemhild. Trahi par Hagen qui apprend son point vulnérable, il est assassiné à la chasse. Sa mort déclenche la vengeance de Kriemhild (Attila aidant). L'analogie avec Achille (talon) est frappante : deux héros invulnérables sauf en un point, trahis de l'intérieur."},
{theme:"mytho",focus:"allemagne",diff:"facile",type:"q",q:"Quels frères Jacob et Wilhelm Grimm (1785-1863 / 1786-1859) collectent et publient les 'Contes de l'enfance et du foyer' (Kinder- und Hausmärchen, 1812-1815) — et quel est le vrai caractère de ces contes avant leur édulcoration ?",a:"Les premiers Grimm (1812) sont violents et crus (Cendrillon : les sœurs se coupent les orteils pour enfiler la chaussure, les pigeons leur crèvent les yeux) — ils sont progressivement édulcorés jusqu'à la 7e édition (1857)",detail:"Jacob et Wilhelm Grimm ne collectent pas auprès de paysans mais principalement auprès de femmes bourgeoises (dont Dorothea Viehmann). Les premiers contes reflètent des thèmes violents et érotiques (inceste, infanticide, cannibalisme). Chaque édition assèche les références sexuelles et renforce la morale chrétienne. Blanche-Neige passe d'une mère jalouse à une belle-mère (trop immoral). Leur grammaire et dictionnaire de l'allemand sont aussi des œuvres fondamentales."},
{theme:"mytho",focus:"allemagne",diff:"moyen",type:"q",q:"Quel conte populaire allemand de Till Eulenspiegel, personnage farceur du Moyen Âge, est le premier exemple de 'trickster' de la tradition germanique, et comment son nom ('hibou miroir') symbolise-t-il sa fonction satirique ?",a:"Till Eulenspiegel ('chouette-miroir' ou 'qui essuie le derrière' selon les étymologies) est un bouffon médiéval qui prend les phrases au pied de la lettre pour moquer les puissants, les bourgeois et le clergé",detail:"Eulenspiegel est cité dans des textes dès 1350, compilé en 1515 (Strasbourg). Il engager comme palefrenier 'qui connaît bien les chevaux' et les examine minutieusement sans les soigner. Il peinit des ânes au lieu de peindre des portraits. Sa satire : les puissants utilisent le langage pour exploiter les pauvres — lui retourne cette arme. Charles De Coster (Belge) l'adapte en roman flamand anti-espagnol (1867). Strauss en fait un poème symphonique (1895)."},
{theme:"mytho",focus:"allemagne",diff:"difficile",type:"q",q:"Comment le romantisme allemand (Schlegel, Tieck, Novalis, 1795-1815) a-t-il réinventé le Moyen Âge comme âge d'or mythique et les légendes germaniques comme sources de l'identité nationale, contre les Lumières françaises ?",a:"Le romantisme allemand (Jena, 1795) rejette la raison des Lumières pour l'intuition, l'organique, le national — il réhabilite le Moyen Âge gothique, les légendes germaniques et le «Volksgeist» (esprit du peuple) comme fondements de l'identité",detail:"Contre la France des Lumières (universel, rationnel, révolutionnaire), le romantisme d'Iéna (Schlegel, Tieck) valorise le particulier, l'irrationnel, l'historique. Novalis idéalise le Moyen Âge catholique-germanique ('La Chrétienté ou l'Europe', 1799). Les Grimm collectent les 'Märchen' comme patrimoine du Volksgeist. Arnim et Brentano compilent les chants populaires ('Des Knaben Wunderhorn'). Cette mythisation du passé médiéval alimente le nationalisme allemand du XIXe siècle et, dans ses formes extrêmes, l'idéologie nazie."},
{theme:"popculture",focus:"allemagne",diff:"moyen",type:"q",q:"Quel festival de musique électronique berlinois, la Love Parade (1989-2010), réunit jusqu'à 1,5 million de participants dans les rues de Berlin et incarne l'explosion culturelle post-Mur de la capitale allemande ?",a:"La Love Parade (1989-2010) est fondée par Matthias Roeingh (Dr. Motte) à Berlin-Ouest comme «manifestation» pour la paix et la musique — elle atteint 1,5 million de participants en 1999 avant de décliner et de finir en catastrophe à Duisbourg en 2010 (21 morts)",detail:"La Love Parade commence avec 150 personnes en 1989 et la techno de clubs berlinois comme le Tresor. Elle grandit exponentiellement dans les années 1990, symbole de la réunification festive de Berlin. En 2010, déplacée à Duisbourg (amphithéâtre industriel), une bousculade dans un tunnel tue 21 personnes et en blesse 500. L'événement est définitivement arrêté. Le Technoclub Tresor et le Berghain continuent de faire de Berlin la capitale mondiale de la musique électronique."},
{theme:"popculture",focus:"allemagne",diff:"facile",type:"q",q:"Quel jeu de société allemand Settlers of Catan (Die Siedler von Catan, 1995), créé par Klaus Teuber, est le premier jeu de société européen à percer aux États-Unis et a vendu plus de 40 millions d'exemplaires dans le monde ?",a:"Catan (1995) révolutionne les jeux de société en combinant stratégie, négociation et chance — sans élimination de joueurs (tous jouent jusqu'à la fin), il fonde le 'German board game' (Eurogame) comme genre mondial",detail:"Klaus Teuber (dentiste, Darmstadt) crée Catan dans sa cave en 1994. Le jeu gagne le Spiel des Jahres ('Jeu de l'année', récompense la plus importante du secteur) en 1995. Il est traduit en 40 langues, vendu dans 70 pays. Le 'German game' ou 'Eurogame' est un genre: pas de chance pure, stratégie, interaction sociale, pas d'élimination. Il inspire Ticket to Ride, Dominion, Carcassonne. Mark Zuckerberg cite Catan comme son jeu favori."},
{theme:"popculture",focus:"allemagne",diff:"moyen",type:"q",q:"Quel magazine satirique allemand 'Der Spiegel', fondé en 1947, est le plus grand magazine d'information d'Europe et symbolise le journalisme d'investigation allemand — malgré l'affaire Relotius (2018) où un journaliste invente des reportages ?",a:"Der Spiegel (1947, Hambourg) a tenu tête au gouvernement Adenauer (affaire Spiegel, 1962), révélé les scandales de la RFA — mais l'affaire Relotius (2018) révèle que Claas Relotius («journaliste de l'année») avait inventé des dizaines de reportages pendant des années",detail:"L'Affaire Spiegel (1962) : Adenauer fait arrêter 10 journalistes pour 'trahison' après un article sur les failles de la défense. Scandale démocratique — Adenauer perd la face. Der Spiegel sort renforcé. L'affaire Relotius (2018) : Claas Relotius (prix CNN Journalist of the Year) avait inventé les personnages et scènes de 14 reportages vérifiés. Juan Moreno, collègue du Spiegel, le dénonce après des incohérences dans un reportage commun. Relotius avoue, est renvoyé. La crise ébranle la confiance dans le journalisme."},
{theme:"popculture",focus:"allemagne",diff:"facile",type:"q",q:"Quel festival de cinéma berlinois, la Berlinale (depuis 1951), est l'un des trois plus grands festivals internationaux de cinéma avec Cannes et Venise, et quel ours est son trophée emblématique ?",a:"La Berlinale décerne l'Ours d'Or (Goldener Bär) au meilleur film et des Ours d'Argent dans différentes catégories — c'est le festival avec le plus grand public payant au monde (300 000 billets vendus)",detail:"La Berlinale est fondée en 1951 sous la direction d'Alfred Bauer, avec le soutien américain (vitrine de la démocratie occidentale face à Berlin-Est). L'ours est l'emblème de Berlin (armoiries). La Berlinale est connue pour ses choix politiques (films sur les droits de l'homme, la migration, les conflits) et pour son ambiance plus accessible que Cannes. En 2024, des tensions émergent autour de la guerre à Gaza et de la liberté d'expression des cinéastes."},
{theme:"sport",focus:"allemagne",diff:"facile",type:"q",q:"Quelle équipe nationale de football allemande a remporté 4 Coupes du Monde (1954, 1974, 1990, 2014), et quelle 'Miracle de Berne' en 1954 contre la Hongrie favorite est surnommé le vrai acte fondateur de la RFA ?",a:"La victoire surprise de l'Allemagne de l'Ouest sur la Hongrie (3-2) en finale de la Coupe du Monde 1954 en Suisse est surnommée 'Miracle de Berne' — elle redonne sa fierté à une nation humiliée par la guerre",detail:"La Hongrie était imbattable depuis 4 ans ('Onze d'or' de Puskás, Kocsis, Czibor). Elle avait écrasé l'Allemagne 8-3 en phase de groupe. En finale, la RFA remonte de 0-2 à 3-2 grâce à Helmut Rahn. L'Allemagne entière écoute à la radio. Le commentateur Herbert Zimmermann s'égosille : 'Aus! Aus! Aus! Das Spiel ist aus! Deutschland ist Weltmeister!' Ce moment est considéré comme la vraie naissance de l'identité de la RFA."},
{theme:"sport",focus:"allemagne",diff:"moyen",type:"q",q:"Quel club de football allemand le Bayern Munich (FC Bayern München), fondé en 1900, est-il le plus titré d'Allemagne et quelle «Mia san mia» («Nous sommes ce que nous sommes» en bavarois) est sa devise tribale ?",a:"Le Bayern Munich est le club le plus riche et le plus titré d'Allemagne — 33 titres de Bundesliga, 6 Ligues des Champions. Son modèle économique (51 % des parts aux membres, '50+1 règle') lui permet d'être dominé par ses supporters",detail:"«Mia san mia» exprime la confiance absolue et l'arrogance assumée du Bayern. Le club est fondé en 1900 par des juifs (dont Kurt Landauer, rescapé de Dachau, qui reprend la présidence en 1946). La règle allemande 50+1 (les membres doivent détenir +50 % des parts) protège contre le rachat par des investisseurs étrangers. Le Bayern a des investisseurs minoritaires (Audi 8,3 %, Adidas 8,3 %, Allianz 8,3 %) mais reste contrôlé par ses 300 000 membres."},
{theme:"sport",focus:"allemagne",diff:"facile",type:"q",q:"Quel sportif allemand Michael Schumacher remporte 7 titres mondiaux de Formule 1 (1994, 1995, 2000-2004) et reste le codétenteur du record jusqu'à Lewis Hamilton (7 titres également) ?",a:"Schumacher gagne 7 titres (Ferrari 2000-2004, 5 consécutifs) et 91 victoires en Grand Prix — son record de victoires est battu par Hamilton en 2020. Il est victime d'un grave accident de ski en 2013",detail:"Schumacher (né à Kerpen, 1969) commence en karting, arrive en F1 en 1991 (Jordan). Il remporte ses 2 premiers titres avec Benetton (1994-95) puis 5 consécutifs avec Ferrari (2000-2004). Ses méthodes de course sont parfois controversées (collision intentionnelle avec Damon Hill en 1994, blocage de Barrichello en 2010). Son accident de ski à Méribel (2013) le laisse dans un état de santé inconnu — sa famille protège jalousement sa vie privée."},
{theme:"sport",focus:"allemagne",diff:"moyen",type:"q",q:"Quel sportif allemand Boris Becker remporte Wimbledon à 17 ans en 1985, devenant le plus jeune champion de l'histoire du tournoi — et quelle chute spectaculaire marque la fin de sa vie publique ?",a:"Boris Becker remporte Wimbledon à 17 ans et 7 mois (1985), 3 fois en tout — condamné en 2022 à 2,5 ans de prison au Royaume-Uni pour dissimulation d'actifs lors de sa faillite",detail:"Becker (né à Leimen, 1967) gagne Wimbledon 1985 comme «outsider» non-tête de série. Devenu icône mondiale, il gagne aussi l'US Open (1989) et l'Australian Open (1991, 1996). Après sa retraite (1999), ses affaires financières tournent mal. En 2017, il est déclaré en faillite au Royaume-Uni. En 2022, condamné pour avoir caché des actifs (médailles, propriétés), il purge 8 mois en prison. Libéré en décembre 2022, il est expulsé vers l'Allemagne."}
];

// NAVIGATION
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) {
    s.classList.toggle('hidden', s.id !== id);
  });
}
function goToConfig() {
  document.getElementById('gameArea').style.display = 'block';
  document.getElementById('doneScreen').style.display = 'none';
  showScreen('screenConfig');
  updateCardCount();
}
function startGame() {
  showScreen('screenGame');
  doRestart();
}

// CONFIG
function toggleTheme(t) {
  var count = ALL_THEMES.filter(function(x) { return activeThemes[x]; }).length;
  if (activeThemes[t] && count === 1) return;
  activeThemes[t] = !activeThemes[t];
  document.querySelector('[data-theme="' + t + '"]').classList.toggle('active', activeThemes[t]);
  updateCardCount();
}
function selectAll() {
  ALL_THEMES.forEach(function(t) {
    activeThemes[t] = true;
    document.querySelector('[data-theme="' + t + '"]').classList.add('active');
  });
  updateCardCount();
}
function selectNone() {
  var first = ALL_THEMES[0];
  ALL_THEMES.forEach(function(t) {
    activeThemes[t] = (t === first);
    document.querySelector('[data-theme="' + t + '"]').classList.toggle('active', t === first);
  });
  updateCardCount();
}
function toggleFocusDe() {
  focusDeActive = !focusDeActive;
  document.getElementById('btnFocusDe').classList.toggle('active', focusDeActive);
  updateCardCount();
}
function setDiff(d) {
  activeDiff = d;
  document.querySelectorAll('.diff-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.diff === d);
  });
  updateCardCount();
}
function updateCardCount() {
  var n = CARDS.filter(function(c) {
    if (focusDeActive) {
      return c.focus === 'allemagne' && (activeDiff === 'all' || c.diff === activeDiff);
    }
    return activeThemes[c.theme] && !c.focus && (activeDiff === 'all' || c.diff === activeDiff);
  }).length;
  document.getElementById('cardCount').textContent = n + ' carte' + (n > 1 ? 's' : '');
  document.getElementById('btnStart').disabled = (n === 0);
}

// GAME
function buildCards() {
  return shuffle(CARDS.filter(function(c) {
    if (focusDeActive) {
      return c.focus === 'allemagne' && (activeDiff === 'all' || c.diff === activeDiff);
    }
    return activeThemes[c.theme] && !c.focus && (activeDiff === 'all' || c.diff === activeDiff);
  }));
}
function shuffle(a) {
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function pickNext() {
  var due = reviewQueue.filter(function(r) { return r.showAtTurn <= turn; });
  if (due.length) {
    var p = due[Math.floor(Math.random() * due.length)];
    reviewQueue = reviewQueue.filter(function(r) { return r !== p; });
    return p.card;
  }
  if (available.length) {
    var idx = Math.floor(Math.random() * available.length);
    var c = available[idx];
    available.splice(idx, 1);
    return c;
  }
  if (reviewQueue.length) {
    reviewQueue.sort(function(a, b) { return a.showAtTurn - b.showAtTurn; });
    var p2 = reviewQueue.shift();
    return p2.card;
  }
  return null;
}
function showCard() {
  current = pickNext();
  if (!current) {
    document.getElementById('gameArea').style.display = 'none';
    document.getElementById('doneScreen').style.display = 'block';
    return;
  }
  revealed = false;
  var col = THEME_COLORS[current.theme];
  document.getElementById('cardAccentBar').style.background = 'linear-gradient(90deg,' + col[0] + ',' + col[1] + ')';
  document.getElementById('qText').textContent = current.q;
  document.getElementById('answerArea').classList.remove('visible');
  document.getElementById('answerText').textContent = '';
  document.getElementById('answerDetail').textContent = '';
  document.getElementById('revealBtn').disabled = false;
  document.getElementById('revealButtons').classList.remove('hidden');
  document.getElementById('actionButtons').classList.add('hidden');
  updateStats();
  updateProgress();
}
function doReveal() {
  if (!current || revealed) return;
  revealed = true; turn++;
  document.getElementById('answerText').textContent = current.a;
  document.getElementById('answerDetail').textContent = current.detail || '';
  document.getElementById('answerArea').classList.add('visible');
  document.getElementById('revealButtons').classList.add('hidden');
  document.getElementById('actionButtons').classList.remove('hidden');
}
function doKnown()    { if (!current) return; known.push(current); showCard(); }
function doReview(n)  { if (!current) return; reviewQueue.push({card:current, showAtTurn:turn+n}); showCard(); }
function updateStats() {
  document.getElementById('stats').innerHTML =
    '\u2713\u00A0Connues\u00A0:<strong>' + known.length + '</strong> \u00B7 ' +
    '\u21BA\u00A0\u00C0 revoir\u00A0:<strong>' + reviewQueue.length + '</strong> \u00B7 ' +
    'Restantes\u00A0:<strong>' + available.length + '</strong> \u00B7 ' +
    'Tour\u00A0:<strong>' + turn + '</strong>';
}
function updateProgress() {
  var t = allCards.length;
  document.getElementById('progressFill').style.width = (t > 0 ? (known.length / t * 100) : 0) + '%';
}
function doRestart() {
  allCards = buildCards();
  available = allCards.slice();
  reviewQueue = []; known = []; turn = 0;
  document.getElementById('gameArea').style.display = 'block';
  document.getElementById('doneScreen').style.display = 'none';
  showCard();
}

// TAP HANDLERS
function tapHandler(id, fn) {
  var el = document.getElementById(id);
  if (!el) return;
  var touched = false;
  el.addEventListener('touchstart', function(e) { e.preventDefault(); e.stopPropagation(); touched = true; fn(); }, {passive:false});
  el.addEventListener('touchend',   function(e) { e.preventDefault(); e.stopPropagation(); }, {passive:false});
  el.addEventListener('touchmove',  function(e) { e.preventDefault(); }, {passive:false});
  el.addEventListener('click',      function(e) { e.preventDefault(); e.stopPropagation(); if (!touched) fn(); touched = false; });
}
tapHandler('revealBtn',  doReveal);
tapHandler('knownBtn',   doKnown);
tapHandler('reviewBtn3',  function() { doReview(3);  });
tapHandler('reviewBtn5',  function() { doReview(5);  });
tapHandler('reviewBtn20', function() { doReview(20); });
tapHandler('restartBtn',  doRestart);
document.addEventListener('touchmove', function(e) { e.preventDefault(); }, {passive:false});

// INIT
updateCardCount();
showScreen('screenConfig');
</script>
