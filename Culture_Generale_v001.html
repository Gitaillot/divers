{theme:"politique",diff:"moyen",type:"q",q:"Quel attentat du 11 septembre 2001 a tué le plus de victimes, et combien en a-t-il fait ?",a:"Recours à la violence contre des civils pour créer la terreur et atteindre des objectifs politiques — définition contestée ('terroriste pour l'un, résistant pour l'autre')",detail:"Il n'existe pas de définition universelle du terrorisme en droit international. Les attentats du 11 septembre 2001 marquent un tournant : le Conseil de sécurité adopte la résolution 1373 imposant des mesures antiterroristes à tous les États. Al-Qaïda, puis Daech, incarnent le terrorisme djihadiste international. Les États-Unis luttent contre le terrorisme intérieur (Oklahoma City, 1995 ; assaut du Capitole, 2021)."},
{theme:"politique",diff:"moyen",type:"q",q:"Combien d'années Nelson Mandela a-t-il passé en prison avant d'être libéré en 1990 ?",a:"Système légal de ségrégation raciale (1948-1991) — Nelson Mandela, libéré en 1990 après 27 ans de prison, négocie la transition et devient président en 1994",detail:"L'apartheid (mot afrikaans : séparation) est instauré par le Parti national en 1948. Il classe la population en Blancs, Coloureds, Indiens et Noirs — chaque groupe avec des droits différents. Le ANC (Congrès national africain) de Mandela mène la résistance. Les sanctions internationales et la pression interne poussent De Klerk à négocier. Les premières élections multiraciales ont lieu le 27 avril 1994 (jour férié national : Freedom Day)."},
{theme:"politique",diff:"moyen",type:"q",q:"Quel dirigeant religieux prend le pouvoir en Iran après la révolution de 1979 et instaure la République islamique ?",a:"Renversement du Shah Mohammad Reza Pahlavi par une révolution islamique sous la direction de l'ayatollah Khomeini — instauration d'une République islamique",detail:"Le Shah modernise l'Iran mais réprime les opposants via la SAVAK. La révolution de 1979 rassemble islamistes, nationalistes et communistes contre lui. Khomeini instaure un régime théocratique (velâyat-e faqih : gouvernement du jurisconsulte). La prise d'otages à l'ambassade américaine (1979-1981) rompt les relations irano-américaines. La guerre Iran-Irak (1980-1988), l'hostilité avec Israël et le programme nucléaire structurent depuis la politique régionale."},
{theme:"politique",diff:"moyen",type:"q",q:"En quelle année l'Union africaine est-elle fondée, et en remplacement de quelle organisation ?",a:"Organisation continentale (55 États, fondée en 2002 en remplacement de l'OUA) — paix, intégration économique, démocratie, développement durable",detail:"L'Union africaine (UA, siège à Addis-Abeba) s'inspire de l'UE. Elle gère des missions de paix (Somalie, Mali), lutte contre les coups d'État (suspension des membres en cas de putsch) et promeut la Zone de libre-échange continentale africaine (ZLECAF, 2021). Ses faiblesses : manque de ressources propres, dépendance aux contributions extérieures, divisions entre États. L'agenda 2063 vise l'intégration complète."},
{theme:"politique",diff:"difficile",type:"q",q:"Qui est Hans Morgenthau et quel ouvrage de 1948 fonde-t-il le réalisme politique en relations internationales ?",a:"Réalisme (Thucydide, Machiavel, Morgenthau, Waltz) : les États cherchent la puissance dans un système anarchique — Libéralisme (Kant, Wilson, Keohane) : coopération possible via institutions et interdépendance",detail:"Le réalisme voit les États comme acteurs rationnels maximisant leur puissance dans un monde sans autorité supérieure. L'équilibre des puissances prévient les guerres hégémoniques. Le libéralisme internationaliste (Wilson, 14 Points, SDN puis ONU) mise sur les institutions, le commerce et la démocratie pour créer la paix. Le constructivisme (Wendt) argue que les identités et normes façonnent le comportement des États."},
{theme:"politique",diff:"difficile",type:"q",q:"Dans quel pays le Printemps arabe commence-t-il fin 2010, et quel événement déclencheur — l'immolation d'un vendeur de rue — l'embrase ?",a:"Vague de soulèvements populaires dans le monde arabe — la Tunisie démocratise, l'Égypte revient à l'autoritarisme, la Libye et la Syrie plongent dans la guerre civile, le Maroc réforme marginalement",detail:"Mohamed Bouazizi, vendeur de fruits tunisien, s'immole le 17 décembre 2010 après une humiliation policière — déclenchant la révolution de jasmin. Ben Ali fuit en janvier 2011. En Égypte, Moubarak tombe mais l'armée reprend le pouvoir (Sissi, 2013). En Syrie, Assad réprime dans le sang : 500 000 morts, 12 millions de déplacés. La Tunisie, seul succès, régresse sous Saïed (2019-). Les facteurs : armée, cohésion identitaire, ressources pétrolières, ingérence étrangère."},
{theme:"politique",diff:"difficile",type:"q",q:"Quelle institution fondée en 1919 est le premier exemple de diplomatie multilatérale permanente, précédant l'ONU ?",a:"Régulation des affaires mondiales par des négociations entre États dans des forums communs (ONU, OMC, G20, COP) — en crise face au retour des rivalités de puissances et du multilatéralisme à la carte",detail:"Le multilatéralisme s'épanouit dans les années 1990 (fin de la guerre froide) : OMC (1995), CPI (2002), accords de Kyoto, Cour internationale de Justice. Depuis les années 2010, la montée des puissances révisionnistes (Russie, Chine), le retour du nationalisme (Brexit, Trump) et la paralysie du Conseil de sécurité fragilisent ce système. Les mini-latéralisme (accords entre petits groupes d'États, QUAD, AUKUS) se développent en alternative."},
{theme:"politique",diff:"difficile",type:"q",q:"Quel traité de 1648 fonde le principe de souveraineté des États et met fin à la guerre de Trente Ans ?",a:"La souveraineté (Bodin, 1576) : pouvoir suprême de l'État sur son territoire — les traités de Westphalie (1648) fondent le système interétatique moderne, mais la mondialisation et les droits humains la limitent",detail:"Jean Bodin définit la souveraineté comme pouvoir absolu et perpétuel. Les traités de Westphalie (1648, fin de la guerre de Trente Ans) posent le principe de non-ingérence dans les affaires intérieures. La création de l'ONU (1945) et le développement des droits humains créent une tension : la 'responsabilité de protéger' (R2P, 2005) autorise l'intervention si un État massacre sa population. La Chine et la Russie défendent une souveraineté absolue."},
{theme:"politique",diff:"difficile",type:"q",q:"Dans quel article de 1997 Fareed Zakaria théorise-t-il la 'démocratie illibérale', distinguant élections et libertés constitutionnelles ?",a:"Régime élu démocratiquement mais qui viole les libertés constitutionnelles, affaiblit les contre-pouvoirs et concentre le pouvoir — Hongrie d'Orbán, Turquie d'Erdogan, Russie de Poutine",detail:"Zakaria (Foreign Affairs, 1997) observe que des élections libres peuvent mener à des gouvernements qui érodent les libertés individuelles, l'État de droit et les institutions de contrôle. Orbán (Hongrie depuis 2010) réduit l'indépendance des juges, contrôle les médias et modifie la Constitution. Il se définit comme défenseur d'une 'démocratie chrétienne'. Ce modèle inspire des partis en Europe occidentale."},
{theme:"politique",diff:"difficile",type:"q",q:"Dans quel article puis quel livre Fukuyama annonce-t-il en 1989 la 'fin de l'histoire' avec le triomphe de la démocratie libérale ?",a:"Fukuyama prédit que la chute du communisme marque le triomphe définitif de la démocratie libérale — thèse réfutée par le retour des autocraties, du nationalisme et de l'islamisme radical",detail:"Dans son article (The National Interest, 1989) puis livre (1992), Fukuyama soutient que la démocratie libérale représente l'aboutissement de l'évolution politique humaine (inspiré par Hegel). Samuel Huntington lui répond avec le 'Choc des civilisations' (1993) : l'histoire continue sous forme de conflits culturels. Les années 2010-2020 (montée de la Chine, retour de la Russie impériale, Trump) semblent lui donner tort. Fukuyama lui-même a nuancé sa thèse."},
{theme:"politique",diff:"difficile",type:"q",q:"En quelle année l'ONU adopte-t-elle le principe de 'responsabilité de protéger' (R2P), et lors de quel conflit africain l'invoque-t-on en 2011 ?",a:"Principe (ONU, 2005) selon lequel la communauté internationale peut intervenir dans un État qui massacse sa population — appliqué en Libye (2011), invoqué sans succès en Syrie",detail:"Bernard Kouchner théorise le 'devoir d'ingérence' dans les années 1990 face aux massacres en ex-Yougoslavie et Rwanda. L'ONU adopte la R2P en 2005 : si un État ne protège pas sa population, la communauté internationale peut intervenir (avec l'accord du Conseil de sécurité). L'intervention en Libye (2011, résolution 1973) est invoquée mais dépasse le mandat initial, rendant la Russie et la Chine réticentes pour la Syrie."},
{theme:"politique",diff:"difficile",type:"q",q:"Quel réseau d'instituts culturels la Chine déploie-t-elle dans le monde pour exercer son soft power, suscitant des controverses sur l'ingérence ?",a:"La Chine développe son influence via les routes de la soie (BRI), les Instituts Confucius, les prêts infrastructurels en Afrique et en Asie — une stratégie de soft power contestée en Occident",detail:"La Belt and Road Initiative (BRI, 2013) de Xi Jinping connecte l'Asie, l'Afrique et l'Europe par des infrastructures financées par la Chine. Critiques : 'diplomatie du piège de la dette' (Hambantota, Sri Lanka). Les Instituts Confucius (550 dans le monde) diffusent la culture et la langue chinoises mais sont accusés d'espionnage et de censure. La Chine développe aussi son influence via les réseaux sociaux (TikTok/ByteDance)."},
{theme:"politique",diff:"difficile",type:"q",q:"Quel effet le scrutin majoritaire à un tour produit-il sur le nombre de partis, selon la loi de Duverger ?",a:"Proportionnel : les sièges sont distribués proportionnellement aux voix (Allemagne, Pays-Bas) — Uninominal majoritaire à un tour (FPTP) : le candidat ayant le plus de voix gagne (États-Unis, Royaume-Uni)",detail:"Le scrutin proportionnel favorise le multipartisme et la représentation des minorités mais peut mener à l'instabilité (coalitions, Italie). Le scrutin majoritaire à un tour (FPTP) crée des bipartismes stables (États-Unis, Royaume-Uni) mais sur-représente les vainqueurs. La France utilise un scrutin majoritaire à deux tours qui favorise les partis établis. Le débat sur la réforme électorale est récurrent dans les démocraties."},
{theme:"politique",diff:"moyen",type:"q",q:"Quel pourcentage du vote britannique approuve le Brexit lors du référendum du 23 juin 2016, et quel Premier ministre en avait convoqué la consultation ?",a:"Sortie du Royaume-Uni de l'Union européenne — référendum du 23 juin 2016 (51,9 % pour le Leave), effective le 31 janvier 2020",detail:"David Cameron organise le référendum pour calmer l'euroscepticisme conservateur et perd. Theresa May négocie un accord de retrait rejeté 3 fois par le Parlement. Boris Johnson obtient finalement un accord. La période de transition prend fin le 31 décembre 2020. Le Brexit entraîne une frontière de fait en mer d'Irlande, fragilise l'intégrité territoriale britannique (poussée indépendantiste écossaise) et réduit les échanges économiques britanniques avec l'Europe."},
{theme:"politique",diff:"moyen",type:"q",q:"En quelle année et dans quel contexte de crise le G20 est-il créé, remplaçant progressivement le G7 comme forum économique mondial ?",a:"G7 (7 démocraties industrialisées) : forum de coordination depuis 1975 — G20 (19 pays + UE représentant 85 % du PIB mondial) : plus large, fondé en 1999 après les crises asiatiques",detail:"Le G7 (États-Unis, Japon, Allemagne, France, Royaume-Uni, Italie, Canada) discute de politique macroéconomique, de sécurité et de changement climatique. La Russie en a été exclue en 2014 (annexion de la Crimée). Le G20 inclut les grandes économies émergentes (Chine, Inde, Brésil, Afrique du Sud) et a pris une importance croissante depuis la crise financière de 2008. Ces forums n'ont pas de pouvoir contraignant."},
{theme:"politique",diff:"moyen",type:"q",q:"En quelle année l'État d'Israël est-il proclamé, et quel conflit immédiat éclate le lendemain avec ses voisins arabes ?",a:"Conflit territorial et identitaire entre Israël (fondé en 1948) et les Palestiniens pour le contrôle d'un même territoire — enraciné dans le sionisme, la décolonisation et les guerres arabes",detail:"Le sionisme (Herzl, 1896) vise la création d'un foyer national juif en Palestine alors ottomane. La déclaration Balfour (1917) promet ce foyer. La Shoah accélère l'immigration juive. L'ONU vote le plan de partage en 1947 (accepté par les Juifs, rejeté par les Arabes). La guerre de 1948 crée l'État d'Israël et les réfugiés palestiniens (Nakba). Les accords d'Oslo (1993) n'ont pas abouti à un État palestinien."},
{theme:"politique",diff:"moyen",type:"q",q:"Quelle doctrine présidentielle américaine de 1823 affirme que les Amériques ne sont plus ouvertes à la colonisation européenne ?",a:"Le président dirige la politique étrangère (commandant en chef, traités) mais le Sénat ratifie les traités (2/3) et le Congrès vote les déclarations de guerre et les budgets",detail:"La Constitution américaine crée une tension entre président et Congrès en politique étrangère. La War Powers Resolution (1973) limite à 60 jours l'engagement militaire sans accord du Congrès. Le Sénat a rejeté le Traité de Versailles (1919), bloquant l'entrée des États-Unis dans la SDN. Les accords exécutifs (executive agreements) permettent au président de contourner la ratification sénatoriale pour certains engagements."},
{theme:"politique",diff:"moyen",type:"q",q:"Dans quelle ville néerlandaise siège la CPI, et quel grand pays n'a pas ratifié le statut de Rome la fondant ?",a:"Tribunal permanent (La Haye, 2002) jugeant les individus pour génocide, crimes contre l'humanité et crimes de guerre — limité par le refus des États-Unis, de la Russie et de la Chine de le rejoindre",detail:"La CPI est fondée par le Statut de Rome (1998). Elle ne peut juger que des citoyens d'États membres ou des affaires renvoyées par le Conseil de sécurité. Les États-Unis (Bush, puis Trump) ont retiré leur signature. La Russie en a fait de même. La CPI a émis des mandats contre Poutine (2023, enlèvement d'enfants ukrainiens) et des dirigeants africains — alimentant les critiques d'un 'tribunal des faibles'."},
{theme:"politique",diff:"moyen",type:"q",q:"Selon la classification de Sartori, quel type de système de partis caractérise une démocratie avec deux grands partis alternant au pouvoir ?",a:"Organisations structurant la compétition politique — bipartisme (États-Unis, Royaume-Uni), multipartisme avec coalition (Allemagne, Pays-Bas, Italie), parti dominant (Japon-LDP, Mexique-PRI)",detail:"Les partis aggrègent les intérêts sociaux, recrutent et forment les élites politiques, organisent le gouvernement. Le bipartisme américain (Démocrates vs Républicains) est renforcé par le scrutin majoritaire. L'Allemagne avec son système proportionnel à seuil (5 %) crée un multipartisme modéré (3-6 partis). L'érosion des partis de masse traditionnels (travaillistes, sociaux-démocrates, démocrates-chrétiens) est un phénomène majeur depuis les années 1990."},
{theme:"politique",diff:"moyen",type:"q",q:"Quel parti d'extrême droite arrive en tête des élections législatives en Italie en 2022, permettant à Giorgia Meloni de devenir Première ministre ?",a:"Partis nationalistes, anti-immigration, eurosceptiques qui progressent dans toute l'Europe — Rassemblement National (France), AfD (Allemagne), Fidesz (Hongrie), FdI (Italie, au gouvernement depuis 2022)",detail:"La montée de l'extrême droite s'explique par la crise économique de 2008, la crise migratoire de 2015, la défiance envers les élites et la mondialisation. Giorgia Meloni devient Première ministre italienne en 2022. Le RN arrive en tête des élections européennes en France en 2024. Viktor Orbán (Hongrie) gouverne depuis 2010 avec une politique illibérale controversée. Ces partis oscillent entre fascisme nostalgique et nationalisme conservateur respectable."},
{theme:"politique",diff:"facile",type:"q",q:"Quel est le rôle de la Banque mondiale et du FMI dans l'économie mondiale ?",a:"Banque mondiale : prêts pour le développement des pays pauvres — FMI (Fonds monétaire international) : stabilité financière internationale, aide aux pays en crise de balance des paiements",detail:"Les deux institutions de Bretton Woods sont créées en 1944 (Conférence de Bretton Woods) à l'initiative de Keynes et White. Le FMI octroie des prêts d'urgence en échange de politiques d'ajustement structurel (coupes budgétaires, privatisations) critiquées pour leur coût social. La Banque mondiale finance routes, hôpitaux, écoles dans les pays en développement. Les BRICS développent leurs propres banques alternatives (Nouvelle banque de développement)."},
{theme:"politique",diff:"facile",type:"q",q:"Quelle loi française de 1982 opère la première grande décentralisation, transférant des compétences aux régions et départements ?",a:"Transfert de compétences de l'État central vers les collectivités locales (régions, départements, communes) — favorise l'adaptation aux réalités locales mais peut creuser les inégalités territoriales",detail:"La France est l'un des pays les plus centralisés d'Europe, héritage jacobin de la Révolution. Les lois de décentralisation de 1982 (Defferre) transfèrent des compétences aux régions et départements. L'Espagne a opté pour un quasi-fédéralisme (communautés autonomes) qui nourrit le séparatisme catalan. L'Allemagne fédérale délègue l'éducation et la police aux Länder. La pandémie de Covid a mis en évidence la tension entre centralisation et réactivité locale."},
{theme:"politique",diff:"facile",type:"q",q:"Quelle loi de 1905 sépare les Églises de l'État en France, et quel président du Conseil la fait adopter malgré l'opposition du Vatican ?",a:"Principe séparant les institutions religieuses du gouvernement — en France, la loi de 1905 établit la séparation stricte de l'Église et de l'État",detail:"La laïcité française (loi de 1905) : l'État ne reconnaît, ne salarie ni ne subventionne aucun culte. Les agents publics ne peuvent porter de signes religieux ostensibles dans l'exercice de leurs fonctions (loi 2004). La laïcité est un principe constitutionnel. Son interprétation fait l'objet de débats constants : voile islamique à l'école, financement des aumôneries militaires, statut particulier de l'Alsace-Moselle (concordat de 1801 encore en vigueur)."},
{theme:"politique",diff:"moyen",type:"q",q:"En quelle année et dans quelle ville les Accords de Paris fixant l'objectif de limiter le réchauffement à 1,5°C sont-ils signés ?",a:"Protocole de Kyoto (1997), Accords de Paris (2015) — cadres contraignants (Kyoto) ou volontaires (Paris) pour réduire les émissions de gaz à effet de serre",detail:"La CCNUCC (Convention-cadre des Nations Unies sur les changements climatiques, 1992) est le cadre de base. Le Protocole de Kyoto impose des objectifs contraignants aux pays riches (les États-Unis ne l'ont jamais ratifié). Les Accords de Paris (COP21) fixent l'objectif de +1,5°C avec des contributions nationales volontaires (NDC). Les COPs annuelles (COP26 Glasgow, COP27 Charm el-Cheikh, COP28 Dubaï) peinent à maintenir l'ambition nécessaire."},
{theme:"politique",diff:"moyen",type:"q",q:"Quel réseau social est au centre des controverses sur la désinformation lors de l'élection présidentielle américaine de 2016 ?",a:"Diffusion délibérée d'informations fausses pour influencer l'opinion — amplifiée par les réseaux sociaux, utilisée par des acteurs étatiques (Russie, Chine) et partisans",detail:"Le terme 'fake news' est popularisé par Trump pour discréditer les médias hostiles, mais la désinformation systématique vient aussi de Russie (Internet Research Agency : campagnes sur Facebook en 2016) et d'autres acteurs. Les deepfakes (vidéos truquées par IA) aggravent le problème. L'UE impose aux grandes plateformes (DSA, 2022) de lutter contre la désinformation. Le paradoxe : réguler la parole peut menacer la liberté d'expression."},
{theme:"politique",diff:"difficile",type:"q",q:"Quel historien américain parle de 'moment unipolaire' pour décrire la domination américaine après la chute de l'URSS en 1991 ?",a:"1945-1989 : bipolarité États-Unis/URSS — 1989-2010 : moment unipolaire américain — depuis 2010 : multipolarité émergente (Chine, Russie, Inde, UE)",detail:"La bipolarité de la guerre froide structure les alliances et conflits. L'effondrement soviétique laisse les États-Unis en hyperp uissance. Charles Krauthammer parle du 'moment unipolaire' (1990). La montée de la Chine (2e économie mondiale en 2010), le révisionnisme russe et la montée des puissances régionales créent un système multipolaire instable. Certains théoriciens (Waltz) prédisent qu'une multipolarité tend vers l'instabilité."},
{theme:"politique",diff:"difficile",type:"q",q:"Quel journaliste et militant tchadien invente le terme 'Françafrique' dans les années 1990 pour décrire les réseaux d'influence occulte de la France en Afrique ?",a:"Maintien d'une dépendance économique et politique des anciens pays colonisés via des mécanismes informels — la Françafrique désigne le réseau d'influence française en Afrique subsaharienne",detail:"Le terme 'Françafrique' (Jean-Pierre Cot puis François-Xavier Verschave) décrit le système de relations entre la France et ses anciennes colonies africaines : appui à des régimes autoritaires en échange de ressources et de marchés, réseaux politico-affairistes, présence militaire permanente (opérations Licorne, Serval, Barkhane). Depuis 2022-2023, plusieurs coups d'État au Sahel (Mali, Burkina Faso, Niger) expulsent les troupes françaises — marquant un tournant."},
{theme:"politique",diff:"difficile",type:"q",q:"Dans quel article de 1992 Alexander Wendt formule-t-il la thèse constructiviste que 'l'anarchie est ce que les États en font' ?",a:"Alexander Wendt (1992) — les structures du système international ne sont pas données mais construites par les identités, normes et interactions des États : 'l'anarchie est ce que les États en font'",detail:"Le constructivisme s'oppose au réalisme (structures matérielles) et au libéralisme (institutions). Pour Wendt, les États ne maximisent pas simplement leur puissance mais agissent selon des identités et normes socialement construites. La distinction 'ennemi/rival/ami' n'est pas donnée mais construite (États-Unis-Canada vs États-Unis-Cuba). Ce courant analyse comment les normes évoluent (droits humains, normes antinucléaires, responsabilité de protéger)."},
{theme:"politique",diff:"difficile",type:"q",q:"Quel philosophe canadien publie en 1995 Multicultural Citizenship, défendant les droits des minorités nationales et des groupes ethniques ?",a:"Tension entre majorité démocratique et protection des droits des groupes minoritaires — résolue par les chartes des droits, la représentation proportionnelle, l'autonomie territoriale",detail:"La démocratie majoritaire peut opprimer les minorités ('tyrannie de la majorité', Tocqueville). Les solutions : droits constitutionnels protégés contre la majorité (Cour constitutionnelle), représentation positive (quotas), autonomie territoriale (Tyrol du Sud, Åland, Kosovo). En France, la tradition républicaine universaliste refuse les droits communautaires. Aux États-Unis, l'affirmative action (discriminations positives) est débattue (arrêt SFFA v. Harvard, 2023 : la Cour suprême la limite)."},
{theme:"politique",diff:"moyen",type:"q",q:"Dans quelle ville indonésienne et en quelle année se tient la conférence fondatrice du mouvement des non-alignés, réunissant 29 pays afro-asiatiques ?",a:"Mouvement des pays refusant de choisir entre les blocs américain et soviétique — conférence de Bandung (1955) : 29 pays d'Asie et d'Afrique réunis par Nehru, Nasser et Sukarno",detail:"La conférence de Bandung (Indonésie, 1955) réunit les premiers États décolonisés et affirme leur droit à la non-ingérence et à un 'troisième chemin' entre capitalisme et communisme. Le Mouvement des non-alignés (MNA, 1961) compte aujourd'hui 120 membres. Il perd de son influence après la guerre froide mais reste un forum important. L'Inde de Nehru en est le champion historique."},
{theme:"politique",diff:"moyen",type:"q",q:"Quelle crise migratoire de 2015 en Europe, liée au conflit syrien, divise profondément les États membres de l'UE sur la répartition des réfugiés ?",a:"Politiques régulant l'entrée, le séjour et les droits des étrangers — clivage croissant entre approches humanistes (droit d'asile, accueil) et restrictives (contrôle des frontières, expulsions)",detail:"La Convention de Genève (1951) sur les réfugiés oblige les États signataires à accorder l'asile aux persécutés. La crise de 2015 (1 million de demandeurs d'asile en Europe) polarise les opinions. Accord UE-Turquie (2016) pour limiter les flux. Le pacte migration-asile de l'UE (2024) renforce les contrôles aux frontières. L'Italie et la Hongrie défient le droit d'asile européen. Les migrations climatiques sont identifiées comme défi croissant."},
{theme:"politique",diff:"facile",type:"q",q:"Quelle est la différence entre un traité international et une loi nationale ?",a:"Un traité est un accord entre États, signé et ratifié selon les procédures de chaque pays — en France, les traités ratifiés ont une valeur supérieure à la loi mais inférieure à la Constitution",detail:"La Constitution française (art. 55) stipule que les traités ratifiés ont une autorité supérieure aux lois. Le Conseil d'État et la Cour de cassation appliquent ce principe depuis 1989. En Grande-Bretagne (tradition dualiste), les traités n'ont pas d'effet direct en droit interne sans loi d'incorporation. Aux États-Unis, les traités ratifiés par le Sénat (2/3) deviennent 'la loi du pays' (supremacy clause)."},
{theme:"politique",diff:"facile",type:"q",q:"Dans quelle ville siège la Cour européenne des droits de l'homme, institution distincte de l'UE relevant du Conseil de l'Europe ?",a:"Traité du Conseil de l'Europe (1950) garantissant les droits fondamentaux — appliqué par la Cour européenne des droits de l'homme (CEDH) à Strasbourg",detail:"La CEDH peut être saisie par tout individu s'estimant victime d'une violation par un État membre. Ses arrêts s'imposent aux États (qui peuvent être condamnés à verser des réparations et modifier leurs lois). La France a été condamnée de nombreuses fois (conditions de détention, droits des étrangers, liberté de la presse). Le Royaume-Uni quitte la juridiction de la CEDH dans le débat post-Brexit."},
{theme:"politique",diff:"moyen",type:"q",q:"En quel mois et année la Russie déclenche-t-elle son invasion à grande échelle de l'Ukraine, et quelle en est la réaction immédiate de l'OTAN ?",a:"Invasion russe à grande échelle le 24 février 2022 — recomposition de l'ordre européen, renforcement de l'OTAN, test de la solidarité occidentale",detail:"Putin invoque la 'dénazification' et la menace OTAN pour justifier l'invasion. Les sanctions occidentales sans précédent (gel des réserves de la Banque centrale russe) frappent l'économie russe. L'OTAN se renforce (Finlande et Suède rejoignent l'alliance). La Russie occupe ~20 % du territoire ukrainien fin 2024. Le conflit révèle la dépendance énergétique européenne au gaz russe (accélération de la transition) et redessine les alliances (Chine neutre mais proche de Moscou, Inde équidistante)."},
{theme:"politique",diff:"difficile",type:"q",q:"Quel congrès européen de 1815, après les guerres napoléoniennes, cherche à établir un équilibre des puissances durable sur le continent ?",a:"Principe selon lequel les États forment des coalitions pour empêcher qu'une seule puissance ne domine — fondement du système européen du XVIIe s. à 1914",detail:"L'équilibre des puissances est théorisé après les guerres napoléoniennes (Congrès de Vienne, 1815 — Metternich). L'Angleterre joue le rôle de 'balanceur' (balance wheel) : elle s'allie toujours avec les puissances en danger de domination. Ce système s'effondre en 1914. L'ONU et les institutions multilatérales tentent de le remplacer. Les réalistes (Waltz) voient le retour de la multipolarité comme le retour de l'équilibre des puissances classique."},
{theme:"politique",diff:"facile",type:"q",q:"Combien de députés composent l'Assemblée nationale française, et pour combien d'années sont-ils élus ?",a:"Le Parlement bicaméral vote les lois, ratifie les traités et contrôle le gouvernement — l'Assemblée nationale (577 membres) a le dernier mot sur le Sénat (348 membres)",detail:"L'Assemblée nationale est élue pour 5 ans au scrutin majoritaire à deux tours. Elle peut renverser le gouvernement (motion de censure). Le Sénat représente les collectivités territoriales et peut retarder mais non bloquer définitivement les lois. Le 49-3 (utilisé par Borne et Macron pour la réforme des retraites 2023) permet de passer une loi sans vote à l'Assemblée."},
{theme:"politique",diff:"moyen",type:"q",q:"Quel traité de 2007 donne valeur juridique contraignante à la Charte des droits fondamentaux de l'UE ?",a:"Texte (2000, valeur juridique contraignante depuis le traité de Lisbonne en 2009) garantissant droits civiques, politiques, économiques et sociaux dans l'UE",detail:"La Charte proclame 50 droits et libertés regroupés en 6 titres (dignité, liberté, égalité, solidarité, citoyenneté, justice). Elle s'applique aux institutions européennes et aux États membres quand ils appliquent le droit de l'UE. La Cour de justice de l'UE l'utilise pour invalider des législations nationales. Pologne et Hongrie ont tenté de se soustraire à certaines de ses dispositions (protocoles d'exemption)."},
{theme:"politique",diff:"moyen",type:"q",q:"Quel mécanisme de démocratie participative la Convention citoyenne sur le climat (France, 2019-2020) illustre-t-il ?",a:"Forme de démocratie associant les citoyens aux décisions entre les élections — référendum d'initiative citoyenne, conventions citoyennes, budgets participatifs, jurys citoyens",detail:"La Convention citoyenne pour le climat (France, 2019-2020 : 150 citoyens tirés au sort) illustre le modèle délibératif. Le budget participatif de Porto Alegre (Brésil, 1989) est le premier modèle municipal. La Suisse pratique une démocratie semi-directe avec référendums fréquents. Les 'gilets jaunes' ont poussé Macron à créer le Grand Débat national (2019). Ces outils complètent mais ne remplacent pas la démocratie représentative."},
{theme:"politique",diff:"difficile",type:"q",q:"Qui fonde l'École de Francfort dans les années 1920-30, lieu de naissance de la théorie critique en sciences sociales ?",a:"Courant inspiré de l'École de Francfort (Horkheimer, Adorno, Habermas) visant à analyser et transformer les structures de pouvoir — postcolonialisme, féminisme, théorie queer s'en réclament",detail:"L'École de Francfort (1930s) critique le capitalisme et l'autoritarisme via une synthèse de Marx et Freud. Habermas développe la théorie de l'agir communicationnel : la démocratie requiert une discussion rationnelle sans domination. Les théories critiques contemporaines (Fanon, Said, Spivak) déconstruisent les hiérarchies coloniales. Le concept d'intersectionnalité (Crenshaw, 1989) analyse les dominations croisées (race, genre, classe)."},
{theme:"politique",diff:"moyen",type:"q",q:"En quelle année l'Organisation mondiale du commerce (OMC) remplace-t-elle le GATT, et combien de membres regroupe-t-elle ?",a:"L'Organisation mondiale du commerce (OMC, 1995) réglemente les échanges entre 164 membres, règle les différends et négocie la libéralisation commerciale",detail:"L'OMC remplace le GATT (1947). Son mécanisme de règlement des différends (MRD) est son atout principal : il permet à des petits pays de contester les politiques commerciales des grandes puissances. Les États-Unis de Trump ont bloqué le renouvellement de l'Organe d'appel (2019-2020), affaiblissant l'institution. Les guerres commerciales sino-américaines (droits de douane depuis 2018) testent les limites du multilatéralisme commercial."},
{theme:"politique",diff:"moyen",type:"q",q:"Quel partenariat oriental l'UE lance-t-elle en 2009 pour rapprocher d'elle des pays comme l'Ukraine, la Géorgie et la Moldavie ?",a:"Politique de l'UE visant à stabiliser et démocratiser ses voisins via des accords d'association, de l'aide et des négociations d'adhésion — Ukraine, Moldavie, Balkans occidentaux sont candidats",detail:"La politique européenne de voisinage (PEV, 2004) offre aux voisins une relation privilégiée sans adhésion. Le Partenariat oriental (2009 : Arménie, Azerbaïdjan, Bélarus, Géorgie, Moldavie, Ukraine) vise les ex-républiques soviétiques. L'Ukraine et la Moldavie obtiennent le statut de candidat officiel en juin 2022 (après l'invasion russe). L'élargissement aux Balkans est bloqué par des conditions non remplies et la lassitude des membres."},
{theme:"politique",diff:"facile",type:"q",q:"Quelle convention internationale de 1961 codifie le droit diplomatique moderne, définissant l'inviolabilité des ambassades ?",a:"Art de gérer les relations entre États — bilatérale (deux pays), multilatérale (forums internationaux), de sommet (entre chefs d'État), publique (communication vers les opinions)",detail:"La diplomatie naît avec les cités-États italiennes de la Renaissance (ambassades permanentes au XVe s.). Le Congrès de Vienne (1815) codifie les règles diplomatiques. La Convention de Vienne (1961) protège les diplomates (immunité diplomatique). La diplomatie publique (public diplomacy) vise les opinions étrangères via les médias (RFI, BBC World Service, RT). La 'twiplomatie' utilise les réseaux sociaux pour la communication diplomatique."},
{theme:"politique",diff:"moyen",type:"q",q:"Quel traité européen, rejeté par référendum en France et aux Pays-Bas en 2005, tentait de doter l'UE d'une constitution ?",a:"Projet d'États-Unis d'Europe défendu par des pères fondateurs (Victor Hugo, Spinelli) — freiné par les souverainismes nationaux et l'hétérogénéité des États membres",detail:"Victor Hugo rêve en 1849 des 'États-Unis d'Europe'. Altiero Spinelli rédige le Manifeste de Ventotene (1941) pour une fédération européenne. Les traités successifs (Rome, Maastricht, Lisbonne) approfondissent l'intégration sans aller au fédéralisme. Le rejet de la Constitution européenne en 2005 (France : 55 % de Non, Pays-Bas : 62 % de Non) bloque le projet fédéraliste. Macron promeut une 'souveraineté européenne' sans fédéralisme formel."},
{theme:"politique",diff:"difficile",type:"q",q:"Quel événement de 2014 en Ukraine illustre pour la première fois à grande échelle la guerre hybride russe alliant soldats sans insignes et désinformation ?",a:"Combinaison d'opérations militaires conventionnelles, de guerre informatique, de désinformation, d'actions de mercenaires et d'influence économique — doctrine russe (Gerasimov, 2013)",detail:"La guerre hybride (terme popularisé après la guerre russo-géorgienne de 2008 et l'annexion de la Crimée 2014) brouille la frontière guerre-paix. La Russie utilise les 'petits hommes verts' (soldats sans insigne), les cyberattaques (NotPetya, 2017), les trolls (Internet Research Agency), les médias (RT, Sputnik) et Wagner (mercenaires en Afrique, Syrie). L'OTAN a adapté ses doctrines pour répondre à cette forme de conflit."},
{theme:"politique",diff:"facile",type:"q",q:"Quelle convention de Genève de 1951 définit le statut de réfugié et fonde le droit d'asile au niveau international ?",a:"Droit pour toute personne persécutée de demander protection dans un autre État — fondé sur la Convention de Genève de 1951 et le Protocole de New York de 1967",detail:"La Convention de 1951 définit le réfugié : personne craignant avec raison d'être persécutée en raison de sa race, religion, nationalité, groupe social ou opinion politique. Le HCR (Haut-Commissariat aux Réfugiés de l'ONU) protège plus de 100 millions de personnes déplacées en 2023. La distinction entre réfugié (protection internationale) et migrant économique (protection nationale) est au cœur des débats politiques."},
{theme:"politique",diff:"facile",type:"q",q:"Quel est le rôle du président de la République française selon la Constitution de 1958 ?",a:"Chef de l'État, garant de la Constitution, commandant en chef des armées, nomme le Premier ministre, préside le Conseil des ministres, peut dissoudre l'Assemblée nationale",detail:"L'article 5 de la Constitution confie au président la mission de veiller au fonctionnement régulier des institutions. Il dispose du domaine réservé (défense, politique étrangère). L'article 16 lui donne des pleins pouvoirs en cas de crise grave. Depuis l'instauration du quinquennat (2002), sa légitimité est renforcée par l'élection directe et l'alignement du mandat avec celui de l'Assemblée."},
{theme:"politique",diff:"facile",type:"q",q:"Quel article de la Constitution française permet au président de soumettre un projet de loi au référendum populaire ?",a:"Consultation directe des citoyens sur une question précise — utilisé pour les révisions constitutionnelles majeures, les traités européens, la décolonisation",detail:"De Gaulle utilise le référendum comme instrument plébiscitaire (1962 sur l'élection du président au suffrage universel ; 1969 sur la régionalisation — sa défaite le pousse à démissionner). Le référendum sur le traité de Maastricht (1992 : 51 % de Oui) et sur la Constitution européenne (2005 : 55 % de Non) ont marqué la politique française. L'article 11 de la Constitution permet au président de soumettre certains projets de loi à référendum."},
{theme:"politique",diff:"moyen",type:"q",q:"Quel politologue américain distingue dans les années 1990 le hard power (militaire, économique) du soft power (culturel, diplomatique) ?",a:"Capacité d'un acteur à influencer le comportement d'autres acteurs — hard power (militaire, économique), soft power (culturel, normatif), smart power (combinaison)",detail:"Hans Morgenthau (Politics Among Nations, 1948) place la puissance au centre des relations internationales. Elle se mesure par le PIB, la population, la technologie, la force militaire, la cohésion nationale. Les États-Unis dominent sur toutes ces dimensions depuis 1945. La puissance est relative (ce qui compte c'est l'avantage sur les concurrents) et contextuelle (militairement fort, économiquement vulnérable)."},
{theme:"politique",diff:"moyen",type:"q",q:"Dans quel ouvrage de 1936 Keynes remet-il en cause l'autorégulation des marchés et justifie l'intervention de l'État en période de récession ?",a:"Keynes (1936) : l'État doit stimuler la demande par la dépense publique en récession — Friedman (1963) : seule la masse monétaire compte, l'État ne doit pas s'endetter",detail:"Keynes (Théorie générale, 1936) révolutionne l'économie : en cas de sous-emploi, l'État doit dépenser même en déficit pour relancer la demande. Le New Deal de Roosevelt et la reconstruction post-1945 s'en inspirent. Friedman et l'École de Chicago prônent la rigueur budgétaire et la régulation monétaire. La crise de 1973 ('stagflation') discrédite Keynes. La crise de 2008 et la pandémie provoquent un retour keynésien massif."},
{theme:"politique",diff:"moyen",type:"q",q:"Quel indice annuel de Transparency International classe les pays selon leur niveau perçu de corruption dans le secteur public ?",a:"Abus de position officielle pour un gain privé — freine le développement, érode la confiance institutionnelle, favorise le crime organisé",detail:"Transparency International classe chaque année 180 pays sur l'indice de perception de la corruption (IPC). Les pays nordiques (Danemark, Finlande) arrivent en tête. Les pays les plus corrompus sont souvent les plus pauvres. La corruption coûte 2 600 milliards de dollars par an (FMI). La France a condamné Chirac (2011), Sarkozy (2021) et enquêté sur Fillon. L'OCDE et l'ONU ont des conventions anticorruption."},
{theme:"politique",diff:"moyen",type:"q",q:"Quel philosophe hégélien du XIXe siècle théorise la société civile comme sphère intermédiaire entre la famille et l'État ?",a:"Ensemble des organisations non gouvernementales, associations, syndicats, médias et mouvements citoyens qui existent entre l'État et le marché",detail:"Tocqueville (De la démocratie en Amérique, 1835) valorise les associations comme école de la démocratie. La société civile joue un rôle de contre-pouvoir (ONG de défense des droits humains), de mobilisation (mouvements sociaux) et de complémentarité à l'État (associations caritatives). Gramsci (Prison Notebooks) l'analyse comme enjeu de l'hégémonie culturelle. Les régimes autoritaires cherchent à la contrôler (loi sur les 'agents étrangers' en Russie, Chine, Hongrie)."},
{theme:"politique",diff:"moyen",type:"q",q:"Dans quel ouvrage de 1917 Lénine analyse-t-il l'impérialisme comme stade suprême du capitalisme, lié à l'exportation des capitaux ?",a:"Lénine (L'Impérialisme, stade suprême du capitalisme, 1917) : l'expansion coloniale répond à la recherche de nouveaux marchés et de ressources par le capital financier monopolistique",detail:"Lénine s'appuie sur les travaux d'Hobson et Hilferding. L'impérialisme colonial (1870-1914) est pour lui la conséquence inévitable du capitalisme en crise. La rivalité entre puissances impérialistes provoque la Première Guerre mondiale. Cette analyse reste influente dans les théories néo-marxistes du sous-développement (Wallerstein, théorie des systèmes-monde) et des études postcoloniales."},
{theme:"politique",diff:"difficile",type:"q",q:"Quel pays ibérique sert de modèle de 'transition par le pacte' après la mort de Franco en 1975, négociant pacifiquement le passage à la démocratie ?",a:"Processus de passage d'un régime autoritaire à un régime démocratique — par rupture (révolution), par transaction (négociation), par intervention extérieure",detail:"Les théoriciens de la transitologie (O'Donnell, Schmitter, Huntington) analysent les 'vagues de démocratisation'. La 3e vague (1974-1991) touche l'Europe du Sud (Portugal, Espagne, Grèce), l'Amérique latine et l'Europe de l'Est. La transition espagnole (1975-1978) par 'rupture négociée' est souvent citée comme modèle. Le Chili (1988, victoire du Non au référendum de Pinochet) illustre la voie électorale. Les transitions arabe montrent que la démocratisation peut s'inverser."},
{theme:"politique",diff:"difficile",type:"q",q:"Quel est le rôle de la Cour de justice de l'Union européenne (CJUE) ?",a:"Juridiction suprême de l'UE garantissant l'interprétation et l'application du droit européen — ses arrêts s'imposent aux États membres et aux juridictions nationales",detail:"La CJUE (Luxembourg) statue sur les recours en manquement (Commission vs État membre), les renvois préjudiciels (questions des juges nationaux), les recours en annulation d'actes européens. Sa jurisprudence a été fondatrice : primauté du droit européen (Van Gend en Loos, 1963 ; Costa v. ENEL, 1964), effet direct des directives, protection des droits fondamentaux. La Pologne et la Hongrie ont contesté sa primauté — créant une crise constitutionnelle majeure."},
{theme:"politique",diff:"difficile",type:"q",q:"Quel philosophe allemand théorise la démocratie délibérative dans Théorie de l'agir communicationnel (1981) ?",a:"Modèle (Habermas, Rawls) fondant la légitimité démocratique non sur l'agrégation des préférences mais sur la discussion rationnelle orientée vers l'intérêt général",detail:"Habermas (Théorie de l'agir communicationnel, 1981) : une décision est légitime si elle résulte d'une discussion où tous peuvent participer et où seul le meilleur argument prévaut. Rawls (Libéralisme politique, 1993) théorise la 'raison publique'. La démocratie délibérative inspire les conventions citoyennes, les jurys citoyens et les assemblées délibératives. Elle est critiquée pour son idéalisme (les citoyens ne délibèrent pas toujours rationnellement)."},
{theme:"politique",diff:"moyen",type:"q",q:"En quelle année la Chine dépasse-t-elle le Japon pour devenir la deuxième économie mondiale en termes de PIB nominal ?",a:"La Chine est la 2e économie mondiale depuis 2010 — son modèle 'autoritarisme + capitalisme d'État' est présenté comme alternative au modèle libéral occidental",detail:"La Chine refuse l'universalité des droits de l'homme, le libre accès à internet et la démocratie électorale tout en intégrant les marchés mondiaux. Elle développe sa propre 'vision du monde' via le Forum de Boao, les BRICS, la BRI. La 'guerre technologique' sino-américaine (Huawei, TikTok, semi-conducteurs) recompose les chaînes de valeur mondiales. Graham Allison théorise le 'Piège de Thucydide' : une puissance montante défie la puissance établie, risquant la guerre."},
{theme:"politique",diff:"moyen",type:"q",q:"Quel système de santé universel le Royaume-Uni crée-t-il en 1948, devenant le modèle du service public de santé financé par l'impôt ?",a:"La santé est un enjeu politique majeur — organisation des systèmes de santé (universel comme France, assurantiel comme États-Unis), financement, accès aux médicaments, pandémies",detail:"La pandémie de Covid-19 (2020-2022) a montré l'impact politique des décisions sanitaires : confinements, vaccinations obligatoires, passeports sanitaires. L'OMS (Organisation mondiale de la santé) coordonne les réponses internationales. L'accès aux vaccins illustre les inégalités mondiales (COVAX). En France, la Sécurité sociale (1945) reste le pilier du modèle social. La privatisation de l'hôpital public est l'un des grands débats politiques contemporains."},
{theme:"politique",diff:"facile",type:"q",q:"Dans quelle tradition juridique le concept d'État de droit (Rechtsstaat) est-il théorisé au XIXe siècle, signifiant que l'État lui-même est soumis à la loi ?",a:"Principe selon lequel l'État lui-même est soumis au droit — les citoyens et les gouvernants sont égaux devant la loi, les droits fondamentaux sont garantis",detail:"L'État de droit s'oppose à l'État policier et à l'État arbitraire. Il implique : hiérarchie des normes, indépendance de la justice, contrôle de constitutionnalité, protection des droits fondamentaux. La Commission de Venise (Conseil de l'Europe) surveille l'état de droit en Europe. L'UE a créé un mécanisme de conditionnalité (suspension des fonds pour Pologne et Hongrie en cas de violations)."},
{theme:"politique",diff:"facile",type:"q",q:"Qu'est-ce qu'une élection présidentielle en France et comment se déroule-t-elle ?",a:"Élection au suffrage universel direct à deux tours — si aucun candidat n'obtient la majorité absolue au 1er tour, les deux premiers s'affrontent au 2e tour",detail:"L'élection au suffrage universel direct est instaurée par référendum en 1962 (contre la majorité de l'Assemblée). Elle a lieu tous les 5 ans depuis l'instauration du quinquennat (2002). Le 1er tour élimine tous les candidats sauf les deux en tête. Le 2e tour oppose les deux finalistes. La règle des 500 parrainages d'élus est requise pour se présenter. L'entre-deux-tours est une phase clé de mobilisation et d'alliances."},
{theme:"politique",diff:"moyen",type:"q",q:"Quel grand pays industrialisé ne ratifie pas le protocole de Kyoto, vidant de sa substance cet accord de réduction des émissions ?",a:"Traité (1997) imposant des objectifs contraignants de réduction des émissions de gaz à effet de serre aux pays développés — les États-Unis ne l'ont jamais ratifié, la Chine était exemptée",detail:"Le protocole de Kyoto est adopté en 1997, entre en vigueur en 2005. Il fixe des objectifs de réduction pour les pays de l'Annexe I (pays riches). Les États-Unis, 1er émetteur, refusent la ratification (Sénat, 95 voix contre 0 en 1997). La Chine, en développement, n'a pas d'objectifs. Le Canada se retire en 2011. Les Accords de Paris (2015) remplacent cette approche contraignante par des engagements nationaux volontaires."},
{theme:"politique",diff:"moyen",type:"q",q:"Quel objectif de l'ONU fixe le niveau d'aide publique au développement à 0,7 % du revenu national brut des pays riches, rarement atteint ?",a:"Transferts financiers des pays riches vers les pays en développement pour financer leur développement — objectif ONU : 0,7 % du PIB des donateurs, rarement atteint",detail:"L'objectif des 0,7 % du PIB (fixé en 1970) n'est atteint que par quelques pays nordiques (Suède, Norvège, Luxembourg, Danemark). La France donne ~0,5 %. Le débat sur l'efficacité de l'aide est vif : Dambisa Moyo (Dead Aid, 2009) argue que l'aide perpétue la dépendance. Easterly vs Sachs : l'aide ciblée (Sachs, villages du millénaire) peut fonctionner si bien conçue. Les transferts migratoires (remittances) dépassent souvent l'APD."},
{theme:"politique",diff:"difficile",type:"q",q:"Quelle commission 'vérité et réconciliation' créée en Afrique du Sud après l'apartheid, présidée par Desmond Tutu, devient le modèle mondial de justice transitionnelle ?",a:"Ensemble de mécanismes (tribunaux, commissions vérité, réparations, purge) pour traiter les violations passées et reconstruire la cohésion nationale — Afrique du Sud (CVR), Argentine (procès des juntes), Rwanda (gacaca)",detail:"La Commission vérité et réconciliation (CVR) d'Afrique du Sud (Desmond Tutu, 1996-2002) offre l'amnistie en échange de la vérité. L'Argentine poursuit les responsables de la dictature (1976-1983) à partir de 1985 (procès des juntes). Les tribunaux gacaca rwandais (2001-2012) jugent plus d'un million d'affaires de génocide en recourant à la justice communautaire. La tension entre justice et réconciliation est au cœur de la transitologie."},
{theme:"politique",diff:"difficile",type:"q",q:"Depuis quelle année Xi Jinping préside-t-il la Chine, et quel amendement constitutionnel de 2018 supprime la limite de deux mandats ?",a:"Xi Jinping (au pouvoir depuis 2012, mandat illimité depuis 2018) développe une idéologie nationaliste (le 'Rêve chinois') fondée sur la restauration de la grandeur nationale et le rejet des 'siècle d'humiliation' (1839-1949)",detail:"Xi Jinping consolide le pouvoir du Parti communiste chinois, réintroduit la pensée de Xi dans la Constitution (2017), supprime la limitation des mandats (2018). Le Rêve chinois vise la 'grande renaissance de la nation chinoise' d'ici 2049 (centenaire de la RPC). La politique en mer de Chine méridionale, à Taiwan, au Xinjiang (Ouïghours) et à Hong Kong s'inscrit dans cette vision nationaliste. Les tensions avec les États-Unis s'intensifient."},
{theme:"politique",diff:"moyen",type:"q",q:"Quelle militante américaine du suffrage féminin publie en 1963 La Mystique féminine, lançant la deuxième vague du féminisme ?",a:"Mouvement pour l'égalité des droits des femmes — 1re vague (droit de vote, XIXe-début XXe s.), 2e vague (années 1960-80 : droits reproductifs, parité), 3e vague (années 1990 : intersectionnalité), 4e vague (#MeToo, 2010s)",detail:"La 1re vague obtient le droit de vote (Royaume-Uni 1918, États-Unis 1920, France 1944). La 2e vague (Beauvoir, Friedan) lutte pour l'avortement, la contraception, l'égalité salariale. La 3e vague intègre race et classe (bell hooks, Crenshaw). #MeToo (2017) révèle l'ampleur des violences sexuelles. La parité politique progresse (loi Parity en France, 2000 ; quotas en Scandinavie). L'égalité salariale reste un objectif non atteint."},
{theme:"politique",diff:"moyen",type:"q",q:"Quelle loi américaine de 1965 garantit le droit de vote aux Afro-Américains dans les États du Sud où ils en étaient illégalement privés ?",a:"Mouvement (1955-1968) contre la ségrégation raciale dans le Sud américain — Martin Luther King, Rosa Parks, NAACP — aboutit au Civil Rights Act (1964) et Voting Rights Act (1965)",detail:"Rosa Parks refuse de céder sa place dans un bus (1955) — déclenchant le boycott des bus de Montgomery. Martin Luther King Jr. organise les marches (Washington, 1963 : 'I have a dream'). Les lois Johnson (1964-1965) abolissent la ségrégation légale et protègent le droit de vote des Noirs. King est assassiné en 1968. Le mouvement Black Lives Matter (2013-2020) en est le successeur contemporain."},
{theme:"politique",diff:"facile",type:"q",q:"Combien d'États membres l'ONU compte-t-elle, et quel est le dernier pays à l'avoir rejointe en 2011 ?",a:"Organisation intergouvernementale mondiale fondée en 1945, 193 membres (quasi-universalité) — maintien de la paix, coopération internationale, droits de l'homme, développement",detail:"L'ONU naît à San Francisco le 26 juin 1945 sur les ruines de la SDN (Société des Nations, 1919) dissoute. Ses 6 organes principaux : Assemblée générale, Conseil de sécurité, Secrétariat, Cour internationale de Justice, Conseil économique et social, Conseil de tutelle. Les agences spécialisées (OMS, UNESCO, UNICEF, HCR, FAO) constituent le 'système ONU'. Le secrétaire général actuel est António Guterres (Portugal, depuis 2017)."},
{theme:"politique",diff:"facile",type:"q",q:"Quels trois critères Robert Dahl identifie-t-il dans Polyarchy (1971) pour définir une démocratie minimale : suffrage universel, élections libres, et quoi encore ?",a:"Régime politique où le pouvoir appartient au peuple et s'exerce directement ou par représentation — conditions : élections libres et équitables, libertés civiles, État de droit, alternance au pouvoir",detail:"La démocratie athénienne (Ve s. av. J.-C.) est la première expérience historique — mais réservée aux citoyens mâles libres (~10 % de la population). La démocratie libérale moderne ajoute les droits individuels, la séparation des pouvoirs et l'État de droit. L'indice de démocratie (Economist Intelligence Unit) classe 167 pays. Seuls ~20 pays sont des 'démocraties complètes'. La décroissance démocratique ('democratic backsliding') est documentée depuis les années 2010."},
{theme:"politique",diff:"moyen",type:"q",q:"Dans quelle ville néerlandaise le traité créant l'Union européenne est-il signé en 1992, et quel pays le rejette d'abord par référendum avant de le ratifier ?",a:"Traité fondateur de l'Union européenne créant l'union économique et monétaire, la citoyenneté européenne et les piliers Politique étrangère et Justice",detail:"Le Traité de Maastricht (signé en février 1992, en vigueur en novembre 1993) transforme la Communauté européenne en Union européenne. Il crée 3 piliers : Communauté (marchés, concurrence), Politique étrangère et de sécurité commune (PESC), Coopération justice-police (JAI). Il pose les critères de convergence pour l'euro (déficit <3 % PIB, dette <60 %). La Banque centrale européenne et l'euro naissent de ce traité (euro fiduciaire en 2002)."},
{theme:"politique",diff:"difficile",type:"q",q:"Dans quelle revue Huntington publie-t-il en 1993 son article fondateur sur le 'choc des civilisations', avant d'en faire un livre en 1996 ?",a:"Huntington (1993) prédit que les conflits post-guerre froide se feront entre grandes civilisations (occidentale, islamique, confucéenne, orthodoxe...) — thèse critiquée pour son déterminisme culturaliste",detail:"Dans son article Foreign Affairs (1993) puis livre (1996), Huntington identifie 7-8 civilisations dont les 'lignes de fracture' seront les nouveaux foyers de conflits. Le 11 septembre 2001 semble lui donner raison. Les critiques : la thèse essentialise les cultures, ignore les conflits intra-civilisationnels (guerres arabes), sert de légitimation à l'islamophobie et à un certain bellicisme américain. Amartya Sen (Identity and Violence) répond que les identités sont plurielles et non civilisationnelles."},
{theme:"politique",diff:"facile",type:"q",q:"Dans quels États américains des lois d'identification aux urnes (Voter ID) ont-elles été adoptées, accusées de réduire le vote des minorités ?",a:"Droit fondamental permettant aux citoyens de choisir leurs représentants — obstacles : abstention croissante, inégalités d'accès, restrictions en régimes autoritaires",detail:"L'abstention est un phénomène structurel dans les démocraties : en France, elle dépasse 50 % aux législatives 2022. Aux États-Unis, des lois de 'voter suppression' (restrictions d'inscription, fermetures de bureaux de vote) visent disproportionnellement les minorités. Le vote obligatoire existe en Australie, Belgique, Luxembourg (~30 pays). Le vote électronique soulève des questions de sécurité informatique."},
{theme:"politique",diff:"moyen",type:"q",q:"Quelle loi américaine de 2022 (Inflation Reduction Act) illustre le retour massif de la politique industrielle avec 370 milliards de dollars pour la transition énergétique ?",a:"Intervention de l'État pour orienter le développement économique vers des secteurs stratégiques — revient en force face à la Chine, la pandémie et la transition énergétique (Inflation Reduction Act américain, souveraineté industrielle européenne)",detail:"La politique industrielle avait été critiquée depuis les années 1980 (État mauvais gestionnaire, distorsions de marché). La crise des semi-conducteurs (2020-2022), la dépendance aux masques et médicaments révélée par le Covid, et la concurrence des subventions chinoises et américaines (IRA : 369 milliards de dollars) forcent l'Europe à réinventer sa politique industrielle. Les Chips Acts américain et européen visent à relocaliser la production de semi-conducteurs."},
{theme:"philo",diff:"facile",type:"d",q:"Méthode philosophique consistant à progresser vers la vérité par questions et réponses",a:"La maïeutique (ou dialectique socratique)",detail:"Socrate comparait son art à celui de sa mère sage-femme : il « accouchait » les esprits de leurs idées. Il ne prétendait rien savoir, guidant son interlocuteur à découvrir lui-même la vérité."},
{theme:"philo",diff:"facile",type:"q",q:"Quelle est la formule fondatrice de la philosophie de Descartes ?",a:"« Je pense, donc je suis » (Cogito ergo sum)",detail:"Dans le Discours de la méthode (1637), Descartes doute de tout jusqu'à l'indubitable : s'il doute, il pense ; s'il pense, il existe. C'est le point d'Archimède de la philosophie moderne."},
{theme:"philo",diff:"facile",type:"q",q:"Quel philosophe grec a classifié le savoir en disciplines et fondé la logique ?",a:"Aristote",detail:"Élève de Platon et précepteur d'Alexandre le Grand, Aristote fonde le Lycée à Athènes. Il pose les bases de la logique (syllogisme), de la biologie, de la physique et de la politique."},
{theme:"philo",diff:"moyen",type:"q",q:"Pour Sartre, que signifie « l'existence précède l'essence » ?",a:"L'homme n'a pas de nature prédéfinie — il se crée par ses choix",detail:"Dans L'Existentialisme est un humanisme (1945), Sartre affirme que l'homme, contrairement à un objet, n'a pas d'essence fixée à l'avance. Il est « condamné à être libre » et entièrement responsable de lui-même."},
{theme:"philo",diff:"moyen",type:"q",q:"Quelle distinction Kant établit-il entre « phénomène » et « noumène » ?",a:"Le phénomène est ce que nous percevons ; le noumène (chose en soi) est inaccessible",detail:"Dans la Critique de la raison pure (1781), Kant montre que notre connaissance est limitée aux apparences. La réalité indépendante de notre perception reste inconnaissable."},
{theme:"philo",diff:"moyen",type:"d",q:"Courant philosophique du XIXe s. pour lequel la vérité se mesure à l'utilité pratique d'une idée",a:"Le pragmatisme",detail:"Développé par Peirce, James et Dewey aux États-Unis. William James : « Le vrai, c'est simplement l'expédient dans notre façon de penser. » Il influencera profondément la pensée américaine."},
{theme:"philo",diff:"difficile",type:"q",q:"Qu'appelle-t-on la « guillotine de Hume » en philosophie morale ?",a:"L'impossibilité logique de dériver un « devoir être » d'un simple constat de fait",detail:"Hume remarque dans le Traité de la nature humaine (1739) qu'on passe subrepticement des faits aux normes sans justification. « Les hommes sont ainsi faits, donc ils devraient... » est un saut injustifié."},
{theme:"philo",diff:"difficile",type:"q",q:"Quelle est la thèse centrale du Contrat social de Rousseau ?",a:"La légitimité politique naît d'un pacte par lequel les individus s'en remettent à la « volonté générale »",detail:"Rousseau (1762) distingue la volonté de tous (intérêts particuliers) et la volonté générale (intérêt commun). Cette pensée inspirera la Révolution française et le concept de souveraineté populaire."},
{theme:"philo",diff:"difficile",type:"d",q:"Concept nietzschéen désignant la réévaluation des valeurs par les faibles pour retourner la domination des forts",a:"La morale du ressentiment (transvaluation des valeurs)",detail:"Dans La Généalogie de la morale (1887), Nietzsche décrit comment les « esclaves » se vengent symboliquement en proclamant « bonnes » leur faiblesse et humilité, et « mauvaises » la force et vitalité des « maîtres »."},
{theme:"philo",diff:"facile",type:"q",q:"Qui est Platon et quelle est l'allégorie de la caverne ?",a:"Philosophe grec (428-348 av. J.-C.), élève de Socrate — l'allégorie de la caverne illustre la condition humaine face à l'ignorance",detail:"Des prisonniers enchaînés prennent les ombres sur le mur pour la réalité. Celui qui se libère accède à la vérité (les Idées). Cette allégorie illustre la distinction platonicienne entre monde sensible (apparences) et monde intelligible (vérités éternelles). Le philosophe-roi doit redescendre éclairer ses concitoyens."},
{theme:"philo",diff:"facile",type:"q",q:"Qu'est-ce que l'éthique d'Aristote et le juste milieu ?",a:"L'éthique aristotélicienne vise le bonheur (eudaimonia) par la vertu — la vertu est le juste milieu entre deux excès",detail:"Dans l'Éthique à Nicomaque, Aristote définit le bonheur comme activité de l'âme conforme à la vertu. La vertu est une disposition acquise par l'habitude. Le courage est le juste milieu entre lâcheté et témérité. L'homme est un animal politique qui s'accomplit dans la cité."},
{theme:"philo",diff:"facile",type:"q",q:"Quel philosophe grec fonde le stoïcisme vers 300 av. J.-C., et dans quel lieu d'Athènes enseigne-t-il ?",a:"École philosophique (Zénon, ~300 av. J.-C.) prônant la maîtrise des passions et l'acceptation du destin — Marc Aurèle, Épictète, Sénèque",detail:"Les stoïciens distinguent ce qui dépend de nous (pensées, désirs) et ce qui n'en dépend pas (corps, mort). La liberté consiste à ne désirer que ce qui dépend de nous. Marc Aurèle est un stoïcien sur le trône impérial. Épictète, esclave affranchi, enseigne que nul ne peut nous priver de notre liberté intérieure."},
{theme:"philo",diff:"facile",type:"q",q:"Quelle notion centrale Épicure distingue-t-il entre plaisirs naturels et nécessaires et plaisirs vains, fondant son éthique du bonheur ?",a:"École d'Épicure (341-270 av. J.-C.) : le bonheur est l'ataraxie (absence de trouble) et l'aponie (absence de douleur) — distinct du stoïcisme",detail:"L'épicurisme valorise les plaisirs simples et durables contre les plaisirs intenses mais brefs. La mort n'est pas à craindre. A distinguer du stoïcisme : l'épicurien cherche le plaisir mesuré, le stoïcien l'indifférence aux choses extérieures."},
{theme:"philo",diff:"facile",type:"q",q:"Quel philosophe britannique du XVIIe siècle pose les bases de l'empirisme en affirmant que toute connaissance vient de l'expérience sensible ?",a:"Courant selon lequel toute connaissance vient de l'expérience sensible — John Locke, David Hume, George Berkeley",detail:"Locke (1689) : l'esprit est une table rase que l'expérience inscrit. Hume radicalise : même la causalité n'est qu'une habitude mentale. Berkeley : esse est percipi. L'empirisme s'oppose au rationalisme de Descartes et Leibniz qui défendent des idées innées."},
{theme:"philo",diff:"facile",type:"q",q:"Qui est Immanuel Kant et quel est son apport fondamental ?",a:"Philosophe allemand (1724-1804) — révolution copernicienne : l'esprit impose ses structures au monde, non l'inverse",detail:"Kant synthétise empirisme (Hume) et rationalisme (Leibniz). La Critique de la raison pure (1781) examine les conditions de la connaissance. La Critique de la raison pratique (1788) fonde la morale sur l'impératif catégorique."},
{theme:"philo",diff:"facile",type:"q",q:"Qu'est-ce que l'impératif catégorique de Kant ?",a:"Principe moral universel : agis selon une maxime que tu peux vouloir voir devenir une loi universelle",detail:"L'impératif catégorique commande sans condition. Sa 2e formulation : traite l'humanité toujours en même temps comme une fin, jamais simplement comme un moyen. Il fonde une éthique déontologique basée sur le devoir, indépendamment des conséquences."},
{theme:"philo",diff:"facile",type:"q",q:"Quel ouvrage collectif en 28 volumes, dirigé par Diderot et d'Alembert, synthétise l'esprit des Lumières au XVIIIe siècle ?",a:"Mouvement intellectuel européen du XVIIIe s. fondé sur la raison, la science et la liberté — Voltaire, Rousseau, Diderot",detail:"Les Lumières critiquent les superstitions et l'absolutisme au nom de la raison. L'Encyclopédie de Diderot (1751-1772) diffuse les savoirs. Kant : sortie de l'homme de sa minorité dont il est lui-même responsable. Elles inspirent la Révolution française et américaine."},
{theme:"philo",diff:"facile",type:"q",q:"Dans quel ouvrage de 1882 Nietzsche fait-il prononcer pour la première fois la formule 'Dieu est mort' par un personnage ?",a:"Philosophe allemand (1844-1900) — Gai Savoir (1882) : les valeurs chrétiennes ont perdu leur fondement transcendant",detail:"Nietzsche annonce l'effondrement de la foi chrétienne. Il faut surmonter ce nihilisme par la création de nouvelles valeurs : Surhomme, volonté de puissance, éternel retour. Sa récupération nazie est une trahison totale de sa pensée."},
{theme:"philo",diff:"facile",type:"q",q:"Quelle conférence publique de 1945 à Paris, prononcée par Sartre, popularise l'existentialisme et pose sa thèse centrale ?",a:"Courant du XXe s. centré sur l'existence humaine concrète, la liberté et la responsabilité — Sartre, Camus, Beauvoir, Heidegger",detail:"Kierkegaard pose les bases au XIXe s. Heidegger (Être et Temps, 1927) analyse l'être-au-monde. Sartre développe l'existentialisme athée : l'existence précède l'essence. Camus aborde l'absurde. Beauvoir (Le Deuxième Sexe, 1949) applique l'existentialisme à la condition féminine."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que la dialectique hégélienne ?",a:"Chez Hegel, le réel se développe par contradictions surmontées (thèse-antithèse-synthèse) — mouvement de l'Esprit vers sa réalisation totale",detail:"Hegel (Phénoménologie de l'Esprit, 1807) : chaque affirmation suscite sa négation, surmontée dans une unité supérieure (Aufhebung). Marx renverse Hegel : ce n'est pas l'Esprit mais la matière (conditions économiques) qui meut l'histoire."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que le matérialisme historique de Marx ?",a:"L'histoire est déterminée par les conditions matérielles de production (infrastructure) qui conditionnent les idées et les institutions (superstructure)",detail:"Marx : ce n'est pas la conscience des hommes qui détermine leur existence, c'est leur existence sociale qui détermine leur conscience. La lutte des classes est le moteur de l'histoire. Cette approche révolutionne les sciences sociales."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que la phénoménologie de Husserl ?",a:"Edmund Husserl (1859-1938) — méthode décrivant les structures de l'expérience consciente avant toute théorie : retour aux choses mêmes",detail:"La réduction phénoménologique met entre parenthèses les jugements d'existence. Heidegger, Merleau-Ponty et Sartre s'en inspirent. Merleau-Ponty (Phénoménologie de la perception, 1945) analyse le corps vécu comme lieu de l'expérience."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que l'utilitarisme de Bentham et Mill ?",a:"Théorie morale : la bonne action est celle qui maximise le bonheur du plus grand nombre — Jeremy Bentham (1748-1832) et John Stuart Mill (1806-1873)",detail:"Bentham calcule le bonheur par intensité, durée, certitude. Mill affine : certains plaisirs sont qualitativement supérieurs. L'utilitarisme influence l'économie du bien-être et l'éthique médicale."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que la théorie de la justice de John Rawls ?",a:"Rawls (Théorie de la justice, 1971) : une société juste est celle que des individus choisiraient derrière un voile d'ignorance",detail:"Derrière le voile d'ignorance, on ignore sa classe sociale, ses talents, son sexe. Deux principes : égalité des libertés fondamentales ; les inégalités ne sont justifiées que si elles bénéficient aux plus défavorisés (principe de différence)."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que la déconstruction de Jacques Derrida ?",a:"Méthode philosophique (1967) révélant les tensions et présupposés cachés dans les textes — critique de la métaphysique de la présence",detail:"Derrida (De la grammatologie, 1967) déconstruit la hiérarchie oral/écrit. La différance désigne le jeu de différences qui produit le sens sans jamais l'atteindre totalement. La déconstruction influence les études littéraires, le féminisme et le postcolonialisme."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que le droit naturel en philosophie ?",a:"Courant (Aristote, Cicéron, Grotius, Locke) selon lequel il existe des droits universels indépendants des législations humaines",detail:"Aristote distingue le juste naturel (universel) et le juste légal (conventionnel). Locke : les droits naturels (vie, liberté, propriété) précèdent l'État. La Déclaration des droits de l'homme (1789) et la Déclaration universelle (1948) s'y fondent."},
{theme:"philo",diff:"moyen",type:"q",q:"Dans quel ouvrage posthume de 1677 Spinoza développe-t-il sa philosophie more geometrico, identifiant Dieu et la Nature ?",a:"Baruch Spinoza (1632-1677) : Dieu et la Nature sont une seule et même substance (Deus sive Natura)",detail:"L'Éthique (1677, posthume) est construite more geometrico. Spinoza est excommunié de sa communauté juive à 23 ans. Son monisme révolutionnaire influence Leibniz, Hegel et les neurosciences contemporaines. La liberté n'est pas le libre arbitre mais la compréhension de notre détermination."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que le scepticisme et le doute cartésien ?",a:"Descartes utilise le doute hyperbolique comme méthode pour trouver une vérité indubitable — le Cogito résiste à tout doute",detail:"Descartes radicalise le scepticisme : et si un malin génie m'induisait toujours en erreur ? Mais le doute lui-même prouve que je pense, donc que j'existe. Hume renouvelle le scepticisme : la causalité et l'identité personnelle ne sont que des habitudes."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que le positivisme d'Auguste Comte ?",a:"Auguste Comte (1798-1857) : la pensée passe par trois stades — théologique, métaphysique, positif (scientifique)",detail:"La Loi des trois états : l'humanité explique les phénomènes d'abord par des dieux, puis par des forces abstraites, enfin par des lois empiriques. Comte fonde la sociologie. Il inspire le Cercle de Vienne et le positivisme logique."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que la philosophie de l'absurde de Camus ?",a:"Camus (Le Mythe de Sisyphe, 1942) : l'absurde naît du désir de sens de l'homme face au silence du monde — il faut l'affronter sans fuir",detail:"Trois réponses à l'absurde : le suicide (lâcheté), le saut de la foi (mauvaise foi) ou la révolte (honnêteté). Il faut imaginer Sisyphe heureux. Camus se distingue de Sartre en refusant le marxisme."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que le structuralisme en philosophie et sciences humaines ?",a:"Courant des années 1960 analysant les phénomènes humains comme des systèmes de relations — Lévi-Strauss, Lacan, Althusser, Barthes",detail:"Le structuralisme s'inspire de Saussure : le sens naît des différences entre signes. Lévi-Strauss applique cette méthode aux mythes. Le post-structuralisme (Derrida, Foucault) critique le structuralisme mais en hérite."},
{theme:"philo",diff:"difficile",type:"q",q:"Qu'est-ce que la biopolitique de Michel Foucault ?",a:"Foucault analyse les relations de pouvoir à travers le savoir, la discipline et la gestion politique de la vie des populations",detail:"Foucault (Surveiller et Punir, 1975) montre que le pouvoir s'exerce par des dispositifs (hôpitaux, prisons) qui normalisent les individus. La biopolitique désigne le passage d'un faire mourir (pouvoir souverain) à un faire vivre (pouvoir disciplinaire)."},
{theme:"philo",diff:"difficile",type:"q",q:"Qu'est-ce que l'éthique du care de Carol Gilligan ?",a:"Courant féministe (In a Different Voice, 1982) valorisant la sollicitude et l'attention aux besoins d'autrui contre l'éthique universaliste abstraite",detail:"Gilligan critique Kohlberg : les femmes développent une morale du care différente de la morale de la justice. Joan Tronto (1993) en fait une théorie politique : le care est une pratique sociale exigeant redistribution et reconnaissance."},
{theme:"philo",diff:"difficile",type:"q",q:"Qu'est-ce que l'être-au-monde selon Heidegger ?",a:"Heidegger (Être et Temps, 1927) : l'être humain (Dasein) est toujours déjà dans le monde, avec les autres, dans la temporalité",detail:"Heidegger veut rouvrir la question de l'être. Le Dasein est un être-au-monde (In-der-Welt-sein), être-avec (Mitsein), être-pour-la-mort. Son engagement nazi (1933-1934) reste une question éthique ouverte."},
{theme:"philo",diff:"difficile",type:"q",q:"Qu'est-ce que le critère de réfutabilité de Karl Popper ?",a:"Popper (1934) : une théorie est scientifique si elle peut être réfutée (falsifiable) — distingue la science de la pseudo-science",detail:"Un seul cygne noir suffit à réfuter tous les cygnes sont blancs. La science progresse par conjectures et réfutations. Kuhn (Structure des révolutions scientifiques, 1962) répond : la science progresse par paradigmes, non par réfutations individuelles."},
{theme:"philo",diff:"difficile",type:"q",q:"Qu'est-ce que le problème difficile de la conscience selon Chalmers ?",a:"David Chalmers (1995) : expliquer pourquoi des processus physiques donnent lieu à une expérience subjective (qualia) reste irréductible à la neurologie",detail:"Le problème facile : expliquer les fonctions cognitives. Le problème difficile : pourquoi y a-t-il quelque chose que cela fait d'être un être conscient ? Le physicalisme, le dualisme et le panpsychisme proposent des réponses."},
{theme:"philo",diff:"difficile",type:"q",q:"Qu'est-ce que la philosophie de Simone de Beauvoir ?",a:"Beauvoir (Le Deuxième Sexe, 1949) : On ne naît pas femme, on le devient — la féminité est une construction sociale",detail:"Beauvoir applique l'existentialisme à la condition féminine. La femme est définie comme l'Autre par rapport à l'homme universel. La liberté authentique exige de se projeter dans des projets qui transcendent la condition assignée."},
{theme:"philo",diff:"difficile",type:"q",q:"Qu'est-ce que la banalité du mal selon Hannah Arendt ?",a:"Arendt (Eichmann à Jérusalem, 1963) : le mal peut être accompli sans intention malveillante, par simple absence de pensée",detail:"Arendt assiste au procès d'Eichmann à Jérusalem. Il était un bureaucrate ordinaire, incapable de pensée morale critique. Les Origines du totalitarisme (1951) analysent nazisme et stalinisme comme rupture radicale avec toute tyrannie précédente."},
{theme:"philo",diff:"difficile",type:"q",q:"Qu'est-ce que la raison instrumentale selon l'École de Francfort ?",a:"Horkheimer et Adorno (Dialectique de la Raison, 1944) : la raison des Lumières, en se mettant au service de la domination, se retourne contre elle-même",detail:"La raison devait libérer. En devenant instrumentale (outil pour dominer), elle produit le totalitarisme et l'industrie culturelle. Habermas répond en distinguant raison communicationnelle et raison instrumentale."},
{theme:"philo",diff:"moyen",type:"q",q:"Quel philosophe médiéval tente de concilier la raison aristotélicienne et la foi chrétienne dans la Somme théologique ?",a:"La scolastique (IXe-XIVe s.) tente de réconcilier foi chrétienne et raison philosophique — Thomas d'Aquin en est le sommet",detail:"Thomas d'Aquin (Somme théologique, 1265-1274) synthétise Aristote et christianisme. Anselme de Cantorbéry formule la preuve ontologique. La querelle des universaux (réalisme vs nominalisme) est le débat central de la période."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que la querelle des universaux au Moyen Âge ?",a:"Débat sur le statut des concepts généraux — réalisme (les universaux existent réellement), nominalisme (Guillaume d'Occam : ce ne sont que des noms)",detail:"La question : le concept de rouge a-t-il une existence indépendante des choses rouges ? Occam (rasoir d'Occam) dit non : seules les choses individuelles existent. Ce débat préfigure les discussions en philosophie du langage."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que la preuve ontologique d'Anselme de Cantorbéry ?",a:"Dieu est ce dont on ne peut rien concevoir de plus grand — un tel être doit donc exister en réalité",detail:"Anselme (Proslogion, 1078) : si Dieu n'existe que dans l'esprit, je peux en concevoir un identique mais existant en réalité, donc plus grand. Kant réfute l'argument : l'existence n'est pas un prédicat."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que la phronesis (prudence pratique) d'Aristote ?",a:"Faculté intellectuelle permettant de délibérer correctement sur ce qui est bon dans des situations concrètes — irréductible à la science",detail:"La phronesis (Éthique à Nicomaque, livre VI) est la vertu de l'intelligence pratique. Elle diffère de l'épistémè (connaissance théorique) et de la techné (savoir-faire). Le phronimos est l'homme prudent, doté de l'expérience pour agir bien."},
{theme:"philo",diff:"facile",type:"q",q:"Qu'est-ce que le dualisme cartésien ?",a:"Descartes distingue deux substances : la res cogitans (chose pensante, l'esprit) et la res extensa (chose étendue, le corps)",detail:"Le dualisme pose le problème corps-esprit : comment des substances radicalement différentes interagissent-elles ? Les solutions : occasionnalisme (Malebranche), monisme (Spinoza), matérialisme (Hobbes). Le problème reste central en philosophie de l'esprit."},
{theme:"philo",diff:"facile",type:"q",q:"Qu'est-ce que la théorie des Idées chez Platon ?",a:"Les Idées sont des réalités intelligibles éternelles dont les choses sensibles sont des copies imparfaites",detail:"Les choses sensibles participent aux Idées sans jamais les égaler. L'Idée du Bien est au sommet, comme le soleil pour le visible. Aristote critique la séparation des Idées et des choses (argument du troisième homme)."},
{theme:"philo",diff:"moyen",type:"q",q:"Quelles sont les quatre nobles vérités du bouddhisme, telles que le Bouddha les énonce lors de son premier sermon ?",a:"Le Bouddha enseigne : la vie est souffrance (dukkha) ; la souffrance vient du désir ; cesser le désir c'est cesser la souffrance ; le chemin octuple mène au nirvana",detail:"Le bouddhisme est une philosophie autant qu'une religion. L'impermanence (anicca), l'absence de soi permanent (anatta) et la souffrance (dukkha) sont les trois caractéristiques de l'existence."},
{theme:"philo",diff:"moyen",type:"q",q:"Quel concept central Confucius place-t-il au cœur de sa philosophie morale, traduit par humanité ou bienveillance ?",a:"Confucius (551-479 av. J.-C.) : la vertu (ren, humanité) s'exprime dans les relations hiérarchiques ordonnées et l'étude des classiques",detail:"Le ren (bienveillance) est la vertu suprême. Le li (rites) structure les relations sociales. La piété filiale (xiao) est fondamentale. Le confucianisme a structuré la pensée politique en Chine, Corée, Japon et Vietnam pendant 2 000 ans."},
