{theme:"geo",diff:"moyen",type:"q",q:"Quels pays asiatiques ont le plus bénéficié de la mondialisation économique depuis les années 1980, multipliant leur PIB par dix en quelques décennies ?",a:"Intégration croissante des économies mondiales via le commerce, les investissements et les flux de capitaux — la Chine, la Corée du Sud, Singapour et d'autres économies asiatiques en ont le plus bénéficié",detail:"La Chine a multiplié son PIB par 40 depuis 1980 grâce à la mondialisation. Singapour et la Corée sont devenus pays riches en une génération. Mais la mondialisation creuse aussi les inégalités à l'intérieur des pays développés (désindustrialisation des régions ouvrières)."},
{theme:"geo",diff:"moyen",type:"q",q:"Quelle catastrophe du 26 décembre 2004, provoquée par le déplacement de la plaque indo-australienne, tue plus de 220 000 personnes dans l'océan Indien ?",a:"La collision de cette plaque avec la plaque eurasienne soulève l'Himalaya et génère de fréquents séismes dans la zone de subduction indo-pacifique",detail:"Le sous-continent indien s'écrase lentement contre l'Asie depuis 50 millions d'années, soulevant l'Himalaya de 5 mm/an. La zone de subduction sous Sumatra a provoqué le tsunami du 26 décembre 2004 (250 000 morts). Le séisme du Népal (2015, magnitude 7,8) a tué 9 000 personnes."},
{theme:"geo",diff:"moyen",type:"q",q:"Quels sont les pays membres du BRICS et que représentent-ils ?",a:"Brésil, Russie, Inde, Chine, Afrique du Sud (membres fondateurs) + nouveaux membres depuis 2024",detail:"Les BRICS représentent ~40 % de la population mondiale et ~25 % du PIB mondial (PPA). En 2024, l'Arabie Saoudite, l'Iran, l'Éthiopie, l'Égypte, l'Argentine (puis retrait) et les Émirats ont été invités. Le groupe tente de créer une alternative aux institutions occidentales (FMI, Banque mondiale)."},
{theme:"geo",diff:"moyen",type:"q",q:"Quel pays possède le plus de frontières terrestres avec d'autres pays ?",a:"La Chine (14 pays voisins), ex-aequo avec la Russie (14 pays voisins)",detail:"La Chine partage ses frontières avec la Russie, Mongolie, Kazakhstan, Kirghizstan, Tadjikistan, Afghanistan, Pakistan, Inde, Népal, Bhoutan, Myanmar, Laos, Vietnam et Corée du Nord. La Russie borde 14 pays différents, de la Norvège à la Corée du Nord."},
{theme:"geo",diff:"moyen",type:"q",q:"Quelle est la particularité géographique de la mer Morte ?",a:"Point le plus bas de la surface terrestre (-430 m), avec une salinité si élevée (~34 %) que rien n'y vit et qu'on y flotte sans effort",detail:"La mer Morte, aux frontières d'Israël, de Jordanie et de Palestine, perd 1 m de niveau par an en raison des prélèvements sur le Jourdain et de l'évaporation. Des cristaux de sel se forment sur les berges. Ses eaux riches en magnésium, potassium et bromine attirent les cures thermales depuis l'Antiquité."},
{theme:"geo",diff:"moyen",type:"q",q:"Sur combien de kilomètres s'étend la route de la soie historique reliant la Chine à la Méditerranée, et quelles marchandises y transitaient ?",a:"Réseau de routes commerciales reliant la Chine à la Méditerranée sur 7 000 km, actif de ~100 av. J.-C. au XVe siècle",detail:"La route de la soie n'est pas une route unique mais un réseau de pistes traversant l'Asie centrale : Samarkand, Kashgar, Turfan. Elle transporte soie, épices, porcelaine, mais aussi idées, religions (bouddhisme vers la Chine, islam vers l'Asie centrale), maladies (la peste). La Chine a relancé ce concept avec son initiative « Ceinture et Route » (2013)."},
{theme:"geo",diff:"moyen",type:"q",q:"Quel est le pays le plus densément peuplé au monde ?",a:"Monaco (~19 000 hab/km²), puis Singapour (~8 000 hab/km²) pour les États significatifs",detail:"Monaco, 2 km², est le plus petit État souverain du monde après le Vatican et le plus densément peuplé. Singapour, île-État de 733 km², abrite 5,9 millions d'habitants avec une densité comparable à Monaco si on exclut les espaces verts."},
{theme:"geo",diff:"moyen",type:"q",q:"En quelle année la population urbaine mondiale dépasse-t-elle pour la première fois la population rurale ?",a:"En 2007, pour la première fois dans l'histoire, plus de la moitié de l'humanité vit en ville — ce taux atteint 57 % en 2024",detail:"En 1800, seulement 3 % de l'humanité était urbanisée. La mégalopole de Tokyo-Yokohama (37 millions) est la plus grande agglomération mondiale. Delhi, Shanghai, Dhaka et São Paulo suivent. Les projections prévoient que 70 % de l'humanité sera urbaine en 2050."},
{theme:"geo",diff:"moyen",type:"q",q:"Quel pourcentage des tremblements de terre mondiaux se produisent le long de l'arc de feu du Pacifique ?",a:"Ceinture sismique et volcanique qui borde l'océan Pacifique sur 40 000 km — responsable de 90 % des séismes mondiaux",detail:"L'arc de feu entoure le Pacifique de la Nouvelle-Zélande au Japon, aux Kamtchatka, à l'Alaska, à la Californie, jusqu'aux Andes. Il concentre les zones de subduction (plaques plongeant sous d'autres). Le Japon, l'Indonésie, les Philippines et le Chili sont les pays les plus exposés."},
{theme:"geo",diff:"moyen",type:"q",q:"Quelle ville est la plus haute capitale du monde ?",a:"La Paz (Bolivie) à 3 640 m d'altitude (siège de gouvernement) — Sucre est la capitale constitutionnelle",detail:"La Paz est une ville vertigineuse sur un plateau andin. L'altitude cause le soroche (mal des montagnes) aux visiteurs non acclimatés. Le réseau de téléphériques Mi Teleférico est le plus grand d'Amérique du Sud. Sucre, à 2 810 m, est la capitale officielle mais La Paz abrite le parlement et le gouvernement."},
{theme:"geo",diff:"moyen",type:"q",q:"Combien de personnes parlent français dans le monde, et sur quel continent se trouve désormais la majorité des francophones ?",a:"~320 millions de locuteurs francophones dans 88 pays, dont une majorité en Afrique subsaharienne",detail:"Le français est parlé sur 5 continents. L'Afrique subsaharienne représente 60 % des francophones — et cette proportion augmente avec la croissance démographique africaine. Les projections indiquent 700 millions de francophones en 2050. Le français est langue officielle de 29 pays et de nombreuses organisations internationales (ONU, UE, CIO)."},
{theme:"geo",diff:"moyen",type:"q",q:"Quel pays est parfois appelé « le poumon de la planète » et pourquoi ?",a:"L'Amazonie brésilienne — la forêt amazonienne absorbe ~2 milliards de tonnes de CO₂ par an",detail:"L'Amazonie couvre 5,5 millions de km² et abrite 10 % des espèces connues. Elle génère 50 % de ses propres précipitations via le « cycle de l'eau atmosphérique ». La déforestation record (13 000 km²/an sous Bolsonaro, réduite depuis) risque de transformer la forêt en savane, libérant 90 milliards de tonnes de carbone."},
{theme:"geo",diff:"difficile",type:"q",q:"Comment appelle-t-on en biogéographie la zone de transition entre deux biomes différents, réputée pour sa biodiversité élevée ?",a:"Les zones de transition entre deux biomes (écotones) abritent souvent une biodiversité plus riche que les deux biomes adjacents",detail:"La lisière forêt-prairie, la zone intertidale ou la mangrove sont des exemples d'écotones très riches. En biologie de la conservation, les effets de lisière sont aussi négatifs : les fragments de forêt ont proportionnellement plus de lisière, exposant une plus grande partie à la perturbation humaine."},
{theme:"geo",diff:"difficile",type:"q",q:"Quel pourcentage des terres émergées le pergélisol (permafrost) couvre-t-il, et quel risque climatique majeur son dégel représente-t-il ?",a:"Le pergélisol (permafrost) couvre 24 % des terres émergées et contient deux fois plus de carbone que l'atmosphère — son dégel libèrerait du méthane et du CO₂",detail:"Le pergélisol est un sol gelé en permanence (parfois sur 600 m) en Sibérie, Alaska, Canada, Tibet. Le réchauffement climatique le dégèle, libérant méthane (CH₄, 30 fois plus puissant que le CO₂) et carbone. Ce mécanisme pourrait devenir une boucle de rétroaction irréversible accélérant le réchauffement."},
{theme:"geo",diff:"difficile",type:"q",q:"Il y a combien de millions d'années l'isthme de Panama s'est-il formé, séparant l'Atlantique du Pacifique et modifiant les courants océaniques ?",a:"Pont terrestre de 80 km fermé il y a 3 millions d'années, qui a séparé l'Atlantique du Pacifique et déclenché le Grand Échange américain",detail:"La fermeture de l'isthme a créé le Gulf Stream (modification des courants océaniques), peut-être déclenchant les glaciations. Elle a permis aux espèces d'Amérique du Nord et du Sud de se mélanger (Grand Échange américain). Le canal de Panama (1914) relie à nouveau les deux océans sur 80 km, réduisant les trajets maritimes de 15 000 km."},
{theme:"geo",diff:"difficile",type:"q",q:"Pourquoi la projection cartographique de Mercator est-elle controversée, et quel continent paraît démesuré par rapport à l'Afrique ?",a:"La projection Mercator (1569) déforme les surfaces en agrandissant les régions polaires — le Groenland paraît aussi grand que l'Afrique, qui est pourtant 14 fois plus grande",detail:"Les navigateurs utilisent Mercator car les lignes de cap constant y sont droites. Mais cette déformation de surface donne une image biaisée du monde : l'Europe et l'Amérique du Nord paraissent plus grandes qu'elles ne le sont. La projection de Gall-Peters (1974) conserve les surfaces au détriment des formes, déclenchant un débat géopolitique sur la représentation cartographique."},
{theme:"geo",diff:"difficile",type:"q",q:"Qui formule en 1933 la théorie des lieux centraux expliquant la hiérarchie des villes, et dans quel pays mène-t-il son étude ?",a:"Théorie géographique (1933) expliquant la hiérarchie et la distribution des villes en fonction de leur aire d'influence",detail:"Walter Christaller propose que les villes s'organisent en hexagones concentriques selon leur niveau de service. Une métropole régionale attire des clients sur 200 km ; un village-marché sur 10 km. Cette théorie explique pourquoi les capitales régionales sont régulièrement espacées. Elle fut utilisée par les nazis pour planifier la colonisation de l'Est européen."},
{theme:"geo",diff:"difficile",type:"q",q:"Quelle route maritime arctique, longtemps gelée, est devenue partiellement navigable en été du fait du réchauffement climatique ?",a:"Route maritime arctique reliant l'Atlantique au Pacifique par le nord du Canada — navigable en été depuis les années 2000 en raison du recul des glaces",detail:"Le passage du Nord-Ouest (cherché depuis le XVIe s., Amundsen le franchit en 1903-1906) réduirait de 7 000 km le trajet Europe-Asie. Sa navigabilité croissante avec le réchauffement suscite des rivalités entre le Canada (qui le considère comme eaux intérieures) et les États-Unis (qui le veulent libre)."},
{theme:"geo",diff:"difficile",type:"q",q:"À quelle phase de la transition démographique se trouve l'Afrique subsaharienne, caractérisée encore par une forte natalité ?",a:"Modèle en 4 phases de l'évolution d'une population (haute natalité/haute mortalité → basse natalité/basse mortalité) — l'Afrique subsaharienne est en phase 2-3 avec une forte croissance",detail:"L'Europe a traversé sa transition démographique au XIXe-XXe s. L'Afrique subsaharienne, avec un taux de fécondité de ~4,5, est encore en pleine croissance. Sa population devrait passer de 1,3 milliard (2023) à 4 milliards en 2100. Ce fait géographique majeur déterminera les migrations, l'urbanisation et les équilibres géopolitiques du XXIe s."},
{theme:"geo",diff:"difficile",type:"q",q:"Pourquoi la mer des Sargasses est-elle géographiquement unique parmi toutes les mers du monde ?",a:"Seule mer sans côtes, délimitée uniquement par des courants océaniques dans l'Atlantique Nord — berceau des anguilles européennes et américaines",detail:"La mer des Sargasses est délimitée par le Gulf Stream (ouest), le courant des Açores (nord), le courant des Canaries (est) et le courant équatorial (sud). Les algues flottantes (sargasses) y créent un écosystème unique. Les anguilles d'Europe et d'Amérique viennent y pondre puis meurent — leurs larves dérivent des milliers de km pour rejoindre les rivières."},
{theme:"geo",diff:"difficile",type:"q",q:"Quels sont les pays qui n'ont aucun accès à la mer et sont doublement enclavés (entourés de pays enclavés) ?",a:"Ouzbékistan et Liechtenstein",detail:"L'Ouzbékistan est entouré de Kazakhstan, Turkménistan, Afghanistan, Tadjikistan et Kirghizstan — tous sans accès à la mer. Le Liechtenstein, minuscule État alpin, est entouré de l'Autriche et de la Suisse, eux-mêmes sans façade maritime. Ce double enclavement complique extraordinairement les exportations."},
{theme:"geo",diff:"difficile",type:"q",q:"Quel pourcentage du commerce maritime mondial transite par le détroit de Malacca, entre la Malaisie et Sumatra ?",a:"Détroit de 900 km entre la Malaisie et Sumatra par lequel transite ~40 % du commerce maritime mondial et 80 % des importations pétrolières de la Chine et du Japon",detail:"Le détroit de Malacca, large d'à peine 2,5 km en son point le plus étroit, est le passage entre l'océan Indien et la mer de Chine. Il est le talon d'Achille de la Chine : en cas de conflit, les États-Unis pourraient le bloquer, coupant la Chine de ses importations d'énergie. C'est pourquoi la Chine cherche des alternatives terrestres (pipeline Myanmar, corridor Pakistan)."},
{theme:"geo",diff:"difficile",type:"q",q:"Quels sont les trois grands ensembles géoculturels de l'Océanie, et quelle est la signification étymologique de leurs noms ?",a:"Les trois grandes divisions culturelles et géographiques de l'Océanie : Mélanésie (Pacifique SW), Micronésie (Pacifique NW), Polynésie (Pacifique central et E)",detail:"Mélanésie = 'îles noires' : Papouasie, Fidji, Vanuatu, îles Salomon. Micronésie = 'petites îles' : Guam, Palaos, Marianes. Polynésie = 'nombreuses îles' : Hawaï, Tahiti, Tonga, Samoa, Nouvelle-Zélande (Māori). Ces trois espaces ont des histoires migratoires différentes. Les Polynésiens ont colonisé le Pacifique avec des pirogues à balancier sans instruments de navigation modernes."},
{theme:"geo",diff:"difficile",type:"q",q:"Quel fleuve partagé entre l'Éthiopie, le Soudan et l'Égypte est au cœur d'une tension géopolitique majeure depuis la construction du barrage de la Renaissance ?",a:"L'eau douce, inégalement répartie et menacée par le changement climatique, devient un enjeu de conflits entre États partageant des fleuves ou des nappes phréatiques",detail:"Le Nil oppose l'Éthiopie (barrage GERD) à l'Égypte et au Soudan. Le Jourdain est source de tension entre Israël, Jordanie et Palestine. L'Aquifère fossile de Nubie (Libye, Tchad, Soudan, Égypte) est non renouvelable. En 2025, 2 milliards de personnes manquent d'eau potable sûre. L'ONU reconnaît l'eau comme droit humain fondamental depuis 2010."},
{theme:"geo",diff:"moyen",type:"q",q:"Quelle est la différence entre climat et météo ?",a:"La météo décrit les conditions atmosphériques à court terme (heures, jours) ; le climat est la moyenne des conditions sur 30 ans dans une région",detail:"On dit souvent : « le climat, c'est ce qu'on attend ; la météo, c'est ce qu'on reçoit. » Le changement climatique modifie les moyennes et les extrêmes (fréquence des canicules, intensité des ouragans) sans supprimer la variabilité météo quotidienne."},
{theme:"geo",diff:"moyen",type:"q",q:"Quel continent n'a aucun État souverain et aucun habitant permanent ?",a:"L'Antarctique",detail:"L'Antarctique est régi par le Traité de 1959 (60 pays signataires) qui gèle les revendications territoriales et réserve le continent à la recherche scientifique. Environ 1 000 à 5 000 chercheurs y séjournent temporairement. Les ressources naturelles (charbon, fer, pétrole) ne peuvent pas être exploitées selon le Protocole de Madrid (1991)."},
{theme:"geo",diff:"moyen",type:"q",q:"À quelle latitude se situent le tropique du Cancer et le tropique du Capricorne, et quelle zone climatique délimitent-ils ?",a:"Les deux parallèles (23°26' N et S) qui délimitent la zone tropicale où le soleil peut être exactement au zénith",detail:"Le tropique du Cancer (23°26' N) passe par le Mexique, l'Algérie, l'Égypte, l'Arabie Saoudite, l'Inde et la Chine. Le tropique du Capricorne (23°26' S) passe par le Brésil, le Chili, l'Afrique du Sud et l'Australie. Entre ces deux parallèles, le climat est tropical ou subtropical."},
{theme:"geo",diff:"moyen",type:"q",q:"Quel est le point le plus à l'est de l'Europe ?",a:"L'Oural (Russie) ou, pour l'UE, le cap Kabrun en Estonie",detail:"La frontière Europe-Asie passe par l'Oural, la mer Caspienne et le Caucase. La définition exacte varie selon les géographes. Pour l'Union européenne, l'île Attu en Alaska (territoire américain) à l'est, et le cap Kabrun en Estonie au nord-est de la Scandinavie constituent les extrémités."},
{theme:"geo",diff:"moyen",type:"q",q:"Quelle est la particularité de la Nouvelle-Zélande en termes de biodiversité ?",a:"Île isolée depuis 80 millions d'années, la Nouvelle-Zélande a développé une faune unique sans mammifères terrestres prédateurs — dominée par les oiseaux dont le kiwi",detail:"Séparée des autres continents avant l'apparition des mammifères, la Nouvelle-Zélande est devenue l'île des oiseaux : kiwi, kakapo, takahé. L'arrivée des Maoris (~1280) puis des Européens (1642) a provoqué des extinctions massives. Le kiwi, incapable de voler et aux pattes robustes, est devenu le symbole national."},
{theme:"geo",diff:"moyen",type:"q",q:"Où se situent les îles Galapagos et pourquoi sont-elles célèbres ?",a:"Archipel équatorial (Équateur) à 1 000 km du continent, cruciale pour la découverte de la théorie de l'évolution par Darwin",detail:"Darwin visite les Galapagos en 1835 lors du voyage du Beagle. Il observe que les pinsons et les tortues géantes diffèrent d'une île à l'autre selon les ressources disponibles. Ces observations alimentent sa réflexion sur la sélection naturelle. Les Galapagos sont classées au patrimoine UNESCO et abritent des espèces trouvées nulle part ailleurs."},
{theme:"geo",diff:"moyen",type:"q",q:"Quel pays est surnommé « les Pays-Bas » et pourquoi une grande partie est sous le niveau de la mer ?",a:"Les Pays-Bas (Nederland = « pays bas ») : 26 % du territoire sous le niveau de la mer, protégé par 3 500 km de digues",detail:"Les Pays-Bas ont « gagné » 20 % de leur territoire sur la mer grâce aux polders (terres asséchées). Les moulins à vent originels servaient à pomper l'eau. Le Delta Works (1953-1997), système de barrages anti-submersion, est considéré comme l'une des 7 merveilles du monde moderne. Le réchauffement climatique et la montée des eaux menacent cette architecture hydraulique unique."},
{theme:"geo",diff:"moyen",type:"q",q:"Quelles grandes civilisations antiques se sont succédé sur les rives de la Méditerranée, faisant d'elle le berceau de l'Occident ?",a:"La mer Méditerranée fut le berceau des civilisations égyptienne, grecque, romaine, arabe — sa géographie favorise les échanges mais aussi les conquêtes",detail:"Entourée de terres (mare nostrum), la Méditerranée est navigable toute l'année et ses vents réguliers (mistral, tramontane, sirocco) étaient prévisibles pour les marins antiques. Cette facilité de navigation a créé un espace d'échanges commerciaux et culturels unique : alphabet phénicien, mathématiques grecques, droit romain, algèbre arabe circulent sur ce lac intérieur."},
{theme:"geo",diff:"moyen",type:"q",q:"Quel est le plus grand lac d'eau douce du monde et où se situe-t-il ?",a:"Le lac Supérieur (82 100 km²), dans les Grands Lacs nord-américains à la frontière Canada-États-Unis",detail:"Les cinq Grands Lacs (Supérieur, Michigan, Huron, Érié, Ontario) forment le plus grand réservoir d'eau douce de surface au monde : 21 % des réserves mondiales. Le lac Baïkal (Russie, 23 000 km²) détient le record de volume et de profondeur (1 637 m). Les Grands Lacs contiennent 84 % des eaux douces de surface d'Amérique du Nord."},
{theme:"geo",diff:"moyen",type:"q",q:"Quels pays bordent la mer Caspienne ?",a:"Russie, Kazakhstan, Turkménistan, Iran, Azerbaïdjan",detail:"La mer Caspienne est la plus grande étendue d'eau fermée du monde (371 000 km²). C'est techniquement un lac, bien que ses dimensions la rapprochent d'une mer. Elle est riche en hydrocarbures (pétrole et gaz) — l'Azerbaïdjan y a bâti sa fortune depuis Bakou. Son niveau a baissé de 2 m depuis 1970 en raison des prélèvements et du réchauffement."},
{theme:"geo",diff:"moyen",type:"q",q:"Entre quels deux pays africains s'étend le Sahel d'ouest en est, et quelle organisation régionale regroupe les États sahéliens depuis 2014 ?",a:"Zone semi-aride de transition entre le Sahara et les savanes africaines, s'étendant du Sénégal à l'Éthiopie — frappée par la désertification, l'insécurité et l'explosion démographique",detail:"Le Sahel (de l'arabe sāhil, 'rive, bord') traverse 10 pays dont le Mali, le Niger, le Burkina Faso et le Tchad. Les précipitations erratiques (300-600 mm/an) nourrissent des cycles de famine. La région est aussi le théâtre d'insurrections djihadistes (Al-Qaida au Maghreb islamique, État islamique en Afrique de l'Ouest) depuis les années 2010."},
{theme:"geo",diff:"moyen",type:"q",q:"Quel pays d'Asie du Sud-Est est un archipel de 17 000 îles et le 4e pays le plus peuplé du monde ?",a:"L'Indonésie (~275 millions d'habitants)",detail:"L'Indonésie s'étend sur 5 100 km d'est en ouest (plus large que les États-Unis continentaux). Elle compte 6 000 îles habitées et 700 langues. Java (145 millions d'habitants) est l'île la plus peuplée au monde. L'Indonésie est la plus grande démocratie musulmane du monde et la 3e démocratie du monde en nombre d'électeurs."},
{theme:"geo",diff:"facile",type:"q",q:"Quel pays est le plus grand producteur de café au monde ?",a:"Le Brésil (produit ~40 % du café mondial)",detail:"Le Brésil cultive le café depuis 1727, principalement dans les États de Minas Gerais, São Paulo et Paraná. Ses 300 000 producteurs couvrent 2,7 millions d'hectares. Le Vietnam (2e) et la Colombie (3e) suivent loin derrière. La ville de Santos est le principal port d'exportation de café depuis le XIXe siècle."},
{theme:"geo",diff:"facile",type:"q",q:"Quel pays produit l'essentiel des épices du monde, notamment le poivre et la cardamome ?",a:"L'Inde (1er producteur mondial d'épices)",detail:"L'Inde produit et consomme ~70 % des épices mondiales. Le Kerala est le « jardin des épices » (poivre, cardamome, cannelle). C'est pour trouver la route directe des épices indiennes que Vasco de Gama contourne l'Afrique (1498) et que Colomb traverse l'Atlantique. Le commerce des épices a littéralement changé la carte du monde."},
{theme:"geo",diff:"facile",type:"q",q:"Quelle chaîne de montagnes traverse le nord de la France et l'Espagne ?",a:"Les Pyrénées (430 km, culminant au pic d'Aneto 3 404 m côté espagnol et au Vignemale 3 298 m côté français)",detail:"Les Pyrénées forment une barrière naturelle presque continue entre la France et l'Espagne. Elles abritent la petite principauté d'Andorre. Contrairement aux Alpes, elles ont peu de cols praticables en hiver, ce qui a longtemps freiné les échanges. La végétation passe des forêts atlantiques à l'ouest aux garrigues méditerranéennes à l'est."},
{theme:"geo",diff:"facile",type:"q",q:"Quel continent est souvent appelé « le continent rouge » ?",a:"L'Australie, en raison de ses vastes étendues de déserts rouges (oxyde de fer dans les sols)",detail:"L'intérieur de l'Australie, le « Red Centre », est dominé par des déserts à sols rougeâtres. L'Uluru (Ayers Rock), immense monolithe de grès rouge, en est le symbole. L'Australie est aussi parfois appelée « la Terre du bas » ou « Down Under » par les Anglophones."},
{theme:"geo",diff:"facile",type:"q",q:"Quel pays abrite à la fois les Andes, l'Amazonie et les îles Galapagos ?",a:"L'Équateur",detail:"Malgré sa petite taille (283 000 km²), l'Équateur est l'un des pays de la plus grande biodiversité au monde. Les Andes le traversent du nord au sud, l'Amazonie couvre son est, les côtes pacifiques son ouest, et les Galapagos sont à 1 000 km au large. Il doit son nom à l'équateur qui le traverse à Quito."},
{theme:"geo",diff:"facile",type:"q",q:"Quelle ville est la capitale mondiale du tango ?",a:"Buenos Aires (Argentine)",detail:"Le tango naît à la fin du XIXe s. dans les quartiers populaires de Buenos Aires et Montevideo, mêlant influences africaines, gaucho et européennes (immigration italienne et espagnole). Il est inscrit au patrimoine immatériel de l'UNESCO depuis 2009. Buenos Aires, avec ses quartiers La Boca et San Telmo, en est le cœur vivant."},
{theme:"geo",diff:"facile",type:"q",q:"Quel pays scandinave est célèbre pour les aurores boréales ?",a:"La Norvège (notamment Tromsø, au-delà du cercle polaire arctique) — mais aussi Finlande, Suède, Islande et Canada",detail:"Les aurores boréales (Aurora borealis) sont causées par des particules solaires qui ionisent l'atmosphère en suivant les lignes du champ magnétique terrestre. Elles sont visibles principalement entre les latitudes 60° et 75° N, surtout en hiver. Tromsø, en Norvège, est considérée comme la capitale mondiale de l'observation des aurores."},
{theme:"geo",diff:"facile",type:"q",q:"Quel est le nom de l'archipel atlantique appartenant à la France et situé près du Canada ?",a:"Saint-Pierre-et-Miquelon",detail:"Cet archipel de 242 km² est l'ultime vestige de la présence française en Amérique du Nord. Situé à 25 km des côtes de Terre-Neuve (Canada), il est une collectivité territoriale française avec 6 000 habitants. Il bénéficie de son propre fuseau horaire (UTC-3:30) et sa pêche à la morue a été l'activité principale pendant des siècles."},
{theme:"geo",diff:"facile",type:"q",q:"Quel fleuve est le plus long d'Europe ?",a:"La Volga (3 690 km, en Russie)",detail:"La Volga prend sa source dans les collines de Valdaï et se jette dans la mer Caspienne à Astrakhan, formant un delta de 160 km de large. Elle est souvent appelée « Mère Volga » (Matouchka Volga) par les Russes. Stalingrad (aujourd'hui Volgograd) doit son importance stratégique à sa position sur ce fleuve."},
{theme:"geo",diff:"facile",type:"q",q:"Quel est le pays le moins densément peuplé du monde (hors Antarctique) ?",a:"La Mongolie (~2 hab/km² pour 3 millions d'habitants sur 1,56 million de km²)",detail:"La Mongolie, prise entre la Russie et la Chine, est dominée par les steppes, le désert de Gobi et les montagnes. Un tiers de la population est nomade ou semi-nomade. Oulan-Bator concentre la moitié de la population totale du pays. Autrefois cœur du plus grand empire terrestre (XIIIe s.), la Mongolie est aujourd'hui l'un des pays les plus vides du monde."},
{theme:"geo",diff:"facile",type:"q",q:"Quel bras de mer sépare la Grande-Bretagne de la France ?",a:"La Manche (minimum 34 km au détroit de Douvres-Calais)",detail:"La Manche est l'une des voies maritimes les plus fréquentées du monde. Le tunnel sous la Manche (Eurotunnel, inauguré en 1994) la franchit en 35 minutes sous l'eau. Les tentatives de traversée à la nage de la Manche commencèrent avec Matthew Webb en 1875 (21h45 min)."},
{theme:"geo",diff:"moyen",type:"q",q:"Combien de pays font partie de l'Espace Schengen en 2024, et quel grand pays européen n'en est toujours pas membre ?",a:"Zone de libre circulation des personnes sans contrôle aux frontières intérieures — 29 pays européens en 2025",detail:"L'accord de Schengen (1985, Luxembourg) supprime les contrôles aux frontières intérieures. Elle couvre 26 pays de l'UE et 3 hors-UE (Islande, Liechtenstein, Norvège et Suisse). La Roumanie et la Bulgarie ont rejoint l'espace terrestre en 2024. Le Royaume-Uni n'en a jamais fait partie."},
{theme:"geo",diff:"moyen",type:"q",q:"Quelle est la capitale politique de l'Union européenne et où siège le Parlement européen ?",a:"Bruxelles accueille la Commission et le Conseil ; le Parlement européen siège à Strasbourg (sessions plénières) et Bruxelles (commissions)",detail:"L'UE a un système institutionnel bicéphale : la Commission européenne (exécutif, Bruxelles), le Conseil de l'UE (ministres des États membres, Bruxelles), le Parlement européen (Strasbourg et Bruxelles) et la Cour de justice (Luxembourg). Ce morcellement géographique est le résultat de compromis politiques."},
{theme:"geo",diff:"moyen",type:"q",q:"Quelle est la particularité géologique des îles Hawaii ?",a:"Archipel volcanique créé par un point chaud fixe dans le manteau terrestre, sur lequel la plaque Pacifique se déplace vers le nord-ouest",detail:"Hawaii est le seul État américain à croître encore : la grande île Hawaii grandit grâce aux éruptions du Kilauea et du Mauna Loa. Les îles du nord-ouest de l'archipel sont plus vieilles et plus érodées. La chaîne d'îles Hawaii-Empereur enregistre le passage de la plaque Pacifique sur ce point chaud depuis 80 millions d'années."},
{theme:"geo",diff:"moyen",type:"q",q:"Quels cinq États riverains se partagent et revendiquent les ressources de l'océan Arctique ?",a:"L'océan Arctique et ses côtes sont partagés entre 5 États riverains (Russie, Canada, États-Unis, Norvège, Danemark/Groenland) qui revendiquent son plateau continental",detail:"L'Arctique contiendrait 13 % des réserves mondiales de pétrole non découvertes et 30 % du gaz naturel. La Russie a planté un drapeau en titane au fond de l'Arctique en 2007. La Convention de l'ONU sur le droit de la mer (UNCLOS) régit ces revendications. Le recul des glaces ouvre de nouvelles routes maritimes et intensifie les rivalités."},
{theme:"geo",diff:"moyen",type:"q",q:"Quels sont les pays de l'Asean et que représente cette organisation ?",a:"10 pays d'Asie du Sud-Est (Indonésie, Malaisie, Philippines, Singapour, Thaïlande, Brunei, Vietnam, Laos, Myanmar, Cambodge) — 670 millions d'habitants, 3e économie mondiale si on la considère comme une seule entité",detail:"Fondée en 1967, l'ASEAN promeut la stabilité régionale et l'intégration économique. Elle a évité les conflits armés entre ses membres depuis sa création. Son PIB combiné dépasse 3 000 milliards de dollars. La Birmanie (Myanmar) est suspendue des réunions des dirigeants depuis le coup d'État de 2021."},
{theme:"geo",diff:"moyen",type:"q",q:"Quel pays, bâti sur le plus grand delta du monde, est particulièrement menacé par la montée des eaux et les cyclones ?",a:"Le plus grand delta du monde (100 000 km²), partagé entre le Bangladesh et l'Inde, menacé par la montée des eaux et les cyclones",detail:"Le delta Gange-Brahmapoutre abrite 170 millions de personnes, dont les Sundarbans (plus grande forêt de mangrove du monde). Le Bangladesh, l'un des pays les plus densément peuplés du monde (1 200 hab/km²), verra 20 % de son territoire submergé si les eaux montent d'1 m. Des millions de réfugiés climatiques sont attendus."},
{theme:"geo",diff:"moyen",type:"q",q:"Quelle ville est considérée comme la capitale mondiale de la finance ?",a:"New York (première place financière mondiale par capitalisation boursière) ou Londres (hub mondial du forex et des marchés de gré à gré)",detail:"Le NYSE (New York Stock Exchange) est la première bourse mondiale (~25 000 milliards de dollars de capitalisation). Le marché des changes de Londres (forex) traite ~40 % des transactions mondiales de devises. Avec Hong Kong, Tokyo, Singapour, Zurich et Frankfurt, ces villes forment les nœuds du réseau financier mondial."},
{theme:"geo",diff:"difficile",type:"q",q:"Dans quels pays à forte densité et peu de terres arables l'agriculture hydroponique connaît-elle le développement le plus rapide ?",a:"L'agriculture hors-sol (hydroponique, aéroponique) se développe dans les pays manquant de terres arables — les Pays-Bas sont le 2e exportateur alimentaire mondial malgré seulement 37 000 km²",detail:"Les Pays-Bas exportent ~100 milliards d'euros de produits agricoles par an grâce à l'agriculture sous serre ultra-intensive. Les villes verticales (vertical farming) émergent à Singapour, Japon, États-Unis pour réduire l'empreinte foncière. La surface agricole mondiale est de 1,4 milliard d'ha — dont 50 % est dégradée selon la FAO."},
{theme:"geo",diff:"difficile",type:"q",q:"Pourquoi les Andes abritent-elles les plus grands gisements de cuivre du monde, selon la géographie des plaques tectoniques ?",a:"Les zones de subduction créent des gisements de cuivre, d'or et d'argent (Andes, Ceinture de feu) ; les rifts créent des lacs riches en lithium (Altiplano) ; les collisions continentales stockent le pétrole dans les bassins sédimentaires",detail:"Le cuivre chilien (55 % des réserves mondiales) provient de la subduction Nazca-Amérique du Sud. Le lithium du triangle Chili-Argentine-Bolivie est concentré dans des salars (lacs asséchés) formés par la tectonique andine. Le pétrole du Golfe Persique est piégé dans les bassins sédimentaires comprimés lors de la collision Arabie-Eurasie."},
{theme:"geo",diff:"difficile",type:"q",q:"Dans quel golfe américain une zone morte due à l'eutrophisation s'étend-elle chaque été, alimentée par les engrais du bassin du Mississippi ?",a:"Excès de nutriments (azote, phosphore) dans les mers dû aux engrais agricoles charriés par les fleuves, créant des zones mortes",detail:"Le Mississippi transporte les engrais du Midwest américain vers le Golfe du Mexique, créant une zone morte de 20 000 km². La Baltique, quasi-fermée, accumule les intrants agricoles de toute l'Europe du Nord. La mer Noire a une zone morte permanente en profondeur. L'agriculture intensive, concentrée dans les bassins versants des grands fleuves, pollue directement les mers côtières."},
{theme:"geo",diff:"difficile",type:"q",q:"Quel continent présente le taux de pénétration d'internet le plus faible malgré une croissance rapide, creusant la fracture numérique mondiale ?",a:"L'inégalité d'accès à internet et aux technologies numériques entre pays développés (~90 % de pénétration) et pays moins avancés (~30 %)",detail:"L'Afrique subsaharienne a un taux d'accès internet de ~35 % mais la pénétration mobile y progresse très vite (saut technologique : pas de ligne fixe, direct au mobile). Les câbles sous-marins concentrés entre l'Atlantique Nord et le Pacifique créent une dépendance géographique. L'IA et le big data amplifient la fracture entre pays producteurs et consommateurs de données."},
{theme:"geo",diff:"difficile",type:"q",q:"Sur quel versant alpin l'effet de fœhn produit-il un vent chaud et sec, et quels pays en subissent les effets ?",a:"Vent chaud et sec qui souffle en descente de montagne, résultat de l'évaporation sur le versant au vent et du réchauffement adiabatique à la descente",detail:"Quand une masse d'air humide monte sur les Alpes, elle se refroidit et perd son humidité (pluie sur le versant exposé). En descendant de l'autre côté, elle se réchauffe (~1°C/100 m) mais reste sèche. L'air est donc plus chaud et plus sec à l'arrivée qu'au départ. Le fœhn provoque des incendies en Suisse et en Autriche et peut faire monter les températures de 20°C en quelques heures."},
{theme:"geo",diff:"difficile",type:"q",q:"Quel pourcentage de sa surface la mer d'Aral a-t-elle perdu entre 1960 et 2007, et quelle politique soviétique en est responsable ?",a:"Mer intérieure d'Asie centrale qui a perdu 90 % de sa surface entre 1960 et 2007 à cause de l'irrigation soviétique des cultures de coton",detail:"L'URSS a détourné les deux fleuves alimentant la mer d'Aral (Amou-Daria et Syr-Daria) pour irriguer 6 millions d'ha de coton en Ouzbékistan. La mer s'est asséchée, laissant un désert de sel toxique. Les bateaux reposent dans le désert à 150 km des côtes actuelles. Le Kazakhstan a réhabilité la mer du Nord avec un barrage (Kok-Aral, 2005) mais la mer du Sud est perdue."},
{theme:"geo",diff:"difficile",type:"q",q:"Qui trace en 1893 la ligne Durand entre l'Afghanistan et le Pakistan, divisant les populations pachtounes sans leur consentement ?",a:"Frontière tracée en 1893 entre l'Afghanistan et le Pakistan par un diplomate britannique, sans tenir compte des tribus pachtounes qu'elle divise",detail:"La ligne Durand (2 640 km) coupe en deux l'aire tribale pachtoune. Le Pakistan l'accepte comme frontière internationale ; l'Afghanistan ne l'a jamais reconnue officiellement. Les Taliban, d'origine pachtoune, ignorent cette frontière. La zone tribale (FATA, aujourd'hui KPK) est restée un angle mort des États pendant 70 ans. Ce tracé colonial continue d'alimenter l'instabilité régionale."},
{theme:"geo",diff:"difficile",type:"q",q:"Tous les combien d'années environ le phénomène El Niño se produit-il, et quelles régions du monde subissent sécheresses et inondations à cause de lui ?",a:"Réchauffement périodique (tous les 2-7 ans) des eaux du Pacifique équatorial Est qui perturbe les régimes de précipitations sur toute la planète",detail:"Pendant El Niño, les eaux chaudes qui s'accumulent normalement à l'ouest du Pacifique (Indonésie, Australie) migrent vers l'est (Pérou, Équateur). Conséquences : sécheresse en Australie, Indonésie et Afrique de l'Est ; inondations au Pérou et en Équateur ; cyclones plus intenses dans l'Atlantique. Les années El Niño sont souvent les plus chaudes de l'histoire instrumentale."},
{theme:"geo",diff:"difficile",type:"q",q:"Quel est le plus grand bassin versant du monde, drainant 7 millions de km² vers l'Amazone ?",a:"Territoire dont toutes les eaux ruissellent vers le même exutoire (fleuve, lac, mer) — unité naturelle de gestion hydraulique",detail:"L'Amazone draine 7 millions de km². Le Mississippi draine la moitié des États-Unis. Les bassins versants transcendent les frontières nationales : le Nil traverse 11 pays, le Congo-Zaïre 9. Les conflits de l'eau (barrage Atatürk en Turquie pénalisant Irak et Syrie, Grand barrage de la Renaissance en Éthiopie) se jouent à l'échelle des bassins versants."},
{theme:"geo",diff:"difficile",type:"q",q:"De combien de centimètres Venise s'est-elle enfoncée au cours du XXe siècle, et quel projet d'ingénierie tente d'enrayer ce phénomène ?",a:"Ville construite sur 118 îlots séparés par des canaux dans la lagune adriatique — s'enfonçant de 2 mm/an et menacée par la montée des eaux",detail:"Venise fut fondée sur des pilotis dans une lagune protégée pour fuir les invasions barbares (Ve s.). Pendant 1 000 ans, elle fut la première puissance commerciale méditerranéenne. Aujourd'hui, l'acqua alta (inondation lors des grandes marées) frappe de plus en plus souvent. Le système MOSE (barrières anti-crue mobiles) protège la ville depuis 2020 lors des épisodes exceptionnels."},
{theme:"geo",diff:"facile",type:"q",q:"Quelle est la capitale de l'Inde ?",a:"New Delhi",detail:"New Delhi est la capitale fédérale de l'Inde depuis 1911, construite par les Britanniques pour remplacer Calcutta. Elle forme avec Delhi une métropole de 30 millions d'habitants (3e mondiale). Mumbai est la capitale économique et financière. L'Inde est la plus grande démocratie du monde avec 950 millions d'électeurs."},
{theme:"geo",diff:"facile",type:"q",q:"Quel est le plus grand pays francophone du monde par superficie ?",a:"La République démocratique du Congo (2 344 000 km²)",detail:"La RDC est le 2e plus grand pays d'Afrique après l'Algérie et le plus grand pays francophone du monde. Elle abrite la deuxième forêt tropicale du monde (après l'Amazonie) et d'immenses ressources minières (coltan, cobalt, cuivre). Kinshasa, sa capitale de 15 millions d'habitants, est la 2e plus grande ville francophone du monde."},
{theme:"geo",diff:"facile",type:"q",q:"Quel pays possède le plus de lacs d'eau douce au monde ?",a:"Le Canada (~31 700 lacs de plus de 1 km², plus de 60 % des lacs du monde selon certaines estimations)",detail:"Le Canada possède un nombre astronomique de lacs dû aux glaciations du quaternaire qui ont creusé des milliers de cuvettes. Les Grands Lacs partagés avec les États-Unis s'y ajoutent. La Finlande (« pays des 1 000 lacs ») en a en réalité ~188 000 mais de taille modeste. Le Canada possède 20 % des eaux douces mondiales."},
{theme:"geo",diff:"facile",type:"q",q:"Quel pays d'Asie du Sud-Est est connu pour ses rizières en terrasses classées à l'UNESCO ?",a:"La Chine (Longji), les Philippines (Banaue) et l'Indonésie (Jatiluwih à Bali) — mais le Vietnam (vallée de Mu Cang Chai) est aussi célèbre",detail:"Les rizières en terrasses, taillées à flanc de montagne depuis 2 000 ans, permettent de cultiver le riz sur des pentes impraticables autrement. Chaque terrasse retient l'eau grâce à de petites diguettes. Ces paysages agro-culturels reflètent des siècles de savoir-faire hydraulique. Les terrasses de Banaue aux Philippines sont un bien culturel du patrimoine mondial UNESCO."},
{theme:"geo",diff:"facile",type:"q",q:"Quel est le seul pays d'Amérique du Sud à avoir l'anglais comme langue officielle ?",a:"Le Guyana (ancienne Guyane britannique)",detail:"Le Guyana (à ne pas confondre avec la Guyane française, département français) est le seul État d'Amérique du Sud avec l'anglais comme langue officielle. Il borde le Venezuela, le Brésil et le Suriname. La découverte de pétrole offshore en 2015 a transformé son économie."},
{theme:"geo",diff:"moyen",type:"q",q:"En quelle année Frederick Jackson Turner présente-t-il sa thèse sur la frontier américaine, et à quelle occasion historique le fait-il ?",a:"Hypothèse (1893) selon laquelle l'expansion vers l'Ouest a forgé le caractère américain (individualisme, démocratie, pragmatisme) — controversée car ignorant les peuples autochtones",detail:"Turner argumente que la frontière móbile (de l'Est vers l'Ouest de 1607 à 1890) explique la démocratie américaine : les colons repartant de zéro n'avaient nul besoin des hiérarchies européennes. La frontière ayant disparu en 1890 (selon le Bureau du recensement), Turner s'inquiète pour l'avenir de la démocratie américaine. Cette thèse a influencé la politique étrangère américaine (impérialisme comme continuation de la frontière)."},
{theme:"geo",diff:"moyen",type:"q",q:"Lors de quelle conférence de 1884-1885 les puissances européennes tracent-elles les frontières rectilignes de l'Afrique, ignorant les réalités ethniques ?",a:"La conférence de Berlin (1884-1885) a tracé des frontières africaines rectiligne ignorant les réalités ethniques et géographiques — créant des États artificiels aux conflits structurels",detail:"62 % des frontières africaines sont des lignes droites ou suivent des méridiens et parallèles. Le Nigeria regroupe 250 ethnies. La Côte d'Ivoire, le Mali, le Soudan sont des constructions coloniales. Ces frontières séparent parfois des peuples unis (Yoruba entre Nigeria et Bénin) et unissent des ennemis historiques. Elles expliquent en partie l'instabilité politique africaine post-indépendance."},
{theme:"geo",diff:"facile",type:"q",q:"Quel pays abrite le Taj Mahal et où se situe ce monument ?",a:"L'Inde — le Taj Mahal se trouve à Agra, dans l'État de l'Uttar Pradesh",detail:"Le Taj Mahal fut construit par l'Empereur moghol Shah Jahan entre 1631 et 1653 en mémoire de son épouse Mumtaz Mahal. Ce mausolée en marbre blanc est classé au patrimoine UNESCO depuis 1983 et reçoit 7 à 8 millions de visiteurs par an. Il est considéré comme le plus bel exemple d'architecture moghole."},
{theme:"geo",diff:"facile",type:"q",q:"Quel pays d'Afrique est le plus peuplé du continent ?",a:"Le Nigeria (~220 millions d'habitants)",detail:"Le Nigeria est projeté pour dépasser les États-Unis en population avant 2050 et devenir le 3e pays le plus peuplé du monde. Lagos (~15 millions) est la plus grande ville d'Afrique. Le pays est le 1er producteur africain de pétrole et possède la plus grande économie d'Afrique. Il est souvent appelé le « géant de l'Afrique »."},
{theme:"geo",diff:"facile",type:"q",q:"Quel est le plus long fleuve d'Amérique du Sud ?",a:"L'Amazone (6 400 km environ, avec le Maranón comme source principale)",detail:"L'Amazone transporte 20 % de l'eau douce qui rejoint les océans dans le monde. Son embouchure, large de 300 km, rejette 209 000 m³/s d'eau dans l'Atlantique. La question du fleuve le plus long (Amazone vs Nil) dépend de la mesure de la source — longuement débattue."},
{theme:"geo",diff:"moyen",type:"q",q:"Quels pays composent le Maghreb ?",a:"Maroc, Algérie, Tunisie, Libye et Mauritanie (selon la définition large) — ou simplement Maroc, Algérie, Tunisie (sens étroit)",detail:"Le terme Maghreb signifie « le couchant » en arabe. L'Union du Maghreb Arabe (UMA), fondée en 1989, comprend ces 5 pays. Malgré leur proximité géographique, linguistique et culturelle, des tensions politiques (notamment entre Algérie et Maroc sur le Sahara occidental) paralysent toute intégration réelle."},
{theme:"geo",diff:"moyen",type:"q",q:"Que révèle géologiquement la dépression de l'Afar en Éthiopie, l'une des rares zones où un rift continental est observable en surface ?",a:"Zone de rift actif où trois plaques tectoniques s'écartent — l'Afrique de l'Est se sépare lentement du continent, créant en 10 millions d'années un nouvel océan",detail:"Le triangle Afar (Éthiopie-Djibouti-Érythrée) est l'un des seuls endroits où une dorsale médio-océanique est visible sur terre. Le lac Assal (Djibouti, -155 m) est déjà 155 m sous le niveau de la mer. La vallée du Grand Rift africain s'étend sur 6 000 km du Mozambique jusqu'à la mer Rouge. C'est aussi le berceau de l'humanité : Lucy (Australopithecus) y a été découverte."},
{theme:"geo",diff:"moyen",type:"q",q:"Quelle superficie la forêt boréale (taïga) couvre-t-elle, et quels deux pays en abritent la plus grande partie ?",a:"La plus grande forêt du monde (~12 millions de km²), s'étendant du Canada à la Sibérie en passant par la Scandinavie, composée de conifères",detail:"La taïga (de l'altaïque tagay, 'forêt dense') couvre 30 % des forêts mondiales et stocke d'immenses quantités de carbone dans ses sols. Elle abrite l'orignal, le loup, le lynx et des millions d'oiseaux migrateurs. La Russie possède 60 % de la taïga mondiale (Sibérie). Son incendie à cause du réchauffement climatique est une menace majeure."},
{theme:"geo",diff:"difficile",type:"q",q:"Quel pays asiatique, avec un taux de fécondité parmi les plus bas du monde, est le plus avancé dans le défi du vieillissement démographique ?",a:"L'Europe, la Chine, le Japon et la Corée du Sud ont des taux de fécondité inférieurs au seuil de remplacement (2,1) et font face au vieillissement de leur population",detail:"Le Japon a 30 % de sa population âgée de plus de 65 ans. La Chine, après 35 ans de politique de l'enfant unique, vieillit rapidement ('vieillir avant de s'enrichir'). L'Allemagne dépend de l'immigration. Ce déséquilibre démographique entre un Nord vieillissant et un Sud en croissance alimente les migrations internationales et les tensions politiques sur l'immigration."},
// NOUVELLES CARTES HIST. SCIENCES (42 cartes pour atteindre 100),
{theme:"sciences",diff:"facile",type:"q",q:"Qui a développé la théorie de la relativité restreinte en 1905 ?",a:"Albert Einstein, à 26 ans, avec son article sur l'électrodynamique des corps en mouvement",detail:"En 1905, annus mirabilis, Einstein publie 4 articles révolutionnaires : relativité restreinte, effet photoélectrique (Nobel 1921), mouvement brownien et E=mc². Il travaille comme examinateur à l'office des brevets de Berne, sans poste académique. La relativité restreinte découle de deux postulats : les lois de la physique sont identiques dans tous les référentiels inertiels ; la vitesse de la lumière est constante."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui est considéré comme le père de la géométrie et quand a-t-il vécu ?",a:"Euclide d'Alexandrie (~330-270 av. J.-C.), auteur des Éléments",detail:"Les Éléments d'Euclide (13 livres) codifient la géométrie à partir de 5 postulats. C'est le manuel scientifique le plus diffusé de l'histoire après la Bible. Il a été utilisé dans les écoles jusqu'au XXe siècle. Les géométries non-euclidiennes (Bolyai, Lobatchevski, Riemann) remettent en cause le 5e postulat au XIXe s. — menant à la relativité générale d'Einstein."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a découvert la loi de l'attraction gravitationnelle et comment ?",a:"Isaac Newton (1687) — inspiré selon la légende par une pomme tombant d'un arbre",detail:"Newton comprend que la même force qui fait tomber la pomme maintient la Lune en orbite. Sa loi : F = Gm₁m₂/d². Il publie les Principia Mathematica en 1687, ouvrage fondateur de la physique classique. Cette loi prédit le retour des comètes (Halley, 1682) et la position de Neptune (1846). Elle reste valide pour toute application non-relativiste."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a formalisé les lois du mouvement des planètes au début du XVIIe siècle ?",a:"Johannes Kepler (1609-1619), à partir des observations de Tycho Brahe",detail:"Les 3 lois de Kepler : (1) les planètes décrivent des ellipses dont le Soleil est un foyer ; (2) les rayons planète-Soleil balayent des surfaces égales en temps égaux ; (3) T²/a³ = constante. Ces lois, purement empiriques, seront expliquées par la gravitation de Newton. Elles sont encore utilisées pour calculer les trajectoires des sondes spatiales."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a inventé le thermomètre et l'échelle de températures qui porte son nom ?",a:"Gabriel Fahrenheit (1724) pour le mercure et l'échelle Fahrenheit ; Anders Celsius (1742) pour l'échelle centésimale",detail:"Fahrenheit crée le premier thermomètre à mercure précis et fiable (1714) et propose son échelle en 1724 (0°F = mélange eau-sel-glace, 96°F = température du corps humain). Celsius propose l'échelle de 0 à 100 entre fusion et ébullition de l'eau. Les deux échelles coexistent encore (Fahrenheit aux États-Unis, Celsius dans la plupart des pays)."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a découvert l'oxygène et joué un rôle central dans la révolution chimique ?",a:"Carl Wilhelm Scheele (1772) et Joseph Priestley (1774) découvrent l'oxygène indépendamment — Lavoisier comprend son rôle dans la combustion",detail:"Priestley isole le « gaz déphlogistiqué » mais reste prisonnier de la théorie du phlogistique. Lavoisier comprend que ce gaz (qu'il nomme oxygène, 'qui produit des acides') est le principe actif de la combustion et de la respiration. Il détruit la théorie du phlogistique et fonde la chimie moderne avec une nomenclature rigoureuse."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a inventé le premier ordinateur programmable électronique ?",a:"John Mauchly et J. Presper Eckert avec l'ENIAC (1945), mais Alan Turing avait posé les bases théoriques dès 1936",detail:"ENIAC (Electronic Numerical Integrator and Computer) pesait 27 tonnes, utilisait 18 000 tubes à vide et consommait 150 kW. Il pouvait effectuer 5 000 additions par seconde. Le « papier de Turing » de 1936 ('On Computable Numbers') définissait la machine de Turing abstraite, posant les fondements théoriques de l'informatique moderne."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a formulé les lois de la thermodynamique et inventé le concept d'entropie ?",a:"Rudolf Clausius formule le 2e principe et introduit l'entropie (1850-1865) ; Lord Kelvin formule le 1er principe",detail:"Le 1er principe est la conservation de l'énergie. Le 2e principe est la tendance irréversible au désordre (l'entropie d'un système isolé ne peut que croître). Boltzmann donnera une interprétation statistique de l'entropie : S = k·ln(W). Ces deux lois sont parmi les plus universelles de la physique."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a découvert l'électromagnétisme et invente le moteur électrique ?",a:"Michael Faraday (1831) — il découvre l'induction électromagnétique et invente le moteur et la dynamo électriques",detail:"Faraday, autodidacte issu d'une famille pauvre, devient le plus grand expérimentateur de son siècle. Ses carnets de laboratoire montrent une démarche rigoureuse. Maxwell mettra en équations ses découvertes (1865). Sans Faraday, pas d'électricité domestique, pas de moteurs, pas de télécommunications. Einstein avait un portrait de Faraday dans son bureau."},
{theme:"sciences",diff:"moyen",type:"q",q:"Quelle expérience — réelle ou légendaire — Galilée aurait-il menée à la tour de Pise pour démontrer que tous les corps tombent à la même vitesse ?",a:"Galilée démontre que tous les corps tombent à la même vitesse indépendamment de leur masse — contre l'enseignement aristotélicien",detail:"La légende de la tour de Pise (lâcher deux boulets de poids différents) est peut-être inventée, mais Galilée démontre son hypothèse en faisant rouler des billes sur des plans inclinés. Il mesure le temps avec son propre pouls. Cette méthode expérimentale — hypothèse, mesure, calcul — fonde la physique moderne. Newton s'appuiera sur ces travaux pour formuler la gravitation."},
{theme:"sciences",diff:"moyen",type:"q",q:"Quel est le rôle de Marie Curie dans l'histoire des sciences ?",a:"Première femme Prix Nobel (physique 1903, chimie 1911) — elle découvrit le polonium et le radium, établissant la radioactivité comme propriété atomique",detail:"Marie Curie (Sklodowska, 1867-1934) isole le polonium (nommé après sa Pologne natale) et le radium, 10 000 fois plus radioactif que l'uranium. Avec Pierre Curie, elle démontre que la radioactivité est une propriété de l'atome lui-même (pas une réaction chimique). Elle mourra d'anémie aplasique — probablement causée par ses années d'exposition. Son carnet de laboratoire est encore trop radioactif pour être consulté sans protection."},
{theme:"sciences",diff:"moyen",type:"q",q:"Combien d'années Darwin passe-t-il à développer sa théorie avant de la publier, et quel événement le pousse enfin à le faire en 1858 ?",a:"Mécanisme d'évolution où les individus les mieux adaptés survivent et se reproduisent davantage — élaboré après 5 ans de voyage sur le Beagle (1831-1836)",detail:"Darwin observe pendant 5 ans des milliers d'espèces. De retour, il élabore 20 ans la théorie de la sélection naturelle. L'arrivée de la lettre de Wallace (1858) l'oblige à publier L'Origine des espèces en 1859. Le livre, best-seller immédiat, révolutionne la biologie et déclenche une tempête théologique."},
{theme:"sciences",diff:"moyen",type:"q",q:"Qui dresse en 1815 la première carte géologique d'un pays entier en fondant la stratigraphie, et de quel pays s'agit-il ?",a:"William Smith (1815) crée la première carte géologique de Grande-Bretagne en identifiant les couches rocheuses par leurs fossiles caractéristiques",detail:"Smith, ingénieur des canaux, remarque que les mêmes fossiles se trouvent dans les mêmes couches partout en Angleterre. Il déduit que ces couches se sont déposées à des époques différentes. Sa carte (1815) est considérée comme la première carte géologique moderne. Elle permettra de localiser le charbon et de rationaliser les travaux de génie civil."},
{theme:"sciences",diff:"moyen",type:"q",q:"Quel géologue britannique oppose au catastrophisme de Cuvier le principe d'uniformitarisme, influençant profondément Darwin ?",a:"Cuvier (catastrophisme) pense que des crises brutales ont façonné la Terre ; Lyell (uniformitarisme) défend que les mêmes processus lents qu'aujourd'hui expliquent le passé",detail:"Georges Cuvier démontre l'extinction des espèces (1812) en étudiant des mammouths et mastodontes. Il explique ces extinctions par des cataclysmes. Charles Lyell (Principes de géologie, 1830) argumente au contraire pour des processus lents et uniformes (érosion, dépôt). C'est l'uniformitarisme de Lyell qui inspirera Darwin — et qui a raison dans les grandes lignes, même si des catastrophes existent (impact de l'astéroïde K-T)."},
{theme:"sciences",diff:"moyen",type:"q",q:"En quelle année Joseph Lister introduit-il l'acide phénique comme antiseptique en chirurgie, révolutionnant la survie post-opératoire ?",a:"Joseph Lister introduit l'acide phénique (antisepsie) en 1867, réduisant la mortalité post-opératoire de 45 % à 15 % — en appliquant la théorie des germes de Pasteur",detail:"Avant Lister, les chirurgiens opéraient sans se laver les mains, en blouse ensanglantée. La mortalité post-opératoire atteignait 50 %. Lister lit les travaux de Pasteur et asperge ses instruments, plaies et mains d'acide phénique. Les résultats sont spectaculaires. L'antisepsie de Lister est la première application directe de la théorie des germes à la médecine clinique."},
{theme:"sciences",diff:"moyen",type:"q",q:"Qui a découvert les vitamines et comment ?",a:"Casimir Funk coïncide le terme « vitamine » en 1912 — après que Eijkman (1890) avait découvert que le béribéri est causé par une carence alimentaire",detail:"Le béribéri, maladie paralysante, décimait les marins asiatiques consommant du riz poli (blanc). Eijkman observe que les poulets nourris au riz blanc développent le béribéri, guéris par le riz complet. Funk isole le principe actif (vitamine B1, thiamine) et propose que d'autres maladies (scorbut, rachitisme, pellagre) sont des carences similaires. Hopkins et Eijkman partagent le Nobel de médecine en 1929."},
{theme:"sciences",diff:"moyen",type:"q",q:"En quelle année Huygens construit-il la première horloge à pendule, et quelle précision atteint-elle par rapport aux horloges antérieures ?",a:"Galilée découvre les propriétés du pendule (~1602) ; Huygens construit la première horloge à pendule précise (1656), révolutionnant la navigation et la science",detail:"Galilée remarque que la période d'un pendule ne dépend que de sa longueur (isochronisme). Huygens construit une horloge précise à la seconde. Avant, les meilleures horloges perdaient des minutes par jour. Cette précision est cruciale pour la navigation : 4 minutes d'erreur = 1° de longitude = 100 km à l'équateur. Le Prix de Longitude (1714, Grande-Bretagne) stimule l'invention du chronomètre marin (Harrison, 1759)."},
{theme:"sciences",diff:"moyen",type:"q",q:"En quelle année John Dalton propose-t-il sa théorie atomique, et quelle propriété fondamentale attribue-t-il aux atomes d'un même élément ?",a:"Dalton propose que la matière est composée d'atomes indivisibles, chaque élément ayant des atomes de masse caractéristique — posant les bases de la chimie quantitative",detail:"Dalton reprend l'atomisme grec mais le fonde sur des mesures. Il détermine les masses atomiques relatives (H=1) à partir des rapports de composition des composés. Ses Tables of Atomic Weights (1803) sont la première table des éléments. Sa théorie explique pourquoi les éléments se combinent toujours en rapports entiers (loi des proportions multiples)."},
{theme:"sciences",diff:"moyen",type:"q",q:"Quel rôle a joué l'astronomie islamique médiévale dans la conservation et la transmission du savoir antique ?",a:"Les savants islamiques (IXe-XIIe s.) traduisirent, corrigèrent et étendirent l'astronomie ptoléméenne — transmettant ce savoir à l'Europe via l'Espagne",detail:"Al-Battani (858-929) corrige les tables de Ptolémée et mesure l'inclinaison de l'écliptique. Al-Biruni calcule la circonférence de la Terre avec une précision remarquable. L'Almageste de Ptolémée est traduit de l'arabe en latin à Tolède au XIIe s. Les noms d'étoiles (Aldébaran, Altaïr, Bételgeuse) gardent leurs noms arabes."},
{theme:"sciences",diff:"moyen",type:"q",q:"Quel phénomène Thomas Young observe-t-il lors de son expérience de la double fente en 1801, prouvant la nature ondulatoire de la lumière ?",a:"Thomas Young démontre que la lumière produit des interférences (franges lumineuses et sombres) — preuve que la lumière est une onde, contre Newton",detail:"Young fait passer la lumière à travers deux fentes minces et observe un motif de franges d'interférence sur un écran. Seules les ondes peuvent interférer. Cette expérience simple réfute le modèle corpusculaire de Newton. Refaite avec des électrons un par un (1927), elle révèle la dualité onde-corpuscule quantique — l'une des expériences les plus fascinantes de la physique."},
{theme:"sciences",diff:"moyen",type:"q",q:"Combien d'éléments Mendeleïev connaît-il en 1869 quand il publie son tableau périodique, et combien en prédit-il en laissant des cases vides ?",a:"Dmitri Mendeleïev classe les 63 éléments connus par masse atomique croissante et révèle des propriétés périodiques — prédisant 3 éléments inconnus qui seront découverts",detail:"Mendeleïev remarque que les propriétés des éléments se répètent périodiquement. Il laisse des cases vides pour des éléments à découvrir (eka-bore, eka-aluminium, eka-silicium). Le gallium (1875), scandium (1879) et germanium (1886) sont découverts avec les propriétés qu'il avait prédites. La version moderne (118 éléments) est basée sur le numéro atomique (Moseley, 1913)."},
{theme:"sciences",diff:"moyen",type:"q",q:"Quelle unité fondamentale Claude Shannon introduit-il dans sa théorie mathématique de l'information de 1948 ?",a:"Shannon fonde la théorie mathématique de l'information : définit l'entropie de l'information, le bit comme unité, et les limites théoriques de la compression et de la transmission",detail:"Shannon travaille chez Bell Labs. Sa thèse (1948) établit que toute information peut être mesurée en bits (0 ou 1) et définit la capacité maximale d'un canal bruité (théorème de Shannon-Hartley). Cette théorie est le fondement théorique d'internet, de la téléphonie numérique, du CD, du JPEG — de toute communication numérique."},
{theme:"sciences",diff:"difficile",type:"q",q:"Quelle expérience d'Einstein en 1905 sur le mouvement brownien convainc définitivement les sceptiques de l'existence réelle des atomes ?",a:"Mach, Ostwald et d'autres positivistes niaient la réalité des atomes comme entités non observables ; Einstein (1905) et Perrin (1908) la prouvèrent via le mouvement brownien",detail:"À la fin du XIXe s., beaucoup de physiciens pensaient que les atomes n'étaient que des outils mathématiques commodes, sans réalité physique. Einstein calcule en 1905 le mouvement brownien (agitation de particules en suspension) en supposant les atomes réels. Perrin vérifie expérimentalement la formule et mesure la constante d'Avogadro. Ostwald se rend alors à l'évidence."},
{theme:"sciences",diff:"difficile",type:"q",q:"En quelle année Galilée est-il condamné par l'Inquisition pour avoir défendu le système copernicien ?",a:"Copernic (1543) propose l'héliocentrisme ; Galilée (1632) y apporte des preuves télescopiques et est condamné par l'Inquisition ; Newton finalise la synthèse",detail:"Copernic publie son De Revolutionibus sur son lit de mort (1543) pour éviter la censure. L'Église ne condamne le système copernicien officiellement qu'en 1616 — après Galilée. L'Inquisition force Galilée à abjurer en 1633 mais la légende dit qu'il murmura « E pur si muove » (et pourtant elle tourne). Newton clôt le débat en 1687 : la gravitation explique tout le système solaire."},
{theme:"sciences",diff:"difficile",type:"q",q:"Quelle grandeur physique fondamentale Robert Millikan mesure-t-il entre 1909 et 1913 grâce à son expérience des gouttes d'huile ?",a:"Robert Millikan mesure la charge de l'électron en observant la chute de gouttelettes d'huile chargées dans un champ électrique",detail:"Millikan fait tomber des gouttelettes d'huile entre deux plaques chargées. En ajustant la tension, il équilibre la gravité et la force électrique. La charge mesurée est toujours un multiple entier d'une valeur minimale (e = 1,6 × 10⁻¹⁹ C) — prouvant la quantification de la charge. Il reçoit le Nobel en 1923. Controversy : il aurait exclu les résultats non conformes."},
{theme:"sciences",diff:"difficile",type:"q",q:"En quelle année Jonas Salk annonce-t-il son vaccin contre la polio, et combien de cas par an évite-t-il aux États-Unis ?",a:"Jonas Salk (vaccin inactivé, 1955) et Albert Sabin (vaccin oral vivant atténué, 1961) sauvent des millions d'enfants — rivalité scientifique et humaine mémorable",detail:"La polio paralysait 35 000 enfants par an aux États-Unis dans les années 1950. Le test du vaccin Salk (1954) est le plus grand essai clinique de l'histoire : 1,8 million d'enfants. Annoncé le 12 avril 1955 — jour commémoré comme une victoire nationale. Sabin développe un vaccin oral moins cher et plus pratique, qui permet l'éradication dans les pays pauvres. La polio sauvage n'existe plus qu'en Afghanistan et au Pakistan."},
{theme:"sciences",diff:"difficile",type:"q",q:"Comment Ludwig Boltzmann meurt-il en 1906, et quel lien ses contemporains établissent-ils avec le rejet de ses théories ?",a:"Boltzmann explique les lois thermodynamiques par le mouvement statistique de milliards de molécules — attaqué par les positivistes qui niaient les atomes, il se suicida en 1906",detail:"Boltzmann démontre que l'entropie (S = k·ln W) est une mesure du désordre moléculaire. Cette explication statistique de la thermodynamique semble réduire des lois universelles à des probabilités. Mach et Ostwald attaquent son approche. Isolé et dépressif, Boltzmann se pend en 1906 — quelques mois avant que Perrin ne prouve définitivement l'existence des atomes."},
{theme:"sciences",diff:"difficile",type:"q",q:"En quelle année Alessandro Volta invente-t-il la pile électrique, et quelle découverte de Faraday permet ensuite la production industrielle d'électricité ?",a:"Alessandro Volta invente la pile électrique (1800) ; Faraday découvre l'induction électromagnétique (1831) — ces deux inventions fondent toute la civilisation électrique",detail:"La pile de Volta est la première source continue de courant électrique. Elle permet à Davy d'isoler le sodium et le potassium par électrolyse. Faraday découvre qu'un aimant en mouvement génère un courant (induction) et qu'un courant génère un champ magnétique. Il invente la dynamo et le moteur électrique. Maxwell unifie tout en 4 équations. Edison et Tesla industrialisent 60 ans plus tard."},
{theme:"sciences",diff:"difficile",type:"q",q:"Quel mathématicien remporte en 1889 le prix du roi Oscar II en étudiant le problème des trois corps, découvrant au passage le chaos déterministe ?",a:"Le mouvement de trois corps soumis à leur attraction mutuelle n'a pas de solution analytique générale — Poincaré (1890) découvre le chaos en cherchant à le résoudre",detail:"Le problème des deux corps (Soleil-planète) est résolu par Newton. Le problème des trois corps (Soleil-Terre-Lune) est insoluble analytiquement. Poincaré, en cherchant une solution, découvre que certaines trajectoires sont extrêmement sensibles aux conditions initiales — naissance de la théorie du chaos. Cette découverte, ignorée pendant 70 ans, est redécouverte dans les années 1960 par Lorenz (effet papillon)."},
{theme:"sciences",diff:"difficile",type:"q",q:"Quel astrophysicien britannique démontre dans les années 1950 comment les étoiles synthétisent les éléments lourds par fusion nucléaire ?",a:"Les étoiles synthétisent les éléments par fusion nucléaire : H → He (étoiles ordinaires), puis He → C, O, jusqu'au fer (étoiles massives) ; les éléments plus lourds se forment dans les supernovae",detail:"Fred Hoyle et ses collaborateurs (1957) publient B²FH (Burbidge, Burbidge, Fowler, Hoyle) qui explique la nucléosynthèse stellaire. Chaque atome de carbone de notre corps a été forgé dans une étoile disparue. Hoyle forge l'expression « Big Bang » pour se moquer de la cosmologie de Lemaître — mais c'est sa propre théorie de la nucléosynthèse qui est correcte."},
{theme:"sciences",diff:"difficile",type:"q",q:"Quels sont les noms des quatre scientifiques qui contribuent à la découverte de la double hélice de l'ADN en 1953, dont une femme souvent oubliée ?",a:"Linus Pauling (déjà Nobel) propose un modèle à triple hélice erroné en 1953 ; Watson et Crick utilisent sans autorisation la photo 51 de Rosalind Franklin pour déduire le modèle correct à double hélice",detail:"Pauling, le plus grand chimiste de son époque, fait une erreur de débutant (il place les phosphates à l'intérieur). Watson voit sa prépublication et comprend l'erreur. Avec la Photo 51 de Franklin (diffraction X montrant l'hélice), ils construisent le modèle en quelques semaines. Franklin mourra sans Nobel en 1958. Beaucoup considèrent que son exclusion du prix constitue une injustice historique."},
{theme:"sciences",diff:"difficile",type:"q",q:"En quelle année Fleming découvre-t-il la pénicilline par accident, et combien d'années faut-il avant qu'elle soit utilisée en médecine ?",a:"Fleming découvre la pénicilline en 1928, Florey et Chain l'isolent en 1940, l'industrie pharmaceutique la produit en masse pendant la guerre — puis la résistance bactérienne émerge dès 1945",detail:"Fleming avait averti dès 1945 : utiliser trop peu de pénicilline génère des résistances. La 1ère bactérie résistante (staphylocoque résistant à la méticilline, SARM) apparaît en 1961. Aujourd'hui, 700 000 morts/an sont attribuables aux infections résistantes. L'OMS prévoit 10 millions de morts/an en 2050 si rien ne change — dépassant le cancer."},
{theme:"sciences",diff:"difficile",type:"q",q:"Quel rôle ont joué les mathématiques arabes dans la transmission du savoir vers l'Europe médiévale ?",a:"Al-Khwarizmi (IXe s.) invente l'algèbre et vulgarise les chiffres indo-arabes — transmis à l'Europe via Fibonacci (1202) qui convainc les marchands italiens d'adopter ces chiffres",detail:"Le mot « algèbre » vient d'Al-Jabr, titre d'un traité d'Al-Khwarizmi. Le mot « algorithme » vient de la latinisation de son nom. Fibonacci (Leonardo de Pise) découvre les chiffres arabes en Afrique du Nord et publie le Liber Abaci (1202) qui montre leur supériorité pour le commerce. La résistance des « abacistes » (défenseurs des chiffres romains) dure jusqu'au XVe siècle."},
{theme:"sciences",diff:"difficile",type:"q",q:"En quelle année Edwin Hubble publie-t-il sa loi sur l'expansion de l'univers, et quelle « tension » les mesures actuelles révèlent-elles ?",a:"Edwin Hubble (1929) découvre que l'univers est en expansion ; la 'tension de Hubble' (2019-présent) : deux méthodes donnent des valeurs incompatibles — indice d'une physique inconnue",detail:"Hubble mesure que les galaxies s'éloignent d'autant plus vite qu'elles sont lointaines (v = H₀ × d). H₀ est la constante de Hubble. Aujourd'hui, la méthode des étoiles Céphéides donne H₀ ≈ 73 km/s/Mpc ; le rayonnement fossile (Planck) donne H₀ ≈ 67. Cette discordance de 9 % dépasse les marges d'erreur — elle pourrait indiquer une nouvelle physique au-delà du modèle standard."},
{theme:"sciences",diff:"moyen",type:"q",q:"Qui réalise la première greffe du cœur humain, dans quelle ville, et en quelle année ?",a:"Christiaan Barnard réalise la première greffe du cœur humain le 3 décembre 1967 à Cape Town — le patient Louis Washkansky survit 18 jours",detail:"Barnard opère pendant 9 heures en équipe. Le défi technique : mettre au point la circulation extracorporelle (Gibbon, 1953). Washkansky meurt d'une pneumonie — le système immunitaire affaibli par les immunosuppresseurs pour éviter le rejet. La greffe cardiaque devient routinière dans les années 1980 grâce à la cyclosporine (immunosuppresseur). Aujourd'hui 3 500 greffes cardiaques/an dans le monde."},
{theme:"sciences",diff:"moyen",type:"q",q:"Combien de dimensions spatiales la théorie des supercordes postule-t-elle, et pourquoi Karl Popper la considérerait-il comme non scientifique ?",a:"Théorie qui tente d'unifier mécanique quantique et relativité générale en supposant que les particules sont des cordes vibrantes à 10-11 dimensions — mathématiquement cohérente mais impossible à tester",detail:"La mécanique quantique et la relativité générale sont incompatibles dans les conditions extrêmes (singularités, Big Bang). La théorie des cordes, développée depuis les années 1970, propose une unification élégante mais nécessite 10 dimensions et génère 10⁵⁰⁰ univers possibles (paysage de la théorie des cordes). Les détracteurs (Smolin, Woit) dénoncent une théorie irréfutable — donc non-scientifique au sens de Popper."},
{theme:"sciences",diff:"moyen",type:"q",q:"En quelle année Charles Richter crée-t-il son échelle de magnitude des séismes, et par quelle échelle est-elle aujourd'hui officiellement remplacée ?",a:"John Milne invente le sismographe moderne (1880) ; Charles Richter crée son échelle en 1935 ; la magnitude de moment (Mw) la remplace aujourd'hui",detail:"Les premiers sismoscopes chinois datent du IIe siècle (Zhang Heng, 132). Milne installe un réseau mondial de sismographes qui permet de localiser les séismes à distance. L'échelle de Richter (1935) mesure l'amplitude des ondes ; chaque degré = 10 fois plus d'amplitude, 31 fois plus d'énergie. Le séisme du Chili de 1960 (magnitude 9,5) reste le plus puissant jamais enregistré."},
{theme:"sciences",diff:"moyen",type:"q",q:"Qui a découvert les groupes sanguins et pourquoi cette découverte est-elle capitale ?",a:"Karl Landsteiner découvre les groupes ABO en 1901 (Nobel 1930) — ce qui permet les transfusions sanguines compatibles et rend la chirurgie moderne possible",detail:"Avant Landsteiner, les transfusions échouaient souvent mortellement (agglutination des globules rouges incompatibles). Il identifie les groupes A, B, AB et O. Son collaborateur Levine découvre le facteur Rh en 1940. Ces deux systèmes sont encore utilisés pour toutes les transfusions et greffes. Landsteiner, autrichien, reçoit le Nobel de médecine en 1930."},
{theme:"sciences",diff:"moyen",type:"q",q:"En quelle année et sous quel nom le premier homme dans l'espace est-il envoyé par l'URSS, battant les Américains ?",a:"L'URSS lance Spoutnik (1957), envoie Laïka puis Gagarine (1961) avant les Américains — la course à l'espace est une guerre froide technologique autant que scientifique",detail:"Spoutnik (4 oct. 1957) choque les Américains : une bombe atomique soviétique peut atteindre le territoire américain. Le 12 avril 1961, Youri Gagarine boucle un tour de la Terre en 108 minutes. Kennedy réagit en lançant le programme Apollo. L'URSS rate la Lune (fusée N1 échouant 4 fois) mais développe les premières stations spatiales (Saliout, Mir)."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a inventé le chemin de fer à vapeur et en quelle année ?",a:"George Stephenson construit la première ligne commerciale de chemin de fer (Stockton-Darlington, 1825) et la Liverpool-Manchester (1830)",detail:"La locomotive Rocket de Stephenson (1829) gagne la compétition de Rainhill à 47 km/h. La ligne Liverpool-Manchester (1830) est la première ligne interurbaine de passagers. En 30 ans, le réseau ferroviaire britannique atteint 10 000 km. Le chemin de fer révolutionne les transports, l'économie et la géographie humaine."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a inventé la photographie et quand ?",a:"Louis Daguerre (daguerréotype, 1839) en France et William Henry Fox Talbot (calotype, négatif-positif, 1841) en Grande-Bretagne",detail:"Daguerre présente son procédé à l'Académie des sciences le 19 août 1839 — ce jour est considéré comme la naissance de la photographie. Mais c'est le procédé de Talbot (négatif-positif, permettant des copies multiples) qui est l'ancêtre de la photographie moderne. Nicéphore Niépce avait pris la première photo en 1826 (8 heures de pose)."},
{theme:"sciences",diff:"moyen",type:"q",q:"Quelle particule le Grand Collisionneur de Hadrons (LHC) du CERN confirme-t-il en 2012, complétant le Modèle Standard ?",a:"Le LHC du CERN (Genève) est le plus grand instrument scientifique jamais construit — il a confirmé l'existence du boson de Higgs en 2012, dernière pièce manquante du modèle standard",detail:"Le LHC est un tunnel de 27 km sous la frontière franco-suisse où des protons accélérés à 99,9999991 % de la vitesse de la lumière entrent en collision. Le boson de Higgs, prédit en 1964, donne leur masse aux particules élémentaires via le mécanisme de Higgs. Sa découverte complète le Modèle Standard mais laisse ouvertes des questions fondamentales (matière noire, énergie noire, gravité quantique)."},
// FOCUS ALLEMAGNE,
{theme:"histoire",focus:"allemagne",diff:"facile",type:"q",q:"En quelle année l'Allemagne a-t-elle été réunifiée ?",a:"Le 3 octobre 1990",detail:"Après la chute du mur de Berlin (nov. 1989), les négociations « 2+4 » (deux Allemagnes + quatre puissances) aboutissent à la réunification. La RDA est dissoute et ses Länder rejoignent la RFA. Le 3 octobre est aujourd'hui la fête nationale allemande."},
{theme:"histoire",focus:"allemagne",diff:"facile",type:"q",q:"Quelle période désigne-t-on par « Troisième Reich » ?",a:"La dictature nazie de 1933 à 1945",detail:"Hitler est nommé chancelier le 30 janvier 1933. L'Allemagne nazie annexe l'Autriche (Anschluss, 1938), déclenche la Seconde Guerre mondiale (1939) et perpètre la Shoah (6 millions de Juifs assassinés). Le Reich capitule le 8 mai 1945."},
{theme:"histoire",focus:"allemagne",diff:"moyen",type:"q",q:"En quelle année Hitler est-il nommé chancelier, mettant fin à la République de Weimar, et par qui ?",a:"La démocratie allemande de 1919 à 1933, emportée par la crise économique, l'hyperinflation et la montée du nazisme",detail:"Née de la défaite de 1918, la République de Weimar connaît l'hyperinflation catastrophique de 1923 (une miche de pain : 200 milliards de marks), puis la Grande Dépression de 1929. Ces crises discréditent la démocratie et ouvrent la voie à Hitler."},
{theme:"histoire",focus:"allemagne",diff:"moyen",type:"q",q:"Quel traité imposa à l'Allemagne des réparations massives après la Première Guerre mondiale ?",a:"Le traité de Versailles (1919)",detail:"L'Allemagne est déclarée seule responsable de la guerre (clause de culpabilité, art. 231), perd 13 % de son territoire et doit payer 132 milliards de marks-or. Keynes dénonce ces conditions comme une erreur économique. L'humiliation nationale alimentera la montée du nazisme."},
{theme:"histoire",focus:"allemagne",diff:"difficile",type:"q",q:"Combien de synagogues sont incendiées lors de la Nuit de Cristal des 9-10 novembre 1938, et combien de Juifs sont arrêtés ?",a:"Le pogrom des 9-10 novembre 1938 : synagogues incendiées, vitrines brisées, 30 000 Juifs arrêtés",detail:"Organisé par les SA et SS sous prétexte de venger l'assassinat d'un diplomate allemand à Paris, le pogrom détruit 7 500 commerces juifs et 1 400 synagogues. Il marque le passage des discriminations légales à la violence ouverte, prélude à la Solution finale."},
{theme:"histoire",focus:"allemagne",diff:"difficile",type:"d",q:"Nom donné à la politique étrangère de l'Allemagne de l'Ouest cherchant la réconciliation avec l'Est communiste",a:"L'Ostpolitik (Willy Brandt, 1969-1974)",detail:"Willy Brandt, chancelier SPD, normalise les relations avec l'URSS, la Pologne et la RDA. Son geste le plus fort : agenouillé devant le mémorial du ghetto de Varsovie (1970), sans un mot. Il reçoit le Prix Nobel de la paix en 1971. L'Ostpolitik préfigure la détente et prépare la réunification."},
{theme:"geo",focus:"allemagne",diff:"facile",type:"q",q:"Quels sont les quatre plus grands États (Länder) d'Allemagne par superficie ?",a:"Bavière, Basse-Saxe, Bade-Wurtemberg, Brandebourg",detail:"L'Allemagne est divisée en 16 Länder disposant chacun d'un parlement et d'un gouvernement propres. La Bavière (70 550 km²) est de loin le plus grand. Berlin, Hambourg et Brême sont des Länder-villes (Stadtstaaten)."},
{theme:"geo",focus:"allemagne",diff:"facile",type:"q",q:"Quel fleuve traverse Cologne, Düsseldorf et se jette dans la mer du Nord aux Pays-Bas ?",a:"Le Rhin",detail:"Long de 1 230 km, le Rhin est l'artère économique de l'Europe occidentale. Il traverse la Suisse, l'Alsace (frontière franco-allemande), la Ruhr industrielle et les Pays-Bas. La vallée du Rhin moyen et ses châteaux est classée au patrimoine UNESCO."},
{theme:"geo",focus:"allemagne",diff:"moyen",type:"q",q:"Quelle région industrielle allemande, basée autour de la Ruhr, était le cœur de la sidérurgie européenne ?",a:"La Ruhr (Rhénanie-du-Nord-Westphalie)",detail:"La Ruhr abrite Essen, Dortmund, Duisburg et Bochum. Au XIXe et XXe s., elle produisait charbon, acier et armements (Krupp). La désindustrialisation depuis les années 1970 a transformé la région : les anciennes usines deviennent musées et espaces culturels (IBA Emscher Park)."},
