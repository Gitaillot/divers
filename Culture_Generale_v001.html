{theme:"histoire",diff:"difficile",type:"q",q:"Combien de soldats allemands se rendent à Stalingrad en février 1943, et quel général est fait prisonnier par les Soviétiques ?",a:"Bataille la plus meurtrière de l'histoire (800 000 à 2 millions de morts), premier retournement majeur contre l'Allemagne nazie",detail:"Hitler veut Stalingrad pour son symbole (nom de Staline) et ses raffineries. La 6e armée allemande de Paulus est encerclée par l'opération Uranus soviétique (novembre 1942). Paulus capitule le 2 février 1943 : 91 000 soldats faits prisonniers. La Wehrmacht n'avancera plus jamais vers l'est. Point de bascule de la Seconde Guerre mondiale."},
{theme:"histoire",diff:"difficile",type:"q",q:"Quelle loi américaine de 1964 met fin à la ségrégation raciale légale, résultat direct du mouvement des droits civiques ?",a:"Mouvement de résistance non-violente mené par Martin Luther King et d'autres contre la ségrégation raciale, obtenant le Civil Rights Act (1964) et le Voting Rights Act (1965)",detail:"Rosa Parks refuse de céder sa place dans un bus (1955), les sit-ins de Greensboro (1960), la marche sur Washington (« I have a dream », 1963), Selma-Montgomery (1965) — autant de jalons d'un mouvement qui transforme l'Amérique. King est assassiné en 1968. La discrimination légale est abolie mais les inégalités structurelles persistent."},
{theme:"histoire",diff:"difficile",type:"q",q:"Quels territoires Israël conquiert-il lors de la guerre des Six Jours de juin 1967, occupations qui structurent encore le conflit israélo-palestinien ?",a:"Victoire israélienne fulgurante en 6 jours contre l'Égypte, la Jordanie et la Syrie, aboutissant à l'occupation de la Cisjordanie, Gaza, le Sinaï et le Golan",detail:"Israël frappe en premier en détruisant l'aviation égyptienne au sol. En 6 jours il triple sa superficie. L'occupation des territoires palestiniens crée un problème qui empoisonne encore la politique moyen-orientale. L'ONU adopte la résolution 242 (« territoires contre paix ») qui reste le cadre théorique de négociation jusqu'aujourd'hui."},
{theme:"histoire",diff:"difficile",type:"q",q:"Combien d'Arméniens sont massacrés lors du génocide de 1915-1916, et quel empire est responsable de cette extermination ?",a:"Extermination systématique de la population arménienne de l'Empire ottoman, faisant entre 600 000 et 1,5 million de morts",detail:"Le gouvernement Jeunes-Turcs ordonne la déportation et le massacre des Arméniens, accusés de sympathiser avec la Russie ennemie. Les colonnes de déportés meurent de faim, de soif et d'exécutions dans les déserts de Syrie. La Turquie refuse toujours de reconnaître le terme de génocide. Ce premier génocide du XXe s. servira de précédent : Hitler en fera référence."},
{theme:"histoire",diff:"difficile",type:"q",q:"Quelle puissance coloniale est vaincue à Dien Bien Phu en mai 1954, et quelle conférence internationale met ensuite fin à la guerre d'Indochine ?",a:"Défaite décisive de la France face au Viêt Minh, qui met fin à la présence française en Indochine",detail:"Le général Giáp encercle et détruit le camp retranché français en 57 jours. 12 000 soldats français sont capturés. La défaite humiliante provoque la chute du gouvernement français et aboutit aux accords de Genève (juillet 1954) qui partagent le Viêt Nam en deux — semant les graines de la guerre américaine."},
{theme:"histoire",diff:"facile",type:"q",q:"Quelle famille florentine finance la Renaissance italienne au XVe siècle, faisant de Florence le centre culturel de l'Europe ?",a:"Mouvement culturel et artistique du XIVe au XVIe s. marquant un renouveau de l'Antiquité gréco-romaine",detail:"Née à Florence sous les Médicis, la Renaissance produit Léonard, Michel-Ange, Raphaël, Botticelli. Elle remet l'homme au centre (humanisme) contre le théocentrisme médiéval. L'imprimerie de Gutenberg (1450) diffuse ces idées. Elle se propage en Europe du Nord avec Érasme, Shakespeare, Rabelais."},
{theme:"histoire",diff:"facile",type:"q",q:"Qui était Cléopâtre VII et pourquoi est-elle célèbre ?",a:"Dernière reine d'Égypte, alliée de César puis d'Antoine, symbole du déclin de l'Égypte ptolémaïque",detail:"Cléopâtre VII (69-30 av. J.-C.) est la première de sa dynastie à parler égyptien. Elle séduit César pour consolider son trône, puis s'allie à Marc Antoine contre Octave. Vaincus à Actium (31 av. J.-C.), elle se suicide plutôt que d'être exhibée à Rome. L'Égypte devient province romaine."},
{theme:"histoire",diff:"facile",type:"q",q:"Qui est le principal rédacteur de la Déclaration d'indépendance américaine du 4 juillet 1776 ?",a:"Texte fondateur des États-Unis proclamant la séparation d'avec la Grande-Bretagne et l'égalité des hommes",detail:"Rédigée principalement par Thomas Jefferson, elle proclame : « Tous les hommes sont créés égaux. » Elle est adoptée le 4 juillet 1776 — date de la fête nationale américaine. Ses principes (droits naturels, souveraineté populaire) inspirent la Révolution française et toutes les constitutions libérales."},
{theme:"histoire",diff:"facile",type:"q",q:"Quelle capitale l'Empire ottoman conquiert-il en 1453, mettant fin à l'Empire byzantin et marquant la fin du Moyen Âge pour de nombreux historiens ?",a:"Empire turc fondé vers 1299 qui s'étendait sur trois continents et dura jusqu'en 1922",detail:"À son apogée sous Soliman le Magnifique (XVIe s.), l'Empire ottoman contrôle l'Anatolie, le Moyen-Orient, l'Afrique du Nord et les Balkans. Il tient le rôle de « grande puissance » aux portes de l'Europe pendant 6 siècles. Son démembrement après la Première Guerre mondiale (traité de Sèvres puis Lausanne) crée les États du Moyen-Orient actuel."},
{theme:"histoire",diff:"facile",type:"q",q:"Qui était Mahatma Gandhi ?",a:"Leader du mouvement d'indépendance indien, fondateur de la désobéissance civile non-violente",detail:"Gandhi (1869-1948) oppose la résistance non-violente (satyagraha) à l'Empire britannique. Sa Marche du sel (1930) — 388 km à pied pour contester le monopole britannique — est une masterclass de désobéissance civile. L'Inde obtient son indépendance en 1947. Gandhi est assassiné par un nationaliste hindou en janvier 1948."},
{theme:"histoire",diff:"facile",type:"q",q:"Quel est le rôle des Croisades dans l'histoire médiévale ?",a:"Guerres saintes lancées par la papauté entre 1095 et 1291 pour reprendre Jérusalem aux musulmans",detail:"8 croisades officielles. La première (1099) prend Jérusalem dans un bain de sang. La 4e (1204) dévie sur Constantinople chrétienne — scandal. Les Croisades accélèrent les échanges commerciaux (épices, soie), transmettent les savoirs arabes en Europe (algèbre, médecine) et nourrissent un antisémitisme virulent."},
{theme:"histoire",diff:"facile",type:"q",q:"En quelle année l'apartheid est-il officiellement démantelé en Afrique du Sud, et quelle élection multiraciale s'ensuit en 1994 ?",a:"Système de ségrégation raciale institutionnalisée qui régit l'Afrique du Sud de 1948 à 1991",detail:"L'apartheid (« séparation » en afrikaans) classe les habitants en Blancs, Noirs, Coloureds et Indiens avec des droits radicalement différents. Nelson Mandela est emprisonné 27 ans pour avoir combattu ce système. Il est libéré en 1990, élu président en 1994. L'Afrique du Sud négocie sa transition sans guerre civile — un miracle fragile."},
{theme:"histoire",diff:"moyen",type:"q",q:"Quelle puissance coloniale mène la guerre des Boers contre les républiques afrikaaners du Transvaal et de l'Orange State en Afrique du Sud ?",a:"Conflit entre l'Empire britannique et les républiques boers (Afrikaner) d'Afrique du Sud pour le contrôle des mines d'or",detail:"Les Britanniques inventent les camps de concentration pour interner les populations civiles boers. 26 000 femmes et enfants y meurent. C'est la première utilisation moderne de ce type de camp. Les Boers capitulent mais obtiennent une large autonomie. L'or et les diamants restent dans l'Empire."},
{theme:"histoire",diff:"moyen",type:"q",q:"Dans quel discours de 1947 le président Truman annonce-t-il son aide à la Grèce et à la Turquie contre le communisme, fondant la doctrine qui porte son nom ?",a:"Engagement américain à soutenir tout peuple menacé par le communisme — acte fondateur de la politique de containment",detail:"Truman demande au Congrès 400 millions de dollars pour la Grèce et la Turquie menacées. Il formule la doctrine : les États-Unis défendront partout la liberté contre la tyrannie. Cette doctrine justifiera l'intervention en Corée, au Viêt Nam, en Amérique latine — et définit la politique étrangère américaine jusqu'à la chute de l'URSS."},
{theme:"histoire",diff:"moyen",type:"q",q:"En quelle année Lénine lance-t-il la NEP, et pourquoi cette retraite tactique vers une économie mixte est-elle nécessaire après la guerre civile ?",a:"Retour temporaire à certains mécanismes de marché en URSS (1921-1928) pour relancer une économie ruinée par la guerre",detail:"La NEP autorise le commerce privé et les paysans à vendre leurs surplus. Elle sauve l'URSS de la famine. Lénine la présente comme « un pas en arrière pour mieux avancer ». Staline l'abandonne en 1928 pour la collectivisation forcée. La NEP est aujourd'hui citée par les réformateurs chinois comme modèle."},
{theme:"histoire",diff:"moyen",type:"q",q:"Quel traité de 1494 partage le monde entre l'Espagne et le Portugal, et quelle autorité religieuse en est le médiateur ?",a:"Accord entre l'Espagne et le Portugal divisant le monde en deux zones d'exploration exclusives",detail:"Le pape Alexandre VI trace une ligne à 370 lieues à l'ouest des Açores. Tout à l'ouest revient à l'Espagne, tout à l'est au Portugal — expliquant pourquoi le Brésil est lusophone. Ce traité illustre l'arrogance européenne qui « partage » des territoires habités par des millions de personnes sans les consulter."},
{theme:"histoire",diff:"moyen",type:"q",q:"Qui était Ibn Battuta et pourquoi est-il remarquable ?",a:"Voyageur et géographe marocain du XIVe s. qui parcourut 120 000 km en 30 ans — plus que Marco Polo",detail:"Ibn Battuta (1304-1368/69) visite 44 pays actuels : Afrique du Nord, Moyen-Orient, Inde, Chine, Mali, Russie. Son récit (la Rihla) décrit en détail les sociétés, cours et coutumes. Alors que Marco Polo est célébré en Occident, Ibn Battuta reste méconnu — le voyageur le plus prolifique de l'histoire prémoderne."},
{theme:"histoire",diff:"moyen",type:"q",q:"Quel slogan résume l'ambition de la Révolution Meiji au Japon, cherchant à moderniser le pays tout en préservant ses valeurs nationales ?",a:"Modernisation accélérée du Japon qui en fait en 40 ans une puissance industrielle et militaire capable de battre la Russie",detail:"L'ère Meiji abolit le système féodal des samouraïs, adopte une constitution, crée une armée moderne, industrialise le pays. En 1905, le Japon bat la Russie (guerre russo-japonaise) — première victoire d'un pays asiatique sur une puissance européenne. Le Japon devient une puissance impériale qui inquiète l'Occident."},
{theme:"histoire",diff:"moyen",type:"q",q:"Quelle distance l'Armée rouge chinoise parcourt-elle lors de la Longue Marche de 1934-1935, et combien de soldats en reviennent vivants ?",a:"Retraite stratégique de l'Armée rouge chinoise de Mao Zedong sur 12 000 km pour échapper aux nationalistes de Tchang Kaï-chek",detail:"100 000 hommes partent du Jiangxi ; 8 000 arrivent au Shaanxi un an plus tard. La Longue Marche est une catastrophe militaire transformée en épopée fondatrice. Elle forge la légitimité de Mao et son emprise sur le Parti communiste. Elle reste le mythe fondateur de la République populaire de Chine."},
{theme:"histoire",diff:"difficile",type:"q",q:"Quel empire impose au XIIIe siècle la Pax Mongolica sur la route de la soie, reliant la Chine à l'Europe ?",a:"Période de stabilité relative imposée par l'empire mongol sur la route de la soie, favorisant commerce et échanges culturels entre l'Europe et l'Asie",detail:"Sous la Pax Mongolica, des marchands, diplomates et missionnaires traversent l'Asie en sécurité relative. Marco Polo en bénéficie. Les transferts de technologie (papier, imprimerie, poudre à canon) s'accélèrent vers l'Europe. Mais les Mongols transmettent aussi la Peste Noire depuis l'Asie centrale."},
{theme:"histoire",diff:"difficile",type:"q",q:"Par quel compromis de 1820 le Congrès américain tente-t-il de maintenir l'équilibre entre États esclavagistes et États libres ?",a:"Accord américain tentant de préserver l'équilibre entre États esclavagistes et États libres en admettant le Missouri comme État esclavagiste et le Maine comme État libre",detail:"Ce compromis repousse la guerre civile de 40 ans mais illustre l'impossibilité de maintenir indéfiniment l'union entre Nord et Sud. Son abrogation par le Kansas-Nebraska Act (1854) rouvre la question et précipite la guerre civile. Lincoln dira que cette question ne peut se résoudre que par les armes."},
{theme:"histoire",diff:"difficile",type:"q",q:"Quel historien grec, lui-même général athénien, rédige le récit de la Guerre du Péloponnèse (431-404 av. J.-C.) ?",a:"Conflit qui opposa Athènes et Sparte pour l'hégémonie sur la Grèce, décrit par Thucydide — et qui ruina les deux cités",detail:"Thucydide, exilé, écrit la première histoire « scientifique » de ce conflit en cherchant les causes profondes (la peur spartiate de la puissance athénienne). Athènes est affaiblie par la peste de 430, la désastreuse expédition en Sicile (415-413) et la trahison d'Alcibiade. Sparte vainc mais s'épuise aussi. C'est Macédoine qui ramassera la mise."},
{theme:"histoire",diff:"difficile",type:"q",q:"Combien de victimes le régime de Pol Pot fait-il au Cambodge entre 1975 et 1979, sur une population d'environ 8 millions ?",a:"Régime génocidaire des Khmers rouges qui vida les villes, abolit la monnaie et tua entre 1,5 et 2 millions de personnes (25 % de la population)",detail:"Pol Pot proclame l'« An Zéro » : tous les citadins sont forcés aux travaux des champs, les intellectuels, médecins et enseignants sont exécutés. Le port de lunettes suffit à être suspect. Les charniers (Killing Fields) sont découverts après l'invasion vietnamienne de 1979. Le procès des dirigeants khmers ne s'achève qu'en 2018."},
{theme:"histoire",diff:"difficile",type:"q",q:"Par quel concordat de 1122 la querelle des investitures entre le pape et l'Empereur du Saint-Empire prend-elle fin ?",a:"Conflit entre la papauté et le Saint-Empire sur le droit de nommer les évêques — résolu par le Concordat de Worms",detail:"L'enjeu : qui contrôle l'Église, le pape ou l'empereur ? Henri IV doit faire pénitence devant Grégoire VII à Canossa (1077) — humiliation symbolique immense. Le Concordat de Worms (1122) distingue l'investiture spirituelle (pape) et temporelle (empereur). Cette querelle affaiblit durablement le pouvoir impérial en Allemagne."},
{theme:"histoire",diff:"difficile",type:"q",q:"Combien de jours dure la crise des missiles de Cuba en octobre 1962, et qui sont les deux dirigeants en face-à-face ?",a:"13 jours de confrontation nucléaire entre les États-Unis et l'URSS, épisode le plus dangereux de la Guerre froide",detail:"Kennedy découvre des missiles soviétiques à Cuba. Il impose un blocus naval. Khrouchtchev propose le retrait des missiles cubains contre la garantie américaine de ne pas envahir Cuba (et, secrètement, le retrait des missiles américains de Turquie). Un sous-marin soviétique B-59, isolé, fut à deux doigts de lancer une torpille nucléaire."},
{theme:"histoire",diff:"difficile",type:"q",q:"Dans quelle ville yougoslave le mouvement des Non-Alignés est-il fondé en 1961, et qui en accueille le premier sommet ?",a:"Coalition de pays refusant de s'aligner sur les blocs soviétique ou américain pendant la Guerre froide",detail:"Fondé à Belgrade par Tito (Yougoslavie), Nehru (Inde), Nasser (Égypte), Sukarno (Indonésie) et Nkrumah (Ghana). En théorie, une « troisième voie » ; en pratique, beaucoup de membres reçoivent de l'aide des deux superpuissances simultanément. Le mouvement survit à la Guerre froide avec 120 membres mais une cohérence réduite."},
{theme:"histoire",diff:"difficile",type:"q",q:"Quel conflit médiéval la loi salique est-elle invoquée pour justifier, excluant les femmes du trône de France ?",a:"Loi franque excluant les femmes de la succession au trône de France, invoquée pour écarter plusieurs prétendantes et déclencher la Guerre de Cent Ans",detail:"En 1328, Charles IV meurt sans héritier mâle. Édouard III d'Angleterre revendique le trône via sa mère. Les légistes français invoquent une loi Salic pour l'écarter. Cette interprétation — contestée — déclenche la Guerre de Cent Ans. La loi Salic sera maintenue jusqu'à la Révolution française."},
{theme:"histoire",diff:"difficile",type:"q",q:"Quelle dynastique chinoise généralise le système des concours mandarinaux, ouvrant en théorie la haute administration à tous les lettrés ?",a:"Système bureaucratique basé sur des concours impériaux ouverts en théorie à tous, qui sélectionnait les fonctionnaires sur leur maîtrise des textes confucéens",detail:"Instauré sous les Han, perfectionné sous les Tang et Song, le système des examens (keju) permet à des roturiers d'accéder aux plus hautes fonctions — en théorie. En pratique, seuls les riches peuvent se payer des années d'études. Ce système a assuré la continuité de la civilisation chinoise pendant 2 000 ans. Il est aboli en 1905."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a inventé l'imprimerie à caractères mobiles en Europe vers 1450 ?",a:"Johannes Gutenberg",detail:"Gutenberg adapte la presse à vis (utilisée pour le vin) pour imprimer avec des caractères en alliage de plomb. Sa Bible à 42 lignes (1455) est le premier livre imprimé en Europe. En 50 ans, 8 millions de livres circulent — plus qu'en toute l'histoire précédente. L'imprimerie est le moteur de la Réforme et de la Renaissance."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a décrit le premier la circulation sanguine de façon complète en 1628 ?",a:"William Harvey",detail:"Harvey démontre par expérience que le sang circule en circuit fermé propulsé par le cœur — contre 1400 ans de dogme galénique. Son traité De Motu Cordis est un modèle de raisonnement expérimental. Il mesure le volume d'éjection systolique et conclut mathématiquement que le sang doit circuler."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a inventé le téléphone en 1876 ?",a:"Alexander Graham Bell (breveté le 7 mars 1876)",detail:"Bell dépose son brevet quelques heures avant son rival Elisha Gray. Sa première phrase transmise : « Mr Watson, come here, I want to see you. » La paternité est contestée — l'inventeur italo-américain Antonio Meucci avait protégé un concept similaire dès 1871 mais n'avait pas les moyens de renouveler son brevet."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a découvert la radioactivité en 1896 ?",a:"Henri Becquerel",detail:"Becquerel découvre par accident que des sels d'uranium impressionnent une plaque photographique même dans l'obscurité. Il confie le sujet à ses doctorants Pierre et Marie Curie, qui vont l'approfondir considérablement. Les trois partagent le Nobel de physique en 1903. Marie Curie sera la seule à recevoir deux Prix Nobel."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a inventé la machine à vapeur pratique, moteur de la révolution industrielle ?",a:"James Watt (1769), perfectionnant la machine de Newcomen",detail:"Thomas Newcomen avait créé une première machine à vapeur en 1712 pour pomper l'eau des mines. Watt améliore radicalement son rendement en ajoutant un condenseur séparé. Sa machine rotative (1781) peut entraîner n'importe quelle machine. Il invente aussi le concept de « cheval-vapeur » pour vendre ses machines."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a inventé l'ampoule électrique à filament durable en 1879 ?",a:"Thomas Edison (et Joseph Swan indépendamment en Grande-Bretagne)",detail:"Edison met au point un filament de carbone carbonisé capable de tenir 1 200 heures. Mais son génie est autant commercial que technique : il invente simultanément le réseau de distribution électrique, les compteurs et les prises. Son usine de Menlo Park est le premier laboratoire de R&D industrielle de l'histoire."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a réalisé le premier vol motorisé de l'histoire en 1903 ?",a:"Orville et Wilbur Wright à Kitty Hawk (Caroline du Nord)",detail:"Le Flyer I vole 12 secondes sur 36 mètres le 17 décembre 1903. Les frères Wright sont des réparateurs de bicyclettes autodidactes qui ont résolu le problème du contrôle latéral (gauchissement des ailes) que les ingénieurs diplômés avaient ignoré. Leur quatrième vol du même jour atteint 59 secondes."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a découvert les lois de l'hérédité en étudiant des pois dans un jardin monastique ?",a:"Gregor Mendel (années 1860, publié en 1866)",detail:"Le moine augustinien Mendel croise 29 000 plants de pois pendant 8 ans et découvre les lois de transmission des caractères héréditaires (dominance, ségrégation, assortiment indépendant). Son travail est ignoré pendant 35 ans jusqu'à sa redécouverte en 1900 — qui fonde la génétique moderne."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a inventé le vaccin contre la variole à la fin du XVIIIe siècle ?",a:"Edward Jenner en 1796",detail:"Jenner observe que les laitières contractant la vaccine (maladie bénigne des vaches) ne tombent pas malades lors des épidémies de variole. Il inocule du pus de vaccine à un enfant de 8 ans, puis l'expose à la variole : l'enfant est protégé. La variole sera la première maladie éradiquée par la vaccination (1980)."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a découvert la pénicilline et dans quelles circonstances ?",a:"Alexander Fleming en 1928 — en observant qu'une moisissure avait contaminé et détruit sa culture de staphylocoques",detail:"Fleming rentre de vacances et remarque qu'une moisissure (Penicillium notatum) a colonisé sa boîte de Petri et tué les bactéries autour d'elle. Il publie en 1929 mais ne réussit pas à isoler le principe actif. Florey et Chain y parviennent en 1940 et sauvent des millions de vies pendant la Seconde Guerre mondiale."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a posé les bases de l'électromagnétisme en démontrant le lien entre électricité et magnétisme ?",a:"Hans Christian Ørsted (1820), puis Faraday et Maxwell",detail:"Ørsted remarque qu'un fil parcouru par un courant fait dévier une boussole. Faraday découvre l'induction électromagnétique (1831) et invente le moteur électrique. Maxwell unifie tout en 4 équations (1865) et prédit les ondes radio — que Hertz démontrera en 1887. Cette chaîne mène directement à toute l'électronique moderne."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a inventé le moteur à explosion et la première automobile à essence ?",a:"Karl Benz avec sa Motorwagen (1885), brevetée en janvier 1886",detail:"Benz construit un tricycle à moteur à 4 temps de 0,75 CV. Sa femme Bertha effectue le premier long trajet automobile de l'histoire (106 km, Mannheim-Pforzheim) en 1888 sans le lui dire — un coup de pub génial. Gottlieb Daimler développe parallèlement un moteur similaire. Les deux compagnies fusionneront en Mercedes-Benz en 1926."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a découvert les rayons X et quand ?",a:"Wilhelm Röntgen en novembre 1895",detail:"Röntgen expérimente avec des tubes cathodiques quand il remarque qu'un écran fluorescent s'illumine à distance. Il passe 6 semaines à étudier secrètement ce nouveau rayonnement avant de publier. La première radiographie est la main de sa femme. Il refuse de breveter sa découverte pour que l'humanité entière en bénéficie."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a inventé le World Wide Web en 1989 ?",a:"Tim Berners-Lee, physicien britannique au CERN",detail:"Berners-Lee propose un système de partage d'informations pour les physiciens du CERN basé sur des hyperliens. Son patron griffonne sur sa proposition : « Vague mais excitant. » En 1991, le premier site web est en ligne. Berners-Lee refuse de breveter l'invention pour que le Web reste ouvert — décision qui change l'histoire de l'humanité."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a formulé la loi de la gravitation universelle après, dit la légende, avoir observé une pomme tomber ?",a:"Isaac Newton (Principia Mathematica, 1687)",detail:"La légende de la pomme est vraie selon Newton lui-même : une pomme qui tombe lui suggère que la même force pourrait atteindre la Lune. Il faudra 20 ans pour développer la démonstration mathématique complète. Newton est aussi coinventeur du calcul infinitésimal (avec Leibniz) et co-fondateur de l'optique moderne."},
{theme:"sciences",diff:"moyen",type:"q",q:"Quel savant français du XVIIe siècle prend la tête des « Modernes » dans la querelle qui les oppose aux partisans d'Aristote ?",a:"Débat du XVIIe s. sur la supériorité des Anciens (Aristote, Galien) vs les nouvelles découvertes expérimentales — remporté progressivement par les modernes",detail:"Galilée, Harvey, Descartes brisent l'autorité d'Aristote et de Galien. La fondation de la Royal Society (1660) et de l'Académie des sciences (1666) institutionnalise la nouvelle science. Francis Bacon (Novum Organum, 1620) théorise la méthode expérimentale comme alternative à la déduction aristotélicienne."},
{theme:"sciences",diff:"moyen",type:"q",q:"Dans quelles décennies Newton et Leibniz développent-ils indépendamment le calcul infinitésimal, et lequel publie en premier ?",a:"Les deux ont développé le calcul indépendamment dans les années 1660-1680 — mais la guerre de priorité a empoisonné les relations entre mathématiciens anglais et continentaux pendant un siècle",detail:"Newton développe ses « fluxions » vers 1666 mais ne publie pas. Leibniz publie en 1684 avec une notation (dx, dy, ∫) adoptée par toute l'Europe. La Royal Society conclut en 1712 que Leibniz a plagié Newton — verdict partial. Résultat : les mathématiciens britanniques restent isolés avec la notation de Newton, retardant leurs progrès d'un siècle."},
{theme:"sciences",diff:"moyen",type:"q",q:"Quel élément Lavoisier identifie-t-il comme responsable de la combustion, renversant la théorie du phlogistique ?",a:"Lavoisier détruit la théorie du phlogistique et fonde la chimie moderne en identifiant l'oxygène comme élément clé de la combustion",detail:"Georg Stahl avait postulé que les corps brûlent en libérant du « phlogistique ». Lavoisier démontre par pesée précise que la combustion consomme de l'oxygène et que la matière est conservée. Il crée une nomenclature chimique systématique encore utilisée. Guillotiné en 1794, le juge dira : « La République n'a pas besoin de savants. »"},
{theme:"sciences",diff:"moyen",type:"q",q:"En quelle année Darwin publie-t-il De l'origine des espèces, et quel naturaliste arrive simultanément à la même théorie ?",a:"Darwin et Wallace arrivent indépendamment à la théorie de la sélection naturelle — Darwin publie en 1859 après 20 ans de réflexion, poussé par la lettre de Wallace",detail:"Wallace envoie à Darwin en 1858 un article exposant exactement la même théorie. Darwin, paniqué, accélère la rédaction de L'Origine des espèces. Les deux présentent leurs travaux conjointement à la Linnean Society en juillet 1858 — dans une totale indifférence. Le livre de Darwin devient un best-seller immédiat en novembre 1859."},
{theme:"sciences",diff:"moyen",type:"q",q:"Quel résultat négatif l'expérience de Michelson-Morley (1887) produit-elle, et quelle théorie ouvre-t-elle la voie ?",a:"Expérience qui cherchait à mesurer le mouvement de la Terre dans l'éther lumineux — et ne trouva rien, sapant les fondations de la physique classique",detail:"On croyait que la lumière se propageait dans un milieu fixe (l'éther). Michelson et Morley tentent de mesurer la différence de vitesse de la lumière selon la direction. Résultat : aucune différence. Ce résultat « négatif » est une bombe : la physique classique ne peut l'expliquer. Einstein utilisera ce résultat pour construire la relativité restreinte."},
{theme:"sciences",diff:"moyen",type:"q",q:"Qui était Nikola Tesla et quelle est son importance dans l'histoire des sciences ?",a:"Inventeur serbo-américain qui développa le courant alternatif, le moteur à induction et les bases de la radio — souvent éclipsé par Edison",detail:"Tesla et Edison s'opposent dans la « guerre des courants » (1880-1890) : Edison défend le courant continu, Tesla le courant alternatif (AC). Westinghouse adopte le système Tesla qui équipe les chutes du Niagara en 1895. L'AC permet de transporter l'électricité sur de longues distances. Tesla mourra seul et ruiné malgré 300 brevets."},
{theme:"sciences",diff:"moyen",type:"q",q:"Quel rival de Pasteur défend encore la génération spontanée lors du célèbre débat devant l'Académie des sciences en 1864 ?",a:"Théorie selon laquelle les maladies infectieuses sont causées par des micro-organismes — combattue pendant des décennies par la théorie de la génération spontanée",detail:"Pasteur démontre par l'expérience du ballon à col de cygne (1859) que la vie ne naît pas spontanément. Il identifie les bactéries responsables de maladies (choléra des poules, charbon, rage) et développe des vaccins. Ses duels intellectuels avec Pouchet (génération spontanée) et Koch (tuberculose) sont des épisodes dramatiques de l'histoire des sciences."},
{theme:"sciences",diff:"moyen",type:"q",q:"Qui résout la catastrophe ultraviolette en 1900 en introduisant la notion de quantum d'énergie ?",a:"Contradiction de la physique classique qui prédisait qu'un corps chauffé devrait émettre une énergie infinie dans les ultraviolets — résolue par Planck en 1900 en postulant que l'énergie est émise par « quanta »",detail:"Planck lui-même considère son hypothèse quantique comme un artifice mathématique provisoire. Einstein la prend au sérieux en 1905 pour expliquer l'effet photoélectrique. Bohr l'applique à l'atome en 1913. En 25 ans, cette « bidouille » de Planck devient la mécanique quantique — la théorie la plus précise jamais élaborée."},
{theme:"sciences",diff:"moyen",type:"q",q:"Quel système hybride Tycho Brahe propose-t-il pour concilier observations et cosmologie, entre Ptolémée et Copernic ?",a:"Tycho proposa un système hybride (Soleil et Lune tournent autour de la Terre, les autres planètes autour du Soleil) pour concilier observations et théologie",detail:"Tycho Brahe est le plus grand observateur astronomique de l'ère pré-télescopique. Ses données précises permettront à Kepler (son assistant) de déduire les lois des orbites elliptiques. Mais Tycho refuse l'héliocentrisme — la parallaxe des étoiles n'était pas mesurable avec ses instruments, ce qu'il interprète comme une preuve contre Copernic."},
{theme:"sciences",diff:"moyen",type:"q",q:"Qui a découvert la structure de l'ADN et dans quel contexte de rivalité scientifique ?",a:"Watson et Crick (1953), grâce aux données de Rosalind Franklin et en rivalité avec le laboratoire de Linus Pauling",detail:"Pauling, déjà Nobel, propose un modèle à triple hélice erroné en janvier 1953. Watson et Crick obtiennent (sans son autorisation explicite) la Photo 51 de Franklin montrant la structure en hélice. Leur modèle à double hélice est publié en avril 1953. Franklin meurt en 1958 ; le Nobel de 1962 ne peut être décerné à titre posthume."},
{theme:"sciences",diff:"moyen",type:"q",q:"En quelle année le séquençage complet du génome humain est-il annoncé, et qui est en compétition avec le consortium public ?",a:"Programme international (1990-2003) qui séquença l'intégralité du génome humain — en concurrence avec l'entreprise privée Celera de Craig Venter",detail:"La course entre le consortium public (Francis Collins) et Celera (Craig Venter) accélère considérablement le séquençage. Clinton et Blair annoncent conjointement le premier brouillon en juin 2000. Résultat surprenant : l'humain n'a que ~20 000 gènes, moins que certaines plantes. Le génome complet est annoncé en 2003, le 50e anniversaire de Watson-Crick."},
{theme:"sciences",diff:"moyen",type:"q",q:"Quel est le rôle de la Royal Society de Londres dans l'histoire des sciences ?",a:"Fondée en 1660, c'est la plus ancienne académie scientifique active — elle institutionnalise la méthode expérimentale et le peer review",detail:"La Royal Society réunit Boyle, Hooke, Newton, Halley. Sa devise : « Nullius in verba » (ne s'en remettre à la parole de personne). Elle publie les Philosophical Transactions depuis 1665 — la plus ancienne revue scientifique encore en activité. Elle normalise les poids et mesures, finance des expéditions et valide (ou non) les découvertes."},
{theme:"sciences",diff:"moyen",type:"q",q:"Qui propose en 1912 la théorie de la dérive des continents, et pourquoi est-elle rejetée par ses contemporains ?",a:"Alfred Wegener en 1912 — l'idée que les continents se déplacent sur la surface terrestre, rejetée pendant 50 ans avant d'être confirmée par la tectonique des plaques",detail:"Wegener remarque que les côtes africaines et sud-américaines s'emboîtent et que les fossiles des deux côtés de l'Atlantique sont identiques. Il propose un supercontinent originel (Pangée). Ses collègues géologues rejettent violemment sa théorie faute de mécanisme convaincant. Il mourra en 1930 pendant une expédition au Groenland, incompris. La dorsale atlantique, découverte dans les années 1950, le réhabilite."},
{theme:"sciences",diff:"moyen",type:"q",q:"Qui était Ada Lovelace et pourquoi est-elle importante dans l'histoire de l'informatique ?",a:"Mathématicienne britannique (1815-1852) qui écrivit le premier algorithme destiné à être exécuté par une machine — la machine analytique de Babbage",detail:"Lovelace traduit un article sur la machine de Babbage et y ajoute ses propres notes (3 fois plus longues que l'original). Elle y décrit un algorithme pour calculer les nombres de Bernoulli et comprend que la machine pourrait traiter autre chose que des chiffres — de la musique, des symboles. Elle est considérée comme la première programmatrice de l'histoire."},
{theme:"sciences",diff:"moyen",type:"q",q:"Quel physicien britannique calcule au XIXe siècle que la Terre n'a que 20 à 400 millions d'années, contredisant les géologues ?",a:"Lord Kelvin calculait 20-400 millions d'années pour la Terre ; les géologues et Darwin en réclamaient des milliards — la radioactivité donnera raison aux géologues",detail:"Kelvin calcule le refroidissement d'une boule de métal en fusion et conclut à ~20-100 millions d'années. Les géologues (Lyell) et Darwin ont besoin de beaucoup plus pour l'évolution. Kelvin a tort car il ignore la chaleur produite par la radioactivité, découverte en 1896. La Terre a en fait 4,5 milliards d'années."},
{theme:"sciences",diff:"moyen",type:"q",q:"Quel mathématicien indien du VIIe siècle est le premier à formaliser le zéro comme nombre à part entière ?",a:"Concept mathématique développé indépendamment en Inde (Brahmagupta, VIIe s.) et en Méso-Amérique (Mayas) — transmis à l'Europe via les Arabes",detail:"Les Babyloniens avaient un symbole de position vide mais pas un vrai zéro. Brahmagupta (628 ap. J.-C.) pose les règles arithmétiques du zéro et des nombres négatifs. Al-Khwarizmi (IXe s.) propage les chiffres indo-arabes en Europe via l'Espagne. Fibonacci (1202) convainc l'Europe d'adopter ces chiffres contre la résistance des « abacistes » défendant les chiffres romains."},
{theme:"sciences",diff:"difficile",type:"q",q:"Quelle expérience du XIXe siècle tranche en faveur de la nature ondulatoire de la lumière défendue par Huygens contre Newton ?",a:"Newton défendait la théorie corpusculaire (la lumière est faite de particules), Huygens la théorie ondulatoire — Young donnera raison à Huygens en 1801, Einstein compliquera tout en 1905",detail:"Newton explique la réflexion et la réfraction par des corpuscules. Huygens explique la diffraction et les interférences par des ondes. Young prouve les interférences lumineuses (1801) — victoire des ondes. Maxwell identifie la lumière à des ondes électromagnétiques (1865). Einstein montre en 1905 qu'elle se comporte aussi comme des particules (photons). La lumière est les deux — dualité onde-corpuscule."},
{theme:"sciences",diff:"difficile",type:"q",q:"Dans quel pays l'affaire Lysenko provoque-t-elle l'interdiction officielle de la génétique mendélienne, et pendant combien d'années ?",a:"Biologiste soviétique qui nia la génétique mendélienne au profit d'une biologie compatible avec le marxisme — avec l'appui de Staline, il détruisit la biologie soviétique pendant 30 ans",detail:"Trofim Lysenko (1898-1976) prétend que les caractères acquis sont héréditaires (lamarckisme). Staline le soutient : la génétique « bourgeoise » est interdite, des centaines de généticiens sont emprisonnés ou exécutés. L'URSS prend un retard irréversible en biologie. Lysenko n'est discrédité qu'en 1965 sous Khrouchtchev — après avoir causé des famines par ses pseudosciences agricoles."},
{theme:"sciences",diff:"difficile",type:"q",q:"Quel programme de formalisation des mathématiques le théorème d'incomplétude de Gödel (1931) ruine-t-il définitivement ?",a:"Toute théorie mathématique suffisamment puissante contient des propositions vraies mais indémontrables dans ce système — effondrement du programme de Hilbert",detail:"David Hilbert voulait formaliser toutes les mathématiques en un système complet et cohérent. Gödel, à 25 ans, démontre que c'est impossible : dans tout système formel assez riche, il existera toujours des vérités indémontrables. Ce résultat stupéfie les mathématiciens et a des implications philosophiques profondes sur les limites de la connaissance."},
{theme:"sciences",diff:"difficile",type:"q",q:"Quelle expérience célèbre Pasteur réalise-t-il pour réfuter définitivement la génération spontanée défendue par Pouchet ?",a:"Débat public et expérimental sur l'origine de la vie microbienne — Pasteur gagne mais le débat fut plus politique et religieux que purement scientifique",detail:"L'Académie des sciences organise un concours pour trancher. Pasteur filtre l'air, stérilise et démontre qu'aucun micro-organisme n'apparaît sans contamination. Pouchet obtient l'inverse — ses expériences utilisaient du foin contenant des spores thermorésistantes. Victoire de Pasteur, soutenu par l'Église catholique contre le « matérialisme » de la génération spontanée."},
{theme:"sciences",diff:"difficile",type:"q",q:"Quelle célèbre phrase Einstein prononce-t-il pour exprimer son refus du caractère probabiliste de la mécanique quantique ?",a:"Einstein refusait le caractère probabiliste de la mécanique quantique (« Dieu ne joue pas aux dés ») ; Bohr défendait l'interprétation de Copenhague — le débat reste ouvert",detail:"Einstein propose des expériences de pensée (paradoxe EPR, 1935) pour montrer que la MQ est incomplète. Bohr répond à chaque fois. Les expériences d'Aspect (1982) confirment que la mécanique quantique est correcte et que la « réalité locale » d'Einstein est fausse. Mais la question de l'interprétation (Copenhague, mondes multiples…) reste non résolue."},
{theme:"sciences",diff:"difficile",type:"q",q:"Qui était Ignace Semmelweis et pourquoi son histoire est-elle tragique ?",a:"Médecin hongrois qui démontra en 1847 que le lavage des mains réduit la fièvre puerpérale — et fut ridiculisé par ses collègues avant de mourir de la maladie qu'il voulait éradiquer",detail:"Semmelweis observe que les femmes accouchant dans la salle des étudiants (qui viennent des autopsies) meurent 5 fois plus que celles assistées par des sages-femmes. Il impose le lavage au chlore : la mortalité chute de 18 % à 1 %. Ses collègues refusent d'admettre qu'ils tuent leurs patients. Interné en asile en 1865, il y meurt d'une infection — probablement la fièvre puerpérale."},
{theme:"sciences",diff:"difficile",type:"q",q:"Combien d'hommes le programme Apollo envoie-t-il sur la Lune entre 1969 et 1972, et quel est le nom du premier ?",a:"Programme spatial américain qui a envoyé 12 hommes sur la Lune entre 1969 et 1972, mobilisant 400 000 ingénieurs et 25 milliards de dollars",detail:"Kennedy lance le défi en 1961 alors que la NASA n'a que 15 minutes de vol spatial à son actif. Apollo résout des centaines de problèmes inédits : rentrée atmosphérique, moteurs cryogéniques, ordinateurs embarqués (AGC, 4 Ko de RAM). L'accident d'Apollo 1 (1967, 3 morts) oblige à repenser toute l'électronique. Les missions rapportent 382 kg de roches lunaires encore étudiées aujourd'hui."},
{theme:"sciences",diff:"difficile",type:"q",q:"Quels deux astronomes prédisent mathématiquement la position de Neptune en 1846, déclenchant une dispute franco-britannique ?",a:"Adams et Le Verrier ont prédit mathématiquement la position de Neptune à partir des perturbations d'Uranus — et se disputent la paternité",detail:"Le Verrier calcule la position d'une planète hypothétique et demande à Galle (Berlin) de pointer son télescope : Neptune est trouvée le 23 septembre 1846 à moins d'un degré de la prédiction. Adams avait fait le même calcul mais n'avait pas su convaincre les astronomes britanniques d'observer. La prédiction mathématique d'une planète inconnue est saluée comme le triomphe de la mécanique newtonienne."},
{theme:"sciences",diff:"difficile",type:"q",q:"Lors de quelle éclipse solaire de 1919 la théorie de la relativité générale d'Einstein est-elle confirmée par observation ?",a:"La gravitation est la courbure de l'espace-temps par les masses — confirmée par l'éclipse solaire de 1919 photographiée par Eddington",detail:"Einstein prédit que la lumière des étoiles est déviée par la gravité du Soleil. Eddington organise deux expéditions pour observer l'éclipse du 29 mai 1919 — les photos confirment la déviation prédite par Einstein. Le Times titre : « Révolution scientifique. Nouvelle théorie de l'Univers. Idées de Newton renversées. » Einstein devient célèbre du jour au lendemain."},
{theme:"sciences",diff:"difficile",type:"q",q:"En quelle année l'URSS teste-t-elle sa première bombe atomique, et quel espion américain lui a transmis les secrets du projet Manhattan ?",a:"L'URSS teste sa bombe en 1949, 4 ans seulement après les États-Unis — grâce à un réseau d'espions infiltrés dans le projet Manhattan",detail:"Klaus Fuchs, physicien britannique travaillant à Los Alamos, transmet les plans de la bombe à Moscou. Les Rosenberg sont exécutés en 1953 pour le même motif. Truman, choqué par la rapidité soviétique, lance le programme de la bombe à hydrogène. La course aux armements nucléaires s'emballe, atteignant 70 000 têtes au total dans les années 1980."},
{theme:"sciences",diff:"difficile",type:"q",q:"Quelle expérience Rutherford réalise-t-il en 1911 avec des feuilles d'or pour découvrir le noyau atomique ?",a:"L'expérience de la feuille d'or démontra que l'atome est presque entièrement vide avec un noyau très dense au centre — renversant le modèle de Thomson",detail:"Rutherford bombarde une feuille d'or avec des particules alpha. La plupart passent, mais quelques-unes rebondissent. Il est « aussi stupéfait que si on tirait des obus de 15 pouces sur du papier de soie et qu'ils rebondissaient. » Le modèle planétaire de l'atome (noyau + électrons en orbite) remplace le « plum pudding » de Thomson, mais posera bientôt de nouveaux problèmes à la physique classique."},
{theme:"sciences",diff:"difficile",type:"q",q:"Quel rôle joua la cryptographie dans la Seconde Guerre mondiale et qui en fut le héros méconnu ?",a:"Alan Turing et l'équipe de Bletchley Park déchiffrèrent Enigma, raccourcissant la guerre de 2 à 4 ans selon les estimations",detail:"La machine Enigma produit des milliards de combinaisons de chiffrement. Turing conçoit la Bombe (machine électromécanique) pour les tester systématiquement. En 1941, 39 000 messages allemands sont déchiffrés par jour. Churchill dit que Bletchley est « son bien le plus précieux. » Turing sera condamné en 1952 pour homosexualité et mourra en 1954 — réhabilité à titre posthume en 2013."},
{theme:"sciences",diff:"difficile",type:"q",q:"Qui propose en 1927 la théorie du Big Bang sous le nom d'« atome primitif », et qui la baptise ironiquement « Big Bang » ?",a:"Le chanoine Lemaître proposa en 1927 un univers en expansion issu d'un « atome primitif » — rejeté par Hoyle qui forgea ironiquement le terme « Big Bang » pour se moquer",detail:"Lemaître, prêtre et physicien belge, déduit de la relativité générale que l'univers doit être en expansion — avant Hubble. Fred Hoyle défend un univers éternel en état stationnaire et raille la théorie de Lemaître en l'appelant « Big Bang » à la radio en 1949. La découverte du rayonnement fossile (CMB) par Penzias et Wilson en 1964 tranche définitivement en faveur du Big Bang."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a inventé le microscope et quand ?",a:"Antonie van Leeuwenhoek — il perfectionne le microscope dans les années 1670 et observe pour la première fois des bactéries et des protistes",detail:"Leeuwenhoek, marchand de tissus autodidacte à Delft, fabrique des lentilles de verre d'une précision inégalée (grossissement ×270) et découvre un monde invisible à l'œil nu. Il observe bactéries, spermatozoïdes, globules rouges. Ses 190 lettres à la Royal Society de Londres, rédigées en néerlandais par un non-latiniste, révolutionnent la biologie."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a découvert la circulation de la lymphe et les règles de l'optique géométrique au XVIIe siècle ?",a:"Descartes, pour les lois de la réfraction (loi de Snell-Descartes) — et divers médecins pour la lymphe",detail:"Descartes formule en 1637 la loi de réfraction et invente la géométrie analytique (système de coordonnées cartésiennes). En unifiant algèbre et géométrie, il offre aux scientifiques un outil puissant. Sa Dioptrique applique ces principes à la conception des lentilles, posant les bases de l'optique instrumentale."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a inventé la dynamite en 1867 et pour quelles raisons ?",a:"Alfred Nobel, pour rendre la nitroglycérine plus sûre à manipuler — et dont les remords ont fondé le Prix Nobel",detail:"Nobel stabilise la nitroglycérine en la mélangeant à de la kieselguhr (terre diatomée). La dynamite révolutionne le BTP et les mines mais aussi la guerre. Quand un journal publie par erreur sa nécrologie intitulée « Le marchand de mort est mort », Nobel est horrifié et lègue sa fortune à la création des Prix Nobel."},
{theme:"sciences",diff:"moyen",type:"q",q:"Quel savant de la Renaissance est l'un des premiers à affirmer que les fossiles sont bien des restes d'organismes vivants, contre l'opinion dominante ?",a:"Les fossiles étaient interprétés comme des jeux de la nature (lusus naturae), des tentatives ratées de Dieu ou des restes du Déluge — Steno (1669) démontra qu'ils sont des restes d'organismes vivants",detail:"Nicolas Sténon (Niels Stensen), anatomiste danois, étudie la tête d'un grand requin blanc et remarque que ses dents ressemblent aux « langues de pierre » fossiles. Il déduit que les fossiles sont d'anciens organismes et pose les principes de la stratigraphie (les couches géologiques se déposent dans l'ordre chronologique). Basi de toute la géologie moderne."},
{theme:"sciences",diff:"moyen",type:"q",q:"Quelle substance est utilisée pour la première fois comme anesthésique général en chirurgie en 1842, et par quel médecin américain ?",a:"L'éther (1842, Crawford Long) puis le chloroforme (1847, James Young Simpson) transforment la chirurgie en permettant des opérations sans douleur",detail:"Avant 1842, les chirurgiens devaient être rapides car les patients étaient conscients et maintenus de force. Long utilise l'éther lors d'une opération sans le publier. Morton fait la première démonstration publique à Boston en 1846 et dépose un brevet. La controverse sur la priorité est féroce. Simpson adopte le chloroforme pour les accouchements — contre l'Église qui voit la douleur comme divine."},
{theme:"sciences",diff:"moyen",type:"q",q:"Quel système de double nom latin Linné introduit-il en 1735 pour classer les espèces vivantes ?",a:"Linné (1735) crée la nomenclature binomiale et classe le vivant par ressemblances ; Darwin explique pourquoi ces ressemblances existent (origine commune)",detail:"Carl von Linné classe 10 000 espèces végétales et animales selon un système hiérarchique (règne, classe, ordre, genre, espèce) et invente les noms latins en deux mots (Homo sapiens). Il ignore pourquoi les espèces se ressemblent. Darwin comprend que les ressemblances reflètent la descendance commune — la classification de Linné devient une arbre généalogique."},
{theme:"sciences",diff:"moyen",type:"q",q:"Quel rôle a joué l'Académie des sciences de Paris dans le développement scientifique français ?",a:"Fondée en 1666 par Colbert sous Louis XIV, elle centralise, finance et valide la science en France — et arbitre les controverses (Pasteur-Pouchet, Lamarck-Cuvier)",detail:"Colbert crée l'Académie pour que la science serve l'État (cartographie, marine, manufactures). Elle envoie des expéditions mesurer la Terre (Maupertuis en Laponie, La Condamine en Équateur pour trancher le débat sur la forme de la Terre). Lavoisier, Laplace, Cuvier, Pasteur en sont membres. Dissoute pendant la Révolution, elle renaît sous l'Institut de France."},
{theme:"sciences",diff:"moyen",type:"q",q:"En quelle année J.J. Thomson découvre-t-il l'électron, et dans quel type d'expérience avec des tubes à vide ?",a:"J.J. Thomson démontre que les « rayons cathodiques » sont des particules chargées négativement bien plus légères que l'atome — il découvre l'électron",detail:"Thomson mesure le rapport charge/masse des particules cathodiques et trouve qu'il est le même quel que soit le matériau de la cathode ou le gaz utilisé. Il conclut que ces particules (qu'il appelle d'abord « corpuscules ») sont des constituants universels de la matière. Le modèle « plum pudding » (électrons noyés dans une sphère positive) sera bientôt remplacé par le modèle nucléaire de Rutherford."},
{theme:"sciences",diff:"difficile",type:"q",q:"Quelle découverte de Griffith en 1928, confirmée par Avery en 1944, ouvre la voie à l'identification de l'ADN comme support de l'hérédité ?",a:"Griffith démontra qu'une bactérie peut acquérir des caractères héréditaires d'une autre bactérie tuée — ouvrant la voie à la démonstration que l'ADN est le support de l'hérédité",detail:"Griffith injecte des pneumocoques virulents tués + des non-virulents vivants à des souris — elles meurent. Quelque chose du matériel des bactéries tuées transforme les vivantes. Avery identifie ce « principe transformant » comme de l'ADN en 1944 — résultat longtemps controversé car on croyait que les protéines portaient l'information génétique. Watson et Crick finaliseront la démonstration."},
{theme:"sciences",diff:"difficile",type:"q",q:"Quelle découverte des années 1950-60 sur les fonds océaniques convainc finalement la communauté scientifique de la dérive des continents ?",a:"Wegener (1912) avait raison mais sans mécanisme crédible — la dorsale médio-atlantique découverte dans les années 1950 et l'anomalie magnétique symétrique de ses deux côtés ont convaincu les géologues dans les années 1960",detail:"Harry Hess propose l'expansion des fonds océaniques (1960) : du magma monte à la dorsale, pousse les plaques de part et d'autre. Vine et Matthews (1963) observent les anomalies magnétiques symétriques des fonds océaniques — preuve irréfutable. En 10 ans, toute la géologie est révolutionnée. Les plaques continentales « flottent » sur l'asthénosphère."},
{theme:"sciences",diff:"difficile",type:"q",q:"Qui est le premier, en 1676, à démontrer que la lumière a une vitesse finie en étudiant les éclipses des lunes de Jupiter ?",a:"Rømer (1676) est le premier à démontrer que la lumière a une vitesse finie en observant les éclipses des lunes de Jupiter ; Michelson la mesure avec précision en 1879 (299 792 km/s)",detail:"Rømer remarque que les éclipses d'Io sont en avance quand Jupiter se rapproche de la Terre et en retard quand elle s'éloigne. Il en déduit que la lumière met du temps à parcourir la distance supplémentaire. Fizeau (1849) mesure 313 300 km/s par méthode terrestre. Michelson affine avec un interféromètre. La valeur exacte (299 792,458 km/s) ne sera fixée qu'en 1983 — en redéfinissant le mètre."},
{theme:"sciences",diff:"difficile",type:"q",q:"Quel cartographe flamand du XVIe siècle crée en 1569 la projection qui porte son nom, encore utilisée aujourd'hui malgré ses déformations ?",a:"Mercator (1569) crée une projection conservant les angles (conforme) au prix de déformations de surface — les zones polaires paraissent immenses",detail:"Ptolémée (IIe s.) dessine déjà une carte avec projections. Mercator résout le problème de la navigation : sur sa projection, une ligne de cap constant est une droite, révolutionnant la navigation maritime. Mais le Groenland paraît aussi grand que l'Afrique (il est 14 fois plus petit). La projection de Peters (1974) tente de corriger les déformations — déclenchant un débat géopolitique sur la représentation du monde."},
{theme:"sciences",diff:"facile",type:"q",q:"Qui a inventé la vaccination contre la rage et comment ?",a:"Louis Pasteur en 1885, en atténuant le virus sur des lapins et en injectant ces cultures affaiblies à un enfant mordu par un chien enragé",detail:"Le 6 juillet 1885, Joseph Meister, 9 ans, mordu gravement par un chien enragé, est amené à Pasteur. Pasteur n'est pas médecin et prend un risque légal énorme. Il injecte 13 doses de virus atténué sur 10 jours. L'enfant survit. Pasteur reçoit en quelques mois des milliers de demandes du monde entier. L'Institut Pasteur est fondé en 1888 par souscription internationale."},
{theme:"sciences",diff:"moyen",type:"q",q:"Quel pays développe en secret le radar Chain Home dès 1935, jouant un rôle décisif lors de la Bataille d'Angleterre ?",a:"Développé indépendamment en Grande-Bretagne, Allemagne et États-Unis dans les années 1930, le radar britannique Chain Home joua un rôle décisif dans la Bataille d'Angleterre (1940)",detail:"Watson-Watt développe le radar britannique en 1935. Lors de la Bataille d'Angleterre, il permet aux Spitfires et Hurricanes d'être dirigés vers les escadrilles allemandes sans patrouilles permanentes. Les Allemands ont aussi le radar mais ne comprennent pas son usage tactique défensif. Le transfert de technologie radar aux États-Unis via la mission Tizard en 1940 est l'un des actes scientifiques les plus importants de la guerre."},
// NOUVELLES CARTES HISTOIRE (30 cartes pour atteindre 100),
{theme:"histoire",diff:"facile",type:"q",q:"Qui était Napoléon Bonaparte ?",a:"Général corse devenu Empereur des Français (1804-1814/1815), conquérant de l'Europe",detail:"Né en Corse en 1769, Napoléon s'impose pendant la Révolution à Toulon (1793). Premier Consul en 1799, il se couronne Empereur en 1804. Ses victoires (Austerlitz, Iéna, Wagram) dominent l'Europe. La campagne de Russie (1812) marque le début de sa chute. Exilé à Sainte-Hélène, il meurt en 1821."},
{theme:"histoire",diff:"facile",type:"q",q:"Quelle date symbolise le début de la Révolution française, et quel bâtiment les Parisiens prennent-ils d'assaut ?",a:"Bouleversement politique de 1789 qui abolit l'Ancien Régime, instaure la République et diffuse les idées de liberté, égalité, fraternité",detail:"La prise de la Bastille (14 juillet 1789) marque le début. L'Assemblée nationale abolit les privilèges (nuit du 4 août), adopte la Déclaration des droits de l'homme. La Terreur (1793-1794) fait 40 000 morts. Le 14 juillet devient fête nationale française en 1880."},
{theme:"histoire",diff:"facile",type:"q",q:"Combien d'Africains sont déportés vers les Amériques lors de la traite transatlantique entre le XVIe et le XIXe siècle ?",a:"Commerce triangulaire de 300 ans (XVIe-XIXe s.) qui déporta 12 à 15 millions d'Africains vers les Amériques",detail:"Les navires européens partaient chargés de marchandises, prenaient des esclaves en Afrique et les vendaient aux Amériques en échange de sucre, tabac et coton. La France abolit définitivement l'esclavage en 1848 sous la pression de Victor Schœlcher. La traite a profondément marqué les démographies africaine et américaine."},
{theme:"histoire",diff:"facile",type:"q",q:"Quelle a été la durée du règne de Louis XIV et pourquoi est-il appelé le « Roi-Soleil » ?",a:"72 ans de règne (1643-1715) — le plus long d'un monarque européen ; il incarnait la monarchie absolue comme le soleil illumine le monde",detail:"Louis XIV construit Versailles pour tenir les nobles sous son contrôle. Il pratique la centralisation absolue : « L'État, c'est moi. » Il révoque l'Édit de Nantes (1685), poussant 200 000 protestants à l'exil. Son règne est aussi un âge d'or culturel : Molière, Racine, La Fontaine, Lully."},
{theme:"histoire",diff:"facile",type:"q",q:"Combien de morts la Seconde Guerre mondiale provoque-t-elle au total, et quel pays en subit le plus grand nombre ?",a:"Conflit mondial de 1939 à 1945 opposant les Alliés aux puissances de l'Axe (Allemagne nazie, Italie fasciste, Japon impérial)",detail:"Déclenchée par l'invasion de la Pologne (1er sept. 1939), la guerre fait 70 à 85 millions de morts, dont 6 millions de Juifs dans la Shoah. Elle se termine par la capitulation allemande (8 mai 1945) et japonaise (2 sept. 1945 après Hiroshima et Nagasaki). L'ONU est fondée dans la foulée."},
{theme:"histoire",diff:"moyen",type:"q",q:"Quel traité met fin à la guerre de Trente Ans en 1648, et dans quelles deux villes westphaliennes est-il signé ?",a:"Conflit européen commencé comme guerre de religion en Allemagne, devenu lutte pour l'hégémonie impliquant toutes les grandes puissances",detail:"Déclenché par la défenestration de Prague (1618), il ravage l'Allemagne qui perd entre 25 et 40 % de sa population. Les traités de Westphalie (1648) posent les bases du droit international moderne et du système des États souverains. La France sort grande victorieuse, affaiblissant les Habsbourg."},
{theme:"histoire",diff:"moyen",type:"q",q:"Quel principe — « no taxation without representation » — résume la principale cause de la Révolution américaine de 1776 ?",a:"Révolte des 13 colonies britanniques d'Amérique du Nord contre la taxation sans représentation parlementaire",detail:"La devise « No taxation without representation » cristallise le mécontentement. Le Boston Tea Party (1773) précipite la rupture. La Déclaration d'indépendance (4 juillet 1776) proclame la naissance d'une nation. La France soutient les insurgés (La Fayette, Rochambeau) par calcul anti-britannique."},
{theme:"histoire",diff:"moyen",type:"q",q:"Par qui et à quelle date Charlemagne est-il couronné Empereur d'Occident, relançant l'idée d'un empire romain ?",a:"Empire franc qui réunifie l'Europe occidentale autour de 800, couronné par le pape Léon III à Rome",detail:"Charlemagne (742-814) conquiert l'Italie, la Saxe, l'Espagne du Nord. Couronné Empereur d'Occident le 25 décembre 800. Il réforme l'écriture (minuscule carolingienne), crée des écoles dans les monastères, établit une monnaie commune. Après sa mort, l'empire est partagé entre ses petits-fils (traité de Verdun, 843) : embryon de la France, l'Allemagne et l'Italie."},
{theme:"histoire",diff:"moyen",type:"q",q:"Quelle infirmière britannique devient célèbre pendant la guerre de Crimée (1853-1856) pour avoir révolutionné les soins aux blessés ?",a:"Premier conflit moderne avec presse de guerre et infirmières militaires, opposant la Russie à l'alliance franco-britannico-ottomane",detail:"Première guerre couverte par des correspondants de presse et photographes. Florence Nightingale révolutionne les soins infirmiers à Scutari. Le télégraphe permet les premières dépêches en temps réel. La Russie perd et ses ambitions méditerranéennes sont bloquées. Le traité de Paris (1856) reconnaît pour la première fois l'Empire ottoman dans le concert européen."},
{theme:"histoire",diff:"moyen",type:"q",q:"Dans quel pays les suffragettes obtiennent-elles le droit de vote en premier, et en quelle année ?",a:"Mouvement de lutte pour le droit de vote des femmes, né en Grande-Bretagne et aux États-Unis dans la seconde moitié du XIXe s.",detail:"Aux États-Unis, la Convention de Seneca Falls (1848) lance la lutte. En Grande-Bretagne, Emmeline Pankhurst fonde la WSPU (1903) — actions spectaculaires, grèves de la faim, emprisonnements. Les femmes obtiennent le droit de vote au Royaume-Uni en 1918, aux États-Unis en 1920, en France en 1944."},
{theme:"histoire",diff:"moyen",type:"q",q:"Quel pays africain est le dernier à accéder à l'indépendance en 1975, mettant fin à l'empire colonial portugais ?",a:"Processus par lequel les empires coloniaux européens (britannique, français, belge, hollandais) se décomposent après la Seconde Guerre mondiale",detail:"L'Inde obtient son indépendance en 1947, suivie par des dizaines de pays africains et asiatiques. La France mène deux guerres coloniales majeures (Indochine 1946-1954, Algérie 1954-1962). La décolonisation remodèle complètement la carte du monde et les équilibres politiques. L'ONU passe de 51 à 130 membres en 20 ans."},
{theme:"histoire",diff:"moyen",type:"q",q:"Quelle opération militaire du Pacte de Varsovie écrase le Printemps de Prague en août 1968 ?",a:"Tentative de libéralisation du régime communiste tchécoslovaque par Alexander Dubček, écrasée par l'invasion soviétique",detail:"Dubček prône un « socialisme à visage humain » : liberté de la presse, multipartisme, fédéralisme. Le 21 août 1968, 500 000 soldats du Pacte de Varsovie entrent en Tchécoslovaquie. Jan Palach s'immole par le feu en janvier 1969. L'URSS impose la « doctrine Brejnev » : les pays socialistes n'ont pas le droit de changer de camp."},
{theme:"histoire",diff:"difficile",type:"q",q:"Vers quelle date et dans quelle région du monde la Révolution néolithique marque-t-elle le passage à l'agriculture ?",a:"Transition, vers 10 000 av. J.-C. au Croissant fertile, de la chasse-cueillette à l'agriculture et à l'élevage — transformation la plus profonde de l'histoire humaine",detail:"La domestication du blé, de l'orge, des moutons et des chèvres au Proche-Orient permet la sédentarisation, la constitution de surplus, la division du travail et l'émergence des premières villes (Çatal Höyük, Jéricho). Elle crée aussi les inégalités de richesse, les épidémies (contact avec les animaux) et la guerre pour les terres agricoles."},
{theme:"histoire",diff:"difficile",type:"q",q:"En quelle année l'Empire Han s'effondre-t-il, et en combien de royaumes rivaux la Chine se divise-t-elle alors ?",a:"L'effondrement de la dynastie Han en 220 ap. J.-C. plonge la Chine dans 400 ans de divisions (Trois Royaumes, Seize Royaumes) — parallèle à la chute de Rome",detail:"La révolte des Turbans Jaunes (184) fragilise le pouvoir central. Les généraux se partagent l'empire. La Chine se divise en trois royaumes (Wei, Wu, Shu) puis en une mosaïque d'États. L'unification ne reviendra qu'avec les Sui (581) puis les Tang (618). Cette période de fragmentation enrichit cependant l'art bouddhique et la philosophie."},
{theme:"histoire",diff:"difficile",type:"q",q:"Quelle ville de l'Empire Songhaï était au XVe siècle un grand centre du savoir islamique, abritant une université réputée ?",a:"Empire d'Afrique de l'Ouest (XVe-XVIe s.) dont la capitale Tombouctou était un centre mondial du savoir islamique",detail:"L'Empire songhaï, sous Sonni Ali et Askia le Grand, domine le commerce transsaharien (or, sel, esclaves). L'université de Tombouctou attire des milliers d'étudiants. La bibliothèque de Tombouctou contient des centaines de milliers de manuscrits. L'invasion marocaine (1591) détruit cet empire — preuve que l'Afrique précoloniale avait ses propres grandes civilisations."},
{theme:"histoire",diff:"difficile",type:"q",q:"Dans combien de pays européens des soulèvements éclatent-ils simultanément en 1848, et quel philosophe écrit alors le Manifeste du Parti communiste ?",a:"Vague révolutionnaire qui balaya simultanément la France, l'Allemagne, l'Autriche, l'Italie et la Hongrie — presque partout réprimée",detail:"Le « Printemps des peuples » commence à Paris (chute de Louis-Philippe). Les révolutions de 1848 associent libéralisme politique et nationalismes naissants. Presque toutes échouent : restauration des monarchies, répression hongroise par la Russie. Mais elles laissent des réformes durables (abolition du servage en Autriche, suffrage universel masculin en France)."},
{theme:"histoire",diff:"difficile",type:"q",q:"Quel secrétaire d'État américain formule en 1899 la doctrine de la « Porte ouverte » réclamant l'égalité d'accès au marché chinois ?",a:"Doctrine américaine proposant que toutes les puissances aient un accès égal au marché chinois, contre les zones d'influence exclusives des puissances européennes et du Japon",detail:"John Hay, secrétaire d'État américain, lance cette politique en 1899. Elle reflète les intérêts commerciaux américains en Chine mais aussi une certaine idéologie anti-impérialiste. Elle échoue en pratique : la Chine reste divisée en zones d'influence. La révolte des Boxers (1900) et l'intervention des 8 puissances montrent la fragilité de la Chine impériale."},
{theme:"histoire",diff:"difficile",type:"q",q:"Lors de la nuit du 4 août 1789, quels deux ordres privilégiés renoncent volontairement à leurs droits féodaux devant l'Assemblée nationale ?",a:"Séance de l'Assemblée nationale durant laquelle la noblesse et le clergé renoncèrent volontairement à leurs privilèges féodaux",detail:"Dans un élan d'enthousiasme (peut-être calculé), les nobles proposent eux-mêmes d'abolir les droits seigneuriaux, la dîme, les exemptions fiscales. En quelques heures, tout l'édifice de l'Ancien Régime s'effondre légalement. Cette nuit prépare la Déclaration des droits de l'homme (26 août) et constitue la révolution sociale de 1789."},
{theme:"histoire",diff:"difficile",type:"q",q:"Combien de colonies grecques sont fondées autour de la Méditerranée entre le VIIIe et le VIe siècle av. J.-C. ?",a:"Expansion de cités-états grecques qui fondèrent des colonies tout autour de la Méditerranée et de la mer Noire, diffusant la culture hellénique",detail:"Les Grecs fondent Marseille (Massalia), Naples (Neapolis), Syracuse, Odessa (Olbia). La surpopulation et les crises politiques poussent des groupes à chercher de nouvelles terres. Chaque colonie reproduit les institutions de sa métropole mais s'en émancipe. Ces colonies créent le premier espace économique méditerranéen unifié."},
{theme:"histoire",diff:"difficile",type:"q",q:"En combien de jours l'assassinat de François-Ferdinand à Sarajevo le 28 juin 1914 conduit-il à la guerre générale en Europe ?",a:"Séquence diplomatique de 37 jours de l'assassinat de François-Ferdinand (28 juin) à la guerre générale (4 août) — résultat de l'engrenage des alliances et des nationalismes",detail:"L'assassinat de Sarajevo était un incident local gérable. Mais l'Autriche-Hongrie choisit d'humilier la Serbie, sachant que la Russie réagirait. Les plans militaires (Schlieffen pour l'Allemagne) ne laissent aucune souplesse. Chaque pays mobilise pour ne pas être pris de vitesse. L'historien Christopher Clark les décrit comme des « somnambules » marchant vers le gouffre."},
{theme:"histoire",diff:"difficile",type:"q",q:"Quels trois dirigeants se réunissent à Yalta en février 1945 pour organiser l'après-guerre, et quel accord controversé y est conclu sur l'Europe de l'Est ?",a:"Réunion de Churchill, Roosevelt et Staline qui organisa l'après-guerre et partagea implicitement l'Europe en zones d'influence",detail:"En février 1945, les Trois Grands se retrouvent en Crimée. Ils décident de la division de l'Allemagne en zones d'occupation, du statut de la Pologne (frontières à l'Ouest), des modalités de l'ONU. Roosevelt cède sur la Pologne en échange de l'entrée soviétique en guerre contre le Japon. Yalta est souvent citée comme l'acte de naissance de la Guerre froide."},
{theme:"histoire",diff:"facile",type:"q",q:"Quelle héroïne française redresse la situation militaire française lors de la guerre de Cent Ans, et en quelle année est-elle brûlée à Rouen ?",a:"Conflit entre la France et l'Angleterre pour le contrôle du trône de France, marqué par Jeanne d'Arc et l'émergence de la nation française",detail:"La guerre de Cent Ans n'est pas un conflit continu mais une série de guerres entrecoupées de trêves. La peste noire (1347-1353) ravage les deux camps. Azincourt (1415) est une catastrophe française. L'intervention de Jeanne d'Arc (1429) renverse le cours. La guerre se termine par l'expulsion anglaise de France, sauf Calais."},
{theme:"histoire",diff:"facile",type:"q",q:"En quelle année Jules César achève-t-il la conquête de la Gaule, et quel chef gaulois capitule à Alésia ?",a:"Conquête de la Gaule par Jules César (58-52 av. J.-C.), qui romanisa profondément les populations celtiques sur 5 siècles",detail:"César mène 8 campagnes en Gaule, décrite dans ses Commentaires. La résistance culmina avec Vercingétorix à Alésia (52 av. J.-C.). La romanisation apporte l'écriture, le droit, les routes, les villes et le latin — ancêtre du français. Des villes comme Lyon (Lugdunum), fondée en 43 av. J.-C., témoignent de cette latinisation."},
{theme:"histoire",diff:"moyen",type:"q",q:"Dans quel traité de 1763 la France cède-t-elle le Canada à la Grande-Bretagne, à l'issue de la Guerre de Sept Ans ?",a:"Premier conflit planétaire impliquant l'Europe, l'Amérique du Nord, l'Inde et les Caraïbes — remportée par la Grande-Bretagne sur la France",detail:"La renversement des alliances de 1756 unit France et Autriche contre Prusse et Angleterre. Les batailles se déroulent en Amérique (guerre franco-indienne), en Inde (Plassey, 1757), aux Caraïbes. La France perd le Canada et l'Inde. Ce désastre français nourrit la rancœur anti-britannique qui pousse à soutenir la révolution américaine."},
{theme:"histoire",diff:"moyen",type:"q",q:"Combien de Juifs d'Europe sont exterminés lors de la Shoah, et dans quel camp la majorité d'entre eux sont-ils tués ?",a:"Extermination systématique de 6 millions de Juifs d'Europe par l'Allemagne nazie entre 1941 et 1945 — premier génocide industriel de l'histoire",detail:"Après la Conférence de Wannsee (janvier 1942), la « Solution finale » est organisée industriellement : trains de déportation, camps d'extermination (Auschwitz-Birkenau, Treblinka, Sobibor). Les Einsatzgruppen fusillent 1,5 million de personnes dans les forêts d'URSS. Deux tiers des Juifs d'Europe sont assassinés. Le procès de Nuremberg (1945-1946) crée le concept de crime contre l'humanité."},
{theme:"histoire",diff:"moyen",type:"q",q:"Quel ouvrage collectif du XVIIIe siècle, dirigé par Diderot et d'Alembert, synthétise les idées des Lumières en 28 volumes ?",a:"Courant intellectuel européen prônant la raison, la tolérance et le progrès humain contre l'obscurantisme et le fanatisme",detail:"Voltaire, Rousseau, Montesquieu, Diderot, Locke, Hume — les philosophes des Lumières attaquent la superstition, l'intolérance religieuse et le despotisme. L'Encyclopédie de Diderot et d'Alembert (1751-1772) vulgarise le savoir. Les Lumières inspirent la Révolution américaine, la Révolution française et les droits de l'homme modernes."},
{theme:"histoire",diff:"difficile",type:"q",q:"Combien de personnes Robespierre fait-il guillotiner pendant la Terreur (1793-1794), et comment prend-elle fin ?",a:"Période durant laquelle le Comité de salut public dirigé par Robespierre guillotina environ 16 500 personnes au nom du salut de la République",detail:"La France est en guerre avec l'Europe entière et déchirée par des insurrections (Vendée). Le Tribunal révolutionnaire juge et condamne en masse : aristocrates, mais aussi girondins, chrétiens, « suspects ». Robespierre lui-même est guillotiné lors du 9 Thermidor (27 juillet 1794) par ses propres alliés qui craignaient d'être les prochains. La Terreur hante encore le débat sur révolution et violence politique."},
{theme:"histoire",diff:"difficile",type:"q",q:"Quelles deux grandes cités de la civilisation de l'Indus (2600-1900 av. J.-C.) ont été redécouvertes par les archéologues au XXe siècle ?",a:"L'une des quatre grandes civilisations antiques avec Mésopotamie, Égypte et Chine — encore largement indéchiffrée",detail:"Les cités de Mohenjo-daro et Harappa abritaient jusqu'à 50 000 habitants avec système d'égouts, bains publics, urbanisme en damier. L'écriture de l'Indus (400 signes) reste indéchiffrée. La civilisation disparaît mystérieusement vers 1900 av. J.-C. — sécheresse ? invasion aryenne ? changement du cours de l'Indus ? Le débat continue."},
{theme:"histoire",diff:"difficile",type:"q",q:"En quelle année Samuel Morse envoie-t-il le premier message télégraphique, et entre quelles deux villes ?",a:"L'invention du télégraphe électrique (Morse, 1844), du téléphone (Bell, 1876) et la pose du câble transatlantique (1866) transforment la vitesse de l'information à l'échelle mondiale",detail:"Avant le télégraphe, une nouvelle de New York mettait 10 jours à traverser l'Atlantique. Le câble transatlantique réduit ce délai à quelques minutes. Cette révolution transforme la finance mondiale, la diplomatie, la presse, la guerre. Reuters et AFP naissent pour exploiter ce réseau télégraphique mondial."},
{theme:"histoire",diff:"moyen",type:"q",q:"Quel document signe-t-on en juillet 1953 pour suspendre les combats en Corée, et pourquoi n'est-ce pas un traité de paix ?",a:"Conflit entre la Corée du Nord soutenue par la Chine et l'URSS, et la Corée du Sud soutenue par les Nations Unies — armistice en 1953, mais les deux Corées sont techniquement toujours en guerre",detail:"La Corée du Nord envahit le Sud le 25 juin 1950. Truman obtient un mandat de l'ONU (l'URSS boycottant le Conseil de sécurité). La Chine entre en guerre quand MacArthur approche du Yalu. L'armistice de Panmunjeom (27 juillet 1953) fixe une ligne de démarcation proche du 38e parallèle d'origine. Aucun traité de paix n'a été signé."},
// NOUVELLES CARTES GEO (92 cartes pour atteindre 100),
{theme:"geo",diff:"facile",type:"q",q:"Quelle est la capitale de la France ?",a:"Paris",detail:"Fondée par les Parisii (tribu gauloise) sur une île de la Seine, Paris est capitale depuis Hugues Capet (987). Avec 2,1 millions d'habitants intra-muros et 12 millions en Île-de-France, c'est la plus grande métropole francophone du monde."},
{theme:"geo",diff:"facile",type:"q",q:"Quel est le plus grand océan du monde ?",a:"L'océan Pacifique",detail:"Le Pacifique couvre 165 millions de km² — plus que toutes les terres émergées réunies. Il contient plus de la moitié de l'eau des océans mondiaux. La fosse des Mariannes (Challenger Deep, 10 935 m) en est le point le plus profond."},
{theme:"geo",diff:"facile",type:"q",q:"Quelle chaîne de montagnes sépare l'Europe de l'Asie ?",a:"L'Oural (en Russie)",detail:"Longue de 2 500 km, cette chaîne ancienne et érodée est la frontière géographique Europe-Asie. Elle est complétée au sud par la mer Caspienne, le Caucase et la mer Noire. La Russie s'étend sur les deux continents."},
{theme:"geo",diff:"facile",type:"q",q:"Quelle est la capitale du Brésil ?",a:"Brasília",detail:"Brasília, inaugurée en 1960, fut construite en 41 mois en plein cerrado (savane) pour déplacer la capitale de Rio. Conçue par Oscar Niemeyer (architecte) et Lúcio Costa (urbaniste) en forme d'avion ou d'oiseau. Classée au patrimoine UNESCO en 1987."},
{theme:"geo",diff:"facile",type:"q",q:"Quel est le plus grand désert du monde ?",a:"Le désert Antarctique (13,8 millions de km²), puis le Sahara (9,2 millions de km²)",detail:"Un désert se définit par ses précipitations (moins de 250 mm/an), pas par sa chaleur. L'Antarctique est le plus grand désert froid du monde. Le Sahara est le plus grand désert chaud. Le Sahara s'agrandit d'environ 48 km² par an en raison du changement climatique."},
{theme:"geo",diff:"facile",type:"q",q:"Combien de pays composent le continent africain ?",a:"54 pays reconnus par l'ONU",detail:"L'Afrique est le continent avec le plus de pays. Le plus récent est le Soudan du Sud (2011). Le Nigeria (~220 millions d'habitants) est le plus peuplé. L'Algérie (~2,4 millions de km²) est le plus grand. Le Sahara occupe 30 % de la superficie du continent."},
{theme:"geo",diff:"facile",type:"q",q:"Quel détroit sépare l'Amérique du Nord de la Russie ?",a:"Le détroit de Béring (88 km au minimum)",detail:"Ce détroit peu profond (50 m) entre l'Alaska et la Sibérie était un pont terrestre (Béringie) pendant les glaciations, permettant les migrations humaines vers l'Amérique. Par temps clair, on peut voir les deux côtes depuis les îles Diomède, situées en son centre."},
{theme:"geo",diff:"facile",type:"q",q:"Quelle est la montagne la plus haute du monde ?",a:"L'Everest (8 849 m), dans l'Himalaya",detail:"Situé à la frontière Népal-Tibet, l'Everest (Sagarmatha en népalais, Chomolungma en tibétain) a été gravi pour la première fois le 29 mai 1953 par Tenzing Norgay et Edmund Hillary. La mesure exacte de 8 849 m a été officialisée par la Chine et le Népal en 2020."},
{theme:"geo",diff:"facile",type:"q",q:"Quel fleuve traverse Paris, Lyon et se jette dans la Manche ?",a:"La Seine (775 km)",detail:"La Seine prend sa source à Source-Seine (Côte-d'Or, 471 m d'altitude) et se jette dans la Manche au Havre. Elle traverse Paris sur 37 km. Ses berges à Paris sont classées au patrimoine UNESCO. Elle reçoit comme affluents la Marne et l'Oise."},
{theme:"geo",diff:"facile",type:"q",q:"Quel pays est à la fois le plus grand producteur et consommateur de pétrole au monde ?",a:"Les États-Unis (depuis 2018, devant l'Arabie Saoudite et la Russie)",detail:"Grâce à la révolution du pétrole de schiste (fracking), les États-Unis sont redevenus le premier producteur mondial depuis 2018. Ils produisent et consomment environ 12-13 millions de barils par jour, soit ~14 % de la production mondiale."},
{theme:"geo",diff:"facile",type:"q",q:"Quelle mer se trouve entre l'Europe et l'Afrique du Nord ?",a:"La mer Méditerranée",detail:"La mer Méditerranée (2,5 millions de km²) est presque fermée, reliée à l'Atlantique par le détroit de Gibraltar. Elle borde 21 pays. Son nom latin (mare nostrum, « notre mer ») illustre l'importance que lui accordaient les Romains. Elle est plus salée que l'Atlantique car l'évaporation y dépasse les apports fluviaux."},
{theme:"geo",diff:"facile",type:"q",q:"Quelle ville est à la fois la plus peuplée d'Amérique latine et du monde hispanophone ?",a:"Mexico (22 millions d'habitants en métropole)",detail:"Mexico City est construite sur les ruines de Tenochtitlan, capitale aztèque. Elle est bâtie sur un ancien lac asséché (lac Texcoco) qui cause de sévères problèmes d'affaissement (la ville s'enfonce de 10 cm/an). La métropole est à 2 240 m d'altitude."},
{theme:"geo",diff:"moyen",type:"q",q:"Quels sont les cinq pays les plus peuplés du monde ?",a:"Inde, Chine, États-Unis, Indonésie, Pakistan (ordre 2024)",detail:"L'Inde a dépassé la Chine en 2023 avec ~1,43 milliard d'habitants. La Chine a 1,41 milliard, les États-Unis 335 millions, l'Indonésie 275 millions, le Pakistan 230 millions. Ensemble, ces 5 pays représentent 44 % de la population mondiale."},
{theme:"geo",diff:"moyen",type:"q",q:"Quelle est la différence entre un État, une nation et un pays ?",a:"L'État est une entité politique (gouvernement, territoire, population) ; la nation est un peuple partageant une identité ; le pays désigne couramment les deux",detail:"Un État sans nation : l'URSS (assemblage de nationalités forcées). Une nation sans État : les Kurdes, les Palestiniens. Un État-nation idéal : l'Islande ou la Corée du Sud. La distinction est fondamentale pour comprendre les conflits ethniques et les mouvements indépendantistes."},
