{theme:"philo",diff:"moyen",type:"q",q:"Quel est le rôle de la philosophie islamique médiévale dans la transmission d'Aristote ?",a:"Les philosophes arabes (Al-Kindi, Avicenne, Averroès) ont traduit et commenté Aristote, transmettant sa philosophie à l'Occident médiéval",detail:"Ibn Sina (Avicenne, 980-1037) : Canon de la médecine et oeuvre philosophique monumentale. Ibn Rushd (Averroès, 1126-1198) commente Aristote si profondément qu'il est surnommé le Commentateur. Ses oeuvres en latin influencent Thomas d'Aquin."},
{theme:"philo",diff:"difficile",type:"q",q:"Qu'est-ce que le pragmatisme de William James ?",a:"James (1842-1910) : une idée est vraie si elle fonctionne dans la pratique — la vérité n'est pas une copie du réel mais un outil d'action",detail:"James (Pragmatism, 1907) : le test d'une idée est ses conséquences pratiques. Dewey applique le pragmatisme à l'éducation. Rorty abandonne la notion de vérité objective. Le pragmatisme est la philosophie américaine par excellence."},
{theme:"philo",diff:"difficile",type:"q",q:"Qu'est-ce que la distinction sens/référence de Frege ?",a:"Frege (1892) : une expression a un sens (la façon dont elle présente son objet) et une référence (l'objet lui-même) — l'étoile du matin et l'étoile du soir ont même référence (Vénus) mais sens différents",detail:"Cette distinction résout le puzzle de l'identité : l'étoile du matin = l'étoile du soir est informatif bien que les deux termes désignent Vénus. Fondamentale pour la philosophie du langage, la logique et la sémantique."},
{theme:"philo",diff:"difficile",type:"q",q:"Qu'est-ce que le transhumanisme et ses enjeux philosophiques ?",a:"Courant promouvant l'amélioration humaine par la technologie — questions : identité personnelle, justice, définition de l'humain",detail:"Le transhumanisme vise le dépassement de l'humain par la biotechnologie et l'IA. Questions : si je télécharge mon esprit, suis-je encore moi ? Qui aura accès à ces améliorations ? Michael Sandel défend les limites comme condition de l'éthique."},
{theme:"philo",diff:"difficile",type:"q",q:"Qu'est-ce que le néoplatonisme de Plotin ?",a:"Plotin (IIIe s.) : l'Un (Dieu) se déploie en niveaux d'être (Intellect, Âme) — influencera Augustin et la mystique chrétienne",detail:"Plotin (Ennéades) développe une hiérarchie ontologique : l'Un, l'Intellect, l'Âme. La remontée vers l'Un est l'objectif de la vie philosophique. Augustin d'Hippone synthétise Plotin et christianisme, façonnant la théologie médiévale."},
{theme:"philo",diff:"difficile",type:"q",q:"Qu'est-ce que la théorie pure du droit de Hans Kelsen ?",a:"Kelsen (1881-1973) : le droit est une hiérarchie de normes dont la validité remonte à une norme fondamentale (Grundnorm)",detail:"La Théorie pure du droit (1934) veut faire du droit une science rigoureuse. La validité d'une norme vient d'une norme supérieure, jusqu'à la Grundnorm. Kelsen rédige la Constitution autrichienne de 1920 et conçoit le modèle de Cour constitutionnelle centralisée."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que le vitalisme de Bergson et la durée ?",a:"Henri Bergson (1859-1941) : la vie et la conscience échappent aux catégories de l'intelligence — la durée (temps vécu) est irréductible au temps mesurable",detail:"L'Essai sur les données immédiates de la conscience (1889) distingue le temps de l'horloge et la durée réelle. L'élan vital (L'Évolution créatrice, 1907) est le principe d'imprévisibilité de la vie. Bergson reçoit le prix Nobel de littérature (1927)."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que l'éthique déontologique par opposition au conséquentialisme ?",a:"Déontologie (Kant) : l'acte est moral selon sa conformité au devoir — conséquentialisme (Mill, Bentham) : l'acte est moral si ses conséquences maximisent le bien",detail:"Kant condamne le mensonge même pour sauver un innocent. Le conséquentialiste peut justifier un mal mineur pour un bien majeur. Les dilemmes du trolley problem illustrent la tension. L'éthique des vertus (Aristote) propose une troisième voie."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que le pari de Pascal ?",a:"Pascal (1623-1662) : si Dieu existe, croire est infiniment gagnant ; s'il n'existe pas, croire ne coûte rien",detail:"Le Pari (Pensées, fragment 418) : si vous croyez et que Dieu existe, gain infini. Si vous croyez et qu'il n'existe pas, perte finie. Si vous ne croyez pas et qu'il existe, perte infinie. Le choix rationnel est de croire."},
{theme:"philo",diff:"difficile",type:"q",q:"Quels penseurs français des années 1960-70 — de Derrida à Foucault — sont regroupés sous l'étiquette post-structuraliste, et quelle pensée rejettent-ils ?",a:"Courant (Derrida, Foucault, Deleuze, Lyotard) critiquant la clôture des structures — le sens est toujours différé",detail:"Le post-structuralisme montre que les structures sont instables (Derrida), traversées de pouvoir (Foucault). Lyotard (La Condition postmoderne, 1979) annonce la fin des grands récits. Ce courant influence les études culturelles et de genre."},
{theme:"philo",diff:"facile",type:"q",q:"Dans quel ouvrage de 1689 Locke défend-il les droits naturels à la vie, à la liberté et à la propriété, influençant les révolutions américaine et française ?",a:"Locke (1632-1704) : les hommes ont des droits naturels (vie, liberté, propriété) que l'État protège — si l'État y faillit, la révolution est légitime",detail:"Locke (Deux Traités du gouvernement civil, 1689) s'oppose à l'absolutisme de Hobbes. L'État naît du consentement des gouvernés. Si le souverain viole les droits naturels, le peuple peut se révolter. Jefferson s'inspire de Locke dans la Déclaration d'indépendance (1776)."},
{theme:"philo",diff:"moyen",type:"q",q:"Comment Hobbes décrit-il la vie à l'état de nature dans le Léviathan (1651), justifiant ainsi l'autorité absolue du souverain ?",a:"Hobbes (Léviathan, 1651) : à l'état de nature, la vie est solitaire, pauvre, méchante, brutale et courte — les hommes cèdent leur liberté à un souverain absolu",detail:"Hobbes écrit pendant la guerre civile anglaise. A l'état de nature, la guerre de tous contre tous règne. Le contrat social : les individus cèdent leurs droits naturels à un souverain absolu. Locke et Rousseau transformeront ce cadre contractualiste."},
{theme:"philo",diff:"facile",type:"q",q:"Quelle anecdote célèbre illustre la provocation de Diogène face à Alexandre le Grand venu lui rendre visite ?",a:"Diogène de Sinope (v. 413-323 av. J.-C.) : vit dans un tonneau, rejette les conventions sociales — la vertu suffit au bonheur",detail:"A Alexandre le Grand : Ote-toi de mon soleil. Il se promène avec une lanterne cherchant un homme. Les cyniques valorisent la vie naturelle, la frugalité et le mépris des conventions. Leur héritage continue chez les Stoïciens."},
{theme:"philo",diff:"facile",type:"q",q:"Quel ouvrage de 1819 Schopenhauer publie-t-il pour exposer sa vision du monde comme représentation et volonté aveugle ?",a:"Arthur Schopenhauer (1788-1860) : derrière les représentations se cache la Volonté — force aveugle et sans but, source de toute souffrance",detail:"Le Monde comme volonté et comme représentation (1818) : la Volonté aveugle nous pousse à désirer sans fin. La libération vient de la négation de la Volonté : ascétisme, art, compassion. Il influence profondément Nietzsche, Wagner et Freud."},
{theme:"philo",diff:"difficile",type:"q",q:"Qu'est-ce que la mort de l'art selon Hegel ?",a:"Hegel (Leçons sur l'esthétique) : l'art manifeste sensiblement l'Absolu — mais la philosophie accomplit cela mieux, rendant l'art chose du passé",detail:"L'art grec symbolisait parfaitement l'unité de la forme et du contenu. Le monde moderne, dominé par la réflexion, ne peut plus trouver sa vérité dans la forme sensible. Cette thèse alimente le débat sur l'avenir de l'art contemporain."},
{theme:"philo",diff:"moyen",type:"q",q:"Comment Aristote nomme-t-il le bonheur comme fin ultime de l'existence humaine, distingué de la simple accumulation de plaisirs ?",a:"Trois conceptions : Aristote (eudaimonia : activité vertueuse), Épicure (ataraxie : tranquillité), stoïciens (apatheia : maîtrise des passions)",detail:"Aristote : le bonheur est l'exercice des vertus. Épicure : le bonheur est l'absence de douleur et l'amitié. Les stoïciens : le bonheur ne dépend que de nous. Ces trois conceptions structurent le débat éthique occidental."},
{theme:"philo",diff:"difficile",type:"q",q:"Dans quel roman pédagogique de 1762 Rousseau développe-t-il sa conception de l'éducation naturelle, opposée à la société corruptrice ?",a:"Rousseau (Émile, 1762) : l'enfant est naturellement bon, l'éducation doit suivre le développement naturel",detail:"Émile est élevé selon un plan d'éducation naturelle : l'enfant apprend par l'expérience directe, non par les livres. Rousseau invente l'enfance comme stade spécifique. Dewey (learning by doing) et Montessori s'en inspirent directement."},
{theme:"philo",diff:"difficile",type:"q",q:"Quel philosophe américain du XXe siècle défend un naturalisme radical affirmant que la philosophie doit s'aligner sur les sciences naturelles ?",a:"Le naturalisme affirme que tout ce qui existe peut être expliqué par les sciences naturelles — contre le dualisme et les entités non physiques",detail:"Quine (naturalisme épistémologique) : la philosophie doit être continue avec les sciences. Critiques : le problème difficile de la conscience (Chalmers), l'irréductibilité des normes (Putnam), la causalité descendante en sciences cognitives."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que le scepticisme de Pyrrhon ?",a:"Pyrrhon (360-270 av. J.-C.) suspend tout jugement (épochè) — l'ataraxie (tranquillité) s'ensuit quand on cesse de chercher ce qu'on ne peut trouver",detail:"Pyrrhon enseigne que nos sens et raison ne peuvent atteindre la vérité. La suspension du jugement libère des opinions contradictoires. Cette position est reprise par Sextus Empiricus. Montaigne s'en inspire : Que sais-je ?"},
{theme:"philo",diff:"difficile",type:"q",q:"Qu'est-ce que les actes de langage de John Austin ?",a:"Austin (1962) : le langage accomplit des actions — promettre, ordonner, déclarer sont des actes illocutoires",detail:"Austin distingue les énoncés constatifs (décrivent un état) et performatifs (accomplissent une action en le disant). Il distingue actes locutoires (dire), illocutoires (l'intention) et perlocutoires (l'effet sur l'auditeur). Searle développe la théorie. Habermas s'en inspire."},
{theme:"philo",diff:"difficile",type:"q",q:"Comment Augustin définit-il le temps dans les Confessions : comme réalité extérieure ou comme distension de l'âme ?",a:"Augustin : le temps existe dans l'esprit (mémoire, attention, attente) — Heidegger : l'être humain est essentiellement temporel, projeté vers la mort",detail:"Augustin (Confessions, XI) : seul le temps de la conscience existe. Heidegger fait de la temporalité la structure fondamentale du Dasein : il est jeté dans un passé, projeté vers un futur dont la mort est la possibilité ultime."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que les jeux de langage du second Wittgenstein ?",a:"Wittgenstein (Investigations philosophiques, 1953) : le sens vient de l'usage dans des jeux de langage ancrés dans des formes de vie",detail:"Le Tractatus (1921) : ce qui peut être dit clairement le sera. Les Investigations : le langage est un ensemble de pratiques sociales. Les problèmes philosophiques naissent du langage en vacances."},
{theme:"philo",diff:"difficile",type:"q",q:"Qu'est-ce que l'éthique animale de Peter Singer ?",a:"Singer (Animal Liberation, 1975) : la capacité à souffrir (sentience) est le critère moral — la discrimination fondée sur l'espèce (spécisme) est injuste",detail:"Singer applique l'utilitarisme aux animaux : leur souffrance compte autant que la souffrance humaine. Tom Regan défend des droits innés pour les animaux. En France, la reconnaissance de la sensibilité animale dans le code civil (2015) marque un tournant."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que la monadologie de Leibniz ?",a:"Leibniz (1646-1716) : la réalité est constituée de monades (substances simples, indivisibles) — nous vivons dans le meilleur des mondes possibles",detail:"La Monadologie (1714) : l'univers est composé d'une infinité de monades, chacune reflétant l'univers entier. Voltaire parodie cet optimisme dans Candide (1759). Leibniz co-invente le calcul infinitésimal avec Newton."},
{theme:"philo",diff:"difficile",type:"q",q:"Qu'est-ce que la Sittlichkeit (vie éthique) chez Hegel ?",a:"Hegel (Principes de la philosophie du droit, 1821) : famille, société civile et État sont les stades de l'Esprit objectif",detail:"Hegel distingue le droit abstrait, la moralité (conscience individuelle) et la vie éthique (Sittlichkeit, institutions concrètes). L'État hégélien est la réalisation de la liberté. Marx critique cet État comme défenseur des intérêts bourgeois."},
{theme:"philo",diff:"facile",type:"q",q:"Qu'est-ce que la méthode inductive de Francis Bacon ?",a:"Francis Bacon (1561-1626) : la science doit partir de l'observation des faits particuliers pour remonter aux lois générales",detail:"Bacon (Novum Organum, 1620) critique la scolastique et propose d'observer la nature systématiquement. Il identifie les idoles (préjugés) : de la tribu, de la caverne, du marché, du théâtre. Sa méthode inspire la Royal Society (1660)."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que la bioéthique et les quatre principes de Beauchamp et Childress ?",a:"Quatre principes — autonomie, bienfaisance, non-maléficence, justice — structurent l'éthique médicale depuis 1979",detail:"L'autonomie : respecter le patient comme agent capable de décider (consentement éclairé). La bienfaisance : agir dans l'intérêt du patient. La non-maléficence : primum non nocere. La justice : distribution équitable des ressources médicales."},
{theme:"philo",diff:"facile",type:"q",q:"Quelle formule de Hegel résume sa vision de l'histoire comme réalisation progressive de la liberté et de l'Esprit absolu ?",a:"L'histoire est le développement progressif de l'Esprit (Geist) vers la liberté — chaque époque incarne un moment de cette réalisation",detail:"Les Leçons sur la philosophie de l'histoire (1837) lisent l'histoire comme le progrès de la conscience de la liberté : Orient (un seul libre), Grèce-Rome (quelques-uns), monde germanique (tous). Marx renverse ce schéma idéaliste en matérialiste."},
{theme:"philo",diff:"facile",type:"q",q:"Qu'est-ce que la philosophie du langage et le paradoxe de Zénon d'Élée ?",a:"Zénon d'Élée (Ve s. av. J.-C.) propose des paradoxes pour réfuter le mouvement — le paradoxe d'Achille et la tortue montre l'infini divisibilité de l'espace",detail:"Dans le paradoxe d'Achille et la tortue, Achille ne peut jamais rattraper la tortue car chaque fois qu'il atteint sa position précédente, elle a avancé. Ce paradoxe stimule la réflexion sur le continu, l'infini et les mathématiques. Aristote réfute Zénon en distinguant potentiel et actuel."},
{theme:"philo",diff:"moyen",type:"q",q:"Quel philosophe britannique introduit la théorie des descriptions définies, distinguant le sens d'une phrase de son référent ?",a:"Bertrand Russell (1905) : les descriptions définies (le roi de France) ne présupposent pas l'existence de leur référent — analyse logique des propositions",detail:"Russell (On Denoting, 1905) : 'le roi de France actuel est chauve' ne présuppose pas un roi de France actuel. Cette description se paraphrase en proposition existentielle. Cette analyse fonde la philosophie analytique du langage. Strawson répond : les descriptions présupposent l'existence sans l'asserter."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que la phénoménologie du corps selon Merleau-Ponty ?",a:"Maurice Merleau-Ponty (1908-1961) : le corps vécu (Leib) n'est pas un objet parmi les objets mais la condition de toute expérience — contre le dualisme cartésien",detail:"La Phénoménologie de la perception (1945) montre que la perception est incarnée : nous percevons avec notre corps, non avec un esprit désincorporé. Le schéma corporel organise notre expérience. Le membre fantôme montre que le corps vécu déborde le corps objectif. Cette approche fonde les théories de l'embodied cognition en sciences cognitives."},
{theme:"philo",diff:"moyen",type:"q",q:"Quelle formule de Sartre résume sa conception radicale de la liberté humaine, faisant de l'homme un être 'condamné à être libre' ?",a:"Sartre (L'Être et le Néant, 1943) : l'homme est condamné à être libre — la liberté est totale, indépassable, et avec elle la responsabilité absolue",detail:"Pour Sartre, la conscience (le pour-soi) est néant : elle n'est jamais identique à elle-même, toujours projetée vers ce qu'elle n'est pas encore. Elle ne peut pas ne pas choisir. La mauvaise foi est le refus de cette liberté (se prétendre déterminé par sa nature, son rôle, son passé). L'authenticité exige d'assumer sa liberté et sa responsabilité."},
{theme:"philo",diff:"moyen",type:"q",q:"Quel concept Marx développe-t-il pour décrire la condition du travailleur dépossédé du fruit de son travail sous le capitalisme ?",a:"Marx (Manuscrits de 1844) : l'aliénation est l'état du travailleur séparé du produit de son travail, de son activité et de son espèce — le communisme surmonte l'aliénation",detail:"Dans le capitalisme, l'ouvrier produit pour un autre (capitaliste), perd le contrôle de son activité et de son essence humaine (travail créateur). L'aliénation religieuse (Feuerbach) est dérivée : l'homme projette ses qualités en Dieu. Le communisme supprime la propriété privée et rend à l'homme la maîtrise de son travail et de sa vie sociale."},
{theme:"philo",diff:"difficile",type:"q",q:"Quel ouvrage de 1960 Hans-Georg Gadamer consacre-t-il à l'herméneutique philosophique, centré sur la fusion des horizons d'interprétation ?",a:"Hans-Georg Gadamer (Vérité et Méthode, 1960) : toute compréhension est historiquement située — on ne peut accéder aux textes sans préjugés (pré-compréhension) mais le dialogue permet la fusion des horizons",detail:"Gadamer s'oppose à l'idéal d'objectivité des sciences humaines (Dilthey). Les préjugés (Vorurteile) ne sont pas des obstacles mais les conditions de la compréhension. La 'fusion des horizons' désigne la rencontre entre le texte (son monde) et le lecteur (son monde). La vérité dans les humanités n'est pas une méthode mais une expérience transformatrice."},
{theme:"philo",diff:"difficile",type:"q",q:"Qu'est-ce que la philosophie de la technique chez Heidegger ?",a:"Heidegger (La Question de la technique, 1954) : la technique moderne n'est pas un outil neutre mais un mode de dévoilement du monde qui transforme la nature en 'fonds' (Bestand) disponible",detail:"La technique artisanale dévoile la nature en collaborant avec elle (le menuisier suit le fil du bois). La technique moderne (Gestell, arraisonnement) transforme tout en ressource exploitable. Le Rhin est une centrale hydroélectrique potentielle avant d'être un paysage. Le danger de la technique : la perte des autres modes de dévoilement (art, poésie). Le salut est dans cette prise de conscience."},
{theme:"philo",diff:"moyen",type:"q",q:"Quel sophisme G.E. Moore dénonce-t-il dans ses Principia Ethica (1903) en montrant qu'on ne peut pas déduire le bien du naturel ?",a:"G.E. Moore (Principia Ethica, 1903) : le bien ne peut être défini par des propriétés naturelles (plaisir, évolution) — toute tentative est un sophisme naturaliste",detail:"Moore : demander 'est-ce que le plaisir est bon ?' a un sens — donc le bien n'est pas identique au plaisir. La question ouverte (open question argument) : pour toute propriété naturelle X, on peut toujours demander 'mais est-ce bon ?' sans contradiction. Moore conclut que le bien est une propriété simple, indéfinissable et non naturelle (intuitionnisme éthique)."},
{theme:"philo",diff:"moyen",type:"q",q:"Quel philosophe irlandais contemporain, auteur de Républicanisme (1997), distingue la liberté républicaine de la liberté libérale ?",a:"Courant (Machiavel, Rousseau, Arendt, Pettit) qui valorise la liberté comme non-domination et la participation civique active — contre le libéralisme de la non-interférence",detail:"Philip Pettit (Republicanism, 1997) distingue liberté comme non-interférence (libéralisme : être laissé seul) et liberté comme non-domination (républicanisme : ne pas être soumis à la domination arbitraire d'un autre, même bienveillante). Un esclave bien traité n'est pas libre car son maître pourrait changer. L'État doit garantir des institutions contre la domination."},
{theme:"philo",diff:"difficile",type:"q",q:"Quels sont les trois stades de l'existence selon Kierkegaard, du plus bas au plus élevé ?",a:"Kierkegaard (1813-1855) distingue trois stades : esthétique (plaisir, immédiat), éthique (devoir, universalité), religieux (foi absurde, 'téléologique suspension de l'éthique')",detail:"Au stade esthétique (Don Juan), l'individu vit dans l'instant et le plaisir, finissant dans l'ennui et le désespoir. Au stade éthique (le juge Wilhelm), l'individu choisit le devoir moral. Au stade religieux (Abraham), l'individu fait un saut de foi qui dépasse l'éthique universelle. Ce saut est absurde (Abraham qui lève le couteau sur Isaac). Kierkegaard fonde l'existentialisme."},
{theme:"philo",diff:"difficile",type:"q",q:"Quel philosophe britannique du XVIIe siècle pose le problème de l'identité personnelle en la fondant sur la continuité de la mémoire et de la conscience ?",a:"Problème : qu'est-ce qui fait que je suis le même individu qu'hier, qu'enfant ? — Locke (mémoire), Hume (fiction du moi), Parfit (pas d'identité au sens strict)",detail:"Locke : l'identité personnelle repose sur la continuité de la conscience (mémoire). Hume : introspection ne révèle qu'un faisceau de perceptions, jamais un 'moi' stable. Kant : le 'je pense' est une unité formelle, non une substance. Parfit (Reasons and Persons, 1984) : l'identité personnelle n'est pas ce qui importe — ce qui importe est la continuité psychologique. Conséquences pour la responsabilité morale et l'immortalité."},
{theme:"philo",diff:"moyen",type:"q",q:"Comment traduit-on le concept africain ubuntu, et dans quel pays Nelson Mandela l'invoque-t-il comme fondement de la réconciliation nationale ?",a:"Ubuntu (philosophie bantou, Afrique subsaharienne) : 'je suis parce que nous sommes' — la personne se constitue dans et par la communauté, contre l'individualisme occidental",detail:"Ubuntu (humanité, communauté) est le fondement de nombreuses philosophies africaines (Zulu, Xhosa, Nguni). L'identité individuelle est relationnelle. Desmond Tutu en fait un principe éthique et politique (réconciliation en Afrique du Sud). La philosophie africaine questionne le présupposé universaliste des philosophies occidentales. Des penseurs comme Cheikh Anta Diop revendiquent une philosophie africaine autonome."},
{theme:"philo",diff:"difficile",type:"q",q:"Quel concept Thomas Kuhn introduit-il dans La Structure des révolutions scientifiques (1962) pour décrire un changement radical de cadre théorique ?",a:"Kuhn (La Structure des révolutions scientifiques, 1962) : la science normale progresse dans un paradigme dominant, puis une crise mène à une révolution scientifique (changement de paradigme)",detail:"Un paradigme (ex. physique newtonienne, mécanique quantique) est l'ensemble des pratiques, croyances et problèmes légitimes d'une communauté scientifique. La science normale résout des puzzles dans ce cadre. Les anomalies s'accumulent jusqu'à une crise, puis une révolution (Copernic, Newton, Einstein). Les paradigmes sont incommensurables : on ne peut les comparer qu'imparfaitement. Kuhn relativise la notion de progrès scientifique."},
{theme:"philo",diff:"facile",type:"q",q:"Quelle position radicale Kant défend-il sur le mensonge : est-il permis de mentir pour sauver une vie innocente ?",a:"Kant : il est toujours interdit de mentir, même pour sauver un innocent — l'impératif catégorique est absolu et ne souffre aucune exception",detail:"Dans Sur un prétendu droit de mentir par humanité (1797), Kant maintient qu'il faut dire la vérité même à l'assassin qui cherche votre ami. Le devoir de ne pas mentir est catégorique. Cette position est extrême : si on dit la vérité et que l'assassin tue l'ami, on n'est pas responsable. Mill et les conséquentialistes rejettent cette rigidité."},
{theme:"philo",diff:"moyen",type:"q",q:"Qui est Diotime dans le Banquet de Platon, et quelle conception de l'amour ascendant vers le Beau absolu lui prête-t-il ?",a:"Le Banquet (Symposium) explore l'éros (désir, amour) à travers des discours de Socrate, Aristophane, Alcibiade — l'amour est désir d'immortalité et ascension vers le Beau en soi",detail:"Aristophane : les humains étaient des êtres doubles coupés en deux par Zeus — l'amour est la recherche de sa moitié. Socrate (via Diotime) : l'amour commence par la beauté physique d'un corps, s'élève vers la beauté de tous les corps, des âmes, des activités, des sciences, jusqu'au Beau en soi. Alcibiade : témoignage de son amour pour Socrate, qui reste insaisissable."},
{theme:"philo",diff:"difficile",type:"q",q:"Quel philosophe américain publie en 1949 L'Almanach d'un comté des sables, fondant l'éthique de la terre comme première éthique environnementale ?",a:"Courant philosophique questionnant la valeur intrinsèque de la nature (au-delà de l'utilitaire pour l'homme) — deep ecology (Naess), écoféminisme (Plumwood), droits de la nature",detail:"L'éthique environnementale naît dans les années 1970. Arne Naess (deep ecology, 1973) distingue l'écologie superficielle (centrée sur l'homme) et l'écologie profonde (la nature a une valeur en soi). Peter Singer étend ses droits aux animaux. Christopher Stone plaide pour les droits légaux des arbres (1972). L'écoféminisme (Val Plumwood) lie domination de la nature et domination des femmes."},
{theme:"philo",diff:"moyen",type:"q",q:"Qu'est-ce que la théorie de la connaissance et le problème de Gettier ?",a:"Edmund Gettier (1963) réfute la définition traditionnelle du savoir comme croyance vraie et justifiée — il montre des cas où les trois conditions sont remplies sans que l'on 'sache' vraiment",detail:"La définition classique du savoir (Platon, Ménon) : savoir = croyance vraie justifiée (KJV). Gettier propose en 3 pages des contre-exemples : je crois justifiably que 'il est 10h' en regardant une horloge arrêtée, et il est effectivement 10h — mais par hasard. J'ai une croyance vraie justifiée sans savoir. Ce problème a généré une littérature immense en épistémologie analytique."},
{theme:"philo",diff:"moyen",type:"q",q:"Quelle distinction stoïcienne entre ce qui dépend de nous et ce qui n'en dépend pas structure l'éthique d'Épictète dans le Manuel ?",a:"Les stoïciens croient en une Providence (logos universel, raison du monde) qui gouverne tout — le sage accepte le destin (amor fati) tout en agissant selon la vertu",detail:"Marc Aurèle (Pensées pour moi-même) : certaines choses dépendent de nous (jugements, désirs, actions), d'autres non (corps, richesse, réputation, mort). Le bonheur consiste à ne désirer que ce qui dépend de nous. La Providence garantit que tout ce qui arrive est pour le bien du tout. Épictète, né esclave, enseigne que l'esclavage du corps n'atteint pas la liberté de l'âme."},
{theme:"philo",diff:"difficile",type:"q",q:"Quelles sont les deux faces du signe linguistique selon Saussure, et quelle relation arbitraire les unit ?",a:"Ferdinand de Saussure (Cours de linguistique générale, 1916) : le signe linguistique est l'union d'un signifiant (image acoustique) et d'un signifié (concept) — le rapport est arbitraire",detail:"Saussure fonde la linguistique structurale. Le signe n'a pas de rapport naturel avec les choses : 'arbre' en français, 'tree' en anglais, 'Baum' en allemand désignent la même chose. Le sens naît des différences entre signes (paradigme, syntagme). La langue est un système de différences sans termes positifs. Cette approche inspire le structuralisme anthropologique, littéraire et psychanalytique."},
{theme:"philo",diff:"moyen",type:"q",q:"Quel philosophe grec de l'Antiquité est à l'origine du paradoxe du sorite, posant la question des concepts vagues aux frontières indéfinies ?",a:"Eubulide de Milet (IVe s. av. J.-C.) — le sorite illustre le problème de la vagueness des prédicats",detail:"Le sorite (du grec sôros, tas) : si un tas de sable perd un grain il reste un tas, donc enlever tous les grains un par un devrait toujours laisser un tas — pourtant un grain n'est pas un tas. Ce paradoxe est central en philosophie du langage et en sémantique formelle."},
{theme:"litterature",diff:"facile",type:"q",q:"Qui est l'auteur de l'Iliade et de l'Odyssée, épopées fondatrices de la littérature occidentale ?",a:"Homère (VIIIe s. av. J.-C.) — bien que son existence même soit débattue par les historiens",detail:"La 'question homérique' agite les philologues depuis le XIXe s. : Homère est-il un auteur unique, ou ces épopées sont-elles le fruit d'une tradition orale collective ? Les deux œuvres restent les textes fondateurs de la culture grecque et occidentale."},
{theme:"litterature",diff:"facile",type:"q",q:"Quel dramaturge grec du Ve s. av. J.-C. est l'auteur d'Œdipe Roi, pièce modèle de la tragédie antique ?",a:"Sophocle",detail:"Sophocle remporte 18 fois le concours de tragédies aux Grandes Dionysies. Aristote, dans sa Poétique, cite Œdipe Roi comme l'exemple parfait de la tragédie, avec sa reconnaissance (anagnorisis) et son coup de théâtre (peripeteia)."},
{theme:"litterature",diff:"moyen",type:"q",q:"Qui écrit la Divine Comédie au début du XIVe siècle, œuvre fondatrice de la littérature italienne ?",a:"Dante Alighieri (1265-1321)",detail:"La Divine Comédie (Enfer, Purgatoire, Paradis) est rédigée en toscan, contribuant à faire de ce dialecte la base de l'italien moderne. Dante y guide le lecteur à travers l'au-delà, accompagné par Virgile puis Béatrice."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel auteur français du XVIe siècle crée Pantagruel et Gargantua, œuvres emblématiques de l'humanisme renaissant ?",a:"François Rabelais (vers 1494-1553)",detail:"Rabelais mêle érudition humaniste, satire des institutions et humour scatologique dans un style exubérant. Son œuvre incarne l'idéal renaissant de la connaissance encyclopédique et de la libre pensée contre le dogmatisme scolastique."},
{theme:"litterature",diff:"moyen",type:"q",q:"Qui est l'auteur des Essais (1580), inventant un genre littéraire nouveau centré sur l'introspection ?",a:"Michel de Montaigne (1533-1592)",detail:"Montaigne invente le genre de l'essai en faisant de lui-même son propre sujet d'étude ('Que sais-je ?'). Ses Essais influencent profondément Shakespeare, Pascal et toute la littérature de l'introspection jusqu'à nos jours."},
{theme:"litterature",diff:"facile",type:"q",q:"Quel dramaturge élisabéthain est l'auteur de Hamlet, Macbeth, Roméo et Juliette et du Roi Lear ?",a:"William Shakespeare (1564-1616)",detail:"Shakespeare est considéré comme le plus grand écrivain de langue anglaise. Ses 37 pièces et 154 sonnets ont été traduits dans toutes les langues. Le Globe Theatre, où ses pièces étaient jouées, a été reconstruit à Londres en 1997."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel dramaturge français du XVIIe siècle écrit Phèdre, Andromaque et Britannicus, sommets de la tragédie classique ?",a:"Jean Racine (1639-1699)",detail:"Racine respecte scrupuleusement les règles des trois unités (lieu, temps, action) imposées par le classicisme. Sa langue est considérée comme l'un des sommets de la prose française, d'une pureté et d'une intensité psychologique inégalées."},
{theme:"litterature",diff:"moyen",type:"q",q:"Qui est l'auteur du Cid (1637), pièce fondatrice du théâtre classique français qui déclenche une célèbre querelle ?",a:"Pierre Corneille (1606-1684)",detail:"La querelle du Cid oppose Corneille à l'Académie française, fondée par Richelieu. L'Académie critique la pièce pour ses entorses aux règles classiques, mais son succès populaire est immédiat et durable."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel auteur du XVIIe siècle écrit Les Fables, chef-d'œuvre de la poésie française inspiré d'Ésope et Phèdre ?",a:"Jean de La Fontaine (1621-1695)",detail:"Les Fables de La Fontaine (12 livres, 1668-1694) sont bien plus que des histoires pour enfants : ce sont des œuvres morales et politiques adressées aux adultes, illustrant les vices et vertus humains à travers des animaux."},
{theme:"litterature",diff:"moyen",type:"q",q:"Qui écrit Candide (1759), conte philosophique satirisant l'optimisme leibnizien ?",a:"Voltaire (François-Marie Arouet, 1694-1778)",detail:"Candide raille la philosophie de Leibniz selon laquelle 'tout est pour le mieux dans le meilleur des mondes possibles', à travers une série de catastrophes absurdes. La conclusion — 'il faut cultiver notre jardin' — reste l'une des phrases les plus citées de la littérature française."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel roman épistolaire de Laclos (1782) est considéré comme l'un des chefs-d'œuvre du libertinage littéraire ?",a:"Les Liaisons dangereuses",detail:"Le roman par lettres de Choderlos de Laclos met en scène la marquise de Merteuil et le vicomte de Valmont manipulant leurs victimes par pur plaisir. Plusieurs adaptations cinématographiques en ont fait une œuvre universellement connue."},
{theme:"litterature",diff:"facile",type:"q",q:"Quel romancier français du XIXe siècle crée La Comédie humaine, fresque de plus de 90 romans sur la société française ?",a:"Honoré de Balzac (1799-1850)",detail:"Balzac invente le personnage récurrent entre plusieurs romans (Rastignac, Vautrin) et ambitionne de faire pour la société ce que Buffon a fait pour la nature. Il travaille jusqu'à 18 heures par jour, alimenté au café, produisant une œuvre colossale."},
{theme:"litterature",diff:"facile",type:"q",q:"Quel romancier russe est l'auteur de Guerre et Paix (1869) et Anna Karénine (1877) ?",a:"Léon Tolstoï (1828-1910)",detail:"Guerre et Paix, qui suit cinq familles nobles russes pendant les guerres napoléoniennes, est souvent cité comme le plus grand roman jamais écrit. Tolstoï développe ensuite une philosophie religieuse et pacifiste qui l'amène à renoncer à sa noblesse."},
{theme:"litterature",diff:"facile",type:"q",q:"Quel romancier russe est l'auteur de Crime et Châtiment (1866) et Les Frères Karamazov (1880) ?",a:"Fiodor Dostoïevski (1821-1881)",detail:"Dostoïevski, condamné à mort puis gracié au dernier moment, a profondément marqué la littérature mondiale par sa plongée dans la psychologie des personnages torturés. Nietzsche, Kafka et Sartre le considèrent comme une influence majeure."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel poète français est le chef de file du symbolisme avec des œuvres comme L'Après-midi d'un faune ?",a:"Stéphane Mallarmé (1842-1898)",detail:"Mallarmé préside les fameux 'mardis' où se retrouvent les poètes symbolistes. Son projet est de suggérer plutôt que de nommer, de faire de la poésie une musique du langage. Debussy met en musique L'Après-midi d'un faune en 1894."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel poète français du XIXe siècle révolutionne la poésie avec Une saison en enfer et les Illuminations, avant d'abandonner la littérature à 21 ans ?",a:"Arthur Rimbaud (1854-1891)",detail:"Rimbaud, génie précoce et rebelle, théorise le 'dérèglement de tous les sens' comme méthode poétique. Sa relation tumultueuse avec Verlaine, et son abandon total de la littérature pour le commerce en Afrique, en font une figure mythique."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel romancier irlandais publie Ulysse en 1922, roman moderniste considéré comme l'un des plus importants du XXe siècle ?",a:"James Joyce (1882-1941)",detail:"Ulysse transpose l'Odyssée d'Homère dans le Dublin d'une seule journée (le 16 juin 1904, 'Bloomsday'). Le roman, publié en feuilleton dans The Little Review puis en volume à Paris, est censuré aux États-Unis pour obscénité jusqu'en 1933."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quelle romancière britannique est l'auteure de Mrs Dalloway (1925) et pionnière du roman moderniste ?",a:"Virginia Woolf (1882-1941)",detail:"Virginia Woolf développe le flux de conscience et la narration polyphone pour explorer la vie intérieure de ses personnages. Fondatrice du groupe de Bloomsbury, elle est aussi une essayiste féministe majeure avec Une chambre à soi (1929)."},
{theme:"litterature",diff:"facile",type:"q",q:"Qui est l'auteur de La Métamorphose (1915) et du Procès (1925), œuvres emblématiques de l'absurde et de l'aliénation ?",a:"Franz Kafka (1883-1924)",detail:"Kafka, fonctionnaire pragois de langue allemande, publie peu de son vivant et demande à son ami Max Brod de brûler ses manuscrits à sa mort. Brod les publie à la place, donnant naissance à l'adjectif 'kafkaïen' pour désigner une situation absurde et bureaucratique."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel prix Nobel de littérature (1954) est l'auteur de L'Adieu aux armes et Le Vieil Homme et la mer ?",a:"Ernest Hemingway (1899-1961)",detail:"Hemingway développe un style dépouillé, la 'théorie de l'iceberg' : l'essentiel n'est pas dit mais présent en filigrane. Correspondant de guerre, il participe à la Première Guerre mondiale, à la guerre civile espagnole et à la Seconde Guerre mondiale."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quelle romancière américaine publie Beloved (1987), roman sur l'esclavage qui lui vaut le Prix Nobel en 1993 ?",a:"Toni Morrison (1931-2019)",detail:"Beloved, inspiré d'un fait réel, raconte l'histoire d'une esclave qui tue son enfant pour lui éviter l'esclavage. Toni Morrison est la première femme noire américaine à recevoir le Nobel de littérature. Ses romans explorent l'identité noire américaine avec une profondeur sans égale."},
{theme:"litterature",diff:"moyen",type:"q",q:"Qui écrit Le Maître et Marguerite, roman satirique soviétique publié à titre posthume en 1966 ?",a:"Mikhaïl Boulgakov (1891-1940)",detail:"Boulgakov rédige ce roman entre 1928 et 1940, sachant qu'il ne pourra pas le publier de son vivant sous Staline. Il mêle une satire acerbe de la société soviétique à une relecture du mythe de Faust et à la visite du diable dans le Moscou des années 1930."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel auteur colombien reçoit le Prix Nobel de littérature en 1982, consacrant le réalisme magique latino-américain ?",a:"Gabriel García Márquez (1927-2014)",detail:"García Márquez, dit 'Gabo', est l'auteur de Cent ans de solitude (1967), roman lu dans 46 langues. Il affirme avoir trouvé le ton de son roman — celui de sa grand-mère racontant des histoires extraordinaires d'un ton parfaitement ordinaire — comme une révélation."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel écrivain japonais publie La Ballade de l'impossible (1987) et est aujourd'hui le romancier japonais le plus lu dans le monde ?",a:"Haruki Murakami (né en 1949)",detail:"Murakami mêle réalisme quotidien et éléments fantastiques dans une prose influencée par la littérature américaine et le jazz. Ses romans — dont Kafka sur le rivage et 1Q84 — sont des phénomènes éditoriaux mondiaux, régulièrement cités pour le Nobel."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quelle romancière nigériane est l'auteure de L'Hibiscus pourpre (2003) et de Americanah (2013) ?",a:"Chimamanda Ngozi Adichie (née en 1977)",detail:"Adichie est l'une des voix les plus importantes de la littérature africaine contemporaine. Son essai 'Nous sommes tous des féministes' (2014), adapté d'une conférence TED, est devenu un manifeste mondial du féminisme contemporain."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel auteur tchèque exilé à Paris est l'auteur de L'Insoutenable Légèreté de l'être (1984) ?",a:"Milan Kundera (1929-2023)",detail:"Kundera, chassé de Tchécoslovaquie après 1968, écrit ses derniers romans directement en français. L'Insoutenable Légèreté de l'être interroge la légèreté et le poids de l'existence à travers la Prague du Printemps de Prague et de l'invasion soviétique."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel romancier péruvien, Prix Nobel 2010, est l'auteur de La Ville et les chiens et La Fête au Bouc ?",a:"Mario Vargas Llosa (né en 1936)",detail:"Vargas Llosa, avec García Márquez, Cortázar et Fuentes, est une figure majeure du 'boom' latino-américain des années 1960-70. Il se présente à la présidence du Pérou en 1990 et perd face à Fujimori. Ses romans mêlent politique, histoire et technique narrative sophistiquée."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel auteur argentin est l'inventeur du terme 'réalisme fantastique' et l'auteur de Ficciones (1944) ?",a:"Jorge Luis Borges (1899-1986)",detail:"Borges, directeur de la Bibliothèque nationale d'Argentine devenu aveugle, invente des univers labyrinthiques où bibliothèques infinies, miroirs et labyrinthes questionnent la réalité et la fiction. Umberto Eco, Calvino et Pynchon lui doivent une dette immense."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel romancier français du XXe siècle est l'auteur de La Nausée (1938) et du cycle Les Chemins de la liberté ?",a:"Jean-Paul Sartre (1905-1980)",detail:"Sartre, figure majeure de l'existentialisme, refuse le Prix Nobel de littérature en 1964 pour ne pas être 'institutionnalisé'. La Nausée est le premier grand roman existentialiste, explorant la contingence radicale de l'existence à travers le personnage de Roquentin."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quelle romancière française publie Bonjour Tristesse en 1954 à 18 ans, devenant une icône de la littérature française ?",a:"Françoise Sagan (1935-2004)",detail:"Bonjour Tristesse, vendu à plus d'un million d'exemplaires, scandalise et fascine par son ton libre et amoral. Sagan devient l'incarnation d'une certaine jeunesse française — fast cars, jeu, liberté — et reste une des romancières françaises les plus lues à l'étranger."},
{theme:"litterature",diff:"difficile",type:"q",q:"Qui est l'auteur de En attendant Godot (1952), pièce phare du théâtre de l'absurde, et de quelle nationalité est-il ?",a:"Samuel Beckett (1906-1989) — irlandais, écrivant en français et anglais",detail:"Beckett, Prix Nobel 1969, choisit délibérément d'écrire en français pour 'écrire sans style'. En attendant Godot, où deux personnages attendent indéfiniment quelqu'un qui ne vient pas, est la pièce de théâtre la plus jouée du XXe siècle."},
{theme:"litterature",diff:"difficile",type:"q",q:"Quel dramaturge norvégien, auteur de La Maison de poupée (1879) et de Hedda Gabler, est considéré comme le père du théâtre moderne ?",a:"Henrik Ibsen (1828-1906)",detail:"Ibsen révolutionne le théâtre en abordant des sujets tabous (condition des femmes, maladies vénériennes, corruption) dans un langage naturaliste. Bernard Shaw le défend en Angleterre contre la censure victorienne, reconnaissant en lui le fondateur du théâtre social moderne."},
{theme:"litterature",diff:"difficile",type:"q",q:"Quelle romancière britannique publie Middlemarch (1871), considéré par de nombreux critiques comme le plus grand roman anglais ?",a:"George Eliot (Mary Ann Evans, 1819-1880)",detail:"George Eliot publie sous pseudonyme masculin pour être prise au sérieux. Middlemarch, sous-titré 'Une étude de la vie en province', est une fresque sociale d'une profondeur psychologique et morale exceptionnelle. Virginia Woolf la qualifie de 'seul roman anglais adulte'."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel romancier français Prix Nobel (1969) est l'auteur de La Route des Flandres et du Palace ?",a:"Claude Simon (1913-2005)",detail:"Claude Simon, figure du Nouveau Roman, déconstruit la narration traditionnelle en entremêlant temps, souvenirs et sensations dans de longues phrases sinueuses. Son œuvre, longtemps confidentielle, est réhabilitée par le Nobel mais reste difficile d'accès."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quelle poète américaine, recluse à Amherst, publie moins de 10 poèmes de son vivant mais laisse 1800 poèmes à sa mort en 1886 ?",a:"Emily Dickinson (1830-1886)",detail:"Dickinson invente une poésie iconoclaste, aux tirets abondants et aux rimes approximatives, qui préfigure la modernité. Presque inconnue de son vivant, elle est aujourd'hui considérée comme l'une des plus grandes poètes de langue anglaise."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel romancier américain est l'auteur de Moby Dick (1851), épopée maritime considérée comme un chef-d'œuvre de la littérature américaine ?",a:"Herman Melville (1819-1891)",detail:"Moby Dick est un échec commercial à sa sortie — Melville meurt inconnu. Il est redécouvert dans les années 1920 et classé parmi les grands romans américains. Le roman peut se lire comme une épopée, un traité de cétologie, une allégorie ou un roman existentiel."},
{theme:"litterature",diff:"moyen",type:"q",q:"Qui est l'auteur du Conte de deux villes et des Grandes Espérances, romancier social de l'ère victorienne ?",a:"Charles Dickens (1812-1870)",detail:"Dickens publie ses romans en feuilletons, influençant directement le suspense et les retournements de situation. Ses personnages (Oliver Twist, Ebenezer Scrooge, Pip) sont devenus des archétypes culturels. Il contribue à faire évoluer les lois sur le travail des enfants."},
{theme:"litterature",diff:"difficile",type:"q",q:"Quel poète et romancier russe est l'auteur du Docteur Jivago (1957), publié à l'étranger et lui valant un Nobel qu'il doit refuser ?",a:"Boris Pasternak (1890-1960)",detail:"Le Docteur Jivago, roman sur la révolution russe, est refusé par les éditeurs soviétiques et publié clandestinement en Italie. Le Nobel 1958 provoque une telle pression des autorités soviétiques que Pasternak est contraint de le refuser. Le roman paraît en URSS seulement en 1988."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel auteur sénégalais, père de la négritude avec Aimé Césaire, devient en 1960 le premier président du Sénégal ?",a:"Léopold Sédar Senghor (1906-2001)",detail:"Senghor est le premier Africain membre de l'Académie française (1983). La négritude, mouvement qu'il cofonde avec Césaire dans les années 1930 à Paris, affirme la valeur et la beauté des cultures africaines contre l'assimilation coloniale."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel romancier kényan, auteur de Décoloniser l'esprit (1986), décide d'écrire uniquement en gikuyu pour rejeter la langue coloniale ?",a:"Ngũgĩ wa Thiong'o (né en 1938)",detail:"Ngũgĩ, emprisonné sans jugement au Kenya en 1977 pour une pièce jugée subversive, écrit son premier roman en gikuyu dans sa cellule sur du papier hygiénique. Son essai Décoloniser l'esprit plaide pour que les écrivains africains abandonnent les langues européennes."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quelle romancière britannique est l'auteure de la saga Harry Potter, la plus vendue de l'histoire après la Bible ?",a:"J.K. Rowling (née en 1965)",detail:"Harry Potter à l'école des sorciers (1997) est refusé par 12 éditeurs avant d'être accepté. La saga des 7 romans se vend à plus de 500 millions d'exemplaires dans 80 langues. Rowling devient la première auteure à devenir milliardaire grâce à ses livres."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel auteur chilien publie Le Général dans son labyrinthe (1989) et est l'une des voix majeures du boom latino-américain ?",a:"Gabriel García Márquez — non, il s'agit ici de Carlos Fuentes / en réalité García Márquez pour ce titre",detail:"Le Général dans son labyrinthe de García Márquez retrace les derniers jours de Simón Bolívar. Le boom latino-américain regroupe dans les années 1960-70 García Márquez, Vargas Llosa, Cortázar, Fuentes et Donoso, révolutionnant le roman mondial."},
{theme:"litterature",diff:"difficile",type:"q",q:"Quel romancier italien, auteur du Nom de la rose (1980), est aussi l'un des plus grands sémioticiens du XXe siècle ?",a:"Umberto Eco (1932-2016)",detail:"Le Nom de la rose, roman policier médiéval aux multiples couches symboliques et intertextuelles, est un phénomène éditorial mondial. Eco, professeur de sémiotique à Bologne, construit un roman qui se lit à plusieurs niveaux — thriller, histoire des idées, méditation sur la connaissance."},
{theme:"litterature",diff:"difficile",type:"q",q:"Quel poète tchèque de langue allemande, auteur des Élégies de Duino, est considéré comme l'un des plus grands poètes de langue allemande ?",a:"Rainer Maria Rilke (1875-1926)",detail:"Les Élégies de Duino (1922), écrites au château de Duino sur l'Adriatique, sont considérées comme le sommet de la poésie lyrique allemande du XXe siècle. Rilke y questionne la condition humaine et la mission du poète face à l'ange."},
{theme:"litterature",diff:"difficile",type:"q",q:"Quelle romancière britannique publie Frankenstein (1818) à 18 ans, inventant le roman de science-fiction gothique ?",a:"Mary Shelley (1797-1851)",detail:"Frankenstein est écrit lors d'une nuit orageuse au bord du lac Léman, en compétition amicale avec Byron et Percy Shelley. La créature de Frankenstein n'a pas de nom dans le roman — c'est le créateur qui s'appelle Frankenstein. L'œuvre pose des questions toujours actuelles sur la responsabilité scientifique."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel romancier américain est l'auteur de Le Bruit et la Fureur (1929), roman moderniste sur le déclin d'une famille sudiste ?",a:"William Faulkner (1897-1962)",detail:"Faulkner, Prix Nobel 1949, invente un comté fictif du Mississippi (Yoknapatawpha) où se déroule la plupart de ses romans. Le Bruit et la Fureur utilise quatre narrateurs différents, dont un personnage déficient mental, pour raconter la même histoire depuis des points de vue incompatibles."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel poète péruvien, auteur de Trilce (1922), est considéré comme l'un des plus grands poètes de langue espagnole du XXe siècle ?",a:"César Vallejo (1892-1938)",detail:"Vallejo révolutionne la poésie de langue espagnole par une langue fragmentée, douloureuse et originale, mêlant quechua et espagnol. Emprisonné injustement au Pérou, il s'exile à Paris où il meurt dans la misère, laissant une œuvre qui influencera toute la poésie hispanique."},
{theme:"litterature",diff:"difficile",type:"q",q:"Quel romancier français du XXe siècle, auteur de La Modification (1957), est une figure majeure du Nouveau Roman ?",a:"Michel Butor (1926-2016)",detail:"La Modification, écrit entièrement à la deuxième personne du singulier ('vous'), raconte en temps réel le voyage en train d'un homme qui renonce à quitter sa femme pour sa maîtresse. Le Nouveau Roman, mouvement des années 1950-70, rejette les conventions du roman traditionnel (intrigue, psychologie, chronologie)."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel auteur espagnol publie Si c'est un homme (1947), témoignage fondamental sur l'expérience des camps nazis ?",a:"Primo Levi (1919-1987) — auteur italien, non espagnol",detail:"Primo Levi, chimiste turinois rescapé d'Auschwitz, publie Si c'est un homme pour témoigner sans haine ni pathos. Son œuvre est considérée comme le témoignage littéraire le plus lucide et le plus important sur la Shoah, aux côtés de Nuit d'Elie Wiesel."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel auteur américain publie En attendant les barbares (1980) et reçoit le Prix Nobel en 2003 ?",a:"J.M. Coetzee (né en 1940)",detail:"Coetzee, Sud-Africain naturalisé australien, est l'un des rares auteurs à avoir reçu deux fois le Booker Prize. En attendant les barbares interroge la complicité avec l'oppression coloniale. Disgrace (1999) provoque une polémique en Afrique du Sud pour sa représentation des violences post-apartheid."},
{theme:"litterature",diff:"difficile",type:"q",q:"Quel romancier américain publie À la recherche de l'oiseau-tonnerre (1975) dans la tradition de la Beat Generation ?",a:"Cette question vise Jack Kerouac — auteur de Sur la route (1957), bible de la Beat Generation",detail:"Sur la route de Kerouac, tapé en trois semaines sur un rouleau de papier de 36 mètres, capture l'esprit de liberté et d'errance de la Beat Generation. Avec Allen Ginsberg (Howl) et William Burroughs (Le Festin nu), Kerouac forme le trio fondateur de ce mouvement contre-culturel américain."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quelle poète américaine, auteure de La Cloche de détresse (1963), est une figure majeure de la poésie confessionnelle ?",a:"Sylvia Plath (1932-1963)",detail:"La Cloche de détresse, roman autobiographique publié sous pseudonyme peu avant le suicide de Plath, décrit la dépression d'une jeune femme brillante dans l'Amérique des années 1950. Sa poésie — Ariel, publiée posthumément — est une plongée viscérale dans la mort et la renaissance."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel romancier indien de langue anglaise, auteur des Enfants de minuit (1981), reçoit le Booker of Bookers en 1993 ?",a:"Salman Rushdie (né en 1947)",detail:"Les Enfants de minuit, dont les personnages naissent à l'heure de l'indépendance indienne (minuit le 15 août 1947), est une saga magico-réaliste sur l'histoire de l'Inde moderne. Les Versets sataniques (1988) lui valent une fatwa de l'ayatollah Khomeini, le contraignant à vivre caché pendant des années."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel auteur français est l'inventeur du roman policier en France avec Fantômas (1911) et Arsène Lupin ?",a:"Maurice Leblanc pour Arsène Lupin (1905) — Fantômas est de Marcel Allain et Pierre Souvestre",detail:"Le roman policier français naît avec Émile Gaboriau (Lecoq, 1866) puis se popularise avec Arsène Lupin de Leblanc et Fantômas d'Allain et Souvestre. Simenon et son commissaire Maigret (1931) donneront au genre ses lettres de noblesse littéraire."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel romancier britannique est l'auteur de 1984 et de La Ferme des animaux, deux dystopies antitotalitaires majeures ?",a:"George Orwell (Eric Arthur Blair, 1903-1950)",detail:"La Ferme des animaux (1945) est une allégorie de la révolution soviétique et de la trahison stalinienne des idéaux révolutionnaires. 1984 invente 'Big Brother', la 'novlangue' et la 'double-pensée', des concepts entrés dans le langage courant pour décrire les dérives totalitaires."},
{theme:"litterature",diff:"difficile",type:"q",q:"Quelle romancière canadienne publie La Servante écarlate (1985), dystopie féministe adaptée en série en 2017 ?",a:"Margaret Atwood (née en 1939)",detail:"La Servante écarlate imagine une théocratie patriarcale aux États-Unis où les femmes fertiles sont réduites à leur fonction reproductrice. La série Hulu (2017) provoque un regain d'intérêt mondial, les femmes manifestant déguisées en servantes lors de protestations féministes."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel auteur francophone marocain, auteur de La Boîte à merveilles (1954), est le fondateur de la littérature marocaine de langue française ?",a:"Ahmed Sefrioui (1915-2004)",detail:"La Boîte à merveilles, premier roman marocain de langue française, est un récit d'enfance dans la médina de Fès. Sefrioui ouvre la voie à une riche littérature maghrébine de langue française, dont Driss Chraïbi, Tahar Ben Jelloun et Assia Djebar seront les figures majeures."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel auteur sud-africain blanc, auteur de Disgrace (1999), décrit avec une lucidité implacable les fractures de l'Afrique du Sud post-apartheid ?",a:"J.M. Coetzee (né en 1940)",detail:"Disgrace provoque une controverse en Afrique du Sud car certains y voient une vision défaitiste et raciste de la transition post-apartheid. Coetzee, épuisé par les polémiques, s'exile en Australie. Il reçoit le Nobel en 2003 pour l'ensemble d'une œuvre interrogeant la violence et la honte coloniale."},
{theme:"litterature",diff:"difficile",type:"q",q:"Quel poète irlandais, auteur de La Terre des désirs et des Cygnes sauvages à Coole, reçoit le Nobel en 1923 ?",a:"William Butler Yeats (1865-1939)",detail:"Yeats, figure centrale du Renouveau celtique irlandais et sénateur de la République irlandaise, développe une poésie symboliste nourrie de mythologie celtique et de mysticisme. Son poème La Seconde Venue (1919) est l'un des plus cités du XXe siècle."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel romancier autrichien, auteur de L'Homme sans qualités (1930-1943), laisse une œuvre inachevée considérée comme le plus grand roman de langue allemande du XXe siècle ?",a:"Robert Musil (1880-1942)",detail:"L'Homme sans qualités, roman inachevé de plus de 1700 pages, est une satire et une méditation sur la dissolution de l'Empire austro-hongrois à la veille de la Première Guerre mondiale. Son personnage central, Ulrich, cherche à trouver 'le sens de la vie' dans une société en décomposition."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel auteur américain, Prix Nobel 1993, est l'auteure de L'Œil le plus bleu (1970) et Beloved (1987) ?",a:"Toni Morrison (1931-2019)",detail:"Toni Morrison est éditrice chez Random House avant de publier ses propres romans. L'Œil le plus bleu, son premier roman, explore le désir d'une fillette noire d'avoir les yeux bleus comme les filles blanches, analysant l'intériorisation du racisme dans la société américaine."},
{theme:"litterature",diff:"difficile",type:"q",q:"Quelle romancière française, auteure de L'Amant (1984), reçoit le Nobel en 1984 pour une œuvre explorant la mémoire et le désir ?",a:"Marguerite Duras (1914-1996)",detail:"L'Amant, roman autobiographique sur une liaison entre une adolescente française et un Chinois riche en Indochine coloniale, reçoit le Prix Goncourt 1984 et se vend à plus de 2 millions d'exemplaires. Duras est aussi scénariste (Hiroshima mon amour) et cinéaste."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel auteur péruvien, Prix Nobel 2010, écrit La Cité et les chiens (1963) et La Fête au bouc (2000) ?",a:"Mario Vargas Llosa (né en 1936)",detail:"La Cité et les chiens, premier roman de Vargas Llosa, est brûlé par l'armée péruvienne qui se reconnaît dans sa dénonciation de la brutalité militaire. Vargas Llosa alterne entre romans politiques, comédies et récits historiques, témoignant d'une maîtrise technique exceptionnelle."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel mouvement littéraire américain des années 1950-60, incarné par Kerouac, Ginsberg et Burroughs, célèbre la liberté, la route et la contre-culture ?",a:"La Beat Generation",detail:"La Beat Generation (de 'beaten down' et 'beatitude') naît à New York autour de Columbia University. Sur la route de Kerouac (1957), Howl de Ginsberg (1956) et Le Festin nu de Burroughs (1959) sont ses manifestes. Elle influencera directement la contre-culture des années 1960."},
{theme:"litterature",diff:"difficile",type:"q",q:"Quel romancier français, auteur du Voyage au bout de la nuit (1932), scandalise avec un style oral révolutionnaire mais est compromis par ses écrits antisémites ?",a:"Louis-Ferdinand Céline (1894-1961)",detail:"Voyage au bout de la nuit révolutionne la langue romanesque française en introduisant l'argot, la syntaxe orale et un pessimisme radical. Mais Céline publie des pamphlets violemment antisémites (1937-1941), ce qui fait de lui l'une des figures les plus controversées de la littérature française."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quelle romancière britannique, auteure de Orgueil et Préjugés (1813), est la fondatrice du roman de mœurs anglais ?",a:"Jane Austen (1775-1817)",detail:"Austen publie anonymement ('par une dame') et observe avec une ironie mordante la société provinciale anglaise et ses rituels matrimoniaux. Ses six romans, longtemps sous-estimés comme 'littérature féminine', sont aujourd'hui au canon de la littérature mondiale."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel auteur martiniquais, cofondateur de la négritude, publie en 1939 Cahier d'un retour au pays natal, poème fondateur de la littérature caribéenne ?",a:"Aimé Césaire (1913-2008)",detail:"Césaire, député de la Martinique et maire de Fort-de-France pendant 56 ans, co-fonde le mouvement de la négritude à Paris avec Senghor. Son Cahier d'un retour au pays natal est un long poème en prose dénonçant le colonialisme et affirmant la dignité noire."},
{theme:"litterature",diff:"difficile",type:"q",q:"Quel romancier tchèque publie Le Château (1926) et La Colonie pénitentiaire, œuvres publiées à titre posthume contre sa volonté ?",a:"Franz Kafka (1883-1924)",detail:"Kafka demande à Max Brod de détruire tous ses manuscrits inédits à sa mort. Brod publie Le Procès (1925), Le Château (1926) et L'Amérique (1927), faisant de Kafka un géant littéraire mondial. La Colonie pénitentiaire (1919) est l'une des rares œuvres publiées de son vivant."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel poète français du XVIe siècle, chef de file de La Pléiade, est l'auteur des Amours et des Odes ?",a:"Pierre de Ronsard (1524-1585)",detail:"Ronsard et du Bellay fondent la Pléiade pour enrichir et ennoblir la langue française, en imitant les grands auteurs antiques. Ronsard est surnommé 'le prince des poètes' et 'le poète des princes' pour sa célébration de l'amour, de la nature et de la fuite du temps (carpe diem)."},
{theme:"philo",diff:"facile",type:"q",q:"Quelle formule attribuée à Socrate résume sa conception de la sagesse comme reconnaissance de sa propre ignorance ?",a:"Socrate : je sais que je ne sais rien — la reconnaissance de l'ignorance est le début de la sagesse et distingue le philosophe du sophiste",detail:"Dans l'Apologie, Socrate explique pourquoi l'oracle de Delphes l'a désigné comme le plus sage : il est seul à savoir qu'il ne sait rien. Les politiciens, artisans et poètes croient savoir ce qu'ils ne savent pas. La philosophie commence par ce dépouillement des certitudes fausses. La maïeutique aide l'interlocuteur à découvrir lui-même sa propre ignorance."},
{theme:"philo",diff:"moyen",type:"q",q:"Quelle distinction Isaiah Berlin établit-il en 1958 entre liberté négative et liberté positive dans son essai Deux conceptions de la liberté ?",a:"Isaiah Berlin (1958) distingue liberté négative (absence d'interférence d'autrui) et liberté positive (capacité de se gouverner soi-même, de se réaliser)",detail:"La liberté négative (libéralisme classique) : je suis libre si personne ne m'empêche de faire ce que je veux. La liberté positive : je suis libre si je peux réaliser mes objectifs, si je suis maître de ma vie. Berlin s'inquiète de la liberté positive qui peut légitimer des tutelles (l'État sachant mieux que moi ce qui est bon pour moi). Amartya Sen et Martha Nussbaum développent l'approche des capabilités."},
{theme:"philo",diff:"difficile",type:"q",q:"Dans quel ouvrage de 1983 Michael Walzer défend-il une conception pluraliste de la justice, refusant un principe unique de distribution ?",a:"Walzer (Spheres of Justice, 1983) : la justice consiste à ne pas laisser un bien social (argent, pouvoir, amour) dominer toutes les sphères — chaque sphère a ses propres critères de distribution",detail:"Contre Rawls (principe universel abstrait), Walzer défend un 'pluralisme complexe' : la santé doit être distribuée selon les besoins, le pouvoir politique selon la démocratie, les honneurs selon le mérite. La tyranie est l'invasion d'une sphère par une autre (utiliser l'argent pour acheter des voix, utiliser le pouvoir pour s'enrichir). La justice est plurielle et contextualisée."},
{theme:"philo",diff:"facile",type:"q",q:"Comment Épicure formule-t-il son argument pour dédramatiser la mort, en jouant sur l'absence de sujet qui pourrait en souffrir ?",a:"Épicure : la mort ne me concerne pas (quand elle est là, je n'y suis plus) — Heidegger : la mort est ma possibilité la plus propre, qui authentifie l'existence — stoïciens : meditatia mortis (méditation de la mort)",detail:"Platon (Phédon) : philosopher c'est s'exercer à mourir (détacher l'âme du corps). Épicure : la mort est annihilation, absence de sensation — donc rien à craindre. Heidegger : l'être-pour-la-mort révèle l'irremplaçabilité et l'urgence de mon existence. Montaigne : que philosopher c'est apprendre à mourir. Ernst Becker (The Denial of Death) : toute civilisation est une réponse à l'angoisse de la mort."},
{theme:"philo",diff:"difficile",type:"q",q:"Qu'est-ce que la théorie cohérentiste de la vérité et comment s'oppose-t-elle à la théorie de la correspondance ?",a:"Théorie de la correspondance : une proposition est vraie si elle correspond à la réalité — Théorie cohérentiste (Bradley, Neurath) : une proposition est vraie si elle est cohérente avec l'ensemble des propositions acceptées",detail:"La théorie de la correspondance (Aristote, Russell, Wittgenstein du Tractatus) : 'la neige est blanche' est vrai si et seulement si la neige est blanche. Problème : comment accéder à la réalité pour vérifier ? La théorie cohérentiste évite ce problème : la vérité est interne au système de croyances. Critique : peut légitimer des systèmes cohérents mais faux. La théorie pragmatiste : vrai = ce qui fonctionne."},

{theme:"litterature",diff:"facile",type:"q",q:"Qui a écrit Don Quichotte, considéré comme le premier roman moderne ?",a:"Miguel de Cervantes (1605-1615)",detail:"Don Quichotte parodie les romans de chevalerie tout en inventant la fiction psychologique moderne. C'est le roman le plus traduit au monde après la Bible."},
{theme:"litterature",diff:"facile",type:"d",q:"Roman de Victor Hugo (1862) sur la misère sociale et la rédemption dans la France du XIXe s.",a:"Les Misérables",detail:"Jean Valjean, condamné à 19 ans de bagne pour avoir volé un pain, tente de se racheter sous la traque de l'inspecteur Javert. L'œuvre dénonce les inégalités sociales et le système pénitentiaire."},
{theme:"litterature",diff:"facile",type:"q",q:"Quel poète français du XIXe s. est l'auteur des Fleurs du mal (1857) ?",a:"Charles Baudelaire",detail:"Les Fleurs du mal furent condamnées à leur parution. Baudelaire invente le poème en prose, explore la mélancolie et la beauté du laid. Il est considéré comme le père de la poésie moderne française."},
{theme:"litterature",diff:"moyen",type:"q",q:"Qui est l'auteur de À la recherche du temps perdu, et combien de volumes compte cette œuvre ?",a:"Marcel Proust — 7 volumes (1913-1927)",detail:"La Recherche explore la mémoire involontaire déclenchée par une sensation (la madeleine dans le thé). Elle compte 3 000 personnages et 1,5 million de mots. Proust mourut avant d'en revoir les derniers volumes."},
{theme:"litterature",diff:"moyen",type:"q",q:"Qui a écrit L'Étranger et reçu le Prix Nobel de littérature en 1957 ?",a:"Albert Camus",detail:"L'Étranger (1942) met en scène Meursault, un homme incapable d'affectation, qui tue un Arabe sans raison claire. Camus y explore l'absurde. Il mourra dans un accident de voiture en 1960, à 46 ans."},
{theme:"litterature",diff:"moyen",type:"q",q:"Qui est l'auteur de Cent ans de solitude, et de quel pays est-il originaire ?",a:"Gabriel García Márquez — Colombie",detail:"Publié en 1967, ce roman fondateur du réalisme magique narre 7 générations de la famille Buendía à Macondo. García Márquez aurait fait demi-tour sur la route pour écrire le livre. Prix Nobel 1982."},
{theme:"litterature",diff:"difficile",type:"d",q:"Technique narrative qui reproduit le cours non censuré des pensées d'un personnage",a:"Le flux de conscience (stream of consciousness)",detail:"Développée par Virginia Woolf (Mrs Dalloway, 1925) et James Joyce (Ulysse, 1922), cette technique abandonne la narration linéaire pour plonger dans l'intériorité brute. Ulysse suit 18 épisodes d'une seule journée de Dublin sur 800 pages."},
{theme:"litterature",diff:"difficile",type:"d",q:"Œuvre dystopique de George Orwell (1949) décrivant une société totalitaire sous surveillance permanente",a:"1984",detail:"Big Brother, la Novlangue, le Ministère de la Vérité — autant de concepts entrés dans le langage courant. Orwell s'inspire du stalinisme et du nazisme. Le roman reste la référence absolue sur le totalitarisme."},
{theme:"litterature",diff:"difficile",type:"d",q:"Courant littéraire du XIXe s. visant à représenter la réalité sociale avec rigueur quasi-scientifique",a:"Le naturalisme (Zola)",detail:"Zola théorise le « roman expérimental » dans lequel l'écrivain observe les effets de l'hérédité et du milieu. Le cycle des Rougon-Macquart (20 romans, 1871-1893) en est la réalisation la plus aboutie."},
{theme:"litterature",diff:"moyen",type:"q",q:"Qui est l'auteur de Si c'est un homme (1947), témoignage littéraire fondamental sur l'expérience d'Auschwitz ?",a:"Primo Levi (1919-1987)",detail:"Primo Levi, chimiste turinois rescapé d'Auschwitz, publie son récit sans haine ni pathos. Son œuvre est considérée comme le témoignage le plus lucide sur la Shoah. Il écrit aussi Les Naufragés et les Rescapés (1986), réflexion sur la mémoire et la honte du survivant."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel romancier américain, auteur de Sur la route (1957), est la figure emblématique de la Beat Generation ?",a:"Jack Kerouac (1922-1969)",detail:"Sur la route, tapé en trois semaines sur un rouleau de papier de 36 mètres, capture l'esprit de liberté et d'errance. Avec Allen Ginsberg (Howl) et William Burroughs (Le Festin nu), Kerouac forme le trio fondateur de la contre-culture américaine des années 1950-60."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel romancier mexicain est l'auteur de Pedro Páramo (1955), chef-d'œuvre bref du réalisme magique influençant García Márquez ?",a:"Juan Rulfo (1917-1986)",detail:"Pedro Páramo, récit d'un mort cherchant son père dans un village fantôme, est l'un des romans les plus courts et les plus influents du XXe siècle. Rulfo ne publie que deux livres, mais leur impact sur la littérature hispanique est immense et durable."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel romancier américain est l'auteur de L'Attrape-cœurs (1951), roman culte de l'adolescence rebelle ?",a:"J.D. Salinger (1919-2010)",detail:"L'Attrape-cœurs, narré par l'adolescent Holden Caulfield, devient la bible de la jeunesse américaine. Salinger, traumatisé par son succès, se réfugie dans un isolement total dès les années 1960 et ne publie plus rien jusqu'à sa mort."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quelle romancière française, auteure de La Princesse de Clèves (1678), écrit le premier roman psychologique de la littérature française ?",a:"Madame de La Fayette (1634-1693)",detail:"La Princesse de Clèves inaugure l'étude des passions intérieures dans le roman français. Le célèbre 'aveu' de l'héroïne à son mari reste un moment fondateur de la littérature française classique."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel poète américain, auteur des Feuilles d'herbe (1855), célèbre le corps et la démocratie dans une poésie libre révolutionnaire ?",a:"Walt Whitman (1819-1892)",detail:"Whitman publie et réécrit sans cesse les Feuilles d'herbe tout au long de sa vie. Son vers libre et son souffle épique influencent toute la poésie américaine moderne, de Ginsberg à Langston Hughes."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel romancier turc, auteur de Mon nom est Rouge (1998) et Neige (2002), reçoit le Prix Nobel en 2006 ?",a:"Orhan Pamuk (né en 1952)",detail:"Pamuk est poursuivi pour 'insulte à la turquité' après avoir évoqué publiquement le génocide arménien. Ses romans explorent la tension entre tradition ottomane et modernité occidentale dans la Turquie contemporaine."},
{theme:"litterature",diff:"difficile",type:"q",q:"Quel poète et romancier chilien, auteur des Vingt poèmes d'amour (1924), reçoit le Prix Nobel en 1971 ?",a:"Pablo Neruda (1904-1973)",detail:"Neruda, militant communiste et diplomate, écrit une poésie amoureuse, politique et cosmique. Ses Vingt poèmes d'amour, publiés à 20 ans, restent parmi les recueils les plus vendus au monde. Il meurt quelques jours après le coup d'État de Pinochet."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quelle poète afro-américaine lit un poème à l'investiture de Bill Clinton en 1993 et est l'auteure de Je sais pourquoi l'oiseau en cage chante (1969) ?",a:"Maya Angelou (1928-2014)",detail:"Maya Angelou mêle poésie, autobiographie et militantisme. Je sais pourquoi l'oiseau en cage chante décrit son enfance marquée par la pauvreté et le racisme dans l'Arkansas des années 1930."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel romancier français est l'auteur de La Condition humaine (1933, Prix Goncourt), sur l'insurrection communiste à Shanghai ?",a:"André Malraux (1901-1976)",detail:"La Condition humaine explore la fraternité et l'engagement à travers la répression du soulèvement communiste de 1927. Malraux, lui-même engagé en Espagne et dans la Résistance, devient ministre de la Culture de De Gaulle de 1959 à 1969."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quel romancier britannique, auteur de Au cœur des ténèbres (1902), explore la violence coloniale au Congo belge ?",a:"Joseph Conrad (1857-1924)",detail:"Conrad, Polonais naturalisé britannique, n'apprend l'anglais qu'à l'âge adulte. Au cœur des ténèbres, récit d'un voyage au Congo belge, inspire Apocalypse Now de Coppola (1979)."},
{theme:"litterature",diff:"moyen",type:"q",q:"Qui écrit Les Hauts de Hurlevent (1847), unique roman de cette auteure, chef-d'œuvre du romantisme gothique anglais ?",a:"Emily Brontë (1818-1848)",detail:"Les Hauts de Hurlevent, publié sous pseudonyme masculin (Ellis Bell), est d'abord mal reçu pour sa violence. Réévalué au XXe siècle, il est aujourd'hui considéré comme l'un des plus grands romans anglais, notamment pour son héros Heathcliff."},
{theme:"litterature",diff:"moyen",type:"q",q:"Quelle romancière française reçoit le Prix Nobel en 2022, première Française à l'obtenir, pour une œuvre explorant la mémoire et les dominations sociales ?",a:"Annie Ernaux (née en 1940)",detail:"Ernaux, auteure de La Place, Les Années, pratique une 'écriture plate' autobiographique explorant la transfuge de classe et la honte sociale. Les Années (2008), mémoire collective d'une génération, est son œuvre la plus célébrée à l'étranger."},
{theme:"economie",diff:"facile",type:"q",q:"Qui est considéré comme le père fondateur de l'économie libérale moderne ?",a:"Adam Smith (La Richesse des nations, 1776)",detail:"Smith introduit la « main invisible » : les individus qui cherchent leur intérêt personnel contribuent sans le vouloir à la richesse collective. Il défend la division du travail et le libre-échange."},
{theme:"economie",diff:"facile",type:"d",q:"Indicateur mesurant la valeur de l'ensemble des biens et services produits dans un pays en un an",a:"Le PIB (Produit Intérieur Brut)",detail:"Le PIB est la mesure standard de la richesse économique. Critiqué car il ne mesure pas le bonheur ni les inégalités. Des alternatives comme l'IDH ou le Bonheur National Brut ont été proposées."},
{theme:"economie",diff:"facile",type:"q",q:"Quelle institution est chargée de la politique monétaire de la zone euro ?",a:"La Banque Centrale Européenne (BCE)",detail:"Fondée en 1998, siège à Francfort, la BCE fixe les taux d'intérêt directeurs. En 2012, Mario Draghi a sauvé l'euro avec sa phrase : « Whatever it takes. »"},
{theme:"economie",diff:"moyen",type:"q",q:"Quelle est la thèse centrale de Keynes sur le rôle de l'État en récession ?",a:"L'État doit stimuler la demande par la dépense publique (relance budgétaire)",detail:"Dans la Théorie générale (1936), Keynes réfute l'idée que les marchés s'auto-régulent. En récession, l'État doit compenser la chute de la demande privée. Cette vision guidera le New Deal et les politiques d'après-guerre."},
{theme:"economie",diff:"moyen",type:"d",q:"Phénomène par lequel une hausse généralisée des prix érode le pouvoir d'achat",a:"L'inflation",detail:"Mesurée par l'indice des prix à la consommation (IPC). Une inflation modérée (~2 %) est considérée saine. L'hyperinflation (Allemagne 1923, Zimbabwe 2008) peut détruire une économie en quelques mois."},
{theme:"economie",diff:"moyen",type:"q",q:"Qu'est-ce que le « dilemme du prisonnier » en théorie des jeux ?",a:"Une situation où deux acteurs rationnels prennent une décision sous-optimale faute de coopération",detail:"Deux prisonniers peuvent se dénoncer ou se taire. En agissant chacun dans son intérêt, tous deux se dénoncent — et sont plus lourdement condamnés qu'en coopérant. Ce paradoxe explique de nombreuses défaillances de la coopération internationale."},
{theme:"economie",diff:"difficile",type:"q",q:"Qu'est-ce que la « destruction créatrice » selon Schumpeter ?",a:"Le capitalisme progresse en détruisant continuellement les structures existantes pour en créer de nouvelles",detail:"Dans Capitalisme, socialisme et démocratie (1942), l'innovation est le moteur du capitalisme : l'automobile détruit l'industrie du cheval, internet détruit la presse papier — tout en créant de nouvelles richesses."},
{theme:"economie",diff:"difficile",type:"d",q:"Situation où les marchés financiers s'emballent dans une spirale spéculative déconnectée de la valeur réelle",a:"Une bulle spéculative",detail:"La tulipomanie hollandaise (1637), le krach de 1929, la bulle internet (2000), la crise des subprimes (2008) suivent le même schéma : euphorie, sur-valorisation, panique, effondrement. Chaque bulle conclut que « cette fois c'est différent »."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel économiste britannique publie en 1890 les Principes d'économie, fondant l'école néoclassique et la notion d'utilité marginale décroissante ?",a:"Alfred Marshall (1842-1924)",detail:"Marshall formalise l'analyse microéconomique moderne : courbes d'offre et de demande, élasticité, surplus du consommateur. Son concept d'équilibre partiel reste le cadre de base de l'analyse économique standard enseigné dans tous les manuels."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel économiste autrichien s'oppose frontalement à Keynes dans les années 1930 et théorise que les cycles économiques sont causés par l'expansion artificielle du crédit ?",a:"Friedrich Hayek (1899-1992) — Prix Nobel 1974",detail:"Hayek, chef de file de l'École autrichienne, argue que les taux d'intérêt artificiellement bas faussent les signaux de marché. Son œuvre La Route de la servitude (1944) critique le planisme. Ses idées influencent Thatcher et Reagan dans les années 1980."},
{theme:"economie",diff:"moyen",type:"q",q:"Quel économiste américain popularise le monétarisme et démontre que la Grande Dépression a été aggravée par une erreur de politique monétaire de la Fed ?",a:"Milton Friedman (1912-2006) — Prix Nobel 1976",detail:"Friedman, avec Anna Schwartz, montre dans Une Histoire monétaire des États-Unis (1963) que la Fed a laissé la masse monétaire s'effondrer de 30 %. Il théorise le NAIRU et la règle monétaire, inspirant les banquiers centraux modernes."},
{theme:"economie",diff:"facile",type:"q",q:"Quelle crise financière mondiale, déclenchée par l'effondrement du marché des subprimes américains, frappe l'économie mondiale à partir de 2008 ?",a:"La crise des subprimes (2007-2008) — Grande Récession",detail:"Les subprimes sont des prêts hypothécaires à risque titrisés et vendus mondialement. La faillite de Lehman Brothers (15 sept. 2008) déclenche une crise systémique. Le PIB mondial recule pour la première fois depuis 1945, effaçant 2 000 milliards de dollars d'actifs."},
