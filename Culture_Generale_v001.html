{theme:"nature",diff:"facile",type:"q",q:"Quelle plaque tectonique, la plus grande de la lithosphère terrestre, couvre la majorité de l'océan Pacifique et se déplace de 7 à 11 cm par an vers le nord-ouest ?",a:"La plaque Pacifique — sa collision avec les plaques voisines crée la 'Ceinture de feu du Pacifique', zone de 75 % des volcans et 90 % des séismes mondiaux",detail:"La Ceinture de feu du Pacifique (Ring of Fire) entoure l'océan Pacifique sur 40 000 km. Elle inclut les Andes, la côte ouest américaine (San Andreas), l'Alaska, les îles Aléoutiennes, le Japon, les Philippines, la Nouvelle-Zélande. 452 volcans actifs s'y trouvent. Le Japon subit ~1 500 séismes par an en raison de sa position sur 4 plaques tectoniques."},
{theme:"nature",diff:"moyen",type:"q",q:"Quelle éruption volcanique de 1815, la plus puissante des 500 dernières années (tambora, Indonésie), provoque 'l'année sans été' en 1816 et une famine mondiale causant 90 000 morts directs et peut-être 100 000 morts par famine ?",a:"L'éruption du Tambora (île de Sumbawa, Indonésie) le 10 avril 1815 — magnitude 7 sur l'Indice d'explosivité volcanique, 150 km³ de matériaux éjectés",detail:"Le Tambora projette 150 km³ de débris. L''Année sans été' (1816) : gelées en juillet en Nouvelle-Angleterre, famines en Europe (les récoltes gèlent), émeutes du pain en France. Mary Shelley, en vacances au lac Léman sous des cieux sombres, écrit Frankenstein. Byron écrit 'Darkness'. Le cheval, trop cher à nourrir, est remplacé par... la draisienne (ancêtre du vélo), inventée en 1817."},
{theme:"nature",diff:"moyen",type:"q",q:"Quelle faille géologique californienne (San Andreas), longue de 1 300 km, est à l'origine de nombreux séismes dont le 'Grand tremblement de terre de San Francisco' de 1906 ?",a:"La faille de San Andreas — frontière entre la plaque Pacifique (se déplaçant vers le nord-ouest) et la plaque nord-américaine, elle accumule 4-6 cm de contrainte par an",detail:"Le séisme de San Francisco de 1906 (magnitude 7,9) tue 3 000 personnes et détruit 28 000 bâtiments. L'incendie qui suit cause plus de dégâts que le séisme. La faille de San Andreas traverse Los Angeles (qui se déplace vers San Francisco à raison de 5 cm/an). Dans 15 millions d'années, Los Angeles sera au niveau de San Francisco. Le 'Big One' attendu (magnitude 8+) est une question de 'quand' pas de 'si'."},
{theme:"nature",diff:"difficile",type:"q",q:"Quelle période géologique, il y a 66 millions d'années, voit la disparition des dinosaures non-aviens due à l'impact d'un astéroïde et ses conséquences, et quel site mexicain conserve la trace de cet impact ?",a:"La limite K-Pg (Crétacé-Paléogène) — le cratère de Chicxulub (Yucatán, Mexique) mesure 180 km de diamètre et son impact a déclenché un hiver nucléaire",detail:"L'astéroïde de 10 km frappe le Yucatán à 70 000 km/h. L'explosion équivaut à 1 milliard de bombes atomiques. Les débris en retombant chauffent l'atmosphère à 300°C. Un hiver volcanique s'ensuit (poussières bloquant le soleil). 75 % des espèces disparaissent. Les survivants incluent les oiseaux (dinosaures aviens), les mammifères, les crocodiliens et les tortues. L'iridium anormalement abondant dans les roches K-Pg trahit l'origine extraterrestre."},
{theme:"nature",diff:"facile",type:"q",q:"Quel point de l'océan Pacifique est le plus profond de tous les océans, avec 11 034 mètres de profondeur, exploré pour la première fois par Jacques Piccard en 1960 ?",a:"La fosse des Mariannes (Challenger Deep) — Jacques Piccard et Don Walsh descendent à bord du bathyscaphe Trieste en 1960, James Cameron en 2012 en solo",detail:"La pression au fond de la fosse des Mariannes est de 1 086 bars (1 000x la pression atmosphérique). Malgré ces conditions, des organismes y vivent : amphipodes, holothuries, foraminifères. James Cameron descend en 2012 dans son submersible Deepsea Challenger. La fosse est si profonde que l'Everest (8 849 m) y serait submergé avec 2 km d'eau au-dessus."},
{theme:"nature",diff:"moyen",type:"q",q:"Quel courant océanique atlantique, le Gulf Stream, transporte plus d'eau que tous les fleuves du monde réunis et maintient l'Europe du Nord 5 à 10°C plus chaude qu'elle ne le serait sans lui ?",a:"Le Gulf Stream (partie de l'AMOC, circulation méridienne de retournement atlantique) transporte 30 millions de m³/s — 300x le débit de l'Amazone",detail:"Le Gulf Stream est propulsé par la différence de densité entre eaux chaudes tropicales et eaux froides arctiques. Sa force motrice est la plongée d'eau froide et salée en Atlantique Nord. Le réchauffement climatique (fonte des glaces du Groenland = eau douce) affaiblit ce moteur. Un affaiblissement significatif pourrait refroidir l'Europe de l'Ouest de 5-10°C malgré le réchauffement global."},
{theme:"nature",diff:"moyen",type:"q",q:"Quelle étendue marine, le Triangle des Bermudes, concentre-t-elle davantage de naufrages que d'autres zones maritimes, et quelle explication scientifique a été proposée pour les disparitions mystérieuses ?",a:"Non — le Triangle des Bermudes n'a pas de taux de sinistres supérieur aux autres zones maritimes selon Lloyd's of London. Les 'disparitions' sont des mythes médiatiques",detail:"Lloyd's of London (assureurs maritimes) ne classe pas le Triangle des Bermudes comme zone à risque supérieur. Les 'mystères' ont des explications banales : tempêtes, erreurs de navigation, trafic maritime intense. La théorie des 'bulles de méthane' (éruptions sous-marines diminuant la densité de l'eau) est séduisante mais non confirmée. Charles Berlitz popularise le mythe en 1974 avec un livre omettant les cas résolus."},
{theme:"nature",diff:"difficile",type:"q",q:"Comment les récifs coralliens, qui couvrent 0,1 % de la surface océanique, abritent-ils 25 % de toutes les espèces marines, et quelle menace le réchauffement pose-t-il à travers le phénomène de blanchissement ?",a:"Le blanchissement corallien survient quand la température dépasse de 1-2°C la normale : les coraux expulsent leurs algues symbiotiques (zooxanthelles) qui leur donnent couleur et nutriments — ils blanchissent et meurent",detail:"Les zooxanthelles (algues unicellulaires) vivent en symbiose dans les tissus des coraux et fournissent 90 % de leur énergie par photosynthèse. Le stress thermique rompt cette symbiose. La Grande Barrière de Corail (Australie) a subi 5 épisodes de blanchissement massif depuis 1998. À +1,5°C de réchauffement, 70-90 % des récifs mondiaux disparaîtraient ; à +2°C, 99 %."},
{theme:"nature",diff:"facile",type:"q",q:"Quel programme de réintroduction du loup dans le parc de Yellowstone (1995) a déclenché une 'cascade trophique' qui a modifié jusqu'à la géographie des rivières ?",a:"La réintroduction de 41 loups gris dans Yellowstone entre 1995 et 1997 a déclenché une cascade trophique : les cerfs évitent les vallées, la végétation repousse, les rivières se stabilisent",detail:"Sans loups depuis 70 ans, les cerfs surpâturaient les vallées (herbes, arbustes, jeunes arbres dévorés). Avec les loups, les cerfs évitent les zones à risque. La végétation repousse sur les berges : les arbres (trembles, saules) stabilisent les rives, la température des rivières baisse, les castors reviennent, les rongeurs prolifèrent. Les rivières changent de tracé. Ce phénomène illustre comment un prédateur 'apex' restructure tout un écosystème."},
{theme:"nature",diff:"moyen",type:"q",q:"Quel est l'état de la population de pandas géants en 2024, et pourquoi leur reproduction en captivité a-t-elle longtemps échoué malgré les milliards investis ?",a:"La population sauvage dépasse 1 800 individus (2024) — reclassifié de 'en danger' à 'vulnérable' en 2016. La reproduction en captivité échoue car les pandas ont une fenêtre fertile de 2-3 jours/an",detail:"La femelle panda n'est fertile que 1-3 jours par an. Les mâles en captivité montrent peu d'intérêt sexuel ('désintérêt sexuel' documenté). Les zoos ont utilisé des films de pandas en accouplement, de la 'musculation' et des hormones pour stimuler la reproduction. Les succès récents (Chengdu) combinent insémination artificielle et soins intensifs. Le panda coûte à la Chine 1 million de dollars/an/animal prêté aux zoos étrangers."},
{theme:"nature",diff:"moyen",type:"q",q:"Quel écologiste américain, auteur de 'A Sand County Almanac' (1949), est considéré comme le père de l'écologie moderne et de l'éthique environnementale américaine ?",a:"Aldo Leopold (1887-1948) — sa 'Land Ethic' étend la communauté morale aux sols, eaux, plantes et animaux",detail:"Leopold passe de chasseur et gestionnaire forestier à pionnier de l'écologie. Son évolution est emblématique : il abat une louve au Nouveau-Mexique et voit 'dans ses yeux mourir quelque chose que lui seul connaissait'. Il développe la 'Land Ethic' : une chose est juste si elle tend à préserver l'intégrité, la stabilité et la beauté de la communauté biotique. A Sand County Almanac influencera le mouvement environnemental américain des années 1960-70."},
{theme:"nature",diff:"difficile",type:"q",q:"Comment les éléphants d'Afrique jouent-ils le rôle d''ingénieurs de l'écosystème' dans les savanes et forêts africaines, et quel impact leur disparition aurait-elle sur la forêt tropicale ?",a:"Les éléphants créent des clairières (arbres abattus), disséminent des graines (selles), creusent des trous d'eau (source d'eau pour 30 espèces) et maintiennent les prairies en broyant la bush",detail:"Les éléphants de forêt (Loxodonta cyclotis) sont les 'mégajardins' des forêts d'Afrique centrale : ils disséminent les graines de grands arbres (jusqu'à 60 kg/jour) dans leurs excréments sur des dizaines de km. Sans éléphants, ces espèces disparaissent. Les éléphants creusent des trous d'eau pendant la saison sèche (utilisés par 30+ espèces). Leurs 'chemins' deviennent des routes forestières. Leur braconnage massif (120/jour dans les années 2010) menace l'ensemble de l'écosystème."},
{theme:"nature",diff:"facile",type:"q",q:"Quel phénomène météorologique, appelé 'El Niño', perturbe périodiquement les courants océaniques du Pacifique et déclenche des sécheresses en Australie, inondations en Amérique du Sud et famines en Afrique ?",a:"El Niño (ENSO — El Niño Southern Oscillation) est un réchauffement anormal des eaux du Pacifique tropical qui inverse les vents alizés et perturbe les précipitations mondiales",detail:"Normalement, les vents alizés poussent les eaux chaudes vers l'Australie-Asie. Lors d'El Niño, ces vents faiblissent : les eaux chaudes reflux vers l'Amérique du Sud. L'Australie s'assèche, le Pérou reçoit des pluies torrentielles. Un épisode fort (1997-1998) tue 23 000 personnes et cause 45 milliards de dégâts. Le cycle El Niño/La Niña se répète tous les 2-7 ans."},
{theme:"nature",diff:"moyen",type:"q",q:"Quel phénomène lumineux polaire, l'aurore boréale (Aurora Borealis), est causé par quelle interaction entre le vent solaire et le champ magnétique terrestre ?",a:"Les particules chargées du vent solaire, déviées par la magnétosphère, excitent les atomes d'oxygène et d'azote dans la haute atmosphère — les couleurs dépendent de l'altitude et du gaz excité",detail:"L'oxygène à 100-200 km produit le vert (couleur dominante). L'oxygène à 300+ km produit le rouge rare. L'azote produit le bleu/violet. Les aurores sont plus fréquentes lors des maxima du cycle solaire (11 ans). L'aurore australe (aurora australis) est son pendant dans l'hémisphère sud. La tempête solaire de mai 2024 a produit des aurores visibles jusqu'en Espagne et au Texas."},
{theme:"nature",diff:"moyen",type:"q",q:"Quel séisme et tsunami de 2004 dans l'océan Indien, de magnitude 9,1-9,3, a tué 228 000 personnes dans 14 pays et est le troisième plus grand séisme jamais enregistré ?",a:"Le séisme de Sumatra-Andaman du 26 décembre 2004 — il libère une énergie équivalente à 23 000 bombes atomiques et déplace l'axe de rotation terrestre de 2,5 cm",detail:"L'épicentre est au large de la côte nord-ouest de Sumatra. La rupture de la faille dure 8-10 minutes (la plus longue jamais enregistrée). Les vagues atteignent 30 m en Aceh (Indonésie), 9 m au Sri Lanka, 3 m en Somalie (8 000 km de l'épicentre). L'absence de système d'alerte au tsunami dans l'océan Indien (contrairement au Pacifique) aggrave le bilan. Un réseau d'alerte est déployé dès 2005."},
{theme:"nature",diff:"difficile",type:"q",q:"Quelle région naturelle, le permafrost sibérien, contient-il suffisamment de carbone organique pour doubler le CO2 atmosphérique s'il dérèglait complètement, et pourquoi sa fonte libère-t-elle du méthane plutôt que du CO2 ?",a:"Le permafrost arctique stocke 1 700 milliards de tonnes de carbone — sa fonte anaérobie (sans oxygène, dans l'eau des thermokarsts) produit du méthane (CH4), 80x plus puissant que le CO2 sur 20 ans",detail:"Le permafrost (sol gelé en permanence) couvre 25 % des terres émergées de l'hémisphère Nord. Il stocke des matières organiques gelées depuis des millénaires. Sa fonte crée des lacs thermokarst (terrain effondré rempli d'eau). La décomposition en milieu anaérobie produit du méthane. Cette boucle de rétroaction — réchauffement → fonte → méthane → réchauffement — est l'un des 'points de basculement' les plus redoutés du changement climatique."},
{theme:"nature",diff:"facile",type:"q",q:"Quel oiseau néo-zélandais, le kiwi, est si atypique parmi les oiseaux qu'il possède des narines au bout du bec, des os denses (pas creux comme les autres oiseaux), une température de mammifère et des plumes ressemblant à du poil ?",a:"Le kiwi (genre Apteryx) — oiseau incapable de voler, nocturne, dont l'œuf pèse 20 % du poids de la femelle (le plus gros rapport œuf/corps du monde chez les oiseaux)",detail:"Le kiwi a évolué en isolement en Nouvelle-Zélande, sans prédateurs terrestres (jusqu'à l'arrivée de l'homme polynésien). Son œuf est proportionnellement 6x plus grand que celui d'une poule de même taille. L'incubation est assurée par le mâle (70 à 80 jours). Ses narines à l'extrémité du bec lui permettent de sentir les vers sous terre. Ses os pleins (non creux) le rendent plus lourd mais incapable de voler. Menacé par les animaux introduits (hermines, chats, rats)."},
{theme:"nature",diff:"moyen",type:"q",q:"Quel requin, le requin baleine (Rhincodon typus), est le plus grand poisson du monde, et quelle est son alimentation paradoxale pour un animal de 12 mètres ?",a:"Le requin baleine est le plus grand poisson (jusqu'à 20 m) — il se nourrit exclusivement de plancton, petits poissons et œufs de poisson filtrés par ses branchies",detail:"Le requin baleine avale 21 millions de krill par jour. Ses dents (3 000!) sont vestigiales — il n'en a aucun usage. Sa gueule de 1,5 m filtre 6 000 litres d'eau/heure. Malgré sa taille, il est inoffensif pour les humains. Il peut vivre 130 ans (découvert grâce aux bombes nucléaires : les essais atomiques de 1950-60 ont créé une 'signature' de carbone 14 dans les vertèbres, permettant de dater précisément les individus)."},
{theme:"nature",diff:"moyen",type:"q",q:"Quel mammifère marin, le cachalot (Physeter macrocephalus), plonge à 2 000 mètres de profondeur pour chasser les calmars géants, et quel organe unique de sa tête lui permettrait de se repérer par écholocation ?",a:"Le spermaceti — organe céphalique du cachalot rempli d'une huile cireuse permettant l'écholocation et peut-être de moduler la flottabilité lors des plongées profondes",detail:"Le cachalot peut plonger à 2 000+ m pendant 90 minutes. Son spermaceti (latin : sperme de baleine — les baleiniers croyaient que c'était du sperme) est une cire complexe qui se solidifie dans l'eau froide et se liquéfie au chaud, aidant peut-être à moduler la flottabilité. Ses clics d'écholocation atteignent 230 décibels — les plus puissants du règne animal. Les cicatrices de ventouses géantes sur sa peau témoignent de ses combats avec les calmars géants."},
{theme:"nature",diff:"difficile",type:"q",q:"Comment les dauphins utilisent-ils l'écholocation avec une précision dépassant tout sonar humain, et quelles structures anatomiques spécialisées produisent et reçoivent ces signaux ?",a:"Les dauphins produisent des clics dans leurs sacs nasaux (phonic lips), concentrés par le melon (masse graisseuse céphalique), et reçoivent le retour via la mâchoire inférieure jusqu'à l'oreille interne",detail:"Le mélon (masse adipeuse spécialisée dans le front du dauphin) focalise les ultrasons comme une lentille acoustique. Les clics (100-150 kHz) rebondissent sur les objets. Les vibrations de retour traversent la mâchoire inférieure (remplie de graisse) jusqu'à l'oreille interne. La résolution est suffisante pour distinguer deux objets séparés de 1 cm à 3 mètres de distance. Les dauphins 'voient' en 3D par le son."},
{theme:"nature",diff:"moyen",type:"q",q:"Quelle plante carnivore, la Nepenthes rajah de Bornéo, piège non seulement des insectes mais aussi des rongeurs dans ses urnes pouvant contenir plus de 3 litres de liquide digestif ?",a:"Nepenthes rajah — la plus grande plante carnivore du monde, ses urnes de 35 cm peuvent piéger des grenouilles, des lézards et des rats",detail:"Nepenthes rajah est endémique du mont Kinabalu (Sabah, Malaisie). Ses urnes (modifiées de feuilles) contiennent un liquide visqueux avec des enzymes digestives. Des rats, écureuils et grenouilles se noient dedans et sont digérés. Une espèce voisine (Nepenthes hemsleyana) s'est adaptée pour loger des chauves-souris en échange de leurs excréments (azote) — une symbiose unique."},
{theme:"nature",diff:"difficile",type:"q",q:"Comment la pollinisation croisée entre fleurs et insectes a-t-elle co-évolué pendant 100 millions d'années, et quelle extinction des abeilles serait-elle susceptible de déclencher selon Einstein (citation apocryphe) ?",a:"Les angiospermes et leurs pollinisateurs co-évoluent depuis le Crétacé — la disparition des abeilles affecterait 80 % des plantes à fleurs et mettrait en danger 35 % de la production alimentaire mondiale",detail:"La citation 'Si les abeilles disparaissent, l'humanité n'a plus que 4 ans à vivre' est apocryphe (non attribuée à Einstein par ses archives). Mais le fond est sérieux : 80 % des plantes à fleurs dépendent des pollinisateurs. 35 % de la production alimentaire mondiale dépend de la pollinisation (fruits, légumes, oléagineux). Les abeilles mellifères voient leurs colonies s'effondrer (Colony Collapse Disorder) depuis 2006 — pesticides, varroa, manque de diversité florale."},
{theme:"nature",diff:"facile",type:"q",q:"Quel sommet, le mont Everest (8 849 m), a été gravi pour la première fois le 29 mai 1953 par quel duo, et combien de personnes l'ont depuis atteint ?",a:"Edmund Hillary (Néo-Zélandais) et Tenzing Norgay (sherpa népalais) — plus de 6 000 personnes ont depuis atteint le sommet, avec des embouteillages mortels depuis les années 2010",detail:"Hillary et Norgay atteignent le sommet à 11h30 le 29 mai 1953 — la nouvelle est annoncée le 2 juin, jour du couronnement d'Elizabeth II. Depuis, l'Everest est devenu un tourisme de luxe (45 000 dollars minimum). Les embouteillages en zone morte (>8 000 m, manque d'O2) ont causé des morts. Plus de 300 cadavres restent sur la montagne — les conditions de conservation naturelle les préservent."},
{theme:"nature",diff:"moyen",type:"q",q:"Quelle expédition scientifique antarctique révèle en 1985 le 'trou' dans la couche d'ozone au-dessus du pôle Sud, menant directement au Protocole de Montréal (1987) et son interdiction des CFC ?",a:"Les scientifiques britanniques de la British Antarctic Survey (Joe Farman, Brian Gardiner, Jon Shanklin) publient leurs mesures en 1985 — la NASA confirme via satellite",detail:"Farman, Gardiner et Shanklin mesurent depuis 1957 l'ozone polaire. En 1984, ils observent une chute de 40 % de la concentration en ozone au-dessus de Halley Bay. La NASA, qui avait des données satellites similaires, avait programmé son ordinateur pour ignorer les valeurs 'aberrantes'. Le Protocole de Montréal (1987) est rapidement signé — interdisant les CFC. La couche d'ozone se reconstitue progressivement et devrait être 'guérie' vers 2066."},
{theme:"nature",diff:"difficile",type:"q",q:"Quelle est la 'Grande Migration' annuelle du Serengeti, considérée comme le plus grand mouvement d'animaux terrestres du monde, et quels prédateurs orchestrent le 'gauntlet' du passage du Mara ?",a:"1,5 million de gnous (plus 200 000 zèbres et 350 000 gazelles) migrent en circuit de 800 km entre le Serengeti (Tanzanie) et le Masai Mara (Kenya) — le passage du fleuve Mara est le moment le plus spectaculaire et dangereux",detail:"La grande migration est cyclique et suit les pluies. Les gnous passent le fleuve Mara au Kenya (juillet-octobre) sous les yeux des crocodiles du Nil qui attendent leur repas annuel garanti. Les lions, léopards et guépards des deux côtés profitent de cette concentration. 250 000 gnous meurent par an d'épuisement, prédation et noyade. Ce flux de nutriments (cadavres) nourrit l'ensemble de l'écosystème."},
{theme:"nature",diff:"moyen",type:"q",q:"Quelle activiste suédoise, Greta Thunberg, a déclenché en 2018 un mouvement mondial de grèves scolaires pour le climat, et quelle phrase a-t-elle prononcée à l'ONU en 2019 ?",a:"Greta Thunberg (née en 2003) commence sa grève devant le Parlement suédois en août 2018 — à l'ONU en 2019 : 'How dare you !' ('Comment osez-vous !') face aux dirigeants mondiaux",detail:"Greta Thunberg, diagnostiquée Asperger et dépressive après avoir appris le changement climatique à 11 ans, commence sa grève de l'école le 20 août 2018. En 9 mois, le mouvement Fridays For Future touche 180 pays. Elle traverse l'Atlantique en voilier zéro-carbone pour le sommet de l'ONU. Son discours 'How dare you' va viral. Time Person of the Year 2019. Elle critique ensuite les 'blablabla' des COP."},
{theme:"nature",diff:"difficile",type:"q",q:"Quel scientifique suédois, Svante Arrhenius, a prédit dès 1896 que la combustion du charbon allait réchauffer la planète, et pourquoi voyait-il initialement ce réchauffement comme une bonne nouvelle pour l'agriculture ?",a:"Arrhenius publie en 1896 un calcul montrant qu'un doublement du CO2 atmosphérique réchaufferait la Terre de 5-6°C — il pensait que cela améliorerait l'agriculture en Scandinavie",detail:"Svante Arrhenius (Prix Nobel de chimie 1903) passe un an à calculer à la main l'effet de serre du CO2. Il prédit correctement l'ordre de grandeur du réchauffement. Mais en 1896, les émissions mondiales sont marginales — il pensait que le doublement prendrait 3 000 ans (en réalité, on pourrait y parvenir d'ici 2100). Il voyait le réchauffement comme bénéfique pour la Suède froide. Son collègue Nils Eckholm suggérait même de brûler plus de charbon pour accélérer le processus."},
{theme:"nature",diff:"moyen",type:"q",q:"Quel glacier, le plus grand de l'Antarctique occidental (Thwaites, surnommé 'glacier de l'Apocalypse'), inquiète les scientifiques par son potentiel de contribution à la montée des eaux en cas d'effondrement ?",a:"Le glacier Thwaites couvre 192 000 km² — son effondrement total ajouterait 65 cm au niveau mondial, mais en déstabilisant les glaciers voisins, le potentiel total atteint 3,5 mètres",detail:"Thwaites perd 50 milliards de tonnes de glace par an (2x plus qu'en 1990). Sa base est en contact avec l'eau de mer qui se glisse dessous et accélère la fonte. Son instabilité est due à son 'lit' (sol sous-glaciaire) en pente intérieure — une fois la retraite enclenchée, elle peut s'auto-accélérer (instabilité marine de la nappe glaciaire). Le terme 'glacier de l'Apocalypse' vient d'un article de 2022 dans Nature."},
{theme:"nature",diff:"facile",type:"q",q:"Quel mammifère marin, la loutre de mer (Enhydra lutris), dort sur le dos en se tenant la main avec ses congénères pour ne pas dériver, et maintient quel écosystème grâce à son appétit pour les oursins ?",a:"La loutre de mer maintient les forêts de kelp (algues géantes) en contrôlant les populations d'oursins qui, sans prédateurs, dévorent les algues et créent des 'déserts marins'",detail:"Sans loutres, les oursins prolifèrent et détruisent les forêts de kelp (algues Macrocystis pouvant atteindre 50 m). Ces forêts abritent des centaines d'espèces (loutres, dauphins, phoques, poissons). Les loutres mangent 25 % de leur poids en oursins par jour. Elles utilisent des pierres comme outils pour ouvrir les coquillages — une des rares espèces d'animaux à utiliser des outils en milieu marin."},
{theme:"nature",diff:"facile",type:"q",q:"Quel oiseau construit le plus grand nid du règne aviaire — une plate-forme pouvant peser 2 tonnes et servir pendant des décennies de génération en génération ?",a:"L'aigle chauve américain (Haliaeetus leucocephalus) — le plus grand nid jamais mesuré (Floride, 1963) mesurait 2,9 m de large, 6 m de profondeur et pesait 2 tonnes",detail:"Les nids d'aigle chauve ('eyries') sont réutilisés et agrandis chaque année. Le record floridien était utilisé depuis 34 ans quand une tempête le détruisit. L'aigle chauve a failli s'éteindre dans les années 1960 (70 000 → 417 couples nicheurs) à cause du DDT (pesticide qui fragilise les coquilles). Son rétablissement après l'interdiction du DDT (1972) est un succès de conservation."},
{theme:"nature",diff:"moyen",type:"q",q:"Quel phénomène biologique dit 'mimétisme batésien' permet à des espèces inoffensives d'imiter l'apparence d'espèces toxiques pour éviter les prédateurs, et qui l'a décrit le premier ?",a:"Henry Walter Bates (1862) décrit ce mimétisme après 11 ans en Amazonie — les papillons inoffensifs imitent l'apparence des papillons toxiques, trompant les prédateurs",detail:"Bates observe que certains papillons Pieridae (inoffensifs) ressemblent à s'y méprendre aux papillons Heliconius (toxiques, accumulent des alcaloïdes des plantes hôtes). Les oiseaux apprennent à éviter les Heliconius et évitent aussi les imitateurs. L'évolution converge vers le même motif visuel par sélection naturelle. Exemples emblématiques : la couleuvre lait imitant le serpent corail venimeux."},
{theme:"nature",diff:"moyen",type:"q",q:"Quelle recherche pionnière de Jane Goodall dans les années 1960 a révolutionné notre compréhension de la frontière entre humain et animal en observant les chimpanzés de Gombe ?",a:"Goodall découvre que les chimpanzés fabriquent et utilisent des outils, mangent de la viande, font la guerre et ont des cultures distinctes selon les groupes — effaçant la frontière outil-utilisation considérée comme uniquement humaine",detail:"Louis Leakey envoie Jane Goodall (sans diplôme universitaire à l'époque) étudier les chimpanzés de Gombe en 1960. Elle découvre : fabrication d'outils (brins modifiés pour extraire les termites), chasse organisée, guerres inter-groupes, infanticide, comportements altruistes. 'Now we must redefine tool, redefine man, or accept chimpanzees as humans', dit Leakey. Elle fonde l'Institut Jane Goodall et se consacre à la conservation."},
{theme:"nature",diff:"moyen",type:"q",q:"Quel oiseau chanteur australien, le ménure (Menura novaehollandiae ou 'lyrebird'), est capable d'imiter exactement le chant de 20 autres espèces et même les sons humains comme les tronçonneuses ?",a:"Le ménure superbe (Albert's lyrebird / Superb lyrebird) — le mâle passe 15 ans à perfectionner son répertoire de sons, dont 80 % sont des imitations d'autres espèces",detail:"Le ménure mâle utilise son répertoire pour attirer les femelles pendant la parade nuptiale. Il imite les kookaburras, cacatoès et autres espèces locales avec une précision parfaite (enregistrements spectrographiques confirmés). Depuis les années 1980, des ménures imitent les tronçonneuses de bûcherons — preuve que ce comportement est culturellement transmis. Les femelles choisissent les mâles avec les répertoires les plus variés."},
{theme:"nature",diff:"facile",type:"q",q:"Quelle grenouille, le dendrobate (Dendrobatidae), est l'un des animaux les plus venimeux du monde malgré sa taille minuscule, et d'où tire-t-elle sa toxine en captivité ou dans la nature ?",a:"Les grenouilles dendrobates tirent leurs alcaloïdes (batrachotoxines) de leur alimentation — en captivité sans fourmis spécifiques et coléoptères, elles perdent leur toxicité",detail:"Orana terribilis (grenouille dorée empoisonnée) produit assez de batrachotoxine pour tuer 10 humains. Mais en captivité nourries aux grillons, elles sont inoffensives. La toxine vient des fourmis et coléoptères spécifiques de leur habitat amazonien. Les Amérindiens Emberá et Noanamá enduisent leurs flèches de la toxine (d'où 'dart frog' en anglais). La batrachotoxine bloque les canaux sodiques nerveux — mort par paralysie cardiaque."},
{theme:"nature",diff:"difficile",type:"q",q:"Comment les termites construisent-ils des termitières pouvant atteindre 9 mètres de hauteur avec un système de ventilation maintenant une température et un CO2 constants à l'intérieur, sans architecte central ?",a:"Les termites construisent par stigmergie — chaque individu réagit aux traces chimiques et physiques laissées par les autres, produisant un comportement collectif complexe sans coordination centrale",detail:"La stigmergie (Grassé, 1959) : les termites déposent des granules de sol imprégnés de phéromones. Là où les granules s'accumulent, d'autres termites en déposent davantage. Cette rétroaction positive crée des piliers, arches et chambres complexes. La termitière régule activement sa température (±1°C), son CO2 et son humidité via des cheminées d'aération que les termites ouvrent ou ferment selon les conditions. Eastgate Centre (Harare, Zimbabwe) s'est inspiré de ce système pour sa climatisation passive."},
{theme:"nature",diff:"facile",type:"q",q:"Quel animal produit la toile la plus résistante proportionnellement — plus solide que l'acier et aussi élastique que le caoutchouc — que les ingénieurs tentent de reproduire artificiellement depuis des décennies ?",a:"L'araignée — sa soie dragline (fil de soutien) est 5x plus résistante que l'acier de même diamètre et peut s'étirer de 40 % avant de rompre",detail:"La soie d'araignée combine résistance (1,3 GPa) et élasticité (extensibilité de 40 %). L'acier est rigide (résiste mais casse). La soie absorbe les chocs (énergie de rupture). Des applications potentielles : gilets pare-balles, fils chirurgicaux, câbles de ponts suspendus. Mais les araignées ne peuvent pas être élevées (cannibalisme). La soie de synthèse via bactéries transgéniques ou levures (Bolt Threads, Spiber) est en développement."},
{theme:"nature",diff:"moyen",type:"q",q:"Quelle relation symbiotique entre le poisson-clown (Amphiprion) et l'anémone de mer illustre comment deux espèces peuvent co-évoluer pour un bénéfice mutuel — et comment le poisson résiste-t-il au venin de l'anémone ?",a:"Le poisson-clown est protégé du venin de l'anémone par un mucus épais — il défend l'anémone contre les prédateurs et ses excréments la fertilisent (mutualisme)",detail:"L'anémone de mer paralyse et dévore la plupart des poissons. Le poisson-clown sécrète un mucus épais (3x plus épais que les autres poissons) qui inhibe les nématocystes (cellules urticantes). Il danse devant l'anémone pour s'immuniser progressivement au venin. En échange, il chasse les poissons qui mangent l'anémone, aère ses tentacules par ses mouvements et la fertilise de ses excréments. La mort de Nemo (Pixar) illustre que les mâles dominants changent de sexe — le père de Nemo aurait dû devenir femelle."},
{theme:"nature",diff:"difficile",type:"q",q:"Quelle 'explosion cambrienne', survenue il y a 541 millions d'années, voit l'apparition soudaine (en termes géologiques) de la plupart des grands groupes animaux en ~25 millions d'années, et quelles hypothèses l'expliquent ?",a:"L'explosion cambrienne voit apparaître mollusques, arthropodes, vertébrés, échinodermes en ~25 Ma — hypothèses : augmentation de l'O2, apparition des yeux, dégel post-Snowball Earth",detail:"Les schistes de Burgess (Canada) et de Chengjiang (Chine) conservent les organismes mous de cette période. Avant, seuls des organismes simples. En 25 Ma géologiques, toute la diversité animale actuelle apparaît. Hypothèses : 1/ augmentation de l'O2 atmosphérique permettant les métabolismes actifs. 2/ Apparition des yeux (Andrew Parker) déclenchant une course aux armements prédateur-proie. 3/ Dégel après la 'Terre boule de neige' (Snowball Earth, -720 à -635 Ma)."},
{theme:"nature",diff:"moyen",type:"q",q:"Quelle espèce de corbeau (Corvus corax) a une intelligence proche des grands singes, démontrée par sa capacité à résoudre des problèmes en plusieurs étapes, à utiliser des outils et à avoir une théorie de l'esprit ?",a:"Le grand corbeau résout des problèmes à 5-7 étapes, utilise des outils, planifie l'avenir, joue, se souvient des visages et adapte son comportement selon les observateurs",detail:"Les corbeaux cachent leur nourriture et surveillent qui les observe. S'ils sont vus, ils 'feignent' de cacher la nourriture ailleurs. Ils reconnaissent les visages humains individuels (pendant des années). Ils résolvent le problème de la boîte à 8 étapes (Aesop's fable task : lâcher des pierres pour monter le niveau d'eau) mieux que les enfants de 5 ans. Leur cerveau est proportionnellement aussi grand que celui des grands singes, mais organisé différemment."},
{theme:"nature",diff:"facile",type:"q",q:"Quel cétacé, l'orque (Orcinus orca), est en réalité le plus grand membre de la famille des dauphins, et quelles cultures distinctes différencient les populations résidentes des populations transientes du Pacifique Nord ?",a:"Les orques résidentes mangent exclusivement du poisson (saumons) et sont très sociales ; les transientes (Bigg's orcas) chassent les mammifères marins en silence et en petits groupes",detail:"Ces deux 'écotypes' coexistent dans le même océan sans se mélanger ni s'hybrider — séparées depuis ~700 000 ans. Leurs vocalisations sont incompréhensibles les unes aux autres. Les résidentes ont un dialecte distinct par pod (groupe familial). Les orques enseignent à leurs petits des techniques de chasse spécifiques — culture transmise non-génétiquement. Les orques du Pacifique sud-est ont commencé en 2020 à attaquer les gouvernails de voiliers — comportement apparu chez une femelle et copié."},
{theme:"nature",diff:"moyen",type:"q",q:"Quel parasiste microscopique, Toxoplasma gondii, ne peut se reproduire sexuellement que dans l'intestin d'un chat, et comment manipule-t-il le comportement des rats infectés pour atteindre son hôte définitif ?",a:"T. gondii rend les rats attirés (plutôt que terrifiés) par l'odeur d'urine de chat — en infectant le circuit de peur/sexualité du cerveau du rongeur, il facilite sa prédation par le chat",detail:"Les rats infectés perdent leur réponse d'évitement de l'odeur de chat et développent une attirance pour cette odeur. T. gondii forme des kystes dans l'amygdale (peur) et l'hypothalamus (sexualité). Les rats infectés semblent plus téméraires. Ce 'mind control' parfait les chances que le rat soit mangé par un chat. T. gondii infecte ~2 milliards d'humains sans symptômes — des études controversées suggèrent des corrélations avec la personnalité et la schizophrénie."},
{theme:"nature",diff:"difficile",type:"q",q:"Comment la sélection sexuelle théorisée par Darwin dans La Descendance de l'homme (1871) explique-t-elle des caractères comme la queue du paon qui réduisent la survie mais augmentent la reproduction ?",a:"La sélection sexuelle (choix des femelles + compétition entre mâles) favorise des ornements coûteux (queue du paon, bois du cerf) qui signalent honnêtement la qualité génétique du mâle",detail:"Darwin est troublé par la queue du paon : 'Chaque fois que je vois une plume de paon, j'ai la nausée.' Elle contredit la sélection naturelle (la queue alourdit, ralentit, attire les prédateurs). Solution : la sélection sexuelle. Le 'principe du handicap' (Zahavi, 1975) : seul un mâle en bonne santé peut 'se permettre' un tel ornement — signal honnête de qualité génétique. Les femelles qui choisissent ces mâles transmettent des gènes de qualité à leurs fils."},
{theme:"nature",diff:"facile",type:"q",q:"Quel phénomène annuel, la migration des gnous (1,5 million d'individus) entre le Serengeti et le Masai Mara, est considéré comme le plus grand mouvement de mammifères terrestres de la planète ?",a:"La Grande Migration du Serengeti — 1,5 million de gnous à barbe blanche (Connochaetes taurinus), plus 200 000 zèbres et 350 000 gazelles Thompson, parcourent 800 km en circuit",detail:"Les gnous suivent les pluies et l'herbe fraîche dans un circuit annuel entre Tanzanie et Kenya. Ils n'ont pas de chef : chaque individu réagit au gradient d'odeur d'herbe fraîche. La traversée du fleuve Mara (juillet-octobre) est le moment le plus spectaculaire — crocodiles, lions, guépards attendent. 250 000 gnous meurent par an. Leurs cadavres fertilisent l'écosystème."},
{theme:"nature",diff:"moyen",type:"q",q:"Quelle technique de datation au carbone 14, développée par Willard Libby en 1949 (Prix Nobel 1960), permet de dater les matériaux organiques jusqu'à 50 000 ans, et quel isotope du carbone est utilisé ?",a:"Le carbone 14 (¹⁴C ou radiocarbone) — isotope radioactif formé dans la haute atmosphère par les rayons cosmiques, absorbé par tous les êtres vivants et se désintégrant à rythme constant après la mort",detail:"Le ¹⁴C se forme dans l'atmosphère quand les rayons cosmiques frappent l'azote 14. Il est absorbé par les plantes (photosynthèse) et tous les animaux. À la mort, l'organisme cesse d'absorber du ¹⁴C et celui qu'il contient se désintègre (demi-vie 5 730 ans). En mesurant le ratio ¹⁴C/¹²C résiduel, on calcule l'âge. Les tests nucléaires atmosphériques des années 1950-60 ont créé un 'pulse' de ¹⁴C qui permet désormais de dater les tissus biologiques à l'année près."},
{theme:"nature",diff:"difficile",type:"q",q:"Quelle découverte de l'ADN ancien (aDNA) de la grotte de Denisova (Sibérie) a révélé une espèce humaine distincte qui s'est croisée avec Homo sapiens, et quelle preuve génétique persiste dans l'ADN des populations actuelles ?",a:"Les Dénisoviens (Homo denisova) — connus uniquement par un doigt, quelques dents et des génomes (jamais de squelette complet) — ont contribué 4-6 % de l'ADN des populations mélanésiennes et papoues",detail:"Svante Pääbo (Max Planck, Prix Nobel 2022) séquence en 2010 l'ADN d'une phalange de Denisova. L'espèce est inconnue, distincte des Néandertaliens et d'Homo sapiens. Les Dénisoviens vivaient en Asie et se sont croisés avec Homo sapiens en Asie du Sud-Est. Les Papous de Nouvelle-Guinée portent 4-6 % d'ADN dénisovien — dont un gène (EPAS1) qui aide les Tibétains actuels à vivre en altitude (hérité des Dénisoviens)."},
{theme:"nature",diff:"moyen",type:"q",q:"Quel oiseau, l'albatros hurleur (Diomedea exulans), est l'oiseau volant le plus grand en envergure (jusqu'à 3,7 m) et peut vivre 70 ans en parcourant 120 000 km par an sans effort grâce à quelle technique de vol ?",a:"L'albatros utilise le 'vol dynamique' (dynamic soaring) — il exploite le gradient de vent entre la surface de l'océan et l'altitude pour accumuler de l'énergie sans battre des ailes",detail:"Le vol dynamique : l'albatros descend face au vent (gagne de la vitesse), tourne vent de dos près de l'eau (perd de la vitesse mais conserve son élan via l'inertie), remonte 'porté' par le vent de dos, répète. Résultat : des milliers de km par jour en battant des ailes quelques fois. Les albatros hurleurs forment des couples à vie (60-70 ans), dansent à chaque retrouvaille (après 1 an de séparation). La pollution plastique et les palangres les déciment."},
{theme:"nature",diff:"facile",type:"q",q:"Quel mammifère, la baleine à bosse (Megaptera novaeangliae), compose des 'chansons' qui évoluent culturellement d'un océan à l'autre, tous les mâles d'une population adoptant progressivement les nouveautés ?",a:"Les baleines à bosse mâles chantent des séquences complexes évoluant en temps réel — les nouveautés se propagent d'ouest en est dans le Pacifique en quelques mois, comme les 'tubes' musicaux",detail:"Les chants de baleine à bosse sont parmi les productions culturelles les plus complexes du règne animal non-humain. Chaque saison, certains mâles introduisent des variantes. Si la variante est adoptée par quelques mâles influents, elle se propage à toute la population en quelques mois. La même propagation est observée de l'Australie vers la Polynésie française. Les biologistes voient dans ce phénomène une proto-culture musicale."},
{theme:"nature",diff:"moyen",type:"q",q:"Quel lac africain, le lac Victoria, a perdu 200 espèces de cichlidés (poissons) depuis l'introduction du nil perche dans les années 1950, illustrant le concept d''espèce invasive' ?",a:"L'introduction du Nil perche (Lates niloticus) dans le lac Victoria (1954-1963) déclenche l'extinction ou la quasi-extinction de 200 des 500 espèces endémiques de cichlidés",detail:"Le lac Victoria abritait une des plus grandes radiations adaptatives du monde : 500 espèces de cichlidés endémiques, toutes issues d'un ancêtre commun en ~15 000 ans (vitesse évolutive record). Le Nil perche, introduit pour la pêche commerciale, dévore les cichlidés. 200 espèces disparaissent. L'ironie : la filière du Nil perche exporté (congelé en Europe) est documentée dans le film 'Le Cauchemar de Darwin' (2004) qui révèle la misère des pêcheurs locaux."},
{theme:"nature",diff:"difficile",type:"q",q:"Comment la photosynthèse oxygénique, apparue il y a ~2,7 milliards d'années chez les cyanobactéries, a-t-elle causé la 'Grande Oxydation' et une extinction de masse des organismes anaérobies, tout en rendant possible la vie animale complexe ?",a:"L'oxygène libéré par les cyanobactéries était un poison pour les organismes anaérobies dominants — la 'Grande Catastrophe d'Oxydation' (~2,4 Ga) provoque une extinction massive mais crée les conditions de la vie aérobie complexe",detail:"Avant 2,4 milliards d'années, l'atmosphère terrestre est presque sans O2. Les cyanobactéries (premières à produire O2 par photosynthèse) inondent progressivement l'atmosphère d'oxygène. Pour les organismes anaérobies dominants (bactéries et archées), l'O2 est un toxique (il oxyde les molécules). Extinction massive. Mais l'O2 permet des métabolismes beaucoup plus efficaces (respiration cellulaire = 18x plus d'énergie que la fermentation). La couche d'ozone (O3) protège ensuite des UV, permettant la colonisation des terres."},
{theme:"nature",diff:"moyen",type:"q",q:"Quel phénomène dit 'bienfaits de la biodiversité' motive la conservation des espèces au-delà des arguments éthiques — en particulier pour les médicaments et la médecine ?",a:"70 % des médicaments anticancéreux découverts depuis 1940 sont d'origine naturelle ou inspirés d'organismes vivants — le taxol (if), l'aspirine (saule), la pénicilline (champignon), la morphine (pavot)",detail:"La biodiversité est un réservoir pharmacologique : taxol (cancer, extrait de l'if du Pacifique), artemisinine (paludisme, armoise), galantamine (Alzheimer, narcisse), ziconotide (analgésique, cône marin). ~50 000 espèces sont utilisées en médecine traditionnelle dans le monde. Chaque espèce perdue emporte potentiellement des molécules pharmaceutiques inconnues. L'aspidospermine (plante amazonienne) inspire les nouveaux antiviraux. La destruction de la forêt tropicale éteint des espèces avant même leur découverte."},
{theme:"nature",diff:"facile",type:"q",q:"Quel phénomène naturel spectaculaire, les migrations des monarques ou les vols d'étourneaux en murmurations, illustre comment des comportements collectifs complexes émergent sans chef ni coordination centrale ?",a:"Les murmurations d'étourneaux — des milliers d'oiseaux volent en formations fluides sans chef, chaque individu réagissant aux 7 voisins les plus proches selon des règles simples",detail:"Les murmurations d'étourneaux (Sturnus vulgaris) peuvent regrouper des millions d'individus. Chaque oiseau suit 3 règles simples : rester proche de ses voisins, aller à la même vitesse, éviter les collisions. Le comportement collectif complexe (ondulations, spirales) émerge de ces règles locales sans coordination globale. Ce phénomène d''intelligence collective' ou d'émergence inspire les algorithmes d'essaim utilisés en robotique et en intelligence artificielle."},
{theme:"nature",diff:"moyen",type:"q",q:"Quelle espèce de champignon, le Ophiocordyceps unilateralis, parasite les fourmis et manipule leur comportement pour optimiser sa reproduction en les faisant mourir dans un endroit précis ?",a:"Le champignon zombifiant infecte les fourmis charpentières, contrôle leur comportement (les faisant grimper à une hauteur et une orientation précises) avant de les tuer et de libérer ses spores",detail:"Ophiocordyceps unilateralis infecte la fourmi charpentière (Camponotus). Le champignon produit des composés neurochimiques qui font abandonner le nid à la fourmi et grimper à 25 cm du sol (température et humidité optimales pour le champignon) sur la face nord d'une feuille (ensoleillement contrôlé). La fourmi mord la nervure de la feuille (grip de la mort) et meurt. Le champignon émerge de sa tête et libère ses spores. Ce comportement est documenté en ambre vieux de 48 millions d'années."},
{theme:"nature",diff:"difficile",type:"q",q:"Quelle controverse scientifique oppose la vision darwinienne 'gradualiste' de l'évolution (accumulation de petites variations) et la théorie des 'équilibres ponctués' de Gould et Eldredge (1972) sur le rythme du changement évolutif ?",a:"Gould et Eldredge observent que le registre fossile montre des périodes longues de stase (peu de changements) ponctuées de changements rapides — incompatible avec un gradualisme strict",detail:"Le registre fossile montre rarement des séries de formes intermédiaires graduelles. Gould et Eldredge proposent que les espèces restent stables pendant des millions d'années (stase) puis changent rapidement (~100 000 ans, court en temps géologique) lors d'événements comme l'isolement géographique de petites populations. Ce débat, parfois mal compris comme remettant en cause la sélection naturelle, concerne en réalité le rythme et non le mécanisme de l'évolution."},
{theme:"nature",diff:"facile",type:"q",q:"Quel pays possède la plus grande surface de forêt tropicale du monde, et à quel rythme cette forêt était-elle déboisée au pic de la déforestation dans les années 2000 ?",a:"Le Brésil abrite 60 % de l'Amazonie — la déforestation atteignait 27 000 km²/an en 2004 (réduite à 4 500 km² en 2012 puis remontée sous Bolsonaro à 13 000 km² en 2021)",detail:"L'Amazonie couvre 5,5 millions de km² au Brésil. Elle produit 20 % de l'oxygène terrestre et stocke 150-200 milliards de tonnes de carbone. Sa destruction est causée par l'élevage bovin, le soja (alimentation du bétail mondial), la route, l'extraction minière illégale. Au-delà d'un seuil (20-25 % de déforestation), la forêt pourrait basculer en savane sèche — 'point de basculement'. Lula relance les politiques de protection en 2023."},
{theme:"nature",diff:"moyen",type:"q",q:"Quel scientifique naturaliste, Alexander von Humboldt (1769-1859), est considéré comme le père de l'écologie et de l'environnementalisme moderne pour avoir le premier décrit la nature comme un réseau interconnecté ?",a:"Humboldt décrit lors de son ascension du Chimborazo (Équateur, 1802) que la végétation se répartit en zones selon l'altitude, comme les zones climatiques de la Terre — vision de la nature comme système interrelié",detail:"Humboldt invente le concept d''isothèmes' (lignes de température), de 'géographie des plantes', cartographie les courants marins (courant de Humboldt). Il est le premier à associer la déforestation humaine au changement climatique (déforestation = modification du régime des pluies). Darwin et Thoreau le citent comme influence majeure. Son oeuvre influencera Haeckel qui créera le terme 'écologie' en 1866."},
{theme:"nature",diff:"moyen",type:"q",q:"Quel oiseau, le martin-pêcheur (Alcedo atthis), a inspiré la conception du TGV japonais Shinkansen grâce à la forme de son bec qui lui permet de plonger dans l'eau sans éclaboussures ni choc ?",a:"L'ingénieur Eiji Nakatsu (ornithologiste amateur) redesigne en 1997 le nez du Shinkansen série 500 en s'inspirant du bec du martin-pêcheur — réduction du bruit de 75 % et économie d'énergie de 15 %",detail:"Le TGV japonais créait un 'boom sonique' en sortant des tunnels (différence de pression). Nakatsu observe que le martin-pêcheur passe de l'air (peu dense) à l'eau (800x plus dense) sans résistance ni éclaboussure grâce à son bec conique à gradient de dureté. En redessinant le nez du train de manière similaire, le bruit de sortie de tunnel chute, la vitesse augmente. Le biomimétisme (imitation de la nature) est depuis un champ d'ingénierie à part entière."},
{theme:"nature",diff:"facile",type:"q",q:"Quelle catastrophe nucléaire de 1986, à Tchernobyl (Ukraine), a créé ironiquement une 'zone d'exclusion' de 2 600 km² devenue l'une des réserves de faune sauvage les plus riches d'Europe ?",a:"La zone d'exclusion de Tchernobyl accueille loups, lynx, ours, bisons, aigles — en l'absence de perturbation humaine, la biodiversité y explose malgré la radioactivité",detail:"30 km autour de la centrale évacuée, les animaux prolifèrent sans chasseurs ni agriculteurs. Des loups 7x plus nombreux que dans les parcs voisins, des chevaux de Przewalski réintroduits, des cerfs et sangliers. La radioactivité affecte certains individus (tumeurs, mutations) mais la 'pression humaine zéro' l'emporte sur la pression radiologique. Paradoxe : la pire catastrophe nucléaire crée accidentellement une réserve naturelle."},
{theme:"nature",diff:"moyen",type:"q",q:"Quelle espèce d'arbre, le ginkgo biloba, est appelé 'fossile vivant' car il existe depuis 270 millions d'années presque inchangé, et pourquoi a-t-il survécu à l'extinction des dinosaures ?",a:"Le Ginkgo biloba est l'unique survivant de sa division (Ginkgophyta) — il a survécu à 5 extinctions de masse, probablement parce que ses graines résistent aux conditions extrêmes et qu'il fut cultivé dans les temples bouddhistes chinois",detail:"Le ginkgo existe depuis le Permien (270 Ma). Il a traversé l'extinction des dinosaures, les glaciations et les catastrophes géologiques. Dans les années 1700, des botanistes occidentaux croient l'espèce éteinte avant de la redécouvrir dans des temples bouddhistes japonais et chinois — les moines le cultiv'aient depuis des siècles. 6 ginkgos survivent à la bombe atomique d'Hiroshima à 1 km de l'épicentre et repoussent dès 1946."},
{theme:"nature",diff:"difficile",type:"q",q:"Comment le concept d''hypothèse Gaïa' de James Lovelock (1972) propose-t-il que la Terre elle-même agit comme un organisme autorégulé, et quelle est la critique principale de la communauté scientifique ?",a:"Lovelock propose que les êtres vivants régulent activement les conditions chimiques et climatiques terrestres (température, O2, pH des océans) pour maintenir la vie — critiqué car implique une téléologie (but) absent de la sélection naturelle",detail:"La Terre maintient une température, une teneur en O2 (21 %), un pH océanique et une salinité étonnamment stables depuis des milliards d'années malgré l'augmentation de 30 % de la luminosité solaire. Lovelock (et Lynn Margulis) proposent que les organismes régulent ces conditions de manière systémique. Dawkins critique : la sélection naturelle opère sur les individus, pas sur les planètes. La version 'soft' (la vie influence les conditions terrestres) est largement acceptée ; la version 'strong' (la Terre est un organisme) reste controversée."},
{theme:"nature",diff:"moyen",type:"q",q:"Quelle structure moléculaire de l'ADN, la double hélice, a été découverte en 1953 par Watson et Crick grâce aux travaux cristallographiques de qui, et pourquoi cette attribution reste-t-elle controversée ?",a:"Rosalind Franklin (1920-1958) produit la 'Photo 51' — image aux rayons X de l'ADN qui révèle sa structure hélicoïdale — montrée à Watson sans sa permission par Wilkins, ce qui lui permet de proposer le modèle",detail:"Watson, Crick et Wilkins reçoivent le Prix Nobel en 1962 (Franklin est morte d'un cancer en 1958 — le Nobel n'est pas attribué à titre posthume). La 'Photo 51' (Franklin, 1952) est la clé du puzzle. Watson la voit via Wilkins sans l'autorisation de Franklin. Dans son livre 'La Double Hélice' (1968), Watson dépeint Franklin de manière condescendante. La communauté scientifique reconnaît depuis largement son rôle fondamental."},
{theme:"nature",diff:"facile",type:"q",q:"Quel phénomène dit 'effet papillon' (Edward Lorenz, 1963) illustre la sensibilité aux conditions initiales des systèmes chaotiques — le battement d'ailes d'un papillon au Brésil peut-il déclencher une tornade au Texas ?",a:"Non — l'effet papillon est une métaphore illustrant que de petites variations dans les conditions initiales produisent des évolutions radicalement différentes dans les systèmes chaotiques (météorologie, turbulences)",detail:"Edward Lorenz découvre en 1961 que ses simulations météo divergent complètement selon qu'il entre 0,506 ou 0,506127 dans son modèle. Il publie en 1963 ses équations de convection atmosphérique montrant un attracteur 'en forme de papillon'. Sa conférence de 1972 s'intitule 'Predictability: Does the Flap of a Butterfly's Wings in Brazil Set Off a Tornado in Texas ?'. Le chaos déterministe explique pourquoi les prévisions météo au-delà de 10-14 jours sont impossibles."},
{theme:"nature",diff:"moyen",type:"q",q:"Quelle race de chien, le border collie, est considérée comme la plus intelligente selon les tests cognitifs canins, et quel individu nommé Chaser a démontré un vocabulaire de plus de 1 000 mots ?",a:"Chaser (2004-2019), border collie de John Pilley (psychologue, Wofford College) — a appris les noms de 1 022 objets distincts et comprenait des phrases grammaticales simples",detail:"Pilley entraîne Chaser 4-5 heures/jour pendant 3 ans. Elle identifie 1 022 jouets par leur nom unique. Elle comprend des catégories ('tous les Frisbees') et les nouvelles inférences (si elle ne connaît pas un objet, c'est celui qu'on lui demande). Des tests contrôlés publiés dans Behavioural Processes (2011) confirment ses capacités. Le linguiste Noam Chomsky maintient que cela reste fondamentalement différent du langage humain."},
{theme:"nature",diff:"difficile",type:"q",q:"Comment le microbiome intestinal humain (100 trillions de micro-organismes, 2 kg de masse) influence-t-il le comportement, l'immunité et la santé mentale selon les recherches de la dernière décennie ?",a:"L'axe intestin-cerveau (via le nerf vague et les neurotransmetteurs) permet au microbiome d'influencer l'anxiété, la dépression et même les comportements sociaux — le microbiome produit 90 % de la sérotonine corporelle",detail:"Le microbiome intestinal contient 100x plus de gènes que le génome humain. Il produit 90 % de la sérotonine du corps (neurotransmetteur du bien-être). Des souris 'sans germes' (microbiome absent) ont des comportements anxieux et des cerveaux anormaux. Des fécalothérapies (transplantation de microbiome) traitent avec succès les infections à Clostridioides difficile. Des essais cliniques explorent les probiotiques pour la dépression. L'alimentation (fibres, fermentés) façonne directement ce microbiome."},
{theme:"nature",diff:"moyen",type:"q",q:"Quel lac russe, le lac Baïkal, est le plus profond du monde (1 642 m) et contient 20 % des réserves mondiales d'eau douce non gelée, abritant une biodiversité endémique exceptionnelle ?",a:"Le lac Baïkal (Sibérie) contient 23 615 km³ d'eau douce — plus que les 5 Grands Lacs américains réunis — et abrite 1 000+ espèces endémiques dont le seul phoque d'eau douce (Pusa sibirica)",detail:"Baïkal a 25 millions d'années — le lac le plus ancien du monde. Sa profondeur et son âge expliquent son exceptionnelle biodiversité : 2 600 espèces de plantes et animaux, dont 80 % endémiques. Le gammare (crevette) de Baïkal filtre l'eau (eau potable directement). La nerpa (phoque de Baïkal) est le seul phoque d'eau douce du monde — comment ses ancêtres marins sont-ils arrivés là reste débattu. La pollution industrielle (cellulose) et le réchauffement menacent l'écosystème."},
{theme:"nature",diff:"facile",type:"q",q:"Quel document international, la Convention sur la diversité biologique (1992, Rio), et son Protocole de Nagoya (2010) visent-ils à protéger, et quel objectif '30x30' a été adopté à Montréal en 2022 ?",a:"La CDB protège la biodiversité mondiale — le '30x30' vise à protéger 30 % des terres et 30 % des océans d'ici 2030, contre 17 % et 8 % actuellement",detail:"La Convention sur la Diversité Biologique (Rio, 1992) est ratifiée par 196 pays. Le Protocole de Nagoya régule l'accès aux ressources génétiques (biopiraterie). À Montréal (COP15 biodiversité, décembre 2022), 196 pays adoptent le cadre Kunming-Montréal : protéger 30 % des terres et océans d'ici 2030, restaurer 30 % des écosystèmes dégradés. Les États-Unis n'ont jamais ratifié la CDB."},
{theme:"nature",diff:"difficile",type:"q",q:"Quelle découverte paléontologique dans les schistes de Burgess (Canada) révèle que des animaux avec des plans corporels radicalement différents des nôtres ont existé au Cambrien, dont Opabinia (5 yeux, trompe) et Hallucigenia (épines dorsales, pattes ventrales) ?",a:"Les schistes de Burgess (1909, Charles Walcott) conservent des organismes mous du Cambrien moyen (508 Ma) — Stephen Jay Gould les réinterprète dans 'La Vie est belle' (1989) comme illustrant le hasard de l'évolution",detail:"Walcott découvre les schistes de Burgess en 1909 et classe tous les organismes dans des groupes connus (biais conservateur). Dans les années 1970-80, Whittington, Conway Morris et Briggs réinterprètent : Opabinia (5 yeux sur tiges, trompe frontale) et Hallucigenia (épines dorsales, pattes étranges) n'entrent dans aucun groupe moderne. Gould en conclut que l'évolution est contingente — si on rembobinait, l'humanité n'apparaîtrait probablement pas. Conway Morris, lui, voit une convergence vers les mêmes solutions."},
{theme:"nature",diff:"moyen",type:"q",q:"Quelle espèce de requin, le requin blanc (Carcharodon carcharias), est la plus grande espèce prédatrice marine actuelle, et pourquoi les attaques mortelles sont-elles si rares malgré sa réputation ?",a:"Le requin blanc (longueur max ~6 m) tue en moyenne 5-7 personnes/an dans le monde — il teste par morsure puis relâche généralement (les humains ne sont pas sa proie naturelle)",detail:"Les requins blancs se nourrissent principalement d'otaries, phoques, poissons et céphalopodes. Ils 'testent' les objets inconnus par morsure (y compris les surfeurs dont les silhouettes ressemblent à des otaries vus de dessous). Après une morsure exploratoire, ils relâchent généralement. Les chances de mourir d'un requin blanc sont de 1/3 750 000 (vs 1/5 000 pour une abeille). La surpêche menace les requins — 100 millions tués par an par les humains (vs 7/an dans l'autre sens)."},
{theme:"nature",diff:"facile",type:"q",q:"Quel insecte, l'abeille mellifère (Apis mellifera), danse pour communiquer la direction et la distance des fleurs à ses congénères — découverte qui valut le Prix Nobel à Karl von Frisch en 1973 ?",a:"La danse frétillante (Schwänzeltanz) : l'abeille trace un 8 en dansant, l'angle par rapport à la verticale indique la direction par rapport au soleil, et la durée indique la distance",detail:"Karl von Frisch découvre dans les années 1940 que les abeilles butineuses 'racontent' leur découverte par la danse. La danse ronde (< 100 m) et la danse frétillante (> 100 m) : l'axe du 'frétillement' indique la direction relative au soleil, la durée du frétillement la distance (1 seconde = ~1 km). Von Frisch reçoit le Nobel en 1973 avec Lorenz et Tinbergen pour l'étude du comportement animal."},
{theme:"nature",diff:"moyen",type:"q",q:"Quelle île des Galapagos (Équateur) a inspiré Darwin pour sa théorie de l'évolution, et comment les pinsons de différentes îles illustrent-ils l'adaptation par sélection naturelle ?",a:"Darwin visite les Galapagos en 1835 à bord du Beagle — 14 espèces de pinsons, toutes issues d'un ancêtre commun, ont développé des becs différents adaptés aux ressources alimentaires de chaque île",detail:"Darwin observe que les tortues et les pinsons varient d'une île à l'autre. Les pinsons aux becs robustes (graines dures) coexistent avec des becs fins (insectes) ou crochus (cactus). Cette radiation adaptative depuis un ancêtre commun illustre comment la sélection naturelle façonne les espèces. Mais Darwin ne comprend pleinement l'implication qu'après son retour en Angleterre, en lisant le spécialiste des oiseaux John Gould."},
{theme:"nature",diff:"facile",type:"q",q:"Quel écosystème marin, la mangrove, protège les côtes des tsunamis et cyclones, filtre l'eau, stocke du carbone et sert de nurserie à 80 % des espèces de poissons tropicaux commerciaux ?",a:"Les mangroves (forêts côtières tropicales à racines-échasses) sont parmi les écosystèmes les plus productifs et protecteurs — elles stockent 3-5x plus de carbone au km² que les forêts tropicales",detail:"Les racines-échasses des palétuviers (Rhizophora) atténuent les vagues, protègent les côtes et piègent les sédiments. Après le tsunami de 2004, les côtes avec mangroves ont subi moins de dégâts que celles sans. Les mangroves stockent jusqu'à 1 023 tonnes de carbone/ha (vs 200-250 pour les forêts tropicales). 35 % ont disparu depuis 1980 (aquaculture de crevettes, développement côtier). 80 % des espèces de poissons tropicaux commerciaux y passent une partie de leur cycle."},
{theme:"nature",diff:"moyen",type:"q",q:"Quel primate, l'orang-outan de Bornéo (Pongo pygmaeus), est l'animal non-humain le plus lent à se reproduire — une femelle donne naissance tous les 7-9 ans — rendant sa population extrêmement vulnérable à la chasse et à la déforestation ?",a:"L'orang-outan a le cycle de reproduction le plus long de tout le règne animal — le petit reste avec sa mère 7-8 ans, apprenant tout ce dont il a besoin pour survivre dans la forêt",detail:"L'orang-outan femelle n'est fertile que tous les 7-9 ans. Son bébé reste avec elle le plus longtemps de tout le règne animal non-humain. Pendant ces années, il apprend : quels fruits sont comestibles, quand et où les trouver (mémoire cartographique du territoire), comment se construire un nid. Ce lent apprentissage culturel est rendu possible par l'intelligence exceptionnelle de l'espèce (résolution de problèmes, fabrication d'outils). La déforestation pour l'huile de palme réduit leur habitat de 80 %."},
{theme:"nature",diff:"moyen",type:"q",q:"Quel processus géologique dit 'subduction' explique la formation des chaînes de montagnes, des arcs volcaniques et des fosses océaniques, et quelle est la plaque qui s'enfonce sous l'autre ?",a:"La subduction : une plaque océanique (plus dense) plonge sous une plaque continentale ou océanique — en fondant dans le manteau, elle génère des magmas qui alimentent les volcans",detail:"Là où deux plaques convergent, la plus dense (généralement océanique) plonge sous l'autre à 2-10 cm/an. La plaque en subduction fond dans le manteau à 100-200 km de profondeur. Les fluides libérés abaissent le point de fusion des roches du manteau sus-jacent — générant du magma qui remonte (volcans). Les Andes (subduction de la plaque de Nazca), le Japon et les Philippines (subduction de la plaque Pacifique/Philippines) en sont des exemples."},
{theme:"nature",diff:"difficile",type:"q",q:"Comment la théorie de la tectonique des plaques, proposée dans sa forme moderne dans les années 1960, a-t-elle été rejetée pendant 50 ans avant d'être acceptée, et quel rôle les données des fonds marins ont-elles joué ?",a:"Alfred Wegener propose la dérive des continents en 1912 — rejetée faute de mécanisme. Les données d'expansion des fonds marins (anomalies magnétiques symétriques, 1963) fournissent le mécanisme manquant",detail:"Wegener observe que les côtes de l'Amérique du Sud et de l'Afrique s'emboîtent, que les fossiles y sont identiques, que les chaînes de montagnes se correspondent. Mais il ne connaît pas le mécanisme. Sa théorie est moquée. Dans les années 1950-60, les sondages des fonds marins révèlent les dorsales médio-océaniques et les anomalies magnétiques en bandes symétriques (Vine, Matthews, 1963) — preuve de l'expansion des fonds marins. La communauté géologique accepte la tectonique des plaques en moins de 5 ans."},
{theme:"nature",diff:"facile",type:"q",q:"Quel animal, la pieuvre mimic (Thaumoctopus mimicus), peut imiter jusqu'à 15 espèces différentes comme le poisson-lion, la raie et la sole, devenant l'exemple le plus spectaculaire de mimétisme comportemental ?",a:"La pieuvre mimic (découverte en 1998 au large de Sulawesi) imite activement des espèces toxiques ou dangereuses selon le prédateur qui la menace",detail:"Selon le type de prédateur, la pieuvre mimic adopte différents déguisements comportementaux et morphologiques : elle imite la raie (aplatie, ailes simulées), le poisson-lion (bras étalés comme des épines venimeuses), la sole (nage ondulante). Elle est la première espèce connue à pratiquer ce 'mimétisme dynamique multiple'. Ses 8 bras semi-autonomes peuvent mimer indépendamment plusieurs espèces simultanément."},
{theme:"nature",diff:"moyen",type:"q",q:"Quelle région naturelle, la toundra arctique, subit un réchauffement 3-4x plus rapide que la moyenne mondiale ('amplification arctique'), et quels changements écologiques en résultent ?",a:"L'amplification arctique est due à la rétroaction albédo : la glace blanche (réfléchit 90 % de la lumière) est remplacée par l'océan sombre (absorbe 94 %) — le réchauffement s'auto-amplifie",detail:"L'Arctique s'est réchauffé de ~3°C depuis 1979 (vs ~1°C pour la planète). La banquise estivale a perdu 40 % de son étendue. Les ours polaires (dépendent de la glace pour chasser les phoques) jeûnent plus longtemps. Les rennes perdent accès à l'herbe sous la glace reformée après le dégel. La végétation se modifie (arbustes remplacent la mousse). Les espèces du sud colonisent progressivement l'Arctique (grizzlys croisés avec ours polaires, 'pizzlys')."},
{theme:"nature",diff:"facile",type:"q",q:"Quel réseau de zones protégées, les Parcs nationaux, est né aux États-Unis avec la création de Yellowstone en 1872 — premier parc national du monde — et combien de pays ont adopté ce concept depuis ?",a:"Yellowstone (1872, Wyoming/Montana/Idaho) est le premier parc national du monde — aujourd'hui 130+ pays ont des parcs nationaux couvrant 15 % des terres émergées",detail:"Yellowstone est créé par le Congrès américain sous Grant. La motivation initiale est autant esthétique que conservationniste : protéger un paysage exceptionnel du développement privé. Le modèle s'exporte. La France crée ses premiers parcs (Vanoise) en 1963. L'UICN (Union internationale pour la conservation de la nature) gère un système de classification des aires protégées. Les 'parcs sur papier' (nominalement protégés mais non gérés) restent un problème majeur."},
{theme:"nature",diff:"difficile",type:"q",q:"Quelle théorie de l'évolution, la 'sélection de parentèle' (kin selection) de William Hamilton (1964), explique l'altruisme apparent chez les animaux sociaux comme les abeilles, fourmis et termites — où les individus se sacrifient pour leurs proches ?",a:"Hamilton démontre que l'altruisme évolue quand le bénéfice pour les proches parents (pondéré par leur degré de parenté) dépasse le coût pour l'altruiste (règle de Hamilton : rB > C)",detail:"La règle de Hamilton : un comportement altruiste évolue si r×B > C, où r = degré de parenté, B = bénéfice pour le bénéficiaire, C = coût pour l'altruiste. Dans les fourmis, les ouvrières (stériles) partagent 75 % de leurs gènes avec leurs sœurs (haplodiploïdie) — il est plus rentable génétiquement de nourrir leurs sœurs que d'avoir des filles (50 %). Dawkins popularise ce concept sous le nom de 'gène égoïste' (1976) : ce sont les gènes qui maximisent leur propagation, pas les individus."},
{theme:"nature",focus:"allemagne",diff:"facile",type:"q",q:"Quelle grande forêt allemande, symbole de la culture romantique, est célèbre pour ses paysages et ses légendes ?",a:"La Forêt-Noire (Schwarzwald)",detail:"Située dans le Bade-Wurtemberg, la Forêt-Noire culmine au Feldberg (1 493 m). Elle inspire les frères Grimm et le romantisme allemand. C'est aussi une région gastronomique (tarte Forêt-Noire, jambon fumé, horloge à coucou). Ses sources alimentent le Danube et le Rhin."},
{theme:"nature",focus:"allemagne",diff:"moyen",type:"q",q:"Quel concept forestier allemand du XIXe siècle a révolutionné la gestion des forêts mondiales ?",a:"La Nachhaltigkeit (durabilité/soutenabilité) — Hans Carl von Carlowitz, 1713",detail:"Dans son traité Sylvicultura Oeconomica (1713), von Carlowitz théorise qu'on ne doit prélever en forêt que ce qui peut se régénérer naturellement. Ce concept forestier allemand est l'ancêtre direct du développement durable moderne. Le mot Nachhaltigkeit est entré dans toutes les langues via l'anglais « sustainability »."},
{theme:"mytho",diff:"facile",type:"q",q:"Qui est la déesse de la sagesse et de la guerre dans la mythologie grecque, patronne d'Athènes, née tout armée du crâne de Zeus ?",a:"Athéna",detail:"Athéna naît après qu'Héphaïstos fend le crâne de Zeus d'un coup de hache. Elle est la déesse de la sagesse stratégique (différente d'Arès, dieu de la violence brute), des arts et de l'artisanat. La chouette et l'olivier lui sont consacrés. Rome l'adopte sous le nom de Minerve."},
{theme:"mytho",diff:"facile",type:"q",q:"Qui est le fils de Dédale qui s'approcha trop près du soleil avec ses ailes de cire et chuta dans la mer ?",a:"Icare",detail:"Dédale fabrique des ailes de plumes et de cire pour s'échapper du labyrinthe de Crète. Il avertit son fils : ni trop haut (la cire fond) ni trop bas (l'humidité alourdit). Icare, grisé par le vol, monte trop haut. Son nom est devenu le symbole de l'hubris — l'orgueil qui précède la chute."},
{theme:"mytho",diff:"facile",type:"q",q:"Quel héros grec accomplit douze travaux imposés par Eurysthée, dont tuer l'Hydre de Lerne et capturer Cerbère ?",a:"Héraclès (Hercule chez les Romains)",detail:"Les douze travaux incluent : tuer le lion de Némée, l'Hydre de Lerne, capturer la biche de Cérynia, le sanglier d'Érymanthe, nettoyer les écuries d'Augias, les oiseaux du lac Stymphale, le taureau de Crète, les juments de Diomède, la ceinture d'Hippolyte, les bœufs de Géryon, les pommes des Hespérides et Cerbère."},
{theme:"mytho",diff:"facile",type:"q",q:"Qui est Méduse dans la mythologie grecque, et quel héros la décapite en se servant de son bouclier comme miroir ?",a:"Méduse est l'une des trois Gorgones — Persée la décapite en regardant son reflet dans le bouclier poli d'Athéna",detail:"Méduse transformait en pierre quiconque croisait son regard. Persée reçoit d'Athéna un bouclier poli, d'Hermès des sandales ailées et une faux. Du sang de Méduse naissent Pégase (le cheval ailé) et Chrysaor. Athéna place la tête de Méduse sur son égide."},
{theme:"mytho",diff:"moyen",type:"q",q:"Quel roi de Phrygie obtint des dieux que tout ce qu'il touche se transforme en or, don qui se révéla une malédiction ?",a:"Midas",detail:"Midas aide Silène (compagnon de Dionysos) et reçoit en récompense le don de transformer tout ce qu'il touche en or. Rapidement sa nourriture, sa boisson et sa fille se transforment en or. Il supplie Dionysos de lui retirer ce don. Zeus lui dit de se baigner dans le fleuve Pactole — ses sables devinrent dorés."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Cassandre dans la mythologie grecque et pourquoi ses prophéties véridiques ne sont-elles jamais crues ?",a:"Princesse troyenne à qui Apollon accorda la prophétie puis, après son refus, condamna à n'être jamais crue",detail:"Cassandre prédit la chute de Troie, le danger du cheval de bois, la mort d'Agamemnon — sans jamais être écoutée. Après la guerre, elle est réduite en esclavage et emmenée par Agamemnon, qu'elle sait condamné. Son nom est devenu synonyme de celui qui prédit une catastrophe sans être écouté."},
{theme:"mytho",diff:"moyen",type:"q",q:"Quel roi légendaire de Crète fit construire le Labyrinthe pour y enfermer le Minotaure, monstre né de l'union de sa femme Pasiphaé avec un taureau ?",a:"Minos",detail:"Poséidon avait envoyé un taureau blanc à Minos pour être sacrifié ; Minos le garde. En punition, Poséidon rend Pasiphaé amoureuse du taureau — d'où le Minotaure (tête de taureau, corps d'homme). Dédale construit le Labyrinthe. Thésée tue le monstre grâce au fil d'Ariane."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Orphée dans la mythologie grecque et pourquoi échoue-t-il à ramener Eurydice des Enfers ?",a:"Musicien thrace dont le chant charme tous les êtres — il obtient d'Hadès de ramener Eurydice mais se retourne avant de sortir des Enfers",detail:"Orphée descend aux Enfers pour récupérer Eurydice, morte d'une morsure de serpent. Son chant émeut Hadès et Perséphone, qui acceptent à condition qu'il ne se retourne pas avant de sortir. Au dernier moment, il se retourne — Eurydice disparaît. Son histoire symbolise l'amour, la perte et l'impossibilité du retour."},
{theme:"mytho",diff:"moyen",type:"q",q:"Quelle guerre de dix ans oppose les Grecs aux Troyens, et quel stratagème permet finalement aux Grecs de prendre la ville ?",a:"La guerre de Troie — le cheval de Troie, immense cheval de bois renfermant des soldats grecs cachés",detail:"La guerre éclate après l'enlèvement d'Hélène par Pâris. Dix ans de siège infructueux. Ulysse propose le stratagème du cheval de bois, que les Troyens introduisent dans la ville comme offrande à Athéna. La nuit, les soldats grecs sortent et ouvrent les portes. Troie est incendiée."},
{theme:"mytho",diff:"difficile",type:"q",q:"Quelle femme ouvre une jarre (ou boîte) libérant tous les maux du monde dans la mythologie grecque, ne conservant que l'Espoir au fond ?",a:"Pandore — première femme créée par Héphaïstos sur ordre de Zeus pour punir les hommes d'avoir reçu le feu de Prométhée",detail:"Zeus commande la création de Pandore («Tous les dons») pour punir Prométhée d'avoir volé le feu. Elle reçoit de chaque dieu un don (beauté, ruse, curiosité). Elle ouvre la jarre (pithos, mal traduit en «boîte» par Érasme) d'où s'échappent maladies, mort et misères. Seul l'Espoir reste au fond."},
{theme:"mytho",diff:"difficile",type:"q",q:"Quelle figure mythologique grecque est condamnée à l'immortalité sans la jeunesse éternelle, vieillissant indéfiniment après qu'Aurore oublie de demander ce dernier don pour lui ?",a:"Tithon — amant de l'Aurore (Éos) qui oublia de demander la jeunesse avec l'immortalité",detail:"Éos demande à Zeus d'accorder l'immortalité à Tithon mais oublie la jeunesse. Il vieillit sans fin, rétrécissant, perdant la voix, la force, jusqu'à être transformé en cigale. Ce mythe explore l'horreur d'une immortalité sans jeunesse — sujet du poème Tithonus de Tennyson et de la nouvelle La Mort de Venise (allusion)."},
{theme:"mytho",diff:"difficile",type:"q",q:"Qui est Tirésias et combien de fois a-t-il changé de sexe selon la mythologie grecque ?",a:"Devin aveugle de Thèbes qui vécut sept générations — il changea deux fois de sexe en frappant des serpents en accouplement",detail:"Tirésias frappe deux serpents en accouplement et se transforme en femme. Sept ans plus tard, il refrappe les mêmes serpents et redevient homme. Zeus et Héra lui demandent qui de l'homme ou de la femme ressent plus de plaisir. Il répond que la femme en ressent neuf fois plus. Héra, furieuse, l'aveugle ; Zeus compense en lui accordant le don de prophétie."},
{theme:"mytho",diff:"facile",type:"q",q:"Quels jumeaux, fils du dieu Mars et de la vestale Rhéa Silvia, sont selon la légende les fondateurs de Rome en 753 av. J.-C. ?",a:"Romulus et Rémus",detail:"Abandonnés sur le Tibre, les jumeaux sont allaités par une louve (la Lupa Capitolina). Ils grandissent et fondent Rome. Lors d'une dispute sur l'emplacement de la ville, Romulus tue Rémus qui avait sauté par-dessus ses murailles. Rome porte le nom du vainqueur. La louve capitoline est le symbole de la ville."},
{theme:"mytho",diff:"moyen",type:"q",q:"Quel héros troyen, fils d'Anchise et d'Aphrodite, fuit Troie en flammes avec son père sur le dos et fonde selon Virgile la lignée qui donnera naissance à Rome ?",a:"Énée — héros de l'Énéide de Virgile, ancêtre légendaire des Romains",detail:"Énée fuit Troie avec son père Anchise, son fils Ascagne et les Pénates (dieux du foyer). Après de longues errances (dont un séjour à Carthage avec Didon), il atteint le Latium. Son fils Ascagne fonde Albe-la-Longue, et sa descendance donnera Romulus et Rémus. Virgile écrit l'Énéide pour légitimer Auguste comme descendant d'Énée et donc de Vénus."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qui est Janus dans la mythologie romaine et pourquoi le premier mois de l'année porte-t-il son nom ?",a:"Dieu romain des commencements, des passages et des transitions — représenté avec deux visages regardant passé et avenir",detail:"Janus (sans équivalent grec) préside aux portes, aux arches, aux débuts. Le mois de janvier (Ianuarius) lui est dédié. Le temple de Janus au Forum romain avait ses portes ouvertes en temps de guerre et fermées en temps de paix — ce qui n'arriva que trois fois en sept siècles. Il symbolise la dualité et le passage."},
{theme:"mytho",diff:"facile",type:"q",q:"Qui est Loki dans la mythologie nordique et quel rôle joue-t-il dans la mort du dieu Baldr ?",a:"Dieu trickeur de la mythologie nordique — il guide la flèche de gui qui tue Baldr, le dieu de la lumière",detail:"Baldr est invulnérable à tout... sauf au gui, que sa mère Frigg avait oublié d'inclure dans sa promesse de protection. Loki apprend ce secret et guide la main de l'aveugle Höðr pour lancer le gui fatal. La mort de Baldr est un signe annonciateur du Ragnarök. Loki est ensuite enchaîné par les dieux jusqu'à la fin des temps."},
{theme:"mytho",diff:"moyen",type:"q",q:"Quelle est la cosmologie de l'arbre-monde Yggdrasil dans la mythologie nordique, et quels neuf mondes relie-t-il ?",a:"Yggdrasil est le frêne cosmique qui soutient les neuf mondes, dont Asgard (dieux), Midgard (humains) et Niflheim (mort)",detail:"Yggdrasil relie Asgard (Ases), Vanaheim (Vanes), Alfheim (elfes), Midgard (hommes), Jotunheim (géants), Svartalfheim (elfes noirs), Nidavellir (nains), Muspelheim (feu) et Niflheim (brume/mort). Un aigle perche au sommet, Níðhöggr (serpent) ronge les racines, un écureuil (Ratatoskr) court entre eux en semant la discorde."},
{theme:"mytho",diff:"moyen",type:"q",q:"Qu'est-ce que le Valhalla dans la mythologie nordique et qui sont les Walkyries ?",a:"Le Valhalla est la salle d'Odin où festoient les guerriers morts au combat (Einherjar) — les Walkyries choisissent les élus sur le champ de bataille",detail:"Les Einherjar s'entraînent au combat le jour et festoient la nuit, attendant le Ragnarök. Les Walkyries ('celles qui choisissent les morts') chevauchent sur les champs de bataille pour sélectionner les guerriers dignes. Wagner les immortalise dans sa Tétralogie (La Chevauchée des Walkyries)."},
{theme:"mytho",diff:"difficile",type:"q",q:"Qui est Fenrir dans la mythologie nordique et quel dieu sera dévoré par ce loup lors du Ragnarök ?",a:"Fenrir est l'immense loup fils de Loki — il dévore Odin lors du Ragnarök, avant d'être tué par Víðarr",detail:"Les dieux enchaînent Fenrir avec le ruban magique Gleipnir (fait de bruit de pas d'un chat, barbe de femme, racines de montagne...). Tyr sacrifie sa main pour que Fenrir accepte d'être attaché. Au Ragnarök, Fenrir se libère et dévore Odin. Víðarr, fils d'Odin, le venge en déchirant ses mâchoires."},
