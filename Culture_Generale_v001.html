{theme:"sport",diff:"moyen",type:"q",q:"Quel est le combat de boxe le plus mythique de l'histoire ?",a:"Le « Rumble in the Jungle » (1974) : Muhammad Ali bat George Foreman à Kinshasa (Zaïre) par KO au 8e round, récupérant son titre mondial",detail:"Ali utilise la stratégie du « rope-a-dope » : il s'appuie sur les cordes et laisse Foreman s'épuiser à le frapper. Foreman, champion invaincu et favori massif, s'effondre au 8e round. Organisé par Don King au Zaïre de Mobutu, le combat est précédé d'un concert (Rumble in the Jungle avec James Brown). Le documentaire When We Were Kings (1996) est oscarisé."},
{theme:"sport",diff:"moyen",type:"q",q:"Quel jeu de raquette, né en Grande-Bretagne, oppose deux ou quatre joueurs dans une salle fermée ?",a:"Le squash",detail:"Le squash naît à Harrow School (Londres) vers 1830. Les joueurs frappent une balle en caoutchouc sur les 4 murs d'un court fermé. C'est l'un des sports les plus exigeants physiquement (800-1000 kcal/h). L'Égypte et le Pakistan dominent historiquement. Jahangir Khan (Pakistan) reste imbattu pendant 555 matches consécutifs (1981-1986) — record mondial toutes disciplines."},
{theme:"sport",diff:"moyen",type:"q",q:"Sur quelle île américaine se trouve le spot de Pipeline, étape mythique du circuit mondial de surf de la WSL ?",a:"Sport de glisse sur les vagues d'océan — World Surf League (WSL) avec étapes à Pipeline (Hawaï), Teahupo'o (Tahiti), Hossegor (France)...",detail:"Le surf naît à Hawaï (Polynésie) et est pratiqué depuis 3 000 ans par les Polynésiens. Duke Kahanamoku le popularise aux États-Unis au début du XXe s. Les vagues de Teahupo'o (Tahiti) sont parmi les plus dangereuses du monde. Le surf devient olympique à Tokyo 2021. Kelly Slater (11 titres mondiaux) reste le plus grand surfeur de l'histoire."},
{theme:"sport",diff:"moyen",type:"q",q:"Qui est Serena Williams et quel est son palmarès ?",a:"Serena Williams (née 1981) — 23 titres du Grand Chelem en simple, 319 semaines classée numéro 1 mondiale, considérée comme la meilleure joueuse de l'histoire",detail:"Serena domine le tennis féminin de 1999 à 2022 avec sa sœur Venus. Elle remporte 4 titres olympiques. Sa puissance physique et son mental révolutionnent le tennis féminin. Elle annonce sa retraite en 2022 pour se consacrer à sa famille et à ses entreprises. Elle a joué sa dernière finale de Grand Chelem à l'US Open 2022."},
{theme:"sport",diff:"moyen",type:"q",q:"Combien d'équipes NFL s'affrontent au Super Bowl, et quelle franchise en détient le record avec 6 victoires ?",a:"La finale annuelle de la National Football League (NFL) entre les deux meilleures équipes de la saison — une équipe de la conférence NFC vs une de l'AFC",detail:"Le Super Bowl se joue en janvier/février dans une ville différente chaque année. Les New England Patriots (6 titres) et les Dallas Cowboys (5 titres) sont les équipes les plus titrées. Tom Brady (7 titres Super Bowl avec 3 équipes différentes) est le quarterback le plus titré de l'histoire. Le coût d'une publicité de 30 secondes dépasse 7 millions de dollars en 2024."},
{theme:"sport",diff:"moyen",type:"q",q:"Quelle est la différence entre le pentathlon moderne et le pentathlon antique ?",a:"Antique (saut, sprint, disque, javelot, lutte) ; Moderne (équitation, escrime, natation, tir, course à pied) — sport olympique depuis 1912, créé par Coubertin",detail:"Le pentathlon moderne est inspiré par l'image du soldat-messager idéal : il franchit des obstacles à cheval, combat à l'épée, nage pour traverser une rivière, tire au pistolet, puis court. Depuis 2024, le laser-run remplace l'équitation pour des raisons éthiques (maltraitance d'un cheval allemand à Tokyo 2021). La France a une tradition forte dans cette discipline."},
{theme:"sport",diff:"difficile",type:"q",q:"Quel est l'impact de la mondialisation des transferts sur le football européen ?",a:"Les droits TV et les transferts astronomiques (Neymar : 222 millions en 2017) creusent les inégalités entre grands et petits clubs — le Super League Project (2021) en est la conséquence logique",detail:"Le transfert de Neymar du Barça au PSG pour 222 M€ (2017) brise tous les records. Le chiffre d'affaires du Real Madrid (~900 M€) dépasse le PIB de plusieurs pays. L'arrêt Bosman (1995) a libéralisé les transferts en fin de contrat. Le projet de Super League européenne fermée (annoncé et retiré en 48h en avril 2021) révèle les tensions entre les grands clubs et les institutions traditionnelles."},
{theme:"sport",diff:"difficile",type:"q",q:"Quel pays domine la nage synchronisée aux JO depuis les années 2000, remportant presque tous les titres olympiques ?",a:"Sport olympique (depuis 1984) alliant natation, danse et acrobatie dans l'eau — dominé par la Russie puis l'Ukraine, la Chine et le Japon",detail:"La nage artistique (nouveau nom depuis 2017) requiert souffle (performances partiellement sous l'eau), souplesse, sens du rythme et coordination parfaite. Les Russes ont dominé de 1998 à 2021 avec la chorégraphe Tatiana Davydova. L'Ukraine et le Japon montent en puissance. Des règles évoluent pour ouvrir le sport aux duos mixtes masculins/féminins."},
{theme:"sport",diff:"difficile",type:"q",q:"Quel athlète a remporté 9 médailles d'or olympiques en athlétisme — record absolu ?",a:"Carl Lewis (États-Unis) — 9 or entre Los Angeles 1984 et Atlanta 1996 (100 m, 200 m, 4×100 m, saut en longueur)",detail:"Carl Lewis remporte 4 médailles d'or à Los Angeles 1984 (4 disciplines), 2 à Séoul 1988 (100 m récupéré après disqualification de Johnson, saut en longueur), 2 à Barcelone 1992, 1 à Atlanta 1996 (saut en longueur à 35 ans). Son saut en longueur de 8,91 m à Tokyo en 1991 reste le 2e meilleur saut de l'histoire. Paavo Nurmi (Finlande) avait remporté 9 or entre 1920 et 1928."},
{theme:"sport",diff:"difficile",type:"q",q:"Qui popularise la règle des 10 000 heures dans Outliers (2008), en s'appuyant sur les travaux du psychologue Anders Ericsson ?",a:"Popularisée par Malcolm Gladwell (2008) d'après les travaux d'Anders Ericsson — idée que 10 000 heures de pratique délibérée suffisent à atteindre l'expertise — très débattue",detail:"Ericsson étudie les violonistes de Berlin et observe que les meilleurs ont en moyenne 10 000h de pratique à 20 ans. Gladwell généralise dans Outliers. Les critiques : la qualité de la pratique compte plus que la quantité ; les facteurs génétiques sont sous-estimés ; certains champions atteignent l'élite avec beaucoup moins. Dans le sport, Ericsson lui-même a mis en garde contre les simplifications de Gladwell."},
{theme:"sport",diff:"difficile",type:"q",q:"Quel organisme mondial du sport a adopté en 2021 un cadre laissant chaque fédération décider de sa politique d'inclusion des athlètes transgenres ?",a:"Enjeu complexe entre inclusion des personnes transgenres et équité compétitive — les politiques varient selon les sports et les organisations (World Athletics, CIO, natation internationale)",detail:"World Athletics (athlétisme) et World Aquatics (natation) interdisent les femmes transgenres (nées homme) des compétitions féminines d'élite si elles ont traversé la puberté masculine. Le CIO a adopté un cadre (2021) laissant aux fédérations le soin de décider. Le cas Lia Thomas (natation universitaire américaine) a cristallisé le débat. La science sur le maintien d'avantages physiologiques post-transition est encore en développement."},
{theme:"sport",diff:"difficile",type:"q",q:"Qui était Jesse Owens et que représentent ses JO de Berlin 1936 ?",a:"Athlète afro-américain qui remporte 4 médailles d'or (100 m, 200 m, 4×100 m, saut en longueur) aux JO nazis de Berlin — défi vivant à la théorie de la supériorité aryenne",detail:"Jesse Owens réalise quatre fois ce que les théoriciens nazis considèrent impossible : un Noir bat des Aryens. Hitler, selon la légende, refuse de lui serrer la main (en réalité Hitler avait cessé de recevoir tout athlète après avoir été critiqué pour avoir félicité sélectivement). Owens rentre aux États-Unis sous les ovations... et n'est pas reçu à la Maison-Blanche par Roosevelt."},
{theme:"sport",diff:"moyen",type:"q",q:"Quel sport d'hiver se pratique sur des skis avec des bâtons dans un parcours de portes ?",a:"Le ski alpin (slalom, géant, super-G, descente)",detail:"Le ski alpin de compétition se décline en plusieurs épreuves selon la vitesse et le rayon des virages. La Coupe du Monde de ski alpin (fondée en 1967) se dispute d'octobre à mars. Ingemar Stenmark (Suède, 86 victoires), Marcel Hirscher (Autriche, 67 victoires), Lindsey Vonn (82 victoires féminines) dominent l'histoire de la discipline."},
{theme:"sport",diff:"facile",type:"q",q:"Quel est le sport national du Japon ?",a:"Le sumo (traditionnel) et le baseball (sport le plus populaire aujourd'hui)",detail:"Le sumo est un sport de lutte millénaire où deux rikishi (lutteurs) tentent de faire sortir l'adversaire du dohyo (cercle en argile) ou de lui faire toucher le sol. Basho (tournois) ont lieu 6 fois par an. Le baseball (yakyū) est introduit au Japon en 1872 par des Américains et est devenu le sport national par excellence, avec la NPB (Nippon Professional Baseball)."},
{theme:"sport",diff:"facile",type:"q",q:"Quel événement sportif est surnommé « la plus grande course du monde » ?",a:"Le Tour de France (cyclisme) ou les 24 Heures du Mans (automobile) selon les contextes",detail:"Le Tour de France (~3 400 km, 21 étapes, 176 coureurs) est souvent appelé « la plus grande course du monde » pour son envergure logistique et sa popularité. Les 24 Heures du Mans, créées en 1923, sont la plus ancienne course d'endurance automobile. L'Indianapolis 500 est souvent qualifiée de « plus grande course » aux États-Unis."},
{theme:"sport",diff:"moyen",type:"q",q:"Quel club détient le record de victoires en Ligue des Champions de l'UEFA, avec 15 titres au compteur ?",a:"Compétition annuelle des meilleurs clubs européens — le Real Madrid l'a remportée 15 fois (record absolu)",detail:"La Coupe d'Europe des clubs champions est créée en 1955. Le Real Madrid remporte les 5 premières éditions (1956-1960) avec Di Stéfano. La compétition devient Ligue des Champions en 1992 avec sa phase de groupes. Le Real domine les années 2010 avec Zidane coach (2016-18). Le Bayern Munich (6 titres) et le Barça (5 titres) suivent."},
{theme:"sport",diff:"moyen",type:"q",q:"Quel boxeur irlandais a été l'un des plus populaires du sport dans les années 2010 ?",a:"Conor McGregor (né en 1988) — champion UFC en deux catégories simultanément (155 et 145 lb) et star de la boxe anglaise",detail:"McGregor est le premier combattant MMA à détenir deux titres UFC simultanément (2016). Son combat de boxe contre Floyd Mayweather (2017) génère ~600 millions de revenus. Sa personnalité provocatrice et son accent irlandais en font une star mondiale. Sa défaite contre Khabib Nurmagomedov (2018) reste l'un des combats les plus regardés de l'histoire du MMA."},
// CARTES SPORT SUITE
{theme:"sport",diff:"facile",type:"q",q:"Qui est considéré comme le plus grand joueur de hockey sur glace de tous les temps ?",a:"Wayne Gretzky (Canada) — « The Great One » — 2 857 points en carrière NHL, record absolu",detail:"Gretzky joue 20 saisons en NHL (1979-1999), principalement avec les Oilers d'Edmonton et les Kings de Los Angeles. Il détient 61 records NHL. Son nombre d'assistances seules (1 963) dépasse le total de points de tout autre joueur. Il est le seul joueur dont le numéro (99) a été retiré par toute la ligue."},
{theme:"sport",diff:"facile",type:"q",q:"Quel est le sport le plus pratiqué aux États-Unis après le football américain ?",a:"Le baseball (America's Pastime) — suivi par le basketball et le hockey sur glace",detail:"Le baseball est souvent appelé le 'pastime américain'. La MLB (Major League Baseball) est fondée en 1876. Les New York Yankees sont l'équipe la plus titrée (27 World Series). Le baseball a inspiré des expressions courantes : « out of left field », « hit a home run », « three strikes »."},
{theme:"sport",diff:"facile",type:"q",q:"Quel est le record du monde du saut en hauteur ?",a:"Javier Somoriba (Cuba) — 2,45 m (1993), record toujours en vigueur",detail:"Sotomayor établit ce record à Salamanque (Espagne) le 27 juillet 1993. Avec 2,45 m, il se situe à environ 30 cm au-dessus de sa propre taille. La technique Fosbury (dos en premier, révolutionnée par Dick Fosbury aux JO de Mexico 1968) est utilisée par tous les sauteurs modernes."},
{theme:"sport",diff:"facile",type:"q",q:"Quelle discipline olympique consiste à lancer un poids de métal le plus loin possible ?",a:"Le lancer du poids (shot put) — mais aussi lancer du disque, du marteau et du javelot",detail:"Le lancer du poids utilise une boule de métal de 7,26 kg (hommes) ou 4 kg (femmes). Randy Barnes (États-Unis) détient le record mondial masculin avec 23,12 m (1990). Ces disciplines de lancer sont parmi les plus anciennes des Jeux olympiques."},
{theme:"sport",diff:"facile",type:"q",q:"Quelles sont les trois disciplines enchaînées dans un triathlon olympique, et dans quel ordre se succèdent-elles ?",a:"Course enchaînant natation, cyclisme et course à pied sans interruption",detail:"Le triathlon olympique comprend 1,5 km de natation, 40 km de vélo et 10 km de course. L'Ironman (discipline reine) couvre 3,8 km de natation, 180 km de vélo et un marathon (42,2 km). Inventé à San Diego en 1974, il devient olympique à Sydney 2000."},
{theme:"sport",diff:"facile",type:"q",q:"Quel pays a remporté le plus de titres en Coupe Davis de tennis ?",a:"Les États-Unis (32 titres) devant l'Australie (28 titres)",detail:"La Coupe Davis, créée en 1900, est la plus ancienne compétition internationale de tennis par équipes. Le format a été réformé en 2019 avec une phase finale à Madrid. Les États-Unis et l'Australie dominent l'histoire de la compétition."},
{theme:"sport",diff:"moyen",type:"q",q:"Quels pays asiatiques dominent l'haltérophilie olympique depuis les années 2000, trustant médailles et records du monde ?",a:"Sport consistant à soulever une barre chargée au-dessus de la tête en deux mouvements : l'arraché et l'épaulé-jeté — la Chine, la Géorgie, la Bulgarie dominent",detail:"L'haltérophilie est olympique depuis 1896. Deux mouvements : l'arraché (en un mouvement) et l'épaulé-jeté (en deux temps). La Chine domine depuis les années 1980. Talha Talib (Pakistan) et Li Fabin (Chine) sont parmi les meilleurs actuels. Les scandales de dopage (surtout en Europe de l'Est) ont entaché la discipline."},
{theme:"sport",diff:"moyen",type:"q",q:"Quel est le rôle de Teddy Riner dans le judo mondial ?",a:"Judoka français, triple champion olympique (2012, 2021, 2024), 11 fois champion du monde — le plus grand judoka de l'histoire",detail:"Riner (né en 1989 en Guadeloupe) domine la catégorie des +100 kg. Il est invaincu pendant 10 ans (2010-2020). Sa victoire à Paris 2024 (JO à domicile) est l'une des plus émouvantes de l'histoire sportive française. Il incarne l'excellence du judo français, première puissance mondiale avec la France."},
{theme:"sport",diff:"moyen",type:"q",q:"Quelle pénalité un biathlète subit-il pour chaque cible manquée au stand de tir ?",a:"Combinaison de ski de fond et tir à la carabine — pénalités (boucle de 150 m ou +1 minute) pour chaque cible ratée",detail:"Né dans les armées scandinaves (patrouille militaire), le biathlon devient olympique en 1960. Les athlètes doivent contrôler leur respiration et leur rythme cardiaque pour tirer avec précision après un effort intense. La Norvège, l'Allemagne et la France dominent la Coupe du Monde. Martin Fourcade (France) a remporté 5 médailles d'or olympiques."},
{theme:"sport",diff:"moyen",type:"q",q:"Quelle est la particularité des Jeux Paralympiques ?",a:"Compétition olympique pour athlètes handicapés, se tenant après chaque Olympiade dans la même ville — créée par Ludwig Guttmann en 1948",detail:"Ludwig Guttmann, neurochirurgien allemand réfugié en Angleterre, lance des compétitions sportives pour blessés de guerre paraplégiques à Stoke Mandeville. Les premiers Jeux Paralympiques officiels se tiennent à Rome en 1960 (400 athlètes). Paris 2024 accueille 4 400 paralympiens de 184 pays. Les Jeux Paralympiques révèlent l'extraordinaire capacité d'adaptation humaine."},
{theme:"sport",diff:"moyen",type:"q",q:"Qui est Rafael Nadal et quel record unique détient-il à Roland-Garros ?",a:"Rafael Nadal (Espagne) — 22 titres du Grand Chelem dont 14 à Roland-Garros (record absolu dans un tournoi)",detail:"Nadal est surnommé « le Roi de la terre battue ». Sa technique (revers lifté à l'extrême, jeu de jambes exceptionnel) est parfaitement adaptée à la terre battue. Il détient le record du nombre de titres dans un tournoi du Grand Chelem (14 Roland-Garros). Sa rivalité avec Federer est considérée comme la plus grande de l'histoire du sport."},
{theme:"sport",diff:"moyen",type:"q",q:"Quel pays a dominé le curling aux Jeux Olympiques d'hiver avec le plus grand nombre de médailles depuis son introduction en 1998 ?",a:"Sport d'hiver olympique où des équipes de 4 joueurs font glisser des pierres de granit sur une glace vers une cible circulaire — stratégie et précision l'emportent sur la force physique",detail:"Le curling naît en Écosse au XVIe s. Les « sweepers » balayent la glace devant la pierre pour modifier sa trajectoire et sa vitesse. Son côté stratégique (placement, sacrifice, déduction) lui vaut le surnom d'« échecs sur glace ». Le Canada et la Suède dominent. La Corée du Sud a révélé une équipe très populaire aux JO de Pyeongchang (2018)."},
{theme:"sport",diff:"moyen",type:"q",q:"Qui est Tiger Woods et comment a-t-il révolutionné le golf ?",a:"Eldrick « Tiger » Woods (né en 1975) — 15 titres du Grand Chelem de golf, a popularisé le sport auprès des minorités et augmenté les audiences de 40 %",detail:"Woods remporte le Masters d'Augusta à 21 ans (1997) avec 12 coups d'avance — record. Il est le premier joueur non blanc à dominer un sport associé aux classes aisées blanches. Ses blessures et scandales personnels ne l'ont pas empêché de remporter un 15e Grand Chelem en 2019. Il est considéré comme l'un des plus grands sportifs de l'histoire."},
{theme:"sport",diff:"moyen",type:"q",q:"Quels sports de combat étaient déjà présents aux Jeux Olympiques antiques de 776 av. J.-C. ?",a:"La lutte et le pugilat (boxe) sont aux JO antiques depuis leur fondation (776 av. J.-C.) — aux JO modernes depuis 1896",detail:"La lutte (greco-romaine et libre) et la boxe sont parmi les sports olympiques les plus anciens. Le judo (1964), le taekwondo (2000), le karaté (2021) et la lutte féminine (2004) ont été ajoutés progressivement. Le MMA (mixed martial arts) n'est pas encore olympique. Les disciplines de combat représentent un tiers des sports au programme des JO."},
{theme:"sport",diff:"moyen",type:"q",q:"En quelle saison le championnat de Formule E est-il lancé, et quel constructeur automobile remporte le premier titre ?",a:"Championnat de voitures de course 100 % électriques lancé en 2014-2015 — laboratoire de technologies de batteries pour l'automobile de série",detail:"La Formule E se distingue de la F1 par ses courses en milieu urbain (Monaco, Paris, New York), ses voitures beaucoup moins puissantes (~350 kW vs ~1 000 kW en F1) et sa double mission sport/R&D technologique. Audi, BMW, Mercedes, Porsche, Jaguar y participent pour tester leurs technologies. Les fabricants utilisent les courses comme banc d'essai pour leurs véhicules électriques de série."},
{theme:"sport",diff:"difficile",type:"q",q:"Quel est l'impact des droits télévisés sur l'économie du sport professionnel ?",a:"Les droits TV représentent 50-70 % des revenus des grandes ligues — la Premier League anglaise a vendu ses droits TV pour 2022-2025 à 11 milliards de livres",detail:"La Premier League anglaise est la ligue de football la plus riche au monde grâce à ses droits TV internationaux (168 pays). La NFL vend ses droits TV aux États-Unis pour ~9 milliards de dollars/an à partir de 2023. Ces revenus gigantesques creusent les inégalités entre ligues riches et pauvres, et entre grands clubs et petits. Ils gonflent les salaires des joueurs et les frais de transfert."},
{theme:"sport",diff:"difficile",type:"q",q:"Dans quel pays la culture ultras du football naît-elle dans les années 1960-70, avant de se répandre dans toute l'Europe ?",a:"Groupes de supporters organisés (nés en Italie dans les années 1960-70) qui créent des animations visuelles et sonores spectaculaires — entre passion et violence",detail:"Les ultras naissent avec les groupes comme Boys San et Fossa dei Leoni (AC Milan, 1968). Ils organisent des tifos (fresques géantes de supporters), des fumigènes et des chants coordonnés. Distincts des hooligans (violence gratuite), les ultras ont une identité politique souvent marquée (gauche/droite selon les clubs). Le phénomène s'est répandu dans toute l'Europe et au Maghreb."},
{theme:"sport",diff:"difficile",type:"q",q:"Dans quel milieu scolaire britannique du XIXe siècle l'idéal de fair play sportif émerge-t-il pour la première fois ?",a:"Idéal sportif britannique du XIXe s. issu des public schools — Tom Brown's School Days (1857) de Thomas Hughes en est la source littéraire",detail:"Le fair play naît dans les écoles privées britanniques (Rugby, Eton, Harrow) qui développent des sports codifiés pour former le caractère des élèves. L'idée : la victoire importa moins que la manière de jouer. Pierre de Coubertin s'en inspire pour les JO ('l'essentiel est de participer'). Le fair play entre en tension avec le professionnalisme et les enjeux financiers croissants du sport moderne."},
{theme:"sport",diff:"difficile",type:"q",q:"Dans quelle ville japonaise se déroule la majorité des tournois de sumo, et combien de tournois officiels ont lieu chaque année ?",a:"Sport japonais millénaire où deux rikishi (lutteurs en mawashi) cherchent à faire sortir l'adversaire du dohyo ou lui faire toucher le sol — profondément ancré dans le shinto",detail:"Le sumo mêle sport et rituel shinto : purification du dohyo au sel, rituel des frappes des cuisses, jet de sel avant le combat. Les lutteurs (rikishi) peuvent peser jusqu'à 300 kg. Il existe 6 rangs dont le yokozuna (grand champion). Hakuho (Mongolie), retraité en 2021, est le plus titré avec 45 championnats. Seulement 6 yokozuna étaient actifs simultanément au maximum dans l'histoire."},
{theme:"sport",diff:"facile",type:"q",q:"Quel athlète français a remporté le plus de médailles aux Jeux Olympiques ?",a:"Teddy Riner (judo) avec 3 médailles d'or et 1 de bronze (2012-2024) ou Florent Manaudou (natation, 1 or 2 argent 1 bronze)",detail:"Teddy Riner remporte l'or en 2012 (Londres), 2021 (Tokyo) et 2024 (Paris) — triple champion olympique en judo +100 kg. Il est le judoka français le plus titré. Dans l'histoire, c'est Laure Manaudou et Laura Flessel qui dominent la liste féminine. Marie-José Pérec (3 or, 1 bronze) reste la grande figure historique du sport français aux JO."},
{theme:"sport",diff:"facile",type:"q",q:"Combien d'épreuves composent le décathlon, et sur combien de jours se déroule-t-il aux Jeux Olympiques ?",a:"Combinaison de 10 disciplines d'athlétisme sur 2 jours — le champion est surnommé « l'athlète le plus complet du monde »",detail:"Le décathlon comprend (jour 1) : 100 m, saut en longueur, lancer du poids, saut en hauteur, 400 m ; (jour 2) : 110 m haies, lancer du disque, saut à la perche, lancer du javelot, 1 500 m. Kevin Mayer (France) détient le record du monde avec 9 126 points (2018). Daley Thompson (GB) et Roman Šebrle (RTC) ont aussi marqué l'histoire."},
{theme:"sport",diff:"moyen",type:"q",q:"Quel sport collectif américain se joue avec un bâton plat et une rondelle sur glace ?",a:"Le hockey sur glace",detail:"Le hockey sur glace naît au Canada dans les années 1870. La NHL (National Hockey League) est la principale ligue professionnelle. Le Canada et la Russie/URSS ont dominé historiquement. Wayne Gretzky, Mario Lemieux et Gordie Howe sont les légendes absolues. La rivalité hockey Canada-URSS (Série du siècle, 1972) est l'une des plus intenses de l'histoire sportive."},
{theme:"sport",diff:"moyen",type:"q",q:"Quel est le parcours officiel d'un Ironman triathlon ?",a:"3,86 km de natation + 180,25 km de vélo + 42,195 km de course à pied (marathon) — total ~226 km",detail:"L'Ironman est né en 1977 à Hawaï d'un pari entre nageurs, cyclistes et coureurs pour voir quel sport demandait le plus d'endurance. Le record du monde est autour de 7h40. Les concurrents ont 17 heures pour finir. L'Ironman de Kona (Hawaï) est le championnat du monde et la course de référence. Jan Frodeno (Allemagne) et Patrick Lange (Allemagne) ont dominé les années 2010."},
{theme:"sport",diff:"moyen",type:"q",q:"Dans quelle ville britannique se tient chaque année le Championnat du monde de snooker, la compétition la plus prestigieuse du sport ?",a:"Sport de cue (queue de billard) sur table couverte de drap vert, utilisant 21 boules colorées — né en Inde dans l'armée britannique vers 1875",detail:"Le snooker se joue sur une table de 3,6 × 1,8 m avec 15 boules rouges et 6 boules de couleurs. Un « maximum break » (147 points) consiste à rentrer toutes les boules sans manquer. Ronnie O'Sullivan (Angleterre) a réalisé le maximum le plus rapide (5 min 20 s). Le snooker est très populaire au Royaume-Uni, en Chine et dans les pays du Commonwealth."},
{theme:"sport",diff:"difficile",type:"q",q:"Quelle est la signification culturelle des Haka dans le rugby néo-zélandais ?",a:"Danse guerrière maorie performée par les All Blacks avant chaque match — revendication de l'identité polynésienne de la Nouvelle-Zélande et intimidation de l'adversaire",detail:"Le Ka Mate (haka traditionnel) est performé par les All Blacks depuis 1905. En 2005, ils adoptent le Kapa o Pango, haka spécifiquement composé pour eux. Certains adversaires osent maintenant « répondre » au haka : les Gallois ont marché vers les All Blacks en 2008, les Irlandais en 2016. Ces confrontations pré-match sont parmi les moments les plus intenses du rugby mondial."},
{theme:"sport",diff:"difficile",type:"q",q:"Combien d'équipes composent la Nippon Professional Baseball (NPB), et quel joueur japonais est devenu le symbole du passage vers la MLB ?",a:"La Nippon Professional Baseball (12 équipes, fondée en 1950) — 2e ligue mondiale après la MLB, avec des règles légèrement différentes et un style de jeu distinct",detail:"Le Japon est la 2e puissance mondiale du baseball. La rivalité MLB-NPB culmine quand des joueurs japonais passent aux États-Unis : Ichiro Suzuki (10 saisons consécutives avec plus de 200 hits), Shohei Ohtani (premier joueur à s'illustrer simultanément comme lanceur et frappeur d'élite depuis Babe Ruth). Le Japon a remporté 3 fois le Classique mondial de baseball (2006, 2009, 2023)."},
{theme:"sport",diff:"facile",type:"q",q:"Quel sport se pratique sur une piste ovale et consiste à parcourir le plus de distance en un certain temps ?",a:"Le cyclisme sur piste (poursuite, vitesse, omnium, madison) — mais aussi le patinage de vitesse et l'athlétisme",detail:"Le cyclisme sur piste se pratique dans un vélodrome. Les épreuves olympiques incluent la poursuite par équipes, le sprint, le keirin (avec un derny) et l'omnium (discipline multiple). La France, la Grande-Bretagne et l'Australie dominent la piste. Le vélodrome de Saint-Quentin-en-Yvelines accueille les épreuves des JO de Paris 2024."},
{theme:"sport",diff:"facile",type:"q",q:"Dans quel pays d'Amérique du Sud le polo est-il le plus pratiqué et le plus titré au niveau mondial ?",a:"Sport équestre (2 équipes de 4 cavaliers frappant une balle avec un maillet) — populaire en Argentine, Grande-Bretagne, Inde et États-Unis",detail:"Le polo est le plus ancien sport à cheval (origines en Perse, ~300 av. J.-C.). L'Argentine domine le polo mondial depuis les années 1950. Un match dure 6 chukkers (périodes de 7 minutes). Les poneys de polo (en réalité des chevaux adultes de 155 cm) sont changés toutes les 2-3 périodes. Le prince Charles (Charles III) a joué jusqu'à 65 ans."},
{theme:"sport",diff:"moyen",type:"q",q:"Quel est le record du monde du lancer du javelot et qui le détient ?",a:"Jan Železný (République tchèque) — 98,48 m (Iéna, 25 mai 1996)",detail:"Železný détient ce record depuis 1996 — plus longtemps qu'aucun autre record en athlétisme masculin. Il a remporté 3 médailles d'or olympiques (1992, 1996, 2000). Le javelot masculin (800 g) avait été alourdi en 1986 pour limiter les distances après que la javeline avait atteint le 100 m, risquant de toucher le public."},
{theme:"sport",diff:"moyen",type:"q",q:"Combien de fois l'équipe de France masculine de handball a-t-elle remporté le Championnat du monde ?",a:"Sport collectif (7 joueurs par équipe) avec ballon projeté à la main dans le but — la France domine depuis les années 2000 avec 6 titres olympiques et mondiaux",detail:"Le handball est populaire principalement en Europe (Scandinavie, Allemagne, France, Espagne) et en Corée du Sud. La France masculine ('les Experts') et féminine ont remporté de nombreux titres. Nikola Karabatić (6 titres olympiques) est le meilleur handballeur de l'histoire. Paris 2024 voit la France remporter deux médailles d'or en handball."},
{theme:"sport",diff:"moyen",type:"q",q:"Quel pays reconnaît l'e-sport comme discipline sportive officielle dès 2003, parmi les premiers au monde ?",a:"Compétitions de jeux vidéo professionnels (League of Legends, CS:GO, Fortnite, FIFA) avec audiences dépassant certains sports traditionnels",detail:"Les tournois d'e-sport rassemblent 100 millions de spectateurs en ligne pour des finales comme celles de League of Legends. Les meilleurs joueurs gagnent plusieurs millions de dollars. La Corée du Sud a légitimé l'e-sport dès 2000 avec des championnats StarCraft télévisés. Les JO de Paris 2024 ont inclus des Jeux Olympiques Esport en marge, avec 500 000 participants qualificatifs."},
{theme:"sport",diff:"moyen",type:"q",q:"Qui est Simone Biles et pourquoi est-elle considérée comme la plus grande gymnaste de l'histoire ?",a:"Simone Biles (née en 1997, États-Unis) — 37 médailles mondiales (record), 7 médailles olympiques, inventrice de 4 éléments portant son nom",detail:"Biles révolutionne la gymnastique artistique avec des éléments d'une difficulté sans précédent (Biles I, Biles II au sol, Biles au saut de cheval). Aux JO de Tokyo 2021, elle se retire pour protéger sa santé mentale (les 'twisties' — désorientation en l'air). Ses JO de Paris 2024 sont sa rédemption : 3 or et 1 argent. Elle est un symbole de la prise de conscience sur la santé mentale dans le sport."},
{theme:"sport",diff:"difficile",type:"q",q:"Quel est l'impact de la technologie VAR sur le football professionnel ?",a:"La Video Assistant Referee (VAR), introduite en 2018 (Coupe du Monde), réduit les erreurs arbitrales mais ralentit le jeu et crée de nouvelles controverses",detail:"La VAR est utilisée pour 4 types de décisions : buts, penaltys, cartons rouges directs et erreurs d'identité. Elle a réduit les erreurs d'arbitrage de 93 % selon la FIFA. Mais les interruptions de jeu (2-3 minutes en moyenne) et l'interprétation des règles (ligne hors-jeu au centimètre) créent frustation et nouvelles polémiques. L'IFAB (instances du football) continue d'ajuster les règles."},
{theme:"sport",diff:"difficile",type:"q",q:"Quel a été le rôle du sportif Arthur Ashe dans l'histoire des droits civiques ?",a:"Arthur Ashe (1943-1993) — premier joueur noir à remporter Wimbledon (1975), militant des droits civiques et premier sportif majeur à révéler publiquement sa séropositivité (1992)",detail:"Ashe grandit en Virginie ségréguée et ne peut jouer sur les courts publics réservés aux Blancs. Il devient le premier Noir américain à intégrer l'équipe Davis Cup (1963) puis remporte Wimbledon (1975). Il contracte le VIH par transfusion sanguine lors d'une opération cardiaque (1983) et le révèle en 1992, faisant de la lutte contre le SIDA sa dernière cause. Il meurt en 1993 à 49 ans."},
// CARTES SPORT FINALES (9 cartes pour atteindre 100)
{theme:"sport",diff:"facile",type:"q",q:"Quel pays a inventé le volleyball ?",a:"Les États-Unis — William G. Morgan invente le volleyball en 1895 à Holyoke, Massachusetts",detail:"Morgan, directeur d'un YMCA, cherche un sport moins physique que le basketball pour les hommes d'affaires. Il invente le « mintonette » (renommé volleyball). Le volleyball de plage devient olympique à Atlanta 1996. Le Brésil et les États-Unis dominent le volleyball mondial."},
{theme:"sport",diff:"moyen",type:"q",q:"Qui est Lionel Messi et quel exploit a-t-il accompli en 2022 ?",a:"Considéré par beaucoup comme le meilleur joueur de football de l'histoire — il remporte enfin la Coupe du monde 2022 avec l'Argentine après une finale légendaire contre la France",detail:"Messi joue 21 saisons au FC Barcelone (1era victoire de Ligue des Champions en 2006, puis 2009, 2011, 2015). La finale 2022 contre la France (3-3 après prolongations, victoire aux tirs au but) est considérée comme la meilleure finale de l'histoire. Il rejoint l'Inter Miami en MLS en 2023."},
{theme:"sport",diff:"facile",type:"q",q:"Qui crée le judo en 1882 au Japon, et quel principe fondamental — utiliser la force de l'adversaire — en constitue la philosophie ?",a:"Art martial japonais créé par Jigoro Kano en 1882 — la voie de la souplesse (ju-do) : utiliser la force de l'adversaire contre lui",detail:"Le judo (littéralement 'voie souple') devient olympique à Tokyo 1964. Les combattants (judokas) portent un kimono blanc (judogi). Les techniques incluent projections, immobilisations, étranglements et luxations. Le Japon, la France, le Brésil et la Corée dominent. Teddy Riner (France) est le plus titré de l'histoire."},
{theme:"sport",diff:"moyen",type:"q",q:"Quelle est la différence entre le rugby à XV et le rugby à 7 ?",a:"Le rugby à XV (15 joueurs, 80 minutes) est la forme classique ; le rugby à 7 (7 joueurs, 14 minutes) est au programme olympique depuis Rio 2016",detail:"Le rugby à 7 est plus rapide et spectaculaire avec des scores plus élevés. Les Fidji, les All Blacks et l'Afrique du Sud dominent le circuit mondial Sevens. Les Fidji ont remporté l'or olympique à Rio 2016 et Tokyo 2021 — premier titre olympique d'un pays du Pacifique. La France accueille le tournoi de Paris Sevens annuellement."},
{theme:"sport",diff:"facile",type:"q",q:"Quelle discipline olympique consiste à tirer des flèches vers une cible circulaire ?",a:"Le tir à l'arc (archery)",detail:"Le tir à l'arc est une des plus anciennes disciplines humaines. Il devient olympique en 1900, supprimé puis réintroduit en 1972. La Corée du Sud domine totalement la discipline féminine depuis les années 1980 (une tradition nationale y est ancrée dans les écoles). La distance de compétition olympique est 70 mètres."},
{theme:"sport",diff:"moyen",type:"q",q:"Quelle nation a remporté la Coupe du Monde de rugby le plus de fois, avec trois titres en 1987, 2011 et 2015 ?",a:"Compétition mondiale de rugby à XV tous les 4 ans depuis 1987 — la Nouvelle-Zélande (All Blacks) l'a remportée 3 fois (1987, 2011, 2015), comme l'Afrique du Sud (1995, 2007, 2019, 2023)",detail:"L'Afrique du Sud remporte son 4e titre en 2023 en France, devenant la nation la plus titrée. Les All Blacks, grands favoris, sont souvent éliminés prématurément ('malediction des All Blacks'). Le Pays de Galles, l'Australie (2 titres) et l'Angleterre (1 titre) complètent le palmarès."},
{theme:"sport",diff:"difficile",type:"q",q:"Quel physiologiste soviétique développe dans les années 1960 le concept de périodisation de l'entraînement, influençant tous les sports de haut niveau ?",a:"Méthode scientifique de planification de l'entraînement en cycles (macrocycles, mésocycles, microcycles) pour atteindre le pic de performance au bon moment",detail:"La périodisation est développée par le physiologiste soviétique Léo Matveyev dans les années 1960. Elle divise la saison en phases : préparation générale, préparation spécifique, compétition, transition. Aujourd'hui, la périodisation ondulatoire (charges variées chaque semaine) et la périodisation en blocs (périodes de surcharge) sont les approches dominantes en sports de haut niveau."},
{theme:"sport",diff:"difficile",type:"q",q:"Quel rôle a joué Munich 1972 dans l'histoire des JO et de la sécurité des méga-événements ?",a:"La prise d'otages des JO de Munich (5-6 septembre 1972) par le groupe Septembre Noir — 11 athlètes israéliens assassinés — a transformé la sécurité olympique pour toujours",detail:"8 membres du groupe Septembre Noir prennent en otage 11 athlètes et officiels israéliens. La tentative de libération tourne au carnage : tous les otages sont tués. Le Comité olympique décide de continuer les Jeux après une cérémonie de deuil — décision controversée. Les JO développent depuis des dispositifs sécuritaires massifs (Los Angeles 1984 : premier usage de drones de surveillance)."},
{theme:"sport",diff:"moyen",type:"q",q:"Qui est Ronaldo et comment se distingue-t-il de Messi dans l'histoire du football ?",a:"Cristiano Ronaldo (né en 1985, Portugal) — 5 fois Ballon d'Or, 5 Ligues des Champions, 900+ buts en carrière — rivalité avec Messi considérée la plus grande de l'histoire du sport",detail:"Ronaldo est le premier joueur à inscrire 100 buts en équipe nationale. Sa puissance physique, son explosivité et ses coups francs contrastent avec la technique naturelle de Messi. Ensemble, ils ont dominé le football mondial de 2009 à 2022. Ronaldo joue désormais en Arabie Saoudite (Al-Nassr) après un passage à Manchester United."},
// CARTES ARTS FINALES (8 cartes pour atteindre 100)
{theme:"arts",diff:"facile",type:"q",q:"Quel mouvement musical des années 1960-70 est caractérisé par des guitares distordues et des concerts à grand volume ?",a:"Le rock — et ses sous-genres hard rock, heavy metal (Led Zeppelin, Black Sabbath, Deep Purple)",detail:"Le rock naît du rock and roll des années 1950 (Elvis, Chuck Berry). Les Beatles et les Rolling Stones ouvrent la British Invasion. Jimi Hendrix révolutionne la guitare électrique. Led Zeppelin invente le heavy metal. Les années 1970 voient naître le rock progressif (Pink Floyd, Genesis), le punk (Sex Pistols) et le disco — autant de réactions au rock classique."},
{theme:"arts",diff:"facile",type:"q",q:"Quel peintre impressionniste français est célèbre pour ses tableaux de danseuses ?",a:"Edgar Degas (1834-1917)",detail:"Degas peint les danseuses de l'Opéra de Paris dans leurs coulisses, leurs répétitions, leurs moments de repos — non pas le spectacle mais le labeur de la danse. Il utilise des angles et cadrages photographiques innovants. Ses pastels tardifs (vue baissante l'obligeant à travailler de mémoire) sont parmi ses plus beaux. Il est aussi sculpteur (La Petite Danseuse de quatorze ans)."},
{theme:"arts",diff:"moyen",type:"q",q:"Dans quelle ville allemande le Bauhaus est-il fondé en 1919, et qui en est le directeur fondateur ?",a:"École d'art et design fondée à Weimar en 1919 par Walter Gropius — fusion de l'art et de l'artisanat, fondatrice du design industriel moderne",detail:"Le Bauhaus (1919-1933) forme des artistes-artisans capables de concevoir des objets beaux et fonctionnels pour la production industrielle. Marcel Breuer (fauteuil Wassily), Mies van der Rohe (chaise Barcelona), Herbert Bayer (typographie) en sont les figures. Hitler ferme le Bauhaus en 1933 ; ses membres émigrent aux États-Unis où ils influencent l'architecture et le design américains."},
{theme:"arts",diff:"moyen",type:"q",q:"Qui est Caravage et quelle révolution a-t-il apportée à la peinture ?",a:"Michelangelo Merisi da Caravaggio (1571-1610) — révolutionne la peinture en utilisant des modèles populaires et un clair-obscur dramatique radical",detail:"Caravage peint des saints avec les visages et les corps de gens du peuple — pieds sales inclus. Son clair-obscur (chiaroscuro) extrait les personnages d'un fond obscur avec une lumière tranchante comme un projecteur. Son influence sur Rubens, Rembrandt, Vélasquez et la peinture espagnole et flamande du XVIIe s. est immense. Sa vie tumultueuse (meurtrier en fuite) renforce sa mythologie."},
{theme:"arts",diff:"moyen",type:"q",q:"Quel roman de Gabriel García Márquez, publié en 1967, est l'œuvre emblématique du réalisme magique latino-américain ?",a:"Courant littéraire latino-américain (et mondial) mêlant réalité banale et éléments fantastiques sans les distinguer — Gabriel García Márquez, Isabel Allende, Jorge Amado",detail:"Cent ans de solitude (García Márquez, 1967) est le roman fondateur : la famille Buendía vit à Macondo où les morts reviennent, il pleut des fleurs jaunes, une femme monte au ciel. Ce courant exprime la réalité latino-américaine comme mélange naturel de visions indigènes, africaines et européennes. Il influence Rushdie (Inde), Murakami (Japon) et une grande partie du roman contemporain."},
{theme:"arts",diff:"difficile",type:"q",q:"Quel est l'héritage du mouvement Arts and Crafts dans le design et l'architecture contemporaine ?",a:"Il pose les bases du design intégré, de l'artisanat d'art et de l'idéal de cohérence entre forme et fonction — influence directe sur l'Art nouveau, le Bauhaus et le mouvement Maker contemporain",detail:"William Morris (1834-1896) refuse la laideur industrielle et prône un retour à l'artisanat. Son influence se propage en Europe (Jugendstil), aux États-Unis (Frank Lloyd Wright, Prairie Style) et au Japon (redécouverte du mingei/artisanat populaire par Yanagi Soetsu). Le mouvement Maker contemporain (fabrication artisanale, impression 3D) et l'économie des 'makers' prolongent cette philosophie."},
{theme:"arts",diff:"difficile",type:"q",q:"Quelle est la place de la photographie dans l'histoire de l'art et comment a-t-elle transformé la peinture ?",a:"La photographie (1839) libère la peinture de son rôle de documentation du réel — l'impressionnisme, l'expressionnisme et l'abstraction en sont les conséquences directes",detail:"Avant la photographie, la peinture devait documenter les visages, les batailles, les paysages. La photo prend ce rôle, libérant la peinture vers l'expression subjective. Baudelaire voit la photographie comme une menace ; les impressionnistes l'utilisent au contraire pour s'en affranchir. La photographie devient elle-même un art (Nadar, Atget, Cartier-Bresson) et repose la question : qu'est-ce que l'art ?"},
{theme:"arts",diff:"facile",type:"q",q:"Qui est Frédéric Chopin et quel rapport entretenait-il avec la Pologne ?",a:"Compositeur et pianiste polonais (1810-1849) — exile à Paris dès 1831 après l'échec de l'insurrection polonaise, il exprime son attachement à la Pologne dans ses mazurkas et polonaises",detail:"Chopin quitte Varsovie en 1830 et apprend à Paris l'échec du soulèvement polonais contre la Russie. Il ne retournera jamais en Pologne. Ses mazurkas (danse populaire polonaise) et polonaises sont des hommages à sa patrie perdue. Son cœur, selon sa volonté, est rapatrié à Varsovie après sa mort (son corps reste à Paris, cimetière Père-Lachaise)."},
{theme:"arts",diff:"facile",type:"q",q:"Qui est l'architecte de l'opéra de Sydney ?",a:"Jørn Utzon (Danemark) — inauguré en 1973, classé au patrimoine UNESCO en 2007",detail:"L'Opéra de Sydney avec ses 'voiles' blanches est l'un des bâtiments les plus reconnaissables du monde. Utzon remporte le concours international en 1957. La construction, chaotique et controversée, le pousse à démissionner en 1966. Il ne reverra jamais l'œuvre achevée. Il reçoit le Prix Pritzker en 2003."},
{theme:"arts",diff:"facile",type:"q",q:"Quel artiste de rue (street art) est le plus célèbre au monde et reste anonyme ?",a:"Banksy — artiste britannique anonyme dont les œuvres satiriques apparaissent dans les villes du monde entier",detail:"Banksy crée des œuvres au pochoir sur les murs des villes (Londres, New York, Gaza, Bethlehem) dénonçant la guerre, le capitalisme et l'hypocrisie sociale. Ses œuvres se vendent des millions aux enchères. En 2018, sa Girl with Balloon s'est auto-détruite à la moitié lors d'une vente chez Sotheby's — coup de génie ou accident ? Il est le seul artiste vivant dont l'identité reste un mystère total."},
{theme:"arts",diff:"facile",type:"q",q:"Quel mouvement musical des années 1970 a été fondé par des groupes comme les Ramones et les Sex Pistols ?",a:"Le punk rock",detail:"Le punk naît simultanément à New York (Ramones, CBGB, 1974) et à Londres (Sex Pistols, The Clash, 1976). Réaction au rock progressif sophistiqué, le punk valorise la spontanéité, la brièveté, la colère et la dissonance. Les Sex Pistols durent 2 ans mais révolutionnent la musique. Le punk influence le post-punk, le new wave, l'indie rock et presque toute la musique alternative."},
{theme:"arts",diff:"facile",type:"q",q:"Quel peintre néerlandais est l'auteur de La Jeune Fille à la perle (vers 1665) ?",a:"Johannes Vermeer",detail:"Surnommé le 'Sphinx de Delft', Vermeer n'a laissé que 34 à 36 œuvres. La Jeune Fille à la perle est parfois appelée la 'Mona Lisa du Nord' pour son regard direct et son mystère. Conservée au Mauritshuis de La Haye. Le roman de Tracy Chevalier (1999) et le film éponyme ont popularisé l'œuvre."},
{theme:"arts",diff:"facile",type:"q",q:"Quelle série de portraits sérigraphiés Andy Warhol réalise-t-il en 1962, devenant l'icône du Pop Art ?",a:"Technique d'impression par pochoir sur tissu ou papier — Warhol l'utilise pour reproduire des images en séries avec variations de couleur",detail:"La sérigraphie (screen printing) utilise un écran de soie avec des zones bloquées pour imprimer la même image en série. Warhol l'adopte dans les années 1960 pour questionner la notion d'original et de copie. Ses 'multiples' (Marilyn, Campbell's Soup, Mao) existent en centaines ou milliers d'exemplaires, interrogeant la valeur de l'œuvre d'art unique."},
{theme:"arts",diff:"facile",type:"q",q:"Qui est Léonard de Vinci et comment illustre-t-il l'idéal de l'« homme universel » ?",a:"Léonard de Vinci (1452-1519) — peintre, sculpteur, architecte, ingénieur, anatomiste, musicien — archétype de l'homo universalis de la Renaissance",detail:"L'Homme de Vitruve (vers 1490), dessin d'un homme inscrit dans un cercle et un carré, symbolise l'harmonie entre l'homme et le cosmos. Léonard remplit des milliers de pages de carnets avec des projets de machines volantes, des études anatomiques (sur 30 cadavres), des observations géologiques. Son génie universel reste inégalé dans l'histoire."},
{theme:"arts",diff:"moyen",type:"q",q:"Quel bâtiment de Philip Johnson à New York, avec son fronton brisé inspiré de Chippendale, symbolise le tournant postmoderne en architecture ?",a:"Courant des années 1970-2000 réaction contre le modernisme austère — citations historiques, ornements, ironie — le Centre Pompidou (1977) et le Guggenheim de Bilbao (1997) en sont des exemples",detail:"Le postmodernisme architectural (Venturi, Koolhaas, Gehry) rejette le 'less is more' de Mies van der Rohe pour 'less is bore'. Le Centre Pompidou (Piano, Rogers) expose ses structures en façade. Le Guggenheim de Bilbao (Gehry) avec ses formes de titane ondulantes revitalise toute une ville. La Bibliothèque nationale de France (Perrault) ou la pyramide du Louvre (Pei) illustrent les débats entre tradition et modernité."},
{theme:"arts",diff:"moyen",type:"q",q:"Qui est Wolfgang Amadeus Mozart enfant prodige et comment sa vie résume-t-elle la condition de l'artiste sous mécénat ?",a:"Mozart (1756-1791) est exhibé dès 6 ans dans toutes les cours européennes par son père Leopold — sa mort misérable illustre la transition difficile du mécénat à l'indépendance artistique",detail:"Leopold Mozart parcourt l'Europe avec ses deux enfants prodiges (Wolfgang et sa sœur Nannerl). À 8 ans, Wolfgang joue devant Louis XV à Versailles. À 35 ans, il meurt endetté à Vienne, son Requiem inachevé. Sa vie illustre le passage du compositeur-serviteur (au service d'un prince) au compositeur-indépendant — libération qui a un prix."},
{theme:"arts",diff:"moyen",type:"q",q:"Quel film de Fritz Lang (1927), œuvre majeure du cinéma expressionniste allemand, influence encore la science-fiction contemporaine ?",a:"Courant cinématographique (Le Cabinet du Dr Caligari, Nosferatu, Metropolis) caractérisé par des décors déformés, des ombres expressives et des thèmes sombres",detail:"Le Cabinet du Dr Caligari (Wiene, 1920), Nosferatu (Murnau, 1922), Le Golem (Wegener) et Metropolis (Lang, 1927) définissent le style. Les décors peints à la main, les angles obliques et la lumière expressionniste créent une atmosphère d'angoisse. Quand Hitler arrive au pouvoir, cinéastes (Lang, Wilder, Sirk) émigrent à Hollywood, emportant leur style — qui influencera le film noir américain."},
{theme:"arts",diff:"moyen",type:"q",q:"Qui a inventé la photographie couleur et quand ?",a:"La première photographie couleur permanente est attribuée à James Clerk Maxwell (1861) — les procédés pratiques arrivent avec Autochrome Lumière (1907)",detail:"Maxwell réalise la première photo couleur en 1861 en combinant trois clichés filtrés (rouge, vert, bleu) — principe des couleurs additives utilisé encore aujourd'hui. Les frères Lumière commercialisent l'Autochrome en 1907 (plaques de verre avec grains de fécule colorés). Kodachrome (1935) et Kodacolor (1942) popularisent la photo couleur en film."},
{theme:"arts",diff:"moyen",type:"q",q:"Quel gratte-ciel new-yorkais, achevé en 1930, est l'exemple le plus célèbre de l'architecture Art déco ?",a:"Courant artistique des années 1920-1940 alliant luxe, géométrie et modernité — le Chrysler Building (1930) à New York, la villa E-1027 de Charlotte Perriand",detail:"L'Art déco naît à l'Exposition internationale des Arts décoratifs de Paris (1925). Il marie les formes géométriques modernes avec des matériaux luxueux (acier chromé, laque, ivoire). L'Empire State Building, le Chrysler Building, les palaces Art déco de South Beach Miami, la librairie Jales de Porto sont des exemples iconiques. Il représente l'optimisme des Années folles."},
{theme:"arts",diff:"moyen",type:"q",q:"Qui est Johann Sebastian Bach et pourquoi est-il considéré comme le plus grand compositeur de tous les temps par beaucoup ?",a:"Bach (1685-1750) synthétise toute la musique baroque et pose les bases de l'harmonie moderne — ses œuvres couvrent tous les genres et tous les registres",detail:"Bach compose pour l'orgue (Toccata et Fugue en ré mineur), le clavecin (Variations Goldberg), l'orchestre (Concertos brandebourgeois), les cantates (plus de 200) et les Passions (saint Matthieu, saint Jean). Ses œuvres contrapuntistiques (L'Art de la fugue, L'Offrande musicale) sont des mathématiques sonores. Oublié après sa mort, il est redécouvert par Mendelssohn en 1829 — renaissance qui changerait la musique classique."},
{theme:"arts",diff:"moyen",type:"q",q:"Quel compositeur français est le chef de file de l'impressionnisme musical, avec des œuvres comme La Mer et Prélude à l'après-midi d'un faune ?",a:"Courant de la fin du XIXe s. / début XXe s. cherchant à évoquer des atmosphères plutôt qu'à raconter — Claude Debussy et Maurice Ravel en sont les maîtres",detail:"Debussy (La Mer, Prélude à l'après-midi d'un faune, Pelléas et Mélisande) et Ravel (Boléro, La Valse, Daphnis et Chloé) explorent les couleurs orchestrales, les échelles pentatoniques et les modes ecclésiastiques. Le terme 'impressionnisme musical' vient de la critique, comme pour la peinture. Debussy préfère 'symbolisme sonore'. Leur influence sur le jazz (Bill Evans), le jazz modal (Miles Davis) et la musique de film est immense."},
{theme:"arts",diff:"difficile",type:"q",q:"Quel philosophe britannique publie en 1757 un essai fondateur sur le sublime et le beau, influençant toute la peinture romantique ?",a:"Le sublime (Edmund Burke, 1757 ; Kant, 1790) désigne ce qui dépasse la beauté par sa grandeur terrifiante — les peintres romantiques (Friedrich, Turner) en font leur sujet",detail:"Burke distingue le beau (ordre, harmonie) du sublime (immensité, terreur, infini). Caspar David Friedrich (Le Voyageur contemplant une mer de nuages, 1818) illustre l'homme face à la nature écrasante. Turner (Pluie, vapeur et vitesse, 1844) préfigure l'abstraction. En Amérique, l'Hudson River School transpose le sublime dans les paysages vierges américains. Le sublime reste une catégorie esthétique centrale pour l'art du XXe s."},
{theme:"arts",diff:"difficile",type:"q",q:"Quel philosophe florentin du XVe siècle traduit Platon en latin et diffuse le néoplatonisme sous le mécénat des Médicis ?",a:"Philosophie antique (Platon) revisitée par Marsile Ficin à Florence — l'art doit révéler la beauté divine à travers des formes idéales, influençant Botticelli et Michel-Ange",detail:"Laurent de Médicis finance l'Académie platonicienne de Ficin. Les 'idées' platoniciennes (formes parfaites dont le monde sensible n'est qu'une copie imparfaite) inspirent la recherche de la beauté idéale. Botticelli peint Vénus comme incarnation de l'amour divin-platonique. Michel-Ange sculpte des corps parfaits cherchant à libérer la forme idéale emprisonnée dans le marbre."},
{theme:"arts",diff:"difficile",type:"q",q:"Quel programme iconographique décore les cathédrales gothiques pour instruire les fidèles, formant une 'Bible des illettrés' ?",a:"De l'art symbolique des catacombes (IIe-IIIe s.) à la mosaïque byzantine (IVe-VIe s.), aux fresques romanes (XIe s.) puis aux vitraux gothiques (XIIe s.) — évolution de l'immatériel vers la lumière",detail:"L'art chrétien primitif utilise des symboles (ichthus = Christ, colombe = Paix). Byzance crée l'icône et la mosaïque comme fenêtre sur le divin. L'art roman (Xie-XIIe s.) hiérarchise les figures selon leur importance spirituelle. Le gothique — avec ses verrières colorées et ses cathédrales élancées — cherche à immerger le fidèle dans la lumière divine (théologie de la lumière de l'Abbé Suger de Saint-Denis)."},
{theme:"arts",diff:"difficile",type:"q",q:"Quel est le rôle de la Collection Frick à New York ou du Mauritshuis à La Haye dans la transmission du patrimoine artistique ?",a:"Ces musées de taille réduite à collections ciblées (art flamand, néerlandais, ancien) offrent une expérience muséale intime impossible dans les grands musées encyclopédiques",detail:"Le Mauritshuis (La Haye) abrite La Jeune Fille à la perle de Vermeer et L'Anatomie du Dr Tulp de Rembrandt dans 15 salles — expérience concentrée. La Frick Collection (New York, fermée pour rénovation 2020-2024) offre des Rembrandt, Vermeer, Holbein dans un hôtel particulier intact. Ces collections 'de connaisseurs' s'opposent aux musées encyclopédiques (Louvre, British Museum) et permettent une relation différente avec les œuvres."},
{theme:"arts",diff:"difficile",type:"q",q:"Qui publie en 1994 Le Canon occidental, défendant une liste d'œuvres fondamentales et déclenchant une vive controverse culturelle ?",a:"Le canon désigne les œuvres reconnues comme références — Harold Bloom (Le Canon occidental, 1994) défend son existence ; les études postcoloniales et féministes dénoncent son eurocentrisme et son sexisme",detail:"Le canon occidental (Shakespeare, Dante, Cervantes, Goethe, Proust...) est le corpus de référence de la culture lettrée européenne. Harold Bloom le défend comme liste des plus grandes œuvres. Les études culturelles dénoncent l'exclusion des femmes, des non-Blancs, des non-Européens. Le débat sur l'inclusion dans les curricula universitaires américains ('culture wars' des années 1990) reste vif. L'existence d'un canon est inévitable ; sa composition est politique."},
{theme:"arts",diff:"facile",type:"q",q:"Quel compositeur polonais est surnommé « le poète du piano » ?",a:"Frédéric Chopin (1810-1849)",detail:"Chopin compose presque exclusivement pour le piano : préludes, nocturnes, mazurkas, valses, études, ballades. Sa musique combine une technique pianistique révolutionnaire avec une profondeur émotionnelle liée à son identité polonaise (il vit exilé à Paris). Son amour pour George Sand et sa mort à 39 ans de tuberculose contribuent à son aura romantique."},
{theme:"arts",diff:"facile",type:"q",q:"Quel artiste pop et rock britannique est surnommé le 'Thin White Duke' et 'Ziggy Stardust' ?",a:"David Bowie (1947-2016)",detail:"David Bowie invente des alter ego musicaux : Ziggy Stardust (1972, glam rock), Aladdin Sane, le Thin White Duke. Ses albums Station to Station, Heroes, Let's Dance définissent chacun une époque. Son œuvre explore l'identité, le genre et la transformation. Il meurt deux jours après la sortie de son dernier album Blackstar (8 janvier 2016)."},
{theme:"arts",diff:"moyen",type:"q",q:"Quel peintre flamand du XVe siècle, auteur du Retable de l'Agneau mystique, perfectionne la technique de la peinture à l'huile ?",a:"École de peinture des anciens Pays-Bas (Flandre) maîtrisant la peinture à l'huile — Jan van Eyck, Rogier van der Weyden, Hans Memling",detail:"Jan van Eyck perfectionne la peinture à l'huile (permettant glacis et détails infimes) et peint le Retable de l'Agneau mystique (1432, Gand) — l'un des chefs-d'œuvre de l'art occidental. Les Primitifs flamands représentent saints et donateurs avec un réalisme stupéfiant. Leur technique influencera profondément la peinture italienne de la Renaissance."},
{theme:"arts",diff:"moyen",type:"q",q:"Quel est l'apport de l'opéra de chambre contemporain au renouvellement du genre lyrique ?",a:"Des compositeurs comme Benjamin Britten (Le Tour d'écrou, 1954) ou John Adams (Nixon in China, 1987) ont réinventé l'opéra pour des effectifs réduits ou des sujets contemporains",detail:"Britten crée des opéras de chambre intimistes, accessibles financièrement, sur des sujets psychologiquement complexes (Le Tour d'écrou, 1954 ; Mort à Venise, 1973). John Adams compose des opéras sur des événements historiques récents (Nixon in China, 1987 ; The Death of Klinghoffer, 1991). Ces approches renouvellent un genre que beaucoup croyaient en déclin."},
{theme:"arts",diff:"moyen",type:"q",q:"Quelle contrainte religieuse majeure oriente l'art islamique vers l'arabesque et la calligraphie plutôt que vers la représentation humaine ?",a:"Art développé dans le monde islamique depuis le VIIe s., marqué par l'arabesque, la calligraphie et l'architecture — la représentation humaine et animale est évitée dans les espaces sacrés",detail:"L'art islamique développe des formes géométriques d'une complexité infinie (arabesques, moucharabieh), une calligraphie érigée en art majeur (les 99 noms d'Allah), une architecture de mosquée (minaret, coupole, cour à fontaine). La miniature persane (Iran, XIVe-XVIIe s.) et la céramique d'Iznik (Turquie) représentent des êtres vivants. Le Coran n'interdit pas formellement les représentations, mais la tradition théologique majoritaire les décourage dans les lieux sacrés."},
{theme:"arts",diff:"difficile",type:"q",q:"Qui fonde le mouvement Fluxus dans les années 1960, et quelle artiste d'origine japonaise en est la figure la plus connue du grand public ?",a:"Réseau international d'artistes (1960-70) fondé par George Maciunas — action art, happenings, objets-partitions — précurseur de l'art performance et de l'art conceptuel",detail:"Fluxus (latin : flux, changement) rassemble John Cage, Yoko Ono, Nam June Paik, Joseph Beuys. Ils organisent des performances absurdes (Fluxus Concerts), créent des 'event scores' (instructions poétiques pour des actions). Yoko Ono coupe les vêtements du public (Cut Piece, 1964). Nam June Paik invente le 'video art'. Leur refus de la marchandisation de l'art préfigure l'art conceptuel et la performance contemporaine."},
{theme:"arts",diff:"facile",type:"q",q:"Quel film de Stanley Kubrick est adapté d'un roman de Stanley Clarke et se déroule dans un futur dystopique ?",a:"Orange Mécanique (A Clockwork Orange, 1971), tiré du roman d'Anthony Burgess (1962)",detail:"Orange Mécanique plonge dans une Angleterre ultra-violente où le gouvernement tente de réhabiliter les criminels par conditionnement psychologique. Kubrick adapte aussi 2001 : l'Odyssée de l'espace (1968), Shining (1980) et Full Metal Jacket (1987). Son perfectionnisme obsessionnel (prise 137 d'une même scène avec Shelley Duvall) est légendaire."},
{theme:"arts",diff:"facile",type:"q",q:"Quel compositeur russe est l'auteur du Lac des cygnes, de La Belle au bois dormant et de Casse-Noisette ?",a:"Piotr Ilitch Tchaïkovski (1840-1893)",detail:"Tchaïkovski est le plus populaire des compositeurs russes. Ses 3 ballets (Lac des cygnes, 1877 ; Belle au bois dormant, 1890 ; Casse-Noisette, 1892) dominent le répertoire classique de ballet mondial. Ses symphonies (n°6 Pathétique) et concertos pour piano (n°1) sont aussi au cœur du répertoire. Il meurt 9 jours après la première de la Pathétique — dans des circonstances mystérieuses."},
{theme:"politique",diff:"facile",type:"q",q:"Combien d'États membres compte l'Union Européenne depuis le Brexit ?",a:"27 États membres",detail:"Le Royaume-Uni a quitté l'UE le 31 janvier 2020 après le référendum de 2016 (51,9 % pour le Leave). L'UE représente 450 millions d'habitants et le 3e PIB mondial."},
{theme:"politique",diff:"facile",type:"d",q:"Organisation internationale fondée en 1945 pour maintenir la paix mondiale",a:"L'ONU (Organisation des Nations Unies)",detail:"Créée à San Francisco le 26 juin 1945, elle compte 193 membres. Ses organes principaux incluent l'Assemblée générale et le Conseil de sécurité. Siège à New York."},
{theme:"politique",diff:"moyen",type:"q",q:"Quelle est la procédure de destitution du président américain par le Congrès ?",a:"L'impeachment",detail:"La Chambre vote la mise en accusation (majorité simple), le Sénat juge (2/3 requis pour destituer). Trump est le seul mis en accusation deux fois (2019, 2021), acquitté les deux fois."},
{theme:"politique",diff:"moyen",type:"d",q:"Doctrine américaine de 1823 s'opposant à toute intervention européenne en Amérique",a:"La doctrine Monroe",detail:"Toute ingérence européenne dans les Amériques est considérée comme un acte hostile. Elle justifiera l'interventionnisme américain en Amérique latine pendant plus d'un siècle."},
{theme:"politique",diff:"difficile",type:"q",q:"Quelle est la règle de la « double majorité » pour voter au Conseil de l'UE ?",a:"55 % des États représentant 65 % de la population de l'UE",detail:"Instituée par le traité de Lisbonne (2009), cette règle garantit la légitimité des États (majorité numérique) et la légitimité démocratique (représentation de la population)."},
{theme:"politique",diff:"difficile",type:"q",q:"Quel philosophe théorisa la séparation des pouvoirs, inspirant la Constitution de 1958 ?",a:"Montesquieu (De l'Esprit des lois, 1748)",detail:"Montesquieu distingue pouvoirs législatif, exécutif et judiciaire. Ce principe fonde aussi la Constitution américaine de 1787 — l'une des plus anciennes encore en vigueur."},
// NOUVELLES CARTES POLITIQUE (94 cartes pour atteindre 100)
{theme:"politique",diff:"facile",type:"q",q:"Quel est le rôle du Conseil de sécurité de l'ONU et qui en sont les membres permanents ?",a:"Maintenir la paix internationale — 5 membres permanents avec droit de veto : États-Unis, Russie, Chine, France, Royaume-Uni",detail:"Le Conseil de sécurité peut décider de sanctions, d'embargos ou d'interventions militaires. Le droit de veto des P5 signifie qu'un seul membre permanent peut bloquer toute résolution. Depuis la guerre froide, ce mécanisme paralyse souvent le Conseil. Des réformes pour élargir la représentation (Inde, Brésil, Allemagne, Japon) sont régulièrement discutées sans aboutir."},
{theme:"politique",diff:"facile",type:"q",q:"Quelle est la différence entre un régime présidentiel et un régime parlementaire ?",a:"Présidentiel : le chef de l'État (élu directement) dirige le gouvernement et ne dépend pas du parlement (ex. États-Unis) — Parlementaire : le gouvernement émane du parlement et lui est responsable (ex. Royaume-Uni)",detail:"Dans un régime présidentiel, la séparation des pouvoirs est rigide : le président ne peut dissoudre le Congrès, le Congrès ne peut renverser le président (sauf impeachment). En régime parlementaire, le Premier ministre peut être renversé par un vote de défiance. La France est un régime semi-présidentiel : le président élu au suffrage universel coexiste avec un gouvernement responsable devant l'Assemblée."},
{theme:"politique",diff:"facile",type:"q",q:"Quels cinq États membres permanents du Conseil de sécurité de l'ONU détiennent le droit de veto ?",a:"Pouvoir d'un membre permanent de bloquer toute résolution par un vote négatif, même si tous les autres membres approuvent",detail:"Le droit de veto, prévu à l'article 27 de la Charte de l'ONU, a été utilisé plus de 300 fois depuis 1945. La Russie l'a utilisé le plus souvent depuis la fin de la guerre froide (notamment sur la Syrie, l'Ukraine). Les États-Unis l'utilisent régulièrement pour protéger Israël. Ce mécanisme reflète l'équilibre des puissances de 1945, très différent du monde actuel."},
{theme:"politique",diff:"facile",type:"q",q:"Quel mécanisme de démocratie directe permet aux citoyens suisses de proposer une loi par pétition ?",a:"Démocratie directe : les citoyens décident eux-mêmes des lois (référendum, initiative populaire) — Démocratie représentative : ils élisent des représentants qui décident à leur place",detail:"La démocratie directe athénienne (Ve s. av. J.-C.) n'est possible que dans de petites cités. La Suisse pratique la démocratie semi-directe : référendums fréquents, initiative populaire pour modifier la Constitution. La démocratie représentative (Locke, Rousseau, Montesquieu) est le modèle dominant depuis les révolutions américaine et française. Les nouvelles technologies relancent le débat sur la participation citoyenne directe."},
{theme:"politique",diff:"facile",type:"q",q:"En quelle année l'OTAN a-t-elle été fondée, et quel événement de 1949 a motivé sa création ?",a:"Organisation du Traité de l'Atlantique Nord — alliance militaire défensive fondée en 1949 entre États-Unis, Canada et démocraties d'Europe occidentale",detail:"L'OTAN est fondée pour contenir l'expansion soviétique. L'article 5 stipule qu'une attaque contre un membre est une attaque contre tous. Après la chute du mur (1989), l'OTAN s'élargit vers l'Est (ex-pays communistes). En 2022, l'invasion russe de l'Ukraine relance son rôle et pousse la Finlande et la Suède à rejoindre l'alliance. Elle compte 32 membres en 2024."},
{theme:"politique",diff:"facile",type:"q",q:"Quel est le rôle du Parlement européen et comment ses membres sont-ils élus ?",a:"Seule institution de l'UE élue au suffrage universel direct — vote les lois européennes avec le Conseil de l'UE, contrôle la Commission",detail:"Les 720 eurodéputés sont élus tous les 5 ans dans chaque État membre selon un système proportionnel. Le Parlement siège à Strasbourg (sessions plénières) et Bruxelles (commissions). Il a gagné des pouvoirs importants avec les traités successifs (Maastricht, Lisbonne). Il peut renverser la Commission (censure, jamais utilisée à l'état actuel) et investit son président."},
{theme:"politique",diff:"facile",type:"q",q:"Qu'est-ce qu'un État fédéral et comment diffère-t-il d'un État unitaire ?",a:"État fédéral : deux niveaux de gouvernement souverain (fédéral + fédérés) — État unitaire : le pouvoir central délègue des compétences aux collectivités locales sans les leur céder",detail:"États-Unis, Allemagne, Suisse, Australie sont fédéraux. France, Japon, Suède sont unitaires. L'Espagne est un quasi-fédéralisme (communautés autonomes). Le fédéralisme préserve les identités régionales mais peut créer des tensions (Catalogne, Québec, Écosse). La Constitution américaine (1787) est le premier grand modèle fédéral moderne."},
{theme:"politique",diff:"facile",type:"q",q:"En quelle année les femmes françaises ont-elles obtenu le droit de vote ?",a:"Droit de vote accordé à tous les citoyens adultes sans distinction — les hommes en France en 1848, les femmes en 1944",detail:"La Révolution française crée le suffrage censitaire (réservé aux propriétaires). La IIe République (1848) instaure le suffrage universel masculin. Les femmes françaises obtiennent le droit de vote par ordonnance du gouvernement provisoire (21 avril 1944) et l'exercent pour la première fois aux municipales d'avril 1945. La Suisse est l'un des derniers pays à accorder le vote aux femmes (1971 au niveau fédéral)."},
{theme:"politique",diff:"facile",type:"q",q:"Quelle institution française est chargée de vérifier la conformité des lois à la Constitution ?",a:"Loi fondamentale qui définit l'organisation des pouvoirs, les droits fondamentaux et la hiérarchie des normes — les autres lois ne peuvent la contredire",detail:"La Constitution française de 1958 (Ve République) est semi-présidentielle. Le Conseil constitutionnel vérifie la conformité des lois à la Constitution. Aux États-Unis, la Cour suprême joue ce rôle depuis Marbury v. Madison (1803). Certaines constitutions sont rigides (difficilement modifiables) comme aux États-Unis, d'autres plus souples. La Constitution américaine (1787) est la plus ancienne encore en vigueur."},
{theme:"politique",diff:"facile",type:"q",q:"Quelle est la différence entre la gauche et la droite en politique ?",a:"Distinction née de la Révolution française (1789) : les partisans du changement siègent à gauche de l'Assemblée, les défenseurs de l'ordre établi à droite",detail:"Historiquement : gauche = égalité, réforme, État redistributeur, laïcité ; droite = ordre, tradition, liberté économique, rôle de la religion. Ces distinctions se brouillent au XXIe s. : le clivage autoritarisme/libéralisme culturel, ou mondialisation/souverainisme, croise l'axe gauche-droite. Le terme reste utile comme boussole mais insuffisant pour cartographier la complexité politique contemporaine."},
{theme:"politique",diff:"facile",type:"q",q:"Qui a théorisé la notion de populisme en opposant « le peuple pur » à « l'élite corrompue » ?",a:"Discours opposant 'le peuple pur' à une 'élite corrompue' — peut être de gauche (Mélenchon, Chávez) ou de droite (Trump, Orbán, Le Pen)",detail:"Le politologue Cas Mudde définit le populisme comme une 'idéologie mince' qui peut s'accrocher à d'autres idéologies. Il n'est pas intrinsèquement antidémocratique mais peut le devenir (Orbán en Hongrie). Le populisme exprime souvent une crise de représentation réelle. Il est difficile à distinguer de la simple démagogie ou de la critique légitime des élites."},
{theme:"politique",diff:"moyen",type:"q",q:"Dans quel ouvrage de 1762 Rousseau développe-t-il sa théorie du contrat social ?",a:"Accord fictif par lequel les individus renoncent à leur liberté naturelle pour vivre en société soumise à la volonté générale — fondement de la souveraineté populaire",detail:"Rousseau (Du contrat social, 1762) distingue la volonté de tous (somme des intérêts particuliers) et la volonté générale (intérêt commun). La souveraineté appartient au peuple et est inaliénable. Cette théorie fonde la légitimité des démocraties républicaines. Locke (contrat pour protéger les droits naturels) et Hobbes (contrat pour éviter la guerre de tous contre tous) proposent des versions différentes."},
{theme:"politique",diff:"moyen",type:"q",q:"Quel philosophe du XVIIe siècle est considéré comme le père du libéralisme politique avec ses Deux Traités du gouvernement civil ?",a:"Libéralisme politique : primauté des libertés individuelles, État de droit, séparation des pouvoirs (Locke, Mill) — Libéralisme économique : liberté du marché, propriété privée, minimalisme étatique (Smith, Hayek)",detail:"Le libéralisme politique (né au XVIIe s.) défend les droits naturels, la tolérance religieuse et le gouvernement limité. Le libéralisme économique (XVIIIe-XIXe s.) prône le libre-échange et la main invisible du marché. Au XXe s., le néolibéralisme (Hayek, Friedman, école de Chicago) influence Reagan et Thatcher. La tension entre liberté individuelle et justice sociale divise le libéralisme en libéralisme classique et libéralisme social (Rawls)."},
{theme:"politique",diff:"moyen",type:"q",q:"En quelle année Karl Marx publie-t-il Le Capital, et dans quelle ville vivait-il alors en exil ?",a:"Théorie de Karl Marx (1818-1883) analysant le capitalisme comme exploitation de la classe ouvrière (prolétariat) par les propriétaires des moyens de production (bourgeoisie)",detail:"Marx prédit que la lutte des classes mènera à une révolution prolétarienne et à une société sans classes (communisme). Le Capital (1867) analyse la plus-value. Le Manifeste communiste (Marx & Engels, 1848) appelle à l'action révolutionnaire. Les révolutions russe (1917, Lénine) et chinoise (1949, Mao) se réclament du marxisme. Ses variantes (léninisme, trotskisme, maoïsme, marxisme culturel) ont profondément marqué le siècle."},
{theme:"politique",diff:"moyen",type:"q",q:"Quel rapport britannique de 1942 pose les bases de l'État-providence moderne en Europe ?",a:"Système dans lequel l'État assure la protection sociale des citoyens (santé, retraite, chômage, famille) — développé principalement après 1945 en Europe occidentale",detail:"Le rapport Beveridge (1942, Royaume-Uni) pose les bases : couverture universelle contre les grands risques (maladie, chômage, vieillesse, pauvreté). La Sécurité sociale française est créée en 1945. Les États nordiques (Suède, Danemark) développent les États-providence les plus généreux. Le débat sur son financement (déficit, vieillissement) et son avenir est central en politique européenne depuis les années 1980."},
{theme:"politique",diff:"moyen",type:"q",q:"Quelle distinction Ernest Renan établit-il en 1882 entre la conception française et allemande de la nation ?",a:"Idéologie faisant de la nation la communauté politique de référence — peut être civique (appartenance volontaire) ou ethnique (appartenance par la naissance et la culture)",detail:"Le nationalisme civique (Renan : 'un plébiscite de tous les jours') définit la nation par l'adhésion aux valeurs communes. Le nationalisme ethnique (Fichte, Herder) la définit par la langue et la culture. Au XIXe s., il porte les mouvements d'unification (Italie, Allemagne). Au XXe s., il génère des guerres mondiales et des génocides. Le nationalisme contemporain se décline en souverainisme (anti-UE) et en identitarisme culturel."},
{theme:"politique",diff:"moyen",type:"q",q:"En quelle année la guerre froide prend-elle officiellement fin, et quel événement en est le symbole le plus marquant ?",a:"Affrontement indirect (1947-1991) entre États-Unis (capitalisme libéral) et URSS (communisme) — sans conflit direct mais par guerres par procuration, course aux armements et compétition idéologique",detail:"La guerre froide commence avec la doctrine Truman (1947) et le plan Marshall. Elle se structure autour de l'OTAN (1949) et du Pacte de Varsovie (1955). Crises majeures : Berlin (1948-49, 1961), Corée (1950-53), Cuba (1962), Vietnam (1955-75). La chute du mur de Berlin (9 novembre 1989) et la dissolution de l'URSS (25 décembre 1991) y mettent fin. Un 'nouvelle guerre froide' avec la Chine est souvent évoquée depuis les années 2010."},
{theme:"politique",diff:"moyen",type:"q",q:"En quelle année la quasi-totalité des colonies africaines accèdent-elles à l'indépendance, faisant de cette année l'« année de l'Afrique » ?",a:"Processus d'accession à l'indépendance des colonies européennes — principalement en Asie (1945-1955) et en Afrique (1955-1975)",detail:"La décolonisation est accélérée par la Seconde Guerre mondiale (affaiblissement des métropoles, charte de l'ONU sur l'autodétermination). L'Inde et le Pakistan indépendants en 1947, la plupart des colonies africaines entre 1957 (Ghana) et 1975. La France mène deux guerres coloniales majeures : Indochine (1946-1954) et Algérie (1954-1962). Les héritages de la colonisation (frontières artificielles, dépendances économiques) structurent encore les relations Nord-Sud."},
{theme:"politique",diff:"moyen",type:"q",q:"Dans quelle ville siège la Cour européenne des droits de l'homme, créée par le Conseil de l'Europe ?",a:"Conseil de l'Europe (1949, 46 membres) : organisation pan-européenne des droits de l'homme, créateur de la Cour européenne des droits de l'homme — distinct du Conseil de l'UE (institution UE regroupant les ministres des États membres)",detail:"Le Conseil de l'Europe (siège à Strasbourg) surveille le respect des droits humains via la Convention européenne des droits de l'homme (1950) et la CEDH. Il comprend des pays non-membres de l'UE (Turquie, Ukraine, ex-URSS). La Russie en a été exclue en 2022 après l'invasion de l'Ukraine. À ne pas confondre avec le Conseil de l'UE (réunion des ministres selon les thèmes) ni avec le Conseil européen (réunion des chefs d'État)."},
{theme:"politique",diff:"moyen",type:"q",q:"Quel tribunal international, basé à La Haye, tranche les différends entre États membres de l'ONU ?",a:"Ensemble de règles régissant les relations entre États — sa mise en œuvre dépend du consentement des États et des mécanismes d'enforcement, souvent limités",detail:"Le droit international repose sur les traités (conventions volontaires), la coutume internationale et les principes généraux. La Cour internationale de Justice (CIJ) tranche les différends entre États mais ne peut les forcer à s'exécuter. La Cour pénale internationale (CPI, 2002) juge les individus pour crimes contre l'humanité et génocides. Les grandes puissances (États-Unis, Chine, Russie) ne reconnaissent pas toujours la CPI."},
{theme:"politique",diff:"moyen",type:"q",q:"Qui a théorisé le concept de soft power, et dans quel ouvrage de 1990 ?",a:"Joseph Nye (1990) — capacité d'un pays à influencer le comportement d'autres pays par l'attraction culturelle, idéologique et diplomatique plutôt que par la force (hard power)",detail:"Le soft power américain s'appuie sur Hollywood, les universités, la langue anglaise, les ONG, les valeurs libérales. La Chine développe son soft power via les Instituts Confucius, les BRICS et les routes de la soie. La France mise sur la francophonie et la gastronomie. Nye oppose hard power (militaire/économique), soft power (attractivité) et smart power (combinaison des deux)."},
{theme:"politique",diff:"moyen",type:"q",q:"En quelle année de Gaulle instaure-t-il la Ve République, et à quelle occasion ?",a:"Régime semi-présidentiel instauré par de Gaulle en 1958 — président élu au suffrage universel direct (depuis 1962), fort pouvoir exécutif",detail:"De Gaulle crée la Ve République pour mettre fin à l'instabilité de la IVe (25 gouvernements en 12 ans). Le président nomme le Premier ministre, peut dissoudre l'Assemblée, dispose de l'article 49-3 (passer une loi sans vote) et de l'article 16 (pleins pouvoirs en cas de crise). La cohabitation (président et PM de partis opposés) a eu lieu trois fois (1986, 1993, 1997)."},
{theme:"politique",diff:"moyen",type:"q",q:"Quel géographe britannique théorise en 1904 le concept de Heartland, pierre angulaire de la géopolitique classique ?",a:"Analyse des relations internationales en tenant compte de la géographie, des ressources et de la puissance — Mackinder (Heartland), Mahan (puissance maritime), Brzezinski (échiquier eurasiatique)",detail:"Halford Mackinder (1904) théorise que la puissance continentale eurasiatique (Heartland) dominera le monde. Alfred Mahan valorise la puissance navale. Karl Haushofer développe la Geopolitik allemande (pervertie par les nazis). Zbigniew Brzezinski (Le Grand Échiquier, 1997) analyse la domination américaine en Eurasie. La géopolitique connaît un regain depuis les années 2000 avec les revendications de la Russie et de la Chine."},
