<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Culture Générale · Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; }
  :root { --bg:#0e1117; --surface:#161b25; --surface2:#1c2333; --border:rgba(255,255,255,0.06); --text:#e8eaf0; --muted:#5a6880; --muted2:#3a4558; --accent:#f0c040; }
  html { height:-webkit-fill-available; overflow:hidden; }
  body { min-height:100vh; min-height:-webkit-fill-available; display:flex; align-items:center; justify-content:center; font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; position:fixed; width:100%; height:100%; }
  .bg-blob { position:fixed; border-radius:50%; filter:blur(90px); pointer-events:none; z-index:0; opacity:0.06; }
  .blob1 { width:400px; height:400px; background:#c0392b; top:-120px; left:-120px; }
  .blob2 { width:300px; height:300px; background:#2980b9; bottom:-80px; right:-80px; }
  .blob3 { width:220px; height:220px; background:#8e44ad; top:40%; left:60%; }

  .screen { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:1; transition:opacity 0.3s,transform 0.3s; }
  .screen.hidden { opacity:0; pointer-events:none; transform:scale(0.97); }

  /* CONFIG */
  .config-wrap { max-width:460px; width:93%; display:flex; flex-direction:column; align-items:center; gap:0.5rem; }
  .config-title { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:400; color:var(--text); margin-bottom:0.1rem; }
  .config-subtitle { font-size:0.68rem; color:var(--muted); margin-bottom:0.3rem; }
  .config-section-label { font-size:0.58rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted2); align-self:flex-start; margin-bottom:-0.1rem; }

  .theme-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.35rem; width:100%; }
  .theme-btn { padding:11px 8px; border:none; border-radius:14px; font-size:0.68rem; font-weight:700; cursor:pointer; touch-action:manipulation; background:rgba(255,255,255,0.05); color:var(--muted2); transition:background 0.15s,color 0.15s; line-height:1.3; }
  .btn-focus-de { grid-column: span 2; }
  .theme-btn.active[data-theme="histoire"]    { background:linear-gradient(135deg,#c0392b,#e74c3c); color:#fff; }
  .theme-btn.active[data-theme="geo"]         { background:linear-gradient(135deg,#1a7a4a,#27ae60); color:#fff; }
  .theme-btn.active[data-theme="arts"]        { background:linear-gradient(135deg,#7d3c98,#9b59b6); color:#fff; }
  .theme-btn.active[data-theme="sport"]       { background:linear-gradient(135deg,#d35400,#e67e22); color:#fff; }
  .theme-btn.active[data-theme="politique"]   { background:linear-gradient(135deg,#1a5276,#2980b9); color:#fff; }
  .theme-btn.active[data-theme="philo"]       { background:linear-gradient(135deg,#1a3a5c,#2e86c1); color:#fff; }
  .theme-btn.active[data-theme="sciences"]    { background:linear-gradient(135deg,#0e6655,#1abc9c); color:#fff; }
  .theme-btn.active[data-theme="litterature"] { background:linear-gradient(135deg,#6e2f8a,#a569bd); color:#fff; }
  .theme-btn.active[data-theme="economie"]    { background:linear-gradient(135deg,#1e5f74,#2e86c1); color:#fff; }
  .theme-btn.active[data-theme="popculture"]  { background:linear-gradient(135deg,#c0392b,#e91e8c); color:#fff; }
  .theme-btn.active[data-theme="nature"]      { background:linear-gradient(135deg,#1d6a2e,#52be80); color:#fff; }
  .theme-btn.active[data-theme="gastro"]      { background:linear-gradient(135deg,#7d4a00,#ca8a04); color:#fff; }
  .theme-btn.active[data-theme="mytho"]       { background:linear-gradient(135deg,#4a235a,#8e44ad); color:#fff; }

  .btn-focus-de { grid-column:span 2; padding:11px 8px; border:none; border-radius:14px; font-size:0.68rem; font-weight:700; cursor:pointer; touch-action:manipulation; background:rgba(255,255,255,0.05); color:var(--muted2); transition:background 0.2s,color 0.2s,box-shadow 0.2s; letter-spacing:0.02em; line-height:1.3; }
  .btn-focus-de.active { background:linear-gradient(135deg,#1a3a5c,#c0392b); color:#fff; box-shadow:0 3px 15px rgba(192,57,43,0.3); }

  .select-all-row { display:flex; gap:0.35rem; width:100%; }
  .btn-select-all,.btn-select-none { flex:1; padding:8px; border:none; border-radius:12px; font-size:0.62rem; font-weight:700; cursor:pointer; touch-action:manipulation; background:rgba(255,255,255,0.06); color:var(--muted); }

  .diff-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:0.35rem; width:100%; }
  .diff-btn { padding:10px 0; border:none; border-radius:14px; font-size:0.65rem; font-weight:700; cursor:pointer; touch-action:manipulation; background:rgba(255,255,255,0.05); color:var(--muted2); transition:background 0.15s,color 0.15s; }
  .diff-btn.active { background:linear-gradient(135deg,#2c3e60,#4a6080); color:#ccd; }

  .card-count { font-size:0.6rem; color:var(--muted2); margin-top:-0.15rem; }
  .btn-start { width:100%; padding:14px; border:none; border-radius:16px; font-size:0.9rem; font-weight:700; cursor:pointer; touch-action:manipulation; font-family:'DM Sans',sans-serif; background:linear-gradient(135deg,#c0392b,#e74c3c); color:#fff; letter-spacing:0.03em; box-shadow:0 4px 20px rgba(192,57,43,0.35); margin-top:0.1rem; }
  .btn-start:active { transform:scale(0.98); opacity:0.9; }
  .btn-start:disabled { opacity:0.35; cursor:default; }

  /* GAME */
  .game-wrap { max-width:460px; width:93%; display:flex; flex-direction:column; align-items:center; }
  .game-topbar { display:flex; align-items:center; justify-content:space-between; width:100%; margin-bottom:0.25rem; }
  .game-title { font-family:'Playfair Display',serif; font-size:0.85rem; font-weight:400; color:var(--muted); }
  .btn-settings { background:none; border:none; cursor:pointer; font-size:1rem; color:var(--muted2); padding:4px 6px; border-radius:8px; touch-action:manipulation; }

  .card-wrapper { width:100%; min-height:295px; border-radius:22px; background:linear-gradient(145deg,var(--surface),var(--surface2)); box-shadow:0 12px 48px rgba(0,0,0,0.7),0 0 0 1.5px var(--border); margin-bottom:0.28rem; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; overflow:hidden; padding:1.4rem 1.5rem 1.3rem; }
  .card-accent-bar { position:absolute; top:0; left:0; right:0; height:3px; border-radius:22px 22px 0 0; transition:background 0.4s; }
  .q-text { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; line-height:1.45; color:var(--text); text-align:center; }
  .answer-area { display:none; flex-direction:column; align-items:center; gap:0.3rem; width:100%; margin-top:0.35rem; }
  .answer-area.visible { display:flex; }
  .answer-sep { width:40px; height:2px; background:linear-gradient(90deg,transparent,var(--muted2),transparent); border-radius:2px; }
  .answer-text { font-family:'Playfair Display',serif; font-size:1.35rem; font-weight:700; color:var(--accent); text-align:center; line-height:1.3; text-shadow:0 2px 16px rgba(240,192,64,0.25); }
  .answer-detail { font-size:0.76rem; color:#8a9baf; font-style:italic; text-align:center; line-height:1.55; max-width:93%; }
  .progress-bar-bg { position:absolute; bottom:0; left:0; right:0; height:3px; background:rgba(255,255,255,0.04); }
  .progress-bar-fill { height:100%; background:linear-gradient(90deg,#c0392b,var(--accent)); transition:width 0.4s ease; border-radius:0 2px 2px 0; }

  .buttons-zone { height:3.1rem; display:flex; align-items:center; justify-content:center; margin-bottom:0.1rem; position:relative; }
  .btns { display:flex; gap:0.4rem; justify-content:center; position:absolute; }
  .btns.hidden { visibility:hidden; pointer-events:none; }
  .gbtn { padding:10px 14px; border:none; border-radius:14px; font-size:0.75rem; font-weight:700; cursor:pointer; touch-action:manipulation; font-family:'DM Sans',sans-serif; }
  .gbtn:active:not(:disabled) { transform:scale(0.95); opacity:0.85; }
  .btn-reveal   { background:linear-gradient(135deg,#2c3e50,#3d5166); color:#aac; min-width:175px; border:1px solid rgba(255,255,255,0.08); }
  .btn-known    { background:linear-gradient(135deg,#43e97b,#38f9d7); color:#0a1a12; flex:1; }
  .btn-review3  { background:linear-gradient(135deg,#fa709a,#fee140); color:#1a1a2e; flex:1; }
  .btn-review5  { background:linear-gradient(135deg,#f7971e,#ffd200); color:#1a1a2e; flex:1; }
  .btn-review20 { background:linear-gradient(135deg,#eb3349,#f45c43); color:white; flex:1; }
  .action-row { display:flex; gap:0.28rem; width:100%; }
  .stats { font-size:0.57rem; color:var(--muted2); line-height:1.9; }
  .stats strong { color:var(--muted); }

  .done-screen { display:none; text-align:center; padding:1rem; }
  .done-screen h2 { font-family:'Playfair Display',serif; font-size:1.8rem; margin-bottom:0.8rem; font-weight:400; }
  .done-screen p { color:#6a8090; margin-bottom:1.4rem; line-height:1.6; font-size:0.85rem; }
  .done-icon { font-size:2.6rem; margin-bottom:0.4rem; }
  .done-btns { display:flex; gap:0.5rem; justify-content:center; }

  @media (max-width:400px) {
    .theme-btn { font-size:0.6rem; padding:10px 5px; }
    .q-text { font-size:1.05rem; }
    .gbtn { padding:9px 8px; font-size:0.7rem; }
  }
</style>
</head>
<body>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<!-- CONFIG SCREEN -->
<div class="screen" id="screenConfig">
  <div class="config-wrap">
    <div class="config-title">📚 Culture Générale</div>
    <div class="config-subtitle">Choisis tes thèmes et ton niveau</div>

    <div class="config-section-label">Thèmes</div>
    <div class="theme-grid">
      <button class="theme-btn active" data-theme="histoire"    onclick="toggleTheme('histoire')">🏛 Histoire</button>
      <button class="theme-btn active" data-theme="geo"         onclick="toggleTheme('geo')">🌍 Géographie</button>
      <button class="theme-btn active" data-theme="arts"        onclick="toggleTheme('arts')">🎨 Arts</button>
      <button class="theme-btn active" data-theme="sport"       onclick="toggleTheme('sport')">⚽ Sport</button>
      <button class="theme-btn active" data-theme="politique"   onclick="toggleTheme('politique')">⚖️ Politique</button>
      <button class="theme-btn active" data-theme="philo"       onclick="toggleTheme('philo')">🧠 Philosophie</button>
      <button class="theme-btn active" data-theme="sciences"    onclick="toggleTheme('sciences')">🔬 Hist. Sciences</button>
      <button class="theme-btn active" data-theme="litterature" onclick="toggleTheme('litterature')">📖 Littérature</button>
      <button class="theme-btn active" data-theme="economie"    onclick="toggleTheme('economie')">📈 Économie</button>
      <button class="theme-btn active" data-theme="popculture"  onclick="toggleTheme('popculture')">🎬 Pop culture</button>
      <button class="theme-btn active" data-theme="nature"      onclick="toggleTheme('nature')">🌿 Nature</button>
      <button class="theme-btn active" data-theme="gastro"      onclick="toggleTheme('gastro')">🍽 Gastronomie</button>
      <button class="theme-btn active" data-theme="mytho"       onclick="toggleTheme('mytho')">⚗️ Mythologie</button>
      <button class="btn-focus-de theme-btn" id="btnFocusDe" onclick="toggleFocusDe()">🇩🇪 Focus Allemagne</button>
    </div>

    <div class="select-all-row">
      <button class="btn-select-all"  onclick="selectAll()">✓ Tout sélectionner</button>
      <button class="btn-select-none" onclick="selectNone()">✕ Tout désélectionner</button>
    </div>

    <div class="config-section-label" style="margin-top:0.25rem">Difficulté</div>
    <div class="diff-grid">
      <button class="diff-btn active" data-diff="all"       onclick="setDiff('all')">Tous</button>
      <button class="diff-btn"        data-diff="facile"    onclick="setDiff('facile')">Facile</button>
      <button class="diff-btn"        data-diff="moyen"     onclick="setDiff('moyen')">Moyen</button>
      <button class="diff-btn"        data-diff="difficile" onclick="setDiff('difficile')">Difficile</button>
    </div>

    <div class="card-count" id="cardCount"></div>
    <button class="btn-start" id="btnStart" onclick="startGame()">Commencer →</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div class="screen hidden" id="screenGame">
  <div class="game-wrap">
    <div class="game-topbar">
      <div class="game-title">📚 Culture Générale</div>
      <button class="btn-settings" onclick="goToConfig()">⚙️</button>
    </div>

    <div id="gameArea">
      <div class="card-wrapper">
        <div class="card-accent-bar" id="cardAccentBar"></div>
        <div class="q-text" id="qText"></div>
        <div class="answer-area" id="answerArea">
          <div class="answer-sep"></div>
          <div class="answer-text"   id="answerText"></div>
          <div class="answer-detail" id="answerDetail"></div>
        </div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      </div>

      <div class="buttons-zone">
        <div class="btns" id="revealButtons">
          <button class="gbtn btn-reveal" id="revealBtn">Voir la réponse</button>
        </div>
        <div class="btns hidden" id="actionButtons">
          <div class="action-row">
            <button class="gbtn btn-known"    id="knownBtn">✓ Connu</button>
            <button class="gbtn btn-review3"  id="reviewBtn3">+3</button>
            <button class="gbtn btn-review5"  id="reviewBtn5">+5</button>
            <button class="gbtn btn-review20" id="reviewBtn20">+20</button>
          </div>
        </div>
      </div>
      <div class="stats" id="stats"></div>
    </div>

    <div class="done-screen" id="doneScreen">
      <div class="done-icon">🎉</div>
      <h2>Bravo !</h2>
      <p>Tu as révisé toutes les cartes sélectionnées.<br>Continue à t'entraîner !</p>
      <div class="done-btns">
        <button class="gbtn btn-reveal" id="restartBtn">🔄 Recommencer</button>
        <button class="gbtn btn-reveal" onclick="goToConfig()">⚙️ Reconfigurer</button>
      </div>
    </div>
  </div>
</div>

<script>
var THEME_COLORS = {
  histoire:   ['#c0392b','#e74c3c'], geo:         ['#1a7a4a','#27ae60'],
  arts:       ['#7d3c98','#9b59b6'], sport:        ['#d35400','#e67e22'],
  politique:  ['#1a5276','#2980b9'], philo:        ['#1a3a5c','#2e86c1'],
  sciences:   ['#0e6655','#1abc9c'], litterature:  ['#6e2f8a','#a569bd'],
  economie:   ['#1e5f74','#2e86c1'], popculture:   ['#c0392b','#e91e8c'],
  nature:     ['#1d6a2e','#52be80'], gastro:       ['#7d4a00','#ca8a04'],
  mytho:      ['#4a235a','#8e44ad']
};
var ALL_THEMES = ['histoire','geo','arts','sport','politique','philo','sciences','litterature','economie','popculture','nature','gastro','mytho'];
var activeThemes = {};
ALL_THEMES.forEach(function(t) { activeThemes[t] = true; });
var activeDiff = 'all';
var focusDeActive = false;
var allCards=[], available=[], reviewQueue=[], known=[], turn=0, current=null, revealed=false;

var CARDS=[
{theme:"geo",diff:"facile",type:"q",q:"Quelle est la capitale de l'Australie ?",a:"Canberra",detail:"Souvent confondue avec Sydney ou Melbourne, Canberra fut choisie en 1908 comme compromis entre ces deux rivales. Son nom vient d'un mot aborigène signifiant « lieu de rencontre »."},
{theme:"geo",diff:"facile",type:"d",q:"Plus grand pays du monde par superficie",a:"La Russie",detail:"17,1 millions de km² — soit 11 % des terres émergées. La Russie s'étend sur 11 fuseaux horaires, de l'enclave de Kaliningrad (mer Baltique) jusqu'au détroit de Béring."},
{theme:"geo",diff:"facile",type:"q",q:"Quel est le plus long fleuve du monde ?",a:"Le Nil ou l'Amazone selon les mesures",detail:"Le Nil (6 650 km) et l'Amazone (6 400 km) se disputent le titre selon la méthode de mesure. L'Amazone transporte à lui seul 20 % de l'eau douce déversée dans les océans."},
{theme:"geo",diff:"moyen",type:"q",q:"Quel pays est traversé à la fois par l'équateur et le tropique du Capricorne ?",a:"Le Brésil",detail:"Seul pays au monde traversé par ces deux parallèles. L'équateur passe par l'Amazonie au nord, le tropique du Capricorne par São Paulo au sud. 5e plus grand pays du monde."},
{theme:"geo",diff:"moyen",type:"d",q:"Détroit de 14 km reliant l'Atlantique à la Méditerranée",a:"Détroit de Gibraltar",detail:"Il sépare l'Espagne du Maroc. Sous sa surface circulent deux courants opposés : eau atlantique froide vers la Méditerranée en surface, eau méditerranéenne chaude vers l'Atlantique en profondeur."},
{theme:"geo",diff:"moyen",type:"q",q:"Dans quel pays se trouve le lac Baïkal, le plus profond du monde ?",a:"Russie (Sibérie) — 1 637 m de profondeur",detail:"Le plus ancien lac du monde (25 millions d'années) contient à lui seul 20 % des réserves mondiales d'eau douce liquide — autant que l'ensemble des Grands Lacs nord-américains réunis."},
{theme:"geo",diff:"difficile",type:"q",q:"Quel pays possède la plus grande zone économique exclusive (ZEE) au monde ?",a:"Les États-Unis",detail:"La ZEE américaine dépasse 11 millions de km² grâce à ses territoires éparpillés. La France arrive 2e avec ~11 millions de km² également, grâce à ses territoires d'outre-mer sur tous les océans."},
{theme:"geo",diff:"difficile",type:"d",q:"Point le plus profond des océans, dans la fosse des Mariannes",a:"Challenger Deep (~10 935 m)",detail:"Situé dans l'océan Pacifique occidental. La pression y atteint 1 100 fois la pression atmosphérique. James Cameron l'a atteint en solitaire en 2012 dans un submersible spécialement conçu."},
{theme:"arts",diff:"facile",type:"q",q:"Qui a peint la Joconde ?",a:"Léonard de Vinci",detail:"Peinte entre 1503 et 1519, elle représenterait Lisa Gherardini. Le sourire énigmatique s'explique par la technique du sfumato — contours fondus dans le flou — inventée par Léonard lui-même."},
{theme:"arts",diff:"moyen",type:"d",q:"Courant pictural du XIXe s. né en France, privilégiant lumière et sensation sur dessin académique",a:"L'Impressionnisme",detail:"Le nom naît d'un sarcasme sur le tableau de Monet « Impression, soleil levant » (1872). Monet, Renoir, Degas, Pissarro révolutionnent la peinture en travaillant en plein air, par touches rapides."},
{theme:"arts",diff:"moyen",type:"q",q:"Quel courant artistique Picasso fonda-t-il avec Braque vers 1907 ?",a:"Le Cubisme",detail:"Inspiré par Cézanne et l'art africain, le cubisme décompose les formes en facettes vues sous plusieurs angles. Les Demoiselles d'Avignon (1907) en est l'œuvre fondatrice."},
{theme:"arts",diff:"facile",type:"q",q:"Qui a composé la 9e Symphonie avec l'Ode à la joie ?",a:"Ludwig van Beethoven",detail:"Composée en 1824, alors qu'il était totalement sourd. À la première, il fallut lui faire signe que le public applaudissait. L'Ode à la joie est devenue l'hymne de l'Union européenne en 1985."},
{theme:"arts",diff:"difficile",type:"d",q:"Technique baroque de contraste dramatique entre ombre intense et lumière vive",a:"Le clair-obscur (chiaroscuro)",detail:"Théorisé par Léonard, porté au sommet par Le Caravage (1571-1610) qui plonge ses personnages dans l'obscurité trouée de lumière rasante. Rembrandt s'en empare pour une profondeur psychologique incomparable."},
{theme:"arts",diff:"difficile",type:"q",q:"Quel compositeur romantique créa le « drame musical » et la Tétralogie Der Ring des Nibelungen ?",a:"Richard Wagner",detail:"L'Anneau du Nibelung (4 opéras, ~15 heures) fut composé de 1848 à 1874. Wagner inventa le leitmotiv et fit construire à Bayreuth un opéra dédié à ses œuvres, inauguré en 1876."},

// NOUVELLES CARTES ARTS (94 cartes pour atteindre 100)
{theme:"arts",diff:"difficile",type:"q",q:"Quelle technique picturale de la Renaissance consiste à appliquer des couches de peinture translucides superposées pour créer de la profondeur lumineuse ?",a:"La glacis (ou technique des glacis)",detail:"Les glacis (du néerlandais 'schilderen' via Vinci et les Flamands) consistent à poser de fines couches de peinture transparente les unes sur les autres. Jan van Eyck, Rembrandt et Vermeer en font un usage magistral. La couleur finale résulte de la superposition optique des couches, créant une luminosité impossible à obtenir en une seule application."},
{theme:"arts",diff:"facile",type:"q",q:"Quel peintre espagnol est l'auteur de Guernica (1937) ?",a:"Pablo Picasso",detail:"Guernica, peinte en réaction au bombardement de la ville basque par l'aviation nazie, est l'un des symboles les plus forts de l'art engagé. Huile sur toile de 3,5 × 7,8 m, elle est conservée au musée Reina Sofía de Madrid. Picasso refusait qu'elle retourne en Espagne tant que Franco serait au pouvoir."},
{theme:"arts",diff:"facile",type:"q",q:"Qui est l'auteur de La Nuit étoilée (1889) ?",a:"Vincent van Gogh",detail:"Peinte à l'asile Saint-Paul-de-Mausole à Saint-Rémy-de-Provence, La Nuit étoilée représente le village sous un ciel tourbillonnant. Van Gogh n'a vendu qu'un seul tableau de son vivant. Aujourd'hui ses œuvres se vendent des centaines de millions de dollars. Elle est conservée au MoMA de New York."},
{theme:"arts",diff:"facile",type:"q",q:"Quel musicien américain est considéré comme le « roi du rock and roll » ?",a:"Elvis Presley (1935-1977)",detail:"Elvis Presley popularise le rock and roll en mélangeant rythm and blues noir et country blanche, avec une gestuelle provocante. Son premier single That's All Right (1954) marque le début d'une révolution musicale. Graceland, sa villa de Memphis, est le deuxième site le plus visité des États-Unis après la Maison-Blanche."},
{theme:"arts",diff:"facile",type:"q",q:"Qui a composé les Quatre Saisons ?",a:"Antonio Vivaldi (1723)",detail:"Les Quatre Saisons (Le quattro stagioni) sont quatre concertos pour violon de Vivaldi, chacun illustrant une saison avec des effets sonores évocateurs (tonnerre, oiseaux, glace). Vivaldi était prêtre roux (il prete rosso) et maestro d'un orphelinat de filles à Venise. L'œuvre, longtemps oubliée, est redécouverte au XXe s. et est aujourd'hui la musique classique la plus diffusée au monde."},
{theme:"arts",diff:"facile",type:"q",q:"Quel bâtiment parisien emblématique est une pyramide en verre et acier ?",a:"La Pyramide du Louvre, conçue par I.M. Pei (inaugurée en 1989)",detail:"Commandée par François Mitterrand dans le cadre des Grands Travaux, la Pyramide sert d'entrée principale au musée du Louvre. Sa construction fut très controversée. Elle est composée de 673 losanges et 70 triangles en verre. L'architecte Ieoh Ming Pei, sino-américain, reçut le Prix Pritzker en 1983."},
{theme:"arts",diff:"facile",type:"q",q:"Quel opéra de Verdi est inspiré d'une pièce de Shakespeare sur un Maure jaloux ?",a:"Otello (1887)",detail:"Otello est considéré comme le chef-d'œuvre tardif de Verdi, adapté d'Othello de Shakespeare. Le rôle-titre exige une voix héroïque (ténor dramatique) rare. L'opéra fut créé à la Scala de Milan et comporte l'un des plus grands rôles de méchant de l'histoire lyrique : Iago."},
{theme:"arts",diff:"facile",type:"q",q:"Qui est l'auteur de La Symphonie inachevée (1822) ?",a:"Franz Schubert",detail:"Schubert n'a jamais terminé cette symphonie en si mineur (D. 759), dont seuls deux mouvements sur quatre ont été composés. On ignore pourquoi. La Symphonie inachevée n'est exécutée publiquement qu'en 1865, soit 43 ans après sa composition. Schubert, mort à 31 ans, a composé plus de 600 Lieder (mélodies) en plus de ses œuvres instrumentales."},
{theme:"arts",diff:"facile",type:"q",q:"Quel courant artistique du début du XXe s. se caractérise par des formes simples et des couleurs pures ?",a:"Le Fauvisme (Matisse, Derain, Vlaminck, 1905)",detail:"Les fauves (terme péjoratif donné par le critique Louis Vauxcelles) utilisent des couleurs violentes et non naturalistes. Matisse, chef de file, peint La Femme au chapeau (1905) qui scandalise. Ce courant bref (1904-1908) libère la couleur et ouvre la voie à l'abstraction et à l'expressionnisme."},
{theme:"arts",diff:"facile",type:"q",q:"Quelle œuvre de Michel-Ange orne le plafond de la Chapelle Sixtine ?",a:"La Création d'Adam et les scènes de la Genèse (1508-1512)",detail:"Commandée par le pape Jules II, cette fresque de 500 m² représente neuf épisodes de la Genèse. La scène centrale, La Création d'Adam, où les doigts de Dieu et de l'homme se frôlent, est l'une des images les plus iconiques de l'art occidental. Michel-Ange travailla 4 ans couché sur un échafaudage."},
{theme:"arts",diff:"facile",type:"q",q:"Qui a peint Les Tournesols (1888) ?",a:"Vincent van Gogh",detail:"Van Gogh peint deux séries de Tournesols en vue de décorer la chambre de Paul Gauguin à Arles. Ces tableaux de jaune intense symbolisent l'amitié et la joie. L'une des versions fut vendue 39,9 millions de dollars en 1987, établissant alors le record mondial de ventes aux enchères."},
{theme:"arts",diff:"facile",type:"q",q:"Quel ballet de Tchaïkovski est l'un des plus célèbres du répertoire classique ?",a:"Le Lac des cygnes (1876)",detail:"Créé au Bolchoï en 1877, le ballet raconte la malédiction du sorcier Rothbart transformant Odette en cygne. La danseuse principale joue les deux rôles antagonistes : Odette (cygne blanc) et Odile (cygne noir), démontrant une virtuosité exceptionnelle. La partition de Tchaïkovski est considérée comme l'un des sommets de la musique de ballet."},
{theme:"arts",diff:"facile",type:"q",q:"Quel mouvement littéraire et artistique du XVIIe s. se caractérise par la grandeur et l'exubérance ornementale ?",a:"Le Baroque",detail:"Né en Italie autour de 1600, le baroque s'étend à l'architecture (Bernin, Borromini), la musique (Monteverdi, Vivaldi, Bach, Haendel) et la peinture (Rubens, Rembrandt, Caravage). Il exprime la puissance de l'Église catholique après la Réforme (art de la Contre-Réforme). Il se caractérise par le mouvement, le contraste et l'émotion intense."},
{theme:"arts",diff:"moyen",type:"q",q:"Dans quelle ville et en quelle année le mouvement Dada naît-il, et quel événement mondial est à l'origine de cette révolte artistique ?",a:"Courant nihiliste né à Zurich en 1916, réaction au carnage de la Première Guerre mondiale — précurseur du surréalisme et de l'art conceptuel",detail:"Tristan Tzara, Hugo Ball, Marcel Duchamp rejettent toute logique et esthétique traditionnelle. La Fontaine de Duchamp (1917), un urinoir signé « R. Mutt », pose la question : qu'est-ce que l'art ? Dada préfigure le surréalisme (Breton), le pop art, l'art conceptuel et toute l'avant-garde du XXe s."},
{theme:"arts",diff:"moyen",type:"q",q:"Qui est Frida Kahlo et quelle est la particularité de son œuvre ?",a:"Peintre mexicaine (1907-1954) dont l'œuvre autobiographique, marquée par la souffrance physique et l'identité mexicaine, est devenue un symbole féministe mondial",detail:"Victime d'un grave accident de bus à 18 ans, Frida Kahlo peint depuis son lit de douleur des autoportraits intenses. Elle est mariée au muraliste Diego Rivera. Ses œuvres, longtemps éclipsées par celles de son mari, atteignent aujourd'hui des dizaines de millions aux enchères. Elle est devenue l'artiste féminine la plus connue du monde."},
{theme:"arts",diff:"moyen",type:"q",q:"Qui fonde le mouvement Arts and Crafts britannique dans les années 1860, en réaction à l'industrialisation ?",a:"William Morris fonde ce mouvement britannique contre l'industrialisation, valorisant l'artisanat traditionnel et le design intégré à la vie quotidienne",detail:"Morris réagit à la laideur des produits industriels. Il crée des tissus, papiers peints et meubles alliant beauté et utilité. Le mouvement Arts and Crafts influence le Jugendstil allemand, l'Art nouveau français, le Bauhaus et tout le design moderne. Il pose la question encore actuelle de la relation entre art et industrie."},
{theme:"arts",diff:"moyen",type:"q",q:"Qui rédige le premier Manifeste du surréalisme en 1924, et dans quelle revue est-il publié ?",a:"André Breton (Manifeste du surréalisme, 1924) — exploration de l'inconscient et du rêve contre le rationalisme",detail:"Breton, influencé par Freud, propose de libérer l'inconscient par l'écriture automatique et la juxtaposition irrationnelle d'images. Dalí (montres molles), Magritte (La Trahison des images), Ernst, Miró rejoignent le mouvement. Le surréalisme influence profondément le cinéma (Buñuel), la publicité et la culture populaire du XXe s."},
{theme:"arts",diff:"moyen",type:"q",q:"Quelle est la différence entre l'opéra seria et l'opéra buffa dans la musique baroque et classique ?",a:"L'opéra seria (sérieux) traite de sujets mythologiques ou héroïques avec des castrats ; l'opéra buffa (comique) met en scène des personnages populaires avec une intrigue comique",detail:"L'opéra seria (Haendel, Vivaldi) est l'opéra aristocratique par excellence. L'opéra buffa naît à Naples (~1730) et se démocratise. Mozart maîtrise les deux formes : Idoménée (seria) et Les Noces de Figaro (buffa). La Serva Padrona de Pergolèse (1733) déclenche la Querelle des Bouffons à Paris (1752)."},
{theme:"arts",diff:"moyen",type:"q",q:"Dans quelle ville Andy Warhol installe-t-il sa célèbre Factory, et en quelle décennie le Pop Art américain est-il à son apogée ?",a:"Andy Warhol (1928-1987) est le chef de file du Pop Art — courant qui récupère les images de la culture de masse (publicité, célébrités, produits) comme matière artistique",detail:"Warhol sérigraphie des boîtes de soupe Campbell, des billets de banque, des portraits de Marilyn Monroe et de Mao Zedong. Sa « Factory » de New York est à la fois atelier, studio et scène de la contre-culture. En effaçant la frontière entre art et commerce, il prophétise la société du spectacle et l'art contemporain."},
{theme:"arts",diff:"moyen",type:"q",q:"Quelle cathédrale française, commencée en 1163, est considérée comme l'un des premiers exemples majeurs de l'architecture gothique ?",a:"Style architectural médiéval (XIIe-XVe s.) caractérisé par les arcs brisés, les voûtes en ogive et les arcs-boutants qui permettent des façades en verre et des cathédrales élancées",detail:"L'arc-boutant, invention révolutionnaire, transfère la poussée des voûtes vers l'extérieur, permettant des murs ajourés de vitraux. Notre-Dame de Paris (commencée 1163), la cathédrale de Chartres, Reims, Amiens sont les chefs-d'œuvre du gothique français. Le style gothique, perçu comme « barbare » à la Renaissance, est revalorisé au XIXe s. par Viollet-le-Duc."},
{theme:"arts",diff:"moyen",type:"q",q:"Qui est Gustav Klimt et quel est son style ?",a:"Peintre autrichien (1862-1918), figure centrale de la Sécession viennoise, connu pour ses œuvres dorées mêlant symbolisme et Art nouveau",detail:"Klimt fonde la Sécession viennoise (1897) pour rompre avec l'académisme. Le Baiser (1907-1908), ses deux amants fondus dans des ornements dorés, est l'une des images les plus reproduites au monde. Egon Schiele, son élève, pousse l'expressionnisme plus loin. Klimt réalise aussi de grandes frivolités décoratives pour les palais de la bourgeoisie viennoise."},
{theme:"arts",diff:"moyen",type:"q",q:"Quel compositeur baroque est considéré comme le maître incontesté de la fugue, avec notamment L'Art de la fugue ?",a:"Composition polyphonique où un thème (sujet) est développé par imitations successives entre différentes voix — Bach en est le maître absolu",detail:"La fugue (du latin fuga, 'fuite') fait courir le sujet d'une voix à l'autre selon des règles strictes : exposition, développement, strette, pédale de dominante. L'Art de la fugue de Bach (1749) est le testament polyphonique de la musique baroque. Le Clavier bien tempéré (48 préludes et fugues) couvre tous les tons majeurs et mineurs."},
{theme:"arts",diff:"moyen",type:"q",q:"Quel peintre français est le chef de file du néoclassicisme, connu pour ses grandes compositions historiques comme Le Serment des Horaces ?",a:"Retour aux modèles antiques (grec et romain) en réaction au baroque et au rococo — Jacques-Louis David et Jean-Auguste-Dominique Ingres en sont les chefs de file",detail:"David peint Le Serment des Horaces (1784), tableau aux lignes dures et aux valeurs stoïciennes, préfigurant la Révolution. Il peint aussi Le Sacre de Napoléon (1807). Ingres, son élève, pousse la perfection du dessin et du contour à l'extrême. Le néoclassicisme est l'art officiel de la Révolution et de l'Empire."},
{theme:"arts",diff:"moyen",type:"q",q:"Quel architecte brésilien a conçu les bâtiments officiels de Brasília ?",a:"Oscar Niemeyer (1907-2012), en collaboration avec Lúcio Costa pour l'urbanisme",detail:"Niemeyer conçoit le Congrès national (dômes et coupoles), le Palais du Gouvernement (colonnes inclinées), la cathédrale (16 piliers hyperboloïdes). Influencé par Le Corbusier, il développe un style organique et courbe distinct. Il travaille jusqu'à 104 ans — l'un des plus grands architectes du XXe s. Ses bâtiments symbolisent l'utopie moderniste."},
{theme:"arts",diff:"moyen",type:"q",q:"Dans quelle ville américaine le jazz naît-il vers 1900, et quelles traditions musicales y convergent ?",a:"Genre musical afro-américain né à La Nouvelle-Orléans vers 1900, mêlant blues, ragtime et musiques africaines — fondé sur l'improvisation",detail:"Le jazz naît dans les quartiers noirs de La Nouvelle-Orléans (Storyville). Louis Armstrong (trompette), Duke Ellington (big band), Charlie Parker (bebop), Miles Davis (cool jazz) font évoluer le genre. L'improvisation, caractéristique centrale, permet à chaque musicien d'exprimer sa personnalité. Le jazz est reconnu comme patrimoine immatériel de l'UNESCO."},
{theme:"arts",diff:"moyen",type:"q",q:"Qui est Rembrandt et quel est son apport à la peinture ?",a:"Rembrandt Harmenszoon van Rijn (1606-1669), maître hollandais du clair-obscur psychologique et de l'autoportrait",detail:"Rembrandt peint plus de 90 autoportraits — un journal visuel de sa vie entière. Sa Ronde de nuit (1642, Rijksmuseum) est le chef-d'œuvre de la peinture hollandaise du XVIIe s. Il utilise le clair-obscur non pour le drame théâtral (comme Caravage) mais pour révéler la vie intérieure des personnages. Il finit ruiné, ses biens saisis."},
{theme:"arts",diff:"moyen",type:"q",q:"Quels compositeurs incarnent le romantisme musical du XIXe siècle, du Polonais Chopin au Hongrois Liszt ?",a:"Le romantisme musical (1820-1900) exalte les émotions, la nature et la liberté formelle — Chopin, Liszt, Schumann, Brahms, Berlioz, Wagner en sont les représentants",detail:"La musique romantique s'émancipe des formes classiques strictes (sonate, symphonie) pour explorer des formes libres (poème symphonique, nocturne). Chopin exprime l'âme polonaise dans ses mazurkas. Berlioz invente la symphonie narrative (Symphonie fantastique, 1830). Wagner crée le drame musical total."},
{theme:"arts",diff:"moyen",type:"q",q:"Quel artiste américain est le pionnier de l'expressionnisme abstrait et du drip painting ?",a:"Jackson Pollock (1912-1956)",detail:"Pollock dépose ses toiles sur le sol et verse/projette la peinture directement depuis le pot ou le pinceau (action painting). Sa technique élimine le contact direct entre la brosse et la toile. Number 31 (1950) illustre cette approche. Pollock déplace le centre de l'art mondial de Paris vers New York après 1945. Il meurt dans un accident de voiture à 44 ans."},
{theme:"arts",diff:"moyen",type:"q",q:"Quelle triade de génies incarne le sommet de la Renaissance italienne, réunissant peinture, sculpture et architecture ?",a:"Mouvement culturel (XIVe-XVIe s.) qui renouvelle l'art en redécouvrant l'Antiquité — Léonard de Vinci, Michel-Ange, Raphaël forment la Sainte Trinité de la Haute Renaissance",detail:"Florence, sous les Médicis, est le foyer de la Renaissance. Brunelleschi invente la perspective géométrique (1415). Donatello renouvelle la sculpture. Botticelli (La Naissance de Vénus) peint la mythologie avec une grâce nouvelle. La Haute Renaissance (1490-1527) avec Léonard, Michel-Ange et Raphaël atteint une perfection jamais égalée."},
{theme:"arts",diff:"moyen",type:"q",q:"Qui a composé La Flûte enchantée et à quelle époque ?",a:"Wolfgang Amadeus Mozart — créée à Vienne le 30 septembre 1791, quelques semaines avant sa mort",detail:"La Flûte enchantée (Die Zauberflöte) mêle conte philosophique maçonnique, airs virtuoses (L'Aria de la Reine de la Nuit atteint le fa aigu) et personnages comiques. Mozart meurt à 35 ans en décembre 1791, laissant inachevé son Requiem. C'est l'un des opéras les plus joués au monde."},
{theme:"arts",diff:"moyen",type:"q",q:"Quel architecte catalan crée la Casa Batlló et la Sagrada Família, exemples emblématiques de l'Art nouveau ?",a:"Courant de 1890-1910 inspiré des formes naturelles (courbes végétales) — Casa Batlló de Gaudí à Barcelone, entres du métro parisien de Guimard",detail:"L'Art nouveau (Jugendstil en Allemagne, Sezessionsstil en Autriche) cherche à intégrer l'art dans la vie quotidienne. Gaudí à Barcelone, Horta à Bruxelles, Mackintosh à Glasgow, Guimard à Paris définissent chacun une version nationale. Le style disparaît avec la Première Guerre mondiale et la sobriété qui s'ensuit."},
{theme:"arts",diff:"facile",type:"q",q:"Qui a peint La Naissance de Vénus (vers 1484) ?",a:"Sandro Botticelli",detail:"Conservée aux Offices de Florence, La Naissance de Vénus représente la déesse émergent de la mer sur une coquille. Commandée par les Médicis, elle est l'une des premières grandes toiles sur un sujet mythologique de la Renaissance. La Vénus au visage mélancolique est identifiée à Simonetta Vespucci, amour platonique de Julien de Médicis."},
{theme:"arts",diff:"facile",type:"q",q:"Quel compositeur autrichien a écrit plus de 600 œuvres et est mort à 35 ans ?",a:"Wolfgang Amadeus Mozart (1756-1791)",detail:"Mozart compose dès l'âge de 5 ans et fait des tournées européennes enfant-prodige. Son œuvre comprend 41 symphonies, 27 concertos pour piano, 22 opéras et d'innombrables pièces de chambre. Il meurt à 35 ans dans la pauvreté, laissant son Requiem inachevé. Il est enterré dans une fosse commune à Vienne."},
{theme:"arts",diff:"facile",type:"q",q:"Quel bâtiment est souvent considéré comme le chef-d'œuvre de l'architecture classique française ?",a:"Le château de Versailles (construit sous Louis XIV, architectes Le Vau et Hardouin-Mansart)",detail:"Versailles est le symbole absolu de la monarchie absolue. Sa Galerie des Glaces (73 m, 357 miroirs) reflète les victoires de Louis XIV. Les jardins dessinés par Le Nôtre incarnent la domination de la raison sur la nature. Versailles a inspiré des dizaines de palais européens et est aujourd'hui le monument le plus visité de France (10 millions de visiteurs/an)."},
{theme:"arts",diff:"facile",type:"q",q:"Qui est Salvador Dalí et quel courant artistique représente-t-il ?",a:"Salvador Dalí (1904-1989), peintre espagnol, figure majeure du surréalisme — connu pour La Persistance de la mémoire (montres molles, 1931)",detail:"Dalí est le génie excentrique du surréalisme : moustaches en croc, déclarations provocatrices, vie théâtrale. Ses montres molles symbolisent la subjectivité du temps. Il travaille aussi pour le cinéma (Un Chien andalou avec Buñuel, 1929). La Fondation Gala-Dalí à Figueres (Espagne) est l'un des musées les plus visités d'Europe."},
{theme:"arts",diff:"facile",type:"q",q:"Quel musicien de Liverpool a cofondé le groupe rock le plus influent de l'histoire ?",a:"John Lennon (avec Paul McCartney, George Harrison et Ringo Starr) — les Beatles (1960-1970)",detail:"Les Beatles révolutionnent la pop mondiale avec leurs harmonies vocales, leur écriture originale et leur évolution constante (de She Loves You à A Day in the Life). They arrive en Amérique en 1964 (Beatlemania). Lennon est assassiné devant son appartement new-yorkais le 8 décembre 1980. L'album Abbey Road (1969) est le dernier enregistré ensemble."},
{theme:"arts",diff:"facile",type:"q",q:"Quel architecte florentin formalise la perspective mathématique au XVe siècle, révolutionnant la peinture de la Renaissance ?",a:"Technique de représentation de la profondeur sur une surface plane — formalisée par Filippo Brunelleschi vers 1415 et théorisée par Leon Battista Alberti (1435)",detail:"La perspective linéaire (point de fuite) permet de représenter l'espace tridimensionnel sur une surface plate selon des règles géométriques. Brunelleschi démontre son principe avec un miroir et une peinture du baptistère de Florence. Avant lui, le Moyen Âge utilisait la perspective hiérarchique (les personnages importants sont plus grands)."},
{theme:"arts",diff:"facile",type:"q",q:"Quel peintre romantique français est connu pour La Liberté guidant le peuple (1830) ?",a:"Eugène Delacroix",detail:"Peinte après la révolution de Juillet 1830, cette allégorie montre Marianne brandissant le drapeau tricolore sur des barricades. C'est l'une des images les plus emblématiques de la Révolution française et du romantisme politique. Conservée au Louvre, elle a inspiré le logo du groupe Coldplay et des millions d'affiches politiques."},
{theme:"arts",diff:"facile",type:"q",q:"Qu'est-ce qu'une sonate et comment est-elle structurée ?",a:"Composition musicale (solo ou duo) en plusieurs mouvements — la forme sonate classique est en 3 parties : exposition, développement, réexposition",detail:"La forme sonate (développée au XVIIIe s.) présente deux thèmes contrastés (exposition), les développe avec modulations (développement) et les répète transformés (réexposition). Beethoven pousse cette forme à ses limites. La Sonate Pathétique (op. 13), la Sonate au clair de lune (op. 27), la Sonate Appassionata (op. 57) sont parmi ses sommets."},
{theme:"arts",diff:"moyen",type:"q",q:"Quel peintre français du XIXe siècle est le chef de file du réalisme, scandalisant le public avec Un enterrement à Ornans ?",a:"Courant du milieu du XIXe s. représentant la réalité sans idéalisation — Gustave Courbet, Honoré Daumier et Jean-François Millet",detail:"Courbet peint les paysans, les ouvriers, les funérailles (Un enterrement à Ornans, 1849) avec la même grandeur que les sujets nobles. Il choque l'Académie. Millet peint les Glaneuses (1857), humble hommage au travail agricole. Le réalisme est une réaction politique autant qu'artistique contre l'idéalisme romantique."},
{theme:"arts",diff:"moyen",type:"q",q:"Quel est le rôle du Louvre dans l'histoire de l'art mondial ?",a:"Le plus grand musée du monde (~380 000 œuvres, ~60 000 exposées) — ancienne résidence royale transformée en musée en 1793 par la Révolution",detail:"Le Louvre est un palais royal depuis Philippe Auguste (1190). La Révolution le transforme en musée public en 1793. Napoléon y installe des milliers d'œuvres volées en Europe. Il abrite la Joconde, la Vénus de Milo, la Victoire de Samothrace. Avec 9 millions de visiteurs en 2019, c'est le musée le plus visité au monde."},
{theme:"arts",diff:"moyen",type:"q",q:"Qui invente la musique concrète en 1948, et dans quel studio radiophonique parisien travaille-t-il ?",a:"Pierre Schaeffer (1948) — musique créée à partir de sons enregistrés et manipulés, ancêtre de toute la musique électronique",detail:"Schaeffer, ingénieur de la RTF, crée l'Étude aux chemins de fer (1948) en montant et manipulant des sons de locomotives. Il invente le terme musique concrète car il part de sons concrets plutôt que de notes abstraites. Pierre Henry (Variations pour une porte et un soupir, 1963) popularise la démarche. Cette approche préfigure le sampling, la techno et la musique électronique."},
{theme:"arts",diff:"moyen",type:"q",q:"Qui est Le Corbusier et quelle est son influence sur l'architecture moderne ?",a:"Charles-Édouard Jeanneret, dit Le Corbusier (1887-1965) — architecte franco-suisse, théoricien du modernisme et de l'urbanisme fonctionnaliste",detail:"Le Corbusier définit la maison comme une « machine à habiter » et formule les 5 points de l'architecture nouvelle (pilotis, toit-terrasse, plan libre, façade libre, fenêtre en bandeau). La Villa Savoye (1929), la Cité Radieuse de Marseille (1952), Chandigarh (Inde) et la chapelle Ronchamp (1955) illustrent son génie contradictoire. Son influence sur l'urbanisme du XXe s. est immense."},
{theme:"arts",diff:"difficile",type:"q",q:"Quels deux compositeurs de l'École de Notre-Dame de Paris, aux XIIe et XIIIe siècles, sont les pionniers de la polyphonie médiévale ?",a:"L'École de Notre-Dame de Paris (XIIe-XIIIe s.) est le premier grand centre de composition polyphonique — Léonin et Pérotin y développent l'organum et le motet",detail:"La polyphonie (plusieurs voix indépendantes) naît vers le IXe s. (organum primitif). L'École de Notre-Dame perfectionne la notation rythmique, permettant de synchroniser plusieurs voix. Léonin rédige le Magnus Liber Organi (~1170), Pérotin pousse à 3-4 voix. Cette révolution musicale est le fondement de toute la musique occidentale classique."},
{theme:"arts",diff:"difficile",type:"q",q:"Quel compositeur américain est la figure majeure du minimalisme musical avec des œuvres comme Music for 18 Musicians ?",a:"Courant des années 1960-70 réduisant l'art à ses éléments essentiels — en art : Donald Judd, Dan Flavin, Sol LeWitt ; en musique : Philip Glass, Steve Reich, La Monte Young",detail:"Le minimalisme visuel utilise des formes géométriques simples, des matériaux industriels, la répétition. Le minimalisme musical (musique répétitive) explore les effets hypnotiques de la répétition et du changement graduel. Steve Reich (Music for 18 Musicians, 1976) et Philip Glass (Einstein on the Beach, 1976) créent des œuvres fondatrices."},
{theme:"arts",diff:"difficile",type:"q",q:"En quelle année Monteverdi compose-t-il L'Orfeo, considéré comme le premier grand opéra du répertoire ?",a:"L'Orfeo de Monteverdi (1607) est le premier opéra du répertoire, mais la Camerata florentine (Peri, Caccini, ~1598) avait créé la forme une décennie avant",detail:"La Camerata de Giovanni Bardi réunit humanistes et musiciens pour retrouver la musique grecque antique. Peri crée Dafne (1598, perdue) et Euridice (1600). Mais L'Orfeo de Monteverdi (1607) dépasse ses prédécesseurs par sa maîtrise orchestrale, sa profondeur dramatique et son intégration de la polyphonie. Il reste le plus ancien opéra au répertoire régulier."},
{theme:"arts",diff:"difficile",type:"q",q:"Quel débat académique oppose au XVIIe siècle les partisans du dessin (Poussinistes) à ceux de la couleur (Rubénistes) ?",a:"Débat académique français opposant les partisans du dessin (Poussin, raison, Antiquité) aux partisans de la couleur (Rubens, sensations, modernité) — préfiguration de tous les débats esthétiques ultérieurs",detail:"L'Académie royale de peinture (Paris, 1648) est divisée. Les Poussinistes (Champaigne, Le Brun) voient le dessin comme principe intellectuel supérieur. Les Rubénistes (Roger de Piles) défendent la couleur qui touche les sens. Ce débat annonce l'opposition classicisme/romantisme, puis académisme/impressionnisme. Il pose la question fondamentale : l'art doit-il s'adresser à la raison ou aux émotions ?"},
{theme:"arts",diff:"difficile",type:"q",q:"Qui invente le dodécaphonisme en 1923, et quel autre compositeur viennois en sera le représentant le plus radical ?",a:"Arnold Schoenberg (1923) — système de composition utilisant les 12 notes de la gamme chromatique en séries, abandonnant la tonalité",detail:"Schoenberg développe la méthode des 12 sons après avoir rompu avec la tonalité dans Pierrot lunaire (1912). La série (tone row) utilise chaque note une seule fois avant de les répéter. Ses élèves Alban Berg (Wozzeck, 1925) et Anton Webern poussent la méthode plus loin. Le dodécaphonisme, puis le sérialisme intégral de Boulez et Stockhausen, dominent la musique savante après 1945."},
{theme:"arts",diff:"difficile",type:"q",q:"Dans quelle forêt française les peintres de l'École de Barbizon s'installent-ils à partir des années 1830 pour peindre sur le motif ?",a:"Groupe de peintres (Corot, Millet, Rousseau, Daubigny) qui dans les années 1830-1860 peignent la nature sur le motif, en plein air — précurseurs directs des impressionnistes",detail:"L'École de Barbizon (village de Seine-et-Marne près de la forêt de Fontainebleau) rejette la peinture d'atelier au profit de l'observation directe de la lumière naturelle. Corot introduit la sfumato atmosphérique. Ces peintres préparent l'impressionnisme en légitimant la peinture de paysage et l'observation directe. Monet connaît leur travail."},
{theme:"arts",diff:"difficile",type:"q",q:"Quelle technique artistique, caractéristique de l'art byzantin, orne encore aujourd'hui la basilique Saint-Marc de Venise ?",a:"Art chrétien de l'Empire byzantin (IVe-XVe s.) caractérisé par la mosaïque, l'icône et une esthétique immatérielle opposée au naturalisme — fondement de l'art religieux orthodoxe et influence sur la Renaissance italienne",detail:"L'art byzantin représente les figures avec des yeux fixes, sur fond d'or symbolisant le divin. La mosaïque de Ravenne (San Vitale, VIe s.) est l'un des chefs-d'œuvre. Les icônes ne sont pas des décorations mais des fenêtres sur le divin (théologie de l'image). La Querelle iconoclaste (VIIIe-IXe s.) menace cette tradition. Duccio et Cimabue, précurseurs de Giotto, partent de cette tradition."},
{theme:"arts",diff:"difficile",type:"q",q:"Quel compositeur français a fondé le groupe des Six et quel était leur programme esthétique ?",a:"Erik Satie inspire les Six (Milhaud, Poulenc, Honegger, Auric, Tailleferre, Durey), rassemblés par Jean Cocteau — rejet du romantisme et du wagnérisme au profit de la légèreté et de la clarté française",detail:"Le Groupe des Six (1920) est une réaction contre le symbolisme et l'impressionnisme de Debussy et surtout contre le wagnérisme. Cocteau prône un art sobre, direct et français. Milhaud explore les rythmes brésiliens (La Création du monde, 1923), Poulenc le mélange d'esprit et d'émotion. Satie, figure tutélaire avec ses Gymnopédies (1888), préfigure le minimalisme."},
{theme:"arts",diff:"facile",type:"q",q:"Quel artiste du pop art a représenté des boîtes de soupe Campbell et des portraits de Marilyn Monroe ?",a:"Andy Warhol",detail:"Warhol sérigraphie en série les mêmes images, questionnant l'originalité et l'authenticité de l'œuvre d'art. Ses Gold Marilyn Monroe (1962) utilisent l'imagerie de la célébrité hollywoodienne comme icône commerciale et tragique. Sa Factory, studio new-yorkais, produit des films underground, des magazines (Interview) et accueille la crème de l'avant-garde."},
{theme:"arts",diff:"facile",type:"q",q:"Quel courant musical des années 1950-60 est né de la fusion entre blues et gospel ?",a:"Le soul (Ray Charles, Aretha Franklin) — et la Motown (Stevie Wonder, Marvin Gaye, Diana Ross)",detail:"Ray Charles mélange le gospel et le rythm and blues, créant le soul. Aretha Franklin, la « Reine du soul », chante Respect (1967). La Motown Records (Berry Gordy, Detroit) produit une pop soul lisse et dansante pour le marché blanc. Ce courant influence directement le funk, le hip-hop et la pop contemporaine."},
{theme:"arts",diff:"moyen",type:"q",q:"Quelle différence fondamentale distingue la technique de la buon fresco de la peinture à l'huile sur toile ?",a:"La fresque (buon fresco) consiste à peindre sur l'enduit humide (l'intonaco) afin que les pigments s'intègrent dans le mur en séchant — permanente mais exigeant une rapidité d'exécution",detail:"La peinture à l'huile (inventée/popularisée par Jan van Eyck, XVe s.) permet les repentirs et les glacis progressifs. La fresque ne supporte aucune erreur : chaque journée (giornata), le peintre enduit et peint la surface du jour. Giotto, Masaccio, Léonard (La Cène, en détrempe sur mur sec — pas une vraie fresque), Michel-Ange maîtrisent la technique."},
{theme:"arts",diff:"moyen",type:"q",q:"Qui est Claude Monet et quel est son apport central à la peinture ?",a:"Claude Monet (1840-1926), fondateur de l'impressionnisme, père de la série picturale — explore les variations de la lumière sur un même motif à différentes heures",detail:"Monet peint la cathédrale de Rouen 30 fois sous différentes lumières (1892-1894). Son jardin de Giverny inspire les Nymphéas, immenses panneaux décoratifs installés à l'Orangerie de Paris. La vision de Monet se dégrade (cataracte) — ses dernières œuvres, aux couleurs chaudes brouillées, préfigurent l'abstraction. Il meurt en 1926 à 86 ans."},
{theme:"arts",diff:"moyen",type:"q",q:"Quel compositeur autrichien du XVIIIe siècle est considéré comme le père du quatuor à cordes, genre roi de la musique de chambre ?",a:"Musique destinée à être jouée en petit groupe dans un salon — quatuor à cordes, trio avec piano, sonate, quintette",detail:"Le quatuor à cordes (2 violons, alto, violoncelle) est le genre roi de la musique de chambre. Haydn l'invente sous sa forme classique. Beethoven le porte à ses limites expressives (dernier quatuors op. 131, 132, 135). Schubert (La Jeune Fille et la Mort), Brahms, Ravel, Chostakovitch ont chacun laissé des quatuors fondamentaux."},
{theme:"arts",diff:"moyen",type:"q",q:"Quel photographe américain est connu pour ses portraits en noir et blanc de la Grande Dépression ?",a:"Dorothea Lange — sa photo Migrant Mother (1936) est l'une des plus célèbres de l'histoire",detail:"Dorothea Lange travaille pour la Farm Security Administration (FSA) sous Roosevelt pour documenter la misère rurale. Migrant Mother (Florence Owens Thompson, 32 ans, 7 enfants) devient le visage de la Grande Dépression. La photographie documentaire de Lange, Walker Evans et Margaret Bourke-White définit l'idéal d'un photojournalisme humaniste."},
{theme:"arts",diff:"difficile",type:"q",q:"Qui théorise en 1849 le concept de Gesamtkunstwerk (œuvre d'art totale), et dans quel cycle d'opéras le met-il en pratique ?",a:"Richard Wagner (1849) — idée d'une œuvre unifiant musique, poésie, arts visuels et mise en scène, contre la spécialisation des arts",detail:"Wagner théorise le Gesamtkunstwerk dans ses écrits L'Œuvre d'art de l'avenir (1849). Le drame musical wagnérien tente cette fusion totale. L'idée influencera le Bauhaus, le cinéma de Kubrick, les installations contemporaines et les spectacles multimédia. La question de la hiérarchie des arts et de leur fusion reste centrale dans l'esthétique contemporaine."},
{theme:"arts",diff:"difficile",type:"q",q:"Quelle œuvre de Marcel Duchamp, exposée en 1917, est considérée comme l'acte fondateur de l'art conceptuel ?",a:"Courant (1960-70) qui fait de l'idée l'essence de l'œuvre d'art, au détriment de sa réalisation matérielle — Fontaine de Duchamp (1917) en est l'acte fondateur rétrospectivement",detail:"Joseph Kosuth (One and Three Chairs, 1965) expose une chaise, une photo de chaise et une définition de dictionnaire : lequel est l'art ? Sol LeWitt définit l'art conceptuel : l'idée est l'œuvre, l'exécution est secondaire. Lawrence Weiner ne réalise même plus ses pièces, laissant aux collectionneurs le soin de les matérialiser."},
{theme:"arts",diff:"difficile",type:"q",q:"Quel est le rôle de la galerie Peggy Guggenheim dans l'histoire de l'art moderne ?",a:"Peggy Guggenheim (1898-1979) fut la mécène et galeriste qui fit connaître l'expressionnisme abstrait américain en Europe et soutint des dizaines d'artistes majeurs",detail:"Peggy Guggenheim fuit New York pour Paris en 1938 et achète une œuvre d'art par jour. Elle retourne à New York en 1941 avec 37 artistes réfugiés (Ernst, Léger, Breton). Sa galerie Art of This Century présente Pollock, De Kooning, Rothko. Elle finit à Venise dans son palazzo, collection ouverte au public. Son musée est l'un des plus importants du XXe s."},
// NOUVELLES CARTES SPORT (94 cartes pour atteindre 100)
{theme:"sport",diff:"facile",type:"q",q:"Combien de fois Lionel Messi a-t-il remporté le Ballon d'Or ?",a:"8 fois (2009, 2010, 2011, 2012, 2015, 2019, 2021, 2023)",detail:"Messi remporte son 1er Ballon d'Or en 2009 avec le FC Barcelone. Son 8e en 2023 consacre sa Coupe du monde remportée avec l'Argentine en 2022, après des décennies de finale et demi-finale. Son rival Cristiano Ronaldo en compte 5. Messi joue actuellement à l'Inter Miami (MLS)."},
{theme:"sport",diff:"facile",type:"q",q:"Dans quel pays les Jeux Olympiques modernes ont-ils été fondés et en quelle année ?",a:"À Athènes (Grèce) en 1896 — fondés par Pierre de Coubertin",detail:"Pierre de Coubertin, pédagogue français, ressuscite les JO antiques. Les premiers JO modernes rassemblent 241 athlètes de 14 nations à Athènes. Coubertin fonde le Comité International Olympique (CIO) en 1894. La devise olympique : « Citius, Altius, Fortius » (plus vite, plus haut, plus fort). Les anneaux symbolisent l'union des cinq continents."},
{theme:"sport",diff:"facile",type:"q",q:"Quel pays a remporté le plus de Coupes du Monde de football ?",a:"Le Brésil — 5 titres (1958, 1962, 1970, 1994, 2002)",detail:"Le Brésil est le seul pays à avoir participé à toutes les Coupes du Monde (23 éditions). La génération 1970 (Pelé, Rivelino, Jairzinho) est considérée la meilleure de l'histoire. L'Allemagne et l'Italie suivent avec 4 titres chacun. La France en a 2 (1998, 2018)."},
{theme:"sport",diff:"facile",type:"q",q:"Quel sport se joue avec une raquette et un volant ?",a:"Le badminton",detail:"Le badminton, né en Inde sous le nom de Poona, fut codifié en Grande-Bretagne vers 1870 dans le domaine du duc de Beaufort (Badminton House). Le volant peut atteindre 450 km/h en smash — plus rapide que tout autre sport. La Chine, l'Indonésie et la Malaisie dominent les compétitions mondiales."},
{theme:"sport",diff:"facile",type:"q",q:"Quelle est la distance officielle d'un marathon ?",a:"42,195 km (26 miles et 385 yards)",detail:"Cette distance est fixée aux JO de Londres (1908) pour que la course parte du château de Windsor et arrive devant la loge royale du stade. La distance varie d'abord entre 40 et 42 km selon les éditions olympiques. Fidippidès, soldat athénien, aurait couru d'un trait de Marathon à Athènes (40 km) pour annoncer la victoire sur les Perses en 490 av. J.-C."},
{theme:"sport",diff:"facile",type:"q",q:"Qui est considéré comme le meilleur nageur de l'histoire ?",a:"Michael Phelps (États-Unis) — 23 médailles d'or olympiques, record absolu toutes disciplines confondues",detail:"Phelps remporte 28 médailles olympiques entre 2000 et 2016 (Sydney, Athènes, Pékin, Londres, Rio). Il domine le 200 m papillon, le 200 m 4 nages, les relais. Sa carrure (envergure 201 cm, pieds 33 cm) et sa capacité pulmonaire hors norme lui confèrent un avantage physique exceptionnel."},
{theme:"sport",diff:"facile",type:"q",q:"Quel sport se pratique sur un terrain appelé court et utilise un filet ?",a:"Le tennis (mais aussi badminton, volleyball, ping-pong)",detail:"Le tennis moderne naît en 1874 quand le major Walter Clopton Wingfield brevète le Lawn Tennis. Wimbledon, créé en 1877, est le plus ancien tournoi du Grand Chelem. Le terrain est en herbe (Wimbledon), terre battue (Roland-Garros), ciment (US Open, Open d'Australie). Ces 4 tournois forment le Grand Chelem."},
{theme:"sport",diff:"facile",type:"q",q:"Combien de joueurs compte une équipe de basket-ball sur le terrain ?",a:"5 joueurs par équipe (10 au total sur le terrain)",detail:"Le basketball est inventé par James Naismith en 1891 à Springfield (Massachusetts) pour garder ses étudiants actifs l'hiver. Il utilise deux paniers de pêche et un ballon de foot. La NBA (National Basketball Association) est fondée en 1946. Le jeu s'est répandu dans le monde entier, notamment grâce aux Dream Team américaines aux JO depuis 1992."},
{theme:"sport",diff:"facile",type:"q",q:"Quelle ville accueillera les Jeux Olympiques d'été de 2024 ?",a:"Paris (France) — 100 ans après les JO de 1924 également à Paris",detail:"Les JO de Paris 2024 se tiennent du 26 juillet au 11 août 2024 avec la cérémonie d'ouverture sur la Seine (première hors d'un stade). 10 500 athlètes de 206 nations y participent. Le bréaking (breakdance) fait ses débuts olympiques. La France termine 5e au tableau des médailles avec 16 or."},
{theme:"sport",diff:"facile",type:"q",q:"Quel joueur de basketball américain est surnommé « Air Jordan » ?",a:"Michael Jordan (Chicago Bulls, 1984-1998)",detail:"Jordan remporte 6 titres NBA (1991-93, 1996-98), 5 MVP, 6 MVP des Finals. Sa capacité à planer dans les airs lui vaut le surnom d'Air Jordan. Nike crée la ligne Air Jordan en 1984, désormais la marque de sport la plus rentable au monde. Le documentaire The Last Dance (2020) a relancé sa mythologie."},
{theme:"sport",diff:"facile",type:"q",q:"Quel sport de raquette se joue sur une table ?",a:"Le tennis de table (ping-pong)",detail:"Inventé en Angleterre vers 1880 comme version d'intérieur du tennis. La Fédération internationale est créée en 1926. La Chine domine la discipline depuis les années 1960 (60 % des médailles d'or olympiques). La « diplomatie ping-pong » (1971) a contribué à normaliser les relations sino-américaines quand une équipe américaine est invitée en Chine."},
{theme:"sport",diff:"facile",type:"q",q:"Combien de points vaut un essai au rugby à XV ?",a:"5 points (+ 2 pour la transformation, +3 pour une pénalité, +3 pour un drop)",detail:"L'essai (5 pts) est l'action principale du rugby : poser le ballon dans l'en-but adverse. La transformation (2 pts) est un coup de pied entre les poteaux après l'essai. Le rugby à XV comprend 15 joueurs par équipe ; le rugby à 7 (Seven) est au programme olympique depuis 2016."},
{theme:"sport",diff:"moyen",type:"q",q:"Quel coureur cycliste a remporté le plus de Tours de France ?",a:"Lance Armstrong (7 titres, 1999-2005, annulés) / officiellement : Eddy Merckx, Bernard Hinault, Miguel Indurain, Jacques Anquetil et Chris Froome (5 chacun)",detail:"Lance Armstrong a officiellement remporté 7 Tours (1999-2005) mais tous ses titres ont été annulés par l'UCI en 2012 après confirmation de dopage systématique. En termes de victoires officielles, 5 coureurs se partagent le record avec 5 Tours. Jonas Vingegaard (Danemark) compte 2 victoires consécutives (2022, 2023)."},
{theme:"sport",diff:"moyen",type:"q",q:"Qui a réalisé le Grand Chelem en tennis en une seule saison calendaire, remportant les 4 tournois majeurs la même année ?",a:"Remporter les 4 tournois majeurs (Roland-Garros, Wimbledon, US Open, Open d'Australie) dans la même année — Don Budge (1938) et Steffi Graf (1988) l'ont accompli en simple",detail:"Steffi Graf réalise le Golden Slam en 1988 : les 4 Grand Chelems + la médaille d'or olympique — unique dans l'histoire. Don Budge est le 1er en 1938. Rod Laver l'a réussi deux fois (1962 et 1969). Rafael Nadal détient le record de victoires à Roland-Garros (14), Djokovic à l'Open d'Australie (10)."},
{theme:"sport",diff:"moyen",type:"q",q:"Quel est l'événement sportif le plus regardé au monde ?",a:"La finale de la Coupe du Monde de football (~1,5 milliard de téléspectateurs)",detail:"La finale de la Coupe du Monde de 2022 (Argentine-France) a été suivie par environ 1,5 milliard de personnes en direct. Les Jeux Olympiques et le Super Bowl américain suivent. La finale de la Ligue des Champions UEFA rassemble ~380 millions de spectateurs. La cérémonie d'ouverture des JO de Pékin 2008 est une des plus regardées de l'histoire avec 4 milliards de spectateurs cumulés."},
{theme:"sport",diff:"moyen",type:"q",q:"Quelle nation domine les Jeux Olympiques depuis leur création en nombre total de médailles ?",a:"Les États-Unis (1er au total avec ~2 600 médailles dont ~1 000 or)",detail:"Les États-Unis dominent le tableau des médailles olympiques cumulées depuis 1896. La Russie/URSS est 2e. La Chine, entrée aux JO en 1984, monte rapidement (1ère nation aux JO de Pékin 2008). L'équipe américaine de natation (Phelps, Spitz) et d'athlétisme (Carl Lewis, Jesse Owens) est historiquement dominante."},
{theme:"sport",diff:"moyen",type:"q",q:"Quel coureur canadien est disqualifié aux JO de Séoul en 1988 pour dopage, dans le scandale le plus retentissant de l'histoire athlétique ?",a:"Usage de substances améliorant les performances — scandales : affaire Festina (Tour 1998), Ben Johnson (Seoul 1988), dopage systématique URSS, Russie (2016-2022)",detail:"Ben Johnson (9,79 au 100 m à Séoul 1988) est disqualifié 72h après, positif à la stanozolol. L'affaire Festina (1998) révèle le dopage systématique dans le cyclisme. Le rapport McLaren (2016) prouve que la Russie gère un programme étatique de dopage depuis 2011. L'URSS avait depuis les années 1950 un programme national d'hormones de synthèse."},
{theme:"sport",diff:"moyen",type:"q",q:"Quel sport est le plus populaire aux États-Unis et quelle est sa finale annuelle ?",a:"Le football américain — le Super Bowl est la finale de la NFL, l'événement le plus regardé aux États-Unis",detail:"Le Super Bowl rassemble ~115 millions de téléspectateurs rien qu'aux États-Unis. Le coût d'un spot publicitaire de 30 secondes dépasse 7 millions de dollars. Le Mi-temps (Halftime Show) est un spectacle mondial. La NFL est la ligue sportive la plus riche au monde (~18 milliards de revenus annuels)."},
{theme:"sport",diff:"moyen",type:"q",q:"Qui est Pelé et pourquoi est-il considéré comme le plus grand footballeur de l'histoire ?",a:"Edson Arantes do Nascimento, dit Pelé (1940-2022) — 3 fois champion du monde (1958, 1962, 1970), 1 281 buts en carrière officielle",detail:"Pelé débute avec le Brésil à 17 ans en Coupe du Monde 1958 et inscrit 6 buts (dont un doublé en finale). Il passe toute sa carrière club à Santos puis aux Cosmos de New York. Ses 1 281 buts officiels sont le record mondial. Son jeu combinant technique, vitesse et intelligence de jeu reste la référence absolue."},
{theme:"sport",diff:"moyen",type:"q",q:"Quelle est la particularité de la Formule 1 par rapport aux autres sports mécaniques ?",a:"Voitures les plus sophistiquées technologiquement du monde, monoplace à ailerons et effets de sol générant jusqu'à 5 G en virage",detail:"La F1 est le laboratoire automobile mondial : les innovations (freins en carbone, transmission semi-automatique, pneumatiques slicks, récupération d'énergie) se retrouvent ensuite dans les voitures de série. Lewis Hamilton (7 titres) et Michael Schumacher (7 titres) partagent le record. Les équipes (Ferrari, Mercedes, Red Bull) sont des multinationales techniques."},
{theme:"sport",diff:"moyen",type:"q",q:"Quelles deux franchises NBA partagent le record du plus grand nombre de titres, avec 17 chacune ?",a:"National Basketball Association — fondée en 1946, 30 franchises — les Boston Celtics et les Los Angeles Lakers dominent avec 17-18 titres chacun",detail:"Les Celtics (Boston) ont dominé les années 1950-60 avec Bill Russell (11 titres). Les Lakers ont compté Kareem Abdul-Jabbar, Magic Johnson, Shaquille O'Neal et Kobe Bryant. Les Chicago Bulls de Michael Jordan (6 titres en 8 ans, 1991-1998) restent la династия la plus impressionnante. Les Golden State Warriors (Curry) ont renouvelé le jeu dans les années 2010-20."},
{theme:"sport",diff:"moyen",type:"q",q:"Qui est Muhammad Ali et pourquoi dépasse-t-il le seul cadre sportif ?",a:"Cassius Clay (1942-2016), champion du monde des poids lourds, converti à l'islam, refusant la guerre du Vietnam — symbole mondial des droits civiques",detail:"Ali (3 fois champion du monde poids lourds : 1964, 1974, 1978) est connu pour sa vitesse, son jeu de jambes et ses déclarations provocantes (« Float like a butterfly, sting like a bee »). Son refus d'être incorporé en 1967 (« No Viet Cong ever called me nigger ») lui coûte 3 ans de boxe. Le combat Thrilla in Manila contre Frazier (1975) reste légendaire."},
{theme:"sport",diff:"moyen",type:"q",q:"Quelle équipe de rugby est la plus titrée au monde ?",a:"Les All Blacks de Nouvelle-Zélande — 3 titres de Coupe du Monde (1987, 2011, 2015) et meilleur taux de victoires (~77 %) de l'histoire du rugby international",detail:"Les All Blacks effectuent le Haka (danse guerrière maorie) avant chaque match — pratique devenue iconique. Jonah Lomu, géant aux 20 essais en Coupe du Monde, est le joueur le plus marquant des années 1990. Richie McCaw (capitaine, 148 sélections) est le joueur le plus titré. La Nouvelle-Zélande (5 millions d'habitants) domine un sport mondial avec une régularité remarquable."},
{theme:"sport",diff:"moyen",type:"q",q:"Quel est le record du monde du saut à la perche et qui le détient ?",a:"Armand Duplantis (Suède) — 6,26 m (Torun, Pologne, mars 2024)",detail:"Duplantis (né en 1999) bat régulièrement ses propres records. Il a dépassé 6 m pour la première fois en février 2020 et ne cesse d'améliorer sa marque. Formé aux États-Unis par son père américain (lui-même perchiste), il représente la Suède. Le saut à la perche utilise une perche en fibre de verre ou carbone qui se plie avant de projeter l'athlète."},
{theme:"sport",diff:"moyen",type:"q",q:"Qui détient le record du monde du 200 m ?",a:"Usain Bolt — 19″19 (Berlin, Championnats du monde 2009)",detail:"Bolt établit ce record lors des Championnats du monde 2009, le même soir où il bat le record du 100 m. Il court le 200 m en 19,19 secondes en améliorant de 0,11 secondes son propre record des JO de Pékin 2008. Sa vitesse de pointe atteint 44,72 km/h. Le record féminin est détenu par Florence Griffith-Joyner (21,34 en 1988)."},
{theme:"sport",diff:"moyen",type:"q",q:"Dans quels pays du sous-continent indien le cricket est-il le sport national, mobilisant des centaines de millions de supporters ?",a:"Sport britannique (bat, bri, 11 joueurs) — sport national en Inde, Pakistan, Angleterre, Australie, Antilles, Afrique du Sud",detail:"Le cricket est le 2e sport le plus suivi au monde (~2,5 milliards de fans) grâce à sa popularité en Asie du Sud. Un Test Match peut durer 5 jours. Le format T20 (20 overs) a révolutionné le sport. Sachin Tendulkar (Inde) est le joueur le plus célèbre avec 100 centuries internationaux. La Indian Premier League (IPL) est la ligue de sport la plus riche au monde rapporté par match."},
{theme:"sport",diff:"difficile",type:"q",q:"En quelle année l'UEFA introduit-elle le fair-play financier pour empêcher les clubs de dépenser plus qu'ils ne gagnent ?",a:"Règlement (2010) obligeant les clubs européens à ne pas dépenser plus qu'ils ne gagnent, pour limiter l'influence des investisseurs étrangers fortunés (Manchester City, PSG)",detail:"L'UEFA crée le Fair-play financier (FFP) pour éviter que des clubs achetés par des milliardaires (sheikhs du Golfe, oligarques russes) ne déséquilibrent les compétitions. Manchester City et le PSG sont régulièrement poursuivis. En 2023, l'UEFA remplace le FFP par les règles PSR (Profitability and Sustainability Rules) plus souples. Les revenus des clubs ont explosé (+500 % depuis 1995) mais les inégalités se creusent."},
{theme:"sport",diff:"difficile",type:"q",q:"Combien de médailles d'or Jesse Owens remporte-t-il aux JO de Berlin 1936, contredisant la propagande nazie sur la supériorité aryenne ?",a:"Hitler voulait faire des JO de Berlin une vitrine de la supériorité aryenne — Jesse Owens, Noir américain, remporte 4 médailles d'or, humiliant la théorie nazie",detail:"Hitler finance des JO spectaculaires (premier relais de la flamme, premières retransmissions télévisées). Jesse Owens (100 m, 200 m, 4×100 m, saut en longueur) démontre l'absurdité du racisme nazi. Hitler refuse de lui serrer la main. Leni Riefenstahl réalise Olympia, chef-d'œuvre de la propagande documentaire. Le CIO avait hésité à retirer les JO mais cède aux assurances allemandes."},
{theme:"sport",diff:"difficile",type:"q",q:"Quel est l'impact économique d'un méga-événement sportif comme une Coupe du Monde ou des JO ?",a:"Les retombées économiques directes sont souvent inférieures aux coûts — les JO de Rio 2016 ont coûté ~13 milliards pour des retombées estimées à 5 milliards",detail:"Montréal a remboursé sa dette des JO 1976 en 2006 (30 ans !). Athènes 2004 (~11 milliards) a aggravé la dette grecque. Londres 2012 et Los Angeles 1984 sont des exceptions positives. Les bénéfices sont surtout immatériels (image de marque, tourisme à long terme) et inégalement répartis. Le Qatar a dépensé ~220 milliards pour la Coupe du Monde 2022 — un record absolu."},
{theme:"sport",diff:"difficile",type:"q",q:"Quelle région d'origine est surreprésentée parmi les finalistes olympiques du 100 m depuis 50 ans, et quelle explication scientifique est la plus solide ?",a:"Combinaison de facteurs : fibres musculaires rapides, morphologie, sélection historique — mais la science n'a pas établi de supériorité génétique absolue liée à l'origine",detail:"Les descendants d'Africains de l'Ouest (dont les Afro-Américains et Afro-Jamaïcains) dominent les finales du 100 m depuis les années 1970. Des études montrent en moyenne une proportion plus élevée de fibres musculaires rapides de type IIx dans certaines populations d'Afrique de l'Ouest. La controverse entre facteurs biologiques, culturels et historiques reste ouverte. Tout généralisation génétique est scientifiquement fragile."},
{theme:"sport",diff:"difficile",type:"q",q:"Quelle athlète sud-africaine est au cœur de la controverse sur l'hyperandrogénie dans le sport féminin, conduisant à une décision de la Cour européenne des droits de l'homme ?",a:"Caster Semenya, athlète sud-africaine hyperandrogène, a été imposée de traitement hormonal par l'IAAF pour participer aux 800 m féminins — question des frontières biologiques du genre sportif",detail:"Semenya est une femme intersexe avec des niveaux de testostérone naturellement élevés. L'IAAF (World Athletics) exige qu'elle réduise sa testostérone par traitement médical pour concourir en catégorie féminine. La Cour arbitrale du sport (TAS) valide la règle en 2019. La question touche aux définitions du genre, aux droits des personnes intersexes et à l'équité sportive — sans réponse simple."},
{theme:"sport",diff:"difficile",type:"q",q:"Dans le système de draft des ligues sportives américaines, quelle équipe choisit en premier parmi les jeunes talents disponibles ?",a:"La draft est un mécanisme par lequel les équipes sélectionnent les jeunes talents selon un ordre inversé au classement — pour rétablir l'équilibre sportif entre riches et pauvres franchises",detail:"La draft NBA, NFL, MLB, NHL illustre le modèle américain de compétition équilibrée. La pire équipe choisit en premier, la meilleure en dernier. Ce système contraste avec le foot européen où les clubs peuvent acheter n'importe quel joueur du monde. La draft crée des destins dramatiques : être premier choix de draft est un événement médiatique national."},
{theme:"sport",diff:"difficile",type:"q",q:"Combien de joueurs des White Sox de Chicago sont bannis à vie du baseball pour avoir truqué les World Series de 1919 ?",a:"Huit joueurs des White Sox de Chicago ont intentionnellement perdu les World Series 1919 contre paiement par des bookmakers — le scandale le plus grave de l'histoire sportive américaine",detail:"Arnold Rothstein finance la combine. Les 8 joueurs (dont Shoeless Joe Jackson) sont acquittés mais bannis à vie du baseball par le commissaire Kenesaw Mountain Landis. L'affaire pousse le baseball professionnel à créer des règles strictes d'intégrité. Shoeless Joe Jackson, dont les statistiques sont exceptionnelles, reste exclu du Hall of Fame."},
{theme:"sport",diff:"difficile",type:"q",q:"Quel rôle a joué Ayrton Senna dans l'histoire de la Formule 1 ?",a:"Triple champion du monde (1988, 1990, 1991), considéré par beaucoup comme le plus grand pilote de l'histoire — mort en course à Imola le 1er mai 1994",detail:"Senna est célèbre pour ses qualifications sous la pluie, son pôle position à Monaco (8 fois !), sa rivalité avec Alain Prost et son engagement spirituel. Sa mort au Grand Prix de Saint-Marin choque le monde du sport et accélère des réformes de sécurité majeures. 47 000 km de route sont détruits au Brésil le jour de ses funérailles. Son documentaire (2010) reste le meilleur film sportif jamais réalisé."},
{theme:"sport",diff:"difficile",type:"q",q:"Dans quelle ville italienne et depuis quel siècle pratique-t-on le Calcio storico, ancêtre violent du football ?",a:"Jeu médiéval florentin ancêtre du football, mêlant rugby, lutte et boxe — pratiqué depuis le XVIe s. sur la Piazza Santa Croce",detail:"Le Calcio storico (« football historique ») opposait les quatre quartiers de Florence (bleu, rouge, vert, blanc). Henri III de France y aurait joué en 1574. Le jeu, interdit au XIXe s., est relancé en 1930. Chaque équipe de 27 joueurs s'affronte pendant 50 minutes dans un mélange de sport collectif et de combat. C'est l'un des ancêtres directs du football moderne."},
{theme:"sport",diff:"facile",type:"q",q:"Quel est le sport le plus pratiqué dans le monde ?",a:"La marche/randonnée ou la natation (loisir) ; en sport collectif, le football (4 milliards de pratiquants)",detail:"Le football (soccer) est le sport collectif le plus pratiqué avec 250 millions de joueurs enregistrés et 4 milliards de fans dans le monde. Le cricket est 2e en nombre de fans (~2,5 milliards). En termes de pratique individuelle, la natation et le cyclisme sont parmi les plus répandus. Le football est présent dans 211 pays membres de la FIFA."},
{theme:"sport",diff:"facile",type:"q",q:"Quelle athlète française est la plus médaillée de l'histoire des JO féminins français ?",a:"Laura Flessel (escrimeuse, 2 médailles d'or à Atlanta 1996, 1 bronze à Sydney 2000) ou Marie-José Pérec (3 or, 1 bronze)",detail:"Marie-José Pérec réalise le triplé 200 m / 400 m / 400 m haies aux JO d'Atlanta (1996) — exploit unique dans l'histoire. Elle avait aussi remporté le 400 m à Barcelone (1992). Laura Flessel, « La Guêpe » guadeloupéenne, domine l'épée féminine dans les années 1990. Teddy Riner (judo, 3 or olympiques) est le sportif français le plus titré aux JO."},
{theme:"sport",diff:"facile",type:"q",q:"Quelle est la surface sur laquelle se joue Roland-Garros ?",a:"Terre battue (argile rouge)",detail:"Roland-Garros est le seul Grand Chelem sur terre battue — une surface lente qui favorise les joueurs de fond de court. Le tournoi se tient à Paris (Bois de Boulogne) fin mai-début juin. Rafael Nadal y a remporté 14 titres (« Roi de la terre »), record absolu dans un tournoi du Grand Chelem. Le stade principal est le Court Philippe-Chatrier (15 000 places)."},
{theme:"sport",diff:"facile",type:"q",q:"Quel est l'objectif du Tour de France et combien d'étapes comprend-il en moyenne ?",a:"Course cycliste par étapes en France (et pays limitrophes), 3 semaines et ~21 étapes, remportée par le porteur du maillot jaune au classement général",detail:"Le Tour de France est créé en 1903 par Henri Desgranges pour vendre le journal L'Auto. La 1ère édition couvre 2 428 km en 6 étapes. Aujourd'hui ~3 400 km en 21 étapes. 4 maillots distinctifs : jaune (classement général), vert (sprinteurs), à pois rouges (grimpeurs), blanc (meilleur jeune). Tadej Pogačar (Slovénie) et Jonas Vingegaard (Danemark) dominent les années 2020."},
{theme:"sport",diff:"facile",type:"q",q:"Quel pays a inventé le basketball et l'a popularisé dans le monde ?",a:"Les États-Unis — inventé par James Naismith (Canadien) en 1891 à Springfield, Massachusetts",detail:"Naismith cherche un sport d'intérieur pour ses étudiants. Il accroche deux paniers de pêche (baskets) et invente 13 règles. Le basketball devient olympique en 1936. La NBA, fondée en 1946, diffuse le sport mondialement via la télévision et des joueurs charismatiques (Magic Johnson, Bird, Jordan, Kobe, LeBron). La Dream Team américaine des JO de Barcelone 1992 est considérée comme la meilleure équipe sportive jamais assemblée."},
